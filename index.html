<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genetics TestBank</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #060913;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --indigo: #4f46e5;
  --sky: #38bdf8;
  --violet: #7c3aed;
}

body {
  background: var(--bg);
  color: #e2e8f0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  overflow-x: hidden;
}

/* ── Aurora ── */
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: aurora-float 14s ease-in-out infinite;
}
.aurora-1 {
  width: 520px; height: 520px;
  background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
  top: -120px; left: -100px;
  animation-delay: 0s;
}
.aurora-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
  top: 40%; right: -60px;
  animation-delay: -5s;
}
.aurora-3 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, #6d28d9 0%, transparent 70%);
  bottom: -80px; left: 30%;
  animation-delay: -9s;
}
@keyframes aurora-float {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-40px) scale(1.08); }
  66%      { transform: translate(-20px,30px) scale(0.95); }
}

/* ── Layout ── */
.screen-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  max-width: 720px;
  margin: 0 auto;
}

/* ── Title ── */
.main-title {
  font-size: 36px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 4px;
}
.shimmer-text {
  background: linear-gradient(90deg, #818cf8 0%, #38bdf8 30%, #a78bfa 60%, #818cf8 100%);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  to { background-position: 300% center; }
}
.subtitle {
  color: rgba(255,255,255,0.45);
  text-align: center;
  font-size: 15px;
  margin-top: -10px;
}

/* ── Glass card ── */
.glass-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px 22px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  width: 100%;
  max-width: 680px;
}
.section-label {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* ── Stagger animations ── */
.fade-in { animation: fadeUp 0.4s ease both; }
.stagger-1 { animation: fadeUp 0.4s ease 0.05s both; }
.stagger-2 { animation: fadeUp 0.4s ease 0.12s both; }
.stagger-3 { animation: fadeUp 0.4s ease 0.19s both; }
.stagger-4 { animation: fadeUp 0.4s ease 0.26s both; }
.stagger-5 { animation: fadeUp 0.4s ease 0.33s both; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Tabs ── */
.tab-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.tab-active {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 16px #7c3aed66;
}

/* ── Chips ── */
.chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s;
}
.chip:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
.chip-active {
  background: rgba(79,70,229,0.25);
  border-color: #818cf8;
  color: #c7d2fe;
}

/* ── Slider ── */
.custom-slider {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 99px;
  background: linear-gradient(90deg, #4f46e5, #38bdf8);
  outline: none;
  cursor: pointer;
}
.custom-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  box-shadow: 0 0 10px #818cf888;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.custom-slider::-webkit-slider-thumb:hover {
  box-shadow: 0 0 18px #818cf8cc;
}

/* ── Toggle ── */
.toggle-btn {
  width: 50px; height: 26px;
  border-radius: 99px;
  border: none;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  position: relative;
  transition: background 0.25s;
  flex-shrink: 0;
}
.toggle-on { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
.toggle-knob {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #fff;
  transition: left 0.25s;
  display: block;
}
.toggle-on .toggle-knob { left: 27px; }

/* ── Link btn ── */
.link-btn {
  background: none;
  border: none;
  color: #818cf8;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}
.link-btn:hover { color: #a5b4fc; }

/* ── Start button ── */
.start-btn {
  padding: 14px 40px;
  border-radius: 99px;
  border: none;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 24px #7c3aed66;
}
.start-btn:hover:not(:disabled) {
  transform: scale(1.04);
  box-shadow: 0 0 40px #7c3aed99;
}
.start-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  animation: none !important;
}
.glow-pulse {
  animation: glow-pulse 2.2s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { box-shadow: 0 0 24px #7c3aed66; }
  50%      { box-shadow: 0 0 48px #7c3aedcc; }
}

/* ── Exam badge ── */
.exam-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 99px;
  background: rgba(129,140,248,0.18);
  border: 1px solid rgba(129,140,248,0.35);
  color: #a5b4fc;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

/* ── Question text ── */
.question-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.7;
  color: rgba(255,255,255,0.92);
  margin-bottom: 20px;
}

/* ── Options ── */
.options-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.options-wrap .opt-btn {
  animation: slideInLeft 0.3s ease both;
}
@keyframes slideInLeft {
  from { opacity:0; transform: translateX(30px); }
  to   { opacity:1; transform: translateX(0); }
}
.opt-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.82);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  text-align: right;
  cursor: pointer;
  transition: all 0.18s;
  width: 100%;
}
.opt-btn:hover:not(.opt-correct):not(.opt-wrong):not(.opt-dim) {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.25);
}
.opt-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.opt-correct {
  border-color: #34d399 !important;
  background: rgba(52,211,153,0.12) !important;
  color: #6ee7b7 !important;
}
.opt-correct .opt-letter { background: rgba(52,211,153,0.3); }
.opt-wrong {
  border-color: #f87171 !important;
  background: rgba(248,113,113,0.12) !important;
  color: #fca5a5 !important;
}
.opt-wrong .opt-letter { background: rgba(248,113,113,0.3); }
.opt-dim { opacity: 0.35; cursor: default; }

/* ── Animations: bounce + shake ── */
.anim-bounce { animation: bounce-correct 0.5s ease; }
@keyframes bounce-correct {
  0%,100% { transform: scale(1); }
  30%      { transform: scale(1.04); }
  60%      { transform: scale(0.97); }
}
.anim-shake { animation: shake-wrong 0.45s ease; }
@keyframes shake-wrong {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}

/* ── Explanation box ── */
.explanation {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.7;
  direction: auto;
}
.expl-correct {
  background: rgba(52,211,153,0.1);
  border: 1px solid rgba(52,211,153,0.3);
  color: #a7f3d0;
}
.expl-wrong {
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  color: #fecaca;
}

/* ── Nav buttons ── */
.nav-btn {
  padding: 10px 22px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.18s;
}
.nav-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.12);
  color: #fff;
}
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-primary {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 14px #7c3aed55;
}
.nav-primary:hover { box-shadow: 0 0 24px #7c3aed99 !important; }

/* ── Review card ── */
.review-card { margin-bottom: 0; }

/* ── Responsive ── */
@media (max-width: 480px) {
  .main-title { font-size: 26px; }
  .glass-card { padding: 16px; }
  .question-text { font-size: 15px; }
}

</head>

Reciprocal translocation between chromosomes 4 and 6","Reciprocal translocation between chromosomes 12 and 14","Pericentric inversion of chromosome 4"],answer:1,explanation:"From L2 Chromosomes Structure: and consultant of medical genetics Faculty of medicine KAU Objectives \uF0D8Differentiate between chromatin and chromosomes. Chromosomes \uF097Each species has a characteristic chromosome complement (karyotype) in terms of the number and the morphology of the chromosomes that make up its genome."},{id:"mid1_mid1_L3_Central_Dogma_1",exam:"mid1",lecture:"L3 Central Dogma",q:"What are the main structural components of a gene?",options:["Coding regions that are directly translated into proteins along with RNA processing elements","Non-coding DNA sequences involved in regulation and control of gene expression","Exons, introns, and regulatory sequences such as promoters","Cellular structures involved in protein synthesis such as ribosomes and transfer RNA"],answer:2,explanation:"From L3 Central Dogma: \u2022 Initiation \u2022 \u2022Elongation \u2022 \u2022Termination \u2022 \u2022Recognition of STOP codons \u2022 \u2022Usage of release factors Regulation of gene expression \u2022 What is constitutive vs regulated gene expression? \u2022 What are some examples of regulation of gene expression?"},{id:"mid1_mid1_L3_Central_Dogma_2",exam:"mid1",lecture:"L3 Central Dogma",q:"Where does protein synthesis occur in the cell?",options:["Nucleus","Ribosome","Golgi apparatus","Lysosomes"],answer:1,explanation:"From L3 Central Dogma: Short, discontinuous DNA segments synthesized on the lagging strand during DNA replication, allowing both new strands to be built in the essential 5' to 3' direction as the replication fork opens Protein synthesis - Transcription"},{id:"mid1_mid1_L3_Central_Dogma_3",exam:"mid1",lecture:"L3 Central Dogma",q:"During which process is mRNA produced?",options:["Translation","Replication","Post-translational modification","Transcription"],answer:3,explanation al Dogma: \u2022 What are the types of types of eukaryotic mRNA modifications? What is the central dogma of molecular biology?"},{id:"mid1_mid1_L3_Central_Dogma_8",exam:"mid1",lecture:"L3 Central Dogma",q:"Between adenine and guanine transformation?",options:["Transition (mutation)","Transverse","Transcription","Translation"],answer:0,explanation:"From L3 Central Dogma: The central dogma of molecular biology describes the fundamental flow of genetic information: 1- Replication 2- Transcription 3- Translation by which the information in genes flows in a UNILATERAL direction: DNA \u2192 RNA \u2192 protein. What are the key differences between DNA replication and transcription?"},{id:"mid1_mid1_L3_Central_Dogma_9",exam:"mid1",lecture:"L3 Central Dogma",q:"An alteration in DNA polymerase that lacks 5' to 3' exonuclease activity results in:",options:["An increase in mutation rate","A decrease in replication speed","A decrease in RNA primer removal","An increase in recombination rate"],answer:2,explanation:"The 5' to 3' exonuclease activity of DNA Polymerase I (in prokaryotes) removes the RNA primer during replication. Loss of this activity would impair RNA primer removal. The 3' to 5' exonuclease provides proofreading; loss of that would increase mutations."},{id:"mid1_mid1_L3_Central_Dogma_10",exam:"mid1",lecture:"L3 Central Dogma",q:"In eukaryotes translation during the elongation stage in this diagram which of",options:["the cap end of mRNA","the direction of the ribosome","anticodon of tRNA","3'end of the tRNA"],answer:3,explanation:"From L3 Central Dogma: \u2022 mRNA \u2022 ribosomes, \u2022 tRNAs \u2022 and rRNAs. The central dogma of molecular biology describes the fundamental flow of genetic information: 1- Replication 2- Transcription 3- Translation by which the information in genes flows in a UNILATERAL direction: DNA \u2192 RNA \u2192 protein."},{id:"mid1_mid1_L3_Central_Dogma_11",exam:"mid1",lecture:"L3 Central Dogma",q:"What could be the effect of a coding s me Abnormalities \uF0D8Trisomy for a whole chromosome is rarely compatible with life except : trisomy 21, trisomy 13, trisomy 18, triple X female, Klinefelter syndrome.",image:"images/tb_p38_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_30",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A 6-year-old female presents with hyperphagia and short",options:["Angelman syndrome","Prader\u2013Willi syndrome","Turner syndrome","Klinefelter syndrome"],answer:1,explanation:"From L4 Chromosomal Aberrations: Numerical Chromosome Abnormalities \uF0D8Trisomy for a whole chromosome is rarely compatible with life except : trisomy 21, trisomy 13, trisomy 18, triple X female, Klinefelter syndrome."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_31",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A male presents with dysmorphic facial features, almond-",options:["Prader\u2013Willi syndrome","Down syndrome","Turner syndrome","Klinefelter syndrome"],answer:0,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_32",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Polydactyly is a unique feature of which of the following",options:["Patau syndrome","Cri du chat syndrome","Achondroplasia","Down syndrome"],answer:0,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_33",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A ointing to the abnormal chromosome 5. This is Cri-du-chat syndrome. Clinical features include a high-pitched cat-like cry in infancy, microcephaly, hypertelorism, and intellectual disability.",image:"images/tb_p49_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_37",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Give the definition of Ring chromosome:",options:["A numerical chromosomal abnormality in which two chromosomes have been translocated to another one to form a ring","A structurally abnormal chromosome in which two chromosomes have been united with each other to form a ring","A numerical chromosomal abnormality in which a new chromosome has been united with another one to form a ring","A structurally abnormal chromosome in which the ends of each chromosome arm have been lost and the broken arms have been reunited to form a ring"],answer:3,explanation:"From L4 Chromosomal Aberrations: Abnormalities of Chromosome Structure Unbalanced Balanced There is loss or gain of chromosomal material The chromosome set has the normal complement ,no loss or gain The phenotype is likely to be abnormal Don\u2019t usually have phenotypic effect But they can pose a threat to the offspring \uF0A7Delet..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_38",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Mustafa and Fatima are a couple seeking genetic counseling. They have a male",options:["1% (standard trisomy 21 recurrence)","10\u201315% (14;21 translocation carrier)","50% (balanced translocation)","100%"],answer:3,explanation:"From L4 Chromosomal Aberrations: \uF0FCDown syndrome : Recurrence Risk for next  pregnancy due to non-disjunction : 1% + the maternal age risk Risks in Robertsonian translocation \uF0FCThe female carrier of either a 13q21q or a 14q21q Robertsonian translocation runs a risk of approximately 10-15% for having a baby with Down syndrome, ..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_39",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image shows an abnormality indicated by the arrow. What chromosomal syndrome does this represent?",options:["Wolf-Hirschhorn syndrome (4p deletion)","Cri-du-chat syndrome (5p deletion)","Angelman syndrome (15q deletion)","Williams syndrome (7q11 deletion)"],answer:1,explanation:"The arrow indicates a deletion of the short arm (p arm) of chromosome 5, resulting in Cri-du-chat syndrome (46,XX/XY,del(5p)). This is a terminal deletion causing microcephaly, hypertelorism, low birth weight, intellectual disability, and the characteristic high-pitched cat-like cry (mewing) in infancy. Wolf-Hirschhorn is a 4p deletion; Angelman is a 15q deletion; Williams is 7q11.",image:"images/tb_p50_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_40",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype shown has an arrow indicating an abnormality on one chromosome. Based on the position of the arrow at chromosome 5, what syndrome does the patient most likely have?",options:["Edward syndrome","Cri-du-chat syndrome","Patau syndrome","Turner syndrome"],answer:1,explanation:"An arrow at chromosome 5 in a karyotype indicates a structural abnormality at chromosome 5. Deletion of 5p (the short arm) causes Cri-du-chat syndrome, characterized by: cat-like cry in infancy (due to laryngeal hypoplasia), microcephaly, hypertelorism, and intellectual disability. Karyotype notation: 46,XY/XX,del(5)(p15.3).",image:"images/tb_p16_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_41",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image shows an arrow indicating an abnormality. Based on the position of the arrow at chromosome 8, what is the most likely finding?",options:["Inversion of chromosome 8 (inv(8))","Deletion of chromosome 8q (del(8q))","Trisomy 8 (47,XX,+8)","Translocation involving chromosome 8"],answer:0,explanation:"When a karyotype arrow points to chromosome 8, and the chromosome 8 appears morphologically different from its homologue (e.g., different banding pattern or altered centromere position), pericentric inversion of chromosome 8 (inv(8)(p23q22)) should be considered. Inversions are balanced structural abnormalities but can predispose to unbalanced offspring.",image:"images/tb_p20_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_42",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"What syndrome does the karyotype in the image show?",options:["Down syndrome (Trisomy 21)","Edwards syndrome (Trisomy 18)","Patau syndrome (Trisomy 13)","Klinefelter syndrome (47,XXY)"],answer:0,explanation:"The karyotype shows three copies of chromosome 21 (trisomy 21), the hallmark of Down syndrome. Down syndrome is the most common chromosomal trisomy compatible with life (incidence ~1:700). Key clinical features include: intellectual disability, hypotonia, upslanting palpebral fissures, epicanthic folds, flat nasal bridge, congenital heart defects (40-50%), and short stature.",image:"images/tb_p32_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_43",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Based on the karyotype shown, what is the most likely diagnosis?",options:["Klinefelter syndrome (47,XXY)","Turner syndrome (45,X)","Triple X syndrome (47,XXX)","Down syndrome (47,XX,+21)"],answer:1,explanation:"Turner syndrome (45,X) shows only one X chromosome and no Y chromosome (45 total chromosomes). Clinical features: short stature, webbed neck, primary amenorrhea, streak gonads, coarctation of the aorta, shield chest. It is the only complete monosomy compatible with live birth; ~99% of 45,X conceptions spontaneously abort.",image:"images/tb_p35_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_44",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A karyotype is obtained for a phenotypically male patient presenting with gynecomastia, small testes, and azoospermia. What does the karyotype most likely show?",options:["45,X","47,XX,+21","47,XXY","46,XX"],answer:2,explanation:"The image shows Klinefelter syndrome karyotype (47,XXY): an extra X chromosome in a phenotypic male. It is the most common cause of male hypogonadism and infertility. Features: tall stature, small firm testes, azoospermia, gynecomastia, behavioral/learning difficulties. Testosterone is low; FSH and LH are elevated.",image:"images/tb_p38_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_45",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"This karyotype was obtained from a patient with features of a sex chromosome aneuploidy. What does it show?",options:["Normal female karyotype (46,XX)","Turner syndrome (45,X)","Klinefelter syndrome (47,XXY)","Normal male karyotype (46,XY)"],answer:2,explanation:"The karyotype shows 47,XXY (Klinefelter syndrome). Patients have two X chromosomes and one Y chromosome (47 total). The extra X results from non-disjunction during meiosis. Klinefelter is the most common sex chromosome aneuploidy in males (1:500-1:1000 male births) and the most common cause of male hypogonadism.",image:"images/tb_p44_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_46",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image is from a child with multiple congenital anomalies including clenched fists, overlapping fingers, and rockerbottom feet. What does the karyotype show?",options:["Trisomy 13 (Patau syndrome)","Trisomy 18 (Edwards syndrome)","Trisomy 21 (Down syndrome)","Monosomy X (Turner syndrome)"],answer:1,explanation:"Edwards syndrome (trisomy 18) karyotype shows three copies of chromosome 18 (47,XX/XY,+18). Clinical features include: clenched fists with overlapping fingers (4th finger over 3rd), rocker-bottom feet, micrognathia, prominent occiput, congenital heart defects, and severe intellectual disability. Most affected individuals do not survive beyond the first year of life.",image:"images/tb_p48_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_47",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The following karyotype is from a female patient who presents with short stature, webbed neck, and primary amenorrhea. What does the karyotype show?",options:["47,XXX (Triple X)","46,XX (Normal female)","45,X (Turner syndrome)","47,XXY (Klinefelter)"],answer:2,explanation:"Turner syndrome (45,X) is characterized by the loss of one sex chromosome, leaving only one X. The karyotype shows only 45 chromosomes with a single X. Clinical features: short stature, webbed neck (pterygium colli), low posterior hairline, shield chest, coarctation of aorta, streak ovaries, primary amenorrhea, and infertility.",image:"images/tb_p48_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_48",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"What karyotype does the image most likely show?",options:["47,XY,+21 (Down syndrome, male)","47,XX,+21 (Down syndrome, female)","47,XXY (Klinefelter syndrome)","46,XX (Normal female)"],answer:1,explanation:"The karyotype shows 47 chromosomes with three copies of chromosome 21 (trisomy 21) and two X chromosomes (XX sex chromosome pattern), indicating Down syndrome in a female (47,XX,+21). Down syndrome is the most common chromosomal trisomy causing intellectual disability, occurring in approximately 1 in 700 live births. Trisomy results from non-disjunction (usually in maternal meiosis I) in 95% of cases.",image:"images/tb_p39_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_1",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Consanguinity increases the risk of which type of genetic disorder?",options:["Autosomal dominant disorders","X-linked dominant disorders","Autosomal recessive disorders","Mitochondrial disorders"],answer:2,explanation:"From L5 L6 Mendelian: Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked)."},{id:"mid1_mid1_L5_L6_Mendelian_2",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is an example of an X-linked recessive disorder?",optio delian",q:"Which of the following is correct about Autosomal recessive trait?",options:["Only manifest in male","Manifest in heterozygous","Recurrence risk is 50% in females carriers","Skip generations"],answer:3,explanation:"From L5 L6 Mendelian: Autosomal Recessive Inheritance Autosomal Recessive Disorders \u2022 Parents are apparently normal \u2022 Parents are heterozygous carriers \u2022 Usually skipped generations \u2022Both males and females are equally affected \u2022Parents tend to be related more often than parents in general population."},{id:"mid1_mid1_L5_L6_Mendelian_26",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Consanguineous parents have a higher risk of having children with which type of disease?",options:["Cystic fibrosis","Marfan syndrome","Hemophilia","Neurofibromatosis"],answer:0,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_27",exam:"mid1",lecture:"L5 L6 Mendelian",q:"What's the mode of",options:["Hollandaric","autosomal recessive","X\u2014linked recessive","autosomal dominent"],answer:0,explanation:"From L5 L6 Mendelian: \u20226- Calculate the probability to be affected with or carry a single-gene diseases ( autosomal dominant, autosomal recessive and X-linked inheritance) \u20227-Clinical examples of each. Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked).",image:"images/tb_p42_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_28",exam:"mid1",lecture:"L5 L6 Mendelian",q:"An affected male transmits the disease to all of his daughters but",options:["X-linked recessive disorders","X-linked dominant disorders","Mitochondrial disorders","Autosomal dominant disorders"],answer:1,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_29",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is most",options:["Maternal inheritance","Paternal inheritance","Autosomal dominant inheritance","X-linked recessive inheritance"],answer:0,explanation:"From L5 L6 Mendelian: Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked).",image:"images/tb_p44_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_30",exam:"mid1",lecture:"L5 L6 Mendelian",q:"There was a family which came in the clinic with a child diagnosed with sickle",options:["25% carrier","50% Carrier","100% Affected","50% Affected"],answer:1,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_31",exam:"mid1",lecture:"L5 L6 Mendelian",q:"A father is affected with an X-linked dominant disorder. Which of the",options:["Females are affected as well as males","The father transmits the disorder to all of his sons","Only males are affected","The disorder can skip generations"],answer:0,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_32",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, what is the most likely inheritance pattern?",options:["X-linked recessive","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:2,explanation:"The pedigree shows an affected female in generation I passing the trait to an affected male in generation II, who then has two affected children (both boy and girl) in generation III. This pattern of vertical transmission across three generations, affecting both sexes equally, is characteristic of autosomal dominant inheritance. Every generation has affected individuals and both males and females are affected.",image:"images/tb_p52_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_33",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shows consanguineous parents (indicated by a double line connecting them) with multiple affected children. What is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked dominant","Y-linked"],answer:1,explanation:"The pedigree shows consanguineous parents (double horizontal line) with some affected offspring (filled symbols) of both sexes. Parents are unaffected (carriers). The combination of parental consanguinity, unaffected carrier parents, and affected children of both sexes is the hallmark of autosomal recessive inheritance. Consanguinity increases the chance of sharing the same recessive allele.",image:"images/tb_p40_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_34",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, what is the most likely mode of inheritance?",options:["Autosomal dominant","Y-linked","Autosomal recessive","X-linked recessive"],answer:3,explanation:"The pedigree shows a carrier female (I-1, half-filled circle) with an unaffected male (I-2). Their children include an unaffected male (II-1), a carrier female (II-2), and an affected male (II-3). In the next generation, the proband (III-1) is an affected male. This pattern \u2014 unaffected carrier mother passing disease to half her sons, daughters may be carriers but unaffected \u2014 is classic X-linked recessive inheritance.",image:"images/tb_p45_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_35",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on this pedigree, what is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked dominant","X-linked recessive"],answer:3,explanation:"The pedigree shows carrier females (circles with dots, I-2 and I-4) in generation I. Their male offspring (II-3, III-1, III-3) are affected (filled squares), while females are either carriers or unaffected. The proband (III-1) is an affected male born to a carrier mother. No male-to-male transmission is seen, and all affected individuals are male. This is classic X-linked recessive inheritance.",image:"images/tb_p11_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_36",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shown demonstrates a consanguineous marriage (double line). Based on the pattern of affected and unaffected children, what is the most likely mode of inheritance?",options:["X-linked dominant","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:1,explanation:"The pedigree shows unaffected consanguineous parents (double horizontal line = related couple) with two deceased siblings (II-2 crossed, II-3 crossed) and children including one affected male (III-1, proband, arrow) and one affected female (III-5). Unaffected parents who are related (sharing a common ancestor) having affected children of both sexes is the hallmark of autosomal recessive inheritance. The consanguinity increases the probability of both parents carrying the same rare recessive allele.",image:"images/tb_p18_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_37",exam:"mid1",lecture:"L5 L6 Mendelian",q:"What inheritance pattern is most consistent with the pedigree shown?",options:["X-linked recessive","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:2,explanation:"The pedigree shows an affected mother (I-2) who transmits the disease to both affected sons (II-3) and affected daughters (II-5). The affected son (II-3) then has affected children (III-3, III-4, III-5) of both sexes. This vertical transmission \u2014 affected parent in every generation, both males and females affected, 50% recurrence risk \u2014 is characteristic of autosomal dominant inheritance.",image:"images/tb_p28_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_38",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shows a family with multiple generations where only the fourth generation has affected individuals (one male and one female). The answer states this is consistent with sickle cell anemia. What is the most likely mode of inheritance?",options:["Autosomal dominant (AD)","X-linked recessive (XLR)","Autosomal recessive (AR)","Mitochondrial inheritance"],answer:2,explanation:"The pedigree shows unaffected individuals in generations I, II, and III (who are all carriers), with affected offspring only appearing in generation IV. The disease skips multiple generations and affects both males and females equally. Sickle cell anemia (HbSS) is autosomal recessive, requiring two mutant HBB alleles. Carriers (HbAS, sickle cell trait) are asymptomatic. Both parents must be carriers for a child to be affected.",image:"images/p38_pedigree_q20.png"},{id:"mid1_mid1_L5_L6_Mendelian_39",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, with affected individuals appearing in multiple family lines across generations II and III (both males and females affected), what is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked recessive","Mitochondrial"],answer:0,explanation:"The pedigree shows affected males (filled squares) and affected females (filled circles) in multiple family branches across generations II and III. Affected individuals in every generation, transmitted from affected parent to approximately 50% of children regardless of sex, is the hallmark of autosomal dominant inheritance. This pattern rules out X-linked recessive (which would show only affected males) and autosomal recessive (which would skip generations).",image:"images/p44_pedigree_q3.png"},{id:"mid1_mid1_L7_Non_Mendelian_1",exam:"mid1",lecture:"L7 Non Mendelian",q:"What is the DNA sequence repeat associated with Huntington",options:["CGG","GAA","CTG","CAG"],answer:3,explanation:"From L7 Non Mendelian: Clinical Manifestation of Mitochondrial Disorders Anticipation & Repeat Expansion Anticipation \u2022 If the onset of the disease occurs at earlier age in the offspring than in the parents \u2022 And/or the disease occurs with increasing severity in subsequent generations \u2192this phenomenon is called ..."},{id:"mid1_mid1_L7_Non_Mendelian_2",exam:"mid1",lecture:"L7 Non Mendelian",q:"From which cell are mitochondrial diseases transmitted to offspring?",options:["Sperm cell","Somatic cell","Stem cell","Oocyte"],answer:3,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_3",exam:"mid1",lecture:"L7 Non Mendelian",q:"Genomic imprinting is an important factor in gene variation.",options:["Angelman syndrome and Prader-Willi syndrome","Angelman syndrome and Cystic fibrosis","Beckwith-Wiedemann syndrome and Silver-Russell syndrome","Huntington's disease and Duchenne muscular dystrophy"],answer:0,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_4",exam:"mid1",lecture:"L7 Non Mendelian",q:"The normal individual will have only one transcriptionally active",options:["Uniparental disomy","Mosaicism","Genomic imprinting","New mutation"],answer:2,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_5",exam:"mid1",lecture:"L7 Non Mendelian",q:"Matrilineal inheritance applies to disorders that are directly due",options:["Alpha globin gene","Mitochondrial DNA","tumor suppressor gene","CYP2C9"],answer:1,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_6",exam:"mid1",lecture:"L7 Non Mendelian",q:"Which of the following describes the presence of two types of",options:["Homoplasmy","Heterozygous","Heteroplasmy","Homozygous"],answer:2,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_7",exam:"mid1",lecture:"L7 Non Mendelian",q:"Which of the following correctly describes the repeat expansion in Huntington disease?",options:["CCG repeats; normal range 4-39 repeats","CTG repeats; normal range 5-37 repeats","CAG repeats; disease range more than 40 repeats","CGG repeats; disease range 200-900 repeats"],answer:2,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_8",exam:"mid1",lecture:"L7 Non Mendelian",q:"Genomic imprinting is best described as a situation where:",options:["The normal individual has only one transcriptionally active allele at a given locus, determined by parent of origin","The individual inherits both homologous chromosomes from one parent","The individual has more than one cell type with different genotypes","Disease onset occurs at an earlier age in the offspring than in the parent"],answer:0,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_9",exam:"mid1",lecture:"L7 Non Mendelian",q:"One of the following disorders is caused by a genetic imprinting",options:["Sickle cell anemia","Angelman syndrome","Huntington disease","Neurofibromatosis"],answer:1,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_10",exam:"mid1",lecture:"L7 Non Mendelian",q:"The pedigree shown represents a 3-generation family where only males are affected (filled squares). The carrier females (circles with dots) show no symptoms. What is the most likely mode of inheritance?",options:["Autosomal recessive","Autosomal dominant","X-linked recessive","Mitochondrial"],answer:2,explanation:"In the pedigree, only males are affected (filled squares), carrier females are unaffected (circles with dots). There is no male-to-male transmission (fathers don't pass it to sons directly; sons get the X from their mother). The carrier female (I-2) passes the X-linked trait to her sons. This is classic X-linked recessive inheritance \u2014 as seen in DMD, hemophilia A/B, and other X-linked conditions.",image:"images/p45_pedigree_dmd.png"},{id:"mid1_mid1_example_1",exam:"mid1",lecture:"example",q:"Which of the following best describes the central dogma of molecular biology?",options:["DNA \u2192 Protein \u2192 RNA","RNA \u2192 DNA \u2192 Protein","DNA \u2192 RNA \u2192 Protein","Protein \u2192 RNA \u2192 DNA"],answer:2,explanation:"The central dogma states that genetic information flows from DNA to RNA (transcription) and then from RNA to Protein (translation)."},{id:"mid1_mid1_example_2",exam:"mid1",lecture:"example",q:"A codon consists of how many nucleotide bases?",options:["1","2","3","4"],answer:2,explanation:"A codon is a triplet of nucleotide bases that codes for a specific amino acid or stop signal."},{id:"mid2_mid2_L10_Birth_Defects_1",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn is diagnosed with an isolated congenital heart defect. Which",options:["Dysplasia","Disruption","Malformation","Deformation"],answer:2,explanation:"A malformation is a primary structural defect arising from an intrinsic abnormality in a developmental process (e.g., congenital heart defects, cleft lip/palate, neural tube defects). It is primary and intrinsic."},{id:"mid2_mid2_L10_Birth_Defects_2",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following birth defects is considered a disruption?",options:["Congenital heart defect","Neural tube defect","Cleft lip and palate","Amniotic band syndrome"],answer:3,explanation:"A disruption is a secondary and extrinsic birth defect caused by an external destructive force that breaks down or interferes with an otherwise normal developmental process. Amniotic bands can wrap around limbs and cause disruption. It is NOT genetic."},{id:"mid2_mid2_L10_Birth_Defects_3",exam:"mid2",lecture:"L10 Birth Defects",q:"Certain malformations tend to occur together more frequently than",options:["Down syndrome","VACTERL association","Ectodermal dysplasia","Cleft lip and palate"],answer:1,explanation:"An association is a non-random occurrence of multiple anomalies that are not a known syndrome or sequence. VACTERL is an example (Vertebral, Anal, Cardiac, Tracheo-Esophageal, Renal, Limb anomalies)."},{id:"mid2_mid2_L10_Birth_Defects_4",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn presents with vertebral anomalies, anal atresia,",options:["Potter sequence","Van der Woude syndrome","VATER association","Ectodermal dysplasia"],answer:2,explanation:"VATER/VACTERL association includes: Vertebral anomalies, Anal atresia, Cardiac defects, Tracheo-Esophageal fistula, Renal anomalies, Limb defects. It has no known single genetic cause and normal WES/microarray."},{id:"mid2_mid2_L10_Birth_Defects_5",exam:"mid2",lecture:"L10 Birth Defects",q:"A male newborn with vertebral anomalies, anal atresia, tracheoesophageal",options:["Potter sequence","VATER association","Van der Woude syndrome","Ectodermal dysplasia"],answer:1,explanation:"VATER association is non-random co-occurrence of structural anomalies with no identifiable genetic cause (normal chromosomes and microarray). The presence of radial ray defects is characteristic. This is an association, not a syndrome."},{id:"mid2_mid2_L10_Birth_Defects_6",exam:"mid2",lecture:"L10 Birth Defects",q:"Elevated amniotic alpha fetoprotein (AFP) has been detected prenatally",options:["Vitamin B12","Folic acid","IgA","Immunosuppressant"],answer:1,explanation:"Elevated AFP indicates an open neural tube defect (NTD) such as anencephaly or spina bifida. Periconceptional folic acid supplementation significantly reduces the risk of NTDs. The image shows a meningomyelocele (spina bifida), the most common open NTD.",image:"images/tb_p66_fig1.png"},{id:"mid2_mid2_L10_Birth_Defects_7",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following terms describes the abnormal mechanical force",options:["Malformation","Disruption","Deformation","Dysplasia"],answer:2,explanation:"Deformation is caused by abnormal mechanical forces (extrinsic) that distort an otherwise normally formed structure. Examples include clubfoot (talipes equinovarus) from uterine constraint, and positional plagiocephaly. It differs from disruption in that the structure was initially normal."},{id:"mid2_mid2_L10_Birth_Defects_8",exam:"mid2",lecture:"L10 Birth Defects",q:"What is the best description of disruption?",options:["Primary and extrinsic","Secondary and extrinsic","Primary and intrinsic","Secondary and intrinsic"],answer:1,explanation:"Disruption is secondary (the original structure was forming normally) and extrinsic (caused by an outside destructive factor such as amniotic bands, infection, or ischemia). Malformation, by contrast, is primary and intrinsic."},{id:"mid2_mid2_L10_Birth_Defects_9",exam:"mid2",lecture:"L10 Birth Defects",q:"What is correct regarding neural tube defects?",options:["Anencephaly results from a defect in the lower end of the neural tube","The risk can be reduced by periconceptional folic acid supplementation","The recurrence risk from an affected parent is 10%","Spina bifida results from failure of cranial neural tube closure"],answer:1,explanation:"Periconceptional folic acid supplementation (before and during early pregnancy) reduces NTD risk by 50-70%. Anencephaly results from failure of CRANIAL (anterior) neural tube closure. Spina bifida results from failure of CAUDAL (posterior) closure. Recurrence risk is approximately 2-3%, not 10%."},{id:"mid2_mid2_L10_Birth_Defects_10",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following is caused by abnormal organization of tissue?",options:["Ectodermal dysplasia","Spina bifida","Cleft palate","Talipes"],answer:0,explanation:"Dysplasia refers to abnormal organization or function of cells within a specific tissue type. Ectodermal dysplasia results from abnormal development of ectodermal tissue (affecting hair, skin, teeth, nails, sweat glands). Most dysplasias are due to single gene defects."},{id:"mid2_mid2_L10_Birth_Defects_11",exam:"mid2",lecture:"L10 Birth Defects",q:"A family came with their 7-year-old girl and 5-year-old boy, complaining",options:["Male infertility due to testicular atrophy","Male infertility due to congenital bilateral absence of the vas deferens","Female infertility due to ovarian failure","Infertility due to primary ciliary dyskinesia"],answer:1,explanation:"The clinical picture describes cystic fibrosis (CF) \u2014 autosomal recessive CFTR mutation. Males with CF frequently have congenital bilateral absence of the vas deferens (CBAVD), causing obstructive azoospermia and infertility. Testicular function is normal. Females with CF have reduced fertility due to thick cervical mucus, but not ovarian failure."},{id:"mid2_mid2_L10_Birth_Defects_12",exam:"mid2",lecture:"L10 Birth Defects",q:"Which medication, if given in the first trimester of pregnancy, helps",options:["Streptomycin","Folic acid","Isoniazid","Valproic acid"],answer:1,explanation:"Folic acid (vitamin B9) given periconceptionally and in the first trimester prevents neural tube defects (NTDs) by supporting proper neural tube closure. Streptomycin is ototoxic (teratogen). Isoniazid and valproic acid are potentially harmful teratogens; valproic acid is actually associated with INCREASED risk of NTDs."},{id:"mid2_mid2_L10_Birth_Defects_13",exam:"mid2",lecture:"L10 Birth Defects",q:"The image shows a newborn with a protrusion of abdominal contents through the umbilicus, covered by a thin membrane. What type of birth defect does this represent and what is the correct term for this finding?",options:["Disruption \u2014 gastroschisis","Malformation \u2014 omphalocele","Deformation \u2014 umbilical hernia","Dysplasia \u2014 abdominal wall dystrophy"],answer:1,explanation:"Omphalocele is a malformation (primary, intrinsic defect) where abdominal organs herniate through the umbilical ring and are covered by a peritoneal membrane. It differs from gastroschisis (a disruption) where organs herniate through a defect lateral to the umbilicus with NO covering membrane. Omphalocele is associated with chromosomal abnormalities (trisomy 13, 18) and BWS syndrome.",image:"images/tb_p65_fig1.png"},{id:"mid2_mid2_L10_Birth_Defects_14",exam:"mid2",lecture:"L10 Birth Defects",q:"An adult male presents with the physical findings shown in the image (gynecomastia, sparse body hair, and hypogonadism). These features developed as a result of a congenital chromosomal abnormality. What is the most likely underlying karyotype?",options:["46,XY (Normal male)","45,X (Turner syndrome)","47,XXY (Klinefelter syndrome)","47,XYY (Jacob syndrome)"],answer:2,explanation:"The image shows an adult male with gynecomastia and sparse body/facial hair \u2014 classic features of Klinefelter syndrome (47,XXY). Although it is a congenital chromosomal condition (present from birth), many clinical manifestations only become apparent during or after puberty. Features include: tall stature, small firm testes, azoospermia, infertility, gynecomastia, female-distribution pubic hair, and learning difficulties. It is the most common sex chromosome aneuploidy in males.",image:"images/tb_p65_fig2.png"},{id:"mid2_mid2_L10_Birth_Defects_15",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn presents with macroglossia (large tongue), macrosomia (large birth weight), and abdominal wall defect. The infant also develops severe hypoglycemia in the first hours of life. What is the most likely diagnosis?",options:["Down syndrome (Trisomy 21)","Beckwith-Wiedemann syndrome","VACTERL association","Turner syndrome"],answer:1,explanation:"The image shows a newborn with Beckwith-Wiedemann syndrome (BWS): an overgrowth syndrome characterized by macroglossia, macrosomia, omphalocele/abdominal wall defects, and neonatal hypoglycemia. BWS is caused by dysregulation of imprinted genes at chromosome 11p15.5 (IGF2/H19 region). Risk of embryonal tumors (Wilms tumor, hepatoblastoma) is increased. Most cases are sporadic; ~15% are familial.",image:"images/p64_bws_baby_q7.png"},{id:"mid2_mid2_L11_DNA_Repair_1",exam:"mid2",lecture:"L11 DNA Repair",q:"Which DNA repair mechanism involves the enzyme DNA glycosylase?",options:["Mismatch repair","Nucleotide excision repair","Base excision repair","Post-replication repair"],answer:2,explanation:"From L11 DNA Repair: Base Excision Repair Nucleotide excision repair *Thymidine dimers or chemical adducts \xDF apurinic/apyrimidinic site 4/11/26 8 Mismatch repair (MMR) mechanism DNA Repair Mechanisms \u2022 Double strand repair mechanisms \u2022 Homologous recombination (HR) mechanism \u2022 Non-homologous end joining (NHEJ) mechan..."},{id:"mid2_mid2_L11_DNA_Repair_2",exam:"mid2",lecture:"L11 DNA Repair",q:"Which sequence correctly describes the major DNA repair mechanism?",options:["Cleavage \u2192 Removal \u2192 Insertion \u2192 Sealing","Removal \u2192 Cleavage \u2192 Insertion \u2192 Sealing","Cleavage \u2192 Insertion \u2192 Removal \u2192 Sealing","Cleavage \u2192 Removal \u2192 Sealing \u2192 Insertion"],answer:0,explanation:"From L11 DNA Repair: \u2022 Demethylation \xE0 Methyl Group Removal \u2022 DNA methylation of imprinted loci obs _Variants_1",exam:"mid2",lecture:"L12 Gene Variants",q:"Which of the following best describes a nonsense mutation?",options:["A substitution causing a different amino acid","A substitution creating a premature stop codon","Deletion of three nucleotides","Insertion without frameshift"],answer:1,explanation:"From L12 Gene Variants: Base Deletions \u2022 The loss of one or more nucleotide \u2022  If occurs in coding sequences and involves one, two or more nucleotides that are not a multiple of three, the reading frame will be disrupted \u2022  Larger deletions may result in partial or whole gene deletions \u2192 loss of gene function or expr..."},{id:"mid2_mid2_L12_Gene_Variants_2",exam:"mid2",lecture:"L12 Gene Variants",q:"Which of the following variants is an example of a missense mutation?",options:["p.Gly542*","c.489+1G>T","p.Arg117His","p.Phe508del"],answer:2,explanation:"From L12 Gene Variants: Variants/Mutations \u2013 By inheritance \u2022Homozygous variants \u2022Compound heterozygous (CH) variants \u2022De Novo variants Homozygous Variants \u2022 Occur when an individual has two identical copies of a mutation in a particular gene (two same variants in the same gene) \u2022 Both copies of homozygous variants ..."},{id:"mid2_mid2_L12_Gene_Variants_3",exam:"mid2",lecture:"L12 Gene Variants",q:"Which of the following variants is an example of a nonsense mutation?",options:["p.Arg117His","p.Gly542*","p.Phe508del","c.489+1G>T"],answer:1,explanation:"From L12 Gene Variants: Variants/Mutations \u2013 By inheritance \u2022Homozygous variants \u2022Compound heterozygous (CH) variants \u2022De Novo variants Homozygous Variants \u2022 Occur when an individual has two identical copies of a mutation in a particular gene (two same variants in the same gene) \u2022 Both copies of homozygous variants ..."},{id:"mid2_mid2_L12_Gene_Variants_4",exam:"mid2",lecture:"L12 Gene Variants",q:"A 4-year-old girl has short stature, webbed neck, pulmonary valve stenosis, and",options:["Ga exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_3",exam:"mid2",lecture:"L13 Molecular Techniques",q:"An 18-month-old presents with muscle weakness and frequent falls. The doctor suspects a point mutation in the SMN1 gene. How can we confirm this?",options:["MLPA","Chromosomal microarray","Sanger sequencing","FISH"],answer:2,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_4",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What molecular method is most commonly used to detect large deletions or duplications in the DMD gene?",options:["MLPA","FISH","Microarray","Sanger sequencing"],answer:0,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_5",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Sara is a 30 years old female who came to a genetic",options:["chromosome microarray","MLPA","sanger sequencing","whole exome sequences"],answer:2,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_6",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A 47-year-old female patient is referred to the genetic clinic,",options:["Gene panel","Chromosomal analysis","Search for MLH mutation","Sanger sequencing"],answer:0,explanation:"From L13 Molecular Techniques: Confirmation a de novo mutation in a patient (by testing the mutation in the parent) 4/6/26 15 Sanger Sequencing Examples of diseases which can be diagnosed with Sanger Sequencing: Cystic Fibrosis (CF) Responsible gene: CFTR (cystic fibrosis transmembrane conductance regulator) Cytogenetic loc..."},{id:"mid2_mid2_L13_Molecular_Techniques_7",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What is the best genetic testing method to detect a chromosomal duplication smaller than 3 megabase pairs?",options:["Chromosomal microarray","Conventional chromosomal analysis (karyotype)","MLPA","Southern blot"],answer:0,explanation:"From L13 Molecular Techniques: Nucleic Acid Hybridization: involves mixing DNA from two sources that have been denatured by heat or alkali to make them single-stranded and then, under the appropriate conditions, allowing complementary base pairing of homologous sequences to identify a specific DNA sequences Molecular Methods \u2022..."},{id:"mid2_mid2_L13_Molecular_Techniques_8",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Which of the following methods is used for separation of DNA",options:["Polymerase chain reaction (PCR)","Restriction digestion","Gel electrophoresis","Bacterial transformation"],answer:2,explanation:"From L13 Molecular Techniques: - It is a variation of the multiplex PCR that permits amplification of multiple targets with only a single primer Multiplex Ligation-Dependent Probe Amplification (MLPA) 4/6/26 12 Example of disease which can be diagnosed with MLPA: Duchenne Muscular Dystrophy (DMD) \u2022 The most common and most..."},{id:"mid2_mid2_L13_Molecular_Techniques_9",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The Sanger sequencing result shown in the image was performed on a proband, his father, his mother, and a reference sequence. What is the most accurate interpretation?",options:["Proband is homozygous mutant; father is carrier; mother is normal","Proband is heterozygous mutant; father is heterozygous carrier; mother is normal","Proband is normal; father is mutant; mother is carrier","All three family members are heterozygous carriers"],answer:1,explanation:"The proband (and father) show an extra elevated peak (arrow) above the baseline at a specific position compared to the reference sequence, indicating a heterozygous mutation. The mother's trace follows the reference exactly (normal). This pattern suggests the mutation was inherited from the carrier father (autosomal dominant or X-linked, depending on the gene). The mother is not a carrier.",image:"images/tb_p63_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_10",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The chromosomal microarray result shown in the image demonstrates a copy number variant. How would you interpret this finding?",options:["Homozygous deletion on chromosome 5","Heterozygous duplication on chromosome 5","Trisomy of chromosome 5","Hemizygous deletion on chromosome 5"],answer:1,explanation:"The microarray shows a segment on chromosome 5 where the blue line (representing copy number ratio) shifts UPWARD above baseline, indicating an INCREASE in copy number. Since only one line is elevated (not tripling), this represents a HETEROZYGOUS DUPLICATION (one normal copy + one duplicated region). Microarray can detect CNVs too small to see on conventional karyotype.",image:"images/tb_p63_fig2.png"},{id:"mid2_mid2_L13_Molecular_Techniques_11",exam:"mid2",lecture:"L13 Molecular Techniques",q:"DNA fingerprinting (STR profiling) was performed on samples from a crime scene, a victim, and two suspects. Which suspect is most likely the criminal based on the image?",options:["Suspect 1","Suspect 2","Both suspects","Neither suspect matches"],answer:1,explanation:"DNA fingerprinting compares short tandem repeat (STR) band patterns. The criminal should have bands matching the crime scene sample. In the image, Suspect 2's band pattern matches the crime scene pattern, while Suspect 1's pattern does not. DNA fingerprinting is highly discriminatory because the probability of two unrelated individuals sharing the same STR profile is extremely low.",image:"images/tb_p87_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_12",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The RFLP Southern blot shown in the image was performed for sickle cell anemia diagnosis. The family includes Mother (M), Father (F), and three children (C1, C2, C3). Based on the band pattern, which child is affected with sickle cell anemia?",options:["C1","C2","C3","None of the children are affected"],answer:2,explanation:"In RFLP-based SCA diagnosis using Mst II restriction enzyme: the normal \u03B2A allele is cut (giving two smaller bands), while the sickle \u03B2S allele is NOT cut (giving one larger band). Homozygous normal: 2 bands. Carrier (heterozygous): 3 bands. Affected (homozygous HbSS): 1 band. C3 shows the pattern consistent with affected status (homozygous HbSS).",image:"images/tb_p88_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_13",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A paternity test was performed using DNA fingerprinting. The blot shows Mother, Child, Alleged Father, and two ladder controls. What is the conclusion?",options:["The alleged father is excluded as the biological father","The alleged father is confirmed as the biological father","The test is inconclusive","The child's pattern matches neither parent"],answer:1,explanation:"In paternity testing, a child inherits 50% of their DNA bands from the mother and 50% from the father. Any bands in the child NOT present in the mother must be present in the biological father. In this blot, the unique bands of the child (those not from the mother) match the alleged father's pattern, confirming paternity.",image:"images/tb_p88_fig2.png"},{id:"mid2_mid2_L13_Molecular_Techniques_14",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The Sanger sequencing chromatogram shown compares a proband, his father, and his mother against a reference sequence. The proband and father show a double peak at one position while the mother's trace is identical to the reference. What is the correct interpretation?",options:["De novo mutation in the proband; parents are unaffected","Autosomal recessive mutation; both parents are carriers","The mutation was inherited from the father; mother is unaffected","The mutation was inherited from the mother; father is unaffected"],answer:2,explanation:"In Sanger sequencing, a heterozygous mutation appears as two overlapping peaks (double peak) at the mutation site \u2014 one peak from the normal allele and one from the mutant allele. The proband and father both show this double peak, while the mother's trace matches the reference (normal). This indicates the proband inherited the mutation from his father. This pattern is consistent with autosomal dominant or X-linked inheritance from the paternal side.",image:"images/tb_p67_fig1.png"},{id:"mid2_mid2_L14_Approach_Patients_1",exam:"mid2",lecture:"L14 Approach Patients",q:"A family with two affected boys presented to the genetic clinic.",options:["High creatine kinase level.","Low creatine kinase level.","Normal creatine kinase level.","No change to creatine kinase level."],answer:0,explanation:"From L14 Approach Patients: X-Linked Disorders \u2022 Duchenne muscular dystrophy \u2022 Fragile X syndrome (covered in Non- Mendelian inheritance lecture) Duchenne Muscular Dystrophy Responsible gene: DMD (Dystrophin) Cytogenetic locus: Xp21 Inheritance: X-linked recessive Clinical features: \u2022 Progressive muscular wea

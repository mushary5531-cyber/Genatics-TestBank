f long bone. How do you confirm the diagnosis?",options:["DNA analysis for FGFR3","chromosomal analysis","FBN1 dna analysis","glycoproteins"],answer:0,explanation:"From L12 Gene Variants: Variants/Mutations \u2013 By inheritance \u2022Homozygous variants \u2022Compound heterozygous (CH) variants \u2022De Novo variants Homozygous Variants \u2022 Occur when an individual has two identical copies of a mutation in a particular gene (two same variants in the same gene) \u2022 Both copies of homozygous variants ..."},{id:"mid2_mid2_L12_Gene_Variants_8",exam:"mid2",lecture:"L12 Gene Variants",q:"A patient presents with caf\xE9-au-lait spots and optic nerve glioma. What gene is responsible for this condition?",options:["FBN1","NF1","FGFR3","BRCA1"],answer:1,explanation:"From L12 Gene Variants: Wisam Habhab \u2022 Consultant Clinical Geneticist/Assistan t Professor \u2022 Department of Genetic Medicine, Faculty of Medicine, KAU 2nd year medicine, 2026 Learning Outcomes \u2022 Define genetic variants/mutations \u2022 Classify types of variants \u2022 List the causes of variants \u2022 Understand the nomenclature ..."},{id:"mid2_mid2_L13_Molecular_Techniques_1",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A 2-year-old child has developmental delay and multiple congenital anomalies. Chromosome analysis and microarray are negative, and no specific syndrome is suspected. What is the most appropriate next test?",options:["FISH","MLPA","Sanger sequencing","Whole exome sequencing"],answer:3,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_2",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A woman with breast cancer is found to carry a pathogenic CHEK2 variant. Which test is most appropriate to screen her siblings for the same mutation?",options:["Microarray","MLPA","Whole exome sequencing","Sanger sequencing"],answer:3,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_3",exam:"mid2",lecture:"L13 Molecular Techniques",q:"An 18-month-old presents with muscle weakness and frequent falls. The doctor suspects a point mutation in the SMN1 gene. How can we confirm this?",options:["MLPA","Chromosomal microarray","Sanger sequencing","FISH"],answer:2,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_4",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What molecular method is most commonly used to detect large deletions or duplications in the DMD gene?",options:["MLPA","FISH","Microarray","Sanger sequencing"],answer:0,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_5",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Sara is a 30 years old female who came to a genetic counseling with a history of breast cancer in family. Her mother had breast cancer caused by BRCA1. Which of the following tests is appropriate for sara?",options:["chromosome microarray","MLPA","sanger sequencing","whole exome sequences"],answer:2,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_6",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A 47-year-old female patient is referred to the genetic clinic, tumor in her right colon. Her father died at the age of 55 from colon cancer, her paternal aunt had endometrial cancer. What is the best technique to confirm her condition?",options:["Gene panel","Chromosomal analysis","Search for MLH mutation","Sanger sequencing"],answer:0,explanation:"From L13 Molecular Techniques: Confirmation a de novo mutation in a patient (by testing the mutation in the parent) 4/6/26 15 Sanger Sequencing Examples of diseases which can be diagnosed with Sanger Sequencing: Cystic Fibrosis (CF) Responsible gene: CFTR (cystic fibrosis transmembrane conductance regulator) Cytogenetic loc..."},{id:"mid2_mid2_L13_Molecular_Techniques_7",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What is the best genetic testing method to detect a chromosomal duplication smaller than 3 megabase pairs?",options:["Chromosomal microarray","Conventional chromosomal analysis (karyotype)","MLPA","Southern blot"],answer:0,explanation:"From L13 Molecular Techniques: Nucleic Acid Hybridization: involves mixing DNA from two sources that have been denatured by heat or alkali to make them single-stranded and then, under the appropriate conditions, allowing complementary base pairing of homologous sequences to identify a specific DNA sequences Molecular Methods \u2022..."},{id:"mid2_mid2_L13_Molecular_Techniques_8",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Which of the following methods is used for separation of DNA fragments?",options:["Polymerase chain reaction (PCR)","Restriction digestion","Gel electrophoresis","Bacterial transformation"],answer:2,explanation:"From L13 Molecular Techniques: - It is a variation of the multiplex PCR that permits amplification of multiple targets with only a single primer Multiplex Ligation-Dependent Probe Amplification (MLPA) 4/6/26 12 Example of disease which can be diagnosed with MLPA: Duchenne Muscular Dystrophy (DMD) \u2022 The most common and most..."},{id:"mid2_mid2_L13_Molecular_Techniques_9",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The Sanger sequencing result shown in the image was performed on a proband, his father, his mother, and a reference sequence. What is the most accurate interpretation?",options:["Proband is homozygous mutant; father is carrier; mother is normal","Proband is heterozygous mutant; father is heterozygous carrier; mother is normal","Proband is normal; father is mutant; mother is carrier","All three family members are heterozygous carriers"],answer:1,explanation:"The proband (and father) show an extra elevated peak (arrow) above the baseline at a specific position compared to the reference sequence, indicating a heterozygous mutation. The mother's trace follows the reference exactly (normal). This pattern suggests the mutation was inherited from the carrier father (autosomal dominant or X-linked, depending on the gene). The mother is not a carrier.",image:"images/tb_p63_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_10",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The chromosomal microarray result shown in the image demonstrates a copy number variant. How would you interpret this finding?",options:["Homozygous deletion on chromosome 5","Heterozygous duplication on chromosome 5","Trisomy of chromosome 5","Hemizygous deletion on chromosome 5"],answer:1,explanation:"The microarray shows a segment on chromosome 5 where the blue line (representing copy number ratio) shifts UPWARD above baseline, indicating an INCREASE in copy number. Since only one line is elevated (not tripling), this represents a HETEROZYGOUS DUPLICATION (one normal copy + one duplicated region). Microarray can detect CNVs too small to see on conventional karyotype.",image:"images/tb_p63_fig2.png"},{id:"mid2_mid2_L13_Molecular_Techniques_11",exam:"mid2",lecture:"L13 Molecular Techniques",q:"DNA fingerprinting (STR profiling) was performed on samples from a crime scene, a victim, and two suspects. Which suspect is most likely the criminal based on the image?",options:["Suspect 1","Suspect 2","Both suspects","Neither suspect matches"],answer:1,explanation:"DNA fingerprinting compares short tandem repeat (STR) band patterns. The criminal should have bands matching the crime scene sample. In the image, Suspect 2's band pattern matches the crime scene pattern, while Suspect 1's pattern does not. DNA fingerprinting is highly discriminatory because the probability of two unrelated individuals sharing the same STR profile is extremely low.",image:"images/tb_p87_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_12",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The RFLP Southern blot shown in the image was performed for sickle cell anemia diagnosis. The family includes Mother (M), Father (F), and three children (C1, C2, C3). Based on the band pattern, which child is affected with sickle cell anemia?",options:["C1","C2","C3","None of the children are affected"],answer:2,explanation:"In RFLP-based SCA diagnosis using Mst II restriction enzyme: the normal \u03B2A allele is cut (giving two smaller bands), while the sickle \u03B2S allele is NOT cut (giving one larger band). Homozygous normal: 2 bands. Carrier (heterozygous): 3 bands. Affected (homozygous HbSS): 1 band. C3 shows the pattern consistent with affected status (homozygous HbSS).",image:"images/tb_p88_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_13",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A paternity test was performed using DNA fingerprinting. The blot shows Mother, Child, Alleged Father, and two ladder controls. What is the conclusion?",options:["The alleged father is excluded as the biological father","The alleged father is confirmed as the biological father","The test is inconclusive","The child's pattern matches neither parent"],answer:1,explanation:"In paternity testing, a child inherits 50% of their DNA bands from the mother and 50% from the father. Any bands in the child NOT present in the mother must be present in the biological father. In this blot, the unique bands of the child (those not from the mother) match the alleged father's pattern, confirming paternity.",image:"images/tb_p88_fig2.png"},{id:"mid2_mid2_L13_Molecular_Techniques_14",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The Sanger sequencing chromatogram shown compares a proband, his father, and his mother against a reference sequence. The proband and father show a double peak at one position while the mother's trace is identical to the reference. What is the correct interpretation?",options:["De novo mutation in the proband; parents are unaffected","Autosomal recessive mutation; both parents are carriers","The mutation was inherited from the father; mother is unaffected","The mutation was inherited from the mother; father is unaffected"],answer:2,explanation:"In Sanger sequencing, a heterozygous mutation appears as two overlapping peaks (double peak) at the mutation site \u2014 one peak from the normal allele and one from the mutant allele. The proband and father both show this double peak, while the mother's trace matches the reference (normal). This indicates the proband inherited the mutation from his father. This pattern is consistent with autosomal dominant or X-linked inheritance from the paternal side.",image:"images/tb_p67_fig1.png"},{id:"mid2_mid2_L14_Approach_Patients_1",exam:"mid2",lecture:"L14 Approach Patients",q:"A family with two affected boys presented to the genetic clinic. The two brothers have muscle weakness and a positive gower\u2019s sign. Family history revealed a maternal uncle that is wheelchair dependent and has dilated myocardial myopathy. Which of the following lab results will be expected?",options:["High creatine kinase level.","Low creatine kinase level.","Normal creatine kinase level.","No change to creatine kinase level."],answer:0,explanation:"From L14 Approach Patients: X-Linked Disorders \u2022 Duchenne muscular dystrophy \u2022 Fragile X syndrome (covered in Non- Mendelian inheritance lecture) Duchenne Muscular Dystrophy Responsible gene: DMD (Dystrophin) Cytogenetic locus: Xp21 Inheritance: X-linked recessive Clinical features: \u2022 Progressive muscular weakness and was..."},{id:"mid2_mid2_L14_Approach_Patients_2",exam:"mid2",lecture:"L14 Approach Patients",q:"A family with two affected boys presented to the genetic clinic. The two brothers have muscle weakness and a positive gower\u2019s sign. Family history revealed a maternal uncle that is wheelchair dependent and has dilated myocardial myopathy. Which of the following type of gene is most likely to be responsible for this history?",options:["Dystrophin encoding gene","Neurofibromin encoding gene","Fibrillin-1 encoding gene","Calcium channels encoding gene"],answer:0,explanation:"From L14 Approach Patients: Marfan Syndrome Systemic Scoring \u2022 Features other than aortic root enlargement or ectopia lentis are grouped to derive a \u201Csystemic score\u201D that can contribute to diagnosis \u2022 A score of 7 and above considered positive 20 https://www.marfan.org/dx/score Achondroplasia Responsible gene: FGFR3 (..."},{id:"mid2_mid2_L14_Approach_Patients_3",exam:"mid2",lecture:"L14 Approach Patients",q:"A family with two affected boys presented to the genetic clinic. The two brothers have muscle weakness and a positive gower\u2019s sign. Family history revealed a maternal uncle that is wheelchair dependent and has dilated myocardial myopathy. Which of the following genetic abnormalities is most likely present in this family?",options:["Gene deletion","Gene duplication","chromosome deletion","chromosome Duplication"],answer:0,explanation:"From L14 Approach Patients: Marfan Syndrome Systemic Scoring \u2022 Features other than aortic root enlargement or ectopia lentis are grouped to derive a \u201Csystemic score\u201D that can contribute to diagnosis \u2022 A score of 7 and above considered positive 20 https://www.marfan.org/dx/score Achondroplasia Responsible gene: FGFR3 (..."},{id:"mid2_mid2_L14_Approach_Patients_4",exam:"mid2",lecture:"L14 Approach Patients",q:"What is the Potential Reasons for Pediatric Genetic Counseling?",options:["Adult with a family history of a genetic condition.","Adult with a strong family history of common adult onset disorders","Adult with a strong family history of cancer","Child with a family history of a genetic condition."],answer:3,explanation:"From L14 Approach Patients: Marfan Syndrome Systemic Scoring \u2022 Features other than aortic root enlargement or ectopia lentis are grouped to derive a \u201Csystemic score\u201D that can contribute to diagnosis \u2022 A score of 7 and above considered positive 20 https://www.marfan.org/dx/score Achondroplasia Responsible gene: FGFR3 (..."},{id:"mid2_mid2_L14_Approach_Patients_5",exam:"mid2",lecture:"L14 Approach Patients",q:"According to genetic counseling all the following is true except:",options:["Genetic counseling is directive.","Any physician can be a counselor.","It includes the discussion of the cause of the disease and the risk of transmission.","It should be done after genetic testing."],answer:1,explanation:"From L14 Approach Patients: Outline Multifactorial disorders Single gene disorders Chromosomal abnormalities Multifactorial Disorders \uEE76Multifactorial inheritance describes the action of multiple genes that interact with one another and with environmental factors to lead to a phenotype interaction of genetic and environmen..."},{id:"mid2_mid2_L9_Dysmorphology_1",exam:"mid2",lecture:"L9 Dysmorphology",q:"During dysmorphology assessment, a child is found to have a shortened anteroposterior dimension of the skull compared to its width. What is the correct term for this finding?",options:["Dolichocephaly","Plagiocephaly","Brachycephaly","Trigonocephaly"],answer:2,explanation:"From L9 Dysmorphology: objective OR Apparently shortened anteroposterior dimension (length) of the head compared to width. Dolichocephaly \u2022 Definition: Cephalic index less than 76% objective OR Apparently increased antero-posterior length of the head compared to width."},{id:"mid2_mid2_L9_Dysmorphology_2",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which term describes the presence of a small mandible?",options:["Macrognathia","Retrognathia","Micrognathia","Prognathia"],answer:2,explanation:"From L9 Dysmorphology: Micrognathia Definition: Apparently reduced length and width of the mandible when viewed from the front but not from the side Prognathism Definition: Anterior protrusion of the mandibular alveolar ridge beyond the vertical plane of the maxillary alveolar ridge, best appreciated in profile ..."},{id:"mid2_mid2_L9_Dysmorphology_3",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which term describes the presence of an extra digit?",options:["Syndactyly","Oligodactyly","Arachnodactyly","Polydactyly"],answer:3,explanation:'From L9 Dysmorphology: Hands \u2022 Arachnodactyly ("spider fingers") is a condition in which the fingers and toes are abnormally long and slender, in comparison to the palm of the hand and arch of the foot.) \u2022 Brachydactyly (short fingers & toes) Fingers \u2022 Polydactyly refers to extra fingers or toes (digits) that are p...'},{id:"mid2_mid2_L9_Dysmorphology_4",exam:"mid2",lecture:"L9 Dysmorphology",q:"A child has an increased distance between the eyes. Which term best describes this finding?",options:["Upslanting palpebral fissures","Hypotelorism","Hypertelorism","Anophthalmia"],answer:2,explanation:"From L9 Dysmorphology: Micrognathia Definition: Apparently reduced length and width of the mandible when viewed from the front but not from the side Prognathism Definition: Anterior protrusion of the mandibular alveolar ridge beyond the vertical plane of the maxillary alveolar ridge, best appreciated in profile ..."},{id:"mid2_mid2_L9_Dysmorphology_5",exam:"mid2",lecture:"L9 Dysmorphology",q:"What is the term used to describe the vertical groove between the base of the nose and the border of the upper lip:",options:["Philtrum","Hard palate","Soft palate","Pinna"],answer:0,explanation:"From L9 Dysmorphology: Mouth (Philtrum ) \u2022 the vertical groove between the base of the nose and the border of the upper lip. Hairline Hairline, High Anterior Definition: Distance between the hairline (trichion) and the glabella (the most prominent point on the frontal bone above the root of the nose), in the midline, more than two SD above the mean ."},{id:"mid2_mid2_L9_Dysmorphology_6",exam:"mid2",lecture:"L9 Dysmorphology",q:"A family with two affected boys presented to the genetic clinic. The two brothers have muscle weakness and a positive gower\u2019s sign. Family history revealed a maternal uncle that is wheelchair dependent and has dilated myocardial myopathy. What additional manifestation can be observed in this condition?",options:["spinal compression","Calf pseudohypertrophy","Macrocephaly","Microcephaly"],answer:1,explanation:"From L9 Dysmorphology: 7- family history of similar condition, or any genetic disorder. Gain basic in taking personal and family medical histories related to genetic conditions."},{id:"mid2_mid2_L9_Dysmorphology_7",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following is considered as a major defect?",options:["Microcephaly","Lacrimal duct stenosis","Epicanthic fold","Brushfield spots of the iris"],answer:0,explanation:"From L9 Dysmorphology: Syndactyly (Fused Digits) (Fingers or Toes) Down Syndrome/Trisomy 21 Clinical Features: Newborn period: Hypotonia, excess nuchal skin Craniofacial: \u2022 Brachycephaly, microcephaly \u2022 Epicanthic folds, upslanting palpebral fissures, depressed nasal bridge \u2022 Protruding tongue \u2022 Small/low-set ears ..."},{id:"mid2_mid2_L9_Dysmorphology_8",exam:"mid2",lecture:"L9 Dysmorphology",q:"A female presented in the NICU with heart and renal abnormalities. Examination shows microcephaly, microphthalmia, hypertelorism, and postaxial polydactyly. What is the provisional diagnosis?",options:["Patau syndrome (Trisomy 13)","Down syndrome (Trisomy 21)","Edwards syndrome (Trisomy 18)","Turner syndrome (45,X)"],answer:0,explanation:"From L9 Dysmorphology: Attribution 4.0 International (CC BY 4.0) Patau syndrome/Trisomy 13 Clinical features: \u2022 Holoprosencephaly, microcephaly, scalp defects \u2022 Microphthalmia , low birth weight \u2022 Polydactyly \u2022 Midline cleft lip and palate \u2022 Cardiac and renal anomalies \u2022 Intellectual disability Inheritance: \u2022 75% ..."},{id:"mid2_mid2_L9_Dysmorphology_9",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following is considered a major anomaly?",options:["Lip pits","Anencephaly","Epicanthic fold","Clinodactyly"],answer:1,explanation:"From L9 Dysmorphology: Syndactyly (Fused Digits) (Fingers or Toes) Down Syndrome/Trisomy 21 Clinical Features: Newborn period: Hypotonia, excess nuchal skin Craniofacial: \u2022 Brachycephaly, microcephaly \u2022 Epicanthic folds, upslanting palpebral fissures, depressed nasal bridge \u2022 Protruding tongue \u2022 Small/low-set ears ... \u2022Shows which family members are affected or unaffected by a genetic disease."},{id:"mid2_mid2_L9_Dysmorphology_10",exam:"mid2",lecture:"L9 Dysmorphology",q:"The karyotype and clinical features shown in the image are characteristic of which syndrome?",options:["Turner syndrome (45,X)","Klinefelter syndrome (47,XXY)","Down syndrome (47,XX,+21)","Marfan syndrome"],answer:1,explanation:"The image shows the 47,XXY karyotype (Klinefelter syndrome) alongside the classic clinical features: absence of frontal baldness, poor beard growth, gynecomastia (breast development), female-type pubic hair pattern, small testes, wide hips, and long arms and legs. Klinefelter is the most common cause of male hypogonadism and infertility.",image:"images/tb_p62_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_11",exam:"mid2",lecture:"L9 Dysmorphology",q:"A boy uses his hands on his thighs to push himself to a standing position, as shown in the image. What does this sign indicate?",options:["Spastic paraplegia","Hip dysplasia","Proximal muscle weakness (Gower's sign)","Cerebellar ataxia"],answer:2,explanation:`Gower's sign is a clinical maneuver where a child with proximal muscle weakness (particularly pelvic girdle muscles) must use their hands to "walk up" their thighs to stand from a supine or squatting position. It is classically associated with Duchenne Muscular Dystrophy (DMD) \u2014 an X-linked recessive disorder caused by dystrophin gene mutations.`,image:"images/tb_p62_fig2.png"},{id:"mid2_mid2_L9_Dysmorphology_12",exam:"mid2",lecture:"L9 Dysmorphology",q:"A patient presents with the skin findings shown in the image (caf\xE9-au-lait spots, cutaneous neurofibromas, and plexiform neurofibroma). What is the most likely diagnosis?",options:["Tuberous sclerosis","Neurofibromatosis type 1 (NF1)","McCune-Albright syndrome","Von Hippel-Lindau disease"],answer:1,explanation:"The image shows the classic triad of Neurofibromatosis type 1 (NF1): (A) caf\xE9-au-lait spots on the back, (B) cutaneous/dermal neurofibromas, and (C) plexiform neurofibroma. NF1 is caused by loss-of-function mutations in the NF1 gene (tumor suppressor). It follows autosomal dominant inheritance, with high penetrance but variable expressivity. Lisch nodules (iris hamartomas) are also characteristic.",image:"images/tb_p64_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_13",exam:"mid2",lecture:"L9 Dysmorphology",q:"The patient shown in the image is very tall with long, slender limbs, arachnodactyly, and arm span exceeding height. Which of the following is the most likely diagnosis?",options:["Klinefelter syndrome (47,XXY)","Marfan syndrome","Achondroplasia","Homocystinuria"],answer:1,explanation:"The image shows the classic body habitus of Marfan syndrome: tall stature, dolichostenomelia (long slender limbs), arachnodactyly (spider fingers), arm span > height, and pectus deformity. Marfan syndrome is caused by mutations in FBN1 (fibrillin-1) and follows autosomal dominant inheritance. Major complications include aortic root dilation/dissection and ectopia lentis.",image:"images/tb_p24_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_14",exam:"mid2",lecture:"L9 Dysmorphology",q:"A newborn presented in the NICU with midline cleft lip and palate, polydactyly, and microphthalmia. What is the most likely karyotype?",options:["47,XX,+18","47,XY,+13","45,X","47,XXY"],answer:1,explanation:"The image shows a newborn with the classic features of Patau syndrome (trisomy 13): midline cleft lip and palate, postaxial polydactyly, microphthalmia, and scalp defects. Trisomy 13 results from non-disjunction (75%) or Robertsonian translocation (25%). It carries a very poor prognosis with most affected infants not surviving past the first year of life.",image:"images/tb_p46_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_15",exam:"mid2",lecture:"L9 Dysmorphology",q:"The child shown in the image has a small jaw, widely spaced eyes, and low-set ears. Which of the following findings best matches this facial phenotype?",options:["Macrostomia and prognathia","Micrognathia and hypertelorism","Macrostomia and micrognathia","Hypertelorism and macrocephaly"],answer:1,explanation:"The image shows a child with micrognathia (small mandible) and hypertelorism (widely spaced eyes), which are dysmorphic facial features seen in several syndromes including Edwards syndrome (trisomy 18), Pierre Robin sequence, and various chromosomal deletions. Careful assessment of additional features and genetic testing are required to determine the specific diagnosis.",image:"images/tb_p54_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_16",exam:"mid2",lecture:"L9 Dysmorphology",q:"The image shows three views of a child (front, back, side) with distinctive body proportions. What is the most likely diagnosis?",options:["Marfan syndrome","Turner syndrome","Down syndrome","Achondroplasia"],answer:0,explanation:"The three views show a child with classic Marfan syndrome features: tall stature with disproportionately long limbs, scoliosis visible on the back and side views, pectus deformity, and characteristic body habitus with arm span exceeding height. Marfan syndrome is caused by mutations in FBN1 (fibrillin-1) and follows autosomal dominant inheritance. Major complications include aortic root dilation, ectopia lentis, and scoliosis.",image:"images/p62_marfan_q1.png"},{id:"mid2_mid2_L9_Dysmorphology_17",exam:"mid2",lecture:"L9 Dysmorphology",q:"The child in the image shows a triangular face, prominent forehead, and small jaw. These features are consistent with intrauterine growth restriction and postnatal short stature. What is the most likely diagnosis?",options:["Down syndrome","Angelman syndrome","Silver-Russell syndrome","Williams syndrome"],answer:2,explanation:"Silver-Russell syndrome (SRS) is characterized by: severe intrauterine growth restriction (IUGR), postnatal short stature, relative macrocephaly at birth, triangular face with prominent forehead and small jaw (micrognathia), and body asymmetry. It is caused by loss of methylation at the H19/IGF2 imprinting control region on chromosome 11p15.5 (most common, ~50%) or maternal uniparental disomy of chromosome 7 (UPD(7)mat, ~10%).",image:"images/p63_silver_russell_q6.png"},{id:"mid2_mid2_L9_Dysmorphology_18",exam:"mid2",lecture:"L9 Dysmorphology",q:"A young child presents with very short stature, rhizomelic (proximal) shortening of the limbs, prominent forehead, depressed nasal bridge, and trident hands. What is the most likely diagnosis?",options:["Marfan syndrome","Osteogenesis imperfecta","Turner syndrome","Achondroplasia"],answer:3,explanation:"The image shows the classic features of achondroplasia: the most common form of short-limbed dwarfism. Features include: rhizomelic (proximal > distal) limb shortening, prominent forehead (frontal bossing), midface hypoplasia with depressed nasal bridge, trident configuration of hands, and normal intelligence. Achondroplasia is caused by gain-of-function mutations in FGFR3 (p.Gly380Arg in >99%), follows autosomal dominant inheritance, and most cases (~80%) are de novo mutations.",image:"images/p64_achondroplasia_q8.png"},{id:"mid2_mid2_L9_Dysmorphology_19",exam:"mid2",lecture:"L9 Dysmorphology",q:"The image shows a boy demonstrating Gower's sign while getting up from the floor. What is the mode of inheritance of the condition responsible for this finding?",options:["Autosomal dominant","Autosomal recessive","X-linked recessive","Mitochondrial"],answer:2,explanation:"Gower's sign is characteristic of Duchenne Muscular Dystrophy (DMD), which follows X-linked recessive inheritance. The DMD gene (encoding dystrophin) is located on Xp21.2. Males with one mutated X are affected; females with one mutated X are usually asymptomatic carriers (though some carrier females develop mild symptoms \u2014 lyonization). DMD affects ~1 in 3,500 males. ~30% of cases are de novo mutations.",image:"images/tb_p62_fig2.png"}],zr="gbq_seen";var Nh=()=>new Set(JSON.parse(localStorage.getItem(zr)||"[]")),qh=e=>{let a=Nh();e.forEach(i=>a.add(i)),localStorage.setItem(zr,JSON.stringify([...a]))},Ry=()=>localStorage.removeItem(zr);function Gy(){let e=(0,K.useRef)(null);return(0,K.useEffect)(()=>{let a=e.current,i=a.getConte

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بنك أسئلة الطب — Medical TestBank</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    header p {
      color: #94a3b8;
      font-size: 1rem;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #22d3ee);
      margin: 1.2rem auto 0;
      border-radius: 2px;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
      width: 100%;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }

    /* Genetics */
    .card.genetics { border-color: #312e81; }
    .card.genetics::before { background: linear-gradient(90deg, #6366f1, #818cf8); }
    .card.genetics:hover { border-color: #6366f1; }
    .card.genetics .icon { background: rgba(99,102,241,0.15); color: #818cf8; }

    /* Pharma */
    .card.pharma { border-color: #14532d; }
    .card.pharma::before { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .card.pharma:hover { border-color: #16a34a; }
    .card.pharma .icon { background: rgba(22,163,74,0.15); color: #4ade80; }

    /* Embryology */
    .card.embryology { border-color: #7c2d12; }
    .card.embryology::before { background: linear-gradient(90deg, #ea580c, #fb923c); }
    .card.embryology:hover { border-color: #ea580c; }
    .card.embryology .icon { background: rgba(234,88,12,0.15); color: #fb923c; }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    .card-subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .card-badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      background: rgba(255,255,255,0.07);
      color: #94a3b8;
      margin-top: auto;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #475569;
      font-size: 0.8rem;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.6rem; }
      .grid { grid-template-columns: 1fr; max-width: 340px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>بنك أسئلة الطب</h1>
    <p>Medical Sciences TestBank</p>
    <div class="divider"></div>
  </header>

  <main>
    <div class="grid">

      <a href="genetics/index.html" class="card genetics">
        <div class="icon">🧬</div>
        <div class="card-title">الجيناتكس</div>
        <div class="card-subtitle">Medical Genetics<br/>بنك أسئلة الوراثة الطبية</div>
        <span class="card-badge">23 محاضرة</span>
      </a>

      <a href="pharma/index.html" class="card pharma">
        <div class="icon">💊</div>
        <div class="card-title">الفارماكولوجي</div>
        <div class="card-subtitle">Pharmacology PH45<br/>بنك أسئلة الأدوية</div>
        <span class="card-badge">اضغط للدخول</span>
      </a>

      <a href="embryology/index.html" class="card embryology">
        <div class="icon">🔬</div>
        <div class="card-title">الإمبريولوجي</div>
        <div class="card-subtitle">Embryology<br/>بنك أسئلة الأجنة</div>
        <span class="card-badge">اضغط للدخول</span>
      </a>

    </div>
  </main>

  <footer>
    Medical TestBank — بنك أسئلة الطب
  </footer>

</body>
</html>

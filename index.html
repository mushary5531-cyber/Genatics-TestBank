0623\u0648 \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 \u0627\u0644\u0645\u0634\u062A\u0642 (derivative) \u063A\u064A\u0631 \u0627\u0644\u0645\u062A\u0648\u0627\u0632\u0646."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_29",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A child presents with Microcephaly, hypotonia, and cat-like cry. What would chromosomal analysis show?",options:["5p deletion","Deletion","Monosomy X","Klinefelter syndrome"],answer:0,explanation:"Cri-du-chat syndrome (\u0635\u0631\u062E\u0629 \u0627\u0644\u0642\u0637\u0629) = \u062D\u0630\u0641 \u0627\u0644\u0630\u0631\u0627\u0639 \u0627\u0644\u0642\u0635\u064A\u0631 \u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 5 \u2192 del(5)(p15). \u0627\u0644\u0645\u0645\u064A\u0632\u0627\u062A: microcephaly\u060C \u0635\u0631\u062E\u0629 \u0634\u0628\u064A\u0647\u0629 \u0628\u0635\u0648\u062A \u0627\u0644\u0642\u0637\u0629\u060C \u062A\u0623\u062E\u0631 \u0646\u0645\u0648."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_30",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"The karyogram below shows (Cri-du-chat, answer about 5p deletion):",options:["46,XY,del(15)","Deletion","It involves single break of 5p in the terminal part and leads to chromosomal loss","X-linked"],answer:2,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_31",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What is the condition? (5p deletion features shown)",options:["45,XX,rob(14;21)","46,X,i(Xq) \u2014 Isochromosome of Xq \u2192 Turner syndrome","Cri-du-chat syndrome","Paternal chromosome 15 deletion"],answer:2,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_32",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A female presented in NICU with heart and renal abnormalities. Microcephaly, microphthalmia, hypertelorism, postaxial polydactyly. Provisional diagnosis?",options:["Patau syndrome","The father is a carrier for pre-mutation (80 repeats of CGG), the son has a mutation of more than 200 repeats","X-linked","Karyotyping"],answer:0,explanation:"Patau syndrome: microcephaly\u060C polydactyly\u060C cleft lip/palate\u060C heart defects\u060C microphthalmia\u060C holoprosencephaly. Trisomy 13."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_33",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A newborn is in NICU with heart and renal abnormalities, microcephaly, microphthalmia, hypertelorism, postaxial polydactyly. What is the provisional diagnosis?",options:["Patau syndrome","46,X,i(Xq) \u2014 Isochromosome of Xq \u2192 Turner syndrome","Exchange of genetic material between non-homologous chromosomes","Uniparental heterodisomy"],answer:0,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_34",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Polydactyly is a unique feature of which of the following disorders?",options:["Patau syndrome","46,XY,del(10)","Paracentric inversion","X-linked"],answer:0,explanation:"Postaxial polydactyly \u0645\u0646 \u0627\u0644\u0633\u0645\u0627\u062A \u0627\u0644\u0645\u0645\u064A\u0632\u0629 \u0644\u0640 Patau syndrome (trisomy 13). \u0644\u0627 \u062A\u0648\u062C\u062F \u0641\u064A Cri du chat \u0623\u0648 Down syndrome."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_35",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Fragile X Syndrome is caused by:",options:["Cri-du-chat syndrome","46,XX,rob(14;21)+21","Expansion of CGG repeats > 200","Paracentric inversion"],answer:2,explanation:"\u0645\u0646 L7: FMR1 gene\u060C CGG repeats: Normal 5-44\u060C Pre-mutation 55-200\u060C Full mutation > 200. \u064A\u064F\u0633\u0628\u0628 X-linked intellectual disability."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_36",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A male came with intellectual disability, long face, protruded ears. Genetic testing showed mutation in FMR1. What is the mode of inheritance?",options:["X-linked","46,XY,del(10)","Deletion","Turner syndrome"],answer:0,explanation:"Fragile X syndrome = X-linked trinucleotide repeat disorder \u0641\u064A \u062C\u064A\u0646 FMR1 \u0639\u0644\u0649 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 X."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_37",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A male with FMR1 mutation \u2014 to see if inherited or new mutation, what should we ask?",options:["Genetic testing for the mother","Aneuploidy","X-linked","Karyotyping"],answer:0,explanation:"\u0627\u0644\u0623\u0645 \u0647\u064A \u0627\u0644\u0645\u0635\u062F\u0631 \u0627\u0644\u0645\u062D\u062A\u0645\u0644 \u0644\u0644\u0637\u0641\u0631\u0629 \u0641\u064A \u0627\u0644\u0623\u0645\u0631\u0627\u0636 X-linked. \u0627\u0644\u0623\u0628 \u064A\u0639\u0637\u064A \u0627\u0644\u0627\u0628\u0646 Y \u0648\u0644\u064A\u0633 X."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_38",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A 30-year-old female has ovarian insufficiency. Son has ear problems. Father (65 years) has tremor. What describes their conditions?",options:["The father is a carrier for pre-mutation (80 repeats of CGG), the son has a mutation of more than 200 repeats","10-15%","Deletion","46,XX,rob(14;21)+21"],answer:0,explanation:"\u0647\u0630\u0627 \u064A\u0635\u0641 FMR1 Fragile X spectrum: \u0627\u0644\u062C\u062F \u064A\u0639\u0627\u0646\u064A \u0645\u0646 Fragile X\u2013associated tremor/ataxia syndrome (FXTAS) \u0628\u0633\u0628\u0628 pre-mutation\u060C \u0648\u0627\u0644\u0623\u0645 \u062A\u0639\u0627\u0646\u064A \u0645\u0646 Fragile X\u2013associated primary ovarian insufficiency (FXPOI)\u060C \u0648\u0627\u0644\u0627\u0628\u0646 \u0644\u062F\u064A\u0647 full mutation (> 200 repeats)."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_39",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"The pedigree is consistent with one of the following disorders: G6PD deficiency (pedigree showing X-linked pattern)",options:["46,XX,rob(14;21)+21","Karyotyping","G6PD deficiency","46,X,i(Xq) \u2014 Isochromosome of Xq \u2192 Turner syndrome"],answer:2,explanation:"G6PD deficiency = X-linked recessive. \u064A\u0635\u064A\u0628 \u0627\u0644\u0630\u0643\u0648\u0631 \u0628\u0634\u0643\u0644 \u0631\u0626\u064A\u0633\u064A\u060C \u0627\u0644\u0625\u0646\u0627\u062B \u063A\u0627\u0644\u0628\u0627\u064B \u0646\u0627\u0642\u0644\u0627\u062A."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_40",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"In the following diagram, what chromosomal abnormality is shown? (showing deletion)",options:["46,X,i(Xq) \u2014 Isochromosome of Xq \u2192 Turner syndrome","Paracentric inversion","Genetic testing for the mother","Deletion"],answer:3,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_41",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What is demonstrated in the image below? (showing deletion in chromosome)",options:["Deletion","Monosomy X","46,XX,rob(14;21)+21","Paternal chromosome 15 deletion"],answer:0,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_42",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Which of the following terms describes the inheritance of two different homologous chromosomes from the same parent?",options:["Male with reciprocal translocation between chromosome 7 and chromosome 11","Mosaicism","Fertilization of an egg by two sperm","Uniparental heterodisomy"],answer:3,explanation:"Isodisomy = \u0646\u0633\u062E\u062A\u0627\u0646 \u0645\u062A\u0637\u0627\u0628\u0642\u062A\u0627\u0646 \u0645\u0646 \u0646\u0641\u0633 \u0627\u0644\u0648\u0627\u0644\u062F. Heterodisomy = \u0646\u0633\u062E\u062A\u0627\u0646 \u0645\u062E\u062A\u0644\u0641\u062A\u0627\u0646 \u0645\u0646 \u0646\u0641\u0633 \u0627\u0644\u0648\u0627\u0644\u062F (\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u064E\u0627\u0646 \u0645\u062A\u0645\u0627\u062B\u0644\u064E\u0627\u0646 \u0645\u062E\u062A\u0644\u0641\u064E\u0627\u0646)."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_43",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Which of the following genetic mechanisms is known to cause Prader\u2013Willi syndrome?",options:["5p deletion","Paternal chromosome 15 deletion","G6PD deficiency","Reciprocal translocation between chromosome number 4 and 6"],answer:1,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_44",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What is the indication when a normal parent has a child with malformations and an unbalanced chromosomal abnormality?",options:["By specific chromosome stain","45,X","Look for balanced translocation","X-linked"],answer:2,explanation:"\u0627\u0644\u0648\u0627\u0644\u062F \u0627\u0644\u0637\u0628\u064A\u0639\u064A \u0642\u062F \u064A\u0643\u0648\u0646 \u062D\u0627\u0645\u0644\u0627\u064B \u0644\u0640 balanced translocation \u0644\u0627 \u062A\u064F\u0633\u0628\u0628 \u0644\u0647 \u0623\u0639\u0631\u0627\u0636\u0627\u064B\u060C \u0644\u0643\u0646 \u0642\u062F \u062A\u064F\u0639\u0637\u064A \u0623\u0628\u0646\u0627\u0621\u064B \u0628\u0640 unbalanced rearrangement."},{id:"mid1_mid1_example_1",exam:"mid1",lecture:"example",q:"Which of the following best describes the central dogma of molecular biology?",options:["DNA \u2192 Protein \u2192 RNA","RNA \u2192 DNA \u2192 Protein","DNA \u2192 RNA \u2192 Protein","Protein \u2192 RNA \u2192 DNA"],answer:2,explanation:"The central dogma states that genetic information flows from DNA to RNA (transcription) and then from RNA to Protein (translation)."},{id:"mid1_mid1_example_2",exam:"mid1",lecture:"example",q:"A codon consists of how many nucleotide bases?",options:["1","2","3","4"],answer:2,explanation:"A codon is a triplet of nucleotide bases that codes for a specific amino acid or stop signal."},{id:"mid2_mid2_L10_Birth_Defects_1",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn is diagnosed with an isolated congenital heart defect. Which type of birth defect does this represent?",options:["Deformation","Ectodermal dysplasia","Malformation","Abnormal imprinting at chromosome 11p15.5"],answer:2,explanation:"\u0645\u0646 L10: - **Malformation** = \u062A\u0634\u0648\u0647 \u0628\u0646\u064A\u0648\u064A \u0646\u0627\u062A\u062C \u0639\u0646 \u062E\u0644\u0644 \u062C\u0648\u0647\u0631\u064A \u0641\u064A \u062A\u0637\u0648\u0631 \u0627\u0644\u0639\u0636\u0648 \u0646\u0641\u0633\u0647 (primary & intrinsic). \u0645\u062B\u0627\u0644: congenital heart defect\u060C neural tube defect. - **Disruption** = \u062A\u0634\u0648\u0647 \u0646\u0627\u062A\u062C \u0639\u0646 \u062A\u062F\u0645\u064A\u0631 \u0628\u0646\u064A\u0629 \u0643\u0627\u0646\u062A \u0637\u0628\u064A\u0639\u064A\u0629 (secondary & extrinsic). \u0645\u062B\u0627\u0644: amniotic band syndrome. - **Deformation** = \u062A\u0634\u0648\u0647 \u0646\u0627\u062A\u062C \u0639\u0646 \u0642\u0648\u0629 \u0645\u064A\u0643\u0627\u0646\u064A\u0643\u064A\u0629 \u063A\u064A\u0631 \u0637\u0628\u064A\u0639\u064A\u0629. \u0645\u062B\u0627\u0644: talipes equinovarus. - **Dysplasia** = \u062A\u0634\u0648\u0647 \u0646\u0627\u062A\u062C \u0639\u0646 \u062A\u0646\u0638\u064A\u0645 \u063A\u064A\u0631 \u0637\u0628\u064A\u0639\u064A \u0644\u0644\u062E\u0644\u0627\u064A\u0627 \u0641\u064A \u0627\u0644\u0623\u0646\u0633\u062C\u0629. \u0645\u062B\u0627\u0644: ectodermal dysplasia."},{id:"mid2_mid2_L10_Birth_Defects_2",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following birth defects is considered a disruption?",options:["Cytogenetic test","Abnormal imprinting at chromosome 11p15.5","Malformation","Amniotic band syndrome"],answer:3,explanation:"Amniotic band syndrome = \u0627\u0644\u0623\u0631\u0628\u0637\u0629 \u0627\u0644\u0623\u0645\u0646\u064A\u0648\u0633\u064A\u0629 \u062A\u064F\u062F\u0645\u0631 \u0628\u0646\u0649 \u0643\u0627\u0646\u062A \u0637\u0628\u064A\u0639\u064A\u0629 (secondary & extrinsic process)."},{id:"mid2_mid2_L10_Birth_Defects_3",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following is caused by abnormal organization of tissue?",options:["Ectodermal dysplasia","Amniotic band syndrome","Cytogenetic test","1-3% (for fathers) or 10-15%"],answer:0,explanation:"Dysplasia = \u062A\u0646\u0638\u064A\u0645 \u063A\u064A\u0631 \u0637\u0628\u064A\u0639\u064A \u0644\u0644\u062E\u0644\u0627\u064A\u0627 \u0641\u064A \u0627\u0644\u0646\u0633\u064A\u062C. Ectodermal dysplasia \u0645\u062B\u0627\u0644 \u0639\u0644\u0649 \u0630\u0644\u0643."},{id:"mid2_mid2_L10_Birth_Defects_4",exam:"mid2",lecture:"L10 Birth Defects",q:"What is the best description of disruption?",options:["VACTERL association","Secondary and extrinsic","Abnormal imprinting at chromosome 11p15.5","Down syndrome"],answer:1,explanation:"Disruption = \u0639\u0645\u0644\u064A\u0629 \u062B\u0627\u0646\u0648\u064A\u0629 \u0648\u062E\u0627\u0631\u062C\u064A\u0629 (secondary & extrinsic) \u062A\u064F\u062F\u0645\u0631 \u0628\u0646\u064A\u0629 \u0643\u0627\u0646\u062A \u0637\u0628\u064A\u0639\u064A\u0629."},{id:"mid2_mid2_L10_Birth_Defects_5",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following terms describes the abnormal mechanical force which distorts an otherwise normal structure?",options:["Secondary and extrinsic","Folic acid","Deformation","VACTERL association"],answer:2,explanation:"Deformation = \u0642\u0648\u0629 \u0645\u064A\u0643\u0627\u0646\u064A\u0643\u064A\u0629 \u063A\u064A\u0631 \u0637\u0628\u064A\u0639\u064A\u0629 \u062A\u064F\u0634\u0648\u0651\u0647 \u0628\u0646\u064A\u0629 \u0637\u0628\u064A\u0639\u064A\u0629. \u0645\u062B\u0627\u0644: \u0636\u063A\u0637 \u0627\u0644\u0631\u062D\u0645 \u0639\u0644\u0649 \u0627\u0644\u0642\u062F\u0645 \u2192 talipes."},{id:"mid2_mid2_L10_Birth_Defects_6",exam:"mid2",lecture:"L10 Birth Defects",q:"Primary and intrinsic\u2026",options:["Malformation","VACTERL association","Ectodermal dysplasia","CFTR"],answer:0,explanation:"Malformation = \u0623\u0648\u0644\u064A\u0629 \u0648\u062C\u0648\u0647\u0631\u064A\u0629 (primary & intrinsic) = \u062E\u0644\u0644 \u0641\u064A \u0628\u0631\u0646\u0627\u0645\u062C \u0627\u0644\u062A\u0637\u0648\u0631 \u0646\u0641\u0633\u0647."},{id:"mid2_mid2_L10_Birth_Defects_7",exam:"mid2",lecture:"L10 Birth Defects",q:"Certain malformations tend to occur together more frequently than expected by chance. Which best represents this concept?",options:["Abnormal imprinting at chromosome 11p15.5","VACTERL association","4%","Secondary and extrinsic"],answer:1,explanation:"Association = \u062A\u0634\u0648\u0647\u0627\u062A \u062A\u0638\u0647\u0631 \u0645\u0639\u0627\u064B \u0628\u062A\u0643\u0631\u0627\u0631 \u0623\u0643\u062B\u0631 \u0645\u0646 \u0627\u0644\u0645\u062A\u0648\u0642\u0639 \u0628\u0627\u0644\u0635\u062F\u0641\u0629 \u062F\u0648\u0646 \u0633\u0628\u0628 \u062C\u064A\u0646\u064A \u0648\u0627\u062D\u062F \u0645\u062D\u062F\u062F. VACTERL (Vertebral, Anal, Cardiac, Tracheo-Esophageal, Renal, Limb defects)."},{id:"mid2_mid2_L10_Birth_Defects_8",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn presents with vertebral anomalies, anal atresia, tracheoesophageal fistula, and renal abnormalities. Most likely diagnosis?",options:["Down syndrome","1-3% (for fathers) or 10-15%","VATER association","Maternal nondisjunction causing trisomy"],answer:2,explanation:"VATER/VACTERL = Vertebral + Anal atresia + Cardiac + Tracheoesophageal fistula + Esophageal atresia + Renal + Limb defects."},{id:"mid2_mid2_L10_Birth_Defects_9",exam:"mid2",lecture:"L10 Birth Defects",q:"A male newborn with vertebral anomalies, anal atresia, tracheoesophageal fistula, and radial ray defects. Normal WES and microarray. Most likely diagnosis?",options:["CFTR","VATER association","Cytogenetic test","Maternal nondisjunction causing trisomy"],answer:1,explanation:"VATER/VACTERL \u0647\u0648 \u062A\u0634\u062E\u064A\u0635 \u0625\u0643\u0644\u064A\u0646\u064A\u060C \u0644\u064A\u0633 \u0644\u062F\u064A\u0647 \u0633\u0628\u0628 \u062C\u064A\u0646\u064A \u062C\u0632\u064A\u0626\u064A \u0645\u062D\u062F\u062F \u0641\u064A \u0645\u0639\u0638\u0645 \u0627\u0644\u062D\u0627\u0644\u0627\u062A\u060C \u0644\u0630\u0644\u0643 \u0627\u0644\u0640 WES \u0648\u0627\u0644\u0640 microarray \u0637\u0628\u064A\u0639\u064A\u0627\u0646."},{id:"mid2_mid2_L10_Birth_Defects_10",exam:"mid2",lecture:"L10 Birth Defects",q:"Elevated amniotic AFP has been detected prenatally. To reduce the risk of developing the consequence shown (neural tube defect), what could be given?",options:["Abnormal imprinting at chromosome 11p15.5","Folic acid","4%","Ectodermal dysplasia"],answer:1,explanation:"\u0645\u0646 L10: \u062D\u0645\u0636 \u0627\u0644\u0641\u0648\u0644\u064A\u0643 \u064A\u064F\u0642\u0644\u0644 \u062E\u0637\u0631 \u0627\u0644\u0646\u064A\u0648\u0631\u0627\u0644 \u062A\u0648\u0628 \u062F\u064A\u0641\u064A\u0643\u062A \u0628\u0634\u0643\u0644 \u0643\u0628\u064A\u0631 (Periconceptional folic acid supplementation). AFP \u0645\u0631\u062A\u0641\u0639 \u0641\u064A \u0627\u0644\u062D\u0648\u0644 \u0627\u0644\u0623\u0645\u0646\u064A\u0648\u0633\u064A \u064A\u062F\u0644 \u0639\u0644\u0649 NTD \u0645\u0641\u062A\u0648\u062D."},{id:"mid2_mid2_L10_Birth_Defects_11",exam:"mid2",lecture:"L10 Birth Defects",q:"What's correct regarding neural tube defect?",options:["1-3% (for fathers) or 10-15%","Its risk can be reduced by the intake of Periconceptional folic acid","CFTR","Down syndrome"],answer:1,explanation:"\u0645\u0646 L10: Folic acid \u064A\u064F\u0642\u0644\u0644 \u062E\u0637\u0631 NTD. \u0645\u0644\u0627\u062D\u0638\u0629: Anencephaly \u064A\u0646\u062A\u062C \u0645\u0646 \u062E\u0644\u0644 \u0641\u064A \u0627\u0644\u062C\u0632\u0621 \u0627\u0644\u0639\u0644\u0648\u064A (\u0644\u064A\u0633 \u0627\u0644\u0633\u0641\u0644\u064A) \u0645\u0646 \u0627\u0644\u0623\u0646\u0628\u0648\u0628 \u0627\u0644\u0639\u0635\u0628\u064A."},{id:"mid2_mid2_L10_Birth_Defects_12",exam:"mid2",lecture:"L10 Birth Defects",q:"A couple came to the genetics clinic with a child having bilateral lip/palate. What is the chance of a second child with the same condition?",options:["VATER association","Maternal nondisjunction causing trisomy","Secondary and extrinsic","4%"],answer:3,explanation:"Cleft lip/palate \u0647\u0648 multifactorial. \u0627\u0644\u062E\u0637\u0631 \u0627\u0644\u0639\u0627\u0645 \u0641\u064A \u0627\u0644\u0633\u0643\u0627\u0646 \u2248 1/1000. \u0625\u0630\u0627 \u0643\u0627\u0646 \u0623\u062D\u062F \u0627\u0644\u0623\u0628\u0646\u0627\u0621 \u0645\u0635\u0627\u0628\u0627\u064B\u060C \u0641\u0627\u0644\u062E\u0637\u0631 \u0644\u0644\u0623\u0628\u0646\u0627\u0621 \u0627\u0644\u0642\u0627\u062F\u0645\u064A\u0646 \u2248 4-5%. \u0625\u0630\u0627 \u0643\u0627\u0646 \u0627\u062B\u0646\u0627\u0646 \u0645\u0635\u0627\u0628\u064E\u064A\u0646 \u2192 \u064A\u0631\u062A\u0641\u0639 \u0644\u0640 10%."},{id:"mid2_mid2_L10_Birth_Defects_13",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following has the highest recurrence risk?",options:["Folic acid","Amniotic band syndrome","1-3% (for fathers) or 10-15%","Two siblings"],answer:3,explanation:"\u0643\u0644\u0645\u0627 \u0632\u0627\u062F \u0639\u062F\u062F \u0627\u0644\u0623\u0641\u0631\u0627\u062F \u0627\u0644\u0645\u0635\u0627\u0628\u064A\u0646 \u0641\u064A \u0627\u0644\u0639\u0627\u0626\u0644\u0629\u060C \u0627\u0631\u062A\u0641\u0639 \u062E\u0637\u0631 \u0627\u0644\u062A\u0643\u0631\u0627\u0631 (Empiric recurrence risk \u0641\u064A \u0627\u0644\u0623\u0645\u0631\u0627\u0636 \u0645\u062A\u0639\u062F\u062F\u0629 \u0627\u0644\u0639\u0648\u0627\u0645\u0644)."},{id:"mid2_mid2_L10_Birth_Defects_14",exam:"mid2",lecture:"L10 Birth Defects",q:"A 3-year-old boy with protruded tongue, simian creases, microcephaly. Susceptible syndrome?",options:["Down syndrome","VACTERL association","Maternal nondisjunction causing trisomy","Cytogenetic test"],answer:0,explanation:"\u0644\u0633\u0627\u0646 \u0628\u0627\u0631\u0632 + simian crease + microcephaly = Down syndrome (Trisomy 21)."},{id:"mid2_mid2_L10_Birth_Defects_15",exam:"mid2",lecture:"L10 Birth Defects",q:"What is the best test for diagnosing Down syndrome?",options:["Cytogenetic test","4%","Down syndrome","CFTR"],answer:0,explanation:""},{id:"mid2_mid2_L10_Birth_Defects_16",exam:"mid2",lecture:"L10 Birth Defects",q:"Failure to thrive and malnutrition as a result of chronic diarrhea and malabsorption due to pancreatic insufficiency, are clinical features of:",options:["CFTR","VACTERL association","Down syndrome","Ectodermal dysplasia"],answer:0,explanation:"Cystic fibrosis \u064A\u064F\u0633\u0628\u0628 \u0642\u0635\u0648\u0631 \u0627\u0644\u0628\u0646\u0643\u0631\u064A\u0627\u0633 \u2192 \u0633\u0648\u0621 \u0627\u0644\u0627\u0645\u062A\u0635\u0627\u0635 \u2192 \u062A\u0623\u062E\u0631 \u0627\u0644\u0646\u0645\u0648. \u0628\u0633\u0628\u0628 \u0637\u0641\u0631\u0629 \u0641\u064A \u062C\u064A\u0646 CFTR (Chloride channel)."},{id:"mid2_mid2_L10_Birth_Defects_17",exam:"mid2",lecture:"L10 Birth Defects",q:"A neonate presents with macrosomia, macroglossia, umbilical hernia, and neonatal hypoglycemia. Which molecular mechanism?",options:["CFTR","Ectodermal dysplasia","Malformation","Abnormal imprinting at chromosome 11p15.5"],answer:3,explanation:"Beckwith-Wiedemann syndrome = \u062E\u0644\u0644 \u0641\u064A \u0627\u0644\u0640 imprinting \u0628\u0645\u0646\u0637\u0642\u0629 11p15.5."},{id:"mid2_mid2_L10_Birth_Defects_18",exam:"mid2",lecture:"L10 Birth Defects",q:"A 14-year-old boy with hypotonia and upslanting palpebral fissures is diagnosed with Down syndrome. What is the most likely underlying mechanism?",options:["Secondary and extrinsic","Deformation","Folic acid","Maternal nondisjunction causing trisomy"],answer:3,explanation:"95% \u0645\u0646 \u062D\u0627\u0644\u0627\u062A Down syndrome \u0646\u0627\u062A\u062C\u0629 \u0639\u0646 nondisjunction (\u0639\u0627\u062F\u0629\u064B \u0623\u0645\u0648\u0645\u064A\u0629) \u0623\u062B\u0646\u0627\u0621 Meiosis I."},{id:"mid2_mid2_L10_Birth_Defects_19",exam:"mid2",lecture:"L10 Birth Defects",q:"Risk of having this individual's Down syndrome child? (when parent has rob 14;21)",options:["Ectodermal dysplasia","Secondary and extrinsic","1-3% (for fathers) or 10-15%","Maternal nondisjunction causing trisomy"],answer:2,explanation:""},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_1",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"Which DNA repair mechanism involves the enzyme DNA glycosylase?",options:["Non-polyposis colorectal cancer","Sanger sequencing","Base excision repair","Gene panel"],answer:2,explanation:'\u0645\u0646 L11: "Base excision repair (BER) corrects those forms of oxidative, deamination, alkylation and abasic single base damage." DNA glycosylase \u0647\u0648 \u0627\u0644\u0625\u0646\u0632\u064A\u0645 \u0627\u0644\u0623\u0648\u0644 \u0641\u064A \u0645\u0633\u0627\u0631 BER \u064A\u064F\u0632\u064A\u0644 \u0627\u0644\u0642\u0627\u0639\u062F\u0629 \u0627\u0644\u062A\u0627\u0644\u0641\u0629.'},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_2",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"Which of the following is used in base excision repair mechanism?",options:["Germline Mutation","Males have an increased risk to develop a prostate cancer","Gene panel","DNA glycosylase"],answer:3,explanation:""},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_3",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"Which disorder is commonly associated with mismatch repair defects due to incorrect base pairing during DNA replication?",options:["Photoreactivation","Gene panel","Colorectal cancer","Pyrimidine dimers"],answer:2,explanation:'\u0645\u0646 L11: "Mismatch repair (MMR) is a post replicative repair pathway." \u062E\u0644\u0644 \u0641\u064A MMR \u064A\u064F\u0633\u0628\u0628 Lynch syndrome (hereditary non-polyposis colorectal cancer). HNPCC \u0645\u0631\u062A\u0628\u0637 \u0628\u0640 MLH1, MSH2, MSH6, PMS2 genes.'},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_4",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"Defect in Mismatch repair will lead:",options:["DNA glycosylase","Non-polyposis colorectal cancer","Germline Mutation","Colorectal cancer"],answer:1,explanation:""},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_5",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"A 47-year-old female with tumor in right colon. Father died from colon cancer, paternal aunt had endometrial cancer. Best technique to confirm?",options:["Gene panel","Germline Mutation","Non-homologous end joining","Colorectal cancer"],answer:0,explanation:"\u0647\u0630\u0627 \u0627\u0644\u0646\u0645\u0637 \u0627\u0644\u0639\u0627\u0626\u0644\u064A \u064A\u0648\u062D\u064A \u0628\u0640 Lynch syndrome (MMR defect). Gene panel \u0644\u062C\u064A\u0646\u0627\u062A MMR \u0647\u0648 \u0627\u0644\u0623\u0646\u0633\u0628."},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_6",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"UV light causes:",options:["Pyrimidine dimers","Germline Mutation","Photoreactivation","Sanger sequencing"],answer:0,explanation:"\u0645\u0646 L11: \u0627\u0644\u0623\u0634\u0639\u0629 \u0641\u0648\u0642 \u0627\u0644\u0628\u0646\u0641\u0633\u062C\u064A\u0629 (UV) \u062A\u064F\u0633\u0628\u0628 \u062A\u0643\u0648\u064A\u0646 Thymine dimers (pyrimidine dimers) \u0628\u064A\u0646 \u0642\u0648\u0627\u0639\u062F \u0645\u062A\u062C\u0627\u0648\u0631\u0629 \u0639\u0644\u0649 \u0646\u0641\u0633 \u0627\u0644\u0633\u0644\u0633\u0644\u0629\u060C \u0648\u062A\u064F\u0635\u0644\u062D \u0628\u0648\u0627\u0633\u0637\u0629 NER."},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_7",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"Responsible for correction of thymidine dimer:",options:["DNA glycosylase","NER","Non-homologous end joining","Colorectal cancer"],answer:1,explanation:'\u0645\u0646 L11: "Nucleotide excision repair (NER) is the pathway of choice to remove bulky lesions such as thymine dimers and lesions from UV radiation."'},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_8",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"Which of the following DNA repair mechanisms can cause mistakes?",options:["Decrease in RNA primer removal","Non-homologous end joining","Germline Mutation","DNA glycosylase"],answer:1,explanation:"\u0645\u0646 L11: NHEJ \u0647\u0648 \u0622\u0644\u064A\u0629 \u0625\u0635\u0644\u0627\u062D \u0643\u0633\u0648\u0631 \u0627\u0644\u062E\u064A\u0637 \u0627\u0644\u0645\u0632\u062F\u0648\u062C \u0648\u0647\u064A error-prone (\u062A\u064F\u0633\u0628\u0628 \u0623\u062E\u0637\u0627\u0621) \u0644\u0623\u0646\u0647\u0627 \u0644\u0627 \u062A\u0633\u062A\u062E\u062F\u0645 \u0642\u0627\u0644\u0628\u0627\u064B."},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_9",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"Which of the following is used in base excision repair (in context of one enzyme)?",options:["DNA glycosylase","Colorectal cancer","Base excision repair","Non-homologous end joining"],answer:0,explanation:""},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_10",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"What of the following DNA repair mechanisms is a Direct reversal mechanism?",options:["NER","DNA glycosylase","Non-homologous end joining","Photoreactivation"],answer:3,explanation:"\u0645\u0646 L11: Direct reversal mechanisms: - Photoreactivation (\u0641\u064A \u0627\u0644\u0628\u0643\u062A\u064A\u0631\u064A\u0627) \u062A\u064F\u0635\u0644\u062D pyrimidine dimers \u0645\u0628\u0627\u0634\u0631\u0629 - O6-methylguanine-DNA methyltransferase = \u0625\u0632\u0627\u0644\u0629 \u0645\u062C\u0645\u0648\u0639\u0629 \u0627\u0644\u0645\u062B\u064A\u0644 \u0645\u0628\u0627\u0634\u0631\u0629"},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_11",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"An alteration in DNA polymerase lacks exonuclease 5'-3' which results in:",options:["Non-polyposis colorectal cancer","Non-homologous end joining","Decrease in RNA primer removal","Base excision repair"],answer:2,explanation:"\u0627\u0644\u0640 5'\u21923' exonuclease activity \u0644\u0640 DNA polymerase \u0645\u0633\u0624\u0648\u0644\u0629 \u0639\u0646 \u0625\u0632\u0627\u0644\u0629 primers RNA \u0623\u062B\u0646\u0627\u0621 \u0627\u0644\u062A\u0636\u0627\u0639\u0641. \u0641\u0642\u062F\u0627\u0646\u0647\u0627 \u064A\u064F\u0642\u0644\u0644 \u0625\u0632\u0627\u0644\u0629 \u0627\u0644\u0640 primers."},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_12",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"Mutations in BRCA2 gene:",options:["Sanger sequencing","Gene panel","DNA glycosylase","Males have an increased risk to develop a prostate cancer"],answer:3,explanation:"BRCA2 mutation: \u064A\u0631\u0641\u0639 \u062E\u0637\u0631 \u0633\u0631\u0637\u0627\u0646 \u0627\u0644\u062B\u062F\u064A \u0641\u064A \u0627\u0644\u0625\u0646\u0627\u062B\u060C \u0648\u0623\u064A\u0636\u0627\u064B \u062E\u0637\u0631 \u0633\u0631\u0637\u0627\u0646 \u0627\u0644\u0628\u0631\u0648\u0633\u062A\u0627\u062A \u0641\u064A \u0627\u0644\u0630\u0643\u0648\u0631. \u0644\u064A\u0633 3-5% \u0645\u0646 \u0643\u0644 \u0633\u0631\u0637\u0627\u0646\u0627\u062A \u0627\u0644\u062B\u062F\u064A \u0628\u0644 \u0645\u0646 \u0627\u0644\u062D\u0627\u0644\u0627\u062A \u0627\u0644\u0639\u0627\u0626\u0644\u064A\u0629."},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_13",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"Sara is a 30-year-old female with a family history of breast cancer. Her mother had breast cancer caused by BRCA1. Appropriate test for Sara?",options:["Decrease in RNA primer removal","Gene panel","Sanger sequencing","Colorectal cancer"],answer:2,explanation:"\u0644\u0623\u0646 \u0627\u0644\u0637\u0641\u0631\u0629 \u0645\u0639\u0631\u0648\u0641\u0629 \u0641\u064A \u0627\u0644\u0623\u0645 (BRCA1 specific mutation)\u060C \u0627\u0644\u0623\u0646\u0633\u0628 \u0647\u0648 Sanger sequencing \u0644\u0641\u062D\u0635 \u0647\u0630\u0627 \u0627\u0644\u0645\u0648\u0636\u0639 \u0627\u0644\u0645\u062D\u062F\u062F \u0644\u062F\u0649 Sara."},{id:"mid2_mid2_L11_DNA_Repair_Mechanisms_14",exam:"mid2",lecture:"L11 DNA Repair Mechanisms",q:"Which type of mutation is controversial to genetic therapy?",options:["Pyrimidine dimers","Germline Mutation","Males have an increased risk to develop a prostate cancer","NER"],answer:1,explanation:"\u0627\u0644\u0639\u0644\u0627\u062C \u0627\u0644\u062C\u064A\u0646\u064A \u0644\u0644\u0637\u0641\u0631\u0627\u062A \u0627\u0644\u062C\u0646\u064A\u0646\u064A\u0629 (germline) \u0645\u062B\u064A\u0631 \u0644\u0644\u062C\u062F\u0644 \u0623\u062E\u0644\u0627\u0642\u064A\u0627\u064B \u0644\u0623\u0646\u0647 \u064A\u064F\u0624\u062B\u0631 \u0639\u0644\u0649 \u0643\u0644 \u0627\u0644\u0623\u062C\u064A\u0627\u0644 \u0627\u0644\u0642\u0627\u062F\u0645\u0629."},{id:"mid2_mid2_L12_Gene_Variants_Mutations_1",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Which of the following best describes a nonsense mutation?",options:["p.Arg117His","A substitution creating a premature stop codon","UGA, UAA, and UAG","FBN1"],answer:1,explanation:'\u0645\u0646 L12: "Nonsense (Stopgain) Variant: A substitution that leads to the generation of one of the stop codons (UAA, UAG, or UGA) \u2192 Will result in a premature termination of translation (truncated protein)."'},{id:"mid2_mid2_L12_Gene_Variants_Mutations_2",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Which of the following variants is an example of a missense mutation?",options:["When a child inherits an autosomal recessive disorder from both parents, who have different mutations on the same gene","Cleavage \u2192 Removal \u2192 Insertion \u2192 Sealing","p.Arg117His","Familial hypercholesterolemia"],answer:2,explanation:"\u0645\u0646 L12: Missense = \u0627\u0633\u062A\u0628\u062F\u0627\u0644 \u062D\u0645\u0636 \u0623\u0645\u064A\u0646\u064A \u0628\u0622\u062E\u0631. p.Arg117His = Arginine \u0627\u0633\u062A\u0628\u062F\u0644\u062A \u0628\u0640 Histidine \u0641\u064A \u0645\u0648\u0636\u0639 117. - p.Gly542* = Nonsense (\u0639\u0644\u0627\u0645\u0629 * \u062A\u0639\u0646\u064A stop codon) - c.489+1G>T = Splice site mutation - p.Phe508del = Frameshift/deletion (CF \u0627\u0644\u0637\u0641\u0631\u0629 \u0627\u0644\u0634\u0627\u0626\u0639\u0629)"},{id:"mid2_mid2_L12_Gene_Variants_Mutations_3",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Which of the following variants is an example of a nonsense mutation?",options:["FBN1","p.Gly542","Transition","Missense"],answer:1,explanation:"\u0627\u0644\u0639\u0644\u0627\u0645\u0629 * \u0641\u064A nomenclature \u0627\u0644\u062C\u064A\u0646\u064A\u0629 \u062A\u0639\u0646\u064A stop codon \u2192 nonsense mutation."},{id:"mid2_mid2_L12_Gene_Variants_Mutations_4",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Which of the following disorders is most commonly caused by loss of function of the protein product?",options:["Insertion of 3 amino acids","UGA, UAA, and UAG","When a child inherits an autosomal recessive disorder from both parents, who have different mutations on the same gene","Familial hypercholesterolemia"],answer:3,explanation:'\u0645\u0646 L12: "Loss-of-function variants \u2192 haploinsufficiency \u2192 familial hypercholesterolemia" (\u0646\u0642\u0635 \u0645\u0633\u062A\u0642\u0628\u0644 LDL). \u0623\u0645\u0627 Huntington \u0648Achondroplasia = gain-of-function\u060C Marfan = dominant-negative.'},{id:"mid2_mid2_L12_Gene_Variants_Mutations_5",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"When a mutant gene product interferes with the function of the normal protein in a heterozygous state, this is known as:",options:["Transition","Degree of relationship to the index case","Dominant-negative effect","A substitution creating a premature stop codon"],answer:2,explanation:'\u0645\u0646 L12: "Dominant-Negative Variants: When a mutant gene in the heterozygous state interferes with the function of the normal gene product \u2192 results in loss of protein activity or function. E.g., osteogenesis imperfecta and Marfan syndrome."'},{id:"mid2_mid2_L12_Gene_Variants_Mutations_6",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Which codons function as stop codons and terminate translation?",options:["p.Gly542","Missense","Dominant-negative effect","UGA, UAA, and UAG"],answer:3,explanation:"\u0645\u0646 L12: \u0643\u0648\u062F\u0648\u0646\u0627\u062A \u0627\u0644\u0625\u064A\u0642\u0627\u0641 (stop codons): UAA\u060C UAG\u060C UGA. \u0623\u0645\u0627 AUG = start codon (methionine)."},{id:"mid2_mid2_L12_Gene_Variants_Mutations_7",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Which sequence correctly describes the major DNA repair mechanism?",options:["Cleavage \u2192 Removal \u2192 Insertion \u2192 Sealing","UGA, UAA, and UAG","Familial hypercholesterolemia","HbH disease"],answer:0,explanation:"\u0645\u0646 L11: \u0622\u0644\u064A\u0629 \u0627\u0644\u0625\u0635\u0644\u0627\u062D \u0627\u0644\u0639\u0627\u0645\u0629: 1. Cleavage (\u0628\u0648\u0627\u0633\u0637\u0629 endonuclease) 2. Removal (\u0628\u0648\u0627\u0633\u0637\u0629 exonuclease) 3. Insertion (\u0628\u0648\u0627\u0633\u0637\u0629 DNA polymerase) 4. Sealing (\u0628\u0648\u0627\u0633\u0637\u0629 ligase)"},{id:"mid2_mid2_L12_Gene_Variants_Mutations_8",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"What is a compound heterozygous mutation?",options:["When a child inherits an autosomal recessive disorder from both parents, who have different mutations on the same gene","FBN1","Hydrops fetalis","Dominant-negative effect"],answer:0,explanation:'\u0645\u0646 L12: "Compound Heterozygous (CH) variant occurs when a person inherits two heterozygous alleles, one from each parent, and these alleles are located at different positions within the same gene."'},{id:"mid2_mid2_L12_Gene_Variants_Mutations_9",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Sickle cell anemia is an example of what type of mutation?",options:["Dominant-negative effect","Missense","Degree of relationship to the index case","Hydrops fetalis"],answer:1,explanation:"Sickle cell anemia \u0646\u0627\u062A\u062C \u0639\u0646 \u0627\u0633\u062A\u0628\u062F\u0627\u0644 Glutamic acid \u0628\u0640 Valine \u0641\u064A \u0645\u0648\u0636\u0639 6 \u0645\u0646 \u0633\u0644\u0633\u0644\u0629 beta-globin (GAG \u2192 GTG \u0639\u0644\u0649 \u0645\u0633\u062A\u0648\u0649 DNA) = missense mutation."},{id:"mid2_mid2_L12_Gene_Variants_Mutations_10",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"What could be the effect of a coding sequence of 114 nucleotides including start and stop codons that has an insertion of 9 nucleotides at position 82?",options:["Insertion of 3 amino acids","Dominant-negative effect","p.Gly542","Hydrops fetalis"],answer:0,explanation:"\u0625\u062F\u0631\u0627\u062C 9 \u0646\u064A\u0648\u0643\u0644\u064A\u0648\u062A\u064A\u062F\u0627\u062A = 9/3 = 3 \u0643\u0648\u062F\u0648\u0646\u0627\u062A = 3 \u0623\u062D\u0645\u0627\u0636 \u0623\u0645\u064A\u0646\u064A\u0629 \u0625\u0636\u0627\u0641\u064A\u0629. \u0644\u0623\u0646 9 \u0645\u0636\u0627\u0639\u0641 \u0644\u0644\u062B\u0644\u0627\u062B\u0629\u060C \u0644\u0627 \u064A\u062D\u062F\u062B frameshift \u2192 \u064A\u064F\u0636\u0627\u0641 3 \u0623\u062D\u0645\u0627\u0636 \u0623\u0645\u064A\u0646\u064A\u0629 \u0641\u0642\u0637."},{id:"mid2_mid2_L12_Gene_Variants_Mutations_11",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"A patient presented with long stature and arms, aortic root dilation, scoliosis, and pes planus (flat feet). What is the affected gene?",options:["Sickle cell anemia","FBN1","Transition","Cleavage \u2192 Removal \u2192 Insertion \u2192 Sealing"],answer:1,explanation:""},{id:"mid2_mid2_L12_Gene_Variants_Mutations_12",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Which factor most strongly influences recurrence risk in multifactorial disorders?",options:["Transition","UGA, UAA, and UAG","Degree of relationship to the index case","p.Gly542"],answer:2,explanation:"\u0641\u064A \u0627\u0644\u0623\u0645\u0631\u0627\u0636 \u0645\u062A\u0639\u062F\u062F\u0629 \u0627\u0644\u0639\u0648\u0627\u0645\u0644 (multifactorial)\u060C \u0643\u0644\u0645\u0627 \u0643\u0627\u0646\u062A \u0627\u0644\u0642\u0631\u0627\u0628\u0629 \u0623\u0642\u0631\u0628 \u0643\u0644\u0645\u0627 \u0627\u0631\u062A\u0641\u0639 \u0627\u0644\u062E\u0637\u0631. \u0627\u0644\u062E\u0637\u0631 \u064A\u062A\u0646\u0627\u0642\u0635 \u0628\u0634\u0643\u0644 \u0643\u0628\u064A\u0631 \u0645\u0646 \u062F\u0631\u062C\u0629 \u0623\u0648\u0644\u0649 \u2192 \u062B\u0627\u0646\u064A\u0629 \u2192 \u062B\u0627\u0644\u062B\u0629."},{id:"mid2_mid2_L12_Gene_Variants_Mutations_13",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Between adenine and guanine transformation?",options:["Transition","Insertion of 3 amino acids","FBN1","When a child inherits an autosomal recessive disorder from both parents, who have different mutations on the same gene"],answer:0,explanation:"Transition = \u0627\u0633\u062A\u0628\u062F\u0627\u0644 purine \u0628\u0640 purine \u0623\u0648 pyrimidine \u0628\u0640 pyrimidine (A\u2194G \u0623\u0648 C\u2194T). Transversion = \u0627\u0633\u062A\u0628\u062F\u0627\u0644 purine \u0628\u0640 pyrimidine \u0623\u0648 \u0627\u0644\u0639\u0643\u0633."},{id:"mid2_mid2_L12_Gene_Variants_Mutations_14",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"18. Which of the following is the result of three alpha globin alleles?",options:["HbH disease","Cleavage \u2192 Removal \u2192 Insertion \u2192 Sealing","Hydrops fetalis","p.Gly542"],answer:0,explanation:"- 4 alpha globin alleles \u0637\u0628\u064A\u0639\u064A\u0629: \u0637\u0628\u064A\u0639\u064A - 3 alleles: HbH disease (\u0645\u0631\u0636 \u0627\u0644\u0640 HbH) - 2 alleles: alpha-thal trait (\u0635\u0641\u0629) - 1 allele: Hydrops fetalis (\u0647\u064A\u062F\u0631\u0648\u0628\u0633 \u062C\u0646\u064A\u0646\u064A\u060C \u0645\u0645\u064A\u062A) - 0 alleles: \u0644\u0627 \u064A\u0646\u062C\u0648 (Hb Barts)"},{id:"mid2_mid2_L12_Gene_Variants_Mutations_15",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Mutations in 4 alpha globin alleles is associated with?",options:["Degree of relationship to the index case","Hydrops fetalis","p.Gly542","Missense"],answer:1,explanation:""},{id:"mid2_mid2_L12_Gene_Variants_Mutations_16",exam:"mid2",lecture:"L12 Gene Variants Mutations",q:"Which of the following disorders is due to a structural change in the globin chain?",options:["Sickle cell anemia","When a child inherits an autosomal recessive disorder from both parents, who have different mutations on the same gene","Familial hypercholesterolemia","Dominant-negative effect"],answer:0,explanation:"Sickle cell = \u062A\u063A\u064A\u064A\u0631 \u0647\u064A\u0643\u0644\u064A \u0641\u064A \u0628\u0631\u0648\u062A\u064A\u0646 beta-globin (missense). \u0623\u0645\u0627 HbH \u0648delta-beta thalassemia = \u0646\u0642\u0635 \u0641\u064A \u0625\u0646\u062A\u0627\u062C \u0627\u0644\u0640 globin chains \u0648\u0644\u064A\u0633 \u062A\u063A\u064A\u064A\u0631 \u0647\u064A\u0643\u0644\u064A."},{id:"mid2_mid2_L13_Molecular_Techniques_1",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What method can be used to detect DMD?",options:["MLPA","Sanger sequencing","Paternity exclusion","They contain a plasmid with genes for antibiotic resistance"],answer:0,explanation:'\u0645\u0646 L13: "Example of disease which can be diagnosed with MLPA: Duchenne Muscular Dystrophy (DMD)." MLPA \u064A\u0643\u062A\u0634\u0641 \u0627\u0644\u0640 deletions \u0648\u0627\u0644\u0640 duplications \u0639\u0644\u0649 \u0645\u0633\u062A\u0648\u0649 \u0627\u0644\u0640 exons.'},{id:"mid2_mid2_L13_Molecular_Techniques_2",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Which is NOT required for a PCR reaction?",options:["Paternity exclusion","Dideoxy-dNTPs","Autosomal recessive","Whole exome sequencing"],answer:1,explanation:"\u0645\u0646 L13: \u0645\u0643\u0648\u0646\u0627\u062A PCR: Template DNA + Primers + dNTPs + Thermostable DNA polymerase (Taq) + Buffer. \u0623\u0645\u0627 ddNTPs (dideoxy) \u0641\u062A\u064F\u0633\u062A\u062E\u062F\u0645 \u0641\u064A Sanger Sequencing \u0648\u0644\u064A\u0633 PCR \u0627\u0644\u0639\u0627\u062F\u064A."},{id:"mid2_mid2_L13_Molecular_Techniques_3",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The polymerase chain reaction for amplification of DNA sequences relies upon the use of:",options:["DNA polymerase","Heat-stable DNA polymerase","Sanger sequencing","Selective amplification of a specific DNA sequence"],answer:1,explanation:"\u0645\u0646 L13: PCR \u064A\u0633\u062A\u062E\u062F\u0645 Taq polymerase (\u0645\u0633\u062A\u062E\u0644\u0635\u0629 \u0645\u0646 Thermus aquaticus) \u0644\u0623\u0646\u0647\u0627 \u062A\u062A\u062D\u0645\u0644 \u062F\u0631\u062C\u0627\u062A \u0627\u0644\u062D\u0631\u0627\u0631\u0629 \u0627\u0644\u0639\u0627\u0644\u064A\u0629 \u0641\u064A \u0643\u0644 \u062F\u0648\u0631\u0629 \u0645\u0646 \u062F\u0648\u0631\u0627\u062A PCR."},{id:"mid2_mid2_L13_Molecular_Techniques_4",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Which of the following methods is used for separation of DNA fragments?",options:["They contain a plasmid with genes for antibiotic resistance","Selective amplification of a specific DNA sequence","Gel electrophoresis","Newborn screening of galactosemia"],answer:2,explanation:"Gel electrophoresis \u064A\u0641\u0635\u0644 \u0634\u0638\u0627\u064A\u0627 DNA \u062D\u0633\u0628 \u0627\u0644\u062D\u062C\u0645. PCR = \u062A\u0636\u062E\u064A\u0645\u060C Restriction digestion = \u0642\u0637\u0639\u060C Bacterial transformation = \u0625\u062F\u062E\u0627\u0644 DNA \u0644\u0644\u0628\u0643\u062A\u064A\u0631\u064A\u0627."},{id:"mid2_mid2_L13_Molecular_Techniques_5",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What is the correct sequence of events in Southern blotting?",options:["Heat-stable DNA polymerase","Newborn screening of galactosemia","Separation of DNA fragments by electrophoresis \u2192 transfer to a membrane \u2192 hybridization with a labelled probe sequence","MLPA"],answer:2,explanation:"Southern blot \u062E\u0637\u0648\u0627\u062A: 1. \u0642\u0637\u0639 DNA \u0628\u0640 restriction enzymes 2. \u0641\u0635\u0644 \u0627\u0644\u0634\u0638\u0627\u064A\u0627 \u0628\u0640 gel electrophoresis 3. \u0646\u0642\u0644 (transfer) \u0644\u0644\u0640 membrane (\u0646\u064A\u062A\u0631\u0648\u0633\u064A\u0644\u064A\u0644\u0648\u0632) 4. Hybridization \u0645\u0639 probe \u0645\u064F\u0639\u0644\u064E\u0651\u0645 (labeled) 5. \u0643\u0634\u0641 \u0627\u0644\u0625\u0634\u0627\u0631\u0629"},{id:"mid2_mid2_L13_Molecular_Techniques_6",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What is the natural function of restriction enzymes?",options:["Newborn screening of galactosemia","They contain a plasmid with genes for antibiotic resistance","Selective amplification of a specific DNA sequence","Protecting bacteria by cleaving the DNA of infecting viruses"],answer:3,explanation:"Restriction enzymes \u0641\u064A \u0627\u0644\u0628\u0643\u062A\u064A\u0631\u064A\u0627 \u062A\u0642\u0637\u0639 DNA \u0627\u0644\u063A\u0631\u064A\u0628 (\u0627\u0644\u0641\u064A\u0631\u0648\u0633\u0627\u062A) \u0644\u062D\u0645\u0627\u064A\u0629 \u0627\u0644\u0628\u0643\u062A\u064A\u0631\u064A\u0627. \u0623\u0645\u0627 DNA \u0627\u0644\u0628\u0643\u062A\u064A\u0631\u064A\u0627 \u0646\u0641\u0633\u0647\u0627 \u0641\u064A\u0643\u0648\u0646 \u0645\u062D\u0645\u064A\u0627\u064B \u0628\u0627\u0644\u0640 methylation."},{id:"mid2_mid2_L13_Molecular_Techniques_7",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Some bacteria have developed antibiotic resistance. What feature gives them this property?",options:["DNA polymerase","They contain a plasmid with genes for antibiotic resistance","Microarray","Heat-stable DNA polymerase"],answer:1,explanation:"\u0627\u0644\u0640 Plasmid \u0647\u0648 DNA \u062F\u0627\u0626\u0631\u064A \u0635\u063A\u064A\u0631 \u062E\u0627\u0631\u062C \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 \u0627\u0644\u0631\u0626\u064A\u0633\u064A\u060C \u064A\u0645\u0643\u0646\u0647 \u062D\u0645\u0644 \u062C\u064A\u0646\u0627\u062A \u0645\u0642\u0627\u0648\u0645\u0629 \u0627\u0644\u0645\u0636\u0627\u062F\u0627\u062A \u0627\u0644\u062D\u064A\u0648\u064A\u0629 \u0648\u0646\u0642\u0644\u0647\u0627 \u0628\u064A\u0646 \u0627\u0644\u0628\u0643\u062A\u064A\u0631\u064A\u0627."},{id:"mid2_mid2_L13_Molecular_Techniques_8",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What is the best genetic testing for chromosomal duplication < 3 mega base pair?",options:["Microarray","Both parents are carriers and child C3 is normal","Separation of DNA fragments by electrophoresis \u2192 transfer to a membrane \u2192 hybridization with a labelled probe sequence","They contain a plasmid with genes for antibiotic resistance"],answer:0,explanation:'\u0645\u0646 L13: "CMA (Chromosomal Microarray) detects microdeletions/microduplications < 5Mb with resolution ~1Kb." \u0627\u0644\u0640 Conventional karyotyping \u0644\u0627 \u064A\u0643\u062A\u0634\u0641 < 5-10Mb.'},{id:"mid2_mid2_L13_Molecular_Techniques_9",exam:"mid2",lecture:"L13 Molecular Techniques",q:"An 18-month-old with muscle weakness and frequent falls. Doctor suspects a point mutation on the SMN1 gene. How to confirm?",options:["Autosomal recessive","Heat-stable DNA polymerase","Sanger Sequencing","Sanger sequencing"],answer:2,explanation:"\u0645\u0646 L13: Sanger sequencing \u064A\u064F\u0633\u062A\u062E\u062F\u0645 \u0644\u0644\u0643\u0634\u0641 \u0639\u0646 point mutations \u0641\u064A \u062C\u064A\u0646 \u0645\u062D\u062F\u062F. MLPA \u064A\u0643\u062A\u0634\u0641 deletions/duplications \u0644\u0627 point mutations. (\u0645\u0644\u0627\u062D\u0638\u0629: SMN1 deletions \u062A\u064F\u0643\u062A\u0634\u0641 \u0628\u0640 MLPA\u060C \u0644\u0643\u0646 point mutations \u062A\u062D\u062A\u0627\u062C Sanger)"},{id:"mid2_mid2_L13_Molecular_Techniques_10",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A 2-year-old child has developmental delay and multiple congenital anomalies. Chromosome analysis and microarray are negative, no specific syndrome suspected. Most appropriate next test?",options:["Klinefelter syndrome","Gel electrophoresis","Suspect 2","Whole exome sequencing"],answer:3,explanation:"\u0645\u0646 L13: WES \u064A\u064F\u0633\u062A\u062E\u062F\u0645 \u0639\u0646\u062F\u0645\u0627 \u062A\u0641\u0634\u0644 \u0627\u0644\u0641\u062D\u0648\u0635\u0627\u062A \u0627\u0644\u0623\u062E\u0631\u0649. \u064A\u0643\u0634\u0641 \u0639\u0646 SNVs \u0648small indels \u0641\u064A \u062C\u0645\u064A\u0639 exons. \u064A\u064F\u0633\u062A\u062E\u062F\u0645 \u0628\u0634\u0643\u0644 \u062E\u0627\u0635 \u0641\u064A DD/ID \u063A\u064A\u0631 \u0645\u062D\u062F\u062F \u0627\u0644\u0633\u0628\u0628."},{id:"mid2_mid2_L13_Molecular_Techniques_11",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A woman with breast cancer is found to carry a pathogenic CHEK2 variant. Which test is most appropriate to screen her siblings?",options:["MLPA","Microarray","Heat-stable DNA polymerase","Sanger sequencing"],answer:3,explanation:"\u0644\u0623\u0646 \u0627\u0644\u0637\u0641\u0631\u0629 \u0645\u062D\u062F\u062F\u0629 (specific known variant \u0641\u064A CHEK2)\u060C \u0646\u0633\u062A\u062E\u062F\u0645 Sanger sequencing \u0644\u0641\u062D\u0635 \u0647\u0630\u0627 \u0627\u0644\u0645\u0648\u0636\u0639 \u0628\u0627\u0644\u0630\u0627\u062A \u0639\u0646\u062F \u0627\u0644\u0625\u062E\u0648\u0629."},{id:"mid2_mid2_L13_Molecular_Techniques_12",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Chromosome analysis would be most helpful in diagnosing which of the following disorders?",options:["Paternity exclusion","Both parents are carriers and child C3 is normal","Klinefelter syndrome","Dideoxy-dNTPs"],answer:2,explanation:"\u0645\u0646 L13: Chromosome analysis (Karyotyping) \u064A\u0643\u0634\u0641 \u0627\u0644\u062A\u063A\u064A\u0631\u0627\u062A \u0627\u0644\u0639\u062F\u062F\u064A\u0629 \u0648\u0627\u0644\u0628\u0646\u064A\u0648\u064A\u0629 \u0627\u0644\u0643\u0628\u064A\u0631\u0629 \u0643\u0640 47,XXY. \u0623\u0645\u0627 NF1\u060C CF\u060C DMD = \u0623\u0645\u0631\u0627\u0636 \u062C\u064A\u0646 \u0648\u062D\u064A\u062F \u062A\u062D\u062A\u0627\u062C molecular testing."},{id:"mid2_mid2_L13_Molecular_Techniques_13",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Chromosome analysis can be used for which of the following?",options:["Klinefelter syndrome","Gel electrophoresis","Separation of DNA fragments by electrophoresis \u2192 transfer to a membrane \u2192 hybridization with a labelled probe sequence","Selective amplification of a specific DNA sequence"],answer:0,explanation:""},{id:"mid2_mid2_L13_Molecular_Techniques_14",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The following Sanger Sequencing has been done for healthy parents and an affected son. What is the mode of transmission?",options:["Heat-stable DNA polymerase","Both parents are carriers and child C3 is normal","Autosomal recessive","Klinefelter syndrome"],answer:2,explanation:""},{id:"mid2_mid2_L13_Molecular_Techniques_15",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A blood sample from a crime scene. DNA analysis of victim and two suspects done. Which one is the criminal?",options:["They contain a plasmid with genes for antibiotic resistance","Whole exome sequencing","Paternity exclusion","Suspect 2"],answer:3,explanation:""},{id:"mid2_mid2_L13_Molecular_Techniques_16",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The following figure shows RFLP data done for a family of sickle cell disease:",options:["Both parents are carriers and child C3 is normal","Electrophoresis","Selective amplification of a specific DNA sequence","Microarray"],answer:0,explanation:""},{id:"mid2_mid2_L13_Molecular_Techniques_17",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The blot shows RFLP mapping for a case of paternity testing:",options:["Paternity exclusion","They contain a plasmid with genes for antibiotic resistance","Dideoxy-dNTPs","Electrophoresis"],answer:0,explanation:""},{id:"mid2_mid2_L13_Molecular_Techniques_18",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What is the best test for diagnosing chromosomal microduplication (< 3Mb)?",options:["Microarray","MLPA","Gel electrophoresis","Separation of DNA fragments by electrophoresis \u2192 transfer to a membrane \u2192 hybridization with a labelled probe sequence"],answer:0,explanation:""},{id:"mid2_mid2_L13_Molecular_Techniques_19",exam:"mid2",lecture:"L13 Molecular Techniques",q:"PCR amplifying DNA by using _______ isolated from living bacteria:",options:["DNA polymerase","Heat-stable DNA polymerase","Gel electrophoresis","Klinefelter syndrome"],answer:0,explanation:"Taq polymerase \u0645\u0633\u062A\u062E\u0644\u0635\u0629 \u0645\u0646 \u0628\u0643\u062A\u064A\u0631\u064A\u0627 Thermus aquaticus \u0627\u0644\u062A\u064A \u062A\u0639\u064A\u0634 \u0641\u064A \u064A\u0646\u0627\u0628\u064A\u0639 \u0633\u0627\u062E\u0646\u0629."},{id:"mid2_mid2_L13_Molecular_Techniques_20",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Cloning is the process of:",options:["DNA polymerase","Selective amplification of a specific DNA sequence","Whole exome sequencing","They contain a plasmid with genes for antibiotic resistance"],answer:1,explanation:"\u0645\u0644\u0627\u062D\u0638\u0629: \u0647\u0630\u0627 \u0627\u0644\u0633\u0624\u0627\u0644 \u0641\u064A\u0647 \u0627\u0644\u062A\u0628\u0627\u0633. \u0627\u0644\u0640 Cloning \u0642\u062F \u064A\u064F\u0642\u0635\u062F \u0628\u0647 PCR amplification \u0623\u0648 gene cloning (\u0625\u062F\u062E\u0627\u0644 \u062C\u064A\u0646 \u0641\u064A vector \u0648\u062A\u0636\u062E\u064A\u0645\u0647 \u0641\u064A bacteria). \u0627\u0644\u0625\u062C\u0627\u0628\u0629 B \u062A\u064F\u0634\u064A\u0631 \u0625\u0644\u0649 PCR."},{id:"mid2_mid2_L13_Molecular_Techniques_21",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What method can be used to detect anemia carrier?",options:["Sanger Sequencing","Electrophoresis","Whole exome sequencing","Paternity exclusion"],answer:1,explanation:"Hemoglobin electrophoresis \u064A\u064F\u0645\u064A\u0632 \u0628\u064A\u0646 HbA \u0648HbS \u0648HbC \u0648HbF \u2192 \u064A\u0643\u0634\u0641 \u0646\u0627\u0642\u0644\u064A \u0627\u0644\u0623\u0646\u064A\u0645\u064A\u0627 \u0627\u0644\u0645\u0646\u062C\u0644\u064A\u0629 \u0648\u0627\u0644\u062B\u0644\u0627\u0633\u064A\u0645\u064A\u0627."},{id:"mid2_mid2_L13_Molecular_Techniques_22",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What is the 2nd trimester test advised for a mother with one child with galactosemia?",options:["Newborn screening of galactosemia","Autosomal recessive","Whole exome sequencing","They contain a plasmid with genes for antibiotic resistance"],answer:0,explanation:"\u0645\u0646 L14:** \u0641\u064A \u0627\u0644\u062D\u0645\u0644 \u0627\u0644\u062C\u062F\u064A\u062F\u060C \u0627\u0644\u0623\u0646\u0633\u0628 \u0647\u0648 \u0641\u062D\u0635 \u0627\u0644\u0648\u0627\u0644\u062F\u064E\u064A\u0646 \u0643\u0646\u0627\u0642\u0644\u064E\u064A\u0646 \u0623\u0648 prenatal diagnosis. Newborn screening \u064A\u064F\u0637\u0628\u064E\u0651\u0642 \u0628\u0639\u062F \u0627\u0644\u0648\u0644\u0627\u062F\u0629."},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_1",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"What are the Potential Reasons for Pediatric Genetic Counseling?",options:["Preimplantation genetic diagnosis","Folic acid","Cystic fibrosis","Child with a family history of a genetic condition"],answer:3,explanation:"Pediatric genetic counseling \u064A\u064F\u0634\u0645\u0644: \u0623\u0637\u0641\u0627\u0644 \u0628\u062A\u0634\u0648\u0647\u0627\u062A\u060C \u062A\u0623\u062E\u0631 \u0646\u0645\u0648\u060C \u0623\u0637\u0641\u0627\u0644 \u0630\u0648\u064A \u062A\u0627\u0631\u064A\u062E \u0639\u0627\u0626\u0644\u064A \u0644\u062D\u0627\u0644\u0627\u062A \u062C\u064A\u0646\u064A\u0629. Adult onset \u064A\u064F\u0639\u0627\u0644\u064E\u062C \u0628\u0640 adult genetic counseling."},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_2",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"According to genetic counseling, all the following is true EXCEPT:",options:["Genetic counseling is directive","Hypogonadism","Sanger sequencing","Folic acid"],answer:0,explanation:"\u0645\u0646 L14: Genetic counseling \u0647\u0648 Non-directive (\u0644\u0627 \u064A\u064F\u0639\u0637\u064A \u062A\u0648\u062C\u064A\u0647\u0627\u062A \u0645\u0628\u0627\u0634\u0631\u0629). \u064A\u064F\u0642\u062F\u0645 \u0627\u0644\u0645\u0639\u0644\u0648\u0645\u0627\u062A \u0644\u064A\u062A\u062E\u0630 \u0627\u0644\u0641\u0631\u062F \u0642\u0631\u0627\u0631\u0647 \u0628\u0646\u0641\u0633\u0647."},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_3",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"Two parents came to counseling. They have 2 affected children with Hemophilia A. They want a healthy child. What to recommend?",options:["Preimplantation genetic diagnosis","Genetic counseling is directive","Cystic fibrosis","Sanger Sequencing"],answer:0,explanation:"PGD = \u0641\u062D\u0635 \u0627\u0644\u062C\u0646\u064A\u0646 \u0642\u0628\u0644 \u0627\u0644\u0632\u0631\u0639 \u0641\u064A \u0623\u062B\u0646\u0627\u0621 IVF \u0644\u0627\u062E\u062A\u064A\u0627\u0631 \u0627\u0644\u0623\u062C\u0646\u0629 \u063A\u064A\u0631 \u0627\u0644\u0645\u0635\u0627\u0628\u0629."},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_4",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"A 30-year-old male with chronic pulmonary disease and infertility. Possible diagnosis?",options:["Prader-Willi","Cystic fibrosis","Folic acid","Child with a family history of a genetic condition"],answer:1,explanation:"CF \u0641\u064A \u0627\u0644\u0630\u0643\u0648\u0631 \u064A\u064F\u0633\u0628\u0628: \u0645\u0631\u0636 \u0631\u0626\u0648\u064A \u0645\u0632\u0645\u0646 + \u0639\u0642\u0645 \u0630\u0643\u0648\u0631\u064A \u0628\u0633\u0628\u0628 CBAVD (congenital bilateral absence of vas deferens)."},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_5",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"Medication given in first trimester of pregnancy?",options:["Cystic fibrosis","Folic acid","Sanger Sequencing","Down syndrome pregnancies"],answer:1,explanation:"\u062D\u0645\u0636 \u0627\u0644\u0641\u0648\u0644\u064A\u0643 \u064A\u064F\u0639\u0637\u0649 \u0641\u064A \u0627\u0644\u0623\u0634\u0647\u0631 \u0627\u0644\u0623\u0648\u0644\u0649 (periconceptional) \u0644\u062A\u0642\u0644\u064A\u0644 \u062E\u0637\u0631 NTD. Streptomycin \u0648Isoniazid \u062E\u0637\u0631\u0629 \u0641\u064A \u0627\u0644\u062D\u0645\u0644."},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_6",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"A male with TB disease using isoniazid and having severe adverse effects:",options:["Folic acid","Sanger Sequencing","Change the drug","Child with a family history of a genetic condition"],answer:2,explanation:"Isoniazid metabolism \u064A\u062E\u062A\u0644\u0641 \u062D\u0633\u0628 NAT2 phenotype (slow vs fast acetylators). \u0641\u064A Slow acetylators \u0642\u062F \u062A\u062D\u062F\u062B \u0633\u0645\u064A\u0629 \u0639\u0635\u0628\u064A\u0629. \u0627\u0644\u0633\u0628\u0628 pharmacogenetics."},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_7",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"An increase in inhibin-A level in maternal serum is a diagnosis of?",options:["Genetic counseling is directive","Down syndrome pregnancies","Maternal serum AFP","Cystic fibrosis"],answer:1,explanation:"Maternal serum screening: \u0641\u064A Down syndrome \u062A\u0631\u062A\u0641\u0639: inhibin-A \u0648hCG. \u062A\u0646\u062E\u0641\u0636: AFP \u0648Estriol."},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_8",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"Which of the following prenatal tests doesn't carry a risk of fetal loss?",options:["Maternal serum AFP","Change the drug","Hypogonadism","Child with a family history of a genetic condition"],answer:0,explanation:"Maternal serum AFP \u0647\u0648 \u0641\u062D\u0635 \u062F\u0645 \u0628\u0633\u064A\u0637 \u0644\u0644\u0623\u0645 \u0648\u0644\u0627 \u064A\u062D\u0645\u0644 \u0623\u064A \u062E\u0637\u0631 \u0639\u0644\u0649 \u0627\u0644\u062C\u0646\u064A\u0646. \u0623\u0645\u0627 CVS \u0648Amniocentesis \u0648Fetal tissue sampling \u0641\u0643\u0644\u0647\u0627 \u062A\u062D\u0645\u0644 \u062E\u0637\u0631 \u0625\u062C\u0647\u0627\u0636."},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_9",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"Sara is a 30-year-old female who came to genetic counseling with a history of breast cancer in family. Her mother had breast cancer caused by BRCA1. Appropriate test for Sara?",options:["Sanger Sequencing","Child with a family history of a genetic condition","Sanger sequencing","Maternal serum AFP"],answer:2,explanation:""},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_10",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"What is the major congenital anomaly in Prader-Willi syndrome?",options:["Hypogonadism","Maternal serum AFP","Down syndrome pregnancies","Folic acid"],answer:0,explanation:"Hypogonadism \u0647\u0648 major anomaly \u0641\u064A PWS (\u064A\u0624\u062B\u0631 \u0639\u0644\u0649 \u0627\u0644\u0648\u0638\u064A\u0641\u0629 \u0627\u0644\u062A\u0646\u0627\u0633\u0644\u064A\u0629). \u0627\u0644\u0623\u0645\u062B\u0644\u0629 \u0627\u0644\u0623\u062E\u0631\u0649: almond-shaped eyes = minor anomaly."},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_11",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"6-year-old boy with hypogonadism, obesity, almond-shaped eyes. Diagnosis?",options:["Child with a family history of a genetic condition","Sanger sequencing","Hypogonadism","Prader-Willi"],answer:3,explanation:""},{id:"mid2_mid2_L14_Approach_to_Patients_Families_with_Genetic_Conditions_12",exam:"mid2",lecture:"L14 Approach to Patients Families with Genetic Conditions",q:"A 2-year-old child presented with muscle weakness and frequent falls. The doctor suspects a point mutation on the SMN1 gene. How to confirm this?",options:["Preimplantation genetic diagnosis","Cystic fibrosis","Sanger Sequencing","Down syndrome pregnancies"],answer:2,explanation:""},{id:"mid2_mid2_L9_Dysmorphology_1",exam:"mid2",lecture:"L9 Dysmorphology",q:"During dysmorphology assessment, a child has a shortened anteroposterior dimension of the skull compared to its width. What is the correct term?",options:["Plagiocephaly","Dolichocephaly","Brachycephaly","Trigonocephaly"],answer:2,explanation:"\u0645\u0646 L9: - Brachycephaly = \u062C\u0645\u062C\u0645\u0629 \u0639\u0631\u064A\u0636\u0629 \u0642\u0635\u064A\u0631\u0629 (AP dimension \u0623\u0642\u0635\u0631 \u0645\u0646 \u0627\u0644\u0639\u0631\u0636) - Dolichocephaly = \u062C\u0645\u062C\u0645\u0629 \u0637\u0648\u064A\u0644\u0629 \u0636\u064A\u0642\u0629 - Plagiocephaly = \u062C\u0645\u062C\u0645\u0629 \u063A\u064A\u0631 \u0645\u062A\u0633\u0627\u0648\u064A\u0629 \u0627\u0644\u062C\u0627\u0646\u0628\u064A\u0646 - Trigonocephaly = \u062C\u0645\u062C\u0645\u0629 \u0645\u062B\u0644\u062B\u0629 \u0627\u0644\u0634\u0643\u0644"},{id:"mid2_mid2_L9_Dysmorphology_2",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which term describes the presence of a small mandible?",options:["Retrognathia","Macrognathia","Micrognathia","Prognathia"],answer:2,explanation:"\u0645\u0646 L9: - Micrognathia = \u0641\u0643 \u0633\u0641\u0644\u064A \u0635\u063A\u064A\u0631 - Macrognathia = \u0641\u0643 \u0633\u0641\u0644\u064A \u0643\u0628\u064A\u0631 - Retrognathia = \u0641\u0643 \u0633\u0641\u0644\u064A \u0645\u062A\u0631\u0627\u062C\u0639 \u0644\u0644\u062E\u0644\u0641 - Prognathia = \u0641\u0643 \u0633\u0641\u0644\u064A \u0628\u0627\u0631\u0632 \u0644\u0644\u0623\u0645\u0627\u0645"},{id:"mid2_mid2_L9_Dysmorphology_3",exam:"mid2",lecture:"L9 Dysmorphology",q:"What is the term used to describe the vertical groove between the base of the nose and the border of the upper lip?",options:["Philtrum","Brachydactyly","Small mouth","Microcephaly"],answer:0,explanation:"\u0627\u0644\u0640 Philtrum \u0647\u0648 \u0627\u0644\u062E\u062F\u0651 \u0627\u0644\u0631\u0623\u0633\u064A \u0628\u064A\u0646 \u0642\u0627\u0639\u062F\u0629 \u0627\u0644\u0623\u0646\u0641 \u0648\u0627\u0644\u0634\u0641\u0629 \u0627\u0644\u0639\u0644\u064A\u0627. \u0645\u0646 L9."},{id:"mid2_mid2_L9_Dysmorphology_4",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which term describes the presence of an extra digit?",options:["Arachnodactyly","Syndactyly","Oligodactyly","Polydactyly"],answer:3,explanation:"\u0645\u0646 L9: - Polydactyly = \u0623\u0635\u0627\u0628\u0639 \u0632\u0627\u0626\u062F\u0629 - Syndactyly = \u0627\u0644\u062A\u0635\u0627\u0642 \u0627\u0644\u0623\u0635\u0627\u0628\u0639 - Oligodactyly = \u0646\u0642\u0635 \u0623\u0635\u0627\u0628\u0639 - Arachnodactyly = \u0623\u0635\u0627\u0628\u0639 \u0637\u0648\u064A\u0644\u0629 \u0643\u0623\u0631\u062C\u0644 \u0627\u0644\u0639\u0646\u0643\u0628\u0648\u062A (\u0641\u064A Marfan)"},{id:"mid2_mid2_L9_Dysmorphology_5",exam:"mid2",lecture:"L9 Dysmorphology",q:"A child has an increased distance between the eyes. Which term best describes this?",options:["Beta blockers","Philtrum","Hypertelorism","DNA analysis for FGFR3"],answer:2,explanation:"Hypertelorism = \u0632\u064A\u0627\u062F\u0629 \u0627\u0644\u0645\u0633\u0627\u0641\u0629 \u0628\u064A\u0646 \u0627\u0644\u0639\u064A\u0646\u064A\u0646. Hypotelorism = \u062A\u0642\u0627\u0631\u0628 \u0627\u0644\u0639\u064A\u0646\u064A\u0646."},{id:"mid2_mid2_L9_Dysmorphology_6",exam:"mid2",lecture:"L9 Dysmorphology",q:"What best describes short fingers?",options:["Anencephaly","Brachydactyly","NF1","Polydactyly"],answer:1,explanation:"Brachydactyly = \u0642\u0635\u0631 \u0627\u0644\u0623\u0635\u0627\u0628\u0639. Clinodactyly = \u0627\u0646\u062D\u0631\u0627\u0641 \u0623\u0635\u0627\u0628\u0639."},{id:"mid2_mid2_L9_Dysmorphology_7",exam:"mid2",lecture:"L9 Dysmorphology",q:"What is the term used to describe microstomia?",options:["Hypertelorism","Small mouth","Brachydactyly","Anencephaly"],answer:1,explanation:"Microstomia = small mouth (\u0641\u0645 \u0635\u063A\u064A\u0631)."},{id:"mid2_mid2_L9_Dysmorphology_8",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following is considered as major anomaly?",options:["DNA analysis for FGFR3","Anencephaly","Brachydactyly","Philtrum"],answer:1,explanation:"\u0645\u0646 L9: Major anomalies = \u062A\u0634\u0648\u0647\u0627\u062A \u0628\u0646\u064A\u0648\u064A\u0629 \u0645\u0647\u0645\u0629 \u062A\u0624\u062B\u0631 \u0639\u0644\u0649 \u0627\u0644\u0648\u0638\u064A\u0641\u0629 (\u0645\u062B\u0644: anencephaly\u060C heart defects\u060C cleft palate). Minor anomalies = \u062A\u0634\u0648\u0647\u0627\u062A \u0635\u063A\u064A\u0631\u0629 \u0644\u0627 \u062A\u0624\u062B\u0631 \u0639\u0644\u0649 \u0627\u0644\u0648\u0638\u064A\u0641\u0629 (lip pits\u060C epicanthic fold\u060C Brushfield spots)."},{id:"mid2_mid2_L9_Dysmorphology_9",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following is considered as a major defect?",options:["Microcephaly","Corneal clouding","NF1","DMD exon skipping therapy"],answer:0,explanation:"Microcephaly = major anomaly. Lacrimal duct stenosis\u060C epicanthic fold\u060C Brushfield spots = minor anomalies."},{id:"mid2_mid2_L9_Dysmorphology_10",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following disorders develops arachnodactyly of fingers and toes?",options:["Marfan","Polydactyly","Aortic aneurysm","Philtrum"],answer:0,explanation:"Arachnodactyly (\u0623\u0635\u0627\u0628\u0639 \u0637\u0648\u064A\u0644\u0629 \u0631\u0641\u064A\u0639\u0629 \u0645\u062B\u0644 \u0623\u0631\u062C\u0644 \u0627\u0644\u0639\u0646\u0643\u0628\u0648\u062A) \u0633\u0645\u0629 \u0645\u0645\u064A\u0632\u0629 \u0644\u0640 Marfan syndrome \u0628\u0633\u0628\u0628 \u0637\u0641\u0631\u0629 \u0641\u064A \u062C\u064A\u0646 FBN1."},{id:"mid2_mid2_L9_Dysmorphology_11",exam:"mid2",lecture:"L9 Dysmorphology",q:"What is a major anomaly of Marfan syndrome?",options:["Corneal clouding","Aortic aneurysm","DMD exon skipping therapy","Brachycephaly"],answer:1,explanation:"\u0645\u0646 L9+L14: \u0627\u0644\u0633\u0645\u0627\u062A \u0627\u0644\u0631\u0626\u064A\u0633\u064A\u0629 \u0644\u0640 Marfan: Aortic root dilation/aneurysm (major)\u060C arachnodactyly\u060C ectopia lentis. Pes planus \u0648scoliosis = minor."},{id:"mid2_mid2_L9_Dysmorphology_12",exam:"mid2",lecture:"L9 Dysmorphology",q:"What is a major anomaly of Marfan syndrome? (Q57 in Season bank)",options:["Corneal clouding","Aortic aneurysm","Beta blockers","Microcephaly"],answer:1,explanation:""},{id:"mid2_mid2_L9_Dysmorphology_13",exam:"mid2",lecture:"L9 Dysmorphology",q:"Hurler and Hunter can present similarly, which feature can distinguish between them?",options:["Brachydactyly","Corneal clouding","Microcephaly","Hypertelorism"],answer:1,explanation:"\u0643\u0644\u0627\u0647\u0645\u0627 mucopolysaccharidosis. Hurler (MPS I) = corneal clouding \u0645\u0648\u062C\u0648\u062F\u0629. Hunter (MPS II) = \u0644\u0627 \u064A\u0648\u062C\u062F corneal clouding (\u064A\u064F\u0633\u0627\u0639\u062F \u0641\u064A \u0627\u0644\u062A\u0645\u064A\u064A\u0632)."},{id:"mid2_mid2_L9_Dysmorphology_14",exam:"mid2",lecture:"L9 Dysmorphology",q:"A patient presents with caf\xE9-au-lait spots and optic nerve glioma. What gene is responsible?",options:["Hypertelorism","NF1","DMD exon skipping therapy","Variable expressivity"],answer:1,explanation:"NF1 (Neurofibromin 1) \u0639\u0644\u0649 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 17q. Caf\xE9-au-lait spots \u0648Lisch nodules \u0648optic glioma \u0645\u0646 \u0633\u0645\u0627\u062A NF1."},{id:"mid2_mid2_L9_Dysmorphology_15",exam:"mid2",lecture:"L9 Dysmorphology",q:"A child has NF1 with caf\xE9-au-lait spots. His mother has NF1 with only mild symptoms. What explains the difference?",options:["Anencephaly","Variable expressivity","Gain-of-function mutation in PTPN11","DMD exon skipping therapy"],answer:1,explanation:""},{id:"mid2_mid2_L9_Dysmorphology_16",exam:"mid2",lecture:"L9 Dysmorphology",q:"A 4-year-old girl has short stature, webbed neck, pulmonary valve stenosis, and downslanting palpebral fissures. Which genetic abnormality?",options:["Gain-of-function mutation in PTPN11","Beta blockers","Corneal clouding","NF1"],answer:0,explanation:"\u0647\u0630\u0647 \u0623\u0639\u0631\u0627\u0636 Noonan syndrome. 50% \u0645\u0646 \u062D\u0627\u0644\u0627\u062A Noonan \u0646\u0627\u062A\u062C\u0629 \u0639\u0646 gain-of-function mutation \u0641\u064A PTPN11 gene."},{id:"mid2_mid2_L9_Dysmorphology_17",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following is associated with Noonan Syndrome?",options:["Bleeding diseases","Aortic aneurysm","Hypertelorism","Polydactyly"],answer:0,explanation:"Noonan syndrome \u0645\u0631\u062A\u0628\u0637 \u0628\u0640: short stature\u060C pulmonary stenosis\u060C bleeding disorders (factor XI deficiency)\u060C webbed neck\u060C downslanting palpebral fissures."},{id:"mid2_mid2_L9_Dysmorphology_18",exam:"mid2",lecture:"L9 Dysmorphology",q:"A couple came with a 12-year-old girl with short stature, enlarged head, and rhizomelic shortening of long bones. How to confirm diagnosis?",options:["DNA analysis for FGFR3","Hypertelorism","DMD exon skipping therapy","Aortic aneurysm"],answer:0,explanation:"\u0647\u0630\u0647 \u0623\u0639\u0631\u0627\u0636 Achondroplasia (\u0642\u0635\u0631 \u0627\u0644\u0642\u0627\u0645\u0629 \u0628\u0633\u0628\u0628 \u0642\u0635\u0631 \u0627\u0644\u0639\u0638\u0627\u0645 \u0627\u0644\u0637\u0631\u0641\u064A\u0629). \u062A\u0623\u0643\u064A\u062F \u0627\u0644\u062A\u0634\u062E\u064A\u0635: DNA analysis \u0644\u0640 FGFR3 (gain-of-function mutation)."},{id:"mid2_mid2_L9_Dysmorphology_19",exam:"mid2",lecture:"L9 Dysmorphology",q:"A child with Marfan syndrome is started on medication to reduce risk of aortic root dilation. Which class?",options:["Aortic aneurysm","Beta blockers","DMD exon skipping therapy","Small mouth"],answer:1,explanation:"Beta blockers (\u0645\u062B\u0644 propranolol) \u064A\u064F\u0633\u062A\u062E\u062F\u0645\u0648\u0646 \u0644\u062A\u0642\u0644\u064A\u0644 \u0627\u0644\u0636\u063A\u0637 \u0639\u0644\u0649 \u062C\u062F\u0627\u0631 \u0627\u0644\u0623\u0628\u0647\u0631 \u0641\u064A Marfan syndrome."},{id:"mid2_mid2_L9_Dysmorphology_20",exam:"mid2",lecture:"L9 Dysmorphology",q:"A 7-year-old boy with calf pseudohypertrophy and positive Gowers sign. Deletion causing loss of dystrophin. Which therapy?",options:["NF1","DMD exon skipping therapy","Small mouth","Beta blockers"],answer:1,explanation:"Exon skipping therapy \u064A\u064F\u0633\u062A\u062E\u062F\u0645 \u0641\u064A DMD \u0644\u0627\u0633\u062A\u0639\u0627\u062F\u0629 \u0625\u0637\u0627\u0631 \u0627\u0644\u0642\u0631\u0627\u0621\u0629 (reading frame) \u0648\u0625\u0646\u062A\u0627\u062C dystrophin \u0648\u0638\u064A\u0641\u064A \u062C\u0632\u0626\u064A\u0627\u064B."},{id:"mid2_mid2_\u0627\u0644\u0645\u064A\u062F_\u0627\u0644\u062B\u0627\u0646\u064A_1",exam:"mid2",lecture:"\u0627\u0644\u0645\u064A\u062F \u0627\u0644\u062B\u0627\u0646\u064A",q:"Which of the following is associated with Noonan Syndrome?",options:["Bleeding diseases","Down syndrome pregnancies","Preimplantation genetic diagnosis","OTC deficiency"],answer:0,explanation:""},{id:"mid2_mid2_\u0627\u0644\u0645\u064A\u062F_\u0627\u0644\u062B\u0627\u0646\u064A_2",exam:"mid2",lecture:"\u0627\u0644\u0645\u064A\u062F \u0627\u0644\u062B\u0627\u0646\u064A",q:"Cri-du-chat Syndrome is caused by:",options:["Hydrops fetalis","Deletion in 5p","Klinefelter syndrome","Aneuploidy / Triploidy"],answer:1,explanation:"Cri du chat = \u062D\u0630\u0641 \u0627\u0644\u0630\u0631\u0627\u0639 \u0627\u0644\u0642\u0635\u064A\u0631 \u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 5 (5p-). \u0627\u0644\u0645\u0645\u064A\u0632\u0627\u062A: \u0635\u0631\u062E\u0629 \u0634\u0628\u064A\u0647\u0629 \u0628\u0635\u0648\u062A \u0627\u0644\u0642\u0637\u0629\u060C microcephaly\u060C ID."},{id:"mid2_mid2_\u0627\u0644\u0645\u064A\u062F_\u0627\u0644\u062B\u0627\u0646\u064A_3",exam:"mid2",lecture:"\u0627\u0644\u0645\u064A\u062F \u0627\u0644\u062B\u0627\u0646\u064A",q:"Which of the following vitamins could be used to treat homocysteinuria?",options:["DNA polymerase","Vit B6","Genetic counseling is directive","Galactose-1-phosphate"],answer:1,explanation:"Homocystinuria (\u062E\u0644\u0644 \u0641\u064A CBS enzyme) \u064A\u064F\u0639\u0627\u0644\u064E\u062C \u0628\u0640 Vitamin B6 (pyridoxine) \u0641\u064A \u0627\u0644\u062D\u0627\u0644\u0627\u062A \u0627\u0644\u0645\u0633\u062A\u062C\u064A\u0628\u0629\u060C \u0625\u0636\u0627\u0641\u0629 \u0644\u0646\u0638\u0627\u0645 \u063A\u0630\u0627\u0626\u064A \u0645\u0646\u062E\u0641\u0636 methionine."},{id:"mid2_mid2_\u0627\u0644\u0645\u064A\u062F_\u0627\u0644\u062B\u0627\u0646\u064A_4",exam:"mid2",lecture:"\u0627\u0644\u0645\u064A\u062F \u0627\u0644\u062B\u0627\u0646\u064A",q:"Which of the following is caused by abnormal organization of tissue?",options:["Ectodermal dysplasia","Cystic fibrosis","Bleeding diseases","Prader-Willi"],answer:0,explanation:""},{id:"mid2_mid2_\u0627\u0644\u0645\u064A\u062F_\u0627\u0644\u062B\u0627\u0646\u064A_5",exam:"mid2",lecture:"\u0627\u0644\u0645\u064A\u062F \u0627\u0644\u062B\u0627\u0646\u064A",q:"What is the main O2 transport protein in humans during the last 7 months of pregnancy in the uterus?",options:["Genetic counseling is directive","HbF","Sanger Sequencing","Reverse transcriptase"],answer:1,e

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genetics TestBank</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #060913;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --indigo: #4f46e5;
  --sky: #38bdf8;
  --violet: #7c3aed;
}

body {
  background: var(--bg);
  color: #e2e8f0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  overflow-x: hidden;
}

/* ── Aurora ── */
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: aurora-float 14s ease-in-out infinite;
}
.aurora-1 {
  width: 520px; height: 520px;
  background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
  top: -120px; left: -100px;
  animation-delay: 0s;
}
.aurora-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
  top: 40%; right: -60px;
  animation-delay: -5s;
}
.aurora-3 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, #6d28d9 0%, transparent 70%);
  bottom: -80px; left: 30%;
  animation-delay: -9s;
}
@keyframes aurora-float {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-40px) scale(1.08); }
  66%      { transform: translate(-20px,30px) scale(0.95); }
}

/* ── Layout ── */
.screen-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  max-width: 720px;
  margin: 0 auto;
}

/* ── Title ── */
.main-title {
  font-size: 36px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 4px;
}
.shimmer-text {
  background: linear-gradient(90deg, #818cf8 0%, #38bdf8 30%, #a78bfa 60%, #818cf8 100%);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  to { background-position: 300% center; }
}
.subtitle {
  color: rgba(255,255,255,0.45);
  text-align: center;
  font-size: 15px;
  margin-top: -10px;
}

/* ── Glass card ── */
.glass-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px 22px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  width: 100%;
  max-width: 680px;
}
.section-label {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* ── Stagger animations ── */
.fade-in { animation: fadeUp 0.4s ease both; }
.stagger-1 { animation: fadeUp 0.4s ease 0.05s both; }
.stagger-2 { animation: fadeUp 0.4s ease 0.12s both; }
.stagger-3 { animation: fadeUp 0.4s ease 0.19s both; }
.stagger-4 { animation: fadeUp 0.4s ease 0.26s both; }
.stagger-5 { animation: fadeUp 0.4s ease 0.33s both; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Tabs ── */
.tab-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.tab-active {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 16px #7c3aed66;
}

/* ── Chips ── */
.chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s;
}
.chip:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
.chip-active {
  background: rgba(79,70,229,0.25);
  border-color: #818cf8;
  color: #c7d2fe;
}

/* ── Slider ── */
.custom-slider {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 99px;
  background: linear-gradient(90deg, #4f46e5, #38bdf8);
  outline: none;
  cursor: pointer;
}
.custom-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  box-shadow: 0 0 10px #818cf888;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.custom-slider::-webkit-slider-thumb:hover {
  box-shadow: 0 0 18px #818cf8cc;
}

/* ── Toggle ── */
.toggle-btn {
  width: 50px; height: 26px;
  border-radius: 99px;
  border: none;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  position: relative;
  transition: background 0.25s;
  flex-shrink: 0;
}
.toggle-on { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
.toggle-knob {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #fff;
  transition: left 0.25s;
  display: block;
}
.toggle-on .toggle-knob { left: 27px; }

/* ── Link btn ── */
.link-btn {
  background: none;
  border: none;
  color: #818cf8;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}
.link-btn:hover { color: #a5b4fc; }

/* ── Start button ── */
.start-btn {
  padding: 14px 40px;
  border-radius: 99px;
  border: none;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 24px #7c3aed66;
}
.start-btn:hover:not(:disabled) {
  transform: scale(1.04);
  box-shadow: 0 0 40px #7c3aed99;
}
.start-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  animation: none !important;
}
.glow-pulse {
  animation: glow-pulse 2.2s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { box-shadow: 0 0 24px #7c3aed66; }
  50%      { box-shadow: 0 0 48px #7c3aedcc; }
}

/* ── Exam badge ── */
.exam-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 99px;
  background: rgba(129,140,248,0.18);
  border: 1px solid rgba(129,140,248,0.35);
  color: #a5b4fc;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

/* ── Question text ── */
.question-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.7;
  color: rgba(255,255,255,0.92);
  margin-bottom: 20px;
}

/* ── Options ── */
.options-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.options-wrap .opt-btn {
  animation: slideInLeft 0.3s ease both;
}
@keyframes slideInLeft {
  from { opacity:0; transform: translateX(30px); }
  to   { opacity:1; transform: translateX(0); }
}
.opt-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.82);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  text-align: right;
  cursor: pointer;
  transition: all 0.18s;
  width: 100%;
}
.opt-btn:hover:not(.opt-correct):not(.opt-wrong):not(.opt-dim) {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.25);
}
.opt-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.opt-correct {
  border-color: #34d399 !important;
  background: rgba(52,211,153,0.12) !important;
  color: #6ee7b7 !important;
}
.opt-correct .opt-letter { background: rgba(52,211,153,0.3); }
.opt-wrong {
  border-color: #f87171 !important;
  background: rgba(248,113,113,0.12) !important;
  color: #fca5a5 !important;
}
.opt-wrong .opt-letter { background: rgba(248,113,113,0.3); }
.opt-dim { opacity: 0.35; cursor: default; }

/* ── Animations: bounce + shake ── */
.anim-bounce { animation: bounce-correct 0.5s ease; }
@keyframes bounce-correct {
  0%,100% { transform: scale(1); }
  30%      { transform: scale(1.04); }
  60%      { transform: scale(0.97); }
}
.anim-shake { animation: shake-wrong 0.45s ease; }
@keyframes shake-wrong {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}

/* ── Explanation box ── */
.explanation {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.7;
  direction: auto;
}
.expl-correct {
  background: rgba(52,211,153,0.1);
  border: 1px solid rgba(52,211,153,0.3);
  color: #a7f3d0;
}
.expl-wrong {
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  color: #fecaca;
}

/* ── Nav buttons ── */
.nav-btn {
  padding: 10px 22px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.18s;
}
.nav-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.12);
  color: #fff;
}
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-primary {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 14px #7c3aed55;
}
.nav-primary:hover { box-shadow: 0 0 24px #7c3aed99 !important; }

/* ── Review card ── */
.review-card { margin-bottom: 0; }

/* ── Responsive ── */
@media (max-width: 480px) {
  .main-title { font-size: 26px; }
  .glass-card { padding: 16px; }
  .question-text { font-size: 15px; }
}

644\u0640 Allele \u0647\u0648 \u0634\u0643\u0644 \u0628\u062F\u064A\u0644 \u0644\u062C\u064A\u0646 \u0645\u0639\u064A\u0646 \u064A\u0648\u062C\u062F \u0641\u064A \u0646\u0641\u0633 \u0627\u0644\u0645\u0643\u0627\u0646 (Locus) \u0639\u0644\u0649 \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 \u0627\u0644\u0645\u062A\u0645\u0627\u062B\u0644. \u0645\u0646 L1: "Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome."'},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_2",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"What is the definition of a gene?",options:["50%","Paternal chromosome 15 deletion","A hereditary unit of DNA that encodes a functional product","50% for each pregnancy"],answer:2,explanation:'\u0645\u0646 L1: "Gene is a unit of heredity which is transferred from a parent to offspring and is held to determine some characteristic of the offspring. Genes achieve their effects by directing the synthesis of proteins."'},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_3",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"What is meant by a gene variant (mutation)?",options:["CAG","Allele","A permanent change in the DNA sequence","Oocyte"],answer:2,explanation:'\u0645\u0646 L1: "Gene Variant is a permanent alteration in the DNA sequence that makes up a gene, such that the sequence differs from what is found in most people."'},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_4",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"What is the terminology that describes the total genetic heritage material of a cell or organism?",options:["Inherited almost exclusively from the oocyte","Genome","Pleiotropy","Females are affected as well as males"],answer:1,explanation:"\u0627\u0644\u0640 Genome \u0647\u0648 \u0627\u0644\u0645\u062C\u0645\u0648\u0639 \u0627\u0644\u0643\u0644\u064A \u0644\u0644\u0645\u0627\u062F\u0629 \u0627\u0644\u0648\u0631\u0627\u062B\u064A\u0629 \u0641\u064A \u0627\u0644\u062E\u0644\u064A\u0629. \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 \u0647\u0648 \u0628\u0646\u064A\u0629 \u0641\u0631\u062F\u064A\u0629\u060C \u0628\u064A\u0646\u0645\u0627 \u0627\u0644\u062C\u064A\u0646\u0648\u0645 \u064A\u0634\u0645\u0644 \u0643\u0644 \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A \u0645\u062C\u062A\u0645\u0639\u0629."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_5",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"The unit that contains nucleic acid and protein and is responsible for heredity is called?",options:["Chromosome","Females are affected as well as males","50% for each pregnancy","Mitochondrial DNA"],answer:0,explanation:'\u0645\u0646 L1: "A threadlike structure of nucleic acids and protein found in the nucleus of most living cells, carrying genetic information in the form of genes."'},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_6",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following diseases is an example of pleiotropy?",options:["Appears in every generation","Marfan syndrome","50% Affected","Inherited almost exclusively from the oocyte"],answer:1,explanation:"Pleiotropy = \u062C\u064A\u0646 \u0648\u0627\u062D\u062F \u064A\u0624\u062B\u0631 \u0639\u0644\u0649 \u0635\u0641\u0627\u062A \u0645\u062A\u0639\u062F\u062F\u0629. Marfan syndrome \u064A\u0624\u062B\u0631 \u0639\u0644\u0649: \u0627\u0644\u062C\u0647\u0627\u0632 \u0627\u0644\u0647\u064A\u0643\u0644\u064A (arachnodactyly\u060C \u0637\u0648\u0644 \u0627\u0644\u0642\u0627\u0645\u0629)\u060C \u0627\u0644\u0642\u0644\u0628 \u0648\u0627\u0644\u0623\u0648\u0639\u064A\u0629 (aortic aneurysm)\u060C \u0627\u0644\u0639\u064A\u0648\u0646 (ectopia lentis). \u0645\u0646 L5,6."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_7",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which condition affects both males and females equally and is an example of pleiotropy?",options:["Duchenne Muscular Dystrophy","CAG","Marfan syndrome","Variable expression"],answer:2,explanation:"Marfan \u0647\u0648 \u0627\u0636\u0637\u0631\u0627\u0628 autosomal dominant \u0648\u064A\u0635\u064A\u0628 \u0627\u0644\u062C\u0646\u0633\u064A\u0646 \u0628\u0627\u0644\u062A\u0633\u0627\u0648\u064A\u060C \u0648\u0647\u0648 \u0645\u062B\u0627\u0644 \u0643\u0644\u0627\u0633\u064A\u0643\u064A \u0639\u0644\u0649 Pleiotropy."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_8",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Consanguinity increases the risk of which type of genetic disorder?",options:["Angelman syndrome and Prader-Willi syndrome","A permanent change in the DNA sequence","Autosomal recessive disorders","Red-green color blindness"],answer:2,explanation:"\u0627\u0644\u0632\u0648\u0627\u062C \u0645\u0646 \u0627\u0644\u0623\u0642\u0627\u0631\u0628 \u064A\u0631\u0641\u0639 \u0627\u062D\u062A\u0645\u0627\u0644 \u0623\u0646 \u064A\u0643\u0648\u0646 \u0627\u0644\u0637\u0631\u0641\u0627\u0646 \u0646\u0627\u0642\u0644\u064E\u064A\u0646 (carriers) \u0644\u0646\u0641\u0633 \u0627\u0644\u0623\u0644\u064A\u0644 \u0627\u0644\u0645\u062A\u0646\u062D\u064A \u0627\u0644\u0636\u0627\u0631\u060C \u0645\u0645\u0627 \u064A\u0631\u0641\u0639 \u062E\u0637\u0631 \u0648\u0644\u0627\u062F\u0629 \u0637\u0641\u0644 \u0645\u0635\u0627\u0628 \u0628\u0645\u0631\u0636 autosomal recessive."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_9",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Consanguineous parents have a high risk of developing what kind of disease?",options:["Cystic fibrosis","Genome","Mosaicism","The normal individual has only one transcriptionally active gene"],answer:0,explanation:"Cystic fibrosis = autosomal recessive. \u0627\u0644\u0632\u0648\u0627\u062C \u0627\u0644\u0642\u0631\u0627\u0628\u064A \u064A\u0631\u0641\u0639 \u062E\u0637\u0631 AR diseases. Marfan \u0648Neurofibromatosis = AD. Hemophilia = X-linked recessive."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_10",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following is an example of an X-linked recessive disorder?",options:["A hereditary unit of DNA that encodes a functional product","New mutation","Red-green color blindness","Loss of maternal contribution of region on chromosome 15"],answer:2,explanation:"\u0623\u0645\u062B\u0644\u0629 X-linked recessive: Red-green color blindness\u060C Duchenne MD\u060C Hemophilia A&B\u060C G6PD deficiency. \u0623\u0645\u0627 Marfan = AD\u060C Huntington = AD\u060C Cystic fibrosis = AR."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_11",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following is an X-linked recessive disorder?",options:["Duchenne Muscular Dystrophy","50% Affected","Variable expressivity","X-linked dominant disorders"],answer:0,explanation:"DMD \u0646\u0627\u062A\u062C \u0639\u0646 \u0637\u0641\u0631\u0629 \u0641\u064A \u062C\u064A\u0646 \u0627\u0644\u062F\u064A\u0633\u062A\u0631\u0648\u0641\u064A\u0646 \u0639\u0644\u0649 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 X. \u064A\u0635\u064A\u0628 \u0627\u0644\u0630\u0643\u0648\u0631 \u0628\u0634\u0643\u0644 \u0631\u0626\u064A\u0633\u064A. \u0627\u0644\u0625\u0646\u0627\u062B \u063A\u0627\u0644\u0628\u0627\u064B \u0646\u0627\u0642\u0644\u0627\u062A."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_12",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"What is the DNA sequence repeat associated with Huntington disease?",options:["Prader\u2013Willi syndrome","Mosaicism","Females are affected as well as males","CAG"],answer:3,explanation:"Huntington disease \u0646\u0627\u062A\u062C \u0639\u0646 \u062A\u0648\u0633\u0639 CAG repeats \u0641\u064A \u062C\u064A\u0646 HTT. \u0627\u0644\u0646\u0637\u0627\u0642 \u0627\u0644\u0637\u0628\u064A\u0639\u064A < 36 \u062A\u0643\u0631\u0627\u0631\u0627\u064B\u060C \u0648\u0627\u0644\u0645\u0631\u0636\u064A > 40 \u062A\u0643\u0631\u0627\u0631\u0627\u064B. (\u0645\u0646 L7 - Anticipation & Repeat Expansion)"},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_13",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which one is true for Huntington disease?",options:["50%","X-linked dominant","CAG, Disease range more than 40 repeats","Inherited almost exclusively from the oocyte"],answer:2,explanation:"Huntington: CAG repeats\u060C \u0627\u0644\u0646\u0637\u0627\u0642 \u0627\u0644\u0637\u0628\u064A\u0639\u064A 4-35\u060C \u0627\u0644\u0645\u0631\u0636\u064A > 40 \u062A\u0643\u0631\u0627\u0631\u0627\u064B. \u0647\u0648 \u0645\u062B\u0627\u0644 \u0639\u0644\u0649 Gain-of-function mutation \u0648Anticipation."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_14",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following best describes autosomal dominant inheritance in a pedigree?",options:["Cystic fibrosis","MELAS","Appears in every generation","Angelman syndrome and Prader-Willi syndrome"],answer:2,explanation:"\u0645\u0645\u064A\u0632\u0627\u062A AD \u0645\u0646 L5,6: - \u064A\u0638\u0647\u0631 \u0641\u064A \u0643\u0644 \u062C\u064A\u0644 (vertical transmission) - \u064A\u0635\u064A\u0628 \u0627\u0644\u062C\u0646\u0633\u064A\u0646 \u0628\u0627\u0644\u062A\u0633\u0627\u0648\u064A - Male-to-male transmission \u0645\u0645\u0643\u0646 - \u0646\u0633\u0628\u0629 \u0627\u0644\u0625\u0635\u0627\u0628\u0629 50% \u0644\u0643\u0644 \u062D\u0645\u0644 \u0645\u0646 \u0623\u062D\u062F \u0627\u0644\u0648\u0627\u0644\u062F\u064A\u0646 \u0627\u0644\u0645\u0635\u0627\u0628\u064A\u0646"},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_15",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"A 10-year-old boy came to the clinic with an autosomal dominant disorder with no family history. What is the explanation?",options:["New mutation","Females are affected as well as males","Angelman syndrome","Mitochondrial DNA"],answer:0,explanation:'\u0645\u0646 L12: "De novo variant is a new mutation that occurs in a germ cell (egg or sperm) of one of the parents, then passed on to an offspring." \u0623\u0645\u062B\u0644\u0629: Achondroplasia (80% de novo).'},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_16",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"A 10-year-old boy with a genetic disorder comes to the clinic. He has a similarly affected sister. His father and paternal grandmother are also affected. What is the recurrence risk?",options:["The normal individual has only one transcriptionally active gene","50% for each pregnancy","MELAS","X-linked dominant disorders"],answer:1,explanation:"Autosomal Dominant: \u0643\u0644 \u062D\u0645\u0644 \u0644\u0647 50% \u062E\u0637\u0631 \u0627\u0644\u0625\u0635\u0627\u0628\u0629\u060C \u0628\u0635\u0631\u0641 \u0627\u0644\u0646\u0638\u0631 \u0639\u0646 \u0646\u0648\u0639 \u0627\u0644\u062C\u0646\u064A\u0646."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_17",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"In autosomal recessive inheritance, what is the chance of being heterozygous unaffected (carrier)?",options:["Genome","50%","A hereditary unit of DNA that encodes a functional product","50% for each pregnancy"],answer:1,explanation:"\u0641\u064A \u062D\u0645\u0644 \u0628\u064A\u0646 \u0648\u0627\u0644\u062F\u064E\u064A\u0646 \u0646\u0627\u0642\u0644\u064E\u064A\u0646 (Aa \xD7 Aa): 25% AA (\u0637\u0628\u064A\u0639\u064A)\u060C 50% Aa (\u0646\u0627\u0642\u0644 \u063A\u064A\u0631 \u0645\u0635\u0627\u0628)\u060C 25% aa (\u0645\u0635\u0627\u0628). \u0625\u0630\u0646 \u0646\u0633\u0628\u0629 \u0627\u0644\u0646\u0627\u0642\u0644 = 50%."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_18",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following genetic mechanisms is known to cause Prader\u2013Willi syndrome?",options:["X-linked dominant disorders","Paternal chromosome 15 deletion","Angelman syndrome and Prader-Willi syndrome","Marfan syndrome"],answer:1,explanation:'\u0645\u0646 L7: "Loss of paternal contribution of region on chromosome 15 (15q11-q13) \u2192 Prader-Willi syndrome." \u0648\u064A\u0645\u0643\u0646 \u0623\u064A\u0636\u0627\u064B \u0623\u0646 \u064A\u0646\u062A\u062C \u0639\u0646 Maternal UPD.'},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_19",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"A 6-year-old male patient with seizure, intellectual disability, inappropriate laughter, microcephaly, unsteady gait, what is the most likely genetic mechanism?",options:["Loss of maternal contribution of region on chromosome 15","Oocyte","Mitochondrial inheritance","All daughters affected, none of the sons affected"],answer:0,explanation:"\u0647\u0630\u0647 \u0623\u0639\u0631\u0627\u0636 Angelman syndrome. \u0645\u0646 L7: Angelman = \u0641\u0642\u062F\u0627\u0646 \u0627\u0644\u0645\u0633\u0627\u0647\u0645\u0629 \u0627\u0644\u0623\u0645\u0648\u064A\u0629 \u0644\u0645\u0646\u0637\u0642\u0629 15q11-q13 (deletion \u0623\u0645\u0648\u064A\u0629 \u0623\u0648 UPD \u0623\u0628\u0648\u064A\u0629 \u0623\u0648 \u0637\u0641\u0631\u0629 \u0641\u064A UBE3A)."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_20",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"One of the following disorders is caused by a genetic imprinting defect leading to developmental delay, seizures, and a happy demeanor:",options:["A permanent change in the DNA sequence","Angelman syndrome","X-linked dominant","CAG"],answer:1,explanation:"Angelman syndrome: \u062A\u0623\u062E\u0631 \u0646\u0645\u0648\u060C \u0646\u0648\u0628\u0627\u062A \u0635\u0631\u0639\u060C \u0633\u0639\u0627\u062F\u0629 \u063A\u064A\u0631 \u0645\u0628\u0631\u0631\u0629 (happy demeanor)\u060C \u0635\u0639\u0648\u0628\u0629 \u0641\u064A \u0627\u0644\u062D\u0631\u0643\u0629. \u0633\u0628\u0628\u0647 \u0641\u0642\u062F\u0627\u0646 \u0627\u0644\u062A\u0639\u0628\u064A\u0631 \u0627\u0644\u062C\u064A\u0646\u064A \u0627\u0644\u0623\u0645\u0648\u064A \u0644\u0645\u0646\u0637\u0642\u0629 15q11-q13."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_21",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"A male presents with dysmorphic facial features, almond-shaped eyes, small hands and feet, hyperphagia, short stature, and obesity. What is the most likely diagnosis?",options:["Prader\u2013Willi syndrome","50% for each pregnancy","MELAS","Mitochondrial DNA"],answer:0,explanation:"\u0627\u0644\u0633\u0645\u0627\u062A \u0627\u0644\u0643\u0644\u0627\u0633\u064A\u0643\u064A\u0629 \u0644\u0640 PWS: \u0639\u064A\u0648\u0646 \u0628\u0627\u0644\u0644\u0648\u0632\u060C \u0623\u064A\u062F\u064A \u0648\u0623\u0642\u062F\u0627\u0645 \u0635\u063A\u064A\u0631\u0629\u060C \u0634\u0647\u064A\u0629 \u0645\u0641\u0631\u0637\u0629\u060C \u0642\u0635\u0631 \u0627\u0644\u0642\u0627\u0645\u0629\u060C \u0633\u0645\u0646\u0629\u060C \u0646\u0642\u0635 \u0627\u0644\u062A\u0648\u062A\u0631 \u0627\u0644\u0639\u0636\u0644\u064A."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_22",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"A 6-year-old female presents with hyperphagia and short stature. Clinical examination reveals obesity and dysmorphic features, including almond-shaped eyes and small hands and feet. What is the most likely diagnosis?",options:["Paternal chromosome 15 deletion","Prader\u2013Willi syndrome","Angelman syndrome","Oocyte"],answer:1,explanation:""},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_23",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"The normal individual will have only one transcriptionally active copy of the gene. What is the most common explanation of this process of gene silencing?",options:["X-linked dominant disorders","Mitochondrial DNA","Genomic imprinting","X-linked dominant"],answer:2,explanation:"\u0645\u0646 L7: Genomic imprinting \u0647\u0648 \u0639\u0645\u0644\u064A\u0629 \u064A\u062A\u0645 \u0641\u064A\u0647\u0627 \u0627\u0644\u062A\u0639\u0628\u064A\u0631 \u0639\u0646 \u0646\u0633\u062E\u0629 \u0648\u0627\u062D\u062F\u0629 \u0645\u0646 \u0627\u0644\u062C\u064A\u0646 \u0641\u0642\u0637 (\u0625\u0645\u0627 \u0627\u0644\u0623\u0628\u0648\u064A\u0629 \u0623\u0648 \u0627\u0644\u0623\u0645\u0648\u064A\u0629) \u0628\u0633\u0628\u0628 methylation epigenetic."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_24",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Genomic imprinting considered if:",options:["Gonadal mosaicism","The normal individual has only one transcriptionally active gene","Heteroplasmy","Paternal chromosome 15 deletion"],answer:1,explanation:"\u0647\u0630\u0627 \u0647\u0648 \u062A\u0639\u0631\u064A\u0641 Genomic imprinting - \u064A\u0639\u0628\u0651\u0631 \u0639\u0646 \u0646\u0633\u062E\u0629 \u0648\u0627\u062D\u062F\u0629 \u0641\u0642\u0637 \u0645\u0646 \u0627\u0644\u062C\u064A\u0646 \u0628\u0634\u0643\u0644 \u0637\u0628\u064A\u0639\u064A."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_25",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following is an example of genomic imprinting?",options:["Angelman syndrome and Prader-Willi syndrome","Heteroplasmy","Variable expression","A permanent change in the DNA sequence"],answer:0,explanation:"\u0643\u0644\u0627\u0647\u0645\u0627 \u0646\u0627\u062A\u062C \u0639\u0646 \u062A\u0623\u062B\u0631 \u0646\u0641\u0633 \u0627\u0644\u0645\u0646\u0637\u0642\u0629 (15q11-q13) \u0644\u0643\u0646 \u0628\u0622\u0644\u064A\u0629 imprinting \u0645\u062E\u062A\u0644\u0641\u0629: PWS (\u0641\u0642\u062F\u0627\u0646 \u0623\u0628\u0648\u064A) \u0648AS (\u0641\u0642\u062F\u0627\u0646 \u0623\u0645\u0648\u064A)."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_26",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following describes the presence of two types of mitochondrial DNA (normal and abnormal)?",options:["Pleiotropy","50% for each pregnancy","Heteroplasmy","Duchenne Muscular Dystrophy"],answer:2,explanation:'\u0645\u0646 L7: "If a variant occurs in the mitochondrial DNA of an individual, having a mixture of normal and abnormal mitochondrial DNA \u2192 termed heteroplasmy." \u0623\u0645\u0627 Homoplasmy = \u0643\u0644 \u062C\u0632\u064A\u0626\u0627\u062A mtDNA \u0645\u062A\u0637\u0627\u0628\u0642\u0629.'},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_27",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Marfan syndrome is an example of?",options:["CAG, Disease range more than 40 repeats","X-linked dominant disorders","Pleiotropy","A permanent change in the DNA sequence"],answer:2,explanation:"Marfan \u064A\u0624\u062B\u0631 \u0639\u0644\u0649 \u0623\u0646\u0638\u0645\u0629 \u0645\u062A\u0639\u062F\u062F\u0629 \u0628\u0633\u0628\u0628 \u062C\u064A\u0646 \u0648\u0627\u062D\u062F (FBN1): \u0642\u0644\u0628\u060C \u0639\u0638\u0627\u0645\u060C \u0639\u064A\u0648\u0646."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_28",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following is true about mitochondrial DNA?",options:["Angelman syndrome","The normal individual has only one transcriptionally active gene","Inherited almost exclusively from the oocyte","CAG, Disease range more than 40 repeats"],answer:2,explanation:'\u0645\u0646 L7: "In most persons, the mitochondrial DNA from the sperm is excluded after fertilization \u2192 Mitochondrial inheritance is maternal." \u0627\u0644\u0640 mtDNA \u062F\u0627\u0626\u0631\u064A \u0648\u0644\u064A\u0633 \u062E\u0637\u064A\u0627\u064B\u060C \u0648\u064A\u0631\u0645\u0651\u0632 \u0644\u0640 37 \u062C\u064A\u0646\u0627\u064B (\u0648\u0644\u064A\u0633 70).'},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_29",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"From which cell are mitochondrial diseases transmitted to offspring?",options:["Prader\u2013Willi syndrome","X-linked dominant","Red-green color blindness","Oocyte"],answer:3,explanation:"\u0627\u0644\u0645\u064A\u062A\u0648\u0643\u0648\u0646\u062F\u0631\u064A\u0627 \u062A\u0646\u062A\u0642\u0644 \u0645\u0646 \u0627\u0644\u0623\u0645 \u0639\u0628\u0631 \u0627\u0644\u0628\u0648\u064A\u0636\u0629. \u0627\u0644\u062D\u064A\u0648\u0627\u0646 \u0627\u0644\u0645\u0646\u0648\u064A \u064A\u0641\u0642\u062F \u0645\u064A\u062A\u0648\u0643\u0648\u0646\u062F\u0631\u064A\u0627\u0647 \u0628\u0639\u062F \u0627\u0644\u0625\u062E\u0635\u0627\u0628."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_30",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following is an example of matrilineal inheritance?",options:["MELAS","Prader\u2013Willi syndrome","Gonadal mosaicism","Cystic fibrosis"],answer:0,explanation:"MELAS \u0647\u0648 \u0645\u0631\u0636 \u0645\u064A\u062A\u0648\u0643\u0648\u0646\u062F\u0631\u064A \u064A\u0646\u062A\u0642\u0644 \u0639\u0628\u0631 \u0627\u0644\u0623\u0645 \u0641\u0642\u0637. Cystic fibrosis = AR\u060C Achondroplasia = AD\u060C Rett = X-linked."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_31",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Matrilineal inheritance applies to disorders that are directly due to mutations in which of the following?",options:["X-linked dominant disorders","Mitochondrial DNA","50%","CAG"],answer:1,explanation:""},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_32",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following describes the presence of two or more different chromosomal cell lines within the same individual?",options:["Mosaicism","Females are affected as well as males","Paternal chromosome 15 deletion","Pleiotropy"],answer:0,explanation:"\u0645\u0646 L7: Mosaicism = \u0648\u062C\u0648\u062F \u062E\u0637\u064E\u0651\u064A\u0646 \u062E\u0644\u0648\u064A\u064E\u0651\u064A\u0646 \u0623\u0648 \u0623\u0643\u062B\u0631 \u062A\u062E\u062A\u0644\u0641 \u0641\u064A \u062A\u0631\u0643\u064A\u0628\u0647\u0627 \u0627\u0644\u062C\u064A\u0646\u064A \u0648\u0644\u0643\u0646\u0647\u0627 \u0646\u0634\u0623\u062A \u0645\u0646 \u0646\u0641\u0633 \u0627\u0644\u0640 zygote."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_33",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Parents are phenotypically normal but have two children with an autosomal dominant disease. What is the most likely explanation?",options:["Gonadal mosaicism","Genomic imprinting","Prader\u2013Willi syndrome","Angelman syndrome and Prader-Willi syndrome"],answer:0,explanation:"\u0645\u0646 L7: Gonadal mosaicism = \u0637\u0641\u0631\u0629 \u062A\u062D\u062F\u062B \u0641\u064A \u062E\u0644\u0627\u064A\u0627 \u0627\u0644\u062C\u0647\u0627\u0632 \u0627\u0644\u062A\u0646\u0627\u0633\u0644\u064A \u0641\u0642\u0637\u060C \u0644\u0630\u0644\u0643 \u064A\u0628\u062F\u0648 \u0627\u0644\u0648\u0627\u0644\u062F\u0627\u0646 \u0637\u0628\u064A\u0639\u064A\u064E\u0651\u064A\u0646 \u0644\u0643\u0646\u0647\u0645\u0627 \u064A\u0645\u0643\u0646 \u0623\u0646 \u064A\u0646\u0642\u0644\u0627 \u0627\u0644\u0637\u0641\u0631\u0629 \u0644\u0623\u0643\u062B\u0631 \u0645\u0646 \u0637\u0641\u0644."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_34",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"The severity of a genetic disease varies among individuals within the same family. What is the most likely explanation?",options:["Variable expression","X-linked dominant disorders","Variable expressivity","Females are affected as well as males"],answer:2,explanation:"Variable expressivity = \u062A\u0628\u0627\u064A\u0646 \u0641\u064A \u0634\u062F\u0629 \u0627\u0644\u062A\u0639\u0628\u064A\u0631 \u0639\u0646 \u0646\u0641\u0633 \u0627\u0644\u062C\u064A\u0646 \u0628\u064A\u0646 \u0623\u0641\u0631\u0627\u062F \u0627\u0644\u0639\u0627\u0626\u0644\u0629 \u0645\u0639 \u0646\u0641\u0633 \u0627\u0644\u0637\u0641\u0631\u0629. (\u0645\u062E\u062A\u0644\u0641 \u0639\u0646 Penetrance \u0627\u0644\u0630\u064A \u064A\u0639\u0646\u064A \u0648\u062C\u0648\u062F/\u063A\u064A\u0627\u0628 \u0627\u0644\u0641\u064A\u0646\u0648\u062A\u0627\u064A\u0628)."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_35",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"A child is diagnosed with NF1 and presents with multiple caf\xE9-au-lait spots and optic glioma. His mother also has NF1 but only mild hearing impairment and Lisch nodules. Which genetic concept best explains the difference?",options:["50%","Variable expressivity","All daughters affected, none of the sons affected","Marfan syndrome"],answer:1,explanation:"\u0646\u0641\u0633 \u0627\u0644\u0637\u0641\u0631\u0629 \u0641\u064A NF1 \u0644\u0643\u0646 \u0628\u062F\u0631\u062C\u0627\u062A \u0645\u062E\u062A\u0644\u0641\u0629 \u0645\u0646 \u0627\u0644\u062A\u0639\u0628\u064A\u0631 \u0627\u0644\u062C\u064A\u0646\u064A \u0628\u064A\u0646 \u0627\u0644\u0623\u0645 \u0648\u0627\u0644\u0637\u0641\u0644."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_36",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"A 10-year-old boy came to the genetic clinic. Family history revealed a similarly affected sister. His father and paternal grandmother have moderate manifestations. Why did his father and paternal grandmother develop moderate manifestations?",options:["Gonadal mosaicism","Variable expression","Prader\u2013Willi syndrome","Mitochondrial DNA"],answer:1,explanation:""},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_37",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"What is the recurrence risk per each pregnancy in X-linked dominant inheritance?",options:["Allele","50% Affected","50%","Inherited almost exclusively from the oocyte"],answer:2,explanation:"\u0641\u064A X-linked dominant: \u0627\u0644\u0645\u0631\u064A\u0636 \u0627\u0644\u0645\u0635\u0627\u0628 (\u0630\u0643\u0631 \u0623\u0648 \u0623\u0646\u062B\u0649) \u064A\u0646\u0642\u0644 \u0627\u0644\u0645\u0631\u0636 \u0644\u0640 50% \u0645\u0646 \u0623\u0628\u0646\u0627\u0626\u0647 \u0628\u0635\u0631\u0641 \u0627\u0644\u0646\u0638\u0631 \u0639\u0646 \u062C\u0646\u0633\u0647\u0645."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_38",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"An affected male transmits the disease to all of his daughters but none of his sons. This pattern is most consistent with:",options:["Variable expressivity","X-linked dominant disorders","X-linked dominant","All daughters affected, none of the sons affected"],answer:1,explanation:"\u0627\u0644\u0623\u0628 \u0627\u0644\u0645\u0635\u0627\u0628 \u0628\u0640 X-linked dominant \u064A\u0646\u0642\u0644 X \u0627\u0644\u0645\u0635\u0627\u0628 \u0644\u0643\u0644 \u0628\u0646\u0627\u062A\u0647 (\u0641\u064A\u0635\u0628\u062D\u0646 \u0645\u0635\u0627\u0628\u0627\u062A) \u0648\u0644\u0627 \u064A\u0635\u0644 \u0644\u0623\u0628\u0646\u0627\u0626\u0647 \u0627\u0644\u0630\u0643\u0648\u0631 (\u064A\u0623\u062E\u0630\u0648\u0646 Y \u0645\u0646 \u0627\u0644\u0623\u0628)."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_39",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"A male (46 chromosomes) is affected with an X-linked dominant disorder and wants to get married. What is the recurrence risk for his children?",options:["All daughters affected, none of the sons affected","A hereditary unit of DNA that encodes a functional product","X-linked dominant disorders","Mitochondrial inheritance"],answer:0,explanation:""},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_40",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"What is the type of disorder is Hypophosphatemic Rickets (Vitamin D resistance rickets)?",options:["50%","Genomic imprinting","X-linked dominant","Inherited almost exclusively from the oocyte"],answer:2,explanation:"Hypophosphatemic rickets = X-linked dominant. \u064A\u0635\u064A\u0628 \u0627\u0644\u0625\u0646\u0627\u062B \u0648\u0627\u0644\u0630\u0643\u0648\u0631 \u0644\u0643\u0646 \u0623\u0634\u062F \u0641\u064A \u0627\u0644\u0630\u0643\u0648\u0631 \u0641\u064A \u0628\u0639\u0636 \u0627\u0644\u062D\u0627\u0644\u0627\u062A."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_41",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"A father is affected with an X-linked dominant disorder. Which of the following is true?",options:["Females are affected as well as males","Variable expression","Mosaicism","Heteroplasmy"],answer:0,explanation:"X-linked dominant \u064A\u0635\u064A\u0628 \u0627\u0644\u062C\u0646\u0633\u064A\u0646\u060C \u0648\u0628\u0646\u0627\u062A \u0627\u0644\u0623\u0628 \u0627\u0644\u0645\u0635\u0627\u0628 \u0643\u0644\u0647\u0646 \u0645\u0635\u0627\u0628\u0627\u062A."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_42",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following describes the presence of two or more different chromosomal cell lines?",options:["Mosaicism","Red-green color blindness","X-linked dominant disorders","Duchenne Muscular Dystrophy"],answer:0,explanation:""},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_43",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"There was a family with a child diagnosed with sickle cell anemia. What is the recurrence risk?",options:["Oocyte","Genome","New mutation","50% Affected"],answer:3,explanation:""},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_44",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"A child presents with muscle weakness, neurological symptoms, affecting multiple siblings from the same mother. Father is unaffected.",options:["The normal individual has only one transcriptionally active gene","Variable expressivity","Duchenne Muscular Dystrophy","Mitochondrial inheritance"],answer:3,explanation:"\u0627\u0644\u0627\u0646\u062A\u0642\u0627\u0644 \u0645\u0646 \u0627\u0644\u0623\u0645 \u0641\u0642\u0637\u060C \u0627\u0644\u0623\u0628 \u063A\u064A\u0631 \u0645\u0635\u0627\u0628 \u0648\u0644\u0627 \u064A\u0648\u0631\u0651\u062B = Mitochondrial inheritance."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_45",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"Which of the following is correct about Autosomal recessive trait?",options:["Marfan syndrome","Allele","New mutation","Skip generations"],answer:3,explanation:"AR \u064A\u0645\u0643\u0646 \u0623\u0646 \u064A\u062A\u062E\u0637\u0649 \u0627\u0644\u0623\u062C\u064A\u0627\u0644 \u0644\u0623\u0646 \u0627\u0644\u0646\u0627\u0642\u0644\u064A\u0646 \u0644\u0627 \u064A\u064F\u0638\u0647\u0631\u0648\u0646 \u0627\u0644\u0645\u0631\u0636."},{id:"mid1_mid1_L1_Introduction_Mendelian_Inheritance_46",exam:"mid1",lecture:"L1 Introduction Mendelian Inheritance",q:"In autosomal recessive inheritance, what is the chance of being heterozygous unaffected (carrier)?",options:["Variable expression","50%","Mosaicism","Marfan syndrome"],answer:1,explanation:""},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_1",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"What is the number of autosomes in a male gamete?",options:["46,XX","Peripheral blood","22","Prader-Willi syndrome"],answer:2,explanation:"\u0645\u0646 L2: \u0627\u0644\u062E\u0644\u064A\u0629 \u0627\u0644\u062C\u0631\u062B\u0648\u0645\u064A\u0629 (gamete) \u062A\u062D\u062A\u0648\u064A \u0639\u0644\u0649 23 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u064B: 22 autosome + 1 sex chromosome (X \u0623\u0648 Y). \u0625\u0630\u0646 \u0639\u062F\u062F \u0627\u0644\u0640 autosomes \u0641\u064A \u0627\u0644\u062E\u0644\u064A\u0629 \u0627\u0644\u062C\u0631\u062B\u0648\u0645\u064A\u0629 = 22."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_2",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"What is the normal karyotype of a healthy female?",options:["RBCs","22","Chromosome 14","46,XX"],answer:3,explanation:"\u0627\u0644\u0623\u0646\u062B\u0649 \u0627\u0644\u0637\u0628\u064A\u0639\u064A\u0629: 46,XX. \u0627\u0644\u0630\u0643\u0631 \u0627\u0644\u0637\u0628\u064A\u0639\u064A: 46,XY. (L2)"},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_3",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Which of the following chromosomes is classified as metacentric?",options:["A structurally abnormal chromosome in which the ends of each chromosome arm have been lost and the broken arms have been reunited to form a ring","Helicase","Chromosome 3","Peripheral blood"],answer:2,explanation:'\u0645\u0646 L2: "Metacentric chromosomes: 1, 3, 16, 19, 20" \u2014 \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 \u0645\u0631\u0643\u0632\u064A \u0639\u0646\u062F\u0645\u0627 \u064A\u0643\u0648\u0646 \u0627\u0644\u0640 centromere \u0641\u064A \u0627\u0644\u0645\u0646\u062A\u0635\u0641 (p arm \u2248 q arm).'},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_4",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"What is the primary function of the centromere?",options:["Interphase","A structurally abnormal chromosome in which the ends of each chromosome arm have been lost and the broken arms have been reunited to form a ring","To allow attachment of spindle microtubules during cell division","Division of centromere and chromatids will separate during anaphase"],answer:2,explanation:"\u0645\u0646 L2: \u0627\u0644\u0640 centromere \u064A\u062A\u0635\u0644 \u0628\u062E\u064A\u0648\u0637 \u0627\u0644\u0645\u063A\u0632\u0644 (spindle microtubules) \u0623\u062B\u0646\u0627\u0621 \u0627\u0644\u0627\u0646\u0642\u0633\u0627\u0645 \u0627\u0644\u062E\u0644\u0648\u064A \u0644\u0636\u0645\u0627\u0646 \u062A\u0648\u0632\u064A\u0639 \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A \u0628\u0634\u0643\u0644 \u0635\u062D\u064A\u062D \u0639\u0644\u0649 \u0627\u0644\u062E\u0644\u0627\u064A\u0627 \u0627\u0644\u0648\u0644\u064A\u062F\u0629."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_5",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Which chromosome is considered a satellite chromosome?",options:["Helicase","Telomeres","Chromosome 7 long arm, first region, fifth band","Chromosome 14"],answer:3,explanation:"\u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A \u0627\u0644\u0640 acrocentric (13, 14, 15, 21, 22) \u062A\u062D\u062A\u0648\u064A \u0639\u0644\u0649 satellites (\u0628\u064F\u0646\u0649 \u0635\u063A\u064A\u0631\u0629 \u062A\u0634\u0628\u0647 \u0627\u0644\u0645\u0644\u062D\u0642) \u0639\u0646\u062F \u0627\u0644\u0630\u0631\u0627\u0639 \u0627\u0644\u0642\u0635\u064A\u0631. \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 14 \u0645\u0646 \u0647\u0630\u0647 \u0627\u0644\u0645\u062C\u0645\u0648\u0639\u0629."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_6",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Which chromosome has an appendage-like structure (satellite)?",options:["Helicase","Chromosome 7 long arm, first region, fifth band","Chromosome 14","Peripheral blood"],answer:2,explanation:"\u0627\u0644\u0640 satellites \u0645\u0648\u062C\u0648\u062F\u0629 \u0639\u0644\u0649 \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A \u0627\u0644\u0640 acrocentric: 13, 14, 15, 21, 22."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_7",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"What does the cytogenetic notation 7q15 indicate?",options:["Telomeres","Prader-Willi syndrome","Chromosome 3","Chromosome 7 long arm, first region, fifth band"],answer:3,explanation:"\u0645\u0646 L2: q = \u0627\u0644\u0630\u0631\u0627\u0639 \u0627\u0644\u0637\u0648\u064A\u0644 (long arm)\u060C 1 = region 1\u060C 5 = band 5. \u0625\u0630\u0646 7q15 = \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 7\u060C \u0627\u0644\u0630\u0631\u0627\u0639 \u0627\u0644\u0637\u0648\u064A\u0644\u060C \u0627\u0644\u0645\u0646\u0637\u0642\u0629 1\u060C \u0627\u0644\u062D\u0632\u0645\u0629 5."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_8",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Loss of the paternal chromosome segment 15q11\u2013q13 leads to which condition?",options:["Telomeres","RBCs","Peripheral blood","Prader-Willi syndrome"],answer:3,explanation:"\u0645\u0646 L7: Prader-Willi = \u0641\u0642\u062F\u0627\u0646 \u0627\u0644\u0645\u0633\u0627\u0647\u0645\u0629 \u0627\u0644\u0623\u0628\u0648\u064A\u0629 \u0644\u0645\u0646\u0637\u0642\u0629 15q11-q13. Angelman = \u0641\u0642\u062F\u0627\u0646 \u0627\u0644\u0645\u0633\u0627\u0647\u0645\u0629 \u0627\u0644\u0623\u0645\u0648\u064A\u0629 \u0644\u0646\u0641\u0633 \u0627\u0644\u0645\u0646\u0637\u0642\u0629."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_9",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Which enzyme is responsible for unwinding DNA during replication?",options:["Chromosome 14","Chromosome 3","RBCs","Helicase"],answer:3,explanation:'\u0645\u0646 L3: "Helicase; facilitates the unwinding of the parent DNA strand." \u0623\u0645\u0627 Ligase \u064A\u0631\u0628\u0637\u060C DNA polymerase \u064A\u0636\u064A\u0641 nucleotides\u060C RNA polymerase \u064A\u0635\u0646\u0639 RNA.'},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_10",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"A chromosome ideogram shows bands. Which region is closest to the telomere?",options:["Prader-Willi syndrome","Helicase","Interphase","Xq28"],answer:3,explanation:"\u0643\u0644\u0645\u0627 \u0627\u0631\u062A\u0641\u0639 \u0631\u0642\u0645 \u0627\u0644\u062D\u0632\u0645\u0629 \u0643\u0644\u0645\u0627 \u0643\u0627\u0646 \u0623\u0628\u0639\u062F \u0639\u0646 \u0627\u0644\u0640 centromere \u0648\u0623\u0642\u0631\u0628 \u0644\u0644\u0640 telomere. \u0625\u0630\u0646 Xq28 > Xq26 > Xq21 > Xq12."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_11",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"What is responsible for the integrity of the chromosome during the cell cycle and its loss would result in the formation of a ring chromosome?",options:["RBCs","Prader-Willi syndrome","Telomeres","Chromosome 14"],answer:2,explanation:'\u0645\u0646 L2: "Telomeres play a crucial role in sealing the ends of chromosomes." \u0641\u0642\u062F\u0627\u0646 \u0627\u0644\u0640 telomeres \u064A\u0624\u062F\u064A \u0625\u0644\u0649 \u0627\u0644\u062A\u0635\u0627\u0642 \u0646\u0647\u0627\u064A\u0627\u062A \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A \u0645\u0639\u0627\u064B \u0645\u0645\u0627 \u064A\u0634\u0643\u0651\u0644 ring chromosome.'},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_12",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Regarding the cell cycle, the resting phase is?",options:["Peripheral blood","Interphase","A chromosome of the same size and shape which carries the same type of genes","Division of centromere and chromatids will separate during anaphase"],answer:1,explanation:"\u0627\u0644\u0640 Interphase \u0647\u064A \u0627\u0644\u0645\u0631\u062D\u0644\u0629 \u0628\u064A\u0646 \u0627\u0644\u0627\u0646\u0642\u0633\u0627\u0645\u0627\u062A \u0627\u0644\u062E\u0644\u0648\u064A\u0629 \u0648\u062A\u0634\u0645\u0644 G1, S, G2. \u0641\u064A \u0647\u0630\u0647 \u0627\u0644\u0645\u0631\u062D\u0644\u0629 \u062A\u0633\u062A\u0639\u062F \u0627\u0644\u062E\u0644\u064A\u0629 \u0644\u0644\u0627\u0646\u0642\u0633\u0627\u0645 \u0648\u062A\u0646\u0633\u062E DNA."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_13",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Which of the following is true about mitosis?",options:["A chromosome of the same size and shape which carries the same type of genes","Division of centromere and chromatids will separate during anaphase","RBCs","22"],answer:1,explanation:"\u0641\u064A Anaphase \u0644\u0644\u0640 Mitosis\u060C \u064A\u062A\u0642\u0633\u0645 \u0627\u0644\u0640 centromere \u0648\u062A\u0646\u0641\u0635\u0644 \u0627\u0644\u0640 chromatids. \u0641\u064A Meiosis I \u062A\u0646\u0641\u0635\u0644 \u0623\u0632\u0648\u0627\u062C \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_14",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Give the definition of homologous chromosome:",options:["RBCs","A chromosome of the same size and shape which carries the same type of genes","22","A structurally abnormal chromosome in which the ends of each chromosome arm have been lost and the broken arms have been reunited to form a ring"],answer:1,explanation:"\u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A \u0627\u0644\u0645\u062A\u0645\u0627\u062B\u0644\u0629 (homologous chromosomes) \u062A\u062A\u0634\u0627\u0628\u0647 \u0641\u064A \u0627\u0644\u062D\u062C\u0645 \u0648\u0627\u0644\u0634\u0643\u0644 \u0648\u062A\u062D\u0645\u0644 \u0646\u0641\u0633 \u0623\u0646\u0648\u0627\u0639 \u0627\u0644\u062C\u064A\u0646\u0627\u062A (\u0644\u0643\u0646 \u0642\u062F \u062A\u0643\u0648\u0646 alleles \u0645\u062E\u062A\u0644\u0641\u0629)."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_15",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Give the definition of Ring chromosome:",options:["A chromosome of the same size and shape which carries the same type of genes","RBCs","22","A structurally abnormal chromosome in which the ends of each chromosome arm have been lost and the broken arms have been reunited to form a ring"],answer:3,explanation:""},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_16",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Which of the following samples is suitable for karyotype analysis?",options:["Peripheral blood","Chromosome 3","Xq28","To allow attachment of spindle microtubules during cell division"],answer:0,explanation:"\u0627\u0644\u062F\u0645 \u0627\u0644\u0645\u062D\u064A\u0637\u064A (lymphocytes) \u0647\u0648 \u0627\u0644\u0645\u0635\u062F\u0631 \u0627\u0644\u0623\u0643\u062B\u0631 \u0627\u0633\u062A\u062E\u062F\u0627\u0645\u0627\u064B \u0644\u0644\u062A\u062D\u0644\u064A\u0644 \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u064A. \u0627\u0644\u0628\u0648\u0644 \u0648\u0627\u0644\u0631\u064A\u0642 \u0648\u0627\u0644\u0628\u0631\u0627\u0632 \u0644\u0627 \u062A\u064F\u0633\u062A\u062E\u062F\u0645 \u0639\u0627\u062F\u0629\u064B."},{id:"mid1_mid1_L2_Chromosomes_Normal_Structure_17",exam:"mid1",lecture:"L2 Chromosomes Normal Structure",q:"Which cell can't be used for chromosomal analysis?",options:["Xq28","Division of centromere and chromatids will separate during anaphase","A structurally abnormal chromosome in which the ends of each chromosome arm have been lost and the broken arms have been reunited to form a ring","RBCs"],answer:3,explanation:"\u0643\u0631\u064A\u0627\u062A \u0627\u0644\u062F\u0645 \u0627\u0644\u062D\u0645\u0631\u0627\u0621 \u0627\u0644\u0646\u0627\u0636\u062C\u0629 \u0644\u0627 \u062A\u062D\u062A\u0648\u064A \u0639\u0644\u0649 \u0646\u0648\u0627\u0629\u060C \u0644\u0630\u0644\u0643 \u0644\u0627 \u064A\u0645\u0643\u0646 \u062A\u062D\u0644\u064A\u0644 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A\u0647\u0627. \u0623\u0645\u0627 WBCs \u0648\u062E\u0644\u0627\u064A\u0627 \u0627\u0644\u062C\u0644\u062F \u0648\u0627\u0644\u0643\u0628\u062F \u0641\u0644\u0647\u0627 \u0623\u0646\u0648\u064A\u0629."},{id:"mid1_mid1_L3_Central_Dogma_of_Molecular_Biology_1",exam:"mid1",lecture:"L3 Central Dogma of Molecular Biology",q:"Where does protein synthesis occur in the cell?",options:["3' end of the tRNA","Ribosome","Helicase","Protects mRNA from degradation"],answer:1,explanation:'\u0645\u0646 L3: "Ribosomes" \u0647\u064A \u0645\u0648\u0642\u0639 \u062A\u0631\u062C\u0645\u0629 mRNA \u0625\u0644\u0649 \u0628\u0631\u0648\u062A\u064A\u0646. \u0627\u0644\u0646\u0648\u0627\u0629 \u0645\u0648\u0642\u0639 \u0627\u0644\u0646\u0633\u062E (transcription) \u0648\u0644\u064A\u0633 \u0627\u0644\u062A\u0631\u062C\u0645\u0629.'},{id:"mid1_mid1_L3_Central_Dogma_of_Molecular_Biology_2",exam:"mid1",lecture:"L3 Central Dogma of Molecular Biology",q:"During which process is mRNA produced?",options:["CTA GTA GTAG","It is not universal for all organisms","AAUAAA","Transcription"],answer:3,explanation:"\u0645\u0646 L3: \u0627\u0644\u0645\u0639\u0644\u0648\u0645\u0629 \u0627\u0644\u062C\u064A\u0646\u064A\u0629 \u062A\u0633\u064A\u0631: DNA \u2192 RNA (\u0639\u0628\u0631 Transcription) \u2192 Protein (\u0639\u0628\u0631 Translation). mRNA \u062A\u064F\u0646\u062A\u062C \u0623\u062B\u0646\u0627\u0621 Transcription."},{id:"mid1_mid1_L3_Central_Dogma_of_Molecular_Biology_3",exam:"mid1",lecture:"L3 Central Dogma of Molecular Biology",q:"What are the main structural components of a gene?",options:["Spliced out of the introns during mRNA processing","Transcription","Exons, introns, and regulatory sequences such as promoters","AAUAAA"],answer:2,explanation:'\u0645\u0646 L1: "Genes are made up of promoter regions and alternating regions of introns (noncoding sequences) and exons (coding sequences)."'},{id:"mid1_mid1_L3_Central_Dogma_of_Molecular_Biology_4",exam:"mid1",lecture:"L3 Central Dogma of Molecular Biology",q:"The addition of a poly-A tail to mRNA serves which of the following functions?",options:["Protects mRNA from degradation","3' end of the tRNA","Exons, introns, and regulatory sequences such as promoters","Helicase"],answer:0,explanation:"\u0627\u0644\u0640 poly-A tail (\u0630\u064A\u0644 \u0627\u0644\u0640 poly-A) \u0641\u064A \u0646\u0647\u0627\u064A\u0629 \u0627\u0644\u0640 3' \u0645\u0646 mRNA \u064A\u062D\u0645\u064A \u0627\u0644\u0640 mRNA \u0645\u0646 \u0627\u0644\u062A\u062D\u0644\u0644 \u0627\u0644\u0625\u0646\u0632\u064A\u0645\u064A \u0648\u064A\u0633\u0627\u0639\u062F \u0641\u064A \u0646\u0642\u0644\u0647 \u0645\u0646 \u0627\u0644\u0646\u0648\u0627\u0629."},{id:"mid1_mid1_L3_Central_Dogma_of_Molecular_Biology_5",exam:"mid1",lecture:"L3 Central Dogma of Molecular Biology",q:"Which is the sequence of poly-A tail that is attached to mRNA?",options:["AAUAAA","CTA GTA GTAG","Transcription","Helicase"],answer:0,explanation:"AAUAAA \u0647\u064A \u0625\u0634\u0627\u0631\u0629 \u0627\u0644\u0640 polyadenylation \u0627\u0644\u062A\u064A \u062A\u064F\u0634\u064A\u0631 \u0625\u0644\u0649 \u0645\u0643\u0627\u0646 \u0625\u0636\u0627\u0641\u0629 \u0627\u0644\u0640 poly-A tail. (\u0645\u0644\u0627\u062D\u0638\u0629: AATAAA \u0647\u064A \u0646\u0641\u0633 \u0627\u0644\u062A\u0633\u0644\u0633\u0644 \u0641\u064A DNA\u060C AAUAAA \u0641\u064A RNA)"},{id:"mid1_mid1_L3_Central_Dogma_of_Molecular_Biology_6",exam:"mid1",lecture:"L3 Central Dogma of Molecular Biology",q:"The mRNA sequence TAG TAG TAG. If we add cytosine at the beginning, what will be the new sequence?",options:["CTA GTA GTAG","3' end of the tRNA","Ribosome","Protects mRNA from degradation"],answer:0,explanation:"\u0625\u0636\u0627\u0641\u0629 C \u0641\u064A \u0627\u0644\u0628\u062F\u0627\u064A\u0629 \u062A\u064F\u062D\u0631\u0643 \u0625\u0637\u0627\u0631 \u0627\u0644\u0642\u0631\u0627\u0621\u0629 (reading frame shift): CTA-GTA-GTA-G. \u0647\u0630\u0627 \u0645\u062B\u0627\u0644 \u0639\u0644\u0649 frameshift mutation."},{id:"mid1_mid1_L3_Central_Dogma_of_Molecular_Biology_7",exam:"mid1",lecture:"L3 Central Dogma of Molecular Biology",q:"It has been recently determined that the gene for DMD is over 2000 kb in length, however the mRNA produced is only about 14 kb. What is a likely cause?",options:["Exons, introns, and regulatory sequences such as promoters","Spliced out of the introns during mRNA processing","AAUAAA","Ribosome"],answer:1,explanation:"\u0627\u0644\u0640 introns \u062A\u064F\u0632\u0627\u0644 (spliced out) \u0623\u062B\u0646\u0627\u0621 \u0645\u0639\u0627\u0644\u062C\u0629 mRNA \u0641\u064A \u0627\u0644\u0646\u0648\u0627\u0629\u060C \u0645\u0645\u0627 \u064A\u064F\u0646\u062A\u062C mRNA \u0623\u0642\u0635\u0631 \u0628\u0643\u062B\u064A\u0631 \u0645\u0646 \u0627\u0644\u062C\u064A\u0646 \u0627\u0644\u0623\u0635\u0644\u064A."},{id:"mid1_mid1_L3_Central_Dogma_of_Molecular_Biology_8",exam:"mid1",lecture:"L3 Central Dogma of Molecular Biology",q:"What enzyme is used to unwind the double helix of DNA? (in context of FISH/L3 question)",options:["Exons, introns, and regulatory sequences such as promoters","3' end of the tRNA","Helicase","Spliced out of the introns during mRNA processing"],answer:2,explanation:""},{id:"mid1_mid1_L3_Central_Dogma_of_Molecular_Biology_9",exam:"mid1",lecture:"L3 Central Dogma of Molecular Biology",q:"Which of the following is NOT CORRECT about translation elongation?",options:["Exons, introns, and regulatory sequences such as promoters","Transcription","It is not universal for all organisms","3' end of the tRNA"],answer:3,explanation:"\u0627\u0644\u0640 tRNA \u064A\u062D\u0645\u0644 \u0627\u0644\u062D\u0645\u0636 \u0627\u0644\u0623\u0645\u064A\u0646\u064A \u0639\u0646\u062F \u0646\u0647\u0627\u064A\u0629 \u0627\u0644\u0640 3' (\u0648\u0644\u064A\u0633 5')\u060C \u0648\u0647\u0630\u0627 \u0644\u064A\u0633 \u062E\u0637\u0623\u064B \u0641\u064A \u0627\u0644\u062A\u0631\u062C\u0645\u0629. \u0627\u0644\u0633\u0624\u0627\u0644 \u064A\u0637\u0644\u0628 \u0645\u0627 \u0647\u0648 \u063A\u064A\u0631 \u0635\u062D\u064A\u062D \u0641\u064A \u0627\u0644\u0631\u0633\u0645 \u0627\u0644\u0628\u064A\u0627\u0646\u064A \u2014 \u064A\u0639\u062A\u0645\u062F \u0639\u0644\u0649 \u0627\u0644\u0635\u0648\u0631\u0629 \u0627\u0644\u0645\u0631\u0641\u0642\u0629. \u26A0\uFE0F \u064A\u062D\u062A\u0627\u062C \u0635\u0648\u0631\u0629"},{id:"mid1_mid1_L3_Central_Dogma_of_Molecular_Biology_10",exam:"mid1",lecture:"L3 Central Dogma of Molecular Biology",q:"Which of the following statements is not correct regarding the genetic code?",options:["3' end of the tRNA","Spliced out of the introns during mRNA processing","Ribosome","It is not universal for all organisms"],answer:3,explanation:"\u0627\u0644\u0631\u0645\u0632 \u0627\u0644\u062C\u064A\u0646\u064A (genetic code) \u0647\u0648 universal (\u0639\u0627\u0644\u0645\u064A) \u2014 \u0646\u0641\u0633 \u0627\u0644\u0643\u0648\u062F\u0648\u0646\u0627\u062A \u062A\u064F\u0631\u0645\u0632 \u0644\u0646\u0641\u0633 \u0627\u0644\u0623\u062D\u0645\u0627\u0636 \u0627\u0644\u0623\u0645\u064A\u0646\u064A\u0629 \u0641\u064A \u0645\u0639\u0638\u0645 \u0627\u0644\u0643\u0627\u0626\u0646\u0627\u062A."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_1",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What is the definition of translocation?",options:["Aneuploidy","Genetic testing for the mother","Exchange of genetic material between non-homologous chromosomes","Male with reciprocal translocation between chromosome 7 and chromosome 11"],answer:2,explanation:"\u0627\u0644\u0640 Translocation = \u0627\u0646\u062A\u0642\u0627\u0644 \u0642\u0637\u0639\u0629 \u0645\u0646 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 \u0625\u0644\u0649 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 \u0622\u062E\u0631 \u063A\u064A\u0631 \u0645\u062A\u0645\u0627\u062B\u0644. Reciprocal translocation = \u062A\u0628\u0627\u062F\u0644 \u0645\u062A\u0628\u0627\u062F\u0644\u060C Robertsonian = \u0627\u0644\u062A\u0635\u0627\u0642 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u064A\u0646 acrocentric \u0639\u0646\u062F \u0627\u0644\u0640 centromere."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_2",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"46,XY, t(7;11) \u2014 What does this mean?",options:["Male with reciprocal translocation between chromosome 7 and chromosome 11","46,XX,rob(14;21)+21","G6PD deficiency","5p deletion"],answer:0,explanation:"t = translocation\u060C (7;11) = \u0628\u064A\u0646 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 7 \u064811\u060C 46,XY = \u0630\u0643\u0631 \u0628\u0640 46 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 \u2192 balanced reciprocal translocation."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_3",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What is a characteristic of balanced translocation?",options:["No change in gene dose","X-linked","45,X","G6PD deficiency"],answer:0,explanation:"Balanced translocation = \u0627\u0644\u0645\u0627\u062F\u0629 \u0627\u0644\u062C\u064A\u0646\u064A\u0629 \u0627\u0646\u062A\u0642\u0644\u062A \u0644\u0643\u0646 \u0644\u0645 \u062A\u064F\u0641\u0642\u062F \u0648\u0644\u0645 \u062A\u064F\u0636\u0627\u0639\u0641 \u2192 \u0644\u0627 \u064A\u0648\u062C\u062F \u062A\u063A\u064A\u064A\u0631 \u0641\u064A \u062C\u0631\u0639\u0629 \u0627\u0644\u062C\u064A\u0646\u0627\u062A \u2192 \u0627\u0644\u0641\u0631\u062F \u0639\u0627\u062F\u0629\u064B \u0637\u0628\u064A\u0639\u064A \u0641\u064A\u0646\u0648\u062A\u064A\u0628\u064A\u0627\u064B."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_4",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Which of the following represents deletion of short arm of chromosome 10 in male?",options:["45,X","46,XY,del(10)","It involves single break of 5p in the terminal part and leads to chromosomal loss","Mosaicism"],answer:1,explanation:"p = short arm\u060C 46,XY = \u0630\u0643\u0631\u060C del = deletion\u060C (p11.2p23) = \u0646\u0642\u0637\u062A\u0627 \u0627\u0644\u0643\u0633\u0631 \u0639\u0644\u0649 \u0627\u0644\u0630\u0631\u0627\u0639 \u0627\u0644\u0642\u0635\u064A\u0631."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_5",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A male with deletion on chromosome 15 of long arm region 1 band 3 \u2014 correct notation:",options:["The father is a carrier for pre-mutation (80 repeats of CGG), the son has a mutation of more than 200 repeats","46,XY,del(15)","10-15%","It involves single break of 5p in the terminal part and leads to chromosomal loss"],answer:1,explanation:"q = long arm\u060C 1 = region 1\u060C 3 = band 3 \u2192 q13."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_6",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What is the most common cause of Turner syndrome?",options:["Monosomy X","Turner syndrome","By specific chromosome stain","Look for balanced translocation"],answer:0,explanation:"Turner syndrome \u064A\u064F\u0633\u0628\u064E\u0651\u0628 \u0641\u064A 50% \u0645\u0646 \u0627\u0644\u062D\u0627\u0644\u0627\u062A \u0628\u0640 45,X (monosomy X) \u0627\u0644\u0646\u0627\u062A\u062C\u0629 \u0639\u0646 nondisjunction. \u0627\u0644\u0623\u0633\u0628\u0627\u0628 \u0627\u0644\u0623\u062E\u0631\u0649: isochromosome Xq\u060C ring X\u060C mosaicism."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_7",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"The most common numerical cause of Turner syndrome is?",options:["10-15%","Expansion of CGG repeats > 200","Cri-du-chat syndrome","45,X"],answer:3,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_8",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A karyotype shows a ring X chromosome. Identify the disorder:",options:["Cri-du-chat syndrome","Exchange of genetic material between non-homologous chromosomes","Turner syndrome","Male with reciprocal translocation between chromosome 7 and chromosome 11"],answer:2,explanation:"Ring X chromosome (46,X,r(X)) \u0647\u0648 \u0623\u062D\u062F \u0627\u0644\u062A\u063A\u064A\u0631\u0627\u062A \u0627\u0644\u0628\u0646\u064A\u0648\u064A\u0629 \u0627\u0644\u0645\u0631\u062A\u0628\u0637\u0629 \u0628\u0640 Turner syndrome."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_9",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What is the following karyotype: 46,X,isoXq?",options:["Turner syndrome","Karyotyping","46,X,i(Xq) \u2014 Isochromosome of Xq \u2192 Turner syndrome","10-15%"],answer:2,explanation:"Isochromosome Xq = \u0641\u0642\u062F\u0627\u0646 \u0627\u0644\u0630\u0631\u0627\u0639 \u0627\u0644\u0642\u0635\u064A\u0631 \u0645\u0639 \u062A\u0636\u0627\u0639\u0641 \u0627\u0644\u0630\u0631\u0627\u0639 \u0627\u0644\u0637\u0648\u064A\u0644 \u0644\u0640 X. \u064A\u064F\u0633\u0628\u0628 Turner syndrome."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_10",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Which of the following conditions is characterized by the presence of two or more different chromosomal cell lines within the same individual?",options:["Mosaicism","The father is a carrier for pre-mutation (80 repeats of CGG), the son has a mutation of more than 200 repeats","No change in gene dose","By specific chromosome stain"],answer:0,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_11",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What does this karyotype show? (Klinefelter karyogram)",options:["Cri-du-chat syndrome","Klinefelter syndrome","Expansion of CGG repeats > 200","Patau syndrome"],answer:1,explanation:"Klinefelter = \u0630\u0643\u0648\u0631 \u0628\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 X \u0632\u0627\u0626\u062F. \u0627\u0644\u0645\u0645\u064A\u0632\u0627\u062A: \u0639\u0642\u0645\u060C gynecomastia\u060C \u0637\u0648\u0644 \u0627\u0644\u0642\u0627\u0645\u0629\u060C \u0645\u0633\u062A\u0648\u0649 testosterone \u0645\u0646\u062E\u0641\u0636."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_12",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"All the following are trisomies EXCEPT:",options:["Karyotyping","Male with reciprocal translocation between chromosome 7 and chromosome 11","Turner syndrome","45,X"],answer:2,explanation:"Turner syndrome = monosomy X (45,X) \u0648\u0644\u064A\u0633 trisomy. Patau = trisomy 13\u060C Down = trisomy 21\u060C Edwards = trisomy 18."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_13",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Risk of having a Down syndrome child \u2014 when mother has 45,t(14;21):",options:["Paracentric inversion","46,XY,del(10)","10-15%","No change in gene dose"],answer:2,explanation:"\u0639\u0646\u062F\u0645\u0627 \u062A\u0643\u0648\u0646 \u0627\u0644\u0623\u0645 \u0646\u0627\u0642\u0644\u0629 \u0644\u0640 Robertsonian translocation \u0628\u064A\u0646 14 \u064821\u060C \u0641\u0625\u0646 \u062E\u0637\u0631 \u0625\u0646\u062C\u0627\u0628 \u0637\u0641\u0644 \u0645\u0635\u0627\u0628 \u0628\u0640 Down syndrome \u064A\u0643\u0648\u0646 10-15%."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_14",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Carrier female with rob(14;21), what is the recurrence risk for Down syndrome?",options:["10-15%","Uniparental heterodisomy","It involves single break of 5p in the terminal part and leads to chromosomal loss","The father is a carrier for pre-mutation (80 repeats of CGG), the son has a mutation of more than 200 repeats"],answer:0,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_15",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A female was in the clinic with her daughter, her daughter was 47,t(14;21)+21. Her mother was diagnosed with 45,t(14;21). What is the percentage for the next birth to be affected?",options:["Expansion of CGG repeats > 200","Exchange of genetic material between non-homologous chromosomes","10-15%","Turner syndrome"],answer:2,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_16",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A karyotype of female Down syndrome:",options:["46,XX,rob(14;21)+21","Fertilization of an egg by two sperm","Monosomy X","No change in gene dose"],answer:0,explanation:"Down syndrome \u0628\u0633\u0628\u0628 Robertsonian translocation \u0628\u064A\u0646 14 \u064821 \u0641\u064A \u0623\u0646\u062B\u0649."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_17",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Which of the following is a suitable nomenclature for Robertsonian translocation (karyotype showing rob 14;21)?",options:["Balanced translocation","Genetic testing for the mother","G6PD deficiency","45,XX,rob(14;21)"],answer:3,explanation:"Robertsonian translocation \u064A\u064F\u0646\u062A\u062C 45 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u064B (\u0644\u0623\u0646 \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u064E\u064A\u0646 \u064A\u0646\u062F\u0645\u062C\u0627\u0646). \u0627\u0644\u062A\u0631\u0645\u064A\u0632: rob \u0645\u0639 \u062A\u062D\u062F\u064A\u062F \u0646\u0642\u0637\u062A\u064E\u064A \u0627\u0644\u0643\u0633\u0631."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_18",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"46,XY, t(4;6), (p12;q14) \u2014 How is it named?",options:["Cri-du-chat syndrome","Reciprocal translocation between chromosome number 4 and 6","Uniparental heterodisomy","10-15%"],answer:1,explanation:"t = reciprocal translocation\u060C (4;6) = \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A \u0627\u0644\u0645\u062A\u0628\u0627\u062F\u0644\u0629\u060C (p12;q14) = \u0646\u0642\u0637\u062A\u0627 \u0627\u0644\u0643\u0633\u0631."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_19",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"In FISH testing, how is a microdeletion detected?",options:["By specific chromosome stain","Karyotyping","46,X,i(Xq) \u2014 Isochromosome of Xq \u2192 Turner syndrome","The father is a carrier for pre-mutation (80 repeats of CGG), the son has a mutation of more than 200 repeats"],answer:0,explanation:"\u0641\u064A FISH\u060C \u064A\u064F\u0633\u062A\u062E\u062F\u0645 probe \u0645\u062D\u062F\u062F \u0644\u0644\u0645\u0646\u0637\u0642\u0629 \u0627\u0644\u0645\u0634\u062A\u0628\u0647 \u0628\u062D\u0630\u0641\u0647\u0627. \u063A\u064A\u0627\u0628 \u0627\u0644\u0625\u0634\u0627\u0631\u0629 \u0627\u0644\u0641\u0644\u0648\u0631\u064A\u0629 \u064A\u062F\u0644 \u0639\u0644\u0649 \u0627\u0644\u062D\u0630\u0641."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_20",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What is the probe of FISH used for microdeletion and duplication?",options:["Specific locus","46,XX,rob(14;21)+21","Patau syndrome","Monosomy X"],answer:0,explanation:"\u0645\u0646 L13: \u0644\u0627\u0643\u062A\u0634\u0627\u0641 \u0627\u0644\u0640 microdeletion \u0648\u0627\u0644\u0640 microduplication \u064A\u064F\u0633\u062A\u062E\u062F\u0645 Specific locus probe. Centromeric probe \u0644\u0639\u062F \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A\u060C Whole painting probe \u0644\u062A\u0645\u064A\u064A\u0632 \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645\u0627\u062A \u0643\u0627\u0645\u0644\u0629."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_21",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Which technique would be used in recurrent miscarriages?",options:["Karyotyping","X-linked","46,XY,del(10)","Turner syndrome"],answer:0,explanation:"\u0627\u0644\u0625\u062C\u0647\u0627\u0636 \u0627\u0644\u0645\u062A\u0643\u0631\u0631 \u063A\u0627\u0644\u0628\u0627\u064B \u0645\u0631\u062A\u0628\u0637 \u0628\u0640 balanced translocations \u0641\u064A \u0623\u062D\u062F \u0627\u0644\u0648\u0627\u0644\u062F\u064A\u0646. Karyotyping \u0647\u0648 \u0627\u0644\u0623\u0646\u0633\u0628 \u0644\u0627\u0643\u062A\u0634\u0627\u0641 \u0647\u0630\u0647 \u0627\u0644\u062A\u063A\u064A\u0631\u0627\u062A \u0627\u0644\u0628\u0646\u064A\u0648\u064A\u0629."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_22",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Which of the following is most commonly detected by cytogenetic testing?",options:["Balanced translocation","Monosomy X","46,XY,del(10)","No change in gene dose"],answer:0,explanation:"Traditional karyotyping (G-banding) \u064A\u0643\u062A\u0634\u0641: balanced translocation\u060C \u062A\u063A\u064A\u0631\u0627\u062A \u0639\u062F\u062F\u064A\u0629 \u0643\u0628\u064A\u0631\u0629\u060C inversions. \u0644\u0627 \u064A\u0643\u062A\u0634\u0641: point mutations\u060C microdeletions < 5Mb\u060C triplet repeats."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_23",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What is the most common cause of triploidy?",options:["Fertilization of an egg by two sperm","Look for balanced translocation","Monosomy X","46,XY,del(15)"],answer:0,explanation:"\u0627\u0644\u0640 Triploidy (69 \u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645) \u064A\u0646\u062A\u062C \u0641\u064A \u0645\u0639\u0638\u0645 \u0627\u0644\u062D\u0627\u0644\u0627\u062A \u0645\u0646 \u062A\u0644\u0642\u064A\u062D \u0628\u0648\u064A\u0636\u0629 \u0648\u0627\u062D\u062F\u0629 \u0628\u062D\u064A\u0648\u0627\u0646\u064A\u0646 \u0645\u0646\u0648\u064A\u064E\u0651\u064A\u0646."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_24",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"Which one of these causes triploidy?",options:["Aneuploidy","Fertilization of abnormal 2n ova with normal sperm","Look for balanced translocation","Paternal chromosome 15 deletion"],answer:1,explanation:"\u0647\u0630\u0627 \u0633\u0628\u0628 \u0622\u062E\u0631 \u0644\u0644\u0640 triploidy: \u0627\u0644\u0628\u0648\u064A\u0636\u0629 \u0627\u0644\u062B\u0646\u0627\u0626\u064A\u0629 (2n) \xD7 \u062D\u064A\u0648\u0627\u0646 \u0645\u0646\u0648\u064A \u0637\u0628\u064A\u0639\u064A (n) = 3n."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_25",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What does the following karyotype show? (69 chromosomes shown)",options:["Look for balanced translocation","Aneuploidy","Paracentric inversion","Monosomy X"],answer:1,explanation:""},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_26",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"When breaks occur on each arm of a chromosome and the segment between the breaks is reconstituted \u2014 type of rearrangement?",options:["45,XX,rob(14;21)","Expansion of CGG repeats > 200","Paracentric inversion","By specific chromosome stain"],answer:2,explanation:"- Pericentric inversion: \u0627\u0644\u0643\u0633\u0631\u0627\u0646 \u064A\u062D\u062F\u062B\u0627\u0646 \u0641\u064A \u0630\u0631\u0627\u0639\u064E\u064A \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 (\u064A\u0634\u0645\u0644 \u0627\u0644\u0640 centromere) - Paracentric inversion: \u0627\u0644\u0643\u0633\u0631\u0627\u0646 \u0641\u064A \u0646\u0641\u0633 \u0627\u0644\u0630\u0631\u0627\u0639 (\u0644\u0627 \u064A\u0634\u0645\u0644 \u0627\u0644\u0640 centromere) - Ring chromosome: \u0627\u0644\u0643\u0633\u0631\u0627\u0646 \u0641\u064A \u0637\u0631\u0641\u064E\u064A \u0627\u0644\u0643\u0631\u0648\u0645\u0648\u0633\u0648\u0645 \u0645\u0639 \u0627\u0644\u062A\u0635\u0627\u0642\u0647\u0645\u0627 **\u0627\u0644\u0625\u062C\u0627\u0628\u0629 \u0627\u0644\u0645\u0637\u0644\u0648\u0628\u0629 (\u062D\u0633\u0628 \u0627\u0644\u0633\u0624\u0627\u0644):** B) Pericentric inversion (breaks on each ARM = \u064A\u0634\u0645\u0644 centromere)"},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_27",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"What is the term for a double break in the short arm of a chromosome, replaced in the region between the breaks inverted?",options:["By specific chromosome stain","Look for balanced translocation","Paracentric inversion","Fertilization of an egg by two sperm"],answer:2,explanation:"\u0627\u0644\u0643\u0633\u0631\u0627\u0646 \u0641\u064A \u0627\u0644\u0630\u0631\u0627\u0639 \u0627\u0644\u0642\u0635\u064A\u0631 \u0641\u0642\u0637 (\u0644\u064A\u0633 \u0639\u0628\u0631 centromere) = Paracentric inversion."},{id:"mid1_mid1_L4_Chromosomes_and_Their_Disorders_28",exam:"mid1",lecture:"L4 Chromosomes and Their Disorders",q:"A female came to the hospital, pregnant. Doctor told her son suffers from unbalanced rearrangement. What could it be?",options:["Karyotyping","Paternal chromosome 15 deletion","Deletion","Male with reciprocal translocation between chromosome 7 and chromosome 11"],answer:2,explanation:"Unbalanced rearrangement = \u0641\u0642\u062F\u0627\u0646 \u0623\u0648 \u0632\u064A\u0627\u062F\u0629 \u0641\u064A \u0627\u0644\u0645\u0627\u062F\u0629 \u0627\u0644\u062C\u064A\u0646\u064A\u0629\u060C \u0643\u0627\u0644\u0640 deletion \u

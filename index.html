nce that makes up a gene, such that the sequence differs from what is found in most people. \u2022 A threadlike structure of nucleic acids and protein found in the nucleus of most living cells, carrying genetic information in the form of genes."},{id:"mid1_mid1_L1_Introduction_6",exam:"mid1",lecture:"L1 Introduction",q:"Which condition affects both males and females equally and is an example of pleiotropy?",options:["Hemophilia","Turner syndrome","Marfan syndrome","Color blindness"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Understanding Heredity: How traits are passed down through generations, which is essential for diagnosing and treating genetic disorders."},{id:"mid1_mid1_L1_Introduction_7",exam:"mid1",lecture:"L1 Introduction",q:"What does the cytogenetic notation 7q15 indicate?",options:["Chromosome 7 short arm, first region, fifth band","Chromosome 7 long arm, fifth region, first band","Chromosome 7 short arm, fifth region, first band","Chromosome 7 long arm, first region, fifth band"],answer:3,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? \u2022 Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome."},{id:"mid1_mid1_L1_Introduction_8",exam:"mid1",lecture:"L1 Introduction",q:"The severity of a genetic disease varies among individuals within the same family. What is the most likely explanation?",options:["Complete penetrance","Genetic anticipation","Variable expressivity","Pleiotropy"],answer:2,explanation:"From L1 Introduction: Genetics helps explain a lot of things, like what makes you unique, why you look like other members of your family, why somebody looks different and why some diseases run in your family. We study genetics because the DNA sequence is the beginning, the blueprint for our development and so many of the features that make us the unique individuals we are."},{id:"mid1_mid1_L1_Introduction_9",exam:"mid1",lecture:"L1 Introduction",q:"A child is diagnosed with Angelman syndrome. Which gene is most likely affected?",options:["FMR1","DMD","CFTR","UBE3A"],answer:3,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Understanding Heredity: How traits are passed down through generations, which is essential for diagnosing and treating genetic disorders."},{id:"mid1_mid1_L1_Introduction_10",exam:"mid1",lecture:"L1 Introduction",q:"What is the probe of FISH used for microdeletion and duplication?",options:["Specific locus","Centromeric","Telomere","Whole painting"],answer:0,explanation:"From L1 Introduction: Genetics helps explain a lot of things, like what makes you unique, why you look like other members of your family, why somebody looks different and why some diseases run in your family."},{id:"mid1_mid1_L1_Introduction_11",exam:"mid1",lecture:"L1 Introduction",q:"Which cell can't be used for chromosomal analysis?",options:["Skin cells","WBCs","Hepatocyte","RBCS"],answer:3,explanation:"From L1 Introduction: \u2022 A threadlike structure of nucleic acids and protein found in the nucleus of most living cells, carrying genetic information in the form of genes. Understanding Heredity: How traits are passed down through generations, which is essential for diagnosing and treating genetic disorders."},{id:"mid1_mid1_L1_Introduction_12",exam:"mid1",lecture:"L1 Introduction",q:"Terminology that describe an Alternative form of gene found on the same locus on a pair of homologous chromosome :",options:["Allele","Gene","Heterozygosity","Homozygosity"],answer:0,explanation:"From L1 Introduction: \u2022 Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome. Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome?"},{id:"mid1_mid1_L1_Introduction_13",exam:"mid1",lecture:"L1 Introduction",q:"A baby presents with a high-pitched cry resembling a cat, microcephaly, and intellectual disability. What is the most likely condition?",options:["Edward syndrome","Williams syndrome","Cri-du-chat syndrome","Angelman syndrome"],answer:2,explanation:"Cri-du-chat syndrome is caused by deletion of the short arm of chromosome 5 (5p deletion). It presents with a high-pitched cat-like cry in infancy, microcephaly, and intellectual disability. Edward syndrome is trisomy 18; Williams syndrome involves 7q11 deletion; Angelman syndrome involves 15q11 deletion (maternal). x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome?"},{id:"mid1_mid1_L1_Introduction_14",exam:"mid1",lecture:"L1 Introduction",q:"The pedigree is in consistence with one of the following disorders:",options:["Rickets","A-thalassemia","G6PD deficiency","Hurler syndrome"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Understanding Heredity: How traits are passed down through generations, which is essential for diagnosing an planation:"From L2 Chromosomes Structure: \uF0D8Explain the significance and use of a karyotype. Chromosomes \uF097Each species has a characteristic chromosome complement (karyotype) in terms of the number and the morphology of the chromosomes that make up its genome."},{id:"mid1_mid1_L2_Chromosomes_Structure_14",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"A karyotype shows 46,XY,t(4;6)(p12;q14). How is this correctly described?",options:["Robertsonian translocation between chromosomes 4 and 6","Reciprocal translocation between chromosomes 4 and 6","Reciprocal translocation between chromosomes 12 and 14","Pericentric inversion of chromosome 4"],answer:1,explanation:"From L2 Chromosomes Structure: and consultant of medical genetics Faculty of medicine KAU Objectives \uF0D8Differentiate between chromatin and chromosomes. Chromosomes \uF097Each species has a characteristic chromosome complement (karyotype) in terms of the number and the morphology of the chromosomes that make up its genome."},{id:"mid1_mid1_L3_Central_Dogma_1",exam:"mid1",lecture:"L3 Central Dogma",q:"What are the main structural components of a gene?",options:["Coding regions that are directly translated into proteins along with RNA processing elements","Non-coding DNA sequences involved in regulation and control of gene expression","Exons, introns, and regulatory sequences such as promoters","Cellular structures involved in protein synthesis such as ribosomes and transfer RNA"],answer:2,explanation:"From L3 Central Dogma: \u2022 Initiation \u2022 \u2022Elongation \u2022 \u2022Termination \u2022 \u2022Recognition of STOP codons \u2022 \u2022Usage of release factors Regulation of gene expression \u2022 What is constitutive vs regulated gene expression? \u2022 What are some examples of regulation of gene expression?"},{id:"mid1_mid1_L3_Central_Dogma_2",exam:"mid1",lecture:"L3 Central Dogma",q:"Where does protein synthesis occur in the cell?",options:["Nucleus","Ribosome","Golgi apparatus","Lysosomes"],answer:1,explanation:"From L3 Central Dogma: Short, discontinuous DNA segments synthesized on the lagging strand during DNA replication, allowing both new strands to be built in the essential 5' to 3' direction as the replication fork opens Protein synthesis - Transcription"},{id:"mid1_mid1_L3_Central_Dogma_3",exam:"mid1",lecture:"L3 Central Dogma",q:"During which process is mRNA produced?",options:["Translation","Replication","Post-translational modification","Transcription"],answer:3,explanation:"From L3 Central Dogma: The central dogma of molecular biology describes the fundamental flow of genetic information: 1- Replication 2- Transcription 3- Translation by which the information in genes flows in a UNILATERAL direction: DNA \u2192 RNA \u2192 protein."},{id:"mid1_mid1_L3_Central_Dogma_4",exam:"mid1",lecture:"L3 Central Dogma",q:"What is the primary function of the centromere?",options:["To initiate DNA replication during S phase","To regulate gene transcription along the chromosome","To allow attachment of spindle microtubules during cell division","To maintain chromosome length during cell division"],answer:2,explanation:"From L3 Central Dogma: Short, discontinuous DNA segments synthesized on the lagging strand during DNA replication, allowing both new strands to be built in the essential 5' to 3' direction as the replication fork opens Protein synthesis - Transcription"},{id:"mid1_mid1_L3_Central_Dogma_5",exam:"mid1",lecture:"L3 Central Dogma",q:"Which enzyme is responsible for unwinding DNA during replication?",options:["DNA polymerase","RNA polymerase","Ligase","Helicase"],answer:3,explanation:"From L3 Central Dogma: Enzymes: helicase, DNA \u2013polymerases, ligase. DNA polymerase; the enzyme required that adds new nucleotides to the new DNA strand."},{id:"mid1_mid1_L3_Central_Dogma_6",exam:"mid1",lecture:"L3 Central Dogma",q:"Which is the sequence of poly a tail that attached to mRNA?",options:["AAUAAA","AATAAA","AACAAA","AAGAAA"],answer:0,explanation:"From L3 Central Dogma: DNA polymerase; the enzyme required that adds new nucleotides to the new DNA strand. \u2022 Differs from DNA synthesis in that only one strand of DNA, the template strand, is used to make mRNA \u2022 Transcription does not need a primer to start."},{id:"mid1_mid1_L3_Central_Dogma_7",exam:"mid1",lecture:"L3 Central Dogma",q:"the mRNA sequence TAG TAG TAG if we add cytosine at the beginning what will be the new sequence?",options:["CTA GTA GTAG","CTAGTAGTAG","CTA CTA GTAG","non sense"],answer:0,explanation:"From L3 Central Dogma: \u2022 What are the types of types of eukaryotic mRNA modifications? What is the central dogma of molecular biology?"},{id:"mid1_mid1_L3_Central_Dogma_8",exam:"mid1",lecture:"L3 Central Dogma",q:"Between adenine and guanine transformation?",options:["Transition (mutation)","Transverse","Transcription","Translation"],answer:0,explanation:"From L3 Central Dogma: The central dogma of molecular biology describes the fundamental flow of genetic information: 1- Replication 2- Transcription 3- Translation by which the information in genes flows in a UNILATERAL direction: DNA \u2192 RNA \u2192 protein. What are the key differences between DNA replication and transcription?"},{id:"mid1_mid1_L3_Central_Dogma_9",exam:"mid1",lecture:"L3 Central Dogma",q:"An alteration in DNA polymerase that lacks 5' to 3' exonuclease activity results in:",options:["An increase in mutation rate","A decrease in replication speed","A decrease in RNA primer removal","An increase in recombination rate"],answer:2,explanation:"The 5' to 3' exonuclease activity of DNA Polymerase I (in prokaryotes) removes the RNA primer during replication. Loss of this activity would impair RNA primer removal. The 3' to 5' exonuclease provides proofreading; loss of that would increase mutations."},{id:"mid1_mid1_L3_Central_Dogma_10",exam:"mid1",lecture:"L3 Central Dogma",q:"In eukaryotes translation during the elongation stage in this diagram which of the following is NOT 1_L4_Chromosomal_Aberrations_37",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Give the definition of Ring chromosome:",options:["A numerical chromosomal abnormality in which two chromosomes have been translocated to another one to form a ring","A structurally abnormal chromosome in which two chromosomes have been united with each other to form a ring","A numerical chromosomal abnormality in which a new chromosome has been united with another one to form a ring","A structurally abnormal chromosome in which the ends of each chromosome arm have been lost and the broken arms have been reunited to form a ring"],answer:3,explanation:"From L4 Chromosomal Aberrations: Abnormalities of Chromosome Structure Unbalanced Balanced There is loss or gain of chromosomal material The chromosome set has the normal complement ,no loss or gain The phenotype is likely to be abnormal Don\u2019t usually have phenotypic effect But they can pose a threat to the offspring \uF0A7Delet..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_38",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Mustafa and Fatima are a couple seeking genetic counseling. They have a male baby with a chromosomal aberration: 46,XY,t(21;21)+21. Cytogenetic analysis for Fatima shows the same Robertsonian translocation. What is the recurrence risk in the next pregnancy for having a similarly affected baby?",options:["1% (standard trisomy 21 recurrence)","10\u201315% (14;21 translocation carrier)","50% (balanced translocation)","100%"],answer:3,explanation:"From L4 Chromosomal Aberrations: \uF0FCDown syndrome : Recurrence Risk for next  pregnancy due to non-disjunction : 1% + the maternal age risk Risks in Robertsonian translocation \uF0FCThe female carrier of either a 13q21q or a 14q21q Robertsonian translocation runs a risk of approximately 10-15% for having a baby with Down syndrome, ..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_39",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image shows an abnormality indicated by the arrow. What chromosomal syndrome does this represent?",options:["Wolf-Hirschhorn syndrome (4p deletion)","Cri-du-chat syndrome (5p deletion)","Angelman syndrome (15q deletion)","Williams syndrome (7q11 deletion)"],answer:1,explanation:"The arrow indicates a deletion of the short arm (p arm) of chromosome 5, resulting in Cri-du-chat syndrome (46,XX/XY,del(5p)). This is a terminal deletion causing microcephaly, hypertelorism, low birth weight, intellectual disability, and the characteristic high-pitched cat-like cry (mewing) in infancy. Wolf-Hirschhorn is a 4p deletion; Angelman is a 15q deletion; Williams is 7q11.",image:"images/tb_p50_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_40",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype shown has an arrow indicating an abnormality on one chromosome. Based on the position of the arrow at chromosome 5, what syndrome does the patient most likely have?",options:["Edward syndrome","Cri-du-chat syndrome","Patau syndrome","Turner syndrome"],answer:1,explanation:"An arrow at chromosome 5 in a karyotype indicates a structural abnormality at chromosome 5. Deletion of 5p (the short arm) causes Cri-du-chat syndrome, characterized by: cat-like cry in infancy (due to laryngeal hypoplasia), microcephaly, hypertelorism, and intellectual disability. Karyotype notation: 46,XY/XX,del(5)(p15.3).",image:"images/tb_p16_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_41",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image shows an arrow indicating an abnormality. Based on the position of the arrow at chromosome 8, what is the most likely finding?",options:["Inversion of chromosome 8 (inv(8))","Deletion of chromosome 8q (del(8q))","Trisomy 8 (47,XX,+8)","Translocation involving chromosome 8"],answer:0,explanation:"When a karyotype arrow points to chromosome 8, and the chromosome 8 appears morphologically different from its homologue (e.g., different banding pattern or altered centromere position), pericentric inversion of chromosome 8 (inv(8)(p23q22)) should be considered. Inversions are balanced structural abnormalities but can predispose to unbalanced offspring.",image:"images/tb_p20_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_42",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"What syndrome does the karyotype in the image show?",options:["Down syndrome (Trisomy 21)","Edwards syndrome (Trisomy 18)","Patau syndrome (Trisomy 13)","Klinefelter syndrome (47,XXY)"],answer:0,explanation:"The karyotype shows three copies of chromosome 21 (trisomy 21), the hallmark of Down syndrome. Down syndrome is the most common chromosomal trisomy compatible with life (incidence ~1:700). Key clinical features include: intellectual disability, hypotonia, upslanting palpebral fissures, epicanthic folds, flat nasal bridge, congenital heart defects (40-50%), and short stature.",image:"images/tb_p32_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_43",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Based on the karyotype shown, what is the most likely diagnosis?",options:["Klinefelter syndrome (47,XXY)","Turner syndrome (45,X)","Triple X syndrome (47,XXX)","Down syndrome (47,XX,+21)"],answer:1,explanation:"Turner syndrome (45,X) shows only one X chromosome and no Y chromosome (45 total chromosomes). Clinical features: short stature, webbed neck, primary amenorrhea, streak gonads, coarctation of the aorta, shield chest. It is the only complete monosomy compatible with live birth; ~99% of 45,X conceptions spontaneously abort.",image:"images/tb_p35_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_44",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A karyotype is obtained for a phenotypically male patient presenting with gynecomastia, small testes, and azoospermia. What does the karyotype most likely show?",options:["45,X","47,XX,+21","47,XXY","46,XX"],answer:2,explanation:"The image shows Klinefelter syndrome karyotype (47,XXY): an extra X chromosome in a phenotypic male. It is the most common cause of male hypogonadism and infertility. Features: tall stature, small firm testes, azoospermia, gynecomastia, behavioral/learning difficulties. Testosterone is low; FSH and LH are elevated.",image:"images/tb_p38_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_45",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"This karyotype was obtained from a patient with features of a sex chromosome aneuploidy. What does it show?",options:["Normal female karyotype (46,XX)","Turner syndrome (45,X)","Klinefelter syndrome (47,XXY)","Normal male karyotype (46,XY)"],answer:2,explanation:"The karyotype shows 47,XXY (Klinefelter syndrome). Patients have two X chromosomes and one Y chromosome (47 total). The extra X results from non-disjunction during meiosis. Klinefelter is the most common sex chromosome aneuploidy in males (1:500-1:1000 male births) and the most common cause of male hypogonadism.",image:"images/tb_p44_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_46",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image is from a child with multiple congenital anomalies including polydactyly, cleft lip/palate, and microphthalmia. What does the karyotype show?",options:["Trisomy 13 (Patau syndrome)","Trisomy 18 (Edwards syndrome)","Trisomy 21 (Down syndrome)","Monosomy X (Turner syndrome)"],answer:0,explanation:"The karyotype shows three copies of chromosome 13 (47,XX/XY,+13) \u2014 Patau syndrome (trisomy 13). Clinical features include: holoprosencephaly, microphthalmia/cyclopia, cleft lip and/or palate, postaxial polydactyly, cutis aplasia (scalp defects), congenital heart defects, and severe intellectual disability. Most affected individuals do not survive beyond the first year of life.",image:"images/tb_p48_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_47",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The following karyotype is from a female patient who presents with short stature, webbed neck, and primary amenorrhea. What does the karyotype show?",options:["47,XXX (Triple X)","46,XX (Normal female)","45,X (Turner syndrome)","47,XXY (Klinefelter)"],answer:2,explanation:"Turner syndrome (45,X) is characterized by the loss of one sex chromosome, leaving only one X. The karyotype shows only 45 chromosomes with a single X. Clinical features: short stature, webbed neck (pterygium colli), low posterior hairline, shield chest, coarctation of aorta, streak ovaries, primary amenorrhea, and infertility.",image:"images/tb_p48_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_48",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"What karyotype does the image most likely show?",options:["47,XY,+21 (Down syndrome, male)","47,XX,+21 (Down syndrome, female)","47,XXY (Klinefelter syndrome)","46,XX (Normal female)"],answer:1,explanation:"The karyotype shows 47 chromosomes with three copies of chromosome 21 (trisomy 21) and two X chromosomes (XX sex chromosome pattern), indicating Down syndrome in a female (47,XX,+21). Down syndrome is the most common chromosomal trisomy causing intellectual disability, occurring in approximately 1 in 700 live births. Trisomy results from non-disjunction (usually in maternal meiosis I) in 95% of cases.",image:"images/tb_p39_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_1",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Consanguinity increases the risk of which type of genetic disorder?",options:["Autosomal dominant disorders","X-linked dominant disorders","Autosomal recessive disorders","Mitochondrial disorders"],answer:2,explanation:"From L5 L6 Mendelian: Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked)."},{id:"mid1_mid1_L5_L6_Mendelian_2",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is an example of an X-linked recessive disorder?",options:["Marfan s  th..."},{id:"mid1_mid1_L5_L6_Mendelian_24",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is true about mitochondrial DNA",options:["codes for 70 genes","It is circular, single stranded DNA","inherited almost exclusively from the oocyte","type of mendelian inheritance"],answer:2,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_25",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is correct about Autosomal recessive trait?",options:["Only manifest in male","Manifest in heterozygous","Recurrence risk is 50% in females carriers","Skip generations"],answer:3,explanation:"From L5 L6 Mendelian: Autosomal Recessive Inheritance Autosomal Recessive Disorders \u2022 Parents are apparently normal \u2022 Parents are heterozygous carriers \u2022 Usually skipped generations \u2022Both males and females are equally affected \u2022Parents tend to be related more often than parents in general population."},{id:"mid1_mid1_L5_L6_Mendelian_26",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Consanguineous parents have a higher risk of having children with which type of disease?",options:["Cystic fibrosis","Marfan syndrome","Hemophilia","Neurofibromatosis"],answer:0,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_27",exam:"mid1",lecture:"L5 L6 Mendelian",q:"What's the mode of inheritance of this pedigree?",options:["Hollandaric","autosomal recessive","X\u2014linked recessive","autosomal dominent"],answer:0,explanation:"From L5 L6 Mendelian: \u20226- Calculate the probability to be affected with or carry a single-gene diseases ( autosomal dominant, autosomal recessive and X-linked inheritance) \u20227-Clinical examples of each. Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked).",image:"images/tb_p42_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_28",exam:"mid1",lecture:"L5 L6 Mendelian",q:"An affected male transmits the disease to all of his daughters but none of his sons. This pattern is most consistent with:",options:["X-linked recessive disorders","X-linked dominant disorders","Mitochondrial disorders","Autosomal dominant disorders"],answer:1,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_29",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is most likely to be a feature of the disorder shown in the pedigree?",options:["Maternal inheritance","Paternal inheritance","Autosomal dominant inheritance","X-linked recessive inheritance"],answer:0,explanation:"From L5 L6 Mendelian: Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked).",image:"images/tb_p44_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_30",exam:"mid1",lecture:"L5 L6 Mendelian",q:"There was a family which came in the clinic with a child diagnosed with sickle cell anemia what is the recurrence risk for this type of disease ?",options:["25% carrier","50% Carrier","100% Affected","50% Affected"],answer:1,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_31",exam:"mid1",lecture:"L5 L6 Mendelian",q:"A father is affected with an X-linked dominant disorder. Which of the following is true regarding this disease?",options:["Females are affected as well as males","The father transmits the disorder to all of his sons","Only males are affected","The disorder can skip generations"],answer:0,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_32",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, what is the most likely inheritance pattern?",options:["X-linked recessive","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:2,explanation:"The pedigree shows an affected female in generation I passing the trait to an affected male in generation II, who then has two affected children (both boy and girl) in generation III. This pattern of vertical transmission across three generations, affecting both sexes equally, is characteristic of autosomal dominant inheritance. Every generation has affected individuals and both males and females are affected.",image:"images/tb_p52_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_33",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shows consanguineous parents (indicated by a double line connecting them) with multiple affected children. What is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked dominant","Y-linked"],answer:1,explanation:"The pedigree shows consanguineous parents (double horizontal line) with some affected offspring (filled symbols) of both sexes. Parents are unaffected (carriers). The combination of parental consanguinity, unaffected carrier parents, and affected children of both sexes is the hallmark of autosomal recessive inheritance. Consanguinity increases the chance of sharing the same recessive allele.",image:"images/tb_p40_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_34",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, what is the most likely mode of inheritance?",options:["Autosomal dominant","Y-linked","Autosomal recessive","X-linked recessive"],answer:3,explanation:"The pedigree shows a carrier female (I-1, half-filled circle) with an unaffected male (I-2). Their children include an unaffected male (II-1), a carrier female (II-2), and an affected male (II-3). In the next generation, the proband (III-1) is an affected male. This pattern \u2014 unaffected carrier mother passing disease to half her sons, daughters may be carriers but unaffected \u2014 is classic X-linked recessive inheritance.",image:"images/tb_p45_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_35",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on this pedigree, what is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked dominant","X-linked recessive"],answer:3,explanation:"The pedigree shows carrier females (circles with dots, I-2 and I-4) in generation I. Their male offspring (II-3, III-1, III-3) are affected (filled squares), while females are either carriers or unaffected. The proband (III-1) is an affected male born to a carrier mother. No male-to-male transmission is seen, and all affected individuals are male. This is classic X-linked recessive inheritance.",image:"images/tb_p11_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_36",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shown demonstrates a consanguineous marriage (double line). Based on the pattern of affected and unaffected children, what is the most likely mode of inheritance?",options:["X-linked dominant","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:1,explanation:"The pedigree shows unaffected consanguineous parents (double horizontal line = related couple) with two deceased siblings (II-2 crossed, II-3 crossed) and children including one affected male (III-1, proband, arrow) and one affected female (III-5). Unaffected parents who are related (sharing a common ancestor) having affected children of both sexes is the hallmark of autosomal recessive inheritance. The consanguinity increases the probability of both parents carrying the same rare recessive allele.",image:"images/tb_p18_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_37",exam:"mid1",lecture:"L5 L6 Mendelian",q:"What inheritance pattern is most consistent with the pedigree shown?",options:["X-linked recessive","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:2,explanation:"The pedigree shows an affected mother (I-2) who transmits the disease to both affected sons (II-3) and affected daughters (II-5). The affected son (II-3) then has affected children (III-3, III-4, III-5) of both sexes. This vertical transmission \u2014 affected parent in every generation, both males and females affected, 50% recurrence risk \u2014 is characteristic of autosomal dominant inheritance.",image:"images/tb_p28_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_38",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shows a family with multiple generations where only the fourth generation has affected individuals (one male and one female). The answer states this is consistent with sickle cell anemia. What is the most likely mode of inheritance?",options:["Autosomal dominant (AD)","X-linked recessive (XLR)","Autosomal recessive (AR)","Mitochondrial inheritance"],answer:2,explanation:"The pedigree shows unaffected individuals in generations I, II, and III (who are all carriers), with affected offspring only appearing in generation IV. The disease skips multiple generations and affects both males and females equally. Sickle cell anemia (HbSS) is autosomal recessive, requiring two mutant HBB alleles. Carriers (HbAS, sickle cell trait) are asymptomatic. Both parents must be carriers for a child to be affected.",image:"images/p38_pedigree_q20.png"},{id:"mid1_mid1_L5_L6_Mendelian_39",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, with affected individuals appearing in multiple family lines across generations II and III (both males and females affected), what is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked recessive","Mitochondrial"],answer:0,explanation:"The pedigree shows affected males (filled squares) and affected females (filled circles) in multiple family branches across generations II and III. Affected individuals in every generation, transmitted from affected parent to approximately 50% of children regardless of sex, is the hallmark of autosomal dominant inheritance. This pattern rules out X-linked recessive (which would show only affected males) and autosomal recessive (which would skip generations).",image:"images/p44_pedigree_q3.png"},{id:"mid1_mid1_L7_Non_Mendelian_1",exam:"mid1",lecture:"L7 Non Mendelian",q:"What is the DNA sequence repeat associated with Huntington disease?",options:["CGG","GAA","CTG","CAG"],answer:3,explanation:"From L7 Non Mendelian: Clinical Manifestation of Mitochondrial Disorders Anticipation & Repeat Expansion Anticipation \u2022 If the onset of the disease occurs at earlier age in the offspring than in the parents \u2022 And/or the disease occurs with increasing severity in subsequent generations \u2192this phenomenon is called ..."},{id:"mid1_mid1_L7_Non_Mendelian_2",exam:"mid1",lecture:"L7 Non Mendelian",q:"From which cell are mitochondrial diseases transmitted to offspring?",options:["Sperm cell","Somatic cell","Stem cell","Oocyte"],answer:3,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_3",exam:"mid1",lecture:"L7 Non Mendelian",q:"Genomic imprinting is an important factor in gene variation. Which of the following is an example of genital imprinting?",options:["Angelman syndrome and Prader-Willi syndrome","Angelman syndrome and Cystic fibrosis","Beckwith-Wiedemann syndrome and Silver-Russell syndrome","Huntington's disease and Duchenne muscular dystrophy"],answer:0,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_4",exam:"mid1",lecture:"L7 Non Mendelian",q:"The normal individual will have only one transcriptionally active copy of the gene. What is the most common explanation of this process of gene silencing?",options:["Uniparental disomy","Mosaicism","Genomic imprinting","New mutation"],answer:2,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_5",exam:"mid1",lecture:"L7 Non Mendelian",q:"Matrilineal inheritance applies to disorders that are directly due to mutations in which of the following?",options:["Alpha globin gene","Mitochondrial DNA","tumor suppressor gene","CYP2C9"],answer:1,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_6",exam:"mid1",lecture:"L7 Non Mendelian",q:"Which of the following describes the presence of two types of mitochondrial DNA (normal and abnormal)?",options:["Homoplasmy","Heterozygous","Heteroplasmy","Homozygous"],answer:2,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_7",exam:"mid1",lecture:"L7 Non Mendelian",q:"Which of the following correctly describes the repeat expansion in Huntington disease?",options:["CCG repeats; normal range 4-39 repeats","CTG repeats; normal range 5-37 repeats","CAG repeats; disease range more than 40 repeats","CGG repeats; disease range 200-900 repeats"],answer:2,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_8",exam:"mid1",lecture:"L7 Non Mendelian",q:"Genomic imprinting is best described as a situation where:",options:["The normal individual has only one transcriptionally active allele at a given locus, determined by parent of origin","The individual inherits both homologous chromosomes from one parent","The individual has more than one cell type with different genotypes","Disease onset occurs at an earlier age in the offspring than in the parent"],answer:0,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_9",exam:"mid1",lecture:"L7 Non Mendelian",q:"One of the following disorders is caused by a genetic imprinting defect leading to developmental delay, seizures, and a happy demeanor:",options:["Sickle cell anemia","Angelman syndrome","Huntington disease","Neurofibromatosis"],answer:1,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_10",exam:"mid1",lecture:"L7 Non Mendelian",q:"The pedigree shown represents a 3-generation family where only males are affected (filled squares). The carrier females (circles with dots) show no symptoms. What is the most likely mode of inheritance?",options:["Autosomal recessive","Autosomal dominant","X-linked recessive","Mitochondrial"],answer:2,explanation:"In the pedigree, only males are affected (filled squares), carrier females are unaffected (circles with dots). There is no male-to-male transmission (fathers don't pass it to sons directly; sons get the X from their mother). The carrier female (I-2) passes the X-linked trait to her sons. This is classic X-linked recessive inheritance \u2014 as seen in DMD, hemophilia A/B, and other X-linked conditions.",image:"images/p45_pedigree_dmd.png"},{id:"mid1_mid1_example_1",exam:"mid1",lecture:"example",q:"Which of the following best describes the central dogma of molecular biology?",options:["DNA \u2192 Protein \u2192 RNA","RNA \u2192 DNA \u2192 Protein","DNA \u2192 RNA \u2192 Protein","Protein \u2192 RNA \u2192 DNA"],answer:2,explanation:"The central dogma states that genetic information flows from DNA to RNA (transcription) and then from RNA to Protein (translation)."},{id:"mid1_mid1_example_2",exam:"mid1",lecture:"example",q:"A codon consists of how many nucleotide bases?",options:["1","2","3","4"],answer:2,explanation:"A codon is a triplet of nucleotide bases that codes for a specific amino acid or stop signal."},{id:"mid2_mid2_L10_Birth_Defects_1",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn is diagnosed with an isolated congenital heart defect. Which type of birth defect does this represent?",options:["Dysplasia","Disruption","Malformation","Deformation"],answer:2,explanation:"A malformation is a primary structural defect arising from an intrinsic abnormality in a developmental process (e.g., congenital heart defects, cleft lip/palate, neural tube defects). It is primary and intrinsic."},{id:"mid2_mid2_L10_Birth_Defects_2",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following birth defects is considered a disruption?",options:["Congenital heart defect","Neural tube defect","Cleft lip and palate","Amniotic band syndrome"],answer:3,explanation:"A disruption is a secondary and extrinsic birth defect caused by an external destructive force that breaks down or interferes with an otherwise normal developmental process. Amniotic bands can wrap around limbs and cause disruption. It is NOT genetic."},{id:"mid2_mid2_L10_Birth_Defects_3",exam:"mid2",lecture:"L10 Birth Defects",q:"Certain malformations tend to occur together more frequently than expected by chance. Which of the following best represents this concept?",options:["Down syndrome","VACTERL association","Ectodermal dysplasia","Cleft lip and palate"],answer:1,explanation:"An association is a non-random occurrence of multiple anomalies that are not a known syndrome or sequence. VACTERL is an example (Vertebral, Anal, Cardiac, Tracheo-Esophageal, Renal, Limb anomalies)."},{id:"mid2_mid2_L10_Birth_Defects_4",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn presents with vertebral anomalies, anal atresia, tracheoesophageal fistula, and renal abnormalities. What is the most likely diagnosis?",options:["Potter sequence","Van der Woude syndrome","VATER association","Ectodermal dysplasia"],answer:2,explanation:"VATER/VACTERL association includes: Vertebral anomalies, Anal atresia, Cardiac defects, Tracheo-Esophageal fistula, Renal anomalies, Limb defects. It has no known single genetic cause and normal WES/microarray."},{id:"mid2_mid2_L10_Birth_Defects_5",exam:"mid2",lecture:"L10 Birth Defects",q:"A male newborn with vertebral anomalies, anal atresia, tracheoesophageal fistula, and radial ray defects has normal WES and microarray results. What is the most likely diagnosis?",options:["Potter sequence","VATER association","Van der Woude syndrome","Ectodermal dysplasia"],answer:1,explanation:"VATER association is non-random co-occurrence of structural anomalies with no identifiable genetic cause (normal chromosomes and microarray). The presence of radial ray defects is characteristic. This is an association, not a syndrome."},{id:"mid2_mid2_L10_Birth_Defects_6",exam:"mid2",lecture:"L10 Birth Defects",q:"Elevated amniotic alpha fetoprotein (AFP) has been detected prenatally in a patient. To reduce the risk of developing the consequence shown in the photo, what could be given?",options:["Vitamin B12","Folic acid","IgA","Immunosuppressant"],answer:1,explanation:"Elevated AFP indicates an open neural tube defect (NTD) such as anencephaly or spina bifida. Periconceptional folic acid supplementation significantly reduces the risk of NTDs. The image shows a meningomyelocele (spina bifida), the most common open NTD.",image:"images/tb_p66_fig1.png"},{id:"mid2_mid2_L10_Birth_Defects_7",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following terms describes the abnormal mechanical force which distorts an otherwise normal structure?",options:["Malformation","Disruption","Deformation","Dysplasia"],answer:2,explanation:"Deformation is caused by abnormal mechanical forces (extrinsic) that distort an otherwise normally formed structure. Examples include clubfoot (talipes equinovarus) from uterine constraint, and positional plagiocephaly. It differs from disruption in that the structure was initially normal."},{id:"mid2_mid2_L10_Birth_Defects_8",exam:"mid2",lecture:"L10 Birth Defects",q:"What is the best description of disruption?",options:["Primary and extrinsic","Secondary and extrinsic","Primary and intrinsic","Secondary and intrinsic"],answer:1,explanation:"Disruption is secondary (the original structure was forming normally) and extrinsic (caused by an outside destructive factor such as amniotic bands, infection, or ischemia). Malformation, by contrast, is primary and intrinsic."},{id:"mid2_mid2_L10_Birth_Defects_9",exam:"mid2",lecture:"L10 Birth Defects",q:"What is correct regarding neural tube defects?",options:["Anencephaly results from a defect in the lower end of the neural tube","The risk can be reduced by periconceptional folic acid supplementation","The recurrence risk from an affected parent is 10%","Spina bifida results from failure of cranial neural tube closure"],answer:1,explanation:"Periconceptional folic acid supplementation (before and during early pregnancy) reduces NTD risk by 50-70%. Anencephaly results from failure of CRANIAL (anterior) neural tube closure. Spina bifida results from failure of CAUDAL (posterior) closure. Recurrence risk is approximately 2-3%, not 10%."},{id:"mid2_mid2_L10_Birth_Defects_10",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following is caused by abnormal organization of tissue?",options:["Ectodermal dysplasia","Spina bifida","Cleft palate","Talipes"],answer:0,explanation:"Dysplasia refers to abnormal organization or function of cells within a specific tissue type. Ectodermal dysplasia results from abnormal development of ectodermal tissue (affecting hair, skin, teeth, nails, sweat glands). Most dysplasias are due to single gene defects."},{id:"mid2_mid2_L10_Birth_Defects_11",exam:"mid2",lecture:"L10 Birth Defects",q:"A family came with their 7-year-old girl and 5-year-old boy, complaining of chronic pulmonary disease, failure to thrive with malnutrition, and chronic diarrhea due to pancreatic insufficiency. What other clinical feature might be seen?",options:["Male infertility due to testicular atrophy","Male infertility due to congenital bilateral absence of the vas deferens","Female infertility due to ovarian failure","Infertility due to primary ciliary dyskinesia"],answer:1,explanation:"The clinical picture describes cystic fibrosis (CF) \u2014 autosomal recessive CFTR mutation. Males with CF frequently have congenital bilateral absence of the vas deferens (CBAVD), causing obstructive azoospermia and infertility. Testicular function is normal. Females with CF have reduced fertility due to thick cervical mucus, but not ovarian failure."},{id:"mid2_mid2_L10_Birth_Defects_12",exam:"mid2",lecture:"L10 Birth Defects",q:"Which medication, if given in the first trimester of pregnancy, helps reduce the risk of neural tube defects?",options:["Streptomycin","Folic acid","Isoniazid","Valproic acid"],answer:1,explanation:"Folic acid (vitamin B9) given periconceptionally and in the first trimester prevents neural tube defects (NTDs) by supporting proper neural tube closure. Streptomycin is ototoxic (teratogen). Isoniazid and valproic acid are potentially harmful teratogens; valproic acid is actually associated with INCREASED risk of NTDs."},{id:"mid2_mid2_L10_Birth_Defects_13",exam:"mid2",lecture:"L10 Birth Defects",q:"The image shows a newborn with a protrusion of abdominal contents through the umbilicus, covered by a thin membrane. What type of birth defect does this represent and what is the correct term for this finding?",options:["Disruption \u2014 gastroschisis","Malformation \u2014 omphalocele","Deformation \u2014 umbilical hernia","Dysplasia \u2014 abdominal wall dystrophy"],answer:1,explanation:"Omphalocele is a malformation (primary, intrinsic defect) where abdominal organs herniate through the umbilical ring and are covered by a peritoneal membrane. It differs from gastroschisis (a disruption) where organs herniate through a defect lateral to the umbilicus with NO covering membrane. Omphalocele is associated with chromosomal abnormalities (trisomy 13, 18) and BWS syndrome.",image:"images/tb_p65_fig1.png"},{id:"mid2_mid2_L10_Birth_Defects_14",exam:"mid2",lecture:"L10 Birth Defects",q:"An adult male presents with the physical findings shown in the image (gynecomastia, sparse body hair, and hypogonadism). These features developed as a result of a congenital chromosomal abnormality. What is the most likely underlying karyotype?",options:["46,XY (Normal male)","45,X (Turner syndrome)","47,XXY (Klinefelter syndrome)","47,XYY (Jacob syndrome)"],answer:2,explanation:"The image shows an adult male with gynecomastia and sparse body/facial hair \u2014 classic features of Klinefelter syndrome (47,XXY). Although it is a congenital chromosomal condition (present from birth), many clinical manifestations only become apparent during or after puberty. Features include: tall stature, small firm testes, azoospermia, infertility, gynecomastia, female-distribution pubic hair, and learning difficulties. It is the most common sex chromosome aneuploidy in males.",image:"images/tb_p65_fig2.png"},{id:"mid2_mid2_L10_Birth_Defects_15",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn presents with macroglossia (large tongue), macrosomia (large birth weight), and abdominal wall defect. The infant also develops severe hypoglycemia in the first hours of life. What is the most likely diagnosis?",options:["Down syndrome (Trisomy 21)","Beckwith-Wiedemann syndrome","VACTERL association","Turner syndrome"],answer:1,explanation:"The image shows a newborn with Beckwith-Wiedemann syndrome (BWS): an overgrowth syndrome characterized by macroglossia, macrosomia, omphalocele/abdominal wall defects, and neonatal hypoglycemia. BWS is caused by dysregulation of imprinted genes at chromosome 11p15.5 (IGF2/H19 region). Risk of embryonal tumors (Wilms tumor, hepatoblastoma) is increased. Most cases are sporadic; ~15% are familial.",image:"images/p64_bws_baby_q7.png"},{id:"mid2_mid2_L11_DNA_Repair_1",exam:"mid2",lecture:"L11 DNA Repair",q:"Which DNA repair mechanism involves the enzyme DNA glycosylase?",options:["Mismatch repair","Nucleotide excision repair","Base excision repair","Post-replication repair"],answer:2,explanation:"From L11 DNA Repair: Base Excision Repair Nucleotide excision repair *Thymidine dimers or chemical adducts \xDF apurinic/apyrimidinic site 4/11/26 8 Mismatch repair (MMR) mechanism DNA Repair Mechanisms \u2022 Double strand repair mechanisms \u2022 Homologous recombination (HR) mechanism \u2022 Non-homologous end joining (NHEJ) mechan..."},{id:"mid2_mid2_L11_DNA_Repair_2",exam:"mid2",lecture:"L11 DNA Repair",q:"Which sequence correctly describes the major DNA repair mechanism?",options:["Cleavage \u2192 Removal \u2192 Insertion \u2192 Sealing","Removal \u2192 Cleavage \u2192 Insertion \u2192 Sealing","Cleavage \u2192 Insertion \u2192 Removal \u2192 Sealing","Cleavage \u2192 Removal \u2192 Sealing \u2192 Insertion"],answer:0,explanation:"From L11 DNA Repair: \u2022 Demethylation \xE0 Methyl Group Removal \u2022 DNA methylation of imprinted loci observed in many cancer types \u2022 Photoreactivation \xE0 in bacteria \u2022 Repairs pyrimidine dimers \u2193 O6-methyl

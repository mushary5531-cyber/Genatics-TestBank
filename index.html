<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genetics TestBank</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #060913;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --indigo: #4f46e5;
  --sky: #38bdf8;
  --violet: #7c3aed;
}

body {
  background: var(--bg);
  color: #e2e8f0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  overflow-x: hidden;
}

/* ── Aurora ── */
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: aurora-float 14s ease-in-out infinite;
}
.aurora-1 {
  width: 520px; height: 520px;
  background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
  top: -120px; left: -100px;
  animation-delay: 0s;
}
.aurora-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
  top: 40%; right: -60px;
  animation-delay: -5s;
}
.aurora-3 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, #6d28d9 0%, transparent 70%);
  bottom: -80px; left: 30%;
  animation-delay: -9s;
}
@keyframes aurora-float {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-40px) scale(1.08); }
  66%      { transform: translate(-20px,30px) scale(0.95); }
}

/* ── Layout ── */
.screen-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  max-width: 720px;
  margin: 0 auto;
}

/* ── Title ── */
.main-title {
  font-size: 36px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 4px;
}
.shimmer-text {
  background: linear-gradient(90deg, #818cf8 0%, #38bdf8 30%, #a78bfa 60%, #818cf8 100%);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  to { background-position: 300% center; }
}
.subtitle {
  color: rgba(255,255,255,0.45);
  text-align: center;
  font-size: 15px;
  margin-top: -10px;
}

/* ── Glass card ── */
.glass-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px 22px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  width: 100%;
  max-width: 680px;
}
.section-label {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* ── Stagger animations ── */
.fade-in { animation: fadeUp 0.4s ease both; }
.stagger-1 { animation: fadeUp 0.4s ease 0.05s both; }
.stagger-2 { animation: fadeUp 0.4s ease 0.12s both; }
.stagger-3 { animation: fadeUp 0.4s ease 0.19s both; }
.stagger-4 { animation: fadeUp 0.4s ease 0.26s both; }
.stagger-5 { animation: fadeUp 0.4s ease 0.33s both; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Tabs ── */
.tab-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.tab-active {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 16px #7c3aed66;
}

/* ── Chips ── */
.chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s;
}
.chip:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
.chip-active {
  background: rgba(79,70,229,0.25);
  border-color: #818cf8;
  color: #c7d2fe;
}

/* ── Slider ── */
.custom-slider {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 99px;
  background: linear-gradient(90deg, #4f46e5, #38bdf8);
  outline: none;
  cursor: pointer;
}
.custom-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  box-shadow: 0 0 10px #818cf888;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.custom-slider::-webkit-slider-thumb:hover {
  box-shadow: 0 0 18px #818cf8cc;
}

/* ── Toggle ── */
.toggle-btn {
  width: 50px; height: 26px;
  border-radius: 99px;
  border: none;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  position: relative;
  transition: background 0.25s;
  flex-shrink: 0;
}
.toggle-on { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
.toggle-knob {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #fff;
  transition: left 0.25s;
  display: block;
}
.toggle-on .toggle-knob { left: 27px; }

/* ── Link btn ── */
.link-btn {
  background: none;
  border: none;
  color: #818cf8;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}
.link-btn:hover { color: #a5b4fc; }

/* ── Start button ── */
.start-btn {
  padding: 14px 40px;
  border-radius: 99px;
  border: none;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 24px #7c3aed66;
}
.start-btn:hover:not(:disabled) {
  transform: scale(1.04);
  box-shadow: 0 0 40px #7c3aed99;
}
.start-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  animation: none !important;
}
.glow-pulse {
  animation: glow-pulse 2.2s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { box-shadow: 0 0 24px #7c3aed66; }
  50%      { box-shadow: 0 0 48px #7c3aedcc; }
}

/* ── Source badge ── */
.source-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 99px;
  background: rgba(56,189,248,0.15);
  border: 1px solid rgba(56,189,248,0.35);
  color: #7dd3fc;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
}

/* ── Exam badge ── */
.exam-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 99px;
  background: rgba(129,140,248,0.18);
  border: 1px solid rgba(129,140,248,0.35);
  color: #a5b4fc;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

/* ── Question text ── */
.question-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.7;
  color: rgba(255,255,255,0.92);
  margin-bottom: 20px;
}

/* ── Options ── */
.options-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.options-wrap .opt-btn {
  animation: slideInLeft 0.3s ease both;
}
@keyframes slideInLeft {
  from { opacity:0; transform: translateX(30px); }
  to   { opacity:1; transform: translateX(0); }
}
.opt-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.82);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  text-align: right;
  cursor: pointer;
  transition: all 0.18s;
  width: 100%;
}
.opt-btn:hover:not(.opt-correct):not(.opt-wrong):not(.opt-dim) {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.25);
}
.opt-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.opt-correct {
  border-color: #34d399 !important;
  background: rgba(52,211,153,0.12) !important;
  color: #6ee7b7 !important;
}
.opt-correct .opt-letter { background: rgba(52,211,153,0.3); }
.opt-wrong {
  border-color: #f87171 !important;
  background: rgba(248,113,113,0.12) !important;
  color: #fca5a5 !important;
}
.opt-wrong .opt-letter { background: rgba(248,113,113,0.3); }
.opt-dim { opacity: 0.35; cursor: default; }

/* ── Animations: bounce + shake ── */
.anim-bounce { animation: bounce-correct 0.5s ease; }
@keyframes bounce-correct {
  0%,100% { transform: scale(1); }
  30%      { transform: scale(1.04); }
  60%      { transform: scale(0.97); }
}
.anim-shake { animation: shake-wrong 0.45s ease; }
@keyframes shake-wrong {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}

/* ── Explanation box ── */
.explanation {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.7;
  direction: auto;
}
.expl-correct {
  background: rgba(52,211,153,0.1);
  border: 1px solid rgba(52,211,153,0.3);
  color: #a7f3d0;
}
.expl-wrong {
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  color: #fecaca;
}

/* ── Nav buttons ── */
.nav-btn {
  padding: 10px 22px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.18s;
}
.nav-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.12);
  color: #fff;
}
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-primary {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 14px #7c3aed55;
}
.nav-primary:hover { box-shadow: 0 0 24px #7c3aed99 !important; }

/* ── Review card ── */
.review-card { margin-bottom: 0; }

/* ── Responsive ── */
@media (max-width: 480px) {
  .main-title { font-size: 26px; }
  .glass-card { padding: 16px; }
  .question-text { font-size: 15px; }
}

</head>

s mellitus"],answer:0,explanation:`Zynteglo (betibeglogene spartacus) uses an ex-vivo lentiviral vector to insert a functional beta-globin gene into the patient's own hematopoietic stem cells, treating transfusion-dependent beta-thalassemia. Libmeldy uses ex-vivo lentivirus for metachromatic leukodystrophy (MLD), a neurodegenerative disease. The clinical scenario of "severe anemia" with lentivirus best matches hemoglobinopathy treatment (Zynteglo).`,source:"Med 25"},{id:"final_final_L15_Gene_Therapy_2",exam:"final",lecture:"L15 Gene Therapy",q:"What is the mechanism of action of Spinraza (nusinersen) used in spinal muscular atrophy (SMA)?",options:["Modifying an existing gene's activity (splicing modulation)","Gene knockdown","Gene editing","Introducing a new gene"],answer:0,explanation:"Spinraza (nusinersen) is an antisense oligonucleotide (ASO) that binds to an intronic splicing silencer in the SMN2 pre-mRNA, blocking splicing factors that cause exon 7 skipping. This promotes inclusion of exon 7 in SMN2 mRNA, producing more full-length functional SMN protein. It modifies an existing gene's splicing activity without editing the DNA or introducing new genetic material.",source:"Med 24"},{id:"final_final_L15_Gene_Therapy_3",exam:"final",lecture:"L15 Gene Therapy",q:"Which gene therapy approach is used in Libmeldy for metachromatic leukodystrophy (MLD)?",options:["Ex-vivo AAV","In-vivo AAV","Ex-vivo lentivirus","In-vivo lentivirus"],answer:2,explanation:"Libmeldy (atidarsagene autotemcel) uses an ex-vivo lentiviral vector approach for MLD. The patient's own hematopoietic stem cells are harvested, transduced ex vivo with a lentiviral vector carrying a functional ARSA gene (encoding arylsulfatase A), and then reinfused after myeloablative conditioning. Ex-vivo lentivirus is preferred for hematopoietic stem cell gene therapy because lentiviruses stably integrate into non-dividing cells.",source:"Med 24"},{id:"final_final_L15_Gene_Therapy_4",exam:"final",lecture:"L15 Gene Therapy",q:"Which mutation type is ethically controversial when used as a target in gene therapy?",options:["Somatic mutation","Germline mutation","Ex-vivo therapy approach","Antisense mutation"],answer:1,explanation:'Germline gene therapy (modifying germ cells: sperm, oocytes, or early embryos) is ethically controversial because genetic changes would be heritable and passed to future generations, raising concerns about consent of future individuals, unintended off-target effects across generations, and the ethics of "designer babies." Somatic gene therapy (targeting non-reproductive cells) is not controversial as changes are not heritable.',source:"Med 24"},{id:"final_final_L15_Gene_Therapy_5",exam:"final",lecture:"L15 Gene Therapy",q:"Why are stem cells considered particularly desirable for therapeutic applications?",options:["They can only become nerve cells","They are found exclusively in reproductive tissue","They can differentiate into many different tissue types","They form complete whole organs independently"],answer:2,explanation:"Stem cells are therapeutically valuable because of their ability to self-renew and differentiate into multiple specialized cell types (pluripotency or multipotency). This makes them useful for replacing damaged cells in various diseases. Embryonic stem cells are pluripotent (can form any cell type). Adult stem cells are multipotent (more limited differentiation). Hematopoietic stem cells (used in bone marrow transplant/ex-vivo gene therapy) can differentiate into all blood cell lineages.",source:"Med 18"},{id:"final_final_L15_Gene_Therapy_6",exam:"final",lecture:"L15 Gene Therapy",q:"A child with SCID treated using retroviral gene therapy develops a leukemia-like disease. What is the most likely cause?",options:["Insertion of the retroviral vector near a proto-oncogene promoter","The SCID disease itself causing cancer","Triggered HTLV infection","Viral contamination of the product"],answer:0,explanation:"This describes the classic Paris SCID-ADA gene therapy trial complication (2002): retroviral vectors integrate randomly into the host genome. When insertion occurs near a proto-oncogene promoter (e.g., LMO2), it can activate the oncogene \u2192 uncontrolled T-cell proliferation \u2192 leukemia-like disease (insertional mutagenesis). This led to development of safer self-inactivating (SIN) lentiviral vectors with reduced insertional mutagenesis risk.",source:"Med 18"},{id:"final_final_L15_Gene_Therapy_7",exam:"final",lecture:"L15 Gene Therapy",q:"Oncogenic viral vectors are effective for gene therapy in mammalian cells. However, their use is mainly hindered by:",options:["They can only be used for ex-vivo gene therapy","They infect a wide spectrum of cells","Insertional mutagenesis (integration near oncogenes)","The foreign gene is only transiently expressed"],answer:2,explanation:"Retroviral/oncogenic vectors integrate into the host genome (which gives stable long-term expression \u2014 an advantage). The main disadvantage is insertional mutagenesis: random integration can disrupt tumor suppressor genes or activate proto-oncogenes \u2192 cancer risk. This was demonstrated in the Paris SCID trial. Lentiviruses (also integrating) have similar risk but newer SIN designs reduce it. Adenoviruses do NOT integrate \u2014 their limitation is transient expression and immune reactions.",source:"Med 25"},{id:"final_final_L15_Gene_Therapy_8",exam:"final",lecture:"L15 Gene Therapy",q:"Adenoviral vectors are effective for gene therapy, but they have a significant disadvantage of:",options:["Requirement for co-infection with a helper virus","Requirement of cell division for infection","Unstable (transient) expression of the introduced gene","Integration into the host genome causing mutagenesis"],answer:2,explanation:"Adenoviral vectors do NOT integrate into the host genome \u2014 they remain episomal. Advantages: can infect non-dividing cells, high transduction efficiency, large cloning capacity. Main disadvantages: transient expression (episomal DNA is diluted with cell division and lost), and strong immunogenicity (triggering host immune response that can eliminate transduced cells). They do NOT integrate, so insertional mutagenesis is not their disadvantage. The Jesse Gelsinger case (1999) showed fatal immune reaction to adenoviral vector.",source:"Med 25"},{id:"final_final_L15_Gene_Therapy_9",exam:"final",lecture:"L15 Gene Therapy",q:"The mRNA-based COVID-19 vaccines (Pfizer-BioNTech, Moderna) deliver mRNA into host cells using which delivery system?",options:["Adenoviral vector","Lipid nanoparticles (LNPs)","Retroviral vector","Electroporation"],answer:1,explanation:"mRNA COVID-19 vaccines (Pfizer-BioNTech/Comirnaty, Moderna/Spikevax) use lipid nanoparticles (LNPs) to encapsulate and deliver mRNA. LNPs protect the fragile mRNA from degradation, facilitate cellular uptake via endocytosis, and enable endosomal escape so the mRNA can be translated into the SARS-CoV-2 spike protein, triggering immune response. AstraZeneca/Janssen COVID-19 vaccines use adenoviral vectors. mRNA vaccines do not integrate into the genome.",source:"Med 25"},{id:"final_final_L15_Gene_Therapy_10",exam:"final",lecture:"L15 Gene Therapy",q:"Which of the following represents the main advantage of certain large-capacity vectors in gene therapy?",options:["Ability to carry large DNA inserts (high cloning capacity)","High immunogenicity ensuring strong immune activation","Permanent stable genomic integration in all tissues","Highly specific tissue tropism without off-target effects"],answer:0,explanation:"The ability to carry large DNA inserts is a critical advantage. Viral vectors have size limitations: AAV ~4.7 kb, lentivirus ~8\u201310 kb, adenovirus ~35 kb. Many disease genes are large (e.g., dystrophin at ~2.2 Mb cDNA), making delivery challenging. Gutted (helper-dependent) adenoviruses can carry up to ~36 kb. Non-viral approaches (lipid nanoparticles, electroporation) have no strict size limit. High insert capacity enables delivery of complete genes with regulatory elements.",source:"Med 25"},{id:"final_final_L15_Gene_Therapy_11",exam:"final",lecture:"L15 Gene Therapy",q:"Electroporation is used as a physical method for introducing DNA into cells. What is the mechanism by which it facilitates gene entry?",options:["Creates permanent pores in the cell membrane","Uses viral capsid proteins to penetrate the membrane","Depends on receptor-mediated endocytosis","Creates temporary pores via brief high-voltage electrical pulses"],answer:3,explanation:"Electroporation applies brief high-voltage electrical pulses that transiently permeabilize the cell membrane by creating temporary pores (electropores). This allows exogenous DNA, RNA, or proteins to enter the cell. The pores are TEMPORARY \u2014 the membrane reseals after the pulse. Electroporation is used in ex-vivo gene therapy (modifying T-cells for CAR-T therapy, stem cells). It is efficient for hard-to-transfect cells but can cause cell death if voltage is too high.",source:"Med 15"},{id:"final_final_L15_Gene_Therapy_12",exam:"final",lecture:"L15 Gene Therapy",q:"Which gene therapy vector is most suitable for treating neurological disorders such as Parkinson's disease because it transduces non-dividing neurons without genomic integration?",options:["Lentiviral vector","Retroviral vector","Adenoviral vector","Adeno-associated virus (AAV)"],answer:3,explanation:"AAV (adeno-associated virus) is the preferred vector for neurological gene therapy (Parkinson's disease, SMA, retinal dystrophies) because: (1) it efficiently transduces non-dividing cells (neurons), (2) it persists episomally without random genomic integration, minimizing insertional mutagenesis risk, (3) it is non-pathogenic with a strong safety profile, and (4) different serotypes show tropism for specific cell types (AAV9 crosses the blood-brain barrier). Approved AAV therapies include Zolgensma (SMA) and Luxturna (retinal dystrophy).",source:"Med 25"},{id:"final_final_L15_Gene_Therapy_13",exam:"final",lecture:"L15 Gene Therapy",q:"A researcher wants to suppress expression of a specific cancer- promoting gene. Which approach directly blocks gene expression by binding complementary mRNA sequences?",options:["Gene replacement therapy (adding a functional gene copy)","Antisense therapy (antisense oligonucleotides)","Gene editing with CRISPR-Cas9","Oncolytic virus therapy"],answer:1,explanation:"Antisense therapy uses antisense oligonucleotides (ASOs) \u2014 short single-stranded sequences complementary to the target mRNA. They bind via Watson-Crick base pairing \u2192 block translation (steric hindrance) or induce RNase H-mediated mRNA degradation \u2192 reduced protein production. Acts POST-TRANSCRIPTIONALLY on mRNA. Examples: nusinersen/Spinraza (SMA), inotersen (TTR amyloidosis), mipomersen (familial hypercholesterolemia). Gene replacement adds a functional copy; CRISPR edits DNA; oncolytic viruses selectively kill tumor cells.",source:"Med 25"},{id:"final_final_L15_Gene_Therapy_14",exam:"final",lecture:"L15 Gene Therapy",q:"Which of the following is NOT a recognized strategy in anti-cancer gene therapy?",options:["Tumor suppressor gene replacement (restoring p53 function)","Suicide gene therapy (HSV-TK + ganciclovir prodrug activation)","Immune gene therapy (CAR-T cell modification)","Introducing genes that promote vascularization and tumor invasion"],answer:3,explanation:"Anti-cancer gene therapy strategies include: tumor suppressor restoration (p53), suicide gene therapy (prodrug activation), immune enhancement (CAR-T, cytokine genes), anti-angiogenesis (blocking tumor blood supply), and oncolytic viruses. Introducing genes that PROMOTE vascularization (angiogenesis) or tumor invasion would ENHANCE tumor growth \u2014 the exact OPPOSITE of therapeutic intent. This is therefore NOT an anti-cancer strategy.",source:"Med 25"},{id:"final_final_L15_Gene_Therapy_15",exam:"final",lecture:"L15 Gene Therapy",q:"Induced pluripotent stem cells (iPSCs) are best described as:",options:["Embryonic stem cells derived from the inner cell mass of a blastocyst","Adult stem cells with limited differentiation potential","Mature (differentiated) somatic cells reprogrammed to pluripotency without using embryos","Stem cells isolated from umbilical cord blood"],answer:2,explanation:"iPSCs are generated by reprogramming adult somatic cells (e.g., skin fibroblasts) back to a pluripotent state using Yamanaka transcription factors (OCT4, SOX2, KLF4, c-MYC). They have the same pluripotency as embryonic stem cells (can differentiate into any cell type) but are derived WITHOUT embryo destruction \u2014 eliminating the major ethical objection to ESCs. iPSCs can be patient-specific (autologous), reducing immune rejection risk. Yamanaka received the 2012 Nobel Prize for this discovery.",source:"Med 25"},{id:"final_final_L15_Gene_Therapy_16",exam:"final",lecture:"L15 Gene Therapy",q:"Why cannot fully differentiated somatic cells naturally revert to become stem cells?",options:["The cells have lost DNA sequences needed for pluripotency during differentiation","Genes required for pluripotency are permanently turned off by epigenetic silencing","Differentiated cells have a fundamentally different genetic code","Differentiated cells cannot undergo mitosis"],answer:1,explanation:'Differentiated cells contain the same DNA as stem cells \u2014 they have NOT lost genetic sequences. The key difference is EPIGENETIC: genes required for pluripotency (OCT4, SOX2, etc.) are silenced by DNA methylation and histone modification (chromatin compaction) during differentiation. This epigenetic "lock" prevents these genes from being expressed. iPSC technology (Yamanaka) demonstrated that these epigenetic barriers CAN be reversed by introducing specific transcription factors, restoring pluripotency.',source:"Med 25"},{id:"final_final_L16_Genetic_Counseling_1",exam:"final",lecture:"L16 Genetic Counseling",q:'What is the correct definition of a "consultand" in genetic counseling?',options:["An individual who seeks genetic counseling","The person who performs the psychological support","A laboratory technician who interprets genetic tests","A medical geneticist who provides the diagnosis"],answer:0,explanation:"In genetic counseling terminology, the consultand (also called proband or index case in some contexts) is the individual who seeks genetic counseling \u2014 either an affected person or an at-risk family member. The genetic counselor is the professional who provides counseling services. The proband is specifically the affected family member through whom the family is ascertained.",source:"Med 25"},{id:"final_final_L16_Genetic_Counseling_2",exam:"final",lecture:"L16 Genetic Counseling",q:"Which of the following best describes genetic counseling?",options:["It focuses only on medical treatment of the patient","It is done only by a clinical geneticist","It focuses only on the psychological aspect of the patient","It deals with the risk of developing or transmitting a genetic disorder"],answer:3,explanation:"Genetic counseling is a communication process that helps individuals and families understand and adapt to the medical, psychological, and familial implications of genetic contributions to disease. It includes: providing information about the nature of the genetic condition, recurrence risks for family members, available testing and reproductive options, and psychological support. It is NOT limited to treatment, psychology alone, or performed only by geneticists (genetic counselors are also key providers).",source:"Med 25"},{id:"final_final_L16_Genetic_Counseling_3",exam:"final",lecture:"L16 Genetic Counseling",q:"Which of the following is an indication for genetic counseling in adults?",options:["Family history of appendicitis","Adult with migraine headaches","Family history of heart disease after 60 years of age","A strong personal or family history of cancer with heritability"],answer:3,explanation:"Indications for genetic counseling in adults include: strong personal/family history of hereditary cancer (BRCA1/2, Lynch syndrome), diagnosis of a known genetic condition, abnormal carrier screening, positive NIPT result, consanguinity, recurrent pregnancy loss, and occupational/teratogen exposure. Late-onset heart disease after 60 is usually multifactorial and non-hereditary. Appendicitis and migraines are not genetic indications.",source:"Med 25"},{id:"final_final_L16_Genetic_Counseling_4",exam:"final",lecture:"L16 Genetic Counseling",q:"Which of the following is a key principle (skill) of genetic counseling?",options:["Should be patient-centered and non-directive","Should be directive and tell patients what decisions to make","Should be judgmental about reproductive choices","Should be a one-way information transfer process"],answer:0,explanation:"Genetic counseling follows the principle of non-directiveness \u2014 it is patient-centered and does not tell patients what decisions to make. The counselor provides accurate information, supports autonomy, and respects the patient's values and beliefs. It is a two-way communication process (not one-way). The counselor should be non-judgmental about reproductive choices (such as continuation/termination of pregnancy).",source:"Med 25"},{id:"final_final_L16_Genetic_Counseling_5",exam:"final",lecture:"L16 Genetic Counseling",q:"A family was diagnosed with familial microcephaly, an autosomal recessive condition. The affected child has an unaffected sister. What is the correct counseling statement regarding the unaffected sister?",options:["The unaffected sister will definitely be affected later","The unaffected sister has a 2/3 probability of being a carrier","The parents cannot be carriers (it must be de novo)","The recurrence risk for future siblings is 50%"],answer:1,explanation:"For autosomal recessive conditions: if both parents are obligate carriers (Aa \xD7 Aa), their offspring are: 1/4 AA (unaffected non-carrier), 2/4 Aa (unaffected carrier), 1/4 aa (affected). Among unaffected children, the probability of being a carrier is 2/3. The recurrence risk for each future sibling is 25% affected. The parents are confirmed carriers since they have an affected child.",source:"Med 25"},{id:"final_final_L16_Genetic_Counseling_6",exam:"final",lecture:"L16 Genetic Counseling",q:"Two children in a family are affected with an autosomal dominant disease, but both parents are clinically unaffected. What is the most likely explanation?",options:["Variable expressivity in the parents","Germline mosaicism in one parent","Somatic mosaicism in the children","Two independent de novo mutations (one in each child)"],answer:1,explanation:"Germline mosaicism occurs when a mutation arises early in embryonic development of a parent, affecting their germ cells but not their somatic cells \u2014 so the parent appears clinically unaffected but can transmit the mutation to multiple children. This explains why two children are affected while both parents appear normal. Two independent de novo mutations occurring in the same family is statistically very unlikely. Somatic mosaicism would affect the children's tissues but the mutation would come from a parental germline event.",source:"Med 24"},{id:"final_final_L16_Genetic_Counseling_7",exam:"final",lecture:"L16 Genetic Counseling",q:"What is a potential reason for PEDIATRIC genetic counseling (for a child, not an adult)?",options:["Adult with family history of a genetic condition","Adult with family history of adult-onset disorders","Adult with family history of cancer","Child with a family history of a genetic condition"],answer:3,explanation:"Pediatric genetic counseling indications include: a child with a known or suspected genetic condition, dysmorphic features, developmental delay/intellectual disability, multiple congenital anomalies, failure to thrive, family history of a hereditary condition that may affect the child currently, or abnormal newborn screening. Adults are referred for adult genetic counseling (BRCA, Lynch syndrome, etc.). The key distinction: pediatric = current relevance to the child's health.",source:"Med 18"},{id:"final_final_L16_Genetic_Counseling_8",exam:"final",lecture:"L16 Genetic Counseling",q:"According to genetic counseling principles, all of the following are TRUE EXCEPT:",options:["Genetic counseling is directive","Any physician can participate in genetic counseling","It includes discussion of disease cause and recurrence risk","It should ideally be done before AND after genetic testing"],answer:0,explanation:"Genetic counseling is NON-DIRECTIVE (not directive). This is a fundamental principle \u2014 the counselor provides information and supports the patient's autonomous decision-making without influencing or directing their choices. TRUE statements: Any trained healthcare provider can provide basic genetic information (though certified genetic counselors/clinical geneticists are specialists); it DOES include discussion of disease cause, natural history, inheritance, recurrence risk, and reproductive options; and it should be offered both pre-test (to prepare) and post-test (to interpret results).",source:"Med 18"},{id:"final_final_L16_Genetic_Counseling_9",exam:"final",lecture:"L16 Genetic Counseling",q:"Regarding genetic counseling, which of the following is TRUE?",options:["It should only be done after genetic testing","It is directive","It can only be performed by physicians","It includes discussion of disease cause and mode of transmission"],answer:3,explanation:"Genetic counseling includes comprehensive discussion of: the diagnosis and its cause, inheritance pattern (mode of transmission), recurrence risks for family members, available diagnostic testing options, management and treatment options, reproductive choices, and psychosocial support. It is NON-directive (not B), should be offered PRE- and POST-testing (not only after testing), and can be provided by certified genetic counselors \u2014 not only physicians.",source:"Med 18"},{id:"final_final_L16_Genetic_Counseling_10",exam:"final",lecture:"L16 Genetic Counseling",q:"A consanguineous couple has a family history of PKU. What is the most appropriate genetic counseling for this couple?",options:["Autosomal dominant with reduced penetrance","Autosomal recessive; each parent has a 50% chance of being a carrier","Multifactorial inheritance; recurrence risk ~4%","X-linked recessive inheritance"],answer:1,explanation:'PKU (phenylketonuria) is autosomal recessive. With a positive family history and consanguinity, both members of the couple likely have an elevated chance of being carriers (heterozygous Aa). For a consanguineous couple with PKU family history, carrier testing should be offered. If both parents are confirmed carriers (Aa \xD7 Aa), the recurrence risk is 25% for each child (not 50%). The question states "50% chance of being carriers" which refers to carrier probability for each individual in a family, not the recurrence risk.',source:"Med 18"},{id:"final_final_L16_Genetic_Counseling_11",exam:"final",lecture:"L16 Genetic Counseling",q:"Which of the following is NOT a characteristic component of genetic counseling?",options:["Providing information about the diagnosis and its cause","Discussing inheritance pattern and recurrence risks","Offering psychological and emotional support to the family","Prescribing treatment for the genetic condition"],answer:4,explanation:"Genetic counseling is a long-term, ongoing process \u2014 NOT a single short-term contact. Components of genetic counseling include: diagnosis explanation and cause, inheritance pattern and recurrence risks, available testing options, management choices, reproductive options, and psychosocial support. Follow-up sessions are often needed as new information becomes available (e.g., new family members, updated testing). Short-term one-time-only contact contradicts the continuity model of genetic counseling. Prescribing treatment (option D) is also not the primary role, but ongoing support (option E) is explicitly excluded.",source:"Med 25"},{id:"final_final_L16_Genetic_Counseling_12",exam:"final",lecture:"L16 Genetic Counseling",q:"A family is known to carry a specific pathogenic MLH1 mutation causing Lynch syndrome. An asymptomatic adult sibling wants to know if they carry this mutation. Which genetic test is most appropriate?",options:["Chromosomal microarray (CMA)","Multi-gene NGS panel","Sanger sequencing targeting the known familial MLH1 mutation","MLPA (multiplex ligation-dependent probe amplification)"],answer:2,explanation:"When a specific causative mutation is already identified in the family (Lynch syndrome MLH1 pathogenic variant), predictive testing for at-risk relatives should use targeted Sanger sequencing to detect that specific known variant. This is cost-effective, rapid, and focused. A multi-gene NGS panel is appropriate when the diagnosis is uncertain or multiple genes need screening. Microarray detects copy number variants. MLPA is used for large deletions/duplications. For known familial point mutations: Sanger sequencing is the first choice.",source:"Med 25"},{id:"final_final_L17_Hemoglobinopathy_1",exam:"final",lecture:"L17 Hemoglobinopathy",q:"An adult hemoglobin molecule consists of:",options:["4 heme groups with 2 alpha chains and 2 beta chains","4 heme groups with 2 alpha chains and 1 gamma chain","3 heme groups with 2 alpha chains and 2 beta chains","3 heme groups with 2 alpha chains and 1 gamma chain"],answer:0,explanation:"Adult hemoglobin A (HbA) consists of 4 globin chains: 2 alpha (\u03B1) chains + 2 beta (\u03B2) chains, each carrying one heme group (iron-containing porphyrin ring). Total: 4 heme groups + 4 globin chains. Fetal hemoglobin (HbF) = \u03B12\u03B32. HbA2 (minor adult Hb) = \u03B12\u03B42. Each heme group binds one oxygen molecule, so HbA can carry 4 O\u2082 molecules.",source:"Med 25"},{id:"final_final_L17_Hemoglobinopathy_2",exam:"final",lecture:"L17 Hemoglobinopathy",q:"Which condition will occur if there is a loss (deletion) of all 4 alpha-globin genes?",options:["Cooley's anemia (beta-thalassemia major)","Delta-beta thalassemia","HbH disease (3-gene deletion)","Hydrops fetalis (Hb Bart's disease)"],answer:3,explanation:"Alpha-thalassemia severity correlates with the number of alpha-globin gene deletions: 1 gene deletion = silent carrier; 2 genes = alpha-thal trait; 3 genes = HbH disease (HbH = \u03B24 tetramers); 4 genes = Hydrops fetalis / Hb Bart's disease (\u03B34 tetramers). HbH disease causes moderate hemolytic anemia. Hydrops fetalis (all 4 alpha genes deleted) causes severe fetal anemia, hydrops, and is usually fatal in utero or shortly after birth.",source:"Med 25"},{id:"final_final_L17_Hemoglobinopathy_3",exam:"final",lecture:"L17 Hemoglobinopathy",q:"A molecular analysis shows a mutation of the triplet codon for glutamic acid in the beta-globin gene. Which of the following hemoglobin variants will be produced?",options:["HbS (sickle cell hemoglobin)","HbC","HbF (fetal hemoglobin)","HbA2"],answer:0,explanation:"HbS (sickle cell hemoglobin) is caused by a single missense mutation in the HBB gene: codon 6 changes from GAG (glutamic acid, Glu) to GTG (valine, Val). This is the classic glutamic acid codon mutation. The resulting \u03B2S chain forms HbS (\u03B12\u03B2S2), which polymerizes under deoxygenation causing sickling. HbC results from Glu\u2192Lys at the same codon 6. Note: some batches of this question in past exams listed the answer as HbA2 \u2014 however, the correct pharmacogenetic answer based on the slides is HbS.",source:"Med 25"},{id:"final_final_L17_Hemoglobinopathy_4",exam:"final",lecture:"L17 Hemoglobinopathy",q:"A newborn has Hb Bart's detected on neonatal hemoglobin screening. What is the composition of Hb Bart's?",options:["\u03B34 (four gamma chains)","\u03B12\u03B22 (normal adult hemoglobin)","\u03B12\u03B32 (fetal hemoglobin)","\u03B12\u03B42 (HbA2)"],answer:0,explanation:"Hb Bart's (Hemoglobin Bart's) = \u03B34 \u2014 four gamma globin chains forming tetramers. It occurs when all 4 alpha-globin genes are deleted (Hb Bart's hydrops fetalis). Without alpha chains, excess gamma chains form unstable \u03B34 tetramers. Hb Bart's has very high oxygen affinity and cannot release oxygen to fetal tissues, causing severe fetal hypoxia, hydrops fetalis, and stillbirth.",source:"Med 24"},{id:"final_final_L17_Hemoglobinopathy_5",exam:"final",lecture:"L17 Hemoglobinopathy",q:"Which of the following is a qualitative (structural) beta-globin disorder?",options:["Cooley's anemia (beta-thalassemia major)","Sickle cell anemia","Bart's hydrops fetalis","HbH disease"],answer:1,explanation:"Hemoglobin disorders are classified as: Quantitative (thalassemias) \u2014 reduced or absent production of a structurally normal globin chain (e.g., beta-thalassemia major = Cooley's anemia, HbH, Bart's hydrops). Qualitative (structural hemoglobinopathies) \u2014 structurally abnormal hemoglobin due to amino acid substitution (e.g., sickle cell anemia = HbS Glu\u2192Val, HbC, HbE). Sickle cell anemia is the prototype qualitative beta-globin disorder.",source:"Med 24"},{id:"final_final_L17_Hemoglobinopathy_6",exam:"final",lecture:"L17 Hemoglobinopathy",q:"A 2-year-old child presents with characteristic facial features (prominent forehead, maxillary prominence), severe pallor, and has required repeated blood transfusions since infancy. What is the definitive cure for this condition?",options:["Chelating agent therapy only","Bone marrow (hematopoietic stem cell) transplant","Hydroxyurea","Constant regular transfusions"],answer:1,explanation:"The description is beta-thalassemia major (Cooley's anemia): characterized by severe microcytic hemolytic anemia, transfusion dependence from infancy, and typical facial features from bone marrow expansion. The only definitive cure is allogeneic hematopoietic stem cell transplantation (HSCT/bone marrow transplant), which replaces the defective hematopoietic stem cells. Chelation therapy manages iron overload from transfusions but is not curative. Hydroxyurea is used in sickle cell disease to induce HbF. Gene therapy (Zynteglo) is an emerging curative option.",source:"Med 24"},{id:"final_final_L17_Hemoglobinopathy_7",exam:"final",lecture:"L17 Hemoglobinopathy",q:"One parent is affected with sickle cell disease (HbSS) and the other parent has sickle cell trait (HbAS). What is the recurrence risk for each pregnancy?",options:["50% chance of an affected child (HbSS)","25% chance of an unaffected child (HbAA)","No counseling needed as risk is minimal","75% chance of an affected child"],answer:0,explanation:"Cross: HbSS (affected) \xD7 HbAS (carrier/trait): All gametes from SS parent carry S. AS parent gives A or S (50% each). Results: 50% HbAS (sickle cell trait \u2014 carrier, usually asymptomatic) + 50% HbSS (sickle cell disease \u2014 affected). Therefore, 50% risk of an affected child per pregnancy. This couple requires thorough genetic counseling regarding recurrence risk and prenatal diagnosis options.",source:"Med 25"},{id:"final_final_L17_Hemoglobinopathy_8",exam:"final",lecture:"L17 Hemoglobinopathy",q:"A patient's hemoglobin electrophoresis shows markedly elevated HbF (fetal hemoglobin), slightly elevated HbA2, and markedly reduced HbA. What is the most likely diagnosis?",options:["Sickle cell disease (HbSS)","HbH disease (alpha-thalassemia)","Beta-thalassemia major","Hemoglobin Bart's hydrops fetalis"],answer:2,explanation:"In beta-thalassemia major, defective/absent beta-globin chain production causes markedly reduced or absent HbA (\u03B12\u03B22). The body compensates by: (1) markedly increasing HbF (\u03B12\u03B32 \u2014 gamma chains substitute for beta), and (2) slightly increasing HbA2 (\u03B12\u03B42). This pattern \u2014 elevated HbF + elevated HbA2 + low/absent HbA \u2014 is the hallmark of beta-thalassemia. HbH disease (\u03B1-thalassemia 3-gene deletion): HbH = \u03B24 tetramers. Hb Bart's (4-gene deletion): \u03B34 tetramers. HbSS: predominantly HbS with variable HbF.",source:"Med 25"},{id:"final_final_L17_Hemoglobinopathy_9",exam:"final",lecture:"L17 Hemoglobinopathy",q:"An Egyptian boy with severe anemia, hepatosplenomegaly, and characteristic facial features is found to have a mutation in the beta- globin gene. Molecular analysis reveals the mutation affects pre-mRNA splicing. What is the most likely diagnosis?",options:["Beta-thalassemia (splicing mutation causing reduced beta-globin production)","Sickle cell disease (HbSS)","HbH disease (alpha-thalassemia)","Hereditary spherocytosis"],answer:0,explanation:"Beta-thalassemia is frequently caused by splice-site mutations in the HBB gene. Common mutations include IVS-1-110 G>A and IVS-1-6 T>C (prevalent in Mediterranean and Middle Eastern populations, including Egypt) that cause aberrant splicing \u2192 reduced or absent functional beta-globin mRNA \u2192 beta-thalassemia. The clinical presentation (severe microcytic anemia + hepatosplenomegaly + characteristic facial features from medullary expansion) in an Egyptian child is classic for beta-thalassemia major (Cooley's anemia).",source:"Med 25"},{id:"final_final_L17_Hemoglobinopathy_10",exam:"final",lecture:"L17 Hemoglobinopathy",q:"A restriction fragment length polymorphism (RFLP) analysis using MstII enzyme is performed for sickle cell disease (SCD) carrier testing. The Southern blot result is shown below. What is the correct interpretation?",options:["Hamzah has sickle cell disease (HbSS); Sarah is unaffected","Both individuals are normal carriers","Sarah has sickle cell trait (HbAS); Hamzah is normal (HbAA)","Sarah has sickle cell disease (HbSS); Hamzah is unaffected"],answer:2,explanation:"MstII RFLP analysis exploits that the HbS mutation (c.20A>T, Glu\u2192Val) abolishes the MstII restriction site in HBB exon 1. Normal HbA allele: MstII cuts \u2192 produces smaller bands. HbS allele: NOT cut \u2192 produces a larger uncut band. HbAA (normal): shows only the normal cut bands (2 bands). HbAS (carrier/trait): shows both normal bands AND the uncut HbS band \u2192 3 bands total. HbSS: shows only the uncut HbS band. Interpretation: Sarah (3 bands) = HbAS carrier; Hamzah (2 normal bands) = HbAA normal.",image:"images/p88_rflp_sca_q1.png",source:"Med 25"},{id:"final_final_L18_L19_IEM_1",exam:"final",lecture:"L18 L19 IEM",q:"Which of the following is considered a second-line (confirmatory) test for inborn errors of metabolism?",options:["Ammonia level","Lactic acid level","Blood gas","Urine organic acid analysis"],answer:3,explanation:"IEM investigations are divided into: First-line (initial screening): ammonia, lactic acid, blood gas, glucose, CBC. Second-line (specific confirmatory): urine organic acids (identifies specific organic acidemias like methylmalonic acidemia, propionic acidemia), plasma amino acids (amino acidopathies), acylcarnitine profile (fatty acid oxidation defects), enzyme assays, and molecular testing. Urine organic acid analysis is a key second-line test that identifies the specific metabolic defect.",source:"Med 25"},{id:"final_final_L18_L19_IEM_2",exam:"final",lecture:"L18 L19 IEM",q:"Which of the following conditions presents very similarly to Marfan syndrome clinically?",options:["Phenylketonuria","Hurler disease (MPS type I)","Homocystinuria","Tay-Sachs disease"],answer:2,explanation:"Homocystinuria (CBS deficiency \u2014 autosomal recessive) can closely mimic Marfan syndrome: tall stature, long limbs (dolichostenomelia), arachnodactyly, pectus deformity, scoliosis, and lens dislocation (ectopia lentis). Key differences: Marfan has UPWARD lens dislocation, homocystinuria has DOWNWARD dislocation; homocystinuria causes intellectual disability, thromboembolic events, and osteoporosis; Marfan does NOT. Homocystinuria is caused by CBS gene mutations.",source:"Med 25"},{id:"final_final_L18_L19_IEM_3",exam:"final",lecture:"L18 L19 IEM",q:"Which of the following conditions is related to lysosomal storage disorders?",options:["Zellweger spectrum disorder","Mucopolysaccharidoses (MPS)","Mitochondrial fatty acid oxidation defects","Peroxisomal biogenesis disorders"],answer:1,explanation:"Lysosomal storage disorders (LSDs) result from deficiencies of lysosomal enzymes leading to substrate accumulation within lysosomes. Mucopolysaccharidoses (MPS) \u2014 such as Hurler (MPS I), Hunter (MPS II), Morquio (MPS IV), and Maroteaux-Lamy (MPS VI) \u2014 are LSDs caused by deficiencies of enzymes that degrade glycosaminoglycans (mucopolysaccharides). Zellweger is a peroxisomal disorder (not lysosomal). Fatty acid oxidation disorders are mitochondrial.",source:"Med 25"},{id:"final_final_L18_L19_IEM_4",exam:"final",lecture:"L18 L19 IEM",q:"A 6-year-old girl presents with intellectual disability, seizures, decreased pigmentation of skin, hair, and iris, and a musty/mousy odor of urine. Which amino acid would you expect to be elevated on quantitative plasma amino acid profile?",options:["Glycine","Homocysteine","Phenylalanine","Tyrosine"],answer:2,explanation:"The classic presentation is Phenylketonuria (PKU) \u2014 autosomal recessive deficiency of phenylalanine hydroxylase (PAH). Without PAH, phenylalanine (Phe) accumulates in blood and tissues \u2192 elevated plasma phenylalanine. Excess Phe is converted to phenylpyruvate/phenylacetate (musty/mousy odor). Phe competes with tyrosine for melanin synthesis \u2192 reduced skin/hair/iris pigmentation. Untreated PKU \u2192 severe intellectual disability, seizures, microcephaly.",source:"Med 25"},{id:"final_final_L18_L19_IEM_5",exam:"final",lecture:"L18 L19 IEM",q:"A female patient has short stature and rhizomelic (proximal) shortening of her limbs. Genetic testing shows a heterozygous FGFR3 mutation. If she marries a man with the same heterozygous mutation, what percentage of their children will be unaffected (normal)?",options:["100%","1-3%","25%","50%"],answer:2,explanation:"The condition is achondroplasia (autosomal dominant FGFR3 mutation). Cross: Aa (affected) \xD7 Aa (affected): AA = 25% (homozygous achondroplasia \u2014 lethal in utero/early infancy), Aa = 50% (affected with achondroplasia), aa = 25% (unaffected/normal stature). Therefore, 25% of all pregnancies will result in an unaffected child. Note: among live-born children, the fraction of unaffected children is about 1/3 (since AA is typically lethal).",source:"Med 25"},{id:"final_final_L18_L19_IEM_6",exam:"final",lecture:"L18 L19 IEM",q:"In ornithine transcarbamylase (OTC) deficiency, which investigation finding is most characteristic?",options:["Reduced orotic acid in urine","Elevated lactic acid","Hyperammonemia","Increased methionine and homocysteine"],answer:2,explanation:"OTC deficiency is the most common urea cycle disorder (X-linked recessive). OTC catalyzes the conversion of ornithine + carbamoyl phosphate \u2192 citrulline. Deficiency \u2192 carbamoyl phosphate accumulates \u2192 diverted to pyrimidine synthesis \u2192 increased OROTIC ACID in urine (elevated, not reduced). Most characteristic finding: hyperammonemia (elevated NH3) due to failure of the urea cycle. Presentation: vomiting, lethargy, encephalopathy in neonates (severe form) or periodic episodes in mild form.",source:"Med 25"},{id:"final_final_L18_L19_IEM_7",exam:"final",lecture:"L18 L19 IEM",q:"What is the best course of action for a 2-week-old neonate diagnosed with galactosemia?",options:["Lactose-free and galactose-free milk formula","Fructose-free milk","Liver transplant","Stem cell therapy"],answer:0,explanation:"Classic galactosemia (GALT deficiency \u2014 autosomal recessive) results in accumulation of galactose-1-phosphate. Treatment: immediate elimination of galactose and lactose from diet. Lactose (milk sugar) = glucose + galactose. Standard formula must be replaced with lactose-free AND galactose-free formula (soy-based or casein hydrolysate). Breastfeeding must stop. Early dietary treatment prevents liver damage, cataracts, and intellectual disability. Complications include E. coli sepsis in neonates.",source:"Med 24"},{id:"final_final_L18_L19_IEM_8",exam:"final",lecture:"L18 L19 IEM",q:"A newborn presents with vomiting, lethargy, and elevated phenylalanine levels. If the incidence of this condition is 1/10,000, what is the carrier frequency?",options:["1:100","1:25","1:50","1:10"],answer:2,explanation:"Using Hardy-Weinberg equilibrium: disease frequency (q\xB2) = 1/10,000. Therefore q = 1/100 (allele frequency of mutant allele). p \u2248 1 (since q is small). Carrier frequency = 2pq \u2248 2 \xD7 (1) \xD7 (1/100) = 2/100 = 1/50. The answer is 1:50. This principle applies to autosomal recessive conditions \u2014 carrier frequency is approximately 2\u221A(disease incidence).",source:"Med 24"},{id:"final_final_L18_L19_IEM_9",exam:"final",lecture:"L18 L19 IEM",q:"A neonate presents with vomiting, lethargy, and laboratory tests reveal significantly increased plasma levels of valine, leucine, and isoleucine. What is the most likely diagnosis?",options:["Propionic acidemia","Maple syrup urine disease (MSUD)","Methylmalonic acidemia","Isovaleric acidemia"],answer:1,explanation:"Maple Syrup Urine Disease (MSUD) is caused by deficiency of branched-chain alpha-keto acid dehydrogenase (BCKD). This enzyme catabolizes branched-chain amino acids (BCAAs): valine, leucine, and isoleucine. Deficiency \u2192 accumulation of BCAAs and their alpha-keto acids \u2192 sweet/maple syrup odor of urine \u2192 encephalopathy, seizures, cerebral edema. Treatment: BCAA-restricted diet, thiamine supplementation.",source:"Med 24"},{id:"final_final_L18_L19_IEM_10",exam:"final",lecture:"L18 L19 IEM",q:"A 2-year-old child presents with intellectual disability and hypopigmentation of hair. What is the most likely diagnosis?",options:["Phenylketonuria (PKU)","Galactosemia","Homocystinuria","Tay-Sachs disease"],answer:0,explanation:"PKU (phenylalanine hydroxylase deficiency) presents with: intellectual disability (untreated), fair skin and hair hypopigmentation (phenylalanine competes with tyrosine in melanin synthesis \u2192 reduced melanin \u2192 lighter pigmentation), musty urine odor, seizures, and eczema. Newborn screening (Guthrie test) detects elevated phenylalanine. Early dietary restriction of phenylalanine prevents neurological damage.",source:"Med 18"},{id:"final_final_L18_L19_IEM_11",exam:"final",lecture:"L18 L19 IEM",q:"Which of the following is a characteristic clinical feature of homocystinuria?",options:["Sweet-smelling urine","Dark urine","Lens dislocation (ectopia lentis)","Short stature and skeletal dysplasia"],answer:2,explanation:"Homocystinuria (CBS \u2014 cystathionine beta-synthase deficiency) features include: Marfanoid body habitus (tall, long limbs, arachnodactyly), ectopia lentis (lens dislocation \u2014 characteristically DOWNWARD, unlike Marfan's which is upward), intellectual disability, thromboembolic events (stroke, DVT), and osteoporosis. Sweet-smelling urine is characteristic of MSUD. Dark urine is seen in alkaptonuria.",source:"Med 18"},{id:"final_final_L18_L19_IEM_12",exam:"final",lecture:"L18 L19 IEM",q:"What is the characteristic clinical feature of PKU on physical examination?",options:["Hair hypopigmentation","Sweet-smelling urine","Lens dislocation","Hepatomegaly"],answer:0,explanation:"In PKU, excess phenylalanine competitively inhibits tyrosinase, reducing melanin synthesis \u2192 hypopigmentation of hair (blond/light hair even in dark-haired families), skin, and eyes. The urine has a musty/mousy odor (phenylacetate), NOT sweet. Sweet-smelling urine is MSUD. Lens dislocation is homocystinuria. Hepatomegaly is galactosemia.",source:"Med 18"},{id:"final_final_L18_L19_IEM_13",exam:"final",lecture:"L18 L19 IEM",q:"A child presented with non-ketotic hypoglycemia. This may be due to:",options:["Hereditary fructose intolerance","Hyperinsulinism","Von Gierke disease (GSD type I)","Galactosemia"],answer:1,explanation:"Non-ketotic hypoglycemia (hypoglycemia WITHOUT elevated ketones) is characteristic of hyperinsulinism (excess insulin suppresses fatty acid oxidation \u2192 no ketone production) and fatty acid oxidation disorders (FAO defects). Ketotic hypoglycemia (with ketones) is seen in: Von Gierke disease, galactosemia, hereditary fructose intolerance, and ketotic hypoglycemia of childhood. The absence of ketones is the key clue \u2014 it means fatty acid oxidation is impaired (hyperinsulinism) rather than simply inadequate glucose supply.",source:"Med 19"},{id:"final_final_L18_L19_IEM_14",exam:"final",lecture:"L18 L19 IEM",q:"A newborn infant presents with hypotonia, prominent forehead, large anterior fontanel, enlarged liver, renal cysts, and markedly increased plasma very long chain fatty acids (VLCFA). The pathogenesis of this disorder is due to:",options:["Severely reduced numbers of peroxisomes in all cells","Abnormal accumulation of one amino acid proximal to a metabolic block","Deficiency of a lysosomal enzyme causing accumulation of macromolecules","Inborn errors of glycogen synthesis and degradation enzymes"],answer:0,explanation:"The presentation is Zellweger syndrome (Cerebrohepatorenal syndrome) \u2014 a severe peroxisomal biogenesis disorder. Zellweger is caused by mutations in PEX genes, leading to severely reduced/absent peroxisomes. Without functional peroxisomes, VLCFA cannot be oxidized (beta-oxidation of VLCFA occurs in peroxisomes) \u2192 accumulate in blood and tissues. Features: neonatal hypotonia, craniofacial dysmorphism, hepatomegaly, renal cysts, and absent reflexes. Invariably fatal within the first year of life.",source:"Med 19"},{id:"final_final_L18_L19_IEM_15",exam:"final",lecture:"L18 L19 IEM",q:"A 6-year-old girl presents with intellectual disability, seizures, fair hair and skin, and a musty odor of sweat and urine. Regarding this disorder, which statement is correct?",options:["Treatment involves a low-methionine diet with cystine supplementation","It is caused by deficiency of the enzyme required for conversion of phenylalanine to tyrosine","Dietary fructose restriction gives a good prognosis","Diagnosis is confirmed by elevated branched-chain amino acids in blood"],answer:1,explanation:"The presentation describes PKU (phenylketonuria) \u2014 caused by phenylalanine hydroxylase (PAH) deficiency, which converts phenylalanine \u2192 tyrosine. Without PAH, phenylalanine accumulates \u2192 musty/mousy odor, fair skin/hair (tyrosine deficiency \u2192 reduced melanin), intellectual disability (untreated). Treatment: low-phenylalanine diet (NOT low-methionine). Low-methionine diet is for homocystinuria. Fructose restriction is for hereditary fructose intolerance. BCAA elevation is MSUD.",source:"Med 19"},{id:"final_final_L18_L19_IEM_16",exam:"final",lecture:"L18 L19 IEM",q:"A neonate is admitted to the NICU with ammonia level above 200 \u03BCmol/L. What disorder is most likely suspected?",options:["Glycogen storage disease","Urea cycle disorder","Mitochondrial disorder","Mucopolysaccharidosis"],answer:1,explanation:"Hyperammonemia (elevated ammonia) is the hallmark of urea cycle disorders (UCDs). The urea cycle converts toxic ammonia (NH3) to urea for excretion. Any enzyme defect in the cycle (CPS1, OTC, ASS, ASL, ARG1) causes ammonia accumulation \u2192 neonatal encephalopathy, lethargy, vomiting. Severe neonatal hyperammonemia (>200 \u03BCmol/L) requires immediate treatment (protein restriction, arginine supplementation, ammonia scavenger drugs, dialysis). Glycogen storage diseases cause hypoglycemia, not hyperammonemia.",source:"Med 19"},{id:"final_final_L18_L19_IEM_17",exam:"final",lecture:"L18 L19 IEM",q:"A 4-month-old male presents with jaundice since birth, cataract, and hepatomegaly. Investigations reveal reducing substances in urine. What is the appropriate management?",options:["Prescribing lactose-free (and galactose-free) milk formula","Giving tyrosine supplements","Restricting leucine and valine","Restricting fructose"],answer:0,explanation:"The presentation is classic galactosemia (GALT deficiency): jaundice, cataracts, hepatomegaly, and reducing substances in urine (Clinitest positive = galactose detected but Glucose Oxidase/Clinistix negative). Immediate treatment: eliminate all sources of galactose and lactose from diet \u2192 lactose-free galactose-free formula (e.g., soy formula). Delay leads to liver failure, E. coli sepsis, cataracts, and intellectual disability. Tyrosine supplements = alkaptonuria/tyrosinemia treatment. Leucine/valine restriction = MSUD. Fructose restriction = hereditary fructose intolerance.",source:"Med 19"},{id:"final_final_L18_L19_IEM_18",exam:"final",lecture:"L18 L19 IEM",q:"The laboratory reports significant elevation of plasma arginine. What additional biochemical abnormality is most expected?",options:["Hyperammonemia","Lactic acidosis","Hypoglycemia","Elevated muscle enzymes (CK)"],answer:0,explanation:"Elevated plasma arginine indicates arginase deficiency (ARG1 deficiency) \u2014 the last enzyme of the urea cycle, converting arginine \u2192 ornithine + urea. When arginase is absent, arginine accumulates AND urea cannot be formed \u2192 ammonia accumulates \u2192 hyperammonemia. Clinical features of arginase deficiency (UCD): spastic diplegia, intellectual disability, and hyperammonemia (typically milder than other UCDs). Treatment: low-protein diet, arginine-restricted diet, ammonia scavengers.",source:"Med 19"},{id:"final_final_L18_L19_IEM_19",exam:"final",lecture:"L18 L19 IEM",q:"A 1-year-old boy presents with intellectual disability, fair skin, and an unusual urine odor. What is the fundamental disease mechanism in this condition?",options:["Energy failure (ATP depletion)","Accumulation of large complex molecules (storage)","Excess of essential metabolites (substrate deficiency downstream)","Accumulation of toxic metabolites (substrate toxicity upstream)"],answer:3,explanation:"The presentation is PKU \u2014 the disease mechanism is substrate toxicity: phenylalanine (and its abnormal metabolites: phenylpyruvate, phenylacetate, phenyllactate) accumulate to toxic levels \u2192 inhibit brain development, neurotransmitter synthesis, and myelin formation. IEM mechanisms include: (1) Substrate toxicity: PKU, MSUD, OA, (2) Product deficiency: albinism (no melanin), (3) Energy failure: mitochondrial disorders, (4) Storage: LSDs (lysosomal storage). PKU specifically = toxic metabolite accumulation.",source:"Med 19"},{id:"final_final_L18_L19_IEM_20",exam:"final",lecture:"L18 L19 IEM",q:"Which of the following represents the correct disease-diagnostic biochemical test matching?",options:["Mucopolysaccharidosis \u2014 Plasma ammonia","Homocystinuria \u2014 Plasma methionine (and homocysteine)","Zellweger syndrome \u2014 Plasma glucose","Galactosemia \u2014 Plasma lactic acid"],answer:1,explanation:"Homocystinuria (CBS deficiency) \u2192 elevated plasma methionine and homocysteine (both accumulate due to blocked CBS enzyme). This is the correct match. MPS \u2192 elevated urine glycosaminoglycans (not ammonia; ammonia = urea cycle disorder). Zellweger \u2192 elevated plasma VLCFA (not glucose). Galactosemia \u2192 reducing substances in urine + elevated plasma galactose (not lactic acid; lactic acidosis = mitochondrial disorders or severe hypoxia).",source:"Med 19"},{id:"final_final_L18_L19_IEM_21",exam:"final",lecture:"L18 L19 IEM",q:"Plasma amino acid analysis is a useful diagnostic tool for which of the following disorders?",options:["Fatty acid oxidation defect","Galactosemia","Maple syrup urine disease (MSUD)","Organic acidemia"],answer:2,explanation:"MSUD (branched-chain alpha-keto acid dehydrogenase deficiency) causes accumulation of branched-chain amino acids (valine, leucine, isoleucine) in plasma \u2192 elevated on plasma amino acid analysis. For other conditions: FAO defects \u2192 diagnosed by acylcarnitine profile (plasma) and urine organic acids. Galactosemia \u2192 reducing substances in urine + RBC enzyme assay. Organic acidemias \u2192 urine organic acid analysis (NOT plasma amino acids, though some amino acids may be secondarily affected).",source:"Med 19"},{id:"final_final_L18_L19_IEM_22",exam:"final",lecture:"L18 L19 IEM",q:"A neonate presents with encephalopathy, vomiting, and plasma arginine is found to be markedly elevated in addition to elevated ammonia (400 \u03BCmol/L). Which urea cycle disorder is most likely?",options:["OTC (ornithine transcarbamylase) deficiency","CPS1 deficiency","Arginase deficiency (hyperargininemia)","Citrullinemia type I"],answer:2,explanation:"Arginase deficiency (ARG1 deficiency/hyperargininemia) is the last step of the urea cycle \u2014 arginase converts arginine \u2192 ornithine + urea. Deficiency \u2192 accumulation of ARGININE (markedly elevated plasma arginine) AND failure to complete the urea cycle \u2192 hyperammonemia. Unlike other UCDs that typically present as neonatal encephalopathy, arginase deficiency more commonly presents with progressive spastic diplegia and intellectual disability. However, severe forms can present with hyperammonemia in neonates. The combination of elevated arginine + hyperammonemia is the diagnostic clue.",source:"Med 25"},{id:"final_final_L18_L19_IEM_23",exam:"final",lecture:"L18 L19 IEM",q:"Deficiency of branched-chain alpha-ketoacid dehydrogenase (BCKD) complex leads to which metabolic disorder?",options:["Maple syrup urine disease (MSUD)","Phenylketonuria","Propionic acidemia","Homocystinuria"],answer:0,explanation:"Maple Syrup Urine Disease (MSUD) is caused by deficiency of the branched-chain alpha-ketoacid dehydrogenase (BCKD) complex \u2014 a mitochondrial multienzyme complex that catabolizes the keto-acid derivatives of all three branched-chain amino acids (BCAAs): leucine, isoleucine, and valine. Deficiency \u2192 accumulation of BCAAs and their corresponding alpha-keto acids \u2192 maple syrup/sweet odor of urine \u2192 neonatal encephalopathy, cerebral edema, seizures, and death if untreated. Treatment: BCAA-restricted diet + thiamine supplementation.",source:"Med 25"},{id:"final_final_L18_L19_IEM_24",exam:"final",lecture:"L18 L19 IEM",q:"A patient with homocystinuria is started on the appropriate dietary management. Which diet is correct for treating this condition?",options:["Low-phenylalanine diet with tyrosine supplementation","Low-galactose and lactose-free diet","Low-methionine diet with cysteine supplementation","Low-branched-chain amino acid diet with thiamine"],answer:2,explanation:"Homocystinuria (CBS \u2014 cystathionine beta-synthase deficiency) treatment: (1) Low-methionine diet (methionine is the dietary precursor to homocysteine \u2014 reducing intake lowers homocysteine accumulation), (2) Cysteine supplementation (cysteine becomes an essential amino acid because CBS is needed for its synthesis), (3) Pyridoxine (B6) supplementation for pyridoxine-responsive forms (reduces homocysteine by enhancing residual CBS activity), and (4) Betaine (methyl donor for homocysteine remethylation). Low-phenylalanine = PKU; low-galactose = galactosemia; low-BCAA = MSUD.",source:"Med 25"},{id:"final_final_L20_Oncogenetics_1",exam:"final",lecture:"L20 Oncogenetics",q:"A 47-year-old female is referred to the genetic clinic with a tumor in her right colon. Her father died at age 55 from colon cancer and her paternal aunt had endometrial cancer. What is the chance of her offspring to develop colon cancer?",options:["50%","25%","100%","75%"],answer:0,explanation:"The family history (colon cancer + endometrial cancer across generations, autosomal dominant pattern) is consistent with Lynch syndrome (HNPCC) \u2014 caused by mismatch repair gene mutations (MLH1, MSH2, MSH6, PMS2). Lynch syndrome follows autosomal dominant inheritance. An affected individual (the patient) has a 50% chance of passing the mutation to each offspring \u2192 50% risk of offspring carrying the mutation (and having significantly elevated lifetime cancer risk).",source:"Med 25"},{id:"final_final_L20_Oncogenetics_2",exam:"final",lecture:"L20 Oncogenetics",q:"Which class of genes is responsible for the two-hit hypothesis of cancer development?",options:["Tumor suppressor genes","Growth factor genes","Growth factor receptor genes","Proto-oncogenes"],answer:0,explanation:"Knudson's two-hit hypothesis applies to tumor suppressor genes (e.g., RB1, TP53, APC, BRCA1/2). Both alleles of the tumor suppressor gene must be inactivated for tumor development. In hereditary cancer syndromes, the first hit is a germline mutation (inherited), and the second hit is a somatic mutation in the remaining wild-type allele. In sporadic cancer, both hits are acquired somatically. Proto-oncogenes require only ONE activating mutation (dominant gain-of-function).",source:"Med 24"},{id:"final_final_L20_Oncogenetics_3",exam:"final",lecture:"L20 Oncogenetics",q:"Which condition is treated with prophylactic total colectomy?",options:["HNPCC (Lynch syndrome)","FAP (familial adenomatous polyposis)","Bloom syndrome","Cowden syndrome"],answer:1,explanation:"Familial Adenomatous Polyposis (FAP) \u2014 caused by germline APC mutations \u2014 leads to hundreds to thousands of colorectal polyps by adolescence/young adulthood. Without prophylactic total colectomy, colorectal cancer is virtually inevitable by age 40. Therefore, prophylactic colectomy is recommended in teenage years. Lynch syndrome (HNPCC) carries high colon cancer risk but does NOT require prophylactic colectomy \u2014 intensive surveillance (colonoscopy every 1-2 years) is the standard approach.",source:"Med 24"},{id:"final_final_L20_Oncogenetics_4",exam:"final",lecture:"L20 Oncogenetics",q:"Which condition typically requires prophylactic total colectomy as the management of choice?",options:["Lynch syndrome","FAP (familial adenomatous polyposis)","HNPCC","Bloom syndrome"],answer:1,explanation:"FAP (APC gene, autosomal dominant) causes development of hundreds to thousands of adenomatous polyps throughout the colon, with near-100% risk of colorectal cancer if untreated. Prophylactic total (or subtotal) colectomy is the standard management, typically performed in the teenage years or early adulthood. Lynch syndrome (= HNPCC) also increases colorectal cancer risk significantly but is managed with intensive colonoscopic surveillance, not prophylactic colectomy.",source:"Med 24"},{id:"final_final_L20_Oncogenetics_5",exam:"final",lecture:"L20 Oncogenetics",q:"What is the gene most commonly mutated in Lynch syndrome (HNPCC)?",options:["APC","BRCA1","MSH1/MSH2 (mismatch repair genes)","RB1"],answer:2,explanation:"Lynch syndrome (Hereditary Non-Polyposis Colorectal Cancer, HNPCC) is caused by germline mutations in DNA mismatch repair (MMR) genes: MLH1 (most common), MSH2, MSH6, and PMS2. Note: MSH1 does not exist \u2014 the relevant genes are MSH2 and MSH6. Lynch syndrome predisposes to colorectal cancer (without polyposis), endometrial cancer, ovarian cancer, and other tumors. APC mutations cause FAP. BRCA1/2 mutations cause hereditary breast/ovarian cancer.",source:"Med 25"},{id:"final_final_L20_Oncogenetics_6",exam:"final",lecture:"L20 Oncogenetics",q:"The pedigree shows a family with multiple members affected by breast and ovarian cancer across generations. What is the most likely associated gene?",options:["EPCAM","BRCA2","APC","PTEN"],answer:1,explanation:"A pedigree showing autosomal dominant inheritance of breast AND ovarian cancer (particularly with early-onset breast cancer in females and possible male breast cancer) strongly suggests BRCA1 or BRCA2 mutations. BRCA2 is particularly associated with both breast and ovarian cancer in females, and also increases breast cancer risk in males. EPCAM mutations cause Lynch syndrome (colorectal/endometrial cancer). APC causes FAP. PTEN causes Cowden syndrome (breast/thyroid/uterine tumors).",source:"Med 24"},{id:"final_final_L20_Oncogenetics_7",exam:"final",lecture:"L20 Oncogenetics",q:"Mutations in the BRCA2 gene:",options:["Account for 3\u20135% of all familial breast cancer cases","Account for 100% of familial breast cancer cases","Confer no breast cancer risk to males","Are associated with increased prostate cancer risk in males"],answer:3,explanation:"BRCA2 mutations: Account for approximately 10-20% of hereditary breast cancer (not 3-5%, not 100%). Males with BRCA2 mutations have significantly increased risk of breast cancer (male breast cancer risk ~7% lifetime vs. 0.1% general population) AND increased prostate cancer risk, as well as pancreatic cancer risk. BRCA1 mutations confer higher breast/ovarian cancer risk in females. BRCA2 mutations are associated with a broader tumor spectrum including prostate, pancreatic, and melanoma.",source:"Med 18"},{id:"final_final_L20_Oncogenetics_8",exam:"final",lecture:"L20 Oncogenetics",q:"Which statement about inherited cancer is TRUE?",options:["Most cancers are inherited","A parent may carry a cancer-predisposing mutation and remain unaffected while their child develops cancer","Inherited cancer never skips generations","Familial cancers are caused by mutations in normal genes only"],answer:1,explanation:'~5-10% of all cancers are hereditary (NOT most). Hereditary cancers follow autosomal dominant inheritance with incomplete penetrance \u2014 carriers may NOT develop cancer (reduced penetrance), while their children with the same mutation do develop cancer. This is because cancer requires additional somatic "hits" (two-hit hypothesis). Inherited cancer CAN skip generations due to reduced penetrance. Familial cancers are caused by mutations in cancer-predisposing genes (tumor suppressors, mismatch repair genes).',source:"Med 18"},{id:"final_final_L20_Oncogenetics_9",exam:"final",lecture:"L20 Oncogenetics",q:"Which of the following features is most suggestive of a hereditary cancer syndrome in a family?",options:["Several close relatives affected with the same type of cancer","Only one relative with a rare cancer","Late age of onset (after 70 years)","A single unilateral tumor"],answer:0,explanation:"Features suggesting a hereditary cancer syndrome include: multiple family members with the same or related cancers (e.g., breast + ovarian, colorectal + endometrial), early age of onset (before 50), multiple primary tumors in one individual, bilateral tumors, rare cancers in unexpected demographics (male breast cancer), and autosomal dominant inheritance pattern across generations. Late age of onset and sporadic single tumors are typical of sporadic cancer.",source:"Med 18"},{id:"final_final_L20_Oncogenetics_10",exam:"final",lecture:"L20 Oncogenetics",q:"A woman is confirmed to carry a BRCA1 pathogenic variant. Her mother is unaffected (no cancer at age 65). What genetic concept best explains why the mother carrying the same mutation remains unaffected?",options:["Incomplete penetrance \u2014 not all mutation carriers develop cancer","Genomic imprinting \u2014 maternal BRCA1 is always silenced","Variable expressivity of the cancer phenotype only","The mother does not carry the BRCA1 mutation"],answer:0,explanation:"Incomplete penetrance means that not all individuals carrying a pathogenic variant will manifest the disease/phenotype. BRCA1 mutations have high but INCOMPLETE penetrance \u2014 lifetime breast cancer risk ~70\u201385% and ovarian cancer risk ~40\u201360%, meaning 15\u201330% of BRCA1 carriers will NOT develop breast cancer in their lifetime. Therefore, a BRCA1-positive mother can remain unaffected (no cancer) while her daughter develops cancer. This is incomplete penetrance \u2014 not genomic imprinting or expressivity differences.",source:"Med 25"},{id:"final_final_L20_Oncogenetics_11",exam:"final",lecture:"L20 Oncogenetics",q:"Lynch syndrome (HNPCC) is caused by germline mutations in which genes?",options:["APC and TP53","BRCA1 and BRCA2","MSH2 and MLH1 (DNA mismatch repair genes)","RB1 and NF1"],answer:2,explanation:"Lynch syndrome (HNPCC \u2014 Hereditary Non-Polyposis Colorectal Cancer) is caused by germline mutations in DNA mismatch repair (MMR) genes: MLH1 (most common, ~50%), MSH2 (~40%), MSH6, PMS2, and EPCAM. MLH1 and MSH2 together account for ~90% of Lynch syndrome cases. These genes normally repair base-pair mismatches during DNA replication. Loss \u2192 microsatellite instability (MSI) \u2192 colorectal, endometrial, ovarian, and other cancers. APC/TP53 = sporadic colorectal cancer. BRCA1/2 = hereditary breast-ovarian cancer.",source:"Med 25"},{id:"final_final_L20_Oncogenetics_12",exam:"final",lecture:"L20 Oncogenetics",q:"What is the recommended cancer surveillance strategy for an individual diagnosed with Lynch syndrome (HNPCC)?",options:["Annual colonoscopy surveillance starting from age 20\u201325","Prophylactic total colectomy immediately upon diagnosis","Chemoprevention with aspirin alone (no colonoscopy needed)","Begin surveillance only after age 50"],answer:0,explanation:"Lynch syndrome management: annual or biennial colonoscopy (starting at age 20\u201325, or 5 years before the earliest cancer in the family), surveillance for extracolonic cancers (endometrial, ovarian, urinary tract, gastric), and genetic counseling for relatives. Annual colonoscopy significantly reduces colorectal cancer incidence and mortality. Prophylactic colectomy is reserved for extreme cases (not standard for Lynch). Aspirin has some chemopreventive benefit but does not replace surveillance. Early surveillance is key given the ~70\u201380% lifetime colon cancer risk.",source:"Med 25"},{id:"final_final_L20_Oncogenetics_13",exam:"final",lecture:"L20 Oncogenetics",q:"A patient's cervical biopsy confirms carcinoma. Molecular testing reveals HPV (human papillomavirus) integration into the host genome. What type of cancer does this represent?",options:["Hereditary cancer syndrome","Chromosomal instability cancer","Virally-induced (acquired) cancer \u2014 somatic etiology","Familial cancer with autosomal dominant inheritance"],answer:2,explanation:"Cervical cancer caused by HPV infection is a virally-induced, acquired (somatic) cancer \u2014 NOT a hereditary cancer syndrome. HPV oncoproteins (E6 and E7) inactivate tumor suppressors TP53 and RB1 respectively, driving malignant transformation. This is a somatic (acquired) genetic change, not inherited in the germline. Hereditary cancers are caused by inherited germline mutations (BRCA1/2, Lynch syndrome genes). HPV-positive cervical cancer is preventable by vaccination (HPV vaccines cover high-risk types 16 and 18). ---",source:"Med 25"},{id:"final_final_L20_Oncogenetics_14",exam:"final",lecture:"L20 Oncogenetics",q:"A pedigree shows a family with multiple women affected by breast and ovarian cancer across generations (grandmother with ovarian cancer at 49, aunt with breast cancer at 42, another relative with ovarian cancer, and a sister with breast cancer at 38). The index case (proband, indicated by an arrow) is an unaffected female whose mother was affected. What is the recurrence risk of the index case being a BRCA2 mutation carrier?",options:["100%","50%","1\u20133%","25%"],answer:1,explanation:"BRCA2 mutations follow autosomal dominant inheritance. If the proband's mother is a confirmed BRCA2 mutation carrier (affected with breast/ovarian cancer), each of her children has a 50% independent probability of inheriting the BRCA2 mutation. Therefore, the recurrence risk for the index case (unaffected female child of an affected carrier mother) = 50%. This is the standard AD inheritance probability for first-degree relatives. Note: the 50% refers to the probability of INHERITING the mutation \u2014 BRCA2 has high but INCOMPLETE penetrance (~70\u201385% lifetime breast cancer risk), so carriers may not develop cancer.",source:"Med 25"},{id:"final_final_L21_Prenatal_Diagnosis_1",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"An increased maternal serum beta-hCG (B-hCG) combined with a reduced maternal serum AFP (MSAFP) suggests a possibility of whic

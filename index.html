h condition?",options:["Down syndrome (Trisomy 21)","Hydatidiform mole","Neural tube defect","Edwards syndrome (Trisomy 18)"],answer:0,explanation:"The triple/quadruple screening test pattern for Down syndrome (Trisomy 21): elevated B-hCG (\u2191), reduced MSAFP (\u2193), low uE3 (\u2193), elevated inhibin A (\u2191). Neural tube defects show markedly ELEVATED MSAFP (not reduced). Edwards syndrome (Trisomy 18) shows low hCG + low MSAFP + low uE3. Hydatidiform mole causes extremely high hCG but is not a fetal chromosomal abnormality.",source:"Med 25"},{id:"final_final_L21_Prenatal_Diagnosis_2",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Increased maternal serum alpha-fetoprotein (MSAFP) suggests a possibility of which condition?",options:["Neural tube defect (open NTD)","Down syndrome (Trisomy 21)","Edwards syndrome (Trisomy 18)","Turner syndrome"],answer:0,explanation:"Elevated MSAFP indicates leakage of fetal AFP into maternal blood, most commonly from an open neural tube defect (NTD) such as anencephaly or meningomyelocele (spina bifida aperta). Other causes of elevated MSAFP: gastroschisis, abdominal wall defects, fetal death, multiple pregnancy. Down syndrome and other trisomies typically show REDUCED MSAFP. Elevated MSAFP should be followed by detailed fetal ultrasound and possibly amniocentesis for amniotic AFP.",source:"Med 25"},{id:"final_final_L21_Prenatal_Diagnosis_3",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Which of the following is an indication for prenatal diagnosis?",options:["Very young maternal age (teenage pregnancy)","Advanced maternal age (\u226535 years)","Family history of obesity","Smoking during pregnancy"],answer:1,explanation:"Indications for prenatal diagnosis include: advanced maternal age (\u226535 years) due to increased risk of chromosomal aneuploidy (especially trisomy 21), previous child with chromosomal abnormality, carrier status for chromosomal rearrangement or single-gene disorder, abnormal maternal serum screening, family history of genetic condition diagnosable prenatally, and abnormal fetal ultrasound findings. Obesity, smoking, and young maternal age are NOT standard indications for invasive prenatal testing.",source:"Med 25"},{id:"final_final_L21_Prenatal_Diagnosis_4",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"A 13-week pregnant woman has low PAPP-A and low beta-hCG on first-trimester screening. What is the best confirmatory diagnostic test?",options:["Triple test (second trimester)","Quadruple test (second trimester)","Chorionic villus sampling (CVS)","No further testing needed"],answer:2,explanation:"At 13 weeks, chorionic villus sampling (CVS) is the appropriate invasive diagnostic test for suspected chromosomal abnormality. CVS is performed between 10-14 weeks of gestation, providing a definitive karyotype/chromosomal diagnosis. Low PAPP-A + low beta-hCG in first trimester is a pattern seen in chromosomal aneuploidy (particularly trisomies). The triple and quadruple tests are second-trimester screening tests \u2014 not indicated when the question asks for confirmatory diagnosis at 13 weeks.",source:"Med 24"},{id:"final_final_L21_Prenatal_Diagnosis_5",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"A 13-week pregnant woman has low PAPP-A and low beta-hCG. What is the most likely underlying fetal condition?",options:["Aneuploidy (chromosomal abnormality)","Single-gene disorder","Multifactorial condition","Normal variant"],answer:0,explanation:"Low PAPP-A (pregnancy-associated plasma protein-A) combined with low beta-hCG at 11-13 weeks is characteristic of fetal aneuploidy \u2014 particularly trisomy 18 (Edwards syndrome) and trisomy 13 (Patau syndrome). Trisomy 21 typically shows elevated hCG + reduced PAPP-A. Monosomy X (Turner) shows low PAPP-A + low hCG. Single-gene disorders and multifactorial conditions do not typically affect these serum markers.",source:"Med 24"},{id:"final_final_L21_Prenatal_Diagnosis_6",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"The image shows a procedure performed on a pregnant woman for fetal genetic testing. What is the best description of this procedure?",options:["Chorionic villus sampling (invasive)","Invasive prenatal test","Non-invasive prenatal test (NIPT/cfDNA)","Amniocentesis"],answer:2,explanation:"Non-invasive prenatal testing (NIPT) uses cell-free fetal DNA (cfDNA) circulating in maternal blood, obtained by a simple maternal blood draw. No risk to the fetus. NIPT screens for trisomy 21, 18, 13, and sex chromosome aneuploidies with high sensitivity/specificity. It is a SCREENING test (not diagnostic) \u2014 positive results require confirmation by CVS or amniocentesis. The image shows a blood draw from the mother, distinguishing it from invasive procedures.",source:"Med 24"},{id:"final_final_L21_Prenatal_Diagnosis_7",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"A 13-week pregnant woman has low PAPP-A and low beta-hCG. Suspected trisomy. What is the best confirmatory diagnostic test?",options:["Quadruple test","Triple test","Chorionic villus sampling (CVS)","Screening alone is sufficient"],answer:2,explanation:"When first-trimester screening (PAPP-A + beta-hCG + nuchal translucency) is abnormal and trisomy is suspected at 13 weeks, the best CONFIRMATORY diagnostic test is CVS (10-14 weeks) \u2014 it provides a definitive fetal karyotype. Amniocentesis is performed at 15-20 weeks. Triple and quadruple tests are second-trimester screening tools, not diagnostic. Screening alone is never sufficient when confirmation is required for clinical decision-making.",source:"Med 24"},{id:"final_final_L21_Prenatal_Diagnosis_8",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"What is the recurrence risk for siblings when a child is born with bilateral cleft lip and palate?",options:["4.2%","2.6%","5.6%","0.5%"],answer:2,explanation:"Cleft lip and palate (CL/P) is a multifactorial condition. Recurrence risk increases with: severity (bilateral > unilateral), number of affected family members, and severity of the proband's defect. For bilateral cleft lip and palate (most severe form): recurrence risk for siblings is approximately 5\u20136%. For unilateral CL/P: sibling risk ~3-4%. For cleft palate alone: sibling risk ~2-3%. The answer of 5.6% reflects the higher recurrence risk associated with bilateral involvement.",source:"Med 18"},{id:"final_final_L21_Prenatal_Diagnosis_9",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Which medication is recommended during the first trimester of pregnancy to reduce the risk of neural tube defects?",options:["Streptomycin","Folic acid","Isoniazid","Valproic acid"],answer:1,explanation:"Periconceptional folic acid supplementation (ideally starting 1 month before conception through the first trimester) reduces neural tube defect (NTD) risk by 50\u201370%. The neural tube closes during weeks 3\u20134 of gestation (before many women know they are pregnant), so supplementation must begin BEFORE conception. Streptomycin is ototoxic (teratogen). Isoniazid carries risks. Valproic acid is a known NTD-inducing teratogen (it inhibits folate metabolism) \u2014 actually increases NTD risk.",source:"Med 18"},{id:"final_final_L21_Prenatal_Diagnosis_10",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Two parents have two affected children with Hemophilia A. They want a healthy child. What is the best recommendation?",options:["Preimplantation genetic diagnosis (PGD)","Newborn screening after birth","Early diagnosis and treatment only","Chorionic villus sampling in each pregnancy"],answer:0,explanation:"Preimplantation genetic diagnosis (PGD) combined with in-vitro fertilization (IVF) allows genetic testing of embryos BEFORE implantation. For Hemophilia A (X-linked recessive), PGD can identify unaffected embryos (carrier females or unaffected males) for implantation, ensuring the couple has a healthy child while avoiding the ethical issues of prenatal diagnosis followed by possible pregnancy termination. Newborn screening detects disease after birth (too late for prevention). CVS is prenatal diagnosis, not preimplantation.",source:"Med 18"},{id:"final_final_L21_Prenatal_Diagnosis_11",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"An increase in inhibin-A in maternal serum is associated with:",options:["Cystic fibrosis","Down syndrome (Trisomy 21)","Turner syndrome","Duchenne muscular dystrophy"],answer:1,explanation:"The quadruple test (second trimester, 15-20 weeks) for Down syndrome includes: AFP (low \u2193), hCG (high \u2191), unconjugated estriol/uE3 (low \u2193), and inhibin-A (HIGH \u2191). Elevated inhibin-A is one of the four markers in the quad screen. The elevated inhibin-A in trisomy 21 pregnancies is thought to be due to abnormal placental function associated with the extra chromosome 21. Inhibin-A is NOT elevated in cystic fibrosis, Turner syndrome, or DMD.",source:"Med 18"},{id:"final_final_L21_Prenatal_Diagnosis_12",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"A mother has one child with galactosemia and is now pregnant with her second child in the second trimester. What genetic test is most appropriate to advise?",options:["Newborn screening after birth","Parental carrier testing","Ultrasonography only","Maternal serum AFP"],answer:1,explanation:"When a couple has already had a child with an autosomal recessive condition (galactosemia), both parents are confirmed obligate carriers. Parental carrier testing confirms carrier status and allows calculation of recurrence risk (25% for each subsequent pregnancy). The appropriate prenatal diagnostic test for the CURRENT pregnancy would be CVS or amniocentesis for enzyme assay or molecular testing. Newborn screening identifies affected babies after birth (doesn't help plan the current pregnancy).",source:"Med 18"},{id:"final_final_L21_Prenatal_Diagnosis_13",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Which prenatal test does NOT carry a risk of fetal loss?",options:["Maternal serum AFP (MSAFP)","Chorionic villus sampling (CVS)","Fetal tissue sampling","Amniocentesis"],answer:0,explanation:"Maternal serum AFP is a maternal blood test \u2014 it poses no risk whatsoever to the fetus (only a blood draw from the mother). Invasive prenatal tests that carry fetal loss risk: CVS (~0.5-1% procedure-related fetal loss), amniocentesis (~0.1-0.3% fetal loss), and fetal tissue sampling (higher risk). The distinction between invasive (CVS, amniocentesis, cordocentesis) and non-invasive (maternal blood tests, ultrasound, NIPT) prenatal tests is clinically important.",source:"Med 18"},{id:"final_final_L21_Prenatal_Diagnosis_14",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"The triple screen test includes all of the following EXCEPT:",options:["Alpha-fetoprotein (AFP)","Human chorionic gonadotropin (hCG)","Unconjugated estriol (uE3)","Indirect bilirubin"],answer:3,explanation:"The triple screen (second trimester, 15-20 weeks) consists of three markers: AFP (from fetal liver/yolk sac), hCG (from placenta), and unconjugated estriol/uE3 (from fetal adrenals \u2192 placenta \u2192 maternal blood). The quadruple screen adds a 4th marker: inhibin-A. Indirect bilirubin is NOT part of prenatal screening tests. It is measured in newborns for jaundice assessment or in adults for hemolytic anemia evaluation.",source:"Med 18"},{id:"final_final_L21_Prenatal_Diagnosis_15",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Which of the following is classified as a non-invasive prenatal diagnostic/screening method?",options:["Amniocentesis (amniotic fluid sampling)","Chorionic villus sampling (CVS)","Three-dimensional (3D) ultrasound","Cordocentesis (fetal blood sampling)"],answer:2,explanation:"3D ultrasound (and standard 2D ultrasound) is a non-invasive prenatal method \u2014 it uses sound waves with no penetration of the uterine or fetal membranes, posing no risk of fetal loss. Non-invasive methods include: ultrasound (2D, 3D, 4D), maternal serum screening, and NIPT (cfDNA blood test). Invasive methods requiring needle insertion: amniocentesis (~0.1\u20130.3% fetal loss risk), CVS (~0.5\u20131% fetal loss risk), and cordocentesis (higher risk). Non-invasive tests are screening tools; invasive tests provide definitive diagnosis.",source:"Med 25"},{id:"final_final_L21_Prenatal_Diagnosis_16",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"In prenatal diagnosis, which approach involves testing of embryos before implantation to avoid transmission of a genetic disorder?",options:["Preimplantation genetic diagnosis (PGD) via IVF","First-trimester chorionic villus sampling","Second-trimester amniocentesis","Non-invasive prenatal testing (NIPT)"],answer:0,explanation:"Preimplantation genetic diagnosis (PGD) \u2014 now termed preimplantation genetic testing (PGT) \u2014 involves testing embryos created via IVF BEFORE uterine implantation. Only genetically unaffected embryos are transferred, preventing disease transmission entirely. This is the earliest possible form of prenatal genetic testing and avoids the ethical dilemma of terminating an affected pregnancy. It is applicable to single-gene disorders, chromosomal abnormalities, and HLA matching. First-line choice for couples who want a healthy child without pregnancy termination.",source:"Med 25"},{id:"final_final_L21_Prenatal_Diagnosis_17",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"A DNA fingerprinting (STR profiling) study of a family shows four children. The DNA profile of Child 4 does not share any alleles with the alleged father's profile. What is the most likely interpretation?",options:["Child 4 is adopted (not biologically related to the alleged father)","Child 4 has a new de novo mutation altering all STR markers","The DNA sample was contaminated","Child 4 has uniparental disomy from the mother only"],answer:0,explanation:"DNA fingerprinting using short tandem repeat (STR) markers establishes biological relationships. Each person inherits one STR allele from each parent. If a child shares NO alleles with the alleged father across multiple STR loci, this definitively excludes biological paternity. The most likely explanation is that Child 4 is not biologically related to the alleged father (e.g., adopted or has a different biological father). De novo mutations affecting multiple STR loci simultaneously is extremely unlikely. Contamination would typically show extra/inconsistent bands, not a completely different profile.",source:"Med 25"},{id:"final_final_L22_Cytomolecular_1",exam:"final",lecture:"L22 Cytomolecular",q:"A patient is suspected to have sickle cell anemia. What is the best cytomolecular technique to directly detect the HBB gene mutation?",options:["Spectrophotometry (hemoglobin electrophoresis)","DNA sequencing (Sanger or NGS)","Complete blood count (CBC)","Western blot"],answer:1,explanation:"To directly detect the specific HBB point mutation causing sickle cell anemia (c.20A>T, p.Glu7Val) at the molecular level, DNA sequencing (Sanger sequencing or targeted NGS) is the gold standard cytomolecular technique. It directly identifies the nucleotide change. Hemoglobin electrophoresis (spectrophotometry) detects the abnormal HbS protein indirectly. CBC shows anemia and sickle cells but is not a molecular technique. RFLP (restriction fragment length polymorphism with Mst II enzyme) is also used classically.",source:"Med 24"},{id:"final_final_L22_Cytomolecular_2",exam:"final",lecture:"L22 Cytomolecular",q:"Which chromosomal testing method is most appropriate for detecting a specific genetic disorder caused by a mutation on chromosome 4p?",options:["Sanger sequencing","FISH (fluorescence in situ hybridization)","Conventional karyotyping","Whole genome sequencing"],answer:1,explanation:"FISH uses fluorescently labeled DNA probes that hybridize to a specific chromosomal locus (such as chromosome 4p for Wolf-Hirschhorn syndrome). It can detect deletions, duplications, and translocations at specific known loci that may be too small to see on conventional karyotype. Sanger sequencing detects point mutations (not chromosomal deletions). Karyotyping detects large structural changes but misses microdeletions. WGS is comprehensive but FISH is the targeted, rapid choice for a known locus.",source:"Med 24"},{id:"final_final_L22_Cytomolecular_3",exam:"final",lecture:"L22 Cytomolecular",q:"Which technique is most appropriate to detect a microdeletion at chromosome 4p16.3 (Wolf-Hirschhorn syndrome)?",options:["Conventional karyotyping","PCR alone","FISH","Southern blot"],answer:2,explanation:"Wolf-Hirschhorn syndrome is caused by a microdeletion at 4p16.3, typically too small (~1-2 Mb) to be detected by conventional karyotype. FISH using a specific probe for the WHSC1 region at 4p16.3 can detect this microdeletion. Chromosomal microarray (CMA) is now also commonly used. Conventional karyotype can only detect deletions >5-10 Mb. PCR amplifies sequences but cannot detect deletions without quantitative modification (like MLPA).",source:"Med 24"},{id:"final_final_L22_Cytomolecular_4",exam:"final",lecture:"L22 Cytomolecular",q:"Which of the following mutation nomenclature represents a frameshift mutation?",options:["c.1258delC (p.Leu1258Phefs)","c.891+1G>A","c.742T>G","c.1003C>A"],answer:0,explanation:"Frameshift mutations result from insertions or deletions (indels) that shift the reading frame. c.1258delC = deletion of one cytosine at position 1258 \u2192 shifts the reading frame \u2192 p.Leu1258Phefs (frameshift starting at position 1258 with a new amino acid Phe, fs = frameshift). c.891+1G>A = splice site mutation (intronic). c.742T>G and c.1003C>A = missense mutations (single nucleotide substitutions that change one amino acid without shifting the frame).",source:"Med 24"},{id:"final_final_L22_Cytomolecular_5",exam:"final",lecture:"L22 Cytomolecular",q:"The karyotype shown demonstrates an abnormality in the sex chromosomes. What does this karyotype display?",options:["Normal female (46,XX)","Turner syndrome with isochromosome (46,X,i(Xq))","Turner syndrome with ring chromosome","Turner syndrome with X deletion"],answer:1,explanation:"Turner syndrome (45,X) is the classic form, but ~80% of cases have a variant. An isochromosome of the long arm [i(Xq)] results in 46,X,i(Xq) \u2014 one normal X plus an isochromosome with two copies of the Xq (long) arm and deletion of the entire Xp (short) arm. This creates Turner syndrome phenotype (short stature, ovarian dysgenesis) because SHOX gene on Xp is deleted. Isochromosome Turner is the most common Turner variant on karyotype.",image:"images/p35_karyotype_q7.png",source:"Med 24"},{id:"final_final_L22_Cytomolecular_6",exam:"final",lecture:"L22 Cytomolecular",q:"When identifying a gene mutation associated with hereditary breast cancer risk, which genetic test would be most suitable?",options:["FISH","Gene panel (NGS multi-gene panel)","Conventional karyotyping","Sanger sequencing of single gene"],answer:1,explanation:"Hereditary breast cancer can be caused by mutations in multiple genes (BRCA1, BRCA2, PALB2, CHEK2, ATM, CDH1, PTEN, STK11). A multi-gene NGS panel tests all relevant genes simultaneously from a single DNA sample, providing the most efficient and comprehensive diagnostic approach. FISH does not detect point mutations. Karyotype detects only large chromosomal abnormalities. Single-gene Sanger sequencing is appropriate when a specific known familial mutation is being tested in relatives.",source:"Med 24"},{id:"final_final_L22_Cytomolecular_7",exam:"final",lecture:"L22 Cytomolecular",q:"Which of the following represents a pericentric inversion in a female?",options:["46,XX,inv(6)(p15p18)","46,XX,inv(6)(q15q18)","46,XX,inv(6)(p15q18)","46,XX,i(6)(p21p23)"],answer:2,explanation:"A pericentric inversion involves a segment that INCLUDES the centromere \u2014 with breakpoints on both the short arm (p) AND the long arm (q). Notation: inv(chromosome)(p-breakpointq-breakpoint). 46,XX,inv(6)(p15q18) = female, chromosome 6, inversion with breakpoints at p15 (short arm) and q18 (long arm) \u2014 this CROSSES the centromere \u2192 pericentric. Option A: both breakpoints on p \u2192 paracentric. Option B: both on q \u2192 paracentric. Option D: i(6) = isochromosome, not inversion.",source:"Med 24"},{id:"final_final_L22_Cytomolecular_8",exam:"final",lecture:"L22 Cytomolecular",q:"Which karyotype notation correctly represents a deletion of the short arm of chromosome 10 in a male?",options:["46,XX,del(10)(p11.2p23)","46,XY,del(10)(p11.2p23)","45,XY,del(10)(q11.2q23)","46,XY,del(10)(p11q23)"],answer:1,explanation:"Correct notation breakdown: 46 = total chromosome number; XY = male sex chromosomes; del(10) = deletion of chromosome 10; (p11.2p23) = breakpoints on the short arm (p) from band 11.2 to band 23, specifying the deleted segment. Option A: XX = female (wrong sex). Option C: 45 = wrong total (should be 46 for a simple deletion); q = long arm (not short arm). Option D: del(10)(p11q23) spans both arms \u2192 this would be an unbalanced rearrangement involving centromere.",source:"Med 24"},{id:"final_final_L22_Cytomolecular_9",exam:"final",lecture:"L22 Cytomolecular",q:"PCR (polymerase chain reaction) amplifies DNA using which enzyme?",options:["Taq DNA polymerase (thermostable)","Restriction endonuclease","Plasmid DNA polymerase","Phage lambda polymerase"],answer:0,explanation:"PCR uses a thermostable DNA polymerase \u2014 most commonly Taq polymerase (from Thermus aquaticus). The reaction cycles through: denaturation (94\xB0C) \u2192 annealing of primers (50-65\xB0C) \u2192 extension by DNA polymerase (72\xB0C). The thermostable enzyme is essential because it survives the high-temperature denaturation step without being destroyed. Restriction enzymes cut DNA at specific sequences \u2014 they do not amplify DNA. Plasmids are vectors, not enzymes.",source:"Med 18"},{id:"final_final_L22_Cytomolecular_10",exam:"final",lecture:"L22 Cytomolecular",q:"Detection of proteins by Western blot relies primarily on:",options:["Protein-antibody specificity alone","Labeling the antibody with a detectable dye/enzyme","Protein denaturation by SDS alone","Labeling the protein with dye before electrophoresis"],answer:1,explanation:"Western blot (immunoblot) procedure: (1) Proteins separated by SDS-PAGE (size-based, using protein denaturation), (2) transferred to nitrocellulose/PVDF membrane, (3) blocked, (4) incubated with primary antibody (specific for target protein), (5) secondary antibody (labeled with enzyme like HRP or fluorescent dye) binds the primary antibody, (6) detection reagent reveals the signal. The detection relies on the LABELED ANTIBODY \u2014 specifically the secondary antibody conjugated to an enzyme/dye. Both antibody specificity AND labeling are required, but the visualization step uses the labeled antibody.",source:"Med 18"},{id:"final_final_L22_Cytomolecular_11",exam:"final",lecture:"L22 Cytomolecular",q:"A child with intellectual disability and dysmorphic features is evaluated. Which is the correct order of cytogenetic/molecular investigations (stepwise, from least to most detailed)?",options:["Karyotype \u2192 Chromosomal microarray (CMA) \u2192 Whole exome sequencing (WES)","WES \u2192 CMA \u2192 Karyotype","CMA \u2192 Karyotype \u2192 WES","WES \u2192 Karyotype \u2192 CMA"],answer:0,explanation:"The recommended stepwise investigation of unexplained intellectual disability + dysmorphic features: (1) Karyotype \u2014 detects large chromosomal abnormalities (aneuploidies, large structural rearrangements >5-10 Mb); (2) Chromosomal microarray (CMA) \u2014 detects copy number variants (deletions/duplications >100-200 kb), microdeletion syndromes; (3) Whole exome sequencing (WES) \u2014 identifies single-gene mutations when karyotype and CMA are normal. This stepwise approach moves from lower resolution/lower cost to higher resolution/higher cost investigation.",source:"Med 25"},{id:"final_final_L22_Cytomolecular_12",exam:"final",lecture:"L22 Cytomolecular",q:"Chromosomal microarray (CMA) is performed on a child with unexplained developmental delay. The result shows a 2.3 Mb copy number variant at chromosome 7q11.23. The child's mother shows the same variant. What is the most likely interpretation of this finding?",options:["Heterozygous duplication \u2014 pathogenic or potentially pathogenic variant","Homozygous deletion \u2014 normal population variant","Mosaicism for chromosome 7 trisomy","Translocation between chromosomes 7 and another chromosome"],answer:0,explanation:"A copy number variant (CNV) detected by CMA where extra DNA is present = duplication. A 2.3 Mb duplication at 7q11.23 is heterozygous (one copy normal + one copy duplicated). This region (Williams-Beuren syndrome region) contains clinically relevant genes. A heterozygous duplication is either pathogenic, likely pathogenic, or a variant of uncertain significance (VUS) depending on clinical correlation and inheritance. Finding the same variant in a phenotypically normal parent complicates interpretation (may be benign familial variant or reduced penetrance).",source:"Med 25"},{id:"final_final_L22_Cytomolecular_13",exam:"final",lecture:"L22 Cytomolecular",q:"A family has an affected boy with Duchenne muscular dystrophy (DMD). His sister wants to know if she is a carrier. Which genetic test is most appropriate for detecting exon deletions/duplications in the DMD gene?",options:["Karyotype","MLPA (multiplex ligation-dependent probe amplification)","Sanger sequencing of the full DMD gene","Chromosomal microarray"],answer:1,explanation:"~65% of DMD cases are caused by exon deletions, ~7% by duplications, and ~26% by point mutations in the DMD gene. MLPA (multiplex ligation-dependent probe amplification) is the gold standard for detecting exon deletions and duplications in the DMD gene \u2014 it can simultaneously test all 79 exons in a single reaction. MLPA is first-line testing for DMD carrier detection in female relatives. Sanger sequencing detects point mutations but misses deletions/duplications. CMA can detect large deletions but not single-exon changes.",source:"Med 25"},{id:"final_final_L22_Cytomolecular_14",exam:"final",lecture:"L22 Cytomolecular",q:"Which molecular technique is specifically designed to detect and quantify exon-level deletions and duplications in known disease genes?",options:["Sanger sequencing","FISH","Chromosomal microarray (CMA)","MLPA (multiplex ligation-dependent probe amplification)"],answer:3,explanation:"MLPA (multiplex ligation-dependent probe amplification) uses pairs of probes designed to hybridize to specific exons. Only intact, correctly-joined probes are amplified by PCR \u2192 relative peak heights reveal copy number at each exon. A reduced peak = deletion; an increased peak = duplication at that exon. MLPA is ideal for DMD, BRCA1/2, APC, and other genes where exon-level copy number changes are clinically relevant. CMA detects genome-wide copy number changes but may miss small single-exon changes. Sanger detects sequence changes, not copy number.",source:"Med 25"},{id:"final_final_L22_Cytomolecular_15",exam:"final",lecture:"L22 Cytomolecular",q:"The loss of a chromosome during cell division due to failure of the chromosome to migrate to either daughter cell is called:",options:["Nondisjunction","Anaphase lag","Uniparental disomy","Robertsonian translocation"],answer:1,explanation:"Anaphase lag occurs when a chromosome fails to migrate (lags behind) during anaphase and is excluded from both daughter nuclei \u2192 that daughter cell lacks one copy of the chromosome = monosomy. Example: anaphase lag during early embryonic division can produce mosaic Turner syndrome (45,X/46,XX). Nondisjunction is failure of chromosomes to separate at all \u2192 both go to one daughter cell (causes trisomy + monosomy). Anaphase lag typically causes monosomy only (chromosome is lost, not doubled).",source:"Med 25"},{id:"final_final_L22_Cytomolecular_16",exam:"final",lecture:"L22 Cytomolecular",q:"What chromosomal abnormality results from transverse (horizontal) rather than longitudinal (vertical) division of the centromere?",options:["Isochromosome","Ring chromosome","Robertsonian translocation","Pericentric inversion"],answer:0,explanation:"An isochromosome is formed when the centromere divides transversely (horizontally) rather than longitudinally (vertically). This produces two chromosomes, each composed of IDENTICAL arms \u2014 either two short arms [i(p)] or two long arms [i(q)]. Example: i(Xq) = Turner syndrome variant with duplication of the long arm and deletion of the short arm; i(12p) = Pallister-Killian syndrome. Ring chromosomes form from end-to-end chromosome arm fusion. Robertsonian translocations join two acrocentric chromosomes at their centromeres.",source:"Med 25"},{id:"final_final_L22_Cytomolecular_17",exam:"final",lecture:"L22 Cytomolecular",q:"The 5' poly-A tail added to mRNA after transcription serves which primary function?",options:["Provides the ribosome attachment site for translation initiation","Protects mRNA from 3' to 5' exonuclease degradation","Signals the start codon for translation","Provides the splice site for intron removal"],answer:1,explanation:"The poly-A tail (polyadenylation \u2014 addition of ~200 adenine nucleotides at the 3' end of pre-mRNA) primarily protects mRNA from degradation by 3'\u21925' exonucleases, thereby increasing mRNA stability and longevity. It also facilitates nuclear export and enhances translation efficiency. The 5' cap (7-methylguanosine) \u2014 not the poly-A tail \u2014 provides the ribosome binding site for translation initiation. The 5' UTR region contains the Kozak sequence near the start codon.",source:"Med 25"},{id:"final_final_L22_Cytomolecular_18",exam:"final",lecture:"L22 Cytomolecular",q:"Which enzyme is responsible for repairing UV-induced pyrimidine dimers (thymine dimers) via direct photoreactivation repair?",options:["DNA ligase","Endonuclease","DNA polymerase I","Photolyase (DNA photolyase)"],answer:3,explanation:"Photolyase (DNA photolyase) is the enzyme responsible for direct photoreactivation repair of UV-induced cyclobutane pyrimidine dimers (CPDs). It uses the energy of visible/near-UV light (300-500 nm) to directly split the covalent bonds of the dimer, restoring the original pyrimidine bases \u2014 no nucleotide excision is needed. This is the simplest and most direct DNA repair mechanism. Humans have limited photolyase activity; the main UV-damage repair in humans is nucleotide excision repair (NER). NER deficiency = xeroderma pigmentosum.",source:"Med 25"},{id:"final_final_L22_Cytomolecular_19",exam:"final",lecture:"L22 Cytomolecular",q:"Which term describes the proportion of individuals in a population who carry a specific genotype (e.g., AA, Aa, or aa) at a given locus?",options:["Allele frequency","Phenotype frequency","Penetrance","Expressivity"],answer:4,explanation:"Genotype frequency = (number of individuals with a specific genotype) \xF7 (total population size). It represents the proportion of the population with a particular genotype combination (homozygous dominant AA, heterozygous Aa, or homozygous recessive aa). By Hardy-Weinberg equilibrium: p\xB2 + 2pq + q\xB2 = 1 (where p\xB2 = AA frequency, 2pq = Aa frequency, q\xB2 = aa frequency). Allele frequency refers to the proportion of a specific allele (p or q). Penetrance describes the proportion of genotype carriers who express the phenotype.",source:"Med 25"},{id:"final_final_L22_Cytomolecular_20",exam:"final",lecture:"L22 Cytomolecular",q:"A DNA mutation that changes a codon but results in the SAME amino acid (due to the degeneracy of the genetic code) is called:",options:["Silent mutation (synonymous mutation)","Missense mutation","Nonsense mutation","Frameshift mutation"],answer:0,explanation:"A silent (synonymous) mutation changes the nucleotide sequence of a codon but does NOT change the amino acid it encodes, due to the degeneracy (redundancy) of the genetic code (multiple codons can encode the same amino acid). Example: CGU \u2192 CGC = both encode Arginine. The protein sequence is unchanged. Missense = different amino acid. Nonsense = premature stop codon. Frameshift = insertion/deletion shifting the reading frame. Silent mutations are generally not pathogenic, though some affect splicing efficiency.",source:"Med 25"},{id:"final_final_L22_Cytomolecular_21",exam:"final",lecture:"L22 Cytomolecular",q:"In sickle cell anemia (HbSS), the causative mutation changes a single nucleotide resulting in a different amino acid (Glu\u2192Val at codon 6 of beta-globin). This type of mutation is called:",options:["Missense mutation","Silent mutation","Nonsense mutation","Frameshift mutation"],answer:0,explanation:"The HbS mutation (c.20A>T, GAG\u2192GTG, p.Glu6Val) is a classic missense mutation \u2014 a single nucleotide change resulting in substitution of ONE amino acid for another (glutamic acid \u2192 valine). This single amino acid change converts normal hydrophilic HbA to abnormal hydrophobic HbS, which polymerizes under deoxygenation \u2192 sickling. Silent = same amino acid (different codon). Nonsense = stop codon created. Frameshift = reading frame altered. The HbS missense mutation is one of the most clinically important single-nucleotide variants in medicine. ---",source:"Med 25"},{id:"final_final_L22_Cytomolecular_22",exam:"final",lecture:"L22 Cytomolecular",q:"About mutation nomenclature \u2014 which notation represents a mitochondrial DNA mutation?",options:["c.1878G>T","m.87383>C","p.Arg112Lys","r.99C>A"],answer:1,explanation:'Mitochondrial DNA mutations use the prefix "m." (mitochondrial) in HGVS nomenclature \u2014 e.g., m.87383>C denotes a nucleotide change at position 87383 of the mitochondrial genome. This distinguishes mtDNA variants from nuclear DNA changes. Nuclear DNA coding sequence variants use "c." (c.1878G>T). Protein-level changes use "p." (p.Arg112Lys). RNA-level changes use "r." (r.99C>A). The "m." prefix is essential for correctly reporting variants in mitochondrial genes (MT-ND, MT-CO, MT-CYB, etc.) associated with mitochondrial diseases. ---',source:"Med 25"},{id:"final_final_L22_Cytomolecular_23",exam:"final",lecture:"L22 Cytomolecular",q:"About NER (nucleotide excision repair) steps order \u2014 which sequence is correct?",options:["Cleavage \u2192 Removal \u2192 Insertion (new DNA) \u2192 Sealing (ligation) \u2192 Repair complete","Removal \u2192 Cleavage \u2192 Insertion \u2192 Sealing \u2192 Repair","Recognition \u2192 Insertion \u2192 Cleavage \u2192 Removal \u2192 Sealing","Cleavage \u2192 Insertion \u2192 Removal \u2192 Sealing \u2192 Repair"],answer:0,explanation:"Nucleotide excision repair (NER) proceeds as follows: (1) Recognition of DNA damage (bulky lesion, pyrimidine dimer); (2) Cleavage \u2014 endonucleases (XPF-ERCC1 and XPG) cut the damaged strand on both sides of the lesion; (3) Removal \u2014 the damaged oligonucleotide (~25-30 nucleotides) is unwound and removed; (4) Insertion \u2014 DNA polymerase \u03B4/\u03B5 fills the gap using the complementary strand as template; (5) Sealing \u2014 DNA ligase seals the nick, completing repair. XPC/RAD23B initiates recognition; TFIIH complex (XPB, XPD helicases) unwinds the DNA. NER deficiency causes xeroderma pigmentosum.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_1",exam:"final",lecture:"L23 PS Clinical Genetics",q:"An image shows an infant with characteristic facial features including upslanting palpebral fissures, epicanthal folds, flat nasal bridge, and single palmar crease. What chromosomal abnormality does this infant have?",options:["Trisomy 18 (Edwards syndrome)","Trisomy 21 (Down syndrome)","Trisomy 13 (Patau syndrome)","Monosomy X (Turner syndrome)"],answer:1,explanation:"The described features \u2014 upslanting palpebral fissures, epicanthal folds, flat nasal bridge, single palmar (Simian) crease, hypotonia, and brachycephaly \u2014 are classic features of Down syndrome (Trisomy 21). Down syndrome is the most common chromosomal aneuploidy, caused by nondisjunction (95%), Robertsonian translocation (4%), or mosaicism (1%). It is the most common genetic cause of intellectual disability.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_2",exam:"final",lecture:"L23 PS Clinical Genetics",q:"An 8-year-old boy presents with intellectual disability, a long face, broad forehead, large ears, and a prominent mandible. His maternal uncle is similarly affected. What is the most likely indication confirming this condition?",options:["Karyotype showing 47,XXY","G6PD enzyme deficiency","Abnormal increase in CGG trinucleotide repeats in the FMR1 gene","Elevated plasma phenylalanine"],answer:2,explanation:"The description is classic Fragile X syndrome \u2014 the most common inherited cause of intellectual disability. Features: large ears, prominent jaw, long face, macro-orchidism (post-pubertal), intellectual disability, and behavioral issues (autism spectrum). The pattern of inheritance is X-linked (maternal uncle affected). Fragile X is caused by expansion of CGG trinucleotide repeats (>200 repeats = full mutation) in the 5' UTR of the FMR1 gene on Xq27.3, leading to gene silencing via methylation.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_3",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A child is suspected to have Prader-Willi syndrome. Which genetic testing method is required to confirm the diagnosis?",options:["Conventional chromosomal karyotype","Methylation analysis (methylation-specific PCR or methylation array)","Whole exome sequencing","FISH for chromosome 15q11-q13"],answer:1,explanation:"Prader-Willi syndrome (PWS) and Angelman syndrome (AS) both involve chromosome 15q11-q13 but result from loss of different parental imprints. PWS = loss of PATERNAL 15q11-q13 expression (deletion, maternal UPD15, or imprinting center defect). AS = loss of MATERNAL 15q11-q13 expression. Methylation analysis detects the imprinting status of the region and confirms PWS/AS regardless of the underlying mechanism (deletion, UPD, or imprinting defect). Karyotype and FISH may miss UPD and imprinting defects.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_4",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A 6-year-old boy presents with hypogonadism, obesity, and almond-shaped eyes. What is the most likely diagnosis?",options:["Down syndrome (Trisomy 21)","Fragile X syndrome","Angelman syndrome","Prader-Willi syndrome"],answer:3,explanation:"Prader-Willi syndrome (PWS) classic features: neonatal hypotonia and feeding difficulties, followed by hyperphagia and obesity in childhood, hypogonadism (small genitalia, undescended testes), almond-shaped eyes, short stature, intellectual disability, and behavioral problems (skin-picking, tantrums). PWS is caused by loss of paternal 15q11-q13 expression (deletion, maternal UPD15, or imprinting defect). Confirmed by methylation analysis. Angelman syndrome = loss of maternal 15q11-q13 (happy demeanor, seizures, absent speech).",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_5",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A patient has aortic aneurysm and arachnodactyly (spider fingers). Which syndrome is most likely?",options:["Down syndrome","Marfan syndrome","Prader-Willi syndrome","Turner syndrome"],answer:1,explanation:"Marfan syndrome (FBN1 mutation, autosomal dominant) classically presents with: aortic root dilation/aneurysm (life-threatening complication \u2014 rupture/dissection), ectopia lentis (upward lens dislocation), arachnodactyly, tall stature with long limbs (dolichostenomelia), pectus excavatum/carinatum, and scoliosis. Aortic root dilation is the most serious manifestation. Regular echocardiographic surveillance is essential. Beta-blockers reduce progression of aortic dilation.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_6",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A patient has duodenal atresia and a wide gap between the 1st and 2nd toes (sandal gap). Which syndrome is most likely?",options:["Marfan syndrome","Prader-Willi syndrome","Down syndrome (Trisomy 21)","Neurofibromatosis type 1"],answer:2,explanation:`Down syndrome (Trisomy 21) features include: sandal gap (wide space between 1st and 2nd toes), single palmar crease, Brushfield spots, upslanting palpebral fissures, epicanthal folds, brachycephaly, and hypotonia. Duodenal atresia ("double bubble" sign on X-ray) is a well-known association with Down syndrome (30% of duodenal atresia cases have Trisomy 21). Hirschsprung disease and Alzheimer's disease (early onset) are also associated.`,source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_7",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A 16-year-old female presents with short stature and primary amenorrhea. Chromosomal analysis shows only 45 chromosomes. Which karyotype is most consistent?",options:["45,XX,t(14;21)","45,XX,rob(21;22)","46,X,isoXq","45,X (monosomy X)"],answer:2,explanation:"Wait - the answer from the exam key is C: 46,X,isoXq. The question states 45 chromosomes but the listed answer C shows 46. This is a variant of Turner syndrome: 46,X,i(Xq) has 46 chromosomes total (1 normal X + 1 isochromosome Xq), giving Turner phenotype due to Xp deletion. Short stature (SHOX gene on Xp is deleted) and primary amenorrhea (streak gonads) are typical Turner features. NOTE: The answer key from the exam states C (46,X,isoXq). Options A and B describe Robertsonian translocations (associated with trisomy 21/13 risk, not Turner).",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_8",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A boy 2 months old has dysmorphic features, severe hypotonia, liver and renal cysts. What is the most appropriate investigation?",options:["DNA analysis of SMN1 gene","DNA analysis of DMD (dystrophin) gene","Chromosomal studies (karyotype)","Evaluation of serum very long chain fatty acids (VLCFA)"],answer:3,explanation:"The combination of severe neonatal hypotonia + dysmorphic features + hepatomegaly + renal cysts is classic for Zellweger syndrome (peroxisomal biogenesis disorder). Zellweger is diagnosed by markedly elevated plasma very long chain fatty acids (VLCFA) \u2014 peroxisomes normally degrade VLCFA by beta-oxidation. SMN1 analysis is for SMA (floppy infant without organ abnormalities). Dystrophin analysis is for DMD (presents in early childhood, not neonates). Karyotype identifies chromosomal abnormalities (not Zellweger).",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_9",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A girl 8 years old presents with short stature, webbed neck, and increased carrying angle (cubitus valgus). Which investigation is most appropriate?",options:["DNA analysis of dystrophin gene","DNA analysis of CFTR gene","Chromosomal studies (karyotype)","DNA analysis of FGFR3 gene"],answer:2,explanation:"Short stature + webbed neck + cubitus valgus (increased carrying angle) = classic Turner syndrome (45,X or variant). Turner syndrome is a chromosomal abnormality \u2192 diagnosed by chromosomal analysis (karyotype). Dystrophin = DMD (muscle disease). CFTR = Cystic fibrosis (pulmonary/GI). FGFR3 = Achondroplasia (short-limbed dwarfism with rhizomelia). Turner features also include: low posterior hairline, shield chest, coarctation of the aorta, ovarian dysgenesis, and lymphedema.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_10",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A child with Down syndrome has a karyotype showing only 46 chromosomes (not 47). Chromosome analysis reveals a Robertsonian translocation. The extra chromosome 21 material is most commonly attached to which chromosome?",options:["Chromosome 13","Chromosome 21","Chromosome 22","Chromosome 14"],answer:3,explanation:"Robertsonian translocation Down syndrome accounts for ~4% of Down syndrome cases. The extra chromosome 21 material is most commonly fused to chromosome 14 [rob(14;21)], resulting in a carrier karyotype of 45 chromosomes (45,XX/XY,rob(14;21)) but with phenotypically normal carriers. Offspring who receive both the translocation chromosome and a free chromosome 21 have 3 copies of chromosome 21 material with only 46 total chromosomes. Other Robertsonian partners include chromosomes 13, 15, 21, and 22, but chromosome 14 is the most common partner.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_11",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A parent is affected with neurofibromatosis type 1 (NF1), an autosomal dominant condition. What is the probability that each of their children will inherit the NF1 mutation?",options:["50% (1 in 2 chance per child)","25% (1 in 4 chance)","100% (all children will be affected)","75% (3 in 4 chance)"],answer:0,explanation:"NF1 (neurofibromatosis type 1, NF1 gene mutation) follows autosomal dominant inheritance. An affected parent (Aa) \xD7 unaffected parent (aa): 50% Aa (affected) + 50% aa (unaffected). Each child has a 50% independent probability of inheriting the NF1 mutation. Note: NF1 has high penetrance (~100%) but extremely variable expressivity (caf\xE9-au-lait spots to severe complications). Also, ~50% of NF1 cases are de novo mutations with no family history \u2014 these carry the same 50% transmission risk to future children.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_12",exam:"final",lecture:"L23 PS Clinical Genetics",q:"In a pedigree showing X-linked recessive inheritance, an unaffected female (II-2) has an affected father and one affected son. What is her genetic status?",options:["Obligate carrier (X\u1D2CX\u1D43)","Definitely affected","Homozygous normal (X\u1D2CX\u1D2C)","Genetic status cannot be determined"],answer:0,explanation:"An unaffected female who has BOTH an affected father AND an affected son is an obligate carrier in X-linked recessive inheritance. From her affected father (X\u1D43Y): she must have inherited his X\u1D43 allele \u2192 she is X\u1D2CX\u1D43 (carrier). She then passed the X\u1D43 to her affected son (X\u1D43Y). An obligate carrier is defined by pedigree logic \u2014 we can determine she MUST carry the allele regardless of molecular testing. Obligate carriers in X-linked recessive pedigrees: (1) daughters of affected males, (2) mothers of multiple affected sons, (3) females with affected fathers AND affected sons.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_13",exam:"final",lecture:"L23 PS Clinical Genetics",q:"Paternal uniparental disomy of chromosome 15 (both chromosome 15 copies inherited from the father) leads to which condition?",options:["Prader-Willi syndrome","Down syndrome","Angelman syndrome","Beckwith-Wiedemann syndrome"],answer:2,explanation:"Chromosome 15q11-q13 is subject to genomic imprinting. UBE3A (maternally expressed) is responsible for Angelman syndrome when maternal expression is lost. Paternal UPD15 = both chromosome 15s from father \u2192 no maternal chromosome 15 \u2192 no maternal UBE3A expression \u2192 Angelman syndrome (seizures, absent speech, happy puppet-like demeanor). Maternal UPD15 = both from mother \u2192 no paternal 15q11-q13 expression \u2192 Prader-Willi syndrome (hypotonia, hyperphagia, obesity). PWS and AS affect the SAME chromosomal region but differ in parent of origin.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_14",exam:"final",lecture:"L23 PS Clinical Genetics",q:'A child with Down syndrome (Trisomy 21) presents with bilious vomiting from birth. Abdominal X-ray shows a "double bubble" sign. Which additional Down syndrome-associated anomaly is shown?',options:["Hirschsprung disease","Duodenal atresia and atrial septal defect (ASD)","Esophageal atresia","Pyloric stenosis"],answer:1,explanation:'The "double bubble" sign on X-ray is pathognomonic of duodenal atresia (dilated stomach + proximal duodenum). ~30% of duodenal atresia cases are associated with Down syndrome (Trisomy 21). Down syndrome major structural anomalies include: congenital heart defects (ASD, VSD, AV canal/AVSD \u2014 most common cardiac defect), duodenal atresia, Hirschsprung disease, and imperforate anus. ASD (atrial septal defect) is a frequently associated cardiac defect in Down syndrome. This question asks about structural anomalies beyond the chromosomal abnormality.',source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_15",exam:"final",lecture:"L23 PS Clinical Genetics",q:"Holoprosencephaly (failure of the forebrain to divide) is associated with mutations in which gene?",options:["NF1","FBN1","SHH (sonic hedgehog)","PAX6"],answer:2,explanation:"SHH (Sonic Hedgehog) is a key developmental signaling molecule critical for midline forebrain development and separation. Loss-of-function mutations in SHH (or its pathway components) cause holoprosencephaly \u2014 failure of the embryonic forebrain (prosencephalon) to divide into two cerebral hemispheres. Clinical spectrum: alobar (most severe, single-lobed brain), semilobar, lobar. Associated features include midline facial defects (cyclopia, proboscis, hypotelorism, cleft lip/palate). Trisomy 13 is the most common chromosomal cause.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_16",exam:"final",lecture:"L23 PS Clinical Genetics",q:"Decreased distance between the orbits (reduced interorbital distance) is termed:",options:["Hypotelorism","Hypertelorism","Telecanthus","Enophthalmos"],answer:0,explanation:"Hypotelorism = decreased interorbital distance (orbits closer together than normal). It is associated with midline developmental defects including holoprosencephaly (SHH mutations, Trisomy 13). Hypertelorism = INCREASED interorbital distance (orbits further apart) \u2014 seen in Noonan syndrome, Wolf-Hirschhorn syndrome. Telecanthus = increased distance between inner canthi without true hypertelorism. Enophthalmos = posterior displacement of the eyeball within the orbit.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_17",exam:"final",lecture:"L23 PS Clinical Genetics",q:"In a pedigree, a condition is observed only in males, who transmit it to ALL of their daughters but NONE of their sons. What is the inheritance pattern?",options:["Autosomal dominant","X-linked dominant","Autosomal recessive","X-linked recessive"],answer:1,explanation:'X-linked dominant inheritance: The gene is on the X chromosome, and the mutant allele is dominant. Affected father (X\u1D2CY): passes his X (with mutation) to all daughters \u2192 all daughters affected; passes Y to all sons \u2192 no sons affected. This "father-to-all-daughters, no sons" transmission is the hallmark of X-linked dominant inheritance from an affected father. Examples: Rett syndrome (MECP2), Incontinentia pigmenti (IKBKG), vitamin D-resistant rickets (PHEX).',source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_18",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A newborn presents with polydactyly (extra fingers/toes), cleft lip/palate, and severe brain malformations. Which chromosomal condition is most likely?",options:["Trisomy 13 (Patau syndrome)","Trisomy 21 (Down syndrome)","Trisomy 18 (Edwards syndrome)","Monosomy X (Turner syndrome)"],answer:0,explanation:"Trisomy 13 (Patau syndrome) classic features: polydactyly (postaxial), cleft lip AND palate, holoprosencephaly/midline brain defects, microphthalmia, cutis aplasia (scalp skin defects), and severe cardiac defects. It is the most severe autosomal trisomy compatible with live birth, with very poor prognosis (median survival <1 week). Trisomy 21 = Down syndrome (intellectual disability, characteristic facies \u2014 no polydactyly). Trisomy 18 = Edwards syndrome (overlapping fingers, rocker-bottom feet, omphalocele \u2014 no polydactyly).",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_19",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A female presents with Turner syndrome phenotype (short stature, primary amenorrhea). Karyotype analysis shows 46 chromosomes, one X, and one ring chromosome. This ring X chromosome results in a variant of:",options:["Klinefelter syndrome","Down syndrome","Turner syndrome","Fragile X syndrome"],answer:2,explanation:"Turner syndrome can result from various X-chromosome abnormalities beyond classic 45,X monosomy. A ring X chromosome [46,X,r(X)] forms when both ends of an X chromosome break and rejoin, deleting terminal sequences. If the ring lacks XIST (X-inactivation gene), the ring X cannot be inactivated \u2192 multiple genes expressed \u2192 severe phenotype. Ring X Turner phenotype: short stature, ovarian failure, and sometimes more severe features than classic 45,X. Classic Turner: 45,X (most common); variants: 46,X,i(Xq), 46,X,del(Xp), 46,X,r(X), and mosaics.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_20",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A 16-year-old tall male with long limbs, arm span greater than height, and ectopia lentis (anterior lens dislocation) is referred for genetic evaluation. Which molecular test is most diagnostic?",options:["Chromosomal karyotype","Plasma amino acid analysis (homocysteine level)","Urine reducing substances","Echocardiography (functional)"],answer:4,explanation:"The presentation \u2014 tall stature, long limbs, arm span > height (dolichostenomelia), and lens dislocation \u2014 suggests a connective tissue disorder. FBN1 gene analysis (fibrillin-1, chromosome 15q21) is the molecular diagnostic test for Marfan syndrome. However, NOTE: anterior (forward) lens dislocation is more characteristic of homocystinuria (CBS deficiency), while Marfan syndrome classically shows SUPEROTEMPORAL (upward) dislocation. Given the Marfanoid habitus and the exam answer key identifying FBN1, Marfan syndrome is the primary diagnosis here.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_21",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A family pedigree shows a condition affecting only individuals who inherit the trait through the MATERNAL line \u2014 affected males do NOT transmit the condition to their children. What is the most likely inheritance pattern?",options:["Mitochondrial (maternal) inheritance","X-linked recessive","Autosomal dominant","Genomic imprinting"],answer:0,explanation:"Mitochondrial inheritance: Mitochondria are inherited ONLY from the mother (via the oocyte cytoplasm). All children of an affected MOTHER are at risk; no children of an affected FATHER are at risk (because sperm contribute no mitochondria to the embryo). This strict maternal-only transmission is the hallmark distinguishing mitochondrial inheritance from all other patterns. Examples: MELAS, MERRF, Leber hereditary optic neuropathy (LHON), Pearson syndrome. Note: mitochondrial disorders may show heteroplasmy (variable proportions of mutant mtDNA).",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_22",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A child presents with low-set ears, micrognathia (small jaw), a prenatal history of severe oligohydramnios, and bilateral talipes equinovarus (clubfoot). The cause of the talipes is most likely:",options:["A single-gene mutation affecting bone development","A chromosomal deletion causing limb malformation","Abnormal mechanical force causing deformation of normal feet","Teratogen exposure causing disruption of limb bud development"],answer:2,explanation:"Talipes equinovarus (clubfoot) occurring with severe oligohydramnios is a deformation (not malformation). Deformations result from abnormal mechanical forces on structurally normal tissue. Severe oligohydramnios (Potter sequence) \u2192 reduced amniotic fluid \u2192 uterine wall compresses fetus \u2192 abnormal positioning \u2192 talipes deformity (positional clubfoot), limb contractures, characteristic facial features. The underlying tissue is normal; the shape is distorted by physical compression. Malformations involve intrinsic developmental errors; disruptions involve destruction of previously normal tissue.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_23",exam:"final",lecture:"L23 PS Clinical Genetics",q:"The karyotype of a male shows 47,XXY. What is the most likely diagnosis?",options:["Klinefelter syndrome","Turner syndrome","Down syndrome","XYY syndrome"],answer:0,explanation:"47,XXY = Klinefelter syndrome \u2014 the most common sex chromosome aneuploidy in males (1/500 males). Features: tall stature, small testes (hypogonadism), azoospermia/infertility, gynecomastia, reduced secondary sexual characteristics, mild intellectual impairment (some individuals). Usually not diagnosed until puberty or during infertility workup. Caused by nondisjunction during meiosis (maternal in 50%, paternal in 50%). Turner syndrome = 45,X (female). Down syndrome = 47,+21. XYY syndrome = 47,XYY.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_24",exam:"final",lecture:"L23 PS Clinical Genetics",q:"Marfan syndrome is an example of which genetic phenomenon \u2014 one gene causing multiple, apparently unrelated clinical features (aortic aneurysm, ectopia lentis, tall stature, scoliosis)?",options:["Pleiotropy","Variable expressivity","Incomplete penetrance","Genetic heterogeneity"],answer:0,explanation:"Pleiotropy is when a single gene mutation causes multiple, seemingly unrelated effects in different organ systems. Marfan syndrome (FBN1 mutation, fibrillin-1 protein) is the classic example: FBN1 is expressed throughout connective tissue \u2192 mutations affect multiple systems: cardiovascular (aortic aneurysm), ocular (ectopia lentis), skeletal (tall stature, arachnodactyly, scoliosis), and others. All diverse manifestations arise from a single genetic change. Variable expressivity = same gene, different severity. Genetic heterogeneity = same phenotype caused by mutations in different genes.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_25",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A consanguineous couple (first cousins) is concerned about their risk of having a child with an autosomal recessive condition. Their family has a history of cystic fibrosis (CF). What is the main reason why consanguinity increases the risk of autosomal recessive disease?",options:["Consanguineous couples are more likely to carry the same autosomal recessive allele inherited from a common ancestor","Consanguinity always causes new de novo mutations","All first-cousin children are affected with recessive disease","Consanguinity increases dominant gene penetrance"],answer:0,explanation:"Consanguineous couples (related individuals) share portions of their genome inherited from a common ancestor. If a common ancestor was a carrier for an autosomal recessive condition (e.g., CFTR mutation for cystic fibrosis), multiple family members may have inherited the same mutant allele. When two carriers of the same allele reproduce, the risk of an affected child (homozygous) = 25%. The closer the relationship, the greater the probability of sharing identical-by-descent alleles. This is why consanguinity significantly increases the risk for autosomal recessive disorders.",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_26",exam:"final",lecture:"L23 PS Clinical Genetics",q:"Premarital screening programs include testing for which of the following conditions? All EXCEPT:",options:["Sickle cell disease","Beta-thalassemia","G6PD deficiency","Phenylketonuria (PKU)"],answer:3,explanation:"Premarital genetic screening programs (common in Saudi Arabia and other Gulf countries) focus on conditions with high carrier frequency in the population where both partners being carriers creates significant reproductive risk. Standard premarital screening in Saudi Arabia includes: sickle cell disease (HbSS), beta-thalassemia, and other hemoglobinopathies. PKU (phenylketonuria) is NOT typically included in premarital screening programs \u2014 it is detected by newborn screening (Guthrie test). PKU is autosomal recessive but has different population prevalence and management pathway. ---",source:"Med 25"},{id:"final_final_L23_PS_Clinical_Genetics_27",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A baby is born with congenital heart deformities (ventricular septal defect). This structural anomaly results from abnormal embryonic development. Which type of birth defect is this?",options:["Malformation","Disruption","Deformation","Dysplasia"],answer:0,explanation:"A malformation is a morphological defect resulting from an INTRINSICALLY ABNORMAL developmental process \u2014 the underlying tissue has abnormal development from the start (intrinsic genetic/developmental error). Congenital heart defects are classic malformations. Disruption = destruction of previously normally developing tissue (e.g., amniotic band). Deformation = abnormal mechanical forces on normal tissue (e.g., clubfoot from oligohydramnios). Dysplasia = abnormal cellular organization within a specific tissue (e.g., skeletal dysplasia). ---",source:"Med 18"},{id:"final_final_L23_PS_Clinical_Genetics_28",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A newborn has a shortened anteroposterior (front-to-back) dimension of the skull, resulting in a wider, rounder head shape. What is the correct term for this?",options:["Brachycephaly","Dolichocephaly","Plagiocephaly","Trigonocephaly"],answer:0,explanation:"Brachycephaly = shortened anteroposterior (AP) skull dimension \u2192 wide/round head (increased cephalic index >81). Common in Down syndrome (Trisomy 21) and after premature fusion of coronal sutures. Dolichocephaly = elongated AP dimension (long narrow head, cephalic index <76) \u2014 seen in prematurity and Marfan syndrome. Plagiocephaly = asymmetric/oblique head shape from unilateral coronal or lambdoid suture synostosis. Trigonocephaly = triangular forehead from premature metopic suture fusion. ---",source:"Med 18"},{id:"final_final_L23_PS_Clinical_Genetics_29",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A neonate presents with cleft lip, cleft palate, holoprosencephaly, and a congenital heart defect. Given this combination of features, which additional finding is most likely to be present?",options:["Syndactyly (fused fingers)","Polydactyly (extra digits)","Macrodactyly (enlarged digits)","Brachydactyly (short digits)"],answer:1,explanation:"The combination of cleft lip/palate + holoprosencephaly + congenital heart defect is classic for Trisomy 13 (Patau syndrome). Additional hallmark features of Trisomy 13 include: polydactyly (postaxial \u2014 extra digit on ulnar/fibular side), cutis aplasia (scalp skin defects), microphthalmia/anophthalmia, and severe brain malformations. Polydactyly is one of the most characteristic features of Trisomy 13 and helps distinguish it from Trisomy 18 (which has overlapping fingers \u2014 not extra digits). ---",source:"Med 18"},{id:"final_final_L23_PS_Clinical_Genetics_30",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A female patient with short stature, webbed neck, and ovarian failure (streak gonads) is diagnosed with Turner syndrome. Which gene's deletion on the X chromosome short arm is primarily responsible for her short stature?",options:["SHOX (short stature homeobox gene)","FMN1","CFTR","SRY"],answer:0,explanation:"SHOX (Short Stature HOmeoboX gene) is located on the pseudoautosomal region 1 (PAR1) of both X and Y chromosomes (Xp22.33). In Turner syndrome (45,X or variants with Xp deletion), SHOX haploinsufficiency is directly responsible for short stature and skeletal abnormalities (Madelung deformity). SHOX is expressed in growth plates. Growth hormone treatment in Turner syndrome partially compensates for SHOX deficiency. SRY = sex-determining region Y (sex determination). FMN1 = formin 1 (renal). CFTR = cystic fibrosis. ---",source:"Med 18"},{id:"final_final_L23_PS_Clinical_Genetics_31",exam:"final",lecture:"L23 PS Clinical Genetics",q:"Cystic fibrosis (CFTR mutation, autosomal recessive) causes infertility in males through which mechanism?",options:["Congenital bilateral absence of the vas deferens (CBAVD)","Testicular atrophy due to repeated infections","Female infertility due to thick cervical mucus","Azoospermia due to impaired spermatogenesis"],answer:0,explanation:"Male infertility in cystic fibrosis is caused by congenital bilateral absence of the vas deferens (CBAVD). The vas deferens (derived from the Wolffian duct) fails to develop properly in males with CF, leading to obstructive azoospermia (sperm produced but cannot be transported). ~98% of CF males have CBAVD. CBAVD can also occur as an isolated finding (without full CF) in men with mild CFTR mutations. CF females can also have reduced fertility due to thick cervical mucus but the most characteristic finding in MALES is CBAVD. ---",source:"Med 18"},{id:"final_final_L23_PS_Clinical_Genetics_32",exam:"final",lecture:"L23 PS Clinical Genetics",q:"Red-green color blindness follows which pattern of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked recessive","X-linked dominant"],answer:2,explanation:"Red-green color blindness (caused by mutations in OPN1LW/OPN1MW genes encoding long-wave and medium-wave opsins) is X-linked recessive. Males (XY) with one mutant allele are color blind (~8% of males). Females (XX) require two mutant alleles to be affected, so they are rarely color blind (~0.5%) but ~15% of females are carriers. Affected fathers transmit the trait to ALL daughters (obligate carriers) but NO sons. Sons of carrier females have 50% chance of being affected. Classic example of X-linked recessive inheritance. ---",source:"Med 18"},{id:"final_final_L23_PS_Clinical_Genetics_33",exam:"final",lecture:"L23 PS Clinical Genetics",q:"What is the molecular mechanism underlying familial hypercholesterolemia (heterozygous LDLR mutation)?",options:["Haploinsufficiency \u2014 one functional allele is insufficient for normal LDL receptor activity","Dominant negative mutation \u2014 mutant LDL receptor inhibits the normal allele's function","Gain-of-function \u2014 mutant LDLR causes overactivity","Loss of imprinting \u2014 inappropriate silencing of the maternal LDLR allele"],answer:0,explanation:"Familial hypercholesterolemia (FH) heterozygous form is caused by HAPLOINSUFFICIENCY of the LDLR gene \u2014 having only one functional copy of LDLR produces ~50% of normal LDL receptor levels, which is insufficient to maintain normal plasma LDL-cholesterol. This causes premature atherosclerosis and cardiovascular disease. FH is one of the most common autosomal dominant conditions. PCSK9 gain-of-function mutations cause a clinically similar phenotype by promoting LDLR degradation. Note: homozygous FH (both LDLR alleles mutated) is far more severe.",source:"Med 18"},{id:"final_final_L8_Pharmacogenetics_1",exam:"final",lecture:"L8 Pharmacogenetics",q:"What is the underlying cause of dark urine, jaundice and low red blood cell count and hemoglobin concentration after intake of primaquine in a malaria patient?",options:["Dihydropyrimidine dehydrogenase deficiency","Glucose-6-phosphate dehydrogenase deficiency","Cytochrome P450 deficiency","Thiopurine methyltransferase deficiency"],answer:1,explanation:"G6PD deficiency is an X-linked recessive condition where the G6PD enzyme is deficient, impairing the hexose monophosphate shunt and reducing NADPH/glutathione in red blood cells. Oxidative drugs such as primaquine cause oxidative stress, leading to hemolysis. Classic presentation: hemolytic anemia with dark urine (hemoglobinuria) and jaundice after exposure to oxidizing triggers (primaquine, dapsone, fava beans, infections).",source:"Med 25"},{id:"final_final_L8_Pharmacogenetics_2",exam:"final",lecture:"L8 Pharmacogenetics",q:"Using genetic or genomic information to select the most appropriate choice of pharmacological therapy at the correct dosage for every person is called:",options:["Pharmacogenetics","Pharmacogenomics","Personalized medicine","Genetic variation"],answer:2,explanation:"Personalized medicine (also called precision medicine) uses genetic/genomic information to tailor drug choice and dosage to each individual patient. Pharmacogenetics refers specifically to single-gene effects on drug response. Pharmacogenomics is the broader study of how the entire genome influences drug response. Personalized medicine applies that knowledge clinically.",source:"Med 25"},{id:"final_final_L8_Pharmacogenetics_3",exam:"final",lecture:"L8 Pharmacogenetics",q:"What mutation causes malignant hyperthermia?",options:["Mutation in RYR1","Mutation in pCHE","Mutation in TPMT","Mutation in DPYD"],answer:0,explanation:"Malignant hyperthermia (MH) is a pharmacogenetic condition triggered by volatile anesthetics (e.g., halothane) and succinylcholine. It is caused by mutations in the RYR1 gene encoding the ryanodine receptor type 1 in skeletal muscle sarcoplasmic reticulum, leading to uncontrolled calcium release, severe hyperthermia, muscle rigidity, and rhabdomyolysis. MH follows autosomal dominant inheritance. Treatment: immediate dantrolene.",source:"Med 25"},{id:"final_final_L8_Pharmacogenetics_4",exam:"final",lecture:"L8 Pharmacogenetics",q:"A patient experienced prolonged apnea after being given succinylcholine during surgery. What enzyme do they have a deficiency in?",options:["Pseudocholinesterase (butyrylcholinesterase)","Dihydropyrimidine dehydrogenase","Thiopurine methyltransferase","G6PD"],answer:0,explanation:"Pseudocholinesterase (also called butyrylcholinesterase, encoded by BCHE) normally rapidly hydrolyzes succinylcholine. Individuals with BCHE variants have reduced enzyme activity, causing prolonged neuromuscular blockade and apnea after succinylcholine administration. This is inherited in an autosomal recessive pattern. Management: mechanical ventilation until drug is cleared.",source:"Med 25"},{id:"final_final_L8_Pharmacogenetics_5",exam:"final",lecture:"L8 Pharmacogenetics",q:"Fast acetylators of isoniazid (used in tuberculosis treatment) usually suffer from:",options:["High failure of isoniazid in treating tuberculosis","Drug-induced systemic lupus erythematosus","Increased risk of bladder cancer","Peripheral neuropathy"],answer:0,explanation:"N-acetyltransferase 2 (NAT2) acetylates isoniazid. Fast acetylators rapidly inactivate isoniazid \u2192 lower plasma drug levels \u2192 subtherapeutic concentrations \u2192 increased risk of treatment failure for tuberculosis. Slow acetylators maintain higher drug levels and are at increased risk of drug-induced lupus erythematosus (DILE) and peripheral neuropathy from isoniazid accumulation.",source:"Med 25"},{id:"final_final_L8_Pharmacogenetics_6",exam:"final",lecture:"L8 Pharmacogenetics",q:"The mutated gene responsible for neonatal diabetes is:",options:["KCNJ11","TPMT","CFTR","HBB"],answer:0,explanation:"Permanent neonatal diabetes mellitus (PNDM) is most commonly caused by activating (gain-of-function) mutations in KCNJ11, which encodes the Kir6.2 subunit of the ATP-sensitive potassium (K-ATP) channel in pancreatic beta cells. Mutant channels remain open (fail to close in response to ATP from glucose metabolism), preventing insulin secretion. Importantly, PNDM due to KCNJ11 mutations can often be treated with oral sulfonylureas rather than insulin.",source:"Med 25"},{id:"final_final_L8_Pharmacogenetics_7",exam:"final",lecture:"L8 Pharmacogenetics",q:"A male patient with tuberculosis is receiving isoniazid and develops a severe adverse effect. What should be done?",options:["Increase the dose of isoniazid","Continue treatment without stopping","Change the drug to an alternative","Add another antibiotic to the regimen"],answer:2,explanation:"If a patient develops a severe adverse effect to isoniazid (such as hepatotoxicity, severe peripheral neuropathy, or drug-induced lupus in slow acetylators), the appropriate action is to discontinue isoniazid and switch to an alternative anti-tuberculosis regimen. Continuing or increasing the dose would worsen the adverse effect. Severe hepatotoxicity from isoniazid requires drug discontinuation.",source:"Med 18"},{id:"final_final_L8_Pharmacogenetics_8",exam:"final",lecture:"L8 Pharmacogenetics",q:"The NAT2 (N-acetyltransferase 2) gene is related to the metabolism of which drug?",options:["Succinylcholine","G6PD-sensitive drugs","Isoniazid","Thiopurines"],answer:2,explanation:'NAT2 (N-acetyltransferase 2) is the enzyme responsible for acetylation of isoniazid. NAT2 polymorphisms determine "fast" vs "slow" acetylator phenotype: Slow acetylators \u2192 higher isoniazid plasma levels \u2192 increased risk of peripheral neuropathy and drug-induced lupus erythematosus. Fast acetylators \u2192 lower drug levels \u2192 potential treatment failure for TB. BCHE metabolizes succinylcholine. TPMT metabolizes thiopurines. G6PD is unrelated to acetylation.',source:"Med 18"},{id:"final_final_L8_Pharmacogenetics_9",exam:"final",lecture:"L8 Pharmacogenetics",q:"A patient receiving 5-fluorouracil (5-FU) chemotherapy develops severe myelosuppression and mucositis after the first dose. Which enzyme deficiency is most likely responsible for this severe toxicity?",options:["CYP2D6","UGT1A1","DPYD (dihydropyrimidine dehydrogenase)","G6PD"],answer:2,explanation:"5-FU is catabolized primarily by DPYD (dihydropyrimidine dehydrogenase). DPYD deficiency \u2192 reduced 5-FU catabolism \u2192 toxic drug accumulation \u2192 severe, potentially fatal toxicity (myelosuppression, severe mucositis, neurotoxicity). ~3\u20135% of the population has partial DPYD deficiency. DPYD genotyping before 5-FU therapy is now recommended in European guidelines. CYP2D6 is involved in codeine/tamoxifen metabolism. UGT1A1 affects irinotecan toxicity. G6PD deficiency causes oxidant-induced hemolysis.",source:"Med 25"},{id:"final_final_L8_Pharmacogenetics_10",exam:"final",lecture:"L8 Pharmacogenetics",q:"A patient develops hemolytic anemia after eating fava beans (favism). Which gene is responsible for this condition?",options:["G6PD (glucose-6-phosphate dehydrogenase)","HBB (beta-globin)","CYP2D6","DPYD"],answer:0,explanation:"Favism is caused by G6PD (glucose-6-phosphate dehydrogenase) deficiency \u2014 the most common enzymopathy worldwide (X-linked recessive). G6PD is essential for protecting red blood cells from oxidative stress via the pentose phosphate pathway (NADPH production). Oxidant triggers (fava beans, primaquine, dapsone, sulfonamides, infections) \u2192 hemolytic anemia in G6PD-deficient individuals. HBB mutations cause hemoglobinopathies (sickle cell, thalassemia). CYP2D6/DPYD are drug-metabolizing enzymes.",source:"Med 25"},{id:"final_final_L8_Pharmacogenetics_11",exam:"final",lecture:"L8 Pharmacogenetics",q:"Favism (hemolytic anemia triggered by eating fava beans) is primarily caused by which genetic change?",options:["G6PD gene mutation leading to enzyme deficiency","HBB gene mutation causing sickling under oxidative stress","TPMT deficiency causing thiopurine toxicity","NAT2 slow acetylation phenotype"],answer:0,explanation:"Favism results from G6PD gene mutation causing enzyme deficiency (X-linked recessive). G6PD deficiency impairs NADPH production \u2192 red blood cells cannot neutralize oxidative stress from fava beans (which contain vicine and convicine, potent oxidants) \u2192 hemolytic anemia. G6PD deficiency is most prevalent in malaria-endemic regions (confers some resistance to P. falciparum). It is the most common genetic cause of hemolytic anemia triggered by food or drugs.",source:"Med 25"},{id:"final_final_L8_Pharmacogenetics_12",exam:"final",lecture:"L8 Pharmacogenetics",q:"A patient on warfarin anticoagulation develops excessive bleeding despite standard dosing. Pharmacogenomic testing is most likely to reveal a mutation in which gene?",options:["CYP2D6","VKORC1 alone","CYP2C9","NAT2"],answer:2,explanation:"Warfarin is metabolized primarily by CYP2C9 (S-warfarin \u2014 the more potent enantiomer). CYP2C9 poor metabolizer variants (*2, *3) \u2192 reduced warfarin catabolism \u2192 drug accumulation \u2192 excessive anticoagulation and bleeding risk. VKORC1 variants affect warfarin target sensitivity and are also clinically relevant for dosing. Both CYP2C9 and VKORC1 genotyping are used in pharmacogenomics-guided warfarin dosing algorithms. CYP2D6 affects codeine/tamoxifen. NAT2 affects isoniazid.",source:"Med 25"},{id:"final_final_L8_Pharmacogenetics_13",exam:"final",lecture:"L8 Pharmacogenetics",q:"Which of the following patients should NOT receive sulfonamide antibiotics due to risk of acute hemolytic anemia?",options:["Patient with CYP2D6 poor metabolizer genotype","Patient with G6PD deficiency","Patient with NAT2 slow acetylator status","Patient with sickle cell trait (HbAS)"],answer:1,explanation:"Sulfonamides are oxidant drugs that precipitate acute hemolytic anemia in G6PD-deficient patients. G6PD deficiency impairs NADPH production \u2192 insufficient glutathione reduction \u2192 failure to neutralize oxidative stress from sulfonamides \u2192 hemolysis. Sulfonamides are CONTRAINDICATED in G6PD deficiency. Other contraindicated oxidant agents include: primaquine, dapsone, nitrofurantoin, rasburicase. CYP2D6, NAT2, and sickle cell trait do not affect sulfonamide safety.",source:"Med 25"},{id:"mid1_mid1_L1_Introduction_1",exam:"mid1",lecture:"L1 Introduction",q:"What is an alternative form of a gene called?",options:["Chromosome","Genome","Allele","Locus"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? \u2022 Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome."},{id:"mid1_mid1_L1_Introduction_2",exam:"mid1",lecture:"L1 Introduction",q:"Parents are phenotypically normal but have two children with an autosomal dominant disease. What is the most likely explanation?",options:["Gonadal mosaicism","Somatic mosaicism","Complete penetrance","Anticipation"],answer:0,explanation:"From L1 Introduction: Genetics helps explain a lot of things, like what makes you unique, why you look like other members of your family, why somebody looks different and why some diseases run in your family."},{id:"mid1_mid1_L1_Introduction_3",exam:"mid1",lecture:"L1 Introduction",q:"Which of the following diseases is an example of pleiotropy?",options:["Down syndrome","Marfan syndrome","Sickle cell anemia","Turner syndrome"],answer:1,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Understanding Heredity: How traits are passed down through generations, which is essential for diagnosing and treating genetic disorders."},{id:"mid1_mid1_L1_Introduction_4",exam:"mid1",lecture:"L1 Introduction",q:"What is the definition of a gene?",options:["A sequence of RNA that forms proteins","A unit of energy in the cell","A hereditary unit of DNA that encodes a functional product","A structure found in the cytoplasm"],answer:2,explanation:"From L1 Introduction: \u2022 Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome. \u2022 Gene Variant is a permanent alteration in the DNA sequence that makes up a gene, such that the sequence differs from what is found in most people."},{id:"mid1_mid1_L1_Introduction_5",exam:"mid1",lecture:"L1 Introduction",q:"What is meant by a gene variant (mutation)?",options:["Movement of a gene within the genome","A reversible change in a protein structure","A permanent change in the DNA sequence","Temporary modification of gene expression"],answer:2,explanation:"From L1 Introduction: \u2022 Gene Variant is a permanent alteration in the DNA seque

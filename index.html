"Ahmad is a 3 year old with facial dysmorphic, cardiac outflow tract, and parathyroid hypoplasia. If you suspect 22del, with which test you would use to confirm the diagnosis?",options:["Microarray","Chromosomal analysis","FISH","Sanger sequencing"],answer:2,explanation:"FISH (Fluorescence in situ hybridization) is the preferred method to confirm a diagnosis of 22q11.2 deletion syndrome (DiGeorge syndrome). FISH uses fluorescent probes that bind to specific DNA sequences, allowing for the detection of small chromosomal deletions, such as the 22q11.2 deletion.",source:"Quiz Night"},{id:"akram_akram_QuizNight_109",exam:"akram",lecture:"QuizNight",q:"If the genetic test you started with for Ahmed was negative. What's your next step?",options:["Microarray","Chromosomal analysis","FISH","Sanger sequencing"],answer:0,explanation:"If the initial genetic test (FISH) was negative, the next logical step would be microarray. Microarray provides a higher resolution analysis and can detect smaller deletions, duplications, and other copy number variations across the entire genome that might not be detected by FISH or chromosomal analysis.",source:"Quiz Night"},{id:"akram_akram_QuizNight_110",exam:"akram",lecture:"QuizNight",q:"A trio sanger sequencing test of CFTR gene shows this result, what's the recurrence risk for the next child to be affected? [Image required]",options:["1-2%","25%","50%","75%"],answer:1,explanation:"Since the child in the chromatogram is homozygous affected, and both parents are heterozygous carriers, the recurrence risk for the next child to be affected by cystic fibrosis is 25% for each pregnancy. This is based on the autosomal recessive inheritance pattern.",source:"Quiz Night"},{id:"akram_akram_QuizNight_111",exam:"akram",lecture:"QuizNight",q:"A patient suffers from cardiomyopathy, strokes, fatigue, and weakness. He suspects a mitochondrial sequence mutation and wants to test MT-ATP6. What test would you order to confirm his condition?",options:["WES","NGS","Biochemical test","Microarray"],answer:1,explanation:"NGS (Next Generation Sequencing) allows for comprehensive sequencing of the mitochondrial genome, which includes the MT-ATP6 gene. This method is sensitive, can detect heteroplasmy (a mixture of normal and mutated mitochondrial DNA), and provides detailed information about sequence variations.",source:"Quiz Night"},{id:"akram_akram_QuizNight_112",exam:"akram",lecture:"QuizNight",q:"After testing, it was confirmed a substitution mutation was present. How would you describe the substitution that happened to the MT-ATP6 Gene?",options:["c.23 A>g","g.23 A>g","m.23 A>g","p.23 A>g"],answer:2,explanation:"For mitochondrial DNA mutations, the notation used is m.. Therefore, a substitution mutation in the MT-ATP6 gene would be described as m.23 A>g, indicating a change from adenine (A) to guanine (g) at position 23 in the mitochondrial DNA sequence.",source:"Quiz Night"},{id:"akram_akram_QuizNight_113",exam:"akram",lecture:"QuizNight",q:"What is true regarding karyotyping?",options:["Has to be in prophase","Has to be in G0 phase","Has to be in G1 phase","Has to be in metaphase"],answer:3,explanation:"Karyotyping is performed during metaphase of the cell cycle because chromosomes are most condensed and visible at this stage, making it easier to identify structural features and detect abnormalities. Prophase, G0, and G1 phases do not provide the same level of chromosomal visibility required for karyotyping.",source:"Quiz Night"},{id:"akram_akram_QuizNight_114",exam:"akram",lecture:"QuizNight",q:"Which molecular technique is most appropriate for detecting a balanced translocation?",options:["FISH using centromeric probes","Karyotyping","PCR","MLPA"],answer:1,explanation:"Karyotyping is the most suitable method for detecting balanced translocations. This technique involves staining and visualizing chromosomes under a microscope to identify structural abnormalities such as translocations, inversions, deletions, and duplications. PCR and MLPA are not suitable for detecting large-scale chromosomal rearrangements like balanced translocations.",source:"Quiz Night"},{id:"akram_akram_QuizNight_115",exam:"akram",lecture:"QuizNight",q:"A 4-year-old boy presents with developmental delays, intellectual disability, and hyperactivity. He has a family history of similar symptoms in male relatives. The pediatrician suspects Fragile X Syndrome. What is the most appropriate test to confirm the diagnosis?",options:["Karyotyping","Microarray analysis","Southern blot","Whole Exome Sequencing"],answer:2,explanation:"Southern blot is the gold standard for confirming the diagnosis of Fragile X Syndrome. This test can determine the number of CGG trinucleotide repeats in the FMR1 gene and assess the methylation status of the gene. Karyotyping and microarray analysis do not provide the specific information needed for Fragile X Syndrome. Whole Exome Sequencing is not typically used to diagnose repeat expansions and methylation abnormalities.",source:"Quiz Night"},{id:"akram_akram_QuizNight_116",exam:"akram",lecture:"QuizNight",q:"The sanger sequencing chromatogram results are displayed above. The gene mutation in the proband can be diagnosed as? [Image required]",options:["Homozygous de novo mutation","Heterozygous de novo mutation","Homozygous autosomal recessive","Heterozygous autosomal recessive"],answer:1,explanation:"The Sanger sequencing chromatogram shows 2 normal waves for the parents, indicating they do not carry the mutation. The child shows a heterozygous short amplitude wave, indicating the presence of both a normal and a mutated allele. Since the parents do not carry the mutation and the child does, this suggests a heterozygous de novo mutation.",source:"Quiz Night"},{id:"akram_akram_QuizNight_117",exam:"akram",lecture:"QuizNight",q:"The above chart shows the stature of a 13 years old girl with primary amenorrhea, congenital heart disease and webbed neck. What is the diagnosis? [Image required]",options:["Achondroplasia","Noonan syndrome","Turner syndrome","Edward syndrome"],answer:2,explanation:"Turner syndrome is characterized by a set of symptoms including short stature, primary amenorrhea (absence of menstrual periods), congenital heart disease, and a webbed neck. This condition is caused by the complete or partial absence of one of the X chromosomes (45,X karyotype).",source:"Quiz Night"},{id:"akram_akram_QuizNight_118",exam:"akram",lecture:"QuizNight",q:"What best describes short fingers?",options:["Clinodactyly","Brachydactyly","Syndactyly","Oligodactyly"],answer:1,explanation:"Brachydactyly is the term that best describes the condition of having short fingers. It refers to the shortening of the bones in the fingers and toes. Clinodactyly describes a curvature of the fingers or toes. Syndactyly refers to the fusion or webbing of two or more fingers or toes. Oligodactyly describes the presence of fewer than five fingers or toes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_119",exam:"akram",lecture:"QuizNight",q:"The above dysmorphological feature is described as? [Image required]",options:["Microglossia","Macroglossia","Macrostomia","Microstomia"],answer:1,explanation:"Macroglossia refers to an abnormally enlarged tongue. This is a dysmorphological feature that can be seen in several conditions including Beckwith-Wiedemann syndrome and Down syndrome. Microglossia would indicate a small tongue, while macrostomia and microstomia refer to mouth size.",source:"Quiz Night"},{id:"akram_akram_QuizNight_120",exam:"akram",lecture:"QuizNight",q:"What term is used to describe a missing ear?",options:["Microtia","Anotia","Low-set ears","Protruding ears"],answer:1,explanation:"Anotia is the term used to describe the complete absence of the external ear (pinna). It is a rare congenital condition where the ear does not develop at all. Microtia refers to a condition where the external ear is underdeveloped and abnormally small but still present. Low-set ears describe ears positioned lower on the head than usual. Protruding ears refer to ears that stick out more than usual.",source:"Quiz Night"},{id:"akram_akram_QuizNight_121",exam:"akram",lecture:"QuizNight",q:"The above dysmorphological feature is described as? [Image required]",options:["Microtia","Anotia","Low set ears","Protruding ears"],answer:2,explanation:"Low set ears are characterized by the positioning of the ears lower on the head than is typical. This can be identified by drawing an imaginary horizontal line from the inner corners of the eyes; in individuals with low set ears, the top of the ears will be below this line. Low set ears can be associated with various genetic syndromes and developmental disorders.",source:"Quiz Night"},{id:"akram_akram_QuizNight_122",exam:"akram",lecture:"QuizNight",q:"The above dysmorphological feature is described as? [Image required]",options:["Microtia","Anotia","Low set ears","Protruding ears"],answer:2,explanation:"Low set ears are characterized by the positioning of the ears lower on the head than is typical. This feature can be identified by drawing an imaginary horizontal line from the inner corners of the eyes; ears positioned below this line are considered low-set. Low set ears are associated with various genetic syndromes and developmental disorders, distinguishing them from microtia (small malformed ear), anotia (absent ear), and protruding ears.",source:"Quiz Night"},{id:"akram_akram_QuizNight_123",exam:"akram",lecture:"QuizNight",q:"The vertical groove between the base of the nose and the border of the upper lip is known as?",options:["Nasal bridge","Mouth","Palate","Philtrum"],answer:3,explanation:"The philtrum is the vertical groove located between the base of the nose and the border of the upper lip. It is a prominent facial feature that develops during embryonic growth. The philtrum's appearance can vary, and its prominence or lack thereof can be indicative of certain genetic conditions, such as fetal alcohol syndrome, where it may be flattened or absent.",source:"Quiz Night"},{id:"akram_akram_QuizNight_124",exam:"akram",lecture:"QuizNight",q:"What is the term used to describe microstomia?",options:["Small tongue","Small mouth","Large tongue","Large mouth"],answer:1,explanation:'Microstomia refers to an abnormally small mouth opening. The prefix "micro-" means small, and "stomia" refers to the mouth. This is a dysmorphological feature that can be part of various genetic syndromes. It is distinct from microglossia (small tongue), macroglossia (large tongue), and macrostomia (large mouth).',source:"Quiz Night"},{id:"akram_akram_QuizNight_125",exam:"akram",lecture:"QuizNight",q:"The above chart shows the stature of a 1 year old boy. What is the diagnosis? [Image required]",options:["Microcephaly","Macrocephaly","Hydrocephaly","Brachycephaly"],answer:0,explanation:"Microcephaly is a condition where a child's head circumference is significantly smaller than that of other children of the same age and sex, often defined as more than two standard deviations below the mean. The chart indicates a small head size for a 1-year-old boy, which is characteristic of microcephaly.",source:"Quiz Night"},{id:"akram_akram_QuizNight_126",exam:"akram",lecture:"QuizNight",q:"What term describes a condition where the head circumference is more than 3 standard deviations below the mean for age and gender?",options:["Macrocephaly","Hypertelorism","Microcephaly","Dolichocephaly"],answer:2,explanation:"The correct term for a head circumference more than 3 standard deviations below the mean is microcephaly. Macrocephaly refers to a head circumference more than 3 standard deviations above the mean. Hypertelorism refers to wide-set eyes, and dolichocephaly refers to an abnormally long and narrow skull.",source:"Quiz Night"},{id:"akram_akram_QuizNight_127",exam:"akram",lecture:"QuizNight",q:"What term is used to describe a condition where the mandible (lower jaw) protrudes abnormally?",options:["Micrognathia","Retrognathia","Prognathism","Hypotelorism"],answer:2,explanation:"Prognathism is the term used to describe the condition where the mandible (lower jaw) protrudes abnormally. Micrognathia refers to an abnormally small mandible, retrognathia describes a condition where the mandible is positioned posteriorly (set back), and hypotelorism is characterized by a decreased distance between the eyes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_128",exam:"akram",lecture:"QuizNight",q:"Which of the following is considered as a major defect?",options:["Microcephaly","Lacrimal duct stenosis","Epicanthic fold","Brushfield spots of the iris"],answer:0,explanation:"Microcephaly is considered a major defect because it involves a significant abnormality in brain development, resulting in a smaller than normal head size. This condition can lead to various degrees of intellectual disability and neurological impairments. Major defects are typically severe and have substantial medical, developmental, or functional consequences. The other options are minor anomalies.",source:"Quiz Night"},{id:"akram_akram_QuizNight_129",exam:"akram",lecture:"QuizNight",q:"Which of the following terms describes the abnormal mechanical force which distorts an otherwise normal structure?",options:["Malformation","Disruption","Deformation","Dysplasia"],answer:2,explanation:"Deformation refers to an abnormal shape or position of a part of the body caused by mechanical forces that distort an otherwise normal structure. This can occur due to constraints in the uterine environment, such as oligohydramnios or multiple gestations, which physically restrict fetal movement and growth. Deformations are generally considered secondary to extrinsic factors.",source:"Quiz Night"},{id:"akram_akram_QuizNight_130",exam:"akram",lecture:"QuizNight",q:"What is the best description of disruption?",options:["Primary and extrinsic","Secondary and extrinsic","Primary and intrinsic","Secondary and intrinsic"],answer:1,explanation:"Disruption is best described as secondary and extrinsic. It involves a normal developmental process that is interrupted by an external factor, such as an amniotic band constricting a limb, leading to a structural defect. This external factor disrupts the normal formation of structures that were initially developing correctly. Primary defects originate from intrinsic factors, whereas disruptions are secondary to extrinsic factors impacting normal development.",source:"Quiz Night"},{id:"akram_akram_QuizNight_131",exam:"akram",lecture:"QuizNight",q:"A primary and intrinsic birth defect is known as?",options:["Malformation","Disruption","Deformation","Dysplasia"],answer:0,explanation:"A malformation is a structural defect that arises from an intrinsically abnormal developmental process. It occurs during the embryonic period and is typically due to genetic or environmental factors that affect the formation of a particular structure from the outset. Examples include congenital heart defects and neural tube defects. Disruptions are caused by extrinsic factors, deformations are due to mechanical forces, and dysplasias involve abnormal cell organization.",source:"Quiz Night"},{id:"akram_akram_QuizNight_132",exam:"akram",lecture:"QuizNight",q:"An example of findings that occur as a consequence of a cascade of events initiated by a single primary factor?",options:["Cystic fibrosis","Potter","VACTERL","CHARGE"],answer:1,explanation:"Potter sequence is an example of a condition where a cascade of events is initiated by a single primary factor. In this case, the primary factor is renal agenesis (absence of one or both kidneys), which leads to oligohydramnios (reduced amniotic fluid). The lack of amniotic fluid results in a sequence of secondary complications, including pulmonary hypoplasia and characteristic facial features. This cascade effect is a hallmark of a sequence.",source:"Quiz Night"},{id:"akram_akram_QuizNight_133",exam:"akram",lecture:"QuizNight",q:"Which of the following is considered an association?",options:["Cystic fibrosis","Potter","VACTERL","Tay-Sachs"],answer:2,explanation:"VACTERL is an association, which is a group of anomalies that occur together more frequently than expected by chance but do not have a single identifiable cause. VACTERL stands for Vertebral anomalies, Anal atresia, Cardiac defects, Tracheo-Esophageal fistula, Renal anomalies, and Limb abnormalities. Unlike syndromes, which have a known genetic or environmental cause, associations are clusters of defects without a defined pathogenesis.",source:"Quiz Night"},{id:"akram_akram_QuizNight_134",exam:"akram",lecture:"QuizNight",q:"The birth defect above can be classified as? [Image required]",options:["Major abnormality","Minor abnormality","Syndrome","Association"],answer:0,explanation:"Hydrocephaly is classified as a major abnormality. It involves the accumulation of cerebrospinal fluid (CSF) in the brain's ventricles, leading to increased intracranial pressure and potentially causing brain damage and neurological impairment. This condition requires medical intervention and can have significant health implications, distinguishing it as a major abnormality.",source:"Quiz Night"},{id:"akram_akram_QuizNight_135",exam:"akram",lecture:"QuizNight",q:"The birth defect above is known as? [Image required]",options:["5th finger clinodactyly","Syndactyly between 2nd & 3rd fingers","Single palmer crease","Periauricular pit"],answer:2,explanation:"A single palmar crease (also known as a simian crease) is a single horizontal crease across the palm of the hand instead of the usual two creases. It is associated with Down syndrome and other chromosomal abnormalities. The image would show a single crease across the palm distinguishing it from clinodactyly, syndactyly, or a periauricular pit.",source:"Quiz Night"},{id:"akram_akram_QuizNight_136",exam:"akram",lecture:"QuizNight",q:"Which chromosome abnormalities are commonly found in spontaneous abortions?",options:["Trisomy, monosomy, or triploidy","Tetrasomy","Turner syndrome","Klinefelter syndrome"],answer:0,explanation:"Trisomy, monosomy, or triploidy are the most commonly found chromosome abnormalities in spontaneous abortions. Trisomy refers to the presence of an extra chromosome, monosomy refers to the absence of one chromosome in a pair, and triploidy refers to having three complete sets of chromosomes instead of the usual two. These chromosomal abnormalities often result in early embryonic lethality and are a common cause of miscarriage.",source:"Quiz Night"},{id:"akram_akram_QuizNight_137",exam:"akram",lecture:"QuizNight",q:"Which term refers to an abnormal organization of cells into tissue?",options:["Malformation","Disruption","Deformation","Dysplasia"],answer:3,explanation:"Dysplasia refers to the abnormal organization of cells within a tissue, leading to structural abnormalities. This term is used to describe a variety of conditions where the architecture of the tissue is disordered due to atypical cell growth or differentiation. Malformation is a primary intrinsic defect, disruption is secondary to extrinsic factors, and deformation is due to mechanical forces.",source:"Quiz Night"},{id:"akram_akram_QuizNight_138",exam:"akram",lecture:"QuizNight",q:"An increase in B-HCG with a decrease in AFP suggests a possibility of which syndrome?",options:["Down syndrome","Hydatidiform mole","Neural tube defect","Patau syndrome"],answer:0,explanation:"An increase in beta-human chorionic gonadotropin (B-HCG) combined with a decrease in alpha-fetoprotein (AFP) is characteristic of Down syndrome (Trisomy 21) in prenatal screening. These markers are part of the multiple-marker screening tests conducted during pregnancy to assess the risk of chromosomal abnormalities. Hydatidiform mole presents with elevated B-HCG but does not typically involve decreased AFP. Neural tube defects usually show increased AFP levels.",source:"Quiz Night"},{id:"akram_akram_QuizNight_139",exam:"akram",lecture:"QuizNight",q:"Increased maternal AFP suggests a possibility of?",options:["Down syndrome","Neural tube defect","Edward's syndrome","Hydatidiform mole"],answer:1,explanation:"An increase in maternal alpha-fetoprotein (AFP) is strongly associated with neural tube defects (NTDs) such as spina bifida and anencephaly. AFP is a protein produced by the fetal liver, and elevated levels in the mother's blood can indicate that the fetal neural tube has not closed properly, allowing AFP to leak into the amniotic fluid and cross into the maternal bloodstream. Down syndrome is typically associated with decreased AFP levels.",source:"Quiz Night"},{id:"akram_akram_QuizNight_140",exam:"akram",lecture:"QuizNight",q:"Which is a non-invasive method of prenatal diagnosis?",options:["Amniocentesis","Chorionic villus sampling","Ultrasonography","Embryoscopy"],answer:2,explanation:"Ultrasonography is a non-invasive method of prenatal diagnosis. It uses sound waves to create images of the fetus and can be used to monitor fetal development, assess fetal anatomy, and detect certain congenital anomalies without posing any risk to the mother or fetus. Amniocentesis and chorionic villus sampling (CVS) are invasive procedures, and embryoscopy is another invasive procedure used to visually inspect the fetus directly.",source:"Quiz Night"},{id:"akram_akram_QuizNight_141",exam:"akram",lecture:"QuizNight",q:"An increase in PAPP-A is an indication of?",options:["Down syndrome","A fetus small for gestational age","Stillbirth","A fetus large for gestational age"],answer:3,explanation:"Pregnancy-associated plasma protein A (PAPP-A) is a protein produced by the placenta during pregnancy. An increase in PAPP-A is generally a good sign and is associated with healthy fetal growth, specifically indicating a fetus large for gestational age. Low levels of PAPP-A in the first trimester are associated with an increased risk of Down syndrome, preeclampsia, fetal growth restriction, and stillbirth.",source:"Quiz Night"},{id:"akram_akram_QuizNight_142",exam:"akram",lecture:"QuizNight",q:'The "triple screen" consists of?',options:["AFP, B-HCG and Inhibin-A","B-HCG, uE3 and Inhibin-A","AFP, B-HCG and uE3","AFP, uE3 and Inhibin-A"],answer:2,explanation:"The triple screen is a prenatal test that measures three specific substances in a pregnant woman's blood: Alpha-fetoprotein (AFP), Beta-human chorionic gonadotropin (B-HCG), and Unconjugated estriol (uE3). These markers are used to assess the risk of chromosomal abnormalities such as Down syndrome and neural tube defects. Inhibin-A is included in the quadruple screen but not in the triple screen.",source:"Quiz Night"},{id:"akram_akram_QuizNight_143",exam:"akram",lecture:"QuizNight",q:"Which of the following is a parameter used in the first trimester?",options:["uE3","PAPP-A","AFP","Inhibin A"],answer:1,explanation:"Pregnancy-associated plasma protein A (PAPP-A) is a parameter used in first-trimester screening. It is measured along with free beta-HCG and nuchal translucency to assess the risk of Down syndrome and other chromosomal abnormalities early in pregnancy. Unconjugated estriol (uE3), AFP, and Inhibin A are typically measured in the second trimester as part of the triple or quadruple screen.",source:"Quiz Night"},{id:"akram_akram_QuizNight_144",exam:"akram",lecture:"QuizNight",q:"Inhibin-A marker shows an increased level in?",options:["Turner syndrome pregnancies","Down syndrome pregnancies","Cystic fibrosis pregnancies","Duchenne muscular dystrophy pregnancies"],answer:1,explanation:"Inhibin-A levels are typically increased in Down syndrome (Trisomy 21) pregnancies. This marker is part of the quadruple screen, which also includes AFP, B-HCG, and uE3, and helps to assess the risk of chromosomal abnormalities. Inhibin-A is not specifically associated with Turner syndrome, cystic fibrosis, or Duchenne muscular dystrophy.",source:"Quiz Night"},{id:"akram_akram_QuizNight_145",exam:"akram",lecture:"QuizNight",q:"Regarding screening tests, which is correct?",options:["There is an increase in AFP in neural tube defects","There is a decrease in AFP in neural tube defects","There is an increase in AFP in Down syndrome","There is a decrease in B-HCG in Down syndrome"],answer:0,explanation:"An increase in AFP (alpha-fetoprotein) is associated with neural tube defects such as spina bifida and anencephaly. Elevated AFP levels in the maternal serum can indicate that the fetal neural tube has not closed properly. In contrast, AFP levels are decreased in Down syndrome (Trisomy 21), and Down syndrome is also associated with increased B-HCG levels, not decreased.",source:"Quiz Night"},{id:"akram_akram_QuizNight_146",exam:"akram",lecture:"QuizNight",q:"A 47-year-old female patient is referred to the genetic clinic with a tumor in her right colon. Her father died at the age of 55 from colon cancer, her paternal aunt had endometrial cancer. What is the chance for her offspring to develop colon cancer?",options:["25%","50%","75%","100%"],answer:1,explanation:"Given the family history of colon and endometrial cancers, it is highly suggestive of Lynch syndrome (HNPCC), an autosomal dominant condition. If the mother carries the mutation, there is a 50% chance of passing the mutation to each of her offspring.",source:"Quiz Night"},{id:"akram_akram_QuizNight_147",exam:"akram",lecture:"QuizNight",q:"Which of the following genes increases the risk of prostate cancer when mutated?",options:["BRCA1","BRCA2","HER2","APC"],answer:1,explanation:"Mutations in the BRCA2 gene significantly increase the risk of prostate cancer, among other cancers. While BRCA1 mutations also increase risk, BRCA2 has a stronger association with prostate cancer. HER2 is primarily associated with breast cancer, and APC is related to familial adenomatous polyposis.",source:"Quiz Night"},{id:"akram_akram_QuizNight_148",exam:"akram",lecture:"QuizNight",q:"Which of the following genes causes a disorder while being inherited in an autosomal recessive manner?",options:["APC","BRCA2","MUTYH","MLH1"],answer:2,explanation:"MUTYH mutations cause MUTYH-associated polyposis (MAP), an autosomal recessive condition. This means an individual must inherit two mutated copies of the MUTYH gene to develop the condition. APC mutations cause FAP in an autosomal dominant manner. BRCA2 and MLH1 mutations are also inherited in an autosomal dominant manner.",source:"Quiz Night"},{id:"akram_akram_QuizNight_149",exam:"akram",lecture:"QuizNight",q:"What might be a factor causing increased risk of breast cancer development for a female patient?",options:["Additional occurrence of skin cancer","Late age of presentation","No known familial history of cancer","Multiple direct relatives with oncogenic history"],answer:3,explanation:"Having multiple direct relatives with a history of breast or related cancers significantly increases the risk of developing breast cancer. This suggests a possible genetic predisposition. Late age of presentation, no familial history, or occurrence of unrelated cancers are not as strong indicators of increased hereditary breast cancer risk.",source:"Quiz Night"},{id:"akram_akram_QuizNight_150",exam:"akram",lecture:"QuizNight",q:"Which gene type is subject to the two-hit hypothesis?",options:["Oncogenes","Tumor-suppressor genes","Mismatch repair genes","Apoptosis-regulating genes"],answer:1,explanation:"The two-hit hypothesis applies to tumor-suppressor genes. According to this hypothesis, both alleles of a tumor-suppressor gene must be inactivated for a cell to become cancerous. Oncogenes require only one mutation to become activated, mismatch repair genes involve DNA repair mechanisms, and apoptosis-regulating genes control cell death.",source:"Quiz Night"},{id:"akram_akram_QuizNight_151",exam:"akram",lecture:"QuizNight",q:"What is the maximum percent risk of developing ovarian cancer with a BRCA1 mutation?",options:["Up to 30%","Up to 40%","Up to 60%","Up to 90%"],answer:2,explanation:"Women with BRCA1 mutations have a significantly increased risk of developing ovarian cancer, with lifetime risk estimates up to 60%. This is higher than the risk associated with BRCA2 mutations and much higher than the general population risk.",source:"Quiz Night"},{id:"akram_akram_QuizNight_152",exam:"akram",lecture:"QuizNight",q:"Which blood group is associated with an increased risk of developing gastric cancer?",options:["Blood group B","Blood group O","Blood group AB","Blood group A"],answer:3,explanation:"Studies have shown that individuals with blood group A have a higher risk of developing gastric cancer compared to other blood groups. This suggests a genetic predisposition linked to blood group antigens.",source:"Quiz Night"},{id:"akram_akram_QuizNight_153",exam:"akram",lecture:"QuizNight",q:"Which of the following features suggests an inherited cancer susceptibility syndrome in a family?",options:["One relative with cancer at an advanced age","Several relatives with unrelated cancers","Bilateral tumors in paired organs","Sporadic cancer cases with no familial pattern"],answer:2,explanation:"Bilateral tumors in paired organs (e.g., both breasts, both kidneys) are a strong indicator of a genetic predisposition to cancer. This pattern is less likely to occur by chance and suggests the presence of inherited mutations that increase cancer risk.",source:"Quiz Night"},{id:"akram_akram_QuizNight_154",exam:"akram",lecture:"QuizNight",q:"What is a requirement for a screening test for persons at risk for a familial cancer-predisposing syndrome?",options:["The test should be invasive","The test should detect a malignant or premalignant condition at a stage before it produces symptoms","The test should not require follow-up","The test should be expensive and difficult to administer"],answer:1,explanation:"A good screening test should detect cancer or precancerous conditions early, ideally before symptoms appear, to allow for timely intervention. The test should also be sensitive, specific, and ideally non-invasive to ensure patient compliance and accurate detection.",source:"Quiz Night"},{id:"akram_akram_QuizNight_155",exam:"akram",lecture:"QuizNight",q:"The gold standard for management of women at high risk of ovarian cancer is?",options:["Regular mammography","Chemotherapy","Benign condition self-limiting management","Surgery"],answer:3,explanation:"The gold standard for managing women at high risk of ovarian cancer is surgery. Doctors often recommend risk-reducing salpingo-oophorectomy, which involves removing the ovaries and fallopian tubes. This proactive approach significantly reduces the chance of developing ovarian cancer for women with a high risk due to genetic mutations like BRCA1.",source:"Quiz Night"},{id:"akram_akram_QuizNight_156",exam:"akram",lecture:"QuizNight",q:"At what age is annual breast MRI screening recommended for women at high risk of breast cancer, such as BRCA1 gene carriers?",options:["From 20 years of age","From 25 years of age","From 30 years of age","From 40 years of age"],answer:2,explanation:"For women at high risk of breast cancer, such as those with BRCA1 mutations, annual breast MRI screening is recommended starting at age 30. MRI is more sensitive in detecting early breast cancers in younger women with dense breast tissue, compared to mammography.",source:"Quiz Night"},{id:"akram_akram_QuizNight_157",exam:"akram",lecture:"QuizNight",q:"A molecular analysis shows a mutation of the triplet codon for glutamic acid. Which of the following will be affected?",options:["HbS","HbA2","HbF","HbM"],answer:0,explanation:"HbS, or sickle cell hemoglobin, results from a mutation in the beta-globin gene where the codon for glutamic acid (GAG) is changed to valine (GTG). This substitution is characteristic of sickle cell anemia, affecting hemoglobin S specifically.",source:"Quiz Night"},{id:"akram_akram_QuizNight_158",exam:"akram",lecture:"QuizNight",q:"Which will occur if there is a loss of 4 alpha-globins?",options:["Cooley's Anemia","Delta beta thalassemia","HbH","Hydrops fetalis"],answer:3,explanation:"Hydrops fetalis is the most severe form of alpha-thalassemia and occurs when there is a loss of all four alpha-globin genes. This condition is usually fatal in utero or shortly after birth. Loss of three alpha-globin genes causes HbH disease, not hydrops fetalis.",source:"Quiz Night"},{id:"akram_akram_QuizNight_159",exam:"akram",lecture:"QuizNight",q:"An adult hemoglobin molecule consists of?",options:["4 heme groups with 2 alpha chains and 2 beta chains","4 heme groups with 2 alpha chains and 1 gamma chain","3 heme chains with 2 alpha chains and 2 beta chains","3 heme chains with 2 alpha chains and 1 gamma chain"],answer:0,explanation:"Adult hemoglobin (HbA) is composed of four heme groups and four globin chains: two alpha chains and two beta chains. Each heme group can carry one molecule of oxygen, allowing hemoglobin to transport up to four oxygen molecules simultaneously.",source:"Quiz Night"},{id:"akram_akram_QuizNight_160",exam:"akram",lecture:"QuizNight",q:"Which of the following disorders is due to a structural change in the globin chain?",options:["Sickle cell anemia","HbH","Delta, beta thalassemia","HbF"],answer:0,explanation:"Sickle cell anemia is caused by a structural change in the beta-globin chain, where a single amino acid substitution (glutamic acid to valine) occurs. HbH and delta/beta thalassemia are due to deletions or deficiencies in globin chains, not structural changes. HbF (fetal hemoglobin) is normal hemoglobin present during fetal development.",source:"Quiz Night"},{id:"akram_akram_QuizNight_161",exam:"akram",lecture:"QuizNight",q:"Which of the following is the result of three alpha globin alleles missing?",options:["HbH disease","Sickle cell disease","HbF","Delta beta thalassemia"],answer:0,explanation:"HbH disease occurs when there are three missing alpha-globin alleles. This results in an excess of beta chains forming beta tetramers known as HbH, which can lead to moderate to severe anemia. Loss of all four alpha-globin alleles causes hydrops fetalis.",source:"Quiz Night"},{id:"akram_akram_QuizNight_162",exam:"akram",lecture:"QuizNight",q:"What is the main O2 transport protein in humans during the last 7 months of pregnancy in the uterus?",options:["HbH","HbF","HbA2","HbA"],answer:1,explanation:"Hemoglobin F (HbF) is the main oxygen transport protein in the fetus during the last seven months of pregnancy. HbF consists of two alpha and two gamma chains, which have a higher affinity for oxygen than adult hemoglobin (HbA), allowing the fetus to extract oxygen from the maternal circulation.",source:"Quiz Night"},{id:"akram_akram_QuizNight_163",exam:"akram",lecture:"QuizNight",q:"What is the characteristic symptomatology of individuals with Hereditary Persistence of Fetal Hemoglobin?",options:["Severe anemia requiring frequent blood transfusions","Asymptomatic with continued HbF production","Hemolytic anemia with splenomegaly","Elevated levels of iron-chelating drugs in the blood"],answer:1,explanation:"Individuals with Hereditary Persistence of Fetal Hemoglobin (HPFH) are typically asymptomatic because they continue to produce HbF into adulthood. This can ameliorate the symptoms of conditions like sickle cell anemia and beta-thalassemia by compensating for the dysfunctional hemoglobin.",source:"Quiz Night"},{id:"akram_akram_QuizNight_164",exam:"akram",lecture:"QuizNight",q:"What is the most common mutational basis of beta-thalassemia in the Mediterranean region?",options:["Chain termination mutations","mRNA splicing mutations","RNA modification mutations","Transcription mutations"],answer:1,explanation:"In the Mediterranean region, the most common mutational basis for beta-thalassemia involves mutations affecting mRNA splicing. These mutations can lead to improper or inefficient processing of the beta-globin mRNA, resulting in reduced or absent production of the beta-globin chains necessary for forming hemoglobin.",source:"Quiz Night"},{id:"akram_akram_QuizNight_165",exam:"akram",lecture:"QuizNight",q:"Who is typically protected against malaria due to carrying the sickle cell trait?",options:["Individuals with one copy of the HbS gene","Individuals with two copies of the HbS gene","Individuals with no copies of the HbS gene","Individuals with one copy of the HbA gene"],answer:0,explanation:"Individuals with one copy of the HbS gene (heterozygous for sickle cell trait) have some protection against malaria. This is because the presence of some sickled cells can inhibit the life cycle of the malaria parasite within red blood cells. Individuals with two copies have sickle cell disease, not protection.",source:"Quiz Night"},{id:"akram_akram_QuizNight_166",exam:"akram",lecture:"QuizNight",q:"Which medication is commonly prescribed to help reduce the frequency of pain episodes in sickle cell disease?",options:["Antivirals","Hydroxyurea","Penicillin","Nonsteroidal anti-inflammatory drugs (NSAIDs)"],answer:1,explanation:"Hydroxyurea is commonly prescribed for sickle cell disease to reduce the frequency of pain episodes (vaso-occlusive crises). It works by increasing fetal hemoglobin (HbF) levels, which reduces the sickling of red blood cells and decreases the frequency of painful episodes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_167",exam:"akram",lecture:"QuizNight",q:"Largely increased HbF and slightly increased HbA2 in quantitative Hb studies is a feature of?",options:["Sickle cell disease","Beta-thalassemia major (Cooley's anemia)","Sickle cell trait","Hemoglobin Barts"],answer:1,explanation:"Beta-thalassemia major (Cooley's anemia) is characterized by a largely increased level of fetal hemoglobin (HbF) and a slightly increased level of hemoglobin A2 (HbA2). In contrast, sickle cell disease primarily features the presence of hemoglobin S (HbS) and does not typically show significant increases in HbF and HbA2.",source:"Quiz Night"},{id:"akram_akram_QuizNight_168",exam:"akram",lecture:"QuizNight",q:"RBCs become sickle cell shaped when?",options:["Oxygen levels are high","Low amount of bilirubin in blood","Oxygen levels are low","When a single copy of the beta globin gene is defected"],answer:2,explanation:"Red blood cells become sickle-shaped under conditions of low oxygen levels. This is due to the polymerization of the abnormal hemoglobin S (HbS), which distorts the red blood cells into a sickle shape, leading to blockages in small blood vessels and various complications.",source:"Quiz Night"},{id:"akram_akram_QuizNight_169",exam:"akram",lecture:"QuizNight",q:"Which of the following is an X-linked disorder?",options:["OTC deficiency","PKU","Glycogen storage disorder","Homocystinuria"],answer:0,explanation:"OTC deficiency (Ornithine Transcarbamylase Deficiency) is an X-linked disorder, meaning the gene responsible for the condition is located on the X chromosome. PKU, glycogen storage disorders, and homocystinuria typically follow autosomal recessive inheritance patterns.",source:"Quiz Night"},{id:"akram_akram_QuizNight_170",exam:"akram",lecture:"QuizNight",q:"Hurler and Hunter can present similarly. Which feature can distinguish between them?",options:["Hepatosplenomegaly","Corneal clouding","Coarse facial features","Developmental delay"],answer:1,explanation:"Corneal clouding is a distinguishing feature of Hurler syndrome (MPS I) but not Hunter syndrome (MPS II). Both conditions are lysosomal storage disorders with many overlapping symptoms, but corneal clouding is specifically associated with Hurler syndrome.",source:"Quiz Night"},{id:"akram_akram_QuizNight_171",exam:"akram",lecture:"QuizNight",q:"Which of the following vitamins could be used to treat homocystinuria?",options:["Vit B1","Vit B6","Vit C","Vit A"],answer:1,explanation:"Vitamin B6 (pyridoxine) can be used to treat some forms of homocystinuria. It helps to lower homocysteine levels in patients who are responsive to pyridoxine therapy by enhancing the activity of the enzyme cystathionine beta-synthase.",source:"Quiz Night"},{id:"akram_akram_QuizNight_172",exam:"akram",lecture:"QuizNight",q:"A 3-weeks old baby came to the emergency room with vomiting, diarrhea, organomegaly and loss of consciousness. What is the diagnostic method used?",options:["Blood glucose","Acylcarnitine profile","Plasma very long chain fatty acid","Galactose-1-phosphate"],answer:0,explanation:"Checking blood glucose is crucial in a newborn presenting with these symptoms to rule out hypoglycemia, which can be life-threatening and requires immediate treatment. Hypoglycemia can cause vomiting, diarrhea, organomegaly, and loss of consciousness, and is often the first diagnostic step in such presentations.",source:"Quiz Night"},{id:"akram_akram_QuizNight_173",exam:"akram",lecture:"QuizNight",q:"What is the underlying cause of dark urine, jaundice and low red blood cell count and hemoglobin concentration after intake of primaquine in a malaria patient?",options:["Dihydropyrimidine dehydrogenase deficiency","Glucose-6-phosphate dehydrogenase deficiency","Cytochrome P450 deficiency","Thiopurine methyltransferase deficiency"],answer:1,explanation:"Glucose-6-phosphate dehydrogenase (G6PD) deficiency can cause hemolytic anemia, leading to dark urine, jaundice, and low red blood cell count and hemoglobin concentration after exposure to oxidative stressors such as primaquine. G6PD is crucial in protecting red blood cells from oxidative damage.",source:"Quiz Night"},{id:"akram_akram_QuizNight_174",exam:"akram",lecture:"QuizNight",q:"Which of the following is considered a second line test for inborn errors of metabolism?",options:["Ammonia","Lactic acid","Blood gas","Urine organic acid"],answer:3,explanation:"Urine organic acid analysis is a second-line test for diagnosing inborn errors of metabolism. It helps to identify specific metabolic disorders by detecting abnormal organic acids excreted in urine, which are often missed by first-line screening tests.",source:"Quiz Night"},{id:"akram_akram_QuizNight_175",exam:"akram",lecture:"QuizNight",q:"Which one of these conditions presents very similarly to Marfan's syndrome?",options:["Phenylketonuria","Hurler disease","Homocystinuria","Tay-Sachs disease"],answer:2,explanation:"Homocystinuria can present similarly to Marfan's syndrome, with features such as tall stature, long limbs, and joint hypermobility. Both conditions involve connective tissue abnormalities, but homocystinuria also includes elevated levels of homocysteine and features such as lens dislocation (downward in homocystinuria vs. upward in Marfan).",source:"Quiz Night"},{id:"akram_akram_QuizNight_176",exam:"akram",lecture:"QuizNight",q:"Which of the following is related to lysosomal storage disorders?",options:["Zellweger spectrum disorder","Mucopolysaccharides","Urea cycle defects","Tay-Sachs disease"],answer:1,explanation:"Mucopolysaccharidoses (MPS) are a group of lysosomal storage disorders caused by the deficiency of enzymes required to degrade glycosaminoglycans (mucopolysaccharides). This results in their accumulation within lysosomes, leading to a range of symptoms including skeletal abnormalities, organomegaly, and developmental delays. Zellweger spectrum disorder is a peroxisomal disorder, and urea cycle defects are metabolic disorders involving the urea cycle.",source:"Quiz Night"},{id:"akram_akram_QuizNight_177",exam:"akram",lecture:"QuizNight",q:"A 6 year old girl presented with intellectual disability, seizure, decreased pigmentation of skin, hair, iris and a mousy odor of urine. Which amino acid would you expect to be elevated in the quantitative plasma amino acid profile?",options:["Glycine","Homocysteine","Phenylalanine","Tyrosine"],answer:2,explanation:"The clinical presentation of intellectual disability, seizures, hypopigmentation, and a musty odor of urine is characteristic of phenylketonuria (PKU). PKU is caused by a deficiency in the enzyme phenylalanine hydroxylase, leading to elevated levels of phenylalanine in the blood. Tyrosine levels may be low or normal in PKU due to the blocked conversion from phenylalanine.",source:"Quiz Night"},{id:"akram_akram_QuizNight_178",exam:"akram",lecture:"QuizNight",q:"Which of the following is considered a first line test for inborn errors of metabolism?",options:["Urine ketone","Urine organic acid","Urine mucopolysaccharides","Urine oligosaccharides"],answer:0,explanation:"Urine ketone testing is often used as a first line test for inborn errors of metabolism, particularly in cases of metabolic crises. It helps in identifying conditions that involve abnormal ketone production, such as organic acidemias and fatty acid oxidation disorders.",source:"Quiz Night"},{id:"akram_akram_QuizNight_179",exam:"akram",lecture:"QuizNight",q:"In Ornithine transcarbamylase deficiency, what is the investigation to be seen?",options:["Reduced orotic acid","Lactic acid","Hyperammonemia","Increased methionine and homocysteine"],answer:2,explanation:"Ornithine transcarbamylase deficiency is a urea cycle disorder that leads to an accumulation of ammonia in the blood (hyperammonemia). This is due to the enzyme deficiency preventing the conversion of ornithine and carbamoyl phosphate to citrulline in the urea cycle.",source:"Quiz Night"},{id:"akram_akram_QuizNight_180",exam:"akram",lecture:"QuizNight",q:"A 9-month-old infant presents with muscle weakness, cardiomyopathy, and liver failure. Laboratory tests reveal mitochondrial dysfunction. Which disorder is most likely responsible for this presentation?",options:["Maple syrup urine disease (MSUD)","Ornithine transcarbamylase deficiency (OTCD)","MELAS syndrome","Glycogen storage disease type 1a (GSD1a)"],answer:2,explanation:"MELAS syndrome (Mitochondrial Encephalopathy, Lactic Acidosis, and Stroke-like episodes) is a mitochondrial disorder that often presents with muscle weakness, cardiomyopathy, and other systemic manifestations such as liver failure due to mitochondrial dysfunction. The presentation described is characteristic of a mitochondrial disorder.",source:"Quiz Night"},{id:"akram_akram_QuizNight_181",exam:"akram",lecture:"QuizNight",q:"An 11-year-old boy with intellectual disability, seizures, poor vision, and consanguineous parents is brought to the clinic. On examination, he is tall with thin long limbs, and lens subluxation is noted along with scoliosis. His plasma amino acids show increased methionine and homocysteine levels. Which enzyme deficiency is most likely responsible for this presentation?",options:["Phenylalanine hydroxylase","Cystathionine beta synthetase","Tyrosine hydroxylase","Ornithine transcarbamylase"],answer:1,explanation:"The clinical features described, including intellectual disability, seizures, poor vision, tall stature with thin limbs, lens subluxation, scoliosis, and increased methionine and homocysteine levels, are indicative of Homocystinuria. This condition is most commonly caused by a deficiency in the enzyme cystathionine beta synthetase.",source:"Quiz Night"},{id:"akram_akram_QuizNight_182",exam:"akram",lecture:"QuizNight",q:"A 2-week-old newborn presents with poor feeding, vomiting, jaundice, and lethargy. Examination reveals hepatomegaly and ascites. Newborn screening indicates decreased activity of galactose-1-phosphate uridyltransferase (GALT). Which of the following is the most appropriate treatment for this condition?",options:["Thiamine supplementation","Galactose free diet","Glucose free diet","Sodium benzoate therapy"],answer:1,explanation:"The clinical presentation and decreased activity of galactose-1-phosphate uridyltransferase (GALT) are diagnostic of classic galactosemia. The appropriate treatment is a galactose-free diet to prevent the accumulation of toxic metabolites such as galactose-1-phosphate, which causes organ damage.",source:"Quiz Night"},{id:"akram_akram_QuizNight_183",exam:"akram",lecture:"QuizNight",q:"Which sample type is NOT commonly used for the diagnosis of IEMs?",options:["Dried blood spots","Saliva","Urine","Peripheral Blood"],answer:1,explanation:"For the diagnosis of inborn errors of metabolism (IEMs), commonly used sample types include dried blood spots, urine, and peripheral blood. These samples allow for the measurement of metabolites, enzyme activities, and genetic analysis. Saliva is not typically used for diagnosing IEMs as it does not provide the necessary metabolic information required for these diagnoses.",source:"Quiz Night"},{id:"akram_akram_QuizNight_184",exam:"akram",lecture:"QuizNight",q:"Which of the following is considered a first-line investigation in suspected IEM?",options:["Urine organic acid test","Blood gas analysis","Plasma amino acids","Specific enzyme assay"],answer:0,explanation:"Urine organic acid test is considered a first-line investigation in suspected inborn errors of metabolism (IEMs) as it can reveal a wide range of metabolic abnormalities. It helps identify specific metabolic disorders by detecting abnormal organic acids excreted in urine.",source:"Quiz Night"},{id:"akram_akram_QuizNight_185",exam:"akram",lecture:"QuizNight",q:"Which test is used to detect both the mass and structure of compounds in the diagnosis of IEMs?",options:["High-performance liquid chromatography","Tandem mass spectrometry (MS/MS)","Nuclear magnetic resonance spectroscopy","Electroencephalogram"],answer:1,explanation:"Tandem mass spectrometry (MS/MS) is used to detect both the mass and structure of compounds, making it a powerful tool in the diagnosis of IEMs. It can rapidly analyze multiple metabolites simultaneously from small sample volumes such as dried blood spots.",source:"Quiz Night"},{id:"akram_akram_QuizNight_186",exam:"akram",lecture:"QuizNight",q:"A 4-month-old infant presents with dysmorphic features, hypotonia, hepatomegaly, seizures, and bone changes. Laboratory investigations reveal increased plasma very long-chain fatty acids and reduced erythrocyte plasmalogens. Which disorder is most likely responsible for this presentation?",options:["Galactosemia","Maple syrup urine disease (MSUD)","Zellweger spectrum disorder (ZSD)","Glycogen storage disease type 1a (GSD1a)"],answer:2,explanation:"Zellweger spectrum disorder (ZSD) is characterized by dysmorphic features, hypotonia, hepatomegaly, seizures, and bone changes. The laboratory findings of increased plasma very long-chain fatty acids and reduced erythrocyte plasmalogens are indicative of peroxisomal disorders. ZSD is caused by mutations in PEX genes, leading to defects in the formation and function of peroxisomes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_187",exam:"akram",lecture:"QuizNight",q:"The definition of the word consultand is?",options:["An individual who seeks genetic counseling","Doctor who performs the psychological support","A psychologist","The family of the patient"],answer:0,explanation:"A consultand is the individual who seeks genetic counseling for themselves or on behalf of a family member. This is distinct from the proband, who is the affected individual in a family, and from the genetic counselor or clinical geneticist who provides the counseling.",source:"Quiz Night"},{id:"akram_akram_QuizNight_188",exam:"akram",lecture:"QuizNight",q:"Which of the following is NOT a step in genetic counseling?",options:["Risk assessment","Communication","Medication prescription","Long-term support"],answer:2,explanation:"Genetic counseling involves risk assessment, communication, and long-term support, but it does not include prescribing medication, which is typically the role of a physician. Genetic counselors provide information, risk assessment, and psychosocial support but do not have prescribing authority.",source:"Quiz Night"},{id:"akram_akram_QuizNight_189",exam:"akram",lecture:"QuizNight",q:"Which of the following best describes genetic counseling?",options:["It focuses only on medical treatment of the patient","It is done only by a clinical Geneticist","It focuses only on psychological aspect of patient","It deals with the risk of developing or transmitting a genetic disorder"],answer:3,explanation:"Genetic counseling is a process that includes evaluating the risk of developing or transmitting a genetic disorder, providing information, and offering support to individuals and families. It is a comprehensive service that addresses medical, psychological, and social aspects of genetic conditions.",source:"Quiz Night"},{id:"akram_akram_QuizNight_190",exam:"akram",lecture:"QuizNight",q:"Which of the following is an indication for genetic counseling in adults?",options:["Family history","Adult with migraine headaches","Family history of heart disease after 60 years of age","A strong personal or family history of cancer with heritability"],answer:3,explanation:"Genetic counseling is indicated for adults with a strong personal or family history of heritable conditions, such as cancer with known genetic links. Family history of heart disease after 60 years or adult migraines are not typical indications unless they are part of a broader hereditary syndrome.",source:"Quiz Night"},{id:"akram_akram_QuizNight_191",exam:"akram",lecture:"QuizNight",q:"Which of the following is a skill of genetic counseling?",options:["Should be patient centered","Should be directive","Should be judgmental","Should be one-way process"],answer:0,explanation:"Genetic counseling should be patient-centered, focusing on the needs and concerns of the patient and their family. It should not be directive, judgmental, or a one-way process; instead, it should involve active listening and shared decision-making.",source:"Quiz Night"},{id:"akram_akram_QuizNight_192",exam:"akram",lecture:"QuizNight",q:"Which healthcare professional focuses on the medical diagnosis and treatment of genetic conditions?",options:["Genetic counselor","Clinical geneticist","Pediatrician","Radiologist"],answer:1,explanation:"A clinical geneticist is a healthcare professional who specializes in diagnosing and treating genetic disorders. Genetic counselors provide information and support, but they do not diagnose or treat conditions. Pediatricians and radiologists have different roles not specific to genetic conditions.",source:"Quiz Night"},{id:"akram_akram_QuizNight_193",exam:"akram",lecture:"QuizNight",q:"When would someone most likely seek genetic counseling?",options:["After a minor injury","Following the diagnosis of a fetal anomaly","During a routine checkup","For a prescription refill"],answer:1,explanation:"People are most likely to seek genetic counseling after the diagnosis of a fetal anomaly, to understand the implications, potential outcomes, and options. Routine checkups, minor injuries, or prescription refills are not typical triggers for genetic counseling.",source:"Quiz Night"},{id:"akram_akram_QuizNight_194",exam:"akram",lecture:"QuizNight",q:"Which principle of genetic counseling emphasizes respecting a patient's right to make their own decisions?",options:["Non-maleficence","Autonomy","Confidentiality","Justice"],answer:1,explanation:"Autonomy is the principle that emphasizes respecting a patient's right to make their own decisions regarding their healthcare, including decisions about genetic testing and related interventions. This principle is fundamental to ethical genetic counseling practice.",source:"Quiz Night"},{id:"akram_akram_QuizNight_195",exam:"akram",lecture:"QuizNight",q:"Which type of mutation is controversial to genetic therapy?",options:["Somatic mutation","Germline mutation","Ex vivo","Anti-sense mutation"],answer:1,explanation:"Germline mutations affect the reproductive cells and can be passed on to future generations, raising ethical, moral, and safety concerns. This type of genetic therapy is controversial because it has the potential to affect not just the individual treated but also their descendants.",source:"Quiz Night"},{id:"akram_akram_QuizNight_196",exam:"akram",lecture:"QuizNight",q:"A 5-year-old child presents to the genetic clinic with symptoms of extreme tiredness, pale skin, shortness of breath, and poor appetite. The genetic team decides to use a lentivirus vector for gene therapy. Which of the following conditions is most likely being treated with lentivirus vector therapy in this patient?",options:["Severe anemia","Neurodegenerative disease","Myopathy disease","Cardiomyopathy"],answer:0,explanation:'Lentivirus vectors were used for treating beta-thalassemia (marketed as "Zynteglo" in 2022) and lysosomal storage diseases such as "Libmeldy" in Metachromatic Leukodystrophy. The symptoms of extreme tiredness, pale skin, and shortness of breath are consistent with severe anemia caused by beta-thalassemia.',source:"Quiz Night"},{id:"akram_akram_QuizNight_197",exam:"akram",lecture:"QuizNight",q:"SpinRaza is an example of which type of therapy?",options:["Introducing a new gene","Gene knockdown","Modifying an existing gene","Editing a gene directly"],answer:2,explanation:"SpinRaza (nusinersen) is an RNA-based therapy designed to treat spinal muscular atrophy (SMA). It works by altering the splicing of the SMN2 gene's pre-mRNA, thereby increasing the production of functional SMN protein. This is an example of modifying an existing gene's expression rather than introducing a new gene or editing DNA directly.",source:"Quiz Night"},{id:"akram_akram_QuizNight_198",exam:"akram",lecture:"QuizNight",q:"Which vector is ideal for hematopoietic stem cells (HSCs) transduction?",options:["Lentivirus","Adenovirus","Retrovirus","Herpes virus"],answer:0,explanation:"Lentivirus vectors are ideal for transducing hematopoietic stem cells because they can integrate into the host genome (integrative), allowing for stable and long-term expression of the therapeutic gene in these rapidly dividing cells. Adenoviral vectors do not integrate into the host genome and provide only transient gene expression. Herpes simplex virus vectors are primarily used for targeting neurons.",source:"Quiz Night"},{id:"akram_akram_QuizNight_199",exam:"akram",lecture:"QuizNight",q:"What is the function of CRISPR-Cas9 in gene editing?",options:["It deletes entire chromosomes","It acts as molecular scissors to cut DNA at specific sites","It silences gene expression permanently","It copies and pastes genetic material into new cells"],answer:1,explanation:"CRISPR-Cas9 is a gene-editing tool that allows scientists to make precise cuts in DNA at specific locations. This system includes a guide RNA that directs the Cas9 enzyme to the target DNA sequence, where Cas9 acts as molecular scissors to cut the DNA, enabling the addition, deletion, or alteration of genetic material.",source:"Quiz Night"},{id:"akram_akram_QuizNight_200",exam:"akram",lecture:"QuizNight",q:"What is a potential risk associated with gene therapy vectors?",options:["Immunotoxicity","Increased resistance to antibiotics","Enhanced metabolic activity","Reduced cell division rates"],answer:0,explanation:"Gene therapy vectors can sometimes trigger harmful immune responses (immunotoxicity) against either the vector or the transgene, which can limit the effectiveness of the therapy and pose safety risks to the patient.",source:"Quiz Night"},{id:"akram_akram_QuizNight_201",exam:"akram",lecture:"QuizNight",q:"Which of the following is an example of a disorder that can be treated by gene therapy?",options:["Zellweger syndrome","Hurler syndrome","Hunter syndrome","Galactosemia"],answer:2,explanation:"Hunter syndrome, also known as Mucopolysaccharidosis type II (MPS II), is an example of a disorder that can be treated by enzyme replacement gene therapy. Zellweger syndrome, Hurler syndrome, and galactosemia are managed differently and are not typically treated with currently approved gene therapy approaches.",source:"Quiz Night"},{id:"akram_akram_QuizNight_202",exam:"akram",lecture:"QuizNight",q:"Luxturna gene therapy used which vector?",options:["In-vivo AAV vector","Ex-vivo AAV vector","In-vivo Herpes vector","Ex-vivo Herpes vector"],answer:0,explanation:'Luxturna (voretigene neparvovec) is a gene therapy used to treat inherited retinal dystrophy caused by mutations in the RPE65 gene. Luxturna uses an in-vivo adeno-associated virus (AAV) vector to deliver a functional copy of the RPE65 gene directly to the retinal cells. The term "in-vivo" refers to the delivery of the therapy directly into the body.',source:"Quiz Night"},{id:"akram_akram_QuizNight_203",exam:"akram",lecture:"QuizNight",q:"Which requirement is necessary for effective gene therapy?",options:["Lack of understanding of the disease's molecular defect","Availability of regulatory components for gene expression","Inaccessibility of target cells","Short half-life of the target cells"],answer:1,explanation:"For effective gene therapy, it is crucial to have regulatory components that ensure the correct expression of the introduced gene. This includes promoters, enhancers, and other elements that control the timing, location, and level of gene expression.",source:"Quiz Night"},{id:"akram_akram_QuizNight_204",exam:"akram",lecture:"QuizNight",q:"A family came with their 7-year old girl and 5-year old boy complaining of chronic pulmonary disease, failure to thrive with malnutrition, and chronic diarrhea due to pancreatic insufficiency. What is the mode of inheritance?",options:["AR","AD","XL","Single gene"],answer:0,explanation:"The described symptoms are indicative of cystic fibrosis (CF), which is inherited in an autosomal recessive (AR) manner. Both parents must be carriers of the defective CF gene for the children to be affected, which explains why two unrelated siblings are both affected.",source:"Quiz Night"},{id:"akram_akram_QuizNight_205",exam:"akram",lecture:"QuizNight",q:"What would the clinical test results indicate to the family (regarding cystic fibrosis)?",options:["High sweat chloride","Negative sweat chloride","Low sweat chloride","Normal sweat chloride"],answer:0,explanation:"Cystic fibrosis is diagnosed by a sweat test that measures the concentration of chloride in the sweat. A high sweat chloride level (above 60 mmol/L) is characteristic of CF. This is caused by the defective CFTR protein which fails to reabsorb chloride in the sweat ducts.",source:"Quiz Night"},{id:"akram_akram_QuizNight_206",exam:"akram",lecture:"QuizNight",q:"Which of the following channels does the mutated gene affect (in cystic fibrosis)?",options:["Chloride channels","Calcium channels","Sodium channels","Potassium channels"],answer:0,explanation:"The CFTR gene mutation in cystic fibrosis affects the chloride channels, disrupting the movement of chloride ions across cell membranes. This leads to thick, sticky mucus in the lungs and other organs, causing the characteristic symptoms of cystic fibrosis.",source:"Quiz Night"},{id:"akram_akram_QuizNight_207",exam:"akram",lecture:"QuizNight",q:"What other clinical feature might be seen in cystic fibrosis?",options:["Male infertility due to testicular atrophy","Male infertility due to congenital bilateral absence of the vas deferens","Female infertility due to ovarian failure","Female infertility due to lack of fallopian tubes"],answer:1,explanation:"One of the common features of cystic fibrosis in males is infertility due to congenital bilateral absence of the vas deferens (CBAVD), which is a result of the CFTR mutation. This leads to azoospermia and infertility, even in males with milder forms of CF.",source:"Quiz Night"},{id:"akram_akram_QuizNight_208",exam:"akram",lecture:"QuizNight",q:"A patient presents with cafe-au-lait spots and optic nerve glioma. What is the gene responsible for this defect?",options:["FBN1","NF1","FGFR3","HER2"],answer:1,explanation:"Neurofibromatosis type 1 (NF1) is characterized by the presence of multiple cafe-au-lait spots and the development of benign tumors such as optic nerve gliomas. The gene responsible for this condition is NF1, which encodes neurofibromin, a protein involved in the regulation of cell growth.",source:"Quiz Night"},{id:"akram_akram_QuizNight_209",exam:"akram",lecture:"QuizNight",q:"A 3-year old boy with protruded tongue, simian crease, and microcephaly. What is the possible syndrome?",options:["Patau's syndrome","Down syndrome","Edward's syndrome","Noonan's syndrome"],answer:1,explanation:"Down syndrome (trisomy 21) is typically characterized by distinctive physical features such as a protruding tongue, a single palmar crease (simian crease), and microcephaly. These features, along with developmental delays, are indicative of this chromosomal disorder.",source:"Quiz Night"},{id:"akram_akram_QuizNight_210",exam:"akram",lecture:"QuizNight",q:"What is the best test for confirming the diagnosis of Down syndrome?",options:["Cytogenetic test","Whole exome sequencing","Sanger sequencing","FISH"],answer:0,explanation:"The definitive test for diagnosing Down syndrome is a cytogenetic test, which involves karyotyping to visualize the chromosomes. This test can identify the presence of an extra chromosome 21, confirming the diagnosis of trisomy 21. Whole exome sequencing and Sanger sequencing would not identify trisomies.",source:"Quiz Night"},{id:"akram_akram_QuizNight_211",exam:"akram",lecture:"QuizNight",q:"Failure to thrive and malnutrition as result of chronic diarrhea and malabsorption due to pancreatic insufficiency are due to which gene defect?",options:["FBN1","NF1","FGFR3","CFTR"],answer:3,explanation:"Cystic fibrosis, which is caused by mutations in the CFTR gene, leads to defective chloride channels, resulting in thick mucus secretions. This affects multiple organs, including the pancreas, causing malabsorption, chronic diarrhea, and failure to thrive due to pancreatic insufficiency.",source:"Quiz Night"},{id:"akram_akram_QuizNight_212",exam:"akram",lecture:"QuizNight",q:"A child presents with microcephaly, hypotonia, and cat-like cry. What would the chromosomal analysis show?",options:["5p deletion","15p deletion","5q deletion","4p deletion"],answer:0,explanation:'The clinical presentation of microcephaly, hypotonia, and a cat-like cry is characteristic of Cri-du-chat syndrome, which is caused by a deletion on the short arm of chromosome 5 (5p deletion). The name "Cri-du-chat" is French for "cry of the cat," referring to the distinctive high-pitched cry.',source:"Quiz Night"},{id:"akram_akram_QuizNight_213",exam:"akram",lecture:"QuizNight",q:"Majed, 30-years old, went to the genetic clinic. He is married for three years, but sterile due to azoospermia. The family history was negative, and his characteristics were tall and his arms were long. What is the diagnosis?",options:["Klinefelter syndrome","Marfan syndrome","Fragile X syndrome","Homocystinuria"],answer:0,explanation:"Klinefelter syndrome (47,XXY) is often associated with azoospermia leading to infertility, along with tall stature and long limbs. The combination of these features strongly suggests Klinefelter syndrome. Marfan syndrome also presents with tall stature and long limbs but does not typically cause azoospermia.",source:"Quiz Night"},{id:"akram_akram_QuizNight_214",exam:"akram",lecture:"QuizNight",q:"A couple came to genetic clinic. They have a 12-year old girl presented with short stature, enlarged head, and rhizomelic shortening of long bone. How do you confirm the diagnosis?",options:["DNA analysis for FGFR3","Chromosomal analysis","FBN1 DNA analysis","Glycoproteins"],answer:0,explanation:"The clinical features described, such as short stature, enlarged head, and rhizomelic shortening of long bones, are characteristic of achondroplasia, which is caused by mutations in the FGFR3 gene. DNA analysis for FGFR3 mutations would confirm the diagnosis.",source:"Quiz Night"},{id:"akram_akram_QuizNight_215",exam:"akram",lecture:"QuizNight",q:"If the test showed a heterozygous FGFR3 mutation, what is the percentage chance to have an unaffected child if the girl married a man with the same gene mutation?",options:["1-2%","25%","50%","100%"],answer:1,explanation:"If both parents are heterozygous for an autosomal dominant mutation (achondroplasia), each child has a 25% chance of being unaffected (homozygous normal), a 50% chance of being affected (heterozygous), and a 25% chance of being severely affected (homozygous for the mutation). Thus, the chance of having an unaffected child is 25%.",source:"Quiz Night"},{id:"akram_akram_QuizNight_216",exam:"akram",lecture:"QuizNight",q:"A family with two affected boys presented to the genetic clinic. The two brothers have muscle weakness and a positive Gower's sign. Family history revealed a maternal uncle that is wheelchair dependent and has dilated cardiomyopathy. What additional manifestation can be observed in this condition?",options:["Spinal compression","Calf pseudohypertrophy","Macrocephaly","Microcephaly"],answer:1,explanation:"The clinical presentation of muscle weakness, a positive Gower's sign, and a family history of dilated cardiomyopathy suggests Duchenne muscular dystrophy (DMD). Calf pseudohypertrophy is a common feature in DMD, where the calf muscles appear enlarged due to replacement of muscle tissue with fat and connective tissue.",source:"Quiz Night"},{id:"akram_akram_QuizNight_217",exam:"akram",lecture:"QuizNight",q:"Which of the following lab results will be expected in Duchenne muscular dystrophy?",options:["High creatine kinase level","Low creatine kinase level","Normal creatine kinase level","No change to creatine kinase level"],answer:0,explanation:"In Duchenne muscular dystrophy, creatine kinase (CK) levels are significantly elevated due to muscle breakdown. The release of CK from damaged muscle cells results in markedly high serum CK levels, often 10-100 times above normal, which is a hallmark laboratory finding of DMD.",source:"Quiz Night"},{id:"akram_akram_QuizNight_218",exam:"akram",lecture:"QuizNight",q:"Which of the following type of gene is most likely to be responsible for Duchenne muscular dystrophy?",options:["Dystrophin encoding gene","Neurofibromin encoding gene","Fibrillin-1 encoding gene","Calcium channels encoding gene"],answer:0,explanation:"Duchenne muscular dystrophy is caused by mutations in the dystrophin gene, which encodes the dystrophin protein. This protein is crucial for maintaining muscle cell integrity. Mutations that disrupt the reading frame result in a nonfunctional dystrophin protein and the characteristic progressive muscle wasting of DMD.",source:"Quiz Night"},{id:"akram_akram_QuizNight_219",exam:"akram",lecture:"QuizNight",q:"Which of the following genetic abnormalities is most likely present in Duchenne muscular dystrophy?",options:["Gene deletion","Gene duplication","Chromosome deletion","Chromosome duplication"],answer:0,explanation:"The most common genetic abnormality in Duchenne muscular dystrophy is a deletion in the dystrophin gene. These deletions disrupt the reading frame and result in a nonfunctional dystrophin protein. Large exonic deletions account for approximately 60-70% of DMD cases.",source:"Quiz Night"},{id:"akram_akram_QuizNight_220",exam:"akram",lecture:"QuizNight",q:"A patient with Charcot-Marie-Tooth disease is suspected of having PMP22 gene duplication. What tests to order?",options:["Microarray","MLPA","FISH","NGS"],answer:1,explanation:"Multiplex Ligation-dependent Probe Amplification (MLPA) is the preferred method for detecting gene duplications and deletions, including the PMP22 gene duplications associated with Charcot-Marie-Tooth disease type 1A (CMT1A). MLPA is highly sensitive for detecting copy number variations in specific genes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_221",exam:"akram",lecture:"QuizNight",q:"What is a major anomaly of Marfan syndrome?",options:["Arachnodactyly","Aortic aneurysm","Pes planus","Short stature"],answer:1,explanation:"Aortic aneurysm is a significant and potentially life-threatening complication of Marfan syndrome, which results from the weakness in the connective tissue of the aorta. This is the major life-threatening anomaly of Marfan syndrome. Arachnodactyly (spider fingers) and pes planus are minor features; Marfan syndrome is associated with tall stature, not short stature.",source:"Quiz Night"},{id:"akram_akram_QuizNight_222",exam:"akram",lecture:"QuizNight",q:"A female presented in the NICU with heart and renal abnormalities. After examination: microcephaly, microphthalmia, hypertelorism, and postaxial polydactyly. What is the provisional diagnosis?",options:["Patau's syndrome","Down syndrome","Edward's syndrome","Noonan's syndrome"],answer:0,explanation:"Patau's syndrome (Trisomy 13) is characterized by multiple congenital abnormalities including heart and renal defects, microcephaly, microphthalmia, hypertelorism, and postaxial polydactyly. These features together are characteristic of this condition.",source:"Quiz Night"},{id:"akram_akram_QuizNight_223",exam:"akram",lecture:"QuizNight",q:"What is correct regarding neural tube defect?",options:["Anencephaly results from defect in the lower end","Its risk can be reduced by the intake of periconceptional folic acid","Recurrence risk from a parent is 10%","Recurrence risk is 4% from two previously affected siblings"],answer:1,explanation:"Periconceptional folic acid supplementation is well-established to reduce the risk of neural tube defects. Anencephaly is due to defects in the closure of the upper end of the neural tube, not the lower end. Recurrence risk varies based on family history but folic acid intake can significantly reduce this risk.",source:"Quiz Night"},{id:"akram_akram_QuizNight_224",exam:"akram",lecture:"QuizNight",q:"Increased mother serum alpha-feto protein suggests a possibility of?",options:["Neural tube defect","Cleft lip","Cleft palate","Both cleft lip and palate"],answer:0,explanation:"Elevated maternal serum alpha-fetoprotein (AFP) is commonly associated with neural tube defects (NTDs) such as spina bifida and anencephaly. Cleft lip and/or palate are not typically associated with increased AFP levels.",source:"Quiz Night"},{id:"akram_akram_QuizNight_225",exam:"akram",lecture:"QuizNight",q:"Which presents the highest recurrence risk for multifactorial disorders?",options:["Unilateral cleft palate","Unilateral cleft palate and lip","Bilateral cleft palate and lip","Two affected siblings"],answer:3,explanation:"The recurrence risk for multifactorial disorders is influenced by the number of affected close relatives. Having two affected siblings presents the highest genetic risk, as it indicates a stronger genetic loading in the family, increasing the likelihood of subsequent affected children.",source:"Quiz Night"},{id:"akram_akram_QuizNight_226",exam:"akram",lecture:"QuizNight",q:"A female presented in the NICU with heart and renal abnormalities. After examination: microcephaly, microphthalmia, hypertelorism, and postaxial polydactyly. What is the main possible cause of this abnormality?",options:["Paternal non-disjunction","Maternal non-disjunction","Failure of zygote to divide","Error in mitosis"],answer:1,explanation:"The described features are indicative of Patau's syndrome (Trisomy 13), which typically results from maternal non-disjunction during meiosis. The extra chromosome 13 most commonly arises from a failure of chromosome separation during maternal meiosis I or II.",source:"Quiz Night"},{id:"akram_akram_QuizNight_227",exam:"akram",lecture:"QuizNight",q:"What is correct regarding neural tube defect?",options:["Anencephaly results from defect in the lower end","Its risk can be reduced by the intake of periconceptional folic acid","Recurrence risk from a parent is 10%","Recurrence risk is 4% from two affected siblings"],answer:1,explanation:"The intake of folic acid before and during early pregnancy is known to reduce the risk of neural tube defects. Anencephaly results from defects in the upper end of the neural tube, not the lower end. Spina bifida results from defects in the lower end of the neural tube.",source:"Quiz Night"},{id:"akram_akram_QuizNight_228",exam:"akram",lecture:"QuizNight",q:"A 10-year-old boy is brought to the genetic clinic for evaluation due to short stature and learning difficulties. On physical examination, he has curly hair, cafe-au-lait spots, down-slanting palpebral fissures, and low-set ears. An echocardiogram shows pulmonary valve stenosis. What is the most likely diagnosis for this patient?",options:["Neurofibromatosis","Noonan syndrome","Marfan syndrome","Klinefelter syndrome"],answer:1,explanation:"Noonan syndrome is characterized by distinctive facial features (such as down-slanting palpebral fissures and low-set ears), short stature, congenital heart defects (such as pulmonary valve stenosis), and learning difficulties. The presence of curly hair and cafe-au-lait spots can also be seen in this condition. Neurofibromatosis involves multiple neurofibromas, Marfan syndrome involves tall stature and cardiovascular issues, and Klinefelter syndrome involves hypogonadism and tall stature.",source:"Quiz Night"},{id:"akram_akram_QuizNight_229",exam:"akram",lecture:"QuizNight",q:"A newborn girl presents with macrosomia, macroglossia, and an abdominal wall defect. The infant also experiences episodes of neonatal hypoglycemia. Family history reveals no similar cases. What is the most likely diagnosis for this newborn?",options:["Silver-Russell syndrome","Beckwith-Wiedemann syndrome","Prader-Willi syndrome","Angelman syndrome"],answer:1,explanation:"Beckwith-Wiedemann syndrome (BWS) is characterized by macrosomia (large body size), macroglossia (large tongue), and abdominal wall defects (such as omphalocele or umbilical hernia). It also includes neonatal hypoglycemia due to pancreatic hyperplasia. Silver-Russell syndrome presents with growth retardation. Prader-Willi syndrome involves hypotonia and poor feeding in infancy. Angelman syndrome presents with severe intellectual disability and ataxia.",source:"Quiz Night"},{id:"akram_akram_QuizNight_230",exam:"akram",lecture:"QuizNight",q:"A 1-year-old boy exhibits severe muscle weakness, absent deep tendon reflexes, and tongue fasciculations. Genetic testing reveals a homozygous deletion of the SMN1 gene. What is the appropriate treatment option for this patient?",options:["Casgevy","Lyfgenia","Zolgensma","Bone marrow transplant"],answer:2,explanation:"Zolgensma is a gene therapy used to treat spinal muscular atrophy (SMA) caused by a homozygous deletion of the SMN1 gene. It delivers a functional copy of the SMN1 gene to motor neurons, helping to improve muscle function and survival. Casgevy and Lyfgenia are not relevant treatments for SMA. Bone marrow transplant is not a standard treatment for SMA.",source:"Quiz Night"},{id:"akram_akram_QuizNight_231",exam:"akram",lecture:"QuizNight",q:"Which major anomalies are associated with the karyotype shown above? [Image required]",options:["Micrognathia, clenched hands with overlapping fingers, rocker-bottom feet","Macrocephaly, rhizomelic limb shortening, syndactyly between 2nd & 3rd toes","Cleft lip/palate, esophageal atresia, patent ductus arteriosus","Webbed neck, widely spaced nipples, lymphedema of the hands and feet"],answer:2,explanation:"Trisomy 13 (Patau syndrome) is characterized by major anomalies such as cleft lip/palate, esophageal atresia, and patent ductus arteriosus. Option A describes findings in Trisomy 18 (Edwards syndrome), option B describes findings in achondroplasia, and option D is associated with Turner syndrome.",source:"Quiz Night"},{id:"akram_akram_QuizNight_232",exam:"akram",lecture:"QuizNight",q:"Which of the following is a complication associated with achondroplasia?",options:["Retinal detachment","Cardiomyopathy","Liver cirrhosis","Spinal compression"],answer:3,explanation:"Achondroplasia is a genetic disorder affecting bone growth, leading to short stature and disproportionate limb size. A significant complication of achondroplasia is spinal compression, particularly in the lower spine (lumbar spine). Abnormal bone growth can lead to a narrowing of the spinal canal (spinal stenosis

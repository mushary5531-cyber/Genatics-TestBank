<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genetics TestBank</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #060913;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --indigo: #4f46e5;
  --sky: #38bdf8;
  --violet: #7c3aed;
}

body {
  background: var(--bg);
  color: #e2e8f0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  overflow-x: hidden;
}

/* ── Aurora ── */
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: aurora-float 14s ease-in-out infinite;
}
.aurora-1 {
  width: 520px; height: 520px;
  background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
  top: -120px; left: -100px;
  animation-delay: 0s;
}
.aurora-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
  top: 40%; right: -60px;
  animation-delay: -5s;
}
.aurora-3 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, #6d28d9 0%, transparent 70%);
  bottom: -80px; left: 30%;
  animation-delay: -9s;
}
@keyframes aurora-float {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-40px) scale(1.08); }
  66%      { transform: translate(-20px,30px) scale(0.95); }
}

/* ── Layout ── */
.screen-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  max-width: 720px;
  margin: 0 auto;
}

/* ── Title ── */
.main-title {
  font-size: 36px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 4px;
}
.shimmer-text {
  background: linear-gradient(90deg, #818cf8 0%, #38bdf8 30%, #a78bfa 60%, #818cf8 100%);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  to { background-position: 300% center; }
}
.subtitle {
  color: rgba(255,255,255,0.45);
  text-align: center;
  font-size: 15px;
  margin-top: -10px;
}

/* ── Glass card ── */
.glass-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px 22px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  width: 100%;
  max-width: 680px;
}
.section-label {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* ── Stagger animations ── */
.fade-in { animation: fadeUp 0.4s ease both; }
.stagger-1 { animation: fadeUp 0.4s ease 0.05s both; }
.stagger-2 { animation: fadeUp 0.4s ease 0.12s both; }
.stagger-3 { animation: fadeUp 0.4s ease 0.19s both; }
.stagger-4 { animation: fadeUp 0.4s ease 0.26s both; }
.stagger-5 { animation: fadeUp 0.4s ease 0.33s both; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Tabs ── */
.tab-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.tab-active {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 16px #7c3aed66;
}

/* ── Chips ── */
.chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s;
}
.chip:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
.chip-active {
  background: rgba(79,70,229,0.25);
  border-color: #818cf8;
  color: #c7d2fe;
}

/* ── Slider ── */
.custom-slider {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 99px;
  background: linear-gradient(90deg, #4f46e5, #38bdf8);
  outline: none;
  cursor: pointer;
}
.custom-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  box-shadow: 0 0 10px #818cf888;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.custom-slider::-webkit-slider-thumb:hover {
  box-shadow: 0 0 18px #818cf8cc;
}

/* ── Toggle ── */
.toggle-btn {
  width: 50px; height: 26px;
  border-radius: 99px;
  border: none;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  position: relative;
  transition: background 0.25s;
  flex-shrink: 0;
}
.toggle-on { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
.toggle-knob {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #fff;
  transition: left 0.25s;
  display: block;
}
.toggle-on .toggle-knob { left: 27px; }

/* ── Link btn ── */
.link-btn {
  background: none;
  border: none;
  color: #818cf8;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}
.link-btn:hover { color: #a5b4fc; }

/* ── Start button ── */
.start-btn {
  padding: 14px 40px;
  border-radius: 99px;
  border: none;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 24px #7c3aed66;
}
.start-btn:hover:not(:disabled) {
  transform: scale(1.04);
  box-shadow: 0 0 40px #7c3aed99;
}
.start-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  animation: none !important;
}
.glow-pulse {
  animation: glow-pulse 2.2s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { box-shadow: 0 0 24px #7c3aed66; }
  50%      { box-shadow: 0 0 48px #7c3aedcc; }
}

/* ── Source badge ── */
.source-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 99px;
  background: rgba(56,189,248,0.15);
  border: 1px solid rgba(56,189,248,0.35);
  color: #7dd3fc;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
}

/* ── Exam badge ── */
.exam-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 99px;
  background: rgba(129,140,248,0.18);
  border: 1px solid rgba(129,140,248,0.35);
  color: #a5b4fc;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

/* ── Question text ── */
.question-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.7;
  color: rgba(255,255,255,0.92);
  margin-bottom: 20px;
}

/* ── Options ── */
.options-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.options-wrap .opt-btn {
  animation: slideInLeft 0.3s ease both;
}
@keyframes slideInLeft {
  from { opacity:0; transform: translateX(30px); }
  to   { opacity:1; transform: translateX(0); }
}
.opt-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.82);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  text-align: right;
  cursor: pointer;
  transition: all 0.18s;
  width: 100%;
}
.opt-btn:hover:not(.opt-correct):not(.opt-wrong):not(.opt-dim) {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.25);
}
.opt-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.opt-correct {
  border-color: #34d399 !important;
  background: rgba(52,211,153,0.12) !important;
  color: #6ee7b7 !important;
}
.opt-correct .opt-letter { background: rgba(52,211,153,0.3); }
.opt-wrong {
  border-color: #f87171 !important;
  background: rgba(248,113,113,0.12) !important;
  color: #fca5a5 !important;
}
.opt-wrong .opt-letter { background: rgba(248,113,113,0.3); }
.opt-dim { opacity: 0.35; cursor: default; }

/* ── Animations: bounce + shake ── */
.anim-bounce { animation: bounce-correct 0.5s ease; }
@keyframes bounce-correct {
  0%,100% { transform: scale(1); }
  30%      { transform: scale(1.04); }
  60%      { transform: scale(0.97); }
}
.anim-shake { animation: shake-wrong 0.45s ease; }
@keyframes shake-wrong {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}

/* ── Explanation box ── */
.explanation {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.7;
  direction: auto;
}
.expl-correct {
  background: rgba(52,211,153,0.1);
  border: 1px solid rgba(52,211,153,0.3);
  color: #a7f3d0;
}
.expl-wrong {
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  color: #fecaca;
}

/* ── Nav buttons ── */
.nav-btn {
  padding: 10px 22px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.18s;
}
.nav-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.12);
  color: #fff;
}
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-primary {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 14px #7c3aed55;
}
.nav-primary:hover { box-shadow: 0 0 24px #7c3aed99 !important; }

/* ── Review card ── */
.review-card { margin-bottom: 0; }

/* ── Responsive ── */
@media (max-width: 480px) {
  .main-title { font-size: 26px; }
  .glass-card { padding: 16px; }
  .question-text { font-size: 15px; }
}

</head>

e is the key enzyme that synthesizes RNA from the DNA template, initiating the formation of the transcription initiation complex. tRNA and ribosomes are crucial in translation, not transcription. Helicase is involved in unwinding DNA during replication.",source:"Quiz Night"},{id:"akram_akram_QuizNight_2",exam:"akram",lecture:"QuizNight",q:"In which phase of the cell cycle does DNA replication occur?",options:["G1 Phase","S Phase","G2 Phase","M Phase"],answer:1,explanation:"DNA replication occurs during the S (Synthesis) phase of the cell cycle. During this phase, the cell duplicates its DNA in preparation for cell division. G1 is growth before replication, G2 is growth after replication, and M phase is when mitosis occurs.",source:"Quiz Night"},{id:"akram_akram_QuizNight_3",exam:"akram",lecture:"QuizNight",q:"What is the binding site of RNA polymerase?",options:["Promoter","mRNA termination region","Transcribed region","mRNA initiation region"],answer:0,explanation:"The promoter is a specific sequence of DNA located at the beginning of a gene. RNA polymerase binds to the promoter to start the process of transcription, which is the first step in making mRNA from DNA.",source:"Quiz Night"},{id:"akram_akram_QuizNight_4",exam:"akram",lecture:"QuizNight",q:"A DNA sequence of 2250 nucleotides and 750 is introns while the rest is coding. The sequence has an equal amount of base pairs (A, C, G, T). After transcription and translation, how long is the amino acid chain?",options:["1000 a.a.","500 a.a.","750 a.a.","2250 a.a."],answer:1,explanation:"The DNA sequence is 2250 nucleotides long, with 750 nucleotides being introns (non-coding regions). This leaves 1500 nucleotides of coding sequence. During transcription, introns are spliced out, leaving only exons to be translated. Each amino acid is encoded by a codon of 3 nucleotides. Therefore: 1500 \xF7 3 = 500 amino acids.",source:"Quiz Night"},{id:"akram_akram_QuizNight_5",exam:"akram",lecture:"QuizNight",q:"Where is a gene specifically located on a chromosome?",options:["Genome","Chromatid","Locus","Centromere"],answer:2,explanation:"The locus is the specific, fixed position on a chromosome where a particular gene or genetic marker is located. Think of the locus as the exact address for a gene on a chromosome.",source:"Quiz Night"},{id:"akram_akram_QuizNight_6",exam:"akram",lecture:"QuizNight",q:"Fluorescent in-Situ Hybridization (FISH) shows what in the photo above? [Image required]",options:["Reciprocal translocation","Robertsonian translocation","Deletion","Insertion"],answer:0,explanation:"FISH is a technique used to visualize specific genes or portions of genes in cells, often used to identify structural abnormalities (microdeletions, reciprocal translocations, rings, and rapid diagnosis of aneuploidies). Reciprocal translocations can be clearly identified using FISH due to the presence of abnormal chromosome structures.",source:"Quiz Night"},{id:"akram_akram_QuizNight_7",exam:"akram",lecture:"QuizNight",q:"What is the chromosomal anomaly that have a single copy of one arm and triple of the other?",options:["Inversion","Isochromosome","Duplication","Ring Chromosome"],answer:1,explanation:"An isochromosome is a type of chromosomal anomaly where one arm of a chromosome is missing and replaced by a duplicate of the other arm, resulting in a chromosome with two identical arms. This leads to a single copy of one arm and a triple copy of the other arm's genetic material.",source:"Quiz Night"},{id:"akram_akram_QuizNight_8",exam:"akram",lecture:"QuizNight",q:"What is the interpretation of 46,XY,t(2;4),(p23;q25)?",options:["Male karyotype with reciprocal translocation between short arm of chromosome 2 and long arm of chromosome 4","Male karyotype with reciprocal translocation between long arm of chromosome 2 and short arm of chromosome 4","Male karyotype with robertsonian translocation between short arm of chromosome 2 and long arm of chromosome 4","Male karyotype with insertion between short arm of chromosome 2 and long arm of chromosome 4"],answer:0,explanation:'The notation "46,XY,t(2;4),(p23;q25)" indicates a male karyotype with a total of 46 chromosomes and a reciprocal translocation between chromosome 2 and chromosome 4. The breakpoints are at p23 on chromosome 2 (short arm) and q25 on chromosome 4 (long arm). A Robertsonian translocation typically involves acrocentric chromosomes and is not relevant here.',source:"Quiz Night"},{id:"akram_akram_QuizNight_9",exam:"akram",lecture:"QuizNight",q:"Which of the following chromosomes has satellite-like projections (acrocentric)?",options:["Chromosome 16","Chromosome 1","Chromosome 14","Chromosome X"],answer:2,explanation:"Acrocentric chromosomes have their centromere near one end, resulting in one very short arm and one very long arm. Chromosomes 13, 14, 15, 21, and 22 are acrocentric in humans. Chromosome 16 and chromosome 1 are metacentric or submetacentric, and chromosome X is submetacentric.",source:"Quiz Night"},{id:"akram_akram_QuizNight_10",exam:"akram",lecture:"QuizNight",q:"Which of the following describes the karyogram above? [Image required]",options:["46,XY,del(4)(q)","46,XY,der(4)(p)","46,XY,der(4)(q)","46,XY,del(4)(p)"],answer:3,explanation:'Wolf-Hirschhorn syndrome is caused by a deletion of the short arm of chromosome 4. The notation "46,XY,del(4)(p)" indicates a male karyotype with a deletion in the short arm (p) of chromosome 4. "der" refers to a derivative chromosome resulting from a translocation, and "del(4)(q)" would indicate a deletion on the long arm (q) of chromosome 4.',source:"Quiz Night"},{id:"akram_akram_QuizNight_11",exam:"akram",lecture:"QuizNight",q:"What is sealing the end of the chromosome and maintains the integrity of the chromosome?",options:["Centromere","Telomere","Short arm","Long arm"],answer:1,explanation:"Telomeres are the protective caps located at the ends of chromosomes. They consist of repetitive DNA sequences that protect the chromosome ends from degradation and prevent them from fusing with other chromosomes. The centromere is the region where microtubules attach during cell division.",source:"Quiz Night"},{id:"akram_akram_QuizNight_12",exam:"akram",lecture:"QuizNight",q:"Which of the following is a monosomy?",options:["Edward syndrome","Klinefelter syndrome","Turner syndrome","Down syndrome"],answer:2,explanation:"Monosomy refers to the condition where there is only one copy of a particular chromosome instead of the usual two. Turner syndrome is the result of monosomy X (45,X), where a female has only one X chromosome. Edward syndrome (trisomy 18) and Down syndrome (trisomy 21) involve an extra chromosome, while Klinefelter syndrome (47,XXY) involves an extra X chromosome in males.",source:"Quiz Night"},{id:"akram_akram_QuizNight_13",exam:"akram",lecture:"QuizNight",q:"Which of the following describes the karyogram above? [Image required]",options:["Structural balanced","Structural unbalanced","Monosomy","Disjunction"],answer:1,explanation:"The karyogram depicts 22 pairs of autosomes and one pair of sex chromosomes where the arrow points to an abnormal X chromosome forming a ring. Ring chromosomes occur when the telomeres are lost and the chromosome ends fuse, leading to the loss of genetic material. This results in a structural unbalanced chromosome.",source:"Quiz Night"},{id:"akram_akram_QuizNight_14",exam:"akram",lecture:"QuizNight",q:"Which of the following is a cause of this karyogram? [Image required]",options:["Non-Disjunction","Insertion","Disjunction","Fertilization by 2 sperms"],answer:0,explanation:"The karyogram shows an abnormal number of sex chromosomes, specifically two X chromosomes and one Y chromosome (XXY), known as Klinefelter syndrome. This results from non-disjunction during meiosis, where chromosomes fail to separate properly, leading to an extra X chromosome in the sperm or egg.",source:"Quiz Night"},{id:"akram_akram_QuizNight_15",exam:"akram",lecture:"QuizNight",q:"What is the correct karyotype of a Male diagnosed with down's Syndrome?",options:["46,XY,t(21;21)(q10;q10)+21","46,XY,rob(21;21)(q10;q10)+21","47,XY,rob(21;21)","47,XY,rob(21;21)+21"],answer:1,explanation:"Down syndrome can occur due to a Robertsonian translocation involving chromosome 21. The karyotype 46,XY,rob(21;21)(q10;q10)+21 indicates a Robertsonian translocation where two chromosome 21s have fused at the centromere (q10), resulting in an extra copy of chromosome 21, leading to Down syndrome. Option C does not accurately represent the translocation and option D misstates the total number of chromosomes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_16",exam:"akram",lecture:"QuizNight",q:"Which of the following chromatin is expressed?",options:["Heterochromatin","Euchromatin","Telomeric chromatin","Centromeric chromatin"],answer:1,explanation:"Euchromatin is the less condensed form of chromatin that is transcriptionally active and accessible to the cell's machinery for gene expression. Heterochromatin is tightly packed and generally not expressed. Telomeric and centromeric chromatin are specialized regions not typically involved in gene expression.",source:"Quiz Night"},{id:"akram_akram_QuizNight_17",exam:"akram",lecture:"QuizNight",q:"The chromosomal abnormality above is? [Image required]",options:["Pericentric inversion","Paracentric inversion","Pencentric inversion","Downcentric inversion"],answer:0,explanation:"A pericentric inversion involves both arms of the chromosome and includes the centromere. This can often be identified by the altered banding pattern that spans the centromere region after the inversion occurs. A paracentric inversion occurs only within one arm of the chromosome and does not include the centromere.",source:"Quiz Night"},{id:"akram_akram_QuizNight_18",exam:"akram",lecture:"QuizNight",q:"Which of the following describes the karyogram above? [Image required]",options:["Turner syndrome","Klinefelter","Triple X syndrome","Jacob's syndrome"],answer:0,explanation:"The karyogram reveals 22 pairs of autosomes and two X chromosomes. One of the X chromosomes appears normal, while the other shows an isochromosome with two long arms (q arms) and no short arms (p arms). This chromosomal abnormality is associated with Turner syndrome.",source:"Quiz Night"},{id:"akram_akram_QuizNight_19",exam:"akram",lecture:"QuizNight",q:"Which of the following denotes female with reciprocal translocation between short arm in chromosome 3 and long arm in chromosome 9?",options:["46, XX, t(9;3)(p3;q9)","46, XX, t(3;9)(p3;q9)","46, XX, t(9;3)(p9;q3)","46, XX, rob(3;9)(p3;q9)"],answer:1,explanation:'This indicates a female (46, XX) with a reciprocal translocation between chromosome 3 and chromosome 9. In correct notation, the smaller numbered chromosome comes first: t(3;9). The short arm of chromosome 3 (p3) has exchanged with the long arm of chromosome 9 (q9). "rob" refers to a Robertsonian translocation, a different type of rearrangement.',source:"Quiz Night"},{id:"akram_akram_QuizNight_20",exam:"akram",lecture:"QuizNight",q:"What's the recurrence risk for a maternal carrier with robertsonian down syndrome?",options:["1-3%","10-15%","30%","25%"],answer:1,explanation:"For a female carrier of a Robertsonian translocation involving chromosome 21, the recurrence risk of having a child with Down syndrome is 10-15%. This higher risk is due to the increased likelihood that the translocation chromosome can be passed on during egg formation. For male carriers, the recurrence risk is lower, typically around 1-3%.",source:"Quiz Night"},{id:"akram_akram_QuizNight_21",exam:"akram",lecture:"QuizNight",q:"Which of the following represents the chromosomal aberration above? [Image required]",options:["Aneuploidy","Structural","Mosaicism","Point Mutation"],answer:1,explanation:"The karyogram shows a Robertsonian translocation between chromosomes 13 and 21, resulting in an extra chromosome 21, which causes Down syndrome. This type of chromosomal change is classified as a structural aberration because it involves the rearrangement of parts of the chromosomes. Mosaicism involves different cell lines within the same individual, and point mutations are small-scale changes in DNA.",source:"Quiz Night"},{id:"akram_akram_QuizNight_22",exam:"akram",lecture:"QuizNight",q:"Which of the following represents the chromosomal aberration above? [Image required]",options:["Edward syndrome","Down syndrome","Patau syndrome","Jacobs syndrome"],answer:0,explanation:"Trisomy 18 (Edward syndrome) occurs when there is an extra copy of chromosome 18. Down syndrome is an extra copy of chromosome 21, and Patau's syndrome is an extra copy of chromosome 13.",source:"Quiz Night"},{id:"akram_akram_QuizNight_23",exam:"akram",lecture:"QuizNight",q:"What are the three criteria used to identify chromosomes?",options:["Size, shape, color","Size, centromere position, banding pattern","Shape, banding pattern, color","Color, size, shape"],answer:1,explanation:"Chromosomes can be identified using three main criteria: (1) Size - the length of the chromosome, (2) Centromere Position - the location of the centromere, which can be in the middle, near the end, or in between, and (3) Banding Pattern - when chromosomes are stained, they show a unique pattern of dark and light bands that help distinguish one chromosome from another.",source:"Quiz Night"},{id:"akram_akram_QuizNight_24",exam:"akram",lecture:"QuizNight",q:"Which of the following karyotypes presents the highest risk of having a child with Down syndrome?",options:["45, XX,der(14;21)","45,XY,der(14;21)","45,XX,der(21;21)","46,XX,t(14;21)"],answer:2,explanation:"The 45,XX,der(21;21) configuration significantly increases the risk of having a child with Down syndrome (~100%) because the individual can pass on both chromosome 21s to their offspring, leading to trisomy 21. In contrast, 45,XX,der(14;21) would indicate a female carrier (~10-15%) and 45,XY,der(14;21) indicates a male carrier (~1-3%).",source:"Quiz Night"},{id:"akram_akram_QuizNight_25",exam:"akram",lecture:"QuizNight",q:"In order to produce a karyogram, a leukocyte obtained from a patient is arrested in mitotic metaphase. Which of the following is a characteristic feature of this stage of cell division?",options:["Sister chromatic separation","Synapsis","Maximal chromosome condensation","Independent assortment"],answer:2,explanation:"During metaphase, chromosomes are highly condensed and aligned in the middle of the cell. This makes them most visible under a microscope, which is why metaphase is the best stage for preparing a karyogram.",source:"Quiz Night"},{id:"akram_akram_QuizNight_26",exam:"akram",lecture:"QuizNight",q:"What is the most likely cause of the karyogram above? [Image required]",options:["Fertilization of a diploid ovum with a diploid sperm","An ovum being fertilized by two sperm at once","Fertilization of a haploid ovum with a haploid sperm","Failure of the zygote to divide after it replicate its chromosomes"],answer:1,explanation:"Triploidy means there are three sets of chromosomes instead of the normal two. The most likely cause is when an egg is fertilized by two sperm cells simultaneously (Dispermy), resulting in three sets of chromosomes (one from the egg and one from each sperm). Failure of the zygote to divide typically leads to tetraploidy.",source:"Quiz Night"},{id:"akram_akram_QuizNight_27",exam:"akram",lecture:"QuizNight",q:"What causes tetraploidy?",options:["Fertilization of a haploid ovum with a diploid sperm","Failure of the zygote to divide after it replicate its chromosomes","Fertilization of a diploid ovum with a haploid sperm","Error in meiosis"],answer:1,explanation:"Tetraploidy means there are four sets of chromosomes in a cell. This can happen if a fertilized egg (zygote) duplicates its chromosomes but then fails to divide into two cells, resulting in a single cell with twice the normal number of chromosomes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_28",exam:"akram",lecture:"QuizNight",q:"All the following numerical chromosomal anomalies are aneuploidy EXCEPT:",options:["47, XX, +21","92, XXYY","45, X","47, XY, +18"],answer:1,explanation:"Aneuploidy refers to an abnormal number of chromosomes that is not a whole multiple of the haploid number (23). Options A, C, and D are examples of aneuploidy. However, 92, XXYY is not aneuploidy; it represents tetraploidy, where there are four complete sets of chromosomes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_29",exam:"akram",lecture:"QuizNight",q:"What causes a ring chromosome to develop?",options:["Chromosome breaks off at two sites","Loss of terminal ends of the chromosome","Gain of additional genetic material at the ends","Chromosome fusion with another chromosome"],answer:1,explanation:"A ring chromosome forms when the ends of a chromosome are lost and the remaining ends join together to form a ring. This typically happens when both ends of a chromosome break off, and the sticky ends of the broken chromosome reattach to each other in a circular shape.",source:"Quiz Night"},{id:"akram_akram_QuizNight_30",exam:"akram",lecture:"QuizNight",q:"What is meant by the following karyotype 46,XX,i(17)(q10)?",options:["Female having deletion on the long arm of chromosome 17","Female having insertion of segmental chromosome into chromosome 17","Female having isochromosome in the long arm of chromosome 17","Female having inversion of segment of chromosome 17"],answer:2,explanation:"The karyotype 46,XX,i(17)(q10) indicates that there is an isochromosome for the long arm (q arm) of chromosome 17. An isochromosome is a chromosome with identical arms; in this case, the long arm of chromosome 17 is duplicated, and the short arm is missing. This differs from a deletion, insertion, or inversion.",source:"Quiz Night"},{id:"akram_akram_QuizNight_31",exam:"akram",lecture:"QuizNight",q:"Which areas are centromeric probes directed?",options:["Around the centromere","Near the telomeres","Gain of additional genetic material at the ends","Chromosome fusion with another chromosome"],answer:0,explanation:"Centromeric probes are specific DNA sequences that bind to the centromere region of chromosomes. The centromere is the part of the chromosome that appears pinched and is essential for proper chromosome segregation during cell division. These probes are used to identify and count chromosomes in cytogenetic studies.",source:"Quiz Night"},{id:"akram_akram_QuizNight_32",exam:"akram",lecture:"QuizNight",q:"If individual (III,4) married individual (III,2), what is the percentage of the recurrence risk?",options:["1-2%","25%","50%","100%"],answer:2,explanation:"In autosomal dominant inheritance, an affected individual has a 50% chance of passing the affected allele to their offspring. They have one normal allele and one affected allele, so each child has a 50/50 chance of inheriting the affected allele.",source:"Quiz Night"},{id:"akram_akram_QuizNight_33",exam:"akram",lecture:"QuizNight",q:"What is a main characteristic found in this pedigree? [Image required]",options:["Male to male inheritance is key feature.","Can manifest in homozygote state","It can occur only in females","Female can manifest the trait through inactivated X chromosome"],answer:0,explanation:"A key feature of autosomal dominant inheritance is that the trait can be passed directly from father to son, which is not possible with X-linked inheritance since males pass their Y chromosome to their sons. This mode of inheritance does not depend on the sex of the individuals; it can affect both males and females equally.",source:"Quiz Night"},{id:"akram_akram_QuizNight_34",exam:"akram",lecture:"QuizNight",q:"A healthy person who has no clinical manifestations but is heterozygous for a autosomal dominant disease is said to demonstrate?",options:["Reduced Penetrance","Non-penetrance","Pseudodominance","Codominance"],answer:1,explanation:"Non-penetrance usually implies a complete lack of disease manifestation despite being heterozygous. Reduced penetrance is a similar concept but means that an individual carries a dominant gene mutation, but shows reduced or minimal signs or symptoms of the disease.",source:"Quiz Night"},{id:"akram_akram_QuizNight_35",exam:"akram",lecture:"QuizNight",q:"Which of the following disorders is related to de novo mutations?",options:["Marfan syndrome","Achondroplasia","Treacher-Collins syndrome","Cystic fibrosis"],answer:1,explanation:"Achondroplasia, a common cause of dwarfism, is often caused by de novo mutations, meaning the mutation occurs for the first time in a person rather than being inherited from the parents. This is different from conditions like cystic fibrosis, which are inherited in a Mendelian fashion.",source:"Quiz Night"},{id:"akram_akram_QuizNight_36",exam:"akram",lecture:"QuizNight",q:"Which of the following disorders has increased recurrence risk due to consanguinity?",options:["Tuberous sclerosis","Albinism","Treacher-Collins syndrome","Neurofibromatosis"],answer:1,explanation:"Albinism is an autosomal recessive disorder, which means that a person needs to inherit two copies of the mutated gene to manifest the disorder. Consanguinity, or marriage between close relatives, increases the likelihood that both parents carry the same recessive gene, thus raising the risk of having a child with albinism.",source:"Quiz Night"},{id:"akram_akram_QuizNight_37",exam:"akram",lecture:"QuizNight",q:"Which of the following matches a single gene that may give rise to two or more apparently unrelated effects?",options:["Pleiotropy","Variable expressivity","Reduced penetrance","New variants"],answer:0,explanation:"Pleiotropy occurs when one gene influences multiple, seemingly unrelated traits or effects. For example, a single genetic mutation might affect both vision and skin pigmentation. Variable expressivity and reduced penetrance describe different phenomena related to how a gene expresses its traits in different individuals.",source:"Quiz Night"},{id:"akram_akram_QuizNight_38",exam:"akram",lecture:"QuizNight",q:"Which of the following disorders is associated with the pedigree shown? [Image required]",options:["G6PD","Cystic fibrosis","Retts syndrome","Microcephaly"],answer:0,explanation:"G6PD deficiency is an X-linked recessive disorder, meaning it typically affects males who inherit the mutated gene from their carrier mothers. The pedigree of an X-linked recessive disorder shows more males being affected, and females are usually carriers. Cystic fibrosis is autosomal recessive, Rett syndrome is X-linked dominant, and microcephaly is mainly autosomal recessive.",source:"Quiz Night"},{id:"akram_akram_QuizNight_39",exam:"akram",lecture:"QuizNight",q:"In autosomal recessive inheritance, what is the chance of being heterozygous unaffected (carrier)?",options:["1-2%","25%","50%","100%"],answer:2,explanation:"In autosomal recessive inheritance, if both parents are carriers (heterozygous) for the recessive allele, there is a 50% chance that a child will inherit one copy of the mutated gene and be a carrier like the parents. The 25% chance is for being affected (having two copies of the mutated gene), and the remaining 25% is for being completely unaffected.",source:"Quiz Night"},{id:"akram_akram_QuizNight_40",exam:"akram",lecture:"QuizNight",q:"Which of the following conditions exhibit pleiotropy?",options:["Marfan Syndrome","AD Polycystic Kidney","Treacher-Collins syndrome","Retinoblastoma"],answer:0,explanation:"Marfan syndrome is a classic example of pleiotropy because it involves mutations in a single gene (FBN1) that cause a variety of symptoms affecting multiple systems in the body, such as the skeletal, cardiovascular, and ocular systems. The other conditions listed do not typically show pleiotropy.",source:"Quiz Night"},{id:"akram_akram_QuizNight_41",exam:"akram",lecture:"QuizNight",q:"What is the mode of inheritance in the picture above? [Image required]",options:["Autosomal recessive","Autosomal dominant","Holandric","Mitochondrial"],answer:0,explanation:"In an autosomal recessive inheritance pattern, a key trait is the presence of carriers (heterozygous individuals) that do not show symptoms but can pass the recessive allele to their offspring. Both parents must be carriers for a child to be affected (having two copies of the recessive allele).",source:"Quiz Night"},{id:"akram_akram_QuizNight_42",exam:"akram",lecture:"QuizNight",q:"Which of the following can be the reasoning behind individual III-3 being affected?",options:["X-linked dominant inheritance","Autosomal dominant with reduced penetrance","Monosomy of X chromosome","Carrier female with unaffected male"],answer:2,explanation:"If a female is homozygous affected in an X-linked recessive pedigree, it's more likely she is affected due to having only one X chromosome (monosomy X, or Turner syndrome) and a recessive allele on her single X chromosome. This makes her express the X-linked recessive disorder fully.",source:"Quiz Night"},{id:"akram_akram_QuizNight_43",exam:"akram",lecture:"QuizNight",q:"Which of the following disorders is associated with the pedigree shown above? [Image required]",options:["Cystic fibrosis","Duchenne muscular dystrophy","Neurofibromatosis","Sickle cell anemia"],answer:2,explanation:"Neurofibromatosis is a classic example of an autosomal dominant disorder, which means that only one copy of the mutated gene is needed for an individual to be affected. In an autosomal dominant pedigree, the disorder typically appears in every generation and affects both males and females equally. Cystic fibrosis and sickle cell anemia are autosomal recessive disorders, while Duchenne muscular dystrophy is X-linked recessive.",source:"Quiz Night"},{id:"akram_akram_QuizNight_44",exam:"akram",lecture:"QuizNight",q:"What is the chance of producing an unaffected child due to the mating of individuals II-3 and II-6?",options:["0%","25%","50%","100%"],answer:1,explanation:"In autosomal dominant inheritance, if both parents are affected (heterozygous for the dominant allele), there is a 25% chance that they will produce an unaffected child. This is because each parent can pass either the affected or the normal allele to their offspring.",source:"Quiz Night"},{id:"akram_akram_QuizNight_45",exam:"akram",lecture:"QuizNight",q:"What is a main characteristic found in this pedigree? [Image required]",options:["II-3 and II-4 are deceased","II-1 and II-2 show reduced penetrance","I-1 and I-2 are affected","II-1 and II-2 are likely consanguineous"],answer:1,explanation:"Reduced penetrance refers to a situation where some individuals who carry the genetic mutation do not show any symptoms of the disorder. In the pedigree, II-1 and II-2 are likely carriers of the mutation but do not exhibit the disease phenotype, which is indicative of reduced penetrance.",source:"Quiz Night"},{id:"akram_akram_QuizNight_46",exam:"akram",lecture:"QuizNight",q:"Possible diagnosis for pedigree could be? [Image required]",options:["Cystic fibrosis","Duchenne muscular dystrophy","Neurofibromatosis","Treacher-Collins syndrome"],answer:3,explanation:"Treacher-Collins syndrome can exhibit reduced penetrance, where some individuals with the genetic mutation show very mild symptoms. This explains the presence of reduced penetrance in the pedigree. Cystic fibrosis is typically autosomal recessive, Duchenne muscular dystrophy is X-linked recessive, and neurofibromatosis mainly shows variable expressivity.",source:"Quiz Night"},{id:"akram_akram_QuizNight_47",exam:"akram",lecture:"QuizNight",q:"Ahmed shows little clinical manifestation compared to his brother who has severe clinical manifestation? What could he have?",options:["Marfan Syndrome","Neurofibromatosis","Achondroplasia","Retinoblastoma"],answer:1,explanation:"Neurofibromatosis is known for its variable expressivity, which means that the severity of the condition can vary widely even among individuals within the same family. This can result in one sibling showing mild symptoms while another sibling has severe manifestations.",source:"Quiz Night"},{id:"akram_akram_QuizNight_48",exam:"akram",lecture:"QuizNight",q:"A 32 year old healthy woman presents for genetic counselling following the birth of her 3rd son, who is diagnosed with achondroplasia. The woman has no previous family history of achondroplasia. What is the recurrence risk for her next pregnancy?",options:["1-2%","25%","50%","100%"],answer:0,explanation:"Achondroplasia is often caused by a de novo mutation, meaning it occurs for the first time in the affected individual and is not inherited from the parents. If there is no family history of achondroplasia, the recurrence risk for future pregnancies is low, typically around 1-2%, reflecting the risk of a new mutation occurring again.",source:"Quiz Night"},{id:"akram_akram_QuizNight_49",exam:"akram",lecture:"QuizNight",q:"What could affect male and females equally?",options:["Marfan syndrome","Duchenne muscular dystrophy","Hemophilia","G6BD deficiency"],answer:0,explanation:"Marfan syndrome is an autosomal dominant disorder, meaning it affects males and females equally because it is not linked to the sex chromosomes. Duchenne muscular dystrophy and hemophilia are X-linked recessive disorders, typically affecting males more frequently. G6PD deficiency is also X-linked, thus affecting males more often.",source:"Quiz Night"},{id:"akram_akram_QuizNight_50",exam:"akram",lecture:"QuizNight",q:"Which of the following is the cause of intellectual disability?",options:["Polyploidy","Monosomy","Aneuploidy","Reciprocal translocation"],answer:2,explanation:"Aneuploidy refers to the presence of an abnormal number of chromosomes and is a common cause of intellectual disability. Conditions like Down syndrome (trisomy 21) are examples where aneuploidy leads to intellectual disability. Polyploidy and monosomy can be lethal or cause severe abnormalities, and translocation may or may not lead to intellectual disability depending on the specific genes involved.",source:"Quiz Night"},{id:"akram_akram_QuizNight_51",exam:"akram",lecture:"QuizNight",q:"A couple with family color blindness came to the genetic clinic. They currently have a son with color blindness, what could be true?",options:["Parents with normal vision, but the grandparents were color blind","Father was unaffected, mother is a carrier","Father was affected, mother is unaffected","The recurrence risk is 1-2%"],answer:1,explanation:"Color blindness is typically an X-linked recessive trait. For a son to be color blind, he must have inherited the affected X chromosome from his carrier mother. The father, having normal vision, does not pass on an X chromosome to his sons. Thus, the mother being a carrier and the father being unaffected explains the son's condition.",source:"Quiz Night"},{id:"akram_akram_QuizNight_52",exam:"akram",lecture:"QuizNight",q:"An 8 year old boy has Duchenne muscular dystrophy. His maternal uncle also has the same manifestation. He got the disorder because?",options:["Mutant allele in X chromosome of the mother","Mutant allele in Y chromosome of the father","Mutant allele in both X and Y chromosome of the father","Mutant allele in X chromosome of the maternal uncle"],answer:0,explanation:"Duchenne muscular dystrophy is an X-linked recessive disorder. The boy inherited the mutant allele on the X chromosome from his carrier mother. His maternal uncle (mother's brother) having the same condition indicates that the mutation is likely passed through the maternal line.",source:"Quiz Night"},{id:"akram_akram_QuizNight_53",exam:"akram",lecture:"QuizNight",q:"The pedigree above exhibits what trait? [Image required]",options:["Locus Heterogeneity","Pseudodominance","Sex limited traits","Sex influenced traits"],answer:1,explanation:"Pseudodominance occurs when an autosomal recessive disorder appears to be dominant because it is expressed more frequently. In the pedigree, individual III-3 is affected and III-4 is a carrier, thus they exhibit pseudodominance. Locus heterogeneity refers to a single disorder caused by mutations in different genes, sex-limited traits are expressed in only one sex, and sex-influenced traits are expressed differently in males and females due to hormonal differences.",source:"Quiz Night"},{id:"akram_akram_QuizNight_54",exam:"akram",lecture:"QuizNight",q:"If individuals III-3 and III-4 had another child, what is the recurrence risk for an affected child?",options:["1-2%","25%","50%","100%"],answer:2,explanation:"In autosomal recessive inheritance, if one parent is affected (homozygous recessive) and the other is a carrier (heterozygous), they exhibit pseudodominance and there is a 50% chance that their child will inherit one recessive allele from each parent and thus be affected.",source:"Quiz Night"},{id:"akram_akram_QuizNight_55",exam:"akram",lecture:"QuizNight",q:"Autosomal traits are expressed more frequently in one sex than another is known as?",options:["Locus Heterogeneity","Pseudodominance","Sex limited traits","Sex influenced traits"],answer:3,explanation:"Sex influenced traits are autosomal traits that are expressed differently in males and females due to hormonal differences. For example, male pattern baldness is more commonly expressed in males due to the influence of androgens. The trait itself is not located on a sex chromosome but its expression is influenced by the sex of the individual.",source:"Quiz Night"},{id:"akram_akram_QuizNight_56",exam:"akram",lecture:"QuizNight",q:"Which of the following is maternally inherited?",options:["m.8993T>C","c.76A>T","r.76A>U","p.Lys76Asn"],answer:0,explanation:"This mutation is maternally inherited as it is a mitochondrial DNA mutation (denoted by 'm.'). Mitochondrial DNA is passed from mothers to their children, irrespective of the child's sex. The other options represent different types of genetic notation: c.76A>T denotes a change in the coding DNA sequence, r.76A>U represents a change in RNA, and p.Lys76Asn indicates a change in the protein sequence.",source:"Quiz Night"},{id:"akram_akram_QuizNight_57",exam:"akram",lecture:"QuizNight",q:"Ahmad and Fatima are parents who are phenotypically normal. However, they have three affected children. After examinations, both parents were genotypically normal as well. Which of the following might be the best explanation for such a phenomenon?",options:["Germline Mosaicism","Locus Heterogeneity","Incomplete Penetrance","New Mutation"],answer:0,explanation:"Germline Mosaicism is a genetic phenomenon that occurs when mutations are present in some of the reproductive cells of an individual, but not in other cells of the body. Thus, while the parents display normal phenotypes and genotypes in their somatic cells, their germ cells carry mutations that can be passed on to their offspring, leading to genetic diseases in the children even though the parents themselves are unaffected.",source:"Quiz Night"},{id:"akram_akram_QuizNight_58",exam:"akram",lecture:"QuizNight",q:"What can be concluded from an affected individual in the pedigree above? [Image required]",options:["Homoplasmy","Heteroplasmy","Germline mosaicism","Somatic mosaicism"],answer:1,explanation:"Mitochondrial inheritance patterns can show heteroplasmy, where a mixture of normal and mutated mitochondrial DNA exists within a cell. This leads to varying degrees of disease severity among family members, as seen in pedigrees with mitochondrial inheritance. Homoplasmy would mean all mitochondrial DNA is either normal or mutated, which is not typically seen in affected individuals.",source:"Quiz Night"},{id:"akram_akram_QuizNight_59",exam:"akram",lecture:"QuizNight",q:"The pedigree above can be explained by? [Image required]",options:["Germline mosaicism (Gonadal)","Somatic mosaicism","New variant","Heteroplasmy"],answer:0,explanation:"Germline mosaicism occurs when some of a parent's germ cells carry a mutation that is not present in the rest of the body's cells. This can result in multiple offspring being affected by a genetic condition, even though the parents themselves are unaffected. This explains the sudden appearance of the disease in the third generation after two normal generations.",source:"Quiz Night"},{id:"akram_akram_QuizNight_60",exam:"akram",lecture:"QuizNight",q:"A child was diagnosed with Prader-Willis syndrome, what could be the possible cause?",options:["Paternal uniparental disomy","Maternal uniparental disomy","Maternal deletion","New variant"],answer:1,explanation:"Prader-Willi syndrome is typically caused by the loss of function of genes on the paternal chromosome 15 (15q11-q13 region). This can occur through maternal uniparental disomy (both copies of chromosome 15 are inherited from the mother and none from the father), a paternal deletion, or other imprinting defects. Therefore, maternal uniparental disomy is a common cause of this syndrome.",source:"Quiz Night"},{id:"akram_akram_QuizNight_61",exam:"akram",lecture:"QuizNight",q:"A 30-year-old female has ovarian insufficiency. The son has ear problems and an intellectual disability. Her 65 year-old grandfather got a tremor. What describes their conditions?",options:["The grandfather is a carrier for pre-mutation 80 repeats of CGG","The mother has a mutation of less than 40 CGG repeats","The son has a mutation of less than 200 CGG repeats","The grandfather has a mutation of more than 200 CGG repeats"],answer:0,explanation:"These conditions are indicative of Fragile X-associated disorders. The female's ovarian insufficiency suggests FXPOI and the grandfather's tremor suggests FXTAS. Pre-mutation carriers have 55-200 CGG repeats. Full mutation (>200 CGG repeats) leads to Fragile X syndrome with intellectual disability. The grandfather with 80 repeats is a pre-mutation carrier showing FXTAS.",source:"Quiz Night"},{id:"akram_akram_QuizNight_62",exam:"akram",lecture:"QuizNight",q:"A 6-year-old male patient with seizure, intellectual disability, inappropriate laughter, microcephaly, unsteady gait, what is the most favorable genetic mechanism?",options:["Loss of maternal contribution of region on chromosome 15","Loss of paternal contribution of region on chromosome 15","Deletion of short arm chromosome 5 from father","Deletion of short arm chromosome 5 from mother"],answer:0,explanation:"These symptoms are characteristic of Angelman syndrome, which is caused by the loss of function of genes on the maternal chromosome 15 (15q11-q13 region). This can occur through a maternal deletion, paternal uniparental disomy, or other imprinting defects.",source:"Quiz Night"},{id:"akram_akram_QuizNight_63",exam:"akram",lecture:"QuizNight",q:"The normal individual will have only one transcriptionally active copy of the gene. What is the most common explanation of this process of gene silencing?",options:["Uniparental disomy","Mosaicism","Genomic imprinting","New mutation"],answer:2,explanation:"Genomic imprinting is a process by which certain genes are expressed in a parent-of-origin-specific manner. This means that only one allele of the gene (either from the mother or the father) is transcriptionally active, while the other allele is silenced through methylation.",source:"Quiz Night"},{id:"akram_akram_QuizNight_64",exam:"akram",lecture:"QuizNight",q:"Which of the following is an example of a non-mendelian disease?",options:["Albinism","Rickets","MERRF","Microcephaly"],answer:2,explanation:"Myoclonic Epilepsy with Ragged Red Fibers (MERRF) is a mitochondrial disorder and an example of a non-Mendelian disease. It is inherited through mitochondrial DNA, which is passed from mother to offspring, not following the typical Mendelian inheritance patterns. Albinism, rickets, and microcephaly typically follow Mendelian inheritance patterns.",source:"Quiz Night"},{id:"akram_akram_QuizNight_65",exam:"akram",lecture:"QuizNight",q:"A child with dysmorphic features, almond eyes, obesity, and intellectual disability, what is the most likely cause?",options:["Loss of maternal region of chromosome 15","Loss of paternal region of chromosome 15","Deletion of maternal short arm of chromosome 5","Deletion of paternal short arm of chromosome 5"],answer:1,explanation:"The described symptoms are characteristic of Prader-Willi syndrome, which is typically caused by the loss of function of genes on the paternal chromosome 15 (15q11-q13 region). This can occur through a paternal deletion, maternal uniparental disomy, or other imprinting defects.",source:"Quiz Night"},{id:"akram_akram_QuizNight_66",exam:"akram",lecture:"QuizNight",q:"What is the underlying cause of dark urine, jaundice, and low RBC count and hemoglobin concentration after intake of primaquine in a malaria patient?",options:["Dihydropyrimidine dehydrogenase deficiency","Glucose-6-phosphate dehydrogenase deficiency","Cytochrome P450 deficiency","Thiopurine methyltransferase deficiency"],answer:1,explanation:"Glucose-6-phosphate dehydrogenase (G6PD) deficiency is a genetic disorder that affects red blood cells. When individuals with G6PD deficiency take certain medications like primaquine, they can develop hemolytic anemia. This leads to the destruction of red blood cells, resulting in symptoms such as dark urine, jaundice, and a low red blood cell count and hemoglobin concentration.",source:"Quiz Night"},{id:"akram_akram_QuizNight_67",exam:"akram",lecture:"QuizNight",q:"Using genetic or genomic information to select the most appropriate choice of pharmacological therapy at the correct dosage for every person is known as:",options:["Pharmacogenetics","Pharmacogenomics","Personalized medicine","Genetic variation"],answer:2,explanation:"Personalized medicine involves using genetic or genomic information to tailor medical treatment to the individual characteristics of each patient. This approach ensures that patients receive the most appropriate therapies and dosages based on their genetic makeup. Pharmacogenetics focuses on how genes affect an individual's response to drugs, and pharmacogenomics is the broader application of genomic information to pharmacology.",source:"Quiz Night"},{id:"akram_akram_QuizNight_68",exam:"akram",lecture:"QuizNight",q:"What mutation causes malignant hyperthermia?",options:["Mutation in RYR1","Mutation in pCHE","Mutation in TPMT","Mutation in DPYD"],answer:0,explanation:"Malignant hyperthermia is a life-threatening reaction to certain anesthetic agents and is typically caused by mutations in the RYR1 gene, which encodes the ryanodine receptor 1. This receptor is involved in calcium release in muscle cells, and mutations can lead to uncontrolled calcium release, resulting in hypermetabolism and muscle rigidity.",source:"Quiz Night"},{id:"akram_akram_QuizNight_69",exam:"akram",lecture:"QuizNight",q:"A patient has prolonged apnea after being given succinylcholine, which enzyme is deficient?",options:["Pseudocholinesterase","Dihydropyrimidine Dehydrogenase","Thiopurine methyltransferase","Aldehyde dehydrogenase"],answer:0,explanation:"Pseudocholinesterase (also known as butyrylcholinesterase) is an enzyme responsible for the breakdown of succinylcholine, a muscle relaxant used during anesthesia. Deficiency or abnormal function of this enzyme can lead to prolonged apnea because the drug is not metabolized properly.",source:"Quiz Night"},{id:"akram_akram_QuizNight_70",exam:"akram",lecture:"QuizNight",q:"Fast acetylators of isoniazid usually suffer from?",options:["Drug induced systemic lupus erythematosus","Failure of isoniazid in treating tuberculosis","Increase risk of bladder cancer","Increase risk of toxicity"],answer:1,explanation:"Fast acetylators metabolize isoniazid more quickly than normal, which can lead to subtherapeutic drug levels and a failure to effectively treat tuberculosis. While slow acetylators are more prone to drug-induced systemic lupus erythematosus and toxicity, fast acetylators are more likely to experience reduced drug efficacy.",source:"Quiz Night"},{id:"akram_akram_QuizNight_71",exam:"akram",lecture:"QuizNight",q:"The mutated gene in neonatal diabetes is?",options:["TMPT","KCNJ11","HNF1A","NAT2"],answer:1,explanation:"Mutations in the KCNJ11 gene, which encodes the Kir6.2 subunit of the potassium channel in beta cells of the pancreas, are a known cause of neonatal diabetes. These mutations can lead to dysregulated insulin secretion. HNF1A is associated with MODY, and NAT2 with drug acetylation.",source:"Quiz Night"},{id:"akram_akram_QuizNight_72",exam:"akram",lecture:"QuizNight",q:"NAT2 gene is related to which of the following drugs?",options:["Succinylcholine","Primaquine","Isoniazid","Azathiopurine"],answer:2,explanation:"The NAT2 gene encodes N-acetyltransferase 2, an enzyme important for the metabolism of isoniazid, a drug used to treat tuberculosis. Variants in the NAT2 gene can lead to differences in the rate of acetylation, classifying individuals as slow, intermediate, or fast acetylators, which can affect drug efficacy and toxicity.",source:"Quiz Night"},{id:"akram_akram_QuizNight_73",exam:"akram",lecture:"QuizNight",q:"A patient is confirmed to harbor a mutation in the HNF1A gene. Which disorder and treatment match this gene mutation?",options:["Neonatal diabetes - insulin","Neonatal diabetes - sulfonylurea","MODY - insulin","MODY - sulfonylurea"],answer:3,explanation:"Mutations in the HNF1A gene are associated with Maturity-Onset Diabetes of the Young (MODY). Patients with this type of diabetes often respond well to treatment with sulfonylureas, which stimulate insulin release from the pancreas. Neonatal diabetes is associated with other gene mutations such as KCNJ11.",source:"Quiz Night"},{id:"akram_akram_QuizNight_74",exam:"akram",lecture:"QuizNight",q:"Which gene is responsible for the metabolism of debrisoquine?",options:["CYP3A4","CYP2C9","CYP2D6","CYP2E1"],answer:2,explanation:"CYP2D6 is a key enzyme in the cytochrome P450 family responsible for the metabolism of debrisoquine, an antihypertensive drug. The activity of CYP2D6 can vary greatly between individuals due to genetic polymorphisms, leading to different metabolic rates (poor, intermediate, extensive, and ultra-rapid metabolizers).",source:"Quiz Night"},{id:"akram_akram_QuizNight_75",exam:"akram",lecture:"QuizNight",q:"Splice-site mutations affect?",options:["Aberrant splicing of pre-mRNA","Binding of transcription factors to promoter","DNA replication","Protein folding"],answer:0,explanation:"Splice-site mutations occur at the boundaries of introns and exons and can disrupt the normal splicing process of pre-mRNA. This can lead to exon skipping, intron retention, or the activation of cryptic splice sites, resulting in aberrant mRNA and potentially non-functional or harmful proteins.",source:"Quiz Night"},{id:"akram_akram_QuizNight_76",exam:"akram",lecture:"QuizNight",q:"A loss of function mutation can cause:",options:["Familial Hypercholesterolemia","Huntington's disease","Achondroplasia","Marfan syndrome"],answer:0,explanation:"Loss of function mutations reduce or eliminate the activity of the gene product. Familial Hypercholesterolemia is often caused by loss of function mutations in the LDL receptor gene, which impairs the clearance of LDL cholesterol from the bloodstream. Huntington's disease and achondroplasia are caused by gain of function mutations, while Marfan syndrome typically involves dominant-negative mutations.",source:"Quiz Night"},{id:"akram_akram_QuizNight_77",exam:"akram",lecture:"QuizNight",q:"Huntington's disease represents:",options:["Loss of function","Gain of function","Haploinsufficiency","Dominant negative"],answer:1,explanation:"Huntington's disease is caused by a gain of function mutation in the HTT gene, involving an expanded CAG repeat that leads to the production of a mutant protein with toxic properties. This contrasts with loss of function mutations, haploinsufficiency (where one functional copy of a gene is insufficient), and dominant-negative mutations.",source:"Quiz Night"},{id:"akram_akram_QuizNight_78",exam:"akram",lecture:"QuizNight",q:"Which of the following best describes missense mutations?",options:["Results in coding for a different amino acid and the synthesis of an altered protein","Results in a premature stop codon and truncated protein","Does not change the amino acid sequence and has no effect on the protein","Results in the insertion or deletion of nucleotides that changes the reading frame of the gene"],answer:0,explanation:"A missense mutation occurs when a single nucleotide change results in the substitution of one amino acid for another in the protein sequence. This can alter the protein's function, stability, or structure. Option B describes nonsense mutations, option C describes synonymous/silent mutations, and option D describes frameshift mutations.",source:"Quiz Night"},{id:"akram_akram_QuizNight_79",exam:"akram",lecture:"QuizNight",q:"What type of mutation causes substitution of a single amino acid?",options:["Missense","Nonsense","Frame shift","In-frame deletion"],answer:0,explanation:"A missense mutation is a point mutation that results in the substitution of one amino acid for another in the protein. Nonsense mutations introduce a premature stop codon, frameshift mutations result from insertions or deletions that disrupt the reading frame, and in-frame deletions involve the loss of one or more codons without disrupting the reading frame.",source:"Quiz Night"},{id:"akram_akram_QuizNight_80",exam:"akram",lecture:"QuizNight",q:"A patient with conjunctival telangiectasia, ophthalmoplegia, and immunodeficiency most likely has:",options:["Ataxia Telangiectasia","Xeroderma pigmentosum","Cystic fibrosis","Wiskott-Aldrich syndrome"],answer:0,explanation:"Ataxia Telangiectasia is characterized by a combination of progressive neurological impairment (ataxia), conjunctival telangiectasia (dilated blood vessels in the eyes), ophthalmoplegia (eye movement abnormalities), and immunodeficiency. Xeroderma pigmentosum involves extreme sensitivity to UV light, cystic fibrosis primarily affects the lungs and digestive system, and Wiskott-Aldrich syndrome involves eczema, thrombocytopenia, and immunodeficiency.",source:"Quiz Night"},{id:"akram_akram_QuizNight_81",exam:"akram",lecture:"QuizNight",q:"Which type of mutation is most likely to result in the synthesis of a truncated, non-functional protein?",options:["Missense mutation","Nonsense mutation","Frameshift mutation","Synonymous mutation"],answer:1,explanation:"A nonsense mutation results in the introduction of a premature stop codon within the coding sequence of a gene. This leads to the early termination of translation, producing a truncated protein that is usually non-functional and often targeted for degradation by the cell.",source:"Quiz Night"},{id:"akram_akram_QuizNight_82",exam:"akram",lecture:"QuizNight",q:"A mutation in which region is most likely to alter the level of gene expression without changing the amino acid sequence of the protein?",options:["Coding sequence","Promoter region","Intronic sequence","Enhancer sequence"],answer:1,explanation:"Mutations in the promoter region of a gene can significantly alter the level of gene expression by affecting the binding affinity of RNA polymerase and other transcription factors necessary for initiating transcription. This changes expression levels without altering the amino acid sequence.",source:"Quiz Night"},{id:"akram_akram_QuizNight_83",exam:"akram",lecture:"QuizNight",q:"Which of the following describes a transversion mutation?",options:["A purine is substituted with another purine","A pyrimidine is substituted with another pyrimidine","A purine is substituted for a pyrimidine","The insertion or deletion of a single nucleotide"],answer:2,explanation:"A transversion mutation involves the substitution of a purine for a pyrimidine or a pyrimidine for a purine. Purines are adenine (A) and guanine (G), while pyrimidines are cytosine (C) and thymine (T). A transversion substitutes one class (purine/pyrimidine) for the other. Option A and B describe transitions, and option D describes an indel.",source:"Quiz Night"},{id:"akram_akram_QuizNight_84",exam:"akram",lecture:"QuizNight",q:"Which of the following is used in base excision repair?",options:["ATM","O6-methylguanine-DNA-methyltransferase","MLH","DNA glycosylase"],answer:3,explanation:"DNA glycosylase is an enzyme that recognizes and removes damaged bases in the DNA during base excision repair. This process involves removing the damaged base, leaving an abasic site, which is then processed to restore the correct DNA sequence. ATM is involved in the response to double-strand breaks, O6-methylguanine-DNA-methyltransferase is involved in direct reversal of alkylation damage, and MLH is part of the mismatch repair system.",source:"Quiz Night"},{id:"akram_akram_QuizNight_85",exam:"akram",lecture:"QuizNight",q:"UV light exposure causes:",options:["Purine dimers","Pyrimidine dimers","Single strand DNA breaks","Double strand DNA breaks"],answer:1,explanation:"UV light exposure causes the formation of pyrimidine dimers, most commonly thymine dimers, where two adjacent pyrimidine bases (thymine or cytosine) become covalently bonded. This distorts the DNA structure and can lead to mutations if not repaired.",source:"Quiz Night"},{id:"akram_akram_QuizNight_86",exam:"akram",lecture:"QuizNight",q:"Which enzyme is involved in a direct-reversal mechanism?",options:["AP lyase","Photolyase","DNA exonuclease","MMR complex"],answer:1,explanation:"Photolyase is an enzyme that repairs UV-induced pyrimidine dimers through a direct reversal mechanism. It uses energy from visible light to break the covalent bonds between the pyrimidine bases, restoring the DNA to its original state. AP lyase is involved in base excision repair, DNA exonuclease is involved in various DNA repair processes, and the MMR complex corrects base-pair mismatches.",source:"Quiz Night"},{id:"akram_akram_QuizNight_87",exam:"akram",lecture:"QuizNight",q:"Which of the following DNA repair mechanisms can cause mistakes?",options:["Homologous recombination","Non-homologous end joining","Direct reversal","Mismatch repair"],answer:1,explanation:"Non-homologous end joining (NHEJ) repairs double-strand breaks by directly joining the DNA ends without using a homologous template. This process is error-prone and can introduce small insertions or deletions at the break site, leading to mutations. Homologous recombination uses a homologous sequence for high-fidelity repair, direct reversal directly corrects specific DNA damage without mistakes, and mismatch repair fixes replication errors accurately.",source:"Quiz Night"},{id:"akram_akram_QuizNight_88",exam:"akram",lecture:"QuizNight",q:"A mutation in the BRCA1 gene will affect which of the following repair mechanisms?",options:["Base excision repair","Nucleotide excision repair","Homologous recombination","Demethylation"],answer:2,explanation:"BRCA1 plays a crucial role in the repair of double-stranded DNA breaks via homologous recombination. Mutations in the BRCA1 gene impair this repair mechanism, leading to an increased risk of developing cancers, such as breast and ovarian cancer. Base excision repair, nucleotide excision repair, and demethylation are not directly affected by BRCA1 mutations.",source:"Quiz Night"},{id:"akram_akram_QuizNight_89",exam:"akram",lecture:"QuizNight",q:"A patient presents with dark lesions scattered throughout his skin, and complains of increased sensitivity to UV light. Which gene may be mutated?",options:["MLH1 gene","MUTYH gene","BLM gene","XP gene"],answer:3,explanation:"The symptoms described are characteristic of Xeroderma Pigmentosum (XP), a condition caused by mutations in genes involved in nucleotide excision repair (NER). These mutations lead to an inability to effectively repair UV-induced DNA damage, resulting in increased sensitivity to sunlight and a higher risk of skin cancer.",source:"Quiz Night"},{id:"akram_akram_QuizNight_90",exam:"akram",lecture:"QuizNight",q:"Nucleotide excision repair is a mechanism used to correct:",options:["Double stranded breaks","Chemical adducts","Purine dimers","Abnormal bases"],answer:1,explanation:"Nucleotide excision repair (NER) is a DNA repair mechanism that removes bulky DNA lesions, such as chemical adducts and pyrimidine dimers caused by UV light. These lesions distort the DNA helix and NER excises a short single-stranded DNA segment containing the damage, then fills in the gap using the undamaged strand as a template.",source:"Quiz Night"},{id:"akram_akram_QuizNight_91",exam:"akram",lecture:"QuizNight",q:"Which gene mutation would not affect repair of double stranded breaks?",options:["MUTYH","ATM","BRCA2","NBS"],answer:0,explanation:"MUTYH is involved in base excision repair, specifically correcting oxidative DNA damage by removing adenine misincorporated opposite 8-oxoguanine. It is not directly involved in the repair of double-stranded breaks. ATM, BRCA2, and NBS (Nibrin) are all involved in the repair of double-stranded breaks through mechanisms like homologous recombination and non-homologous end joining.",source:"Quiz Night"},{id:"akram_akram_QuizNight_92",exam:"akram",lecture:"QuizNight",q:"A 55-year old man is diagnosed with a carcinoma of the colon. Family history indicates that two of his uncles were also subject to late-onset colon cancer. What might be a factor in the development of the patient's cancer?",options:["Inability to remove abnormal bases","Inability to fix breaks in chromosomes","Inability to correct mismatched bases","Inability to remove pyrimidine dimers"],answer:2,explanation:"The family history and type of cancer suggest hereditary nonpolyposis colorectal cancer (HNPCC) or Lynch syndrome, which is often caused by mutations in mismatch repair (MMR) genes such as MLH1, MSH2, MSH6, or PMS2. These genes correct mismatched bases during DNA replication. The inability to fix these mismatches can lead to cancer development.",source:"Quiz Night"},{id:"akram_akram_QuizNight_93",exam:"akram",lecture:"QuizNight",q:"What is a short-term consequence of severe DNA damage?",options:["Cancer","Aging","Genetic divergence","Apoptosis"],answer:3,explanation:"Apoptosis, or programmed cell death, is a short-term consequence of severe DNA damage. When a cell detects irreparable damage, it undergoes apoptosis to prevent the propagation of mutations that could lead to cancer or other issues. Cancer, aging, and genetic divergence are longer-term consequences that can result from accumulated DNA damage over time.",source:"Quiz Night"},{id:"akram_akram_QuizNight_94",exam:"akram",lecture:"QuizNight",q:"In reverse transcription PCR, which of the following is amplified?",options:["DNA","RNA","cDNA","mRNA"],answer:1,explanation:"In reverse transcription PCR (RT-PCR), RNA is first converted into complementary DNA (cDNA) using the enzyme reverse transcriptase. The cDNA is then used as a template for amplification in the PCR process. Therefore, the starting material that undergoes amplification is RNA.",source:"Quiz Night"},{id:"akram_akram_QuizNight_95",exam:"akram",lecture:"QuizNight",q:"What is the purpose of using FISH test?",options:["Visualizing chromosomal mutations","Detecting mutations in gene sequence","Detecting large deletions","Used mainly as a screening test"],answer:0,explanation:"Fluorescence in situ hybridization (FISH) is used to visualize and map the genetic material in a cell, including specific genes or portions of genes. This technique can identify chromosomal abnormalities, such as translocations, deletions, duplications, and aneuploidies.",source:"Quiz Night"},{id:"akram_akram_QuizNight_96",exam:"akram",lecture:"QuizNight",q:"An individual presents to the genetic clinic with the suspicion of aneuploidy. What is the ideal method to confirm such abnormality?",options:["FISH","Biochemical testing","PCR","Karyotyping"],answer:3,explanation:"Karyotyping is the ideal method to confirm aneuploidy, as it provides a visual representation of an individual's chromosomes, allowing for the identification of numerical and structural abnormalities, including aneuploidies. FISH can also detect specific aneuploidies but is often used for more targeted analyses. Biochemical testing and PCR are not suitable for visualizing entire sets of chromosomes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_97",exam:"akram",lecture:"QuizNight",q:"The technique most widely used in cytogenetics?",options:["X-Banding","L-Banding","F-Banding","G-Banding"],answer:3,explanation:"G-Banding (Giemsa banding) is the most widely used technique in cytogenetics. It involves staining chromosomes with Giemsa dye, which produces a characteristic pattern of light and dark bands. These bands help in identifying chromosomal abnormalities, such as deletions, duplications, and translocations.",source:"Quiz Night"},{id:"akram_akram_QuizNight_98",exam:"akram",lecture:"QuizNight",q:"Which of the following FISH probes is used to diagnose subdeletions?",options:["Centromeric probes","Whole-chromosome painting","Chromosome-specific unique probes","Telomeric probes"],answer:2,explanation:"Chromosome-specific unique probes are used in FISH to diagnose subdeletions. These probes target specific, unique sequences within a chromosome, allowing for the detection of small deletions or duplications within that specific region. Centromeric probes are used to identify centromere regions, whole-chromosome painting covers entire chromosomes, and telomeric probes target the ends of chromosomes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_99",exam:"akram",lecture:"QuizNight",q:"Which of the following might be used for genetic testing?",options:["Saliva","Feces","Peripheral blood","Urine"],answer:2,explanation:"Peripheral blood is commonly used for genetic testing because it provides a rich source of DNA from white blood cells. While saliva can also be used for genetic testing as it contains epithelial cells with DNA, peripheral blood is the most traditional and widely used sample type. Feces and urine are not typically used for genetic testing as they do not reliably provide sufficient quantities of DNA.",source:"Quiz Night"},{id:"akram_akram_QuizNight_100",exam:"akram",lecture:"QuizNight",q:"Primers in PCR are described by?",options:["Long RNA sequences used to initiate transcription","Long DNA sequences used to initiate replication","Short RNA sequences used to initiate replication","Short DNA sequences used to initiate replication"],answer:2,explanation:"Primers in PCR are short sequences of RNA that anneal to the target DNA sequence and provide a starting point for DNA synthesis. These primers are crucial for the replication process in PCR, enabling the DNA polymerase to extend the DNA strand from the primer's end. Minimum primer length used in most applications is 18 nucleotides.",source:"Quiz Night"},{id:"akram_akram_QuizNight_101",exam:"akram",lecture:"QuizNight",q:"Erythrocytes cannot be used in genetic testing because?",options:["They have no RNA","They have no DNA","They have RNA","They have DNA and RNA"],answer:1,explanation:"Erythrocytes, or red blood cells, cannot be used for genetic testing because they lack a nucleus and, consequently, DNA. Red blood cells lose their nuclei as they mature, which means they do not contain the genetic material needed for DNA-based genetic tests. White blood cells in peripheral blood are typically used instead, as they do contain DNA.",source:"Quiz Night"},{id:"akram_akram_QuizNight_102",exam:"akram",lecture:"QuizNight",q:"What are the steps of performing PCR test?",options:["Denaturation, annealing, extension","Annealing, denaturation, elongation","Denaturation, elongation, annealing","Annealing, extension, denaturation"],answer:0,explanation:"The correct sequence of steps in a PCR test is denaturation, annealing, and extension. During denaturation, the double-stranded DNA is heated to separate it into two single strands. During annealing, the temperature is lowered to allow primers to bind to their complementary sequences. During extension, DNA polymerase synthesizes the new DNA strand by adding nucleotides to the primer.",source:"Quiz Night"},{id:"akram_akram_QuizNight_103",exam:"akram",lecture:"QuizNight",q:"Sara is a 30 years old female who came to a genetic counseling with a history of breast cancer in family. Her mother had breast cancer caused by BRCA1. Which of the following tests is appropriate for sara?",options:["Chromosome microarray","MLPA","Sanger sequencing","Whole exome sequences"],answer:2,explanation:"Sanger sequencing is the appropriate test for Sara because it is a highly accurate method for identifying specific mutations in genes, such as the BRCA1 gene, which is known to be associated with breast cancer. Sanger sequencing is particularly useful for confirming known familial mutations. Chromosome microarray and MLPA are not typically used for detecting single-gene mutations like those in BRCA1.",source:"Quiz Night"},{id:"akram_akram_QuizNight_104",exam:"akram",lecture:"QuizNight",q:"A 47-year-old female patient is referred to the genetic clinic, tumor in her right colon. Her father died at the age of 55 from colon cancer, her paternal aunt had endometrial cancer. What is the best technique to confirm her condition?",options:["Gene panel","Chromosomal analysis","Search for MLH mutation","Sanger sequencing"],answer:0,explanation:"Given the family history and the types of cancers involved, the patient may have Lynch syndrome, which is associated with mutations in mismatch repair (MMR) genes like MLH1, MSH2, MSH6, and PMS2. Gene panel testing, which includes sequencing of all relevant MMR genes, is the best approach to identify any mutations that could confirm a diagnosis of Lynch syndrome.",source:"Quiz Night"},{id:"akram_akram_QuizNight_105",exam:"akram",lecture:"QuizNight",q:"What is the best genetic testing for chromosomal duplication <5 mega base pair?",options:["Microarray","Chromosomal analysis","MLPA","Karyotyping"],answer:0,explanation:"Microarray is the best method for detecting chromosomal duplications smaller than 5 mega base pairs. Microarray technology can detect copy number variations (CNVs) such as duplications and deletions with high resolution. Chromosomal analysis and karyotyping are less sensitive for small duplications as they typically resolve larger structural changes.",source:"Quiz Night"},{id:"akram_akram_QuizNight_106",exam:"akram",lecture:"QuizNight",q:"Biochemical testing works by?",options:["Assessment of defective proteins associated with other genetic disorders","Examining the whole chromosomes for abnormalities","Examining specific gene mutations","Assessing the level of proteins to confirm aneuploidies"],answer:0,explanation:"Biochemical testing involves the assessment of defective proteins associated with genetic disorders. This type of testing evaluates enzyme activities, protein levels, or metabolite concentrations to diagnose metabolic and genetic conditions. It does not typically involve direct examination of chromosomes, specific gene mutations, or confirming aneuploidies.",source:"Quiz Night"},{id:"akram_akram_QuizNight_107",exam:"akram",lecture:"QuizNight",q:"Two year-old child with multiple congenital anomalies and developmental delays with no specific genetic syndrome. Karyotyping and microarray test were negative. What's your next step?",options:["WES","FISH","Biochemical test","Sanger sequencing"],answer:0,explanation:"Given that karyotyping and microarray tests were negative, the next logical step would be Whole Exome Sequencing (WES). WES focuses on sequencing the protein-coding regions of the genome (the exome), where most known disease-causing mutations are found. FISH is more targeted, biochemical tests are useful for metabolic disorders, and Sanger sequencing is best for targeted gene analysis.",source:"Quiz Night"},{id:"akram_akram_QuizNight_108",exam:"akram",lecture:"QuizNight",q:

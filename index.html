d in the nucleus of most living cells, carrying genetic information in the form of genes."},{id:"mid1_mid1_L1_Introduction_18",exam:"mid1",lecture:"L1 Introduction",q:"A 10-year-old boy came to the genetic clinic complaining of a genetic disease. Family history revealed a similarly affected sister. His father and paternal grandmother have moderate manifestations. Why did his father and paternal grandmother develop moderate manifestations?",options:["Genomic imprinting","Variable expression","Somatic mosaicism","Polyploidy"],answer:1,explanation:"From L1 Introduction: Genetics helps explain a lot of things, like what makes you unique, why you look like other members of your family, why somebody looks different and why some diseases run in your family. We study genetics because the DNA sequence is the beginning, the blueprint for our development and so many of the features that make us the unique individuals we are."},{id:"mid1_mid1_L1_Introduction_19",exam:"mid1",lecture:"L1 Introduction",q:"Group of signs and symptoms occur at the same time?",options:["Sickness","Disease","Infection","Syndrome"],answer:3,explanation:"From L1 Introduction: \u2022  A group of signs and symptoms that occur together and characterize a particular abnormality or condition. Genetics helps explain a lot of things, like what makes you unique, why you look like other members of your family, why somebody looks different and why some diseases run in your family."},{id:"mid1_mid1_L1_Introduction_20",exam:"mid1",lecture:"L1 Introduction",q:"Risk of having an affected child with this syndrome increase in?",options:["young maternal age","Maternal age below 30","Maternal age above 25","Maternal age above 45"],answer:3,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Pharmacogenomics: This field studies how an individual's genes affect their response to medications, allowing for more precise prescribing."},{id:"mid1_mid1_L1_Introduction_21",exam:"mid1",lecture:"L1 Introduction",q:"Marfan syndrome is an example of?",options:["Homoplasmy","Hetroplasmy","pleiotropy","polyploidy"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome?"},{id:"mid1_mid1_L1_Introduction_22",exam:"mid1",lecture:"L1 Introduction",q:"What is risk of having this individual down syndrome child?",options:["100%","25%","1-3 %","10-15%"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Pharmacogenomics: This field studies how an individual's genes affect their response to medications, allowing for more precise prescribing."},{id:"mid1_mid1_L1_Introduction_23",exam:"mid1",lecture:"L1 Introduction",q:"10. Defect in Mismatch repair will lead:",options:["xeroderma","non-polyposis colorectal cancer","Nijmegen syndrome","breast cancer"],answer:1,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Personalized Medicine: By tailoring treatments to an individual's genetic makeup, medical genetics can lead to more effective and safer therapies."},{id:"mid1_mid1_L1_Introduction_24",exam:"mid1",lecture:"L1 Introduction",q:"A female was in the clinic with her daughter, her daughter was 47 t (14;21)+21 Unfortunately her mother was  6","Chromosome 11","Chromosome 14"],answer:3,explanation:"From L2 Chromosomes Structure: Gamete Somatic cells \uF0D8All body cells except reproductive cells \uF0D8Chromosomes of the same size and shape which carry the same type of genes. Introduction \uF097The instructions in each chromosome are contained within genes, which in turn are composed of DNA."},{id:"mid1_mid1_L2_Chromosomes_Structure_2",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"What is the normal karyotype of a healthy female?",options:["45,X","47,XXX","46,XY","46,XX"],answer:3,explanation:"From L2 Chromosomes Structure: The abnormality"},{id:"mid1_mid1_L2_Chromosomes_Structure_3",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"Which of the following chromosomes is classified as metacentric?",options:["Chromosome 13","Chromosome 14","Chromosome 3","Chromosome 21"],answer:2,explanation:"From L2 Chromosomes Structure: \uF097Homologous chromosomes \uF097Sex Chromosomes \uF097Human autosomes \uF097Non-homologous chromosomes Which of the following is not used to identify chromosomes during chromosomal analysis?"},{id:"mid1_mid1_L2_Chromosomes_Structure_4",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"A chromosome ideogram is shown with labeled bands. Which of the following regions is closest to the telomere?",options:["Xq12","Xq21","Xq26","Xq28"],answer:3,explanation:"From L2 Chromosomes Structure: G- banding metaphase Staining Chromosome Labeling Example - 1q24 Chromosome is identified with a number ranging 1-22, or X and Y Each chromosome is divided into 2 arms (p,q) Each  arm divided into regions and identified by a number Each region divided into bands identified with ..."},{id:"mid1_mid1_L2_Chromosomes_Structure_5",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"Which chromosome has an appendage-like structure (satellite)?",options:["Chromosome 10","Chromosome 16","Chromosome 14","Chromosome 1"],answer:2,explanation:"From L2 Chromosomes Structure: Chromosome to Gene to Protein Chromosomes egulatory sequences such as promoters","Cellular structures involved in protein synthesis such as ribosomes and transfer RNA"],answer:2,explanation:"From L3 Central Dogma: \u2022 Initiation \u2022 \u2022Elongation \u2022 \u2022Termination \u2022 \u2022Recognition of STOP codons \u2022 \u2022Usage of release factors Regulation of gene expression \u2022 What is constitutive vs regulated gene expression? \u2022 What are some examples of regulation of gene expression?"},{id:"mid1_mid1_L3_Central_Dogma_2",exam:"mid1",lecture:"L3 Central Dogma",q:"Where does protein synthesis occur in the cell?",options:["Nucleus","Ribosome","Golgi apparatus","Lysosomes"],answer:1,explanation:"From L3 Central Dogma: Short, discontinuous DNA segments synthesized on the lagging strand during DNA replication, allowing both new strands to be built in the essential 5' to 3' direction as the replication fork opens Protein synthesis - Transcription"},{id:"mid1_mid1_L3_Central_Dogma_3",exam:"mid1",lecture:"L3 Central Dogma",q:"During which process is mRNA produced?",options:["Translation","Replication","Post-translational modification","Transcription"],answer:3,explanation:"From L3 Central Dogma: The central dogma of molecular biology describes the fundamental flow of genetic information: 1- Replication 2- Transcription 3- Translation by which the information in genes flows in a UNILATERAL direction: DNA \u2192 RNA \u2192 protein."},{id:"mid1_mid1_L3_Central_Dogma_4",exam:"mid1",lecture:"L3 Central Dogma",q:"What is the primary function of the centromere?",options:["To initiate DNA replication during S phase","To regulate gene transcription along the chromosome","To allow attachment of spindle microtubules during cell division","To maintain chromosome length during cell division"],answer:2,explanation:"From L3 Central Dogma: Short, discontinuous DNA segments synthesized on the lagging strand during DNA replication, allowing both new strands to be built in the essential 5' to 3' direction as the replication fork opens Protein synthesis - Transcription"},{id:"mid1_mid1_L3_Central_Dogma_5",exam:"mid1",lecture:"L3 Central Dogma",q:"Which enzyme is responsible for unwinding DNA during replication?",options:["DNA polymerase","RNA polymerase","Ligase","Helicase"],answer:3,explanation:"From L3 Central Dogma: Enzymes: helicase, DNA \u2013polymerases, ligase. DNA polymerase; the enzyme required that adds new nucleotides to the new DNA strand."},{id:"mid1_mid1_L3_Central_Dogma_6",exam:"mid1",lecture:"L3 Central Dogma",q:"Which is the sequence of poly a tail that attached to mRNA?",options:["AAUAAA","AATAAA","AACAAA","AAGAAA"],answer:0,explanation:"From L3 Central Dogma: DNA polymerase; the enzyme required that adds new nucleotides to the new DNA strand. \u2022 Differs from DNA synthesis in that only one strand of DNA, the template strand, is used to make mRNA \u2022 Transcription does not need a primer to start."},{id:"mid1_mid1_L3_Central_Dogma_7",exam:"mid1",lecture:"L3 Central Dogma",q:"the mRNA sequence TAG TAG TAG if we add cytosine at the beginning what will be the new sequence?",options:["CTA GTA GTAG","CTAGTAGTAG","CTA CTA GTAG","non sense"],answer:0,explanation:"From L3 Central Dogma: \u2022 What are the types of types of eukaryotic mRNA modifications? What is the central dogma of molecular biology?"},{id:"mid1_mid1_L3_Central_Dogma_8",exam:"mid1",lecture:"L3 Central Dogma",q:"Between adenine and guanine transformation?",options:["Transition (mutation)","Transverse","Transcription","Translation"],answer:0,explanation:"From L3 Central Dogma: The central dogma of molecular biology describes the fundamental flow of genetic information: 1- Replication 2- Transcription 3- Translation by which the information in genes flows in a UNILATERAL direction: DNA \u2192 RNA \u2192 protein. What are the key differences between DNA replication and transcription?"},{id:"mid1_mid1_L3_Central_Dogma_9",exam:"mid1",lecture:"L3 Central Dogma",q:"An alteration in DNA polymerase that lacks 5' to 3' exonuclease activity results in:",options:["An increase in mutation rate","A decrease in replication speed","A decrease in RNA primer removal","An increase in recombination rate"],answer:2,explanation:"The 5' to 3' exonuclease activity of DNA Polymerase I (in prokaryotes) removes the RNA primer during replication. Loss of this activity would impair RNA primer removal. The 3' to 5' exonuclease provides proofreading; loss of that would increase mutations."},{id:"mid1_mid1_L3_Central_Dogma_10",exam:"mid1",lecture:"L3 Central Dogma",q:"In eukaryotes translation during the elongation stage in this diagram which of the following is NOT CORRECT?",options:["the cap end of mRNA","the direction of the ribosome","anticodon of tRNA","3'end of the tRNA"],answer:3,explanation:"From L3 Central Dogma: \u2022 mRNA \u2022 ribosomes, \u2022 tRNAs \u2022 and rRNAs. The central dogma of molecular biology describes the fundamental flow of genetic information: 1- Replication 2- Transcription 3- Translation by which the information in genes flows in a UNILATERAL direction: DNA \u2192 RNA \u2192 protein."},{id:"mid1_mid1_L3_Central_Dogma_11",exam:"mid1",lecture:"L3 Central Dogma",q:"What could be the effect of a coding sequence of 114 nucleotides including start and stop codons that has an insertion of 9 nucleotides at position 82?",options:["Insertion of 3 amino acids","No effect","First 68 nucleotides are affected","Last 11 nucleotides are affected \u0631\uFED7\uFEE2+ \uFE97\uFECC\uFEAA\uFEF3\uFEDE_\uFE9F\uFEF4\uFEE8\uFEF4\uFE98\uFEDC\uFEB2# \u0625\u0631\uFEB3\uFE8E\u0644"],answer:0,explanation:"From L3 Central Dogma: Free DNA nucleotides: free bases (ATCG) that can be added to the new DNA strand. DNA polymerase; the enzyme required that adds new nucleotides to the new DNA strand."},{id:"mid1_mid1_L3_Central_Dogma_12",exam:"mid1",lecture:"L3 Central Dogma",q:"The addition of a poly-A tail to mRNA serves which of the following functions?",options:["Protects mRNA from degradation","Facilitates the passage of mRNA through the nucleus","Binds to the promoter","Enhances ribosomal binding and translation efficiency"],answer:0,explanation:"From L3 Central Dogma: \u2022 Differs from DNA synthesis in that only one strand of DNA, the template strand, is used to make mRNA \u2022 Transcription does not need a primer to start. \u2022 mRNA, \u2022 tRNA, \u2022 rRNA."},{id:"mid1_mid1_L3_Central_Dogma_13",exam:"mid1",lecture:"L3 Central Dogma",q:"The diagram shown illustrates structures (A-E) involved in translation. Which label correctly identifies the polypeptide chains being synthesized?",options:["(A) the 5' end of mRNA","(B) the direction of ribosome movement","(C) and (D) ribosomes on the mRNA","(E) the polypeptide chains"],answer:3,explanation:"The diagram shows a polyribosome (polysome): multiple ribosomes simultaneously translating the same mRNA molecule. (A) = 5' end of mRNA; (B) = direction of translation (5'\u21923'); (C) and (D) = individual ribosomes attached to the mRNA; (E) = the polypeptide chains (proteins) being elongated at each ribosome. Ribosomes near the 3' end have longer chains; those near the 5' end have shorter nascent chains.",image:"images/tb_p37_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_1",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"What is the definition of translocation?",options:["Deletion of a chromosome segment","Duplication of genetic material","Exchange of genetic material between non-homologous chromosomes","Inversion of a chromosome segment"],answer:2,explanation:"From L4 Chromosomal Aberrations: Abnormalities of Chromosome Structure Unbalanced Balanced There is loss or gain of chromosomal material The chromosome set has the normal complement ,no loss or gain The phenotype is likely to be abnormal Don\u2019t usually have phenotypic effect But they can pose a threat to the offspring \uF0A7Delet..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_2",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q lecture:"L4 Chromosomal Aberrations",q:"A male has a deletion on the long arm of chromosome 15 at region 1 band 3. What is the correct karyotype notation?",options:["46,XY,(15)(q13)","46,XY,del(15)(q13)","46,XY,dup(15)(q13)","45,XY,der(15)(q13)"],answer:1,explanation:"From L4 Chromosomal Aberrations: 45,XY,rob(14;15)(q10;q10) How  to describe chromosomal abnormalities \uF0FCChromosome report reading 46,XY,t(2;4)(p23;q25) : Male with a reciprocal translocation between chr 2 and chr 4 involving short arm of chr 2 at region 2 band 3 and long arm of chr 4 at region 2 band 5 \uF0FCChromosome report read..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_27",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"All of the following are trisomies EXCEPT:",options:["Patau syndrome","Turner syndrome","Edward syndrome","Down syndrome"],answer:1,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_28",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"4. ............ involves 2 Acrocentric chromosomes fuse near the centromere and loss their short arm",options:["isochromosome.","chromosomal inversion.","reciprocal translocation.","Robertsonian translocation"],answer:3,explanation:"From L4 Chromosomal Aberrations: Abnormalities of Chromosome Structure Unbalanced Balanced There is loss or gain of chromosomal material The chromosome set has the normal complement ,no loss or gain The phenotype is likely to be abnormal Don\u2019t usually have phenotypic effect But they can pose a threat to the offspring \uF0A7Delet..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_29",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The following karyotype is for:",options:["Normal Male","Normal Female","Turner Syndrome","Klinefelter Syndrome"],answer:1,explanation:"From L4 Chromosomal Aberrations: Numerical Chromosome Abnormalities \uF0D8Trisomy for a whole chromosome is rarely compatible with life except : trisomy 21, trisomy 13, trisomy 18, triple X female, Klinefelter syndrome.",image:"images/tb_p38_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_30",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A 6-year-old female presents with hyperphagia and short stature. Clinical examination reveals obesity and dysmorphic features, including almond-shaped eyes and small hands and feet. What is the most likely diagnosis?",options:["Angelman syndrome","Prader\u2013Willi syndrome","Turner syndrome","Klinefelter syndrome"],answer:1,explanation:"From L4 Chromosomal Aberrations: Numerical Chromosome Abnormalities \uF0D8Trisomy for a whole chromosome is rarely compatible with life except : trisomy 21, trisomy 13, trisomy 18, triple X female, Klinefelter syndrome."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_31",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A male presents with dysmorphic facial features, almond- shaped eyes, small hands and feet, hyperphagia, short stature, and obesity. What is the most likely diagnosis?",options:["Prader\u2013Willi syndrome","Down syndrome","Turner syndrome","Klinefelter syndrome"],answer:1,explanation:"Down syndrome (trisomy 21, +21) is the most common autosomal trisomy compatible with life. Features include dysmorphic facial features, upslanting palpebral fissures, short stature, small hands and feet, intellectual disability, and increased risk of leukemia (20\xD7 normal)."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_32",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Polydactyly is a unique feature of which of the following disorders?",options:["Patau syndrome","Cri du chat syndrome","Achondroplasia","Down syndrome"],answer:0,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_33",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A karyotype shows a ring X chromosome. Identify the disorder:",options:["Down syndrome","Klinefelter syndrome","Turner syndrome","Patau syndrome"],answer:2,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_34",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The following karyotype is for:",options:["Klinefelter Syndrome","Patau Syndrome","Cri du chat Syndrome","Turner Syndrome"],answer:0,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht...",image:"images/tb_p44_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_35",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Which of the following syndromes is characterized by pleiotropy?",options:["Marfan syndrome","Turner syndrome","Down syndrome","Prader\u2013Willi syndrome"],answer:0,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_36",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"This karyotype is diagnosed for:",options:["cri du chat","wolf syndrome","down syndrome","Edward syndrome"],answer:0,explanation:"The karyotype shows a deletion of the short arm of chromosome 5 (5p-), as indicated by the arrow pointing to the abnormal chromosome 5. This is Cri-du-chat syndrome. Clinical features include a high-pitched cat-like cry in infancy, microcephaly, hypertelorism, and intellectual disability.",image:"images/tb_p49_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_37",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Give the definition of Ring chromosome:",options:["A numerical chromosomal abnormality in which two chromosomes have been translocated to another one to form a ring","A structurally abnormal chromosome in which two chromosomes have been united with each other to form a ring","A numerical chromosomal abnormality in which a new chromosome has been united with another one to form a ring","A structurally abnormal chromosome in which the ends of each chromosome arm have been lost and the broken arms have been reunited to form a ring"],answer:3,explanation:"From L4 Chromosomal Aberrations: Abnormalities of Chromosome Structure Unbalanced Balanced There is loss or gain of chromosomal material The chromosome set has the normal complement ,no loss or gain The phenotype is likely to be abnormal Don\u2019t usually have phenotypic effect But they can pose a threat to the offspring \uF0A7Delet..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_38",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Mustafa and Fatima are a couple seeking genetic counseling. They have a male baby with a chromosomal aberration: 46,XY,t(21;21)+21. Cytogenetic analysis for Fatima shows the same Robertsonian translocation. What is the recurrence risk in the next pregnancy for having a similarly affected baby?",options:["1% (standard trisomy 21 recurrence)","10\u201315% (14;21 translocation carrier)","50% (balanced translocation)","100%"],answer:3,explanation:"From L4 Chromosomal Aberrations: \uF0FCDown syndrome : Recurrence Risk for next  pregnancy due to non-disjunction : 1% + the maternal age risk Risks in Robertsonian translocation \uF0FCThe female carrier of either a 13q21q or a 14q21q Robertsonian translocation runs a risk of approximately 10-15% for having a baby with Down syndrome, ..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_39",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image shows an abnormality indicated by the arrow. What chromosomal syndrome does this represent?",options:["Wolf-Hirschhorn syndrome (4p deletion)","Cri-du-chat syndrome (5p deletion)","Angelman syndrome (15q deletion)","Williams syndrome (7q11 deletion)"],answer:1,explanation:"The arrow indicates a deletion of the short arm (p arm) of chromosome 5, resulting in Cri-du-chat syndrome (46,XX/XY,del(5p)). This is a terminal deletion causing microcephaly, hypertelorism, low birth weight, intellectual disability, and the characteristic high-pitched cat-like cry (mewing) in infancy. Wolf-Hirschhorn is a 4p deletion; Angelman is a 15q deletion; Williams is 7q11.",image:"images/tb_p50_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_40",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype shown has an arrow indicating an abnormality on one chromosome. Based on the position of the arrow at chromosome 5, what syndrome does the patient most likely have?",options:["Edward syndrome","Cri-du-chat syndrome","Patau syndrome","Turner syndrome"],answer:1,explanation:"An arrow at chromosome 5 in a karyotype indicates a structural abnormality at chromosome 5. Deletion of 5p (the short arm) causes Cri-du-chat syndrome, characterized by: cat-like cry in infancy (due to laryngeal hypoplasia), microcephaly, hypertelorism, and intellectual disability. Karyotype notation: 46,XY/XX,del(5)(p15.3).",image:"images/tb_p16_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_41",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image shows an arrow indicating an abnormality. Based on the position of the arrow at chromosome 8, what is the most likely finding?",options:["Inversion of chromosome 8 (inv(8))","Deletion of chromosome 8q (del(8q))","Trisomy 8 (47,XX,+8)","Translocation involving chromosome 8"],answer:0,explanation:"When a karyotype arrow points to chromosome 8, and the chromosome 8 appears morphologically different from its homologue (e.g., different banding pattern or altered centromere position), pericentric inversion of chromosome 8 (inv(8)(p23q22)) should be considered. Inversions are balanced structural abnormalities but can predispose to unbalanced offspring.",image:"images/tb_p20_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_42",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"What syndrome does the karyotype in the image show?",options:["Down syndrome (Trisomy 21)","Edwards syndrome (Trisomy 18)","Patau syndrome (Trisomy 13)","Klinefelter syndrome (47,XXY)"],answer:0,explanation:"The karyotype shows three copies of chromosome 21 (trisomy 21), the hallmark of Down syndrome. Down syndrome is the most common chromosomal trisomy compatible with life (incidence ~1:700). Key clinical features include: intellectual disability, hypotonia, upslanting palpebral fissures, epicanthic folds, flat nasal bridge, congenital heart defects (40-50%), and short stature.",image:"images/tb_p32_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_43",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Based on the karyotype shown, what is the most likely diagnosis?",options:["Klinefelter syndrome (47,XXY)","Turner syndrome (45,X)","Triple X syndrome (47,XXX)","Down syndrome (47,XX,+21)"],answer:1,explanation:"Turner syndrome (45,X) shows only one X chromosome and no Y chromosome (45 total chromosomes). Clinical features: short stature, webbed neck, primary amenorrhea, streak gonads, coarctation of the aorta, shield chest. It is the only complete monosomy compatible with live birth; ~99% of 45,X conceptions spontaneously abort.",image:"images/tb_p35_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_44",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A karyotype is obtained for a phenotypically male patient presenting with gynecomastia, small testes, and azoospermia. What does the karyotype most likely show?",options:["45,X","47,XX,+21","47,XXY","46,XX"],answer:2,explanation:"The image shows Klinefelter syndrome karyotype (47,XXY): an extra X chromosome in a phenotypic male. It is the most common cause of male hypogonadism and infertility. Features: tall stature, small firm testes, azoospermia, gynecomastia, behavioral/learning difficulties. Testosterone is low; FSH and LH are elevated.",image:"images/tb_p38_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_45",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"This karyotype was obtained from a patient with features of a sex chromosome aneuploidy. What does it show?",options:["Normal female karyotype (46,XX)","Turner syndrome (45,X)","Klinefelter syndrome (47,XXY)","Normal male karyotype (46,XY)"],answer:2,explanation:"The karyotype shows 47,XXY (Klinefelter syndrome). Patients have two X chromosomes and one Y chromosome (47 total). The extra X results from non-disjunction during meiosis. Klinefelter is the most common sex chromosome aneuploidy in males (1:500-1:1000 male births) and the most common cause of male hypogonadism.",image:"images/tb_p44_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_46",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image is from a child with multiple congenital anomalies including polydactyly, cleft lip/palate, and microphthalmia. What does the karyotype show?",options:["Trisomy 13 (Patau syndrome)","Trisomy 18 (Edwards syndrome)","Trisomy 21 (Down syndrome)","Monosomy X (Turner syndrome)"],answer:0,explanation:"The karyotype shows three copies of chromosome 13 (47,XX/XY,+13) \u2014 Patau syndrome (trisomy 13). Clinical features include: holoprosencephaly, microphthalmia/cyclopia, cleft lip and/or palate, postaxial polydactyly, cutis aplasia (scalp defects), congenital heart defects, and severe intellectual disability. Most affected individuals do not survive beyond the first year of life.",image:"images/tb_p48_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_47",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The following karyotype is from a female patient who presents with short stature, webbed neck, and primary amenorrhea. What does the karyotype show?",options:["47,XXX (Triple X)","46,XX (Normal female)","45,X (Turner syndrome)","47,XXY (Klinefelter)"],answer:2,explanation:"Turner syndrome (45,X) is characterized by the loss of one sex chromosome, leaving only one X. The karyotype shows only 45 chromosomes with a single X. Clinical features: short stature, webbed neck (pterygium colli), low posterior hairline, shield chest, coarctation of aorta, streak ovaries, primary amenorrhea, and infertility.",image:"images/tb_p48_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_48",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"What karyotype does the image most likely show?",options:["47,XY,+21 (Down syndrome, male)","47,XX,+21 (Down syndrome, female)","47,XXY (Klinefelter syndrome)","46,XX (Normal female)"],answer:1,explanation:"The karyotype shows 47 chromosomes with three copies of chromosome 21 (trisomy 21) and two X chromosomes (XX sex chromosome pattern), indicating Down syndrome in a female (47,XX,+21). Down syndrome is the most common chromosomal trisomy causing intellectual disability, occurring in approximately 1 in 700 live births. Trisomy results from non-disjunction (usually in maternal meiosis I) in 95% of cases.",image:"images/tb_p39_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_1",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Consanguinity increases the risk of which type of genetic disorder?",options:["Autosomal dominant disorders","X-linked dominant disorders","Autosomal recessive disorders","Mitochondrial disorders"],answer:2,explanation:"From L5 L6 Mendelian: Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked)."},{id:"mid1_mid1_L5_L6_Mendelian_2",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is an example of an X-linked recessive disorder?",options:["Marfan syndrome","Huntington disease","Red-green color blindness","Cystic fibrosis"],answer:2,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_3",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following best describes autosomal dominant inheritance in a pedigree?",options:["Skips generations","Affects only males","Appears in every generation (vertical transmission)","Affects only females"],answer:2,explanation:"From L5 L6 Mendelian: Autosomal Inheritance Autosomal Dominant Inheritance Autosomal Dominant Inheritance \u2022 One parent must be affected \u2022 Can manifest in a heterozygote state \u2022 Usually transmitted from one generation to the next without skipping \u2022 Both males and females are equally affected \u2022 All form..."},{id:"mid1_mid1_L5_L6_Mendelian_4",exam:"mid1",lecture:"L5 L6 Mendelian",q:"A child presents with muscle weakness, neurological symptoms, and a history of similar symptoms affecting multiple siblings from the same mother. The father is unaffected. Which type of inheritance best explains this pattern?",options:["Autosomal domina th which type of disease?",options:["Cystic fibrosis","Marfan syndrome","Hemophilia","Neurofibromatosis"],answer:0,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_27",exam:"mid1",lecture:"L5 L6 Mendelian",q:"What's the mode of inheritance of this pedigree?",options:["Hollandaric","autosomal recessive","X\u2014linked recessive","autosomal dominent"],answer:0,explanation:"From L5 L6 Mendelian: \u20226- Calculate the probability to be affected with or carry a single-gene diseases ( autosomal dominant, autosomal recessive and X-linked inheritance) \u20227-Clinical examples of each. Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked).",image:"images/tb_p42_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_28",exam:"mid1",lecture:"L5 L6 Mendelian",q:"An affected male transmits the disease to all of his daughters but none of his sons. This pattern is most consistent with:",options:["X-linked recessive disorders","X-linked dominant disorders","Mitochondrial disorders","Autosomal dominant disorders"],answer:1,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_29",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is most likely to be a feature of the disorder shown in the pedigree?",options:["Maternal inheritance","Paternal inheritance","Autosomal dominant inheritance","X-linked recessive inheritance"],answer:0,explanation:"From L5 L6 Mendelian: Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked).",image:"images/tb_p44_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_30",exam:"mid1",lecture:"L5 L6 Mendelian",q:"There was a family which came in the clinic with a child diagnosed with sickle cell anemia what is the recurrence risk for this type of disease ?",options:["25% carrier","50% Carrier","100% Affected","50% Affected"],answer:1,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_31",exam:"mid1",lecture:"L5 L6 Mendelian",q:"A father is affected with an X-linked dominant disorder. Which of the following is true regarding this disease?",options:["Females are affected as well as males","The father transmits the disorder to all of his sons","Only males are affected","The disorder can skip generations"],answer:0,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_32",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, what is the most likely inheritance pattern?",options:["X-linked recessive","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:2,explanation:"The pedigree shows an affected female in generation I passing the trait to an affected male in generation II, who then has two affected children (both boy and girl) in generation III. This pattern of vertical transmission across three generations, affecting both sexes equally, is characteristic of autosomal dominant inheritance. Every generation has affected individuals and both males and females are affected.",image:"images/tb_p52_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_33",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shows consanguineous parents (indicated by a double line connecting them) with multiple affected children. What is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked dominant","Y-linked"],answer:1,explanation:"The pedigree shows consanguineous parents (double horizontal line) with some affected offspring (filled symbols) of both sexes. Parents are unaffected (carriers). The combination of parental consanguinity, unaffected carrier parents, and affected children of both sexes is the hallmark of autosomal recessive inheritance. Consanguinity increases the chance of sharing the same recessive allele.",image:"images/tb_p40_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_34",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, what is the most likely mode of inheritance?",options:["Autosomal dominant","Y-linked","Autosomal recessive","X-linked recessive"],answer:3,explanation:"The pedigree shows a carrier female (I-1, half-filled circle) with an unaffected male (I-2). Their children include an unaffected male (II-1), a carrier female (II-2), and an affected male (II-3). In the next generation, the proband (III-1) is an affected male. This pattern \u2014 unaffected carrier mother passing disease to half her sons, daughters may be carriers but unaffected \u2014 is classic X-linked recessive inheritance.",image:"images/tb_p45_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_35",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on this pedigree, what is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked dominant","X-linked recessive"],answer:3,explanation:"The pedigree shows carrier females (circles with dots, I-2 and I-4) in generation I. Their male offspring (II-3, III-1, III-3) are affected (filled squares), while females are either carriers or unaffected. The proband (III-1) is an affected male born to a carrier mother. No male-to-male transmission is seen, and all affected individuals are male. This is classic X-linked recessive inheritance.",image:"images/tb_p11_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_36",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shown demonstrates a consanguineous marriage (double line). Based on the pattern of affected and unaffected children, what is the most likely mode of inheritance?",options:["X-linked dominant","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:1,explanation:"The pedigree shows unaffected consanguineous parents (double horizontal line = related couple) with two deceased siblings (II-2 crossed, II-3 crossed) and children including one affected male (III-1, proband, arrow) and one affected female (III-5). Unaffected parents who are related (sharing a common ancestor) having affected children of both sexes is the hallmark of autosomal recessive inheritance. The consanguinity increases the probability of both parents carrying the same rare recessive allele.",image:"images/tb_p18_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_37",exam:"mid1",lecture:"L5 L6 Mendelian",q:"What inheritance pattern is most consistent with the pedigree shown?",options:["X-linked recessive","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:2,explanation:"The pedigree shows an affected mother (I-2) who transmits the disease to both affected sons (II-3) and affected daughters (II-5). The affected son (II-3) then has affected children (III-3, III-4, III-5) of both sexes. This vertical transmission \u2014 affected parent in every generation, both males and females affected, 50% recurrence risk \u2014 is characteristic of autosomal dominant inheritance.",image:"images/tb_p28_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_38",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shows a family with multiple generations where only the fourth generation has affected individuals (one male and one female). The answer states this is consistent with sickle cell anemia. What is the most likely mode of inheritance?",options:["Autosomal dominant (AD)","X-linked recessive (XLR)","Autosomal recessive (AR)","Mitochondrial inheritance"],answer:2,explanation:"The pedigree shows unaffected individuals in generations I, II, and III (who are all carriers), with affected offspring only appearing in generation IV. The disease skips multiple generations and affects both males and females equally. Sickle cell anemia (HbSS) is autosomal recessive, requiring two mutant HBB alleles. Carriers (HbAS, sickle cell trait) are asymptomatic. Both parents must be carriers for a child to be affected.",image:"images/p38_pedigree_q20.png"},{id:"mid1_mid1_L5_L6_Mendelian_39",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, with affected individuals appearing in multiple family lines across generations II and III (both males and females affected), what is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked recessive","Mitochondrial"],answer:0,explanation:"The pedigree shows affected males (filled squares) and affected females (filled circles) in multiple family branches across generations II and III. Affected individuals in every generation, transmitted from affected parent to approximately 50% of children regardless of sex, is the hallmark of autosomal dominant inheritance. This pattern rules out X-linked recessive (which would show only affected males) and autosomal recessive (which would skip generations).",image:"images/p44_pedigree_q3.png"},{id:"mid1_mid1_L7_Non_Mendelian_1",exam:"mid1",lecture:"L7 Non Mendelian",q:"What is the DNA sequence repeat associated with Huntington disease?",options:["CGG","GAA","CTG","CAG"],answer:3,ex

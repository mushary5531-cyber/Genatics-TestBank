 Responsible gene: FGFR3 (..."},{id:"mid2_mid2_L14_Approach_Patients_5",exam:"mid2",lecture:"L14 Approach Patients",q:"According to genetic counseling all the following is true except:",options:["Genetic counseling is directive.","Any physician can be a counselor.","It includes the discussion of the cause of the disease and the risk of transmission.","It should be done after genetic testing."],answer:1,explanation:"From L14 Approach Patients: Outline Multifactorial disorders Single gene disorders Chromosomal abnormalities Multifactorial Disorders \uEE76Multifactorial inheritance describes the action of multiple genes that interact with one another and with environmental factors to lead to a phenotype interaction of genetic and environmen..."},{id:"mid2_mid2_L9_Dysmorphology_1",exam:"mid2",lecture:"L9 Dysmorphology",q:"During dysmorphology assessment, a child is found to have a shortened",options:["Dolichocephaly","Plagiocephaly","Brachycephaly","Trigonocephaly"],answer:2,explanation:"From L9 Dysmorphology: objective OR Apparently shortened anteroposterior dimension (length) of the head compared to width. Dolichocephaly \u2022 Definition: Cephalic index less than 76% objective OR Apparently increased antero-posterior length of the head compared to width."},{id:"mid2_mid2_L9_Dysmorphology_2",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which term describes the presence of a small mandible?",options:["Macrognathia","Retrognathia","Micrognathia","Prognathia"],answer:2,explanation:"From L9 Dysmorphology: Micrognathia Definition: Apparently reduced length and width of the mandible when viewed from the front but not from the side Prognathism Definition: Anterior protrusion of the mandibular alveolar ridge beyond the vertical plane of the maxillary alveolar ridge, best appreciated in profile ..."},{id:"mid2_mid2_L9_Dysmorphology_3",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which term describes the presence of an extra digit?",options:["Syndactyly","Oligodactyly","Arachnodactyly","Polydactyly"],answer:3,explanation:'From L9 Dysmorphology: Hands \u2022 Arachnodactyly ("spider fingers") is a condition in which the fingers and toes are abnormally long and slender, in comparison to the palm of the hand and arch of the foot.) \u2022 Brachydactyly (short fingers & toes) Fingers \u2022 Polydactyly refers to extra fingers or toes (digits) that are p...'},{id:"mid2_mid2_L9_Dysmorphology_4",exam:"mid2",lecture:"L9 Dysmorphology",q:"A child has an increased distance between the eyes. Which term best",options:["Upslanting palpebral fissures","Hypotelorism","Hypertelorism","Anophthalmia"],answer:2,explanation:"From L9 Dysmorphology: Micrognathia Definition: Apparently reduced length and width of the mandible when viewed from the front but not from the side Prognathism Definition: Anterior protrusion of the mandibular alveolar ridge beyond the vertical plane of the maxillary alveolar ridge, best appreciated in profile ..."},{id:"mid2_mid2_L9_Dysmorphology_5",exam:"mid2",lecture:"L9 Dysmorphology",q:"What is the term used to describe the vertical groove between",options:["Philtrum","Hard palate","Soft palate","Pinna"],answer:0,explanation:"From L9 Dysmorphology: Mouth (Philtrum ) \u2022 the vertical groove between the base of the nose and the border of the upper lip. Hairline Hairline, High Anterior Definition: Distance between the hairline (trichion) and the glabella (the most prominent point on the frontal bone above the root of the nose), in the midline, more than two SD above the mean ."},{id:"mid2_mid2_L9_Dysmorphology_6",exam:"mid2",lecture:"L9 Dysmorphology",q:"A family with two affected boys presented to the genetic clinic.",options:["spinal compression","Calf pseudohypertrophy","Macrocephaly","Microcephaly"],answer:1,explanation:"From L9 Dysmorphology: 7- family history of similar condition, or any genetic disorder. Gain basic in taking personal and family medical histories related to genetic conditions."},{id:"mid2_mid2_L9_Dysmorphology_7",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following is considered as a major defect?",options:["Microcephaly","Lacrimal duct stenosis","Epicanthic fold","Brushfield spots of the iris"],answer:0,explanation:"From L9 Dysmorphology: Syndactyly (Fused Digits) (Fingers or Toes) Down Syndrome/Trisomy 21 Clinical Features: Newborn period: Hypotonia, excess nuchal skin Craniofacial: \u2022 Brachycephaly, microcephaly \u2022 Epicanthic folds, upslanting palpebral fissures, depressed nasal bridge \u2022 Protruding tongue \u2022 Small/low-set ears ..."},{id:"mid2_mid2_L9_Dysmorphology_8",exam:"mid2",lecture:"L9 Dysmorphology",q:"A female presented in the NICU with heart and renal abnormalities. Examination shows microcephaly, microphthalmia, hypertelorism, and postaxial polydactyly. What is the provisional diagnosis?",options:["Patau syndrome (Trisomy 13)","Down syndrome (Trisomy 21)","Edwards syndrome (Trisomy 18)","Turner syndrome (45,X)"],answer:0,explanation:"From L9 Dysmorphology: Attribution 4.0 International (CC BY 4.0) Patau syndrome/Trisomy 13 Clinical features: \u2022 Holoprosencephaly, microcephaly, scalp defects \u2022 Microphthalmia , low birth weight \u2022 Polydactyly \u2022 Midline cleft lip and palate \u2022 Cardiac and renal anomalies \u2022 Intellectual disability Inheritance: \u2022 75% ..."},{id:"mid2_mid2_L9_Dysmorphology_9",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following is considered a major anomaly?",options:["Lip pits","Anencephaly","Epicanthic fold","Clinodactyly"],answer:1,explanation:"From L9 Dysmorphology: Syndactyly (Fused Digits) (Fingers or Toes) Down Syndrome/Trisomy 21 Clinical Features: Newborn period: Hypotonia, excess nuchal skin Craniofacial: \u2022 Brachycephaly, microcephaly \u2022 Epicanthic folds, upslanting palpebral fissures, depressed nasal bridge \u2022 Protruding tongue \u2022 Small/low-set ears ... \u2022Shows which family members are affected or unaffected by a genetic disease."},{id:"mid2_mid2_L9_Dysmorphology_10",exam:"mid2",lecture:"L9 Dysmorphology",q:"The karyotype and clinical features shown in the image are characteristic of which syndrome?",options:["Turner syndrome (45,X)","Klinefelter syndrome (47,XXY)","Down syndrome (47,XX,+21)","Marfan syndrome"],answer:1,explanation:"The image shows the 47,XXY karyotype (Klinefelter syndrome) alongside the classic clinical features: absence of frontal baldness, poor beard growth, gynecomastia (breast development), female-type pubic hair pattern, small testes, wide hips, and long arms and legs. Klinefelter is the most common cause of male hypogonadism and infertility.",image:"images/tb_p62_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_11",exam:"mid2",lecture:"L9 Dysmorphology",q:"A boy uses his hands on his thighs to push himself to a standing position, as shown in the image. What does this sign indicate?",options:["Spastic paraplegia","Hip dysplasia","Proximal muscle weakness (Gower's sign)","Cerebellar ataxia"],answer:2,explanation:`Gower's sign is a clinical maneuver where a child with proximal muscle weakness (particularly pelvic girdle muscles) must use their hands to "walk up" their thighs to stand from a supine or squatting position. It is classically associated with Duchenne Muscular Dystrophy (DMD) \u2014 an X-linked recessive disorder caused by dystrophin gene mutations.`,image:"images/tb_p62_fig2.png"},{id:"mid2_mid2_L9_Dysmorphology_12",exam:"mid2",lecture:"L9 Dysmorphology",q:"A patient presents with the skin findings shown in the image (caf\xE9-au-lait spots, cutaneous neurofibromas, and plexiform neurofibroma). What is the most likely diagnosis?",options:["Tuberous sclerosis","Neurofibromatosis type 1 (NF1)","McCune-Albright syndrome","Von Hippel-Lindau disease"],answer:1,explanation:"The image shows the classic triad of Neurofibromatosis type 1 (NF1): (A) caf\xE9-au-lait spots on the back, (B) cutaneous/dermal neurofibromas, and (C) plexiform neurofibroma. NF1 is caused by loss-of-function mutations in the NF1 gene (tumor suppressor). It follows autosomal dominant inheritance, with high penetrance but variable expressivity. Lisch nodules (iris hamartomas) are also characteristic.",image:"images/tb_p64_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_13",exam:"mid2",lecture:"L9 Dysmorphology",q:"The patient shown in the image is very tall with long, slender limbs, arachnodactyly, and arm span exceeding height. Which of the following is the most likely diagnosis?",options:["Klinefelter syndrome (47,XXY)","Marfan syndrome","Achondroplasia","Homocystinuria"],answer:1,explanation:"The image shows the classic body habitus of Marfan syndrome: tall stature, dolichostenomelia (long slender limbs), arachnodactyly (spider fingers), arm span > height, and pectus deformity. Marfan syndrome is caused by mutations in FBN1 (fibrillin-1) and follows autosomal dominant inheritance. Major complications include aortic root dilation/dissection and ectopia lentis.",image:"images/tb_p24_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_14",exam:"mid2",lecture:"L9 Dysmorphology",q:"A newborn presented in the NICU with midline cleft lip and palate, polydactyly, and microphthalmia. What is the most likely karyotype?",options:["47,XX,+18","47,XY,+13","45,X","47,XXY"],answer:1,explanation:"The image shows a newborn with the classic features of Patau syndrome (trisomy 13): midline cleft lip and palate, postaxial polydactyly, microphthalmia, and scalp defects. Trisomy 13 results from non-disjunction (75%) or Robertsonian translocation (25%). It carries a very poor prognosis with most affected infants not surviving past the first year of life.",image:"images/tb_p46_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_15",exam:"mid2",lecture:"L9 Dysmorphology",q:"The child shown in the image has a small jaw, widely spaced eyes, and low-set ears. Which of the following findings best matches this facial phenotype?",options:["Macrostomia and prognathia","Micrognathia and hypertelorism","Macrostomia and micrognathia","Hypertelorism and macrocephaly"],answer:1,explanation:"The image shows a child with micrognathia (small mandible) and hypertelorism (widely spaced eyes), which are dysmorphic facial features seen in several syndromes including Edwards syndrome (trisomy 18), Pierre Robin sequence, and various chromosomal deletions. Careful assessment of additional features and genetic testing are required to determine the specific diagnosis.",image:"images/tb_p54_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_16",exam:"mid2",lecture:"L9 Dysmorphology",q:"The image shows three views of a child (front, back, side) with distinctive body proportions. What is the most likely diagnosis?",options:["Marfan syndrome","Turner syndrome","Down syndrome","Achondroplasia"],answer:0,explanation:"The three views show a child with classic Marfan syndrome features: tall stature with disproportionately long limbs, scoliosis visible on the back and side views, pectus deformity, and characteristic body habitus with arm span exceeding height. Marfan syndrome is caused by mutations in FBN1 (fibrillin-1) and follows autosomal dominant inheritance. Major complications include aortic root dilation, ectopia lentis, and scoliosis.",image:"images/p62_marfan_q1.png"},{id:"mid2_mid2_L9_Dysmorphology_17",exam:"mid2",lecture:"L9 Dysmorphology",q:"The child in the image shows a triangular face, prominent forehead, and small jaw. These features are consistent with intrauterine growth restriction and postnatal short stature. What is the most likely diagnosis?",options:["Down syndrome","Angelman syndrome","Silver-Russell syndrome","Williams syndrome"],answer:2,explanation:"Silver-Russell syndrome (SRS) is characterized by: severe intrauterine growth restriction (IUGR), postnatal short stature, relative macrocephaly at birth, triangular face with prominent forehead and small jaw (micrognathia), and body asymmetry. It is caused by loss of methylation at the H19/IGF2 imprinting control region on chromosome 11p15.5 (most common, ~50%) or maternal uniparental disomy of chromosome 7 (UPD(7)mat, ~10%).",image:"images/p63_silver_russell_q6.png"},{id:"mid2_mid2_L9_Dysmorphology_18",exam:"mid2",lecture:"L9 Dysmorphology",q:"A young child presents with very short stature, rhizomelic (proximal) shortening of the limbs, prominent forehead, depressed nasal bridge, and trident hands. What is the most likely diagnosis?",options:["Marfan syndrome","Osteogenesis imperfecta","Turner syndrome","Achondroplasia"],answer:3,explanation:"The image shows the classic features of achondroplasia: the most common form of short-limbed dwarfism. Features include: rhizomelic (proximal > distal) limb shortening, prominent forehead (frontal bossing), midface hypoplasia with depressed nasal bridge, trident configuration of hands, and normal intelligence. Achondroplasia is caused by gain-of-function mutations in FGFR3 (p.Gly380Arg in >99%), follows autosomal dominant inheritance, and most cases (~80%) are de novo mutations.",image:"images/p64_achondroplasia_q8.png"},{id:"mid2_mid2_L9_Dysmorphology_19",exam:"mid2",lecture:"L9 Dysmorphology",q:"The image shows a boy demonstrating Gower's sign while getting up from the floor. What is the mode of inheritance of the condition responsible for this finding?",options:["Autosomal dominant","Autosomal recessive","X-linked recessive","Mitochondrial"],answer:2,explanation:"Gower's sign is characteristic of Duchenne Muscular Dystrophy (DMD), which follows X-linked recessive inheritance. The DMD gene (encoding dystrophin) is located on Xp21.2. Males with one mutated X are affected; females with one mutated X are usually asymptomatic carriers (though some carrier females develop mild symptoms \u2014 lyonization). DMD affects ~1 in 3,500 males. ~30% of cases are de novo mutations.",image:"images/tb_p62_fig2.png"}],Er="gbq_seen";var zf=()=>new Set(JSON.parse(localStorage.getItem(Er)||"[]")),Nf=e=>{let a=zf();e.forEach(t=>a.add(t)),localStorage.setItem(Er,JSON.stringify([...a]))},Xp=()=>loca

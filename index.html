<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genetics TestBank</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #060913;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --indigo: #4f46e5;
  --sky: #38bdf8;
  --violet: #7c3aed;
}

body {
  background: var(--bg);
  color: #e2e8f0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  overflow-x: hidden;
}

/* ── Aurora ── */
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: aurora-float 14s ease-in-out infinite;
}
.aurora-1 {
  width: 520px; height: 520px;
  background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
  top: -120px; left: -100px;
  animation-delay: 0s;
}
.aurora-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
  top: 40%; right: -60px;
  animation-delay: -5s;
}
.aurora-3 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, #6d28d9 0%, transparent 70%);
  bottom: -80px; left: 30%;
  animation-delay: -9s;
}
@keyframes aurora-float {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-40px) scale(1.08); }
  66%      { transform: translate(-20px,30px) scale(0.95); }
}

/* ── Layout ── */
.screen-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  max-width: 720px;
  margin: 0 auto;
}

/* ── Title ── */
.main-title {
  font-size: 36px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 4px;
}
.shimmer-text {
  background: linear-gradient(90deg, #818cf8 0%, #38bdf8 30%, #a78bfa 60%, #818cf8 100%);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  to { background-position: 300% center; }
}
.subtitle {
  color: rgba(255,255,255,0.45);
  text-align: center;
  font-size: 15px;
  margin-top: -10px;
}

/* ── Glass card ── */
.glass-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px 22px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  width: 100%;
  max-width: 680px;
}
.section-label {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* ── Stagger animations ── */
.fade-in { animation: fadeUp 0.4s ease both; }
.stagger-1 { animation: fadeUp 0.4s ease 0.05s both; }
.stagger-2 { animation: fadeUp 0.4s ease 0.12s both; }
.stagger-3 { animation: fadeUp 0.4s ease 0.19s both; }
.stagger-4 { animation: fadeUp 0.4s ease 0.26s both; }
.stagger-5 { animation: fadeUp 0.4s ease 0.33s both; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Tabs ── */
.tab-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.tab-active {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 16px #7c3aed66;
}

/* ── Chips ── */
.chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s;
}
.chip:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
.chip-active {
  background: rgba(79,70,229,0.25);
  border-color: #818cf8;
  color: #c7d2fe;
}

/* ── Slider ── */
.custom-slider {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 99px;
  background: linear-gradient(90deg, #4f46e5, #38bdf8);
  outline: none;
  cursor: pointer;
}
.custom-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  box-shadow: 0 0 10px #818cf888;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.custom-slider::-webkit-slider-thumb:hover {
  box-shadow: 0 0 18px #818cf8cc;
}

/* ── Toggle ── */
.toggle-btn {
  width: 50px; height: 26px;
  border-radius: 99px;
  border: none;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  position: relative;
  transition: background 0.25s;
  flex-shrink: 0;
}
.toggle-on { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
.toggle-knob {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #fff;
  transition: left 0.25s;
  display: block;
}
.toggle-on .toggle-knob { left: 27px; }

/* ── Link btn ── */
.link-btn {
  background: none;
  border: none;
  color: #818cf8;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}
.link-btn:hover { color: #a5b4fc; }

/* ── Start button ── */
.start-btn {
  padding: 14px 40px;
  border-radius: 99px;
  border: none;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 24px #7c3aed66;
}
.start-btn:hover:not(:disabled) {
  transform: scale(1.04);
  box-shadow: 0 0 40px #7c3aed99;
}
.start-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  animation: none !important;
}
.glow-pulse {
  animation: glow-pulse 2.2s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { box-shadow: 0 0 24px #7c3aed66; }
  50%      { box-shadow: 0 0 48px #7c3aedcc; }
}

/* ── Exam badge ── */
.exam-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 99px;
  background: rgba(129,140,248,0.18);
  border: 1px solid rgba(129,140,248,0.35);
  color: #a5b4fc;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

/* ── Question text ── */
.question-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.7;
  color: rgba(255,255,255,0.92);
  margin-bottom: 20px;
}

/* ── Options ── */
.options-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.options-wrap .opt-btn {
  animation: slideInLeft 0.3s ease both;
}
@keyframes slideInLeft {
  from { opacity:0; transform: translateX(30px); }
  to   { opacity:1; transform: translateX(0); }
}
.opt-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.82);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  text-align: right;
  cursor: pointer;
  transition: all 0.18s;
  width: 100%;
}
.opt-btn:hover:not(.opt-correct):not(.opt-wrong):not(.opt-dim) {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.25);
}
.opt-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.opt-correct {
  border-color: #34d399 !important;
  background: rgba(52,211,153,0.12) !important;
  color: #6ee7b7 !important;
}
.opt-correct .opt-letter { background: rgba(52,211,153,0.3); }
.opt-wrong {
  border-color: #f87171 !important;
  background: rgba(248,113,113,0.12) !important;
  color: #fca5a5 !important;
}
.opt-wrong .opt-letter { background: rgba(248,113,113,0.3); }
.opt-dim { opacity: 0.35; cursor: default; }

/* ── Animations: bounce + shake ── */
.anim-bounce { animation: bounce-correct 0.5s ease; }
@keyframes bounce-correct {
  0%,100% { transform: scale(1); }
  30%      { transform: scale(1.04); }
  60%      { transform: scale(0.97); }
}
.anim-shake { animation: shake-wrong 0.45s ease; }
@keyframes shake-wrong {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}

/* ── Explanation box ── */
.explanation {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.7;
  direction: auto;
}
.expl-correct {
  background: rgba(52,211,153,0.1);
  border: 1px solid rgba(52,211,153,0.3);
  color: #a7f3d0;
}
.expl-wrong {
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  color: #fecaca;
}

/* ── Nav buttons ── */
.nav-btn {
  padding: 10px 22px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.18s;
}
.nav-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.12);
  color: #fff;
}
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-primary {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 14px #7c3aed55;
}
.nav-primary:hover { box-shadow: 0 0 24px #7c3aed99 !important; }

/* ── Review card ── */
.review-card { margin-bottom: 0; }

/* ── Responsive ── */
@media (max-width: 480px) {
  .main-title { font-size: 26px; }
  .glass-card { padding: 16px; }
  .question-text { font-size: 15px; }
}

</head>

A) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_3",exam:"mid1",lecture:"L7 Non Mendelian",q:"Genomic imprinting is an important factor in gene variation.",options:["Angelman syndrome and Prader-Willi syndrome","Angelman syndrome and Cystic fibrosis","Beckwith-Wiedemann syndrome and Silver-Russell syndrome","Huntington's disease and Duchenne muscular dystrophy"],answer:0,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_4",exam:"mid1",lecture:"L7 Non Mendelian",q:"The normal individual will have only one transcriptionally active",options:["Uniparental disomy","Mosaicism","Genomic imprinting","New mutation"],answer:2,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_5",exam:"mid1",lecture:"L7 Non Mendelian",q:"Matrilineal inheritance applies to disorders that are directly due",options:["Alpha globin gene","Mitochondrial DNA","tumor suppressor gene","CYP2C9"],answer:1,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_6",exam:"mid1",lecture:"L7 Non Mendelian",q:"Which of the following describes the presence of two types of",options:["Homoplasmy","Heterozygous","Heteroplasmy","Homozygous"],answer:2,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_7",exam:"mid1",lecture:"L7 Non Mendelian",q:"Which of the following correctly describes the repeat expansion in Huntington disease?",options:["CCG repeats; normal range 4-39 repeats","CTG repeats; normal range 5-37 repeats","CAG repeats; disease range more than 40 repeats","CGG repeats; disease range 200-900 repeats"],answer:2,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_8",exam:"mid1",lecture:"L7 Non Mendelian",q:"Genomic imprinting is best described as a situation where:",options:["The normal individual has only one transcriptionally active allele at a given locus, determined by parent of origin","The individual inherits both homologous chromosomes from one parent","The individual has more than one cell type with different genotypes","Disease onset occurs at an earlier age in the offspring than in the parent"],answer:0,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_9",exam:"mid1",lecture:"L7 Non Mendelian",q:"One of the following disorders is caused by a genetic imprinting",options:["Sickle cell anemia","Angelman syndrome","Huntington disease","Neurofibromatosis"],answer:1,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_10",exam:"mid1",lecture:"L7 Non Mendelian",q:"The pedigree shown represents a 3-generation family where only males are affected (filled squares). The carrier females (circles with dots) show no symptoms. What is the most likely mode of inheritance?",options:["Autosomal recessive","Autosomal dominant","X-linked recessive","Mitochondrial"],answer:2,explanation:"In the pedigree, only males are affected (filled squares), carrier females are unaffected (circles with dots). There is no male-to-male transmission (fathers don't pass it to sons directly; sons get the X from their mother). The carrier female (I-2) passes the X-linked trait to her sons. This is classic X-linked recessive inheritance \u2014 as seen in DMD, hemophilia A/B, and other X-linked conditions.",image:"images/p45_pedigree_dmd.png"},{id:"mid1_mid1_example_1",exam:"mid1",lecture:"example",q:"Which of the following best describes the central dogma of molecular biology?",options:["DNA \u2192 Protein \u2192 RNA","RNA \u2192 DNA \u2192 Protein","DNA \u2192 RNA \u2192 Protein","Protein \u2192 RNA \u2192 DNA"],answer:2,explanation:"The central dogma states that genetic information flows from DNA to RNA (transcription) and then from RNA to Protein (translation)."},{id:"mid1_mid1_example_2",exam:"mid1",lecture:"example",q:"A codon consists of how many nucleotide bases?",options:["1","2","3","4"],answer:2,explanation:"A codon is a triplet of nucleotide bases that codes for a specific amino acid or stop signal."},{id:"mid2_mid2_L10_Birth_Defects_1",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn is diagnosed with an isolated congenital heart defect. Which",options:["Dysplasia","Disruption","Malformation","Deformation"],answer:2,explanation:"A malformation is a primary structural defect arising from an intrinsic abnormality in a developmental process (e.g., congenital heart defects, cleft lip/palate, neural tube defects). It is primary and intrinsic."},{id:"mid2_mid2_L10_Birth_Defects_2",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following birth defects is considered a disruption?",options:["Congenital heart defect","Neural tube defect","Cleft lip and palate","Amniotic band syndrome"],answer:3,explanation:"A disruption is a secondary and extrinsic birth defect caused by an external destructive force that breaks down or interferes with an otherwise normal developmental process. Amniotic bands can wrap around limbs and cause disruption. It is NOT genetic."},{id:"mid2_mid2_L10_Birth_Defects_3",exam:"mid2",lecture:"L10 Birth Defects",q:"Certain malformations tend to occur together more frequently than",options:["Down syndrome","VACTERL association","Ectodermal dysplasia","Cleft lip and palate"],answer:1,explanation:"An association is a non-random occurrence of multiple anomalies that are not a known syndrome or sequence. VACTERL is an example (Vertebral, Anal, Cardiac, Tracheo-Esophageal, Renal, Limb anomalies)."},{id:"mid2_mid2_L10_Birth_Defects_4",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn presents with vertebral anomalies, anal atresia,",options:["Potter sequence","Van der Woude syndrome","VATER association","Ectodermal dysplasia"],answer:2,explanation:"VATER/VACTERL association includes: Vertebral anomalies, Anal atresia, Cardiac defects, Tracheo-Esophageal fistula, Renal anomalies, Limb defects. It has no known single genetic cause and normal WES/microarray."},{id:"mid2_mid2_L10_Birth_Defects_5",exam:"mid2",lecture:"L10 Birth Defects",q:"A male newborn with vertebral anomalies, anal atresia, tracheoesophageal",options:["Potter sequence","VATER association","Van der Woude syndrome","Ectodermal dysplasia"],answer:1,explanation:"VATER association is non-random co-occurrence of structural anomalies with no identifiable genetic cause (normal chromosomes and microarray). The presence of radial ray defects is characteristic. This is an association, not a syndrome."},{id:"mid2_mid2_L10_Birth_Defects_6",exam:"mid2",lecture:"L10 Birth Defects",q:"Elevated amniotic alpha fetoprotein (AFP) has been detected prenatally",options:["Vitamin B12","Folic acid","IgA","Immunosuppressant"],answer:1,explanation:"Elevated AFP indicates an open neural tube defect (NTD) such as anencephaly or spina bifida. Periconceptional folic acid supplementation significantly reduces the risk of NTDs. The image shows a meningomyelocele (spina bifida), the most common open NTD.",image:"images/tb_p66_fig1.png"},{id:"mid2_mid2_L10_Birth_Defects_7",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following terms describes the abnormal mechanical force",options:["Malformation","Disruption","Deformation","Dysplasia"],answer:2,explanation:"Deformation is caused by abnormal mechanical forces (extrinsic) that distort an otherwise normally formed structure. Examples include clubfoot (talipes equinovarus) from uterine constraint, and positional plagiocephaly. It differs from disruption in that the structure was initially normal."},{id:"mid2_mid2_L10_Birth_Defects_8",exam:"mid2",lecture:"L10 Birth Defects",q:"What is the best description of disruption?",options:["Primary and extrinsic","Secondary and extrinsic","Primary and intrinsic","Secondary and intrinsic"],answer:1,explanation:"Disruption is secondary (the original structure was forming normally) and extrinsic (caused by an outside destructive factor such as amniotic bands, infection, or ischemia). Malformation, by contrast, is primary and intrinsic."},{id:"mid2_mid2_L10_Birth_Defects_9",exam:"mid2",lecture:"L10 Birth Defects",q:"What is correct regarding neural tube defects?",options:["Anencephaly results from a defect in the lower end of the neural tube","The risk can be reduced by periconceptional folic acid supplementation","The recurrence risk from an affected parent is 10%","Spina bifida results from failure of cranial neural tube closure"],answer:1,explanation:"Periconceptional folic acid supplementation (before and during early pregnancy) reduces NTD risk by 50-70%. Anencephaly results from failure of CRANIAL (anterior) neural tube closure. Spina bifida results from failure of CAUDAL (posterior) closure. Recurrence risk is approximately 2-3%, not 10%."},{id:"mid2_mid2_L10_Birth_Defects_10",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following is caused by abnormal organization of tissue?",options:["Ectodermal dysplasia","Spina bifida","Cleft palate","Talipes"],answer:0,explanation:"Dysplasia refers to abnormal organization or function of cells within a specific tissue type. Ectodermal dysplasia results from abnormal development of ectodermal tissue (affecting hair, skin, teeth, nails, sweat glands). Most dysplasias are due to single gene defects."},{id:"mid2_mid2_L10_Birth_Defects_11",exam:"mid2",lecture:"L10 Birth Defects",q:"A family came with their 7-year-old girl and 5-year-old boy, complaining",options:["Male infertility due to testicular atrophy","Male infertility due to congenital bilateral absence of the vas deferens","Female infertility due to ovarian failure","Infertility due to primary ciliary dyskinesia"],answer:1,explanation:"The clinical picture describes cystic fibrosis (CF) \u2014 autosomal recessive CFTR mutation. Males with CF frequently have congenital bilateral absence of the vas deferens (CBAVD), causing obstructive azoospermia and infertility. Testicular function is normal. Females with CF have reduced fertility due to thick cervical mucus, but not ovarian failure."},{id:"mid2_mid2_L10_Birth_Defects_12",exam:"mid2",lecture:"L10 Birth Defects",q:"Which medication, if given in the first trimester of pregnancy, helps",options:["Streptomycin","Folic acid","Isoniazid","Valproic acid"],answer:1,explanation:"Folic acid (vitamin B9) given periconceptionally and in the first trimester prevents neural tube defects (NTDs) by supporting proper neural tube closure. Streptomycin is ototoxic (teratogen). Isoniazid and valproic acid are potentially harmful teratogens; valproic acid is actually associated with INCREASED risk of NTDs."},{id:"mid2_mid2_L10_Birth_Defects_13",exam:"mid2",lecture:"L10 Birth Defects",q:"The image shows a newborn with a protrusion of abdominal contents through the umbilicus, covered by a thin membrane. What type of birth defect does this represent and what is the correct term for this finding?",options:["Disruption \u2014 gastroschisis","Malformation \u2014 omphalocele","Deformation \u2014 umbilical hernia","Dysplasia \u2014 abdominal wall dystrophy"],answer:1,explanation:"Omphalocele is a malformation (primary, intrinsic defect) where abdominal organs herniate through the umbilical ring and are covered by a peritoneal membrane. It differs from gastroschisis (a disruption) where organs herniate through a defect lateral to the umbilicus with NO covering membrane. Omphalocele is associated with chromosomal abnormalities (trisomy 13, 18) and BWS syndrome.",image:"images/tb_p65_fig1.png"},{id:"mid2_mid2_L11_DNA_Repair_1",exam:"mid2",lecture:"L11 DNA Repair",q:"Which DNA repair mechanism involves the enzyme DNA glycosylase?",options:["Mismatch repair","Nucleotide excision repair","Base excision repair" ["MLPA","FISH","Microarray","Sanger sequencing"],answer:0,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_5",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Sara is a 30 years old female who came to a genetic",options:["chromosome microarray","MLPA","sanger sequencing","whole exome sequences"],answer:2,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_6",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A 47-year-old female patient is referred to the genetic clinic,",options:["Gene panel","Chromosomal analysis","Search for MLH mutation","Sanger sequencing"],answer:0,explanation:"From L13 Molecular Techniques: Confirmation a de novo mutation in a patient (by testing the mutation in the parent) 4/6/26 15 Sanger Sequencing Examples of diseases which can be diagnosed with Sanger Sequencing: Cystic Fibrosis (CF) Responsible gene: CFTR (cystic fibrosis transmembrane conductance regulator) Cytogenetic loc..."},{id:"mid2_mid2_L13_Molecular_Techniques_7",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What is the best genetic testing method to detect a chromosomal duplication smaller than 3 megabase pairs?",options:["Chromosomal microarray","Conventional chromosomal analysis (karyotype)","MLPA","Southern blot"],answer:0,explanation:"From L13 Molecular Techniques: Nucleic Acid Hybridization: involves mixing DNA from two sources that have been denatured by heat or alkali to make them single-stranded and then, under the appropriate conditions, allowing complementary base pairing of homologous sequences to identify a specific DNA sequences Molecular Methods \u2022..."},{id:"mid2_mid2_L13_Molecular_Techniques_8",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Which of the following methods is used for separation of DNA",options:["Polymerase chain reaction (PCR)","Restriction digestion","Gel electrophoresis","Bacterial transformation"],answer:2,explanation:"From L13 Molecular Techniques: - It is a variation of the multiplex PCR that permits amplification of multiple targets with only a single primer Multiplex Ligation-Dependent Probe Amplification (MLPA) 4/6/26 12 Example of disease which can be diagnosed with MLPA: Duchenne Muscular Dystrophy (DMD) \u2022 The most common and most..."},{id:"mid2_mid2_L13_Molecular_Techniques_9",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The Sanger sequencing result shown in the image was performed on a proband, his father, his mother, and a reference sequence. What is the most accurate interpretation?",options:["Proband is homozygous mutant; father is carrier; mother is normal","Proband is heterozygous mutant; father is heterozygous carrier; mother is normal","Proband is normal; father is mutant; mother is carrier","All three family members are heterozygous carriers"],answer:1,explanation:"The proband (and father) show an extra elevated peak (arrow) above the baseline at a specific position compared to the reference sequence, indicating a heterozygous mutation. The mother's trace follows the reference exactly (normal). This pattern suggests the mutation was inherited from the carrier father (autosomal dominant or X-linked, depending on the gene). The mother is not a carrier.",image:"images/tb_p63_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_10",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The chromosomal microarray result shown in the image demonstrates a copy number variant. How would you interpret this finding?",options:["Homozygous deletion on chromosome 5","Heterozygous duplication on chromosome 5","Trisomy of chromosome 5","Hemizygous deletion on chromosome 5"],answer:1,explanation:"The microarray shows a segment on chromosome 5 where the blue line (representing copy number ratio) shifts UPWARD above baseline, indicating an INCREASE in copy number. Since only one line is elevated (not tripling), this represents a HETEROZYGOUS DUPLICATION (one normal copy + one duplicated region). Microarray can detect CNVs too small to see on conventional karyotype.",image:"images/tb_p63_fig2.png"},{id:"mid2_mid2_L13_Molecular_Techniques_11",exam:"mid2",lecture:"L13 Molecular Techniques",q:"DNA fingerprinting (STR profiling) was performed on samples from a crime scene, a victim, and two suspects. Which suspect is most likely the criminal based on the image?",options:["Suspect 1","Suspect 2","Both suspects","Neither suspect matches"],answer:1,explanation:"DNA fingerprinting compares short tandem repeat (STR) band patterns. The criminal should have bands matching the crime scene sample. In the image, Suspect 2's band pattern matches the crime scene pattern, while Suspect 1's pattern does not. DNA fingerprinting is highly discriminatory because the probability of two unrelated individuals sharing the same STR profile is extremely low.",image:"images/tb_p87_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_12",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The RFLP Southern blot shown in the image was performed for sickle cell anemia diagnosis. The family includes Mother (M), Father (F), and three children (C1, C2, C3). Based on the band pattern, which child is affected with sickle cell anemia?",options:["C1","C2","C3","None of the children are affected"],answer:2,explanation:"In RFLP-based SCA diagnosis using Mst II restriction enzyme: the normal \u03B2A allele is cut (giving two smaller bands), while the sickle \u03B2S allele is NOT cut (giving one larger band). Homozygous normal: 2 bands. Carrier (heterozygous): 3 bands. Affected (homozygous HbSS): 1 band. C3 shows the pattern consistent with affected status (homozygous HbSS).",image:"images/tb_p88_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_13",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A paternity test was performed using DNA fingerprinting. The blot shows Mother, Child, Alleged Father, and two ladder controls. What is the conclusion?",options:["The alleged father is excluded as the biological father","The alleged father is confirmed as the biological father","The test is inconclusive","The child's pattern matches neither parent"],answer:1,explanation:"In paternity testing, a child inherits 50% of their DNA bands from the mother and 50% from the father. Any bands in the child NOT present in the mother must be present in the biological father. In this blot, the unique bands of the child (those not from the mother) match the alleged father's pattern, confirming paternity.",image:"images/tb_p88_fig2.png"},{id:"mid2_mid2_L14_Approach_Patients_1",exam:"mid2",lecture:"L14 Approach Patients",q:"A family with two affected boys presented to the genetic clinic.",options:["High creatine kinase level.","Low creatine kinase level.","Normal creatine kinase level.","No change to creatine kinase level."],answer:0,explanation:"From L14 Approach Patients: X-Linked Disorders \u2022 Duchenne muscular dystrophy \u2022 Fragile X syndrome (covered in Non- Mendelian inheritance lecture) Duchenne Muscular Dystrophy Responsible gene: DMD (Dystrophin) Cytogenetic locus: Xp21 Inheritance: X-linked recessive Clinical features: \u2022 Progressive muscular weakness and was..."},{id:"mid2_mid2_L14_Approach_Patients_2",exam:"mid2",lecture:"L14 Approach Patients",q:"A family with two affected boys presented to the genetic clinic.",options:["Dystrophin encoding gene","Neurofibromin encod ","Any physician can be a counselor.","It includes the discussion of the cause of the disease and the risk of transmission.","It should be done after genetic testing."],answer:1,explanation:"From L14 Approach Patients: Outline Multifactorial disorders Single gene disorders Chromosomal abnormalities Multifactorial Disorders \uEE76Multifactorial inheritance describes the action of multiple genes that interact with one another and with environmental factors to lead to a phenotype interaction of genetic and environmen..."},{id:"mid2_mid2_L9_Dysmorphology_1",exam:"mid2",lecture:"L9 Dysmorphology",q:"During dysmorphology assessment, a child is found to have a shortened",options:["Dolichocephaly","Plagiocephaly","Brachycephaly","Trigonocephaly"],answer:2,explanation:"From L9 Dysmorphology: objective OR Apparently shortened anteroposterior dimension (length) of the head compared to width. Dolichocephaly \u2022 Definition: Cephalic index less than 76% objective OR Apparently increased antero-posterior length of the head compared to width."},{id:"mid2_mid2_L9_Dysmorphology_2",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which term describes the presence of a small mandible?",options:["Macrognathia","Retrognathia","Micrognathia","Prognathia"],answer:2,explanation:"From L9 Dysmorphology: Micrognathia Definition: Apparently reduced length and width of the mandible when viewed from the front but not from the side Prognathism Definition: Anterior protrusion of the mandibular alveolar ridge beyond the vertical plane of the maxillary alveolar ridge, best appreciated in profile ..."},{id:"mid2_mid2_L9_Dysmorphology_3",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which term describes the presence of an extra digit?",options:["Syndactyly","Oligodactyly","Arachnodactyly","Polydactyly"],answer:3,explanation:'From L9 Dysmorphology: Hands \u2022 Arachnodactyly ("spider fingers") is a condition in which the fingers and toes are abnormally long and slender, in comparison to the palm of the hand an morphology: Syndactyly (Fused Digits) (Fingers or Toes) Down Syndrome/Trisomy 21 Clinical Features: Newborn period: Hypotonia, excess nuchal skin Craniofacial: \u2022 Brachycephaly, microcephaly \u2022 Epicanthic folds, upslanting palpebral fissures, depressed nasal bridge \u2022 Protruding tongue \u2022 Small/low-set ears ..."},{id:"mid2_mid2_L9_Dysmorphology_8",exam:"mid2",lecture:"L9 Dysmorphology",q:"A female presented in the NICU with heart and renal abnormalities. Examination shows microcephaly, microphthalmia, hypertelorism, and postaxial polydactyly. What is the provisional diagnosis?",options:["Patau syndrome (Trisomy 13)","Down syndrome (Trisomy 21)","Edwards syndrome (Trisomy 18)","Turner syndrome (45,X)"],answer:0,explanation:"From L9 Dysmorphology: Attribution 4.0 International (CC BY 4.0) Patau syndrome/Trisomy 13 Clinical features: \u2022 Holoprosencephaly, microcephaly, scalp defects \u2022 Microphthalmia , low birth weight \u2022 Polydactyly \u2022 Midline cleft lip and palate \u2022 Cardiac and renal anomalies \u2022 Intellectual disability Inheritance: \u2022 75% ..."},{id:"mid2_mid2_L9_Dysmorphology_9",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following is considered a major anomaly?",options:["Lip pits","Anencephaly","Epicanthic fold","Clinodactyly"],answer:1,explanation:"From L9 Dysmorphology: Syndactyly (Fused Digits) (Fingers or Toes) Down Syndrome/Trisomy 21 Clinical Features: Newborn period: Hypotonia, excess nuchal skin Craniofacial: \u2022 Brachycephaly, microcephaly \u2022 Epicanthic folds, upslanting palpebral fissures, depressed nasal bridge \u2022 Protruding tongue \u2022 Small/low-set ears ... \u2022Shows which family members are affected or unaffected by a genetic disease."},{id:"mid2_mid2_L9_Dysmorphology_10",exam:"mid2",lecture:"L9 Dysmorphology",q:"The karyotype and clinical features shown in the image are characteristic of which syndrome?",options:["Turner syndrome (45,X)","Klinefelter syndrome (47,XXY)","Down syndrome (47,XX,+21)","Marfan syndrome"],answer:1,explanation:"The image shows the 47,XXY karyotype (Klinefelter syndrome) alongside the classic clinical features: absence of frontal baldness, poor beard growth, gynecomastia (breast development), female-type pubic hair pattern, small testes, wide hips, and long arms and legs. Klinefelter is the most common cause of male hypogonadism and infertility.",image:"images/tb_p62_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_11",exam:"mid2",lecture:"L9 Dysmorphology",q:"A boy uses his hands on his thighs to push himself to a standing position, as shown in the image. What does this sign indicate?",options:["Spastic paraplegia","Hip dysplasia","Proximal muscle weakness (Gower's sign)","Cerebellar ataxia"],answer:2,explanation:`Gower's sign is a clinical maneuver where a child with proximal muscle weakness (particularly pelvic girdle muscles) must use their hands to "walk up" their thighs to stand from a supine or squatting position. It is classically associated with Duchenne Muscular Dystrophy (DMD) \u2014 an X-linked recessive disorder caused by dystrophin gene mutations.`,image:"images/tb_p62_fig2.png"},{id:"mid2_mid2_L9_Dysmorphology_12",exam:"mid2",lecture:"L9 Dysmorphology",q:"A patient presents with the skin findings shown in the image (caf\xE9-au-lait spots, cutaneous neurofibromas, and plexiform neurofibroma). What is the most likely diagnosis?",options:["Tuberous sclerosis","Neurofibromatosis type 1 (NF1)","McCune-Albright syndrome","Von Hippel-Lindau disease"],answer:1,explanation:"The image shows the classic triad of Neurofibromatosis type 1 (NF1): (A) caf\xE9-au-lait spots on the back, (B) cutaneous/dermal neurofibromas, and (C) plexiform neurofibroma. NF1 is caused by loss-of-function mutations in the NF1 gene (tumor suppressor). It follows autosomal dominant inheritance, with high penetrance but variable expressivity. Lisch nodules (iris hamartomas) are also characteristic.",image:"images/tb_p64_fig1.png"}],qc="gbq_seen"

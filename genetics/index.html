 with or carry a single-gene diseases ( autosomal dominant, autosomal recessive and X-linked inheritance) \u20227-Clinical examples of each."},{id:"mid1_mid1_L5_L6_Mendelian_21",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is an example of matrilineal inheritance?",options:["MELAS (mitochondrial encephalopathy, lactic acidosis, strok like episodes)","Cystic Fibrosis","Achondroplasia","Rett Syndrome"],answer:0,explanation:"From L5 L6 Mendelian: But \u2022 Sometime AD trait appears in individuals with no family history of the disorders \u2022 Example: Achondroplasia (short limbed dwarfism), in which parents have normal stature."},{id:"mid1_mid1_L5_L6_Mendelian_22",exam:"mid1",lecture:"L5 L6 Mendelian",q:"A male (46 chromosomes) is affected with an X-linked dominant disorder and wants to get married. What is the recurrence risk for his children?",options:["All daughters affected, none of the sons affected","All sons affected, none of the daughters affected","50% risk for each pregnancy","Only firstborn daughter affected"],answer:0,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_23",exam:"mid1",lecture:"L5 L6 Mendelian",q:"A 10-year-old boy with a genetic disorder comes to the clinic. He has a similarly affected sister. His father and paternal grandmother are also affected. What is the recurrence risk?",options:["25% for each pregnancy","50% for each pregnancy","All children will be affected","Only male children will be affected"],answer:1,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_24",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is true about mitochondrial DNA",options:["codes for 70 genes","It is circular, single stranded DNA","inherited almost exclusively from the oocyte","type of mendelian inheritance"],answer:2,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_25",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is correct about Autosomal recessive trait?",options:["Only manifest in male","Manifest in heterozygous","Recurrence risk is 50% in females carriers","Skip generations"],answer:3,explanation:"From L5 L6 Mendelian: Autosomal Recessive Inheritance Autosomal Recessive Disorders \u2022 Parents are apparently normal \u2022 Parents are heterozygous carriers \u2022 Usually skipped generations \u2022Both males and females are equally affected \u2022Parents tend to be related more often than parents in general population."},{id:"mid1_mid1_L5_L6_Mendelian_26",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Consanguineous parents have a higher risk of having children with which type of disease?",options:["Cystic fibrosis","Marfan syndrome","Hemophilia","Neurofibromatosis"],answer:0,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_27",exam:"mid1",lecture:"L5 L6 Mendelian",q:"What's the mode of inheritance of this pedigree?",options:["Hollandaric","autosomal recessive","X\u2014linked recessive","autosomal dominent"],answer:0,explanation:"From L5 L6 Mendelian: \u20226- Calculate the probability to be affected with or carry a single-gene diseases ( autosomal dominant, autosomal recessive and X-linked inheritance) \u20227-Clinical examples of each. Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked).",image:"images/tb_p42_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_28",exam:"mid1",lecture:"L5 L6 Mendelian",q:"An affected male transmits the disease to all of his daughters but none of his sons. This pattern is most consistent with:",options:["X-linked recessive disorders","X-linked dominant disorders","Mitochondrial disorders","Autosomal dominant disorders"],answer:1,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_29",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is most likely to be a feature of the disorder shown in the pedigree?",options:["Maternal inheritance","Paternal inheritance","Autosomal dominant inheritance","X-linked recessive inheritance"],answer:0,explanation:"From L5 L6 Mendelian: Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked).",image:"images/tb_p44_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_30",exam:"mid1",lecture:"L5 L6 Mendelian",q:"There was a family which came in the clinic with a child diagnosed with sickle cell anemia what is the recurrence risk for this type of disease ?",options:["25% carrier","50% Carrier","100% Affected","50% Affected"],answer:1,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_31",exam:"mid1",lecture:"L5 L6 Mendelian",q:"A father is affected with an X-linked dominant disorder. Which of the following is true regarding this disease?",options:["Females are affected as well as males","The father transmits the disorder to all of his sons","Only males are affected","The disorder can skip generations"],answer:0,explanation:"From L5 L6 Mendelian: Autosomal Recessive Disorders Recurrence risk is 25%  per each pregnancy Sickle Cell Anemia AR Microcephaly Albinism Cystic Fibrosis Sex Linked Inheritance X-linked Recessive X-linked Recessive \u2022 Transmitted through carrier females to affect th..."},{id:"mid1_mid1_L5_L6_Mendelian_32",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, what is the most likely inheritance pattern?",options:["X-linked recessive","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:2,explanation:"The pedigree shows an affected female in generation I passing the trait to an affected male in generation II, who then has two affected children (both boy and girl) in generation III. This pattern of vertical transmission across three generations, affecting both sexes equally, is characteristic of autosomal dominant inheritance. Every generation has affected individuals and both males and females are affected.",image:"images/tb_p52_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_33",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shows consanguineous parents (indicated by a double line connecting them) with multiple affected children. What is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked dominant","Y-linked"],answer:1,explanation:"The pedigree shows consanguineous parents (double horizontal line) with some affected offspring (filled symbols) of both sexes. Parents are unaffected (carriers). The combination of parental consanguinity, unaffected carrier parents, and affected children of both sexes is the hallmark of autosomal recessive inheritance. Consanguinity increases the chance of sharing the same recessive allele.",image:"images/tb_p40_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_34",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, what is the most likely mode of inheritance?",options:["Autosomal dominant","Y-linked","Autosomal recessive","X-linked recessive"],answer:3,explanation:"The pedigree shows a carrier female (I-1, half-filled circle) with an unaffected male (I-2). Their children include an unaffected male (II-1), a carrier female (II-2), and an affected male (II-3). In the next generation, the proband (III-1) is an affected male. This pattern \u2014 unaffected carrier mother passing disease to half her sons, daughters may be carriers but unaffected \u2014 is classic X-linked recessive inheritance.",image:"images/tb_p45_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_35",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on this pedigree, what is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked dominant","X-linked recessive"],answer:3,explanation:"The pedigree shows carrier females (circles with dots, I-2 and I-4) in generation I. Their male offspring (II-3, III-1, III-3) are affected (filled squares), while females are either carriers or unaffected. The proband (III-1) is an affected male born to a carrier mother. No male-to-male transmission is seen, and all affected individuals are male. This is classic X-linked recessive inheritance.",image:"images/tb_p11_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_36",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shown demonstrates a consanguineous marriage (double line). Based on the pattern of affected and unaffected children, what is the most likely mode of inheritance?",options:["X-linked dominant","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:1,explanation:"The pedigree shows unaffected consanguineous parents (double horizontal line = related couple) with two deceased siblings (II-2 crossed, II-3 crossed) and children including one affected male (III-1, proband, arrow) and one affected female (III-5). Unaffected parents who are related (sharing a common ancestor) having affected children of both sexes is the hallmark of autosomal recessive inheritance. The consanguinity increases the probability of both parents carrying the same rare recessive allele.",image:"images/tb_p18_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_37",exam:"mid1",lecture:"L5 L6 Mendelian",q:"What inheritance pattern is most consistent with the pedigree shown?",options:["X-linked recessive","Autosomal recessive","Autosomal dominant","Mitochondrial"],answer:2,explanation:"The pedigree shows an affected mother (I-2) who transmits the disease to both affected sons (II-3) and affected daughters (II-5). The affected son (II-3) then has affected children (III-3, III-4, III-5) of both sexes. This vertical transmission \u2014 affected parent in every generation, both males and females affected, 50% recurrence risk \u2014 is characteristic of autosomal dominant inheritance.",image:"images/tb_p28_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_38",exam:"mid1",lecture:"L5 L6 Mendelian",q:"The pedigree shows a family with multiple generations where only the fourth generation has affected individuals (one male and one female). The answer states this is consistent with sickle cell anemia. What is the most likely mode of inheritance?",options:["Autosomal dominant (AD)","X-linked recessive (XLR)","Autosomal recessive (AR)","Mitochondrial inheritance"],answer:2,explanation:"The pedigree shows unaffected individuals in generations I, II, and III (who are all carriers), with affected offspring only appearing in generation IV. The disease skips multiple generations and affects both males and females equally. Sickle cell anemia (HbSS) is autosomal recessive, requiring two mutant HBB alleles. Carriers (HbAS, sickle cell trait) are asymptomatic. Both parents must be carriers for a child to be affected.",image:"images/p38_pedigree_q20.png"},{id:"mid1_mid1_L5_L6_Mendelian_39",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Based on the pedigree shown, with affected individuals appearing in multiple family lines across generations II and III (both males and females affected), what is the most likely mode of inheritance?",options:["Autosomal dominant","Autosomal recessive","X-linked recessive","Mitochondrial"],answer:0,explanation:"The pedigree shows affected males (filled squares) and affected females (filled circles) in multiple family branches across generations II and III. Affected individuals in every generation, transmitted from affected parent to approximately 50% of children regardless of sex, is the hallmark of autosomal dominant inheritance. This pattern rules out X-linked recessive (which would show only affected males) and autosomal recessive (which would skip generations).",image:"images/p44_pedigree_q3.png"},{id:"mid1_mid1_L7_Non_Mendelian_1",exam:"mid1",lecture:"L7 Non Mendelian",q:"What is the DNA sequence repeat associated with Huntington disease?",options:["CGG","GAA","CTG","CAG"],answer:3,explanation:"From L7 Non Mendelian: Clinical Manifestation of Mitochondrial Disorders Anticipation & Repeat Expansion Anticipation \u2022 If the onset of the disease occurs at earlier age in the offspring than in the parents \u2022 And/or the disease occurs with increasing severity in subsequent generations \u2192this phenomenon is called ..."},{id:"mid1_mid1_L7_Non_Mendelian_2",exam:"mid1",lecture:"L7 Non Mendelian",q:"From which cell are mitochondrial diseases transmitted to offspring?",options:["Sperm cell","Somatic cell","Stem cell","Oocyte"],answer:3,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_3",exam:"mid1",lecture:"L7 Non Mendelian",q:"Genomic imprinting is an important factor in gene variation. Which of the following is an example of genital imprinting?",options:["Angelman syndrome and Prader-Willi syndrome","Angelman syndrome and Cystic fibrosis","Beckwith-Wiedemann syndrome and Silver-Russell syndrome","Huntington's disease and Duchenne muscular dystrophy"],answer:0,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_4",exam:"mid1",lecture:"L7 Non Mendelian",q:"The normal individual will have only one transcriptionally active copy of the gene. What is the most common explanation of this process of gene silencing?",options:["Uniparental disomy","Mosaicism","Genomic imprinting","New mutation"],answer:2,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_5",exam:"mid1",lecture:"L7 Non Mendelian",q:"Matrilineal inheritance applies to disorders that are directly due to mutations in which of the following?",options:["Alpha globin gene","Mitochondrial DNA","tumor suppressor gene","CYP2C9"],answer:1,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_6",exam:"mid1",lecture:"L7 Non Mendelian",q:"Which of the following describes the presence of two types of mitochondrial DNA (normal and abnormal)?",options:["Homoplasmy","Heterozygous","Heteroplasmy","Homozygous"],answer:2,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_7",exam:"mid1",lecture:"L7 Non Mendelian",q:"Which of the following correctly describes the repeat expansion in Huntington disease?",options:["CCG repeats; normal range 4-39 repeats","CTG repeats; normal range 5-37 repeats","CAG repeats; disease range more than 40 repeats","CGG repeats; disease range 200-900 repeats"],answer:2,explanation:"From L7 Non Mendelian: Available from: https://www.ncbi.nlm.nih.gov/books/NBK1144/ Mitochondrial Inheritance Mitochondrial Inheritance \u2022 The great majority of the genetic diseases caused by defects in the nuclear genome (nuclear DNA) \u2022 However, a small but significant number of the diseases can be caused by m..."},{id:"mid1_mid1_L7_Non_Mendelian_8",exam:"mid1",lecture:"L7 Non Mendelian",q:"Genomic imprinting is best described as a situation where:",options:["The normal individual has only one transcriptionally active allele at a given locus, determined by parent of origin","The individual inherits both homologous chromosomes from one parent","The individual has more than one cell type with different genotypes","Disease onset occurs at an earlier age in the offspring than in the parent"],answer:0,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_9",exam:"mid1",lecture:"L7 Non Mendelian",q:"One of the following disorders is caused by a genetic imprinting defect leading to developmental delay, seizures, and a happy demeanor:",options:["Sickle cell anemia","Angelman syndrome","Huntington disease","Neurofibromatosis"],answer:1,explanation:"From L7 Non Mendelian: Outline: (Pages 290-310 ) \u2022 Introduction \u2022 Non-Mendelian (AKA non- classical) modes of inheritance: \u2022 Genomic Imprinting \u2022 Uniparental Disomy \u2022 Mitochondrial Inheritance \u2022 Anticipation \u2022 Mosaicism: \u2022 Somatic mosaicism \u2022 Gonadal mosaicism Non-Mendelian Inheritance \u2022 Non-Mendelian genetics \u2192 ge..."},{id:"mid1_mid1_L7_Non_Mendelian_10",exam:"mid1",lecture:"L7 Non Mendelian",q:"The pedigree shown represents a 3-generation family where only males are affected (filled squares). The carrier females (circles with dots) show no symptoms. What is the most likely mode of inheritance?",options:["Autosomal recessive","Autosomal dominant","X-linked recessive","Mitochondrial"],answer:2,explanation:"In the pedigree, only males are affected (filled squares), carrier females are unaffected (circles with dots). There is no male-to-male transmission (fathers don't pass it to sons directly; sons get the X from their mother). The carrier female (I-2) passes the X-linked trait to her sons. This is classic X-linked recessive inheritance \u2014 as seen in DMD, hemophilia A/B, and other X-linked conditions.",image:"images/p45_pedigree_dmd.png"},{id:"mid1_mid1_example_1",exam:"mid1",lecture:"example",q:"Which of the following best describes the central dogma of molecular biology?",options:["DNA \u2192 Protein \u2192 RNA","RNA \u2192 DNA \u2192 Protein","DNA \u2192 RNA \u2192 Protein","Protein \u2192 RNA \u2192 DNA"],answer:2,explanation:"The central dogma states that genetic information flows from DNA to RNA (transcription) and then from RNA to Protein (translation)."},{id:"mid1_mid1_example_2",exam:"mid1",lecture:"example",q:"A codon consists of how many nucleotide bases?",options:["1","2","3","4"],answer:2,explanation:"A codon is a triplet of nucleotide bases that codes for a specific amino acid or stop signal."},{id:"mid2_mid2_L10_Birth_Defects_1",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn is diagnosed with an isolated congenital heart defect. Which type of birth defect does this represent?",options:["Dysplasia","Disruption","Malformation","Deformation"],answer:2,explanation:"A malformation is a primary structural defect arising from an intrinsic abnormality in a developmental process (e.g., congenital heart defects, cleft lip/palate, neural tube defects). It is primary and intrinsic."},{id:"mid2_mid2_L10_Birth_Defects_2",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following birth defects is considered a disruption?",options:["Congenital heart defect","Neural tube defect","Cleft lip and palate","Amniotic band syndrome"],answer:3,explanation:"A disruption is a secondary and extrinsic birth defect caused by an external destructive force that breaks down or interferes with an otherwise normal developmental process. Amniotic bands can wrap around limbs and cause disruption. It is NOT genetic."},{id:"mid2_mid2_L10_Birth_Defects_3",exam:"mid2",lecture:"L10 Birth Defects",q:"Certain malformations tend to occur together more frequently than expected by chance. Which of the following best represents this concept?",options:["Down syndrome","VACTERL association","Ectodermal dysplasia","Cleft lip and palate"],answer:1,explanation:"An association is a non-random occurrence of multiple anomalies that are not a known syndrome or sequence. VACTERL is an example (Vertebral, Anal, Cardiac, Tracheo-Esophageal, Renal, Limb anomalies)."},{id:"mid2_mid2_L10_Birth_Defects_4",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn presents with vertebral anomalies, anal atresia, tracheoesophageal fistula, and renal abnormalities. What is the most likely diagnosis?",options:["Potter sequence","Van der Woude syndrome","VATER association","Ectodermal dysplasia"],answer:2,explanation:"VATER/VACTERL association includes: Vertebral anomalies, Anal atresia, Cardiac defects, Tracheo-Esophageal fistula, Renal anomalies, Limb defects. It has no known single genetic cause and normal WES/microarray."},{id:"mid2_mid2_L10_Birth_Defects_5",exam:"mid2",lecture:"L10 Birth Defects",q:"A male newborn with vertebral anomalies, anal atresia, tracheoesophageal fistula, and radial ray defects has normal WES and microarray results. What is the most likely diagnosis?",options:["Potter sequence","VATER association","Van der Woude syndrome","Ectodermal dysplasia"],answer:1,explanation:"VATER association is non-random co-occurrence of structural anomalies with no identifiable genetic cause (normal chromosomes and microarray). The presence of radial ray defects is characteristic. This is an association, not a syndrome."},{id:"mid2_mid2_L10_Birth_Defects_6",exam:"mid2",lecture:"L10 Birth Defects",q:"Elevated amniotic alpha fetoprotein (AFP) has been detected prenatally in a patient. To reduce the risk of developing the consequence shown in the photo, what could be given?",options:["Vitamin B12","Folic acid","IgA","Immunosuppressant"],answer:1,explanation:"Elevated AFP indicates an open neural tube defect (NTD) such as anencephaly or spina bifida. Periconceptional folic acid supplementation significantly reduces the risk of NTDs. The image shows a meningomyelocele (spina bifida), the most common open NTD.",image:"images/tb_p66_fig1.png"},{id:"mid2_mid2_L10_Birth_Defects_7",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following terms describes the abnormal mechanical force which distorts an otherwise normal structure?",options:["Malformation","Disruption","Deformation","Dysplasia"],answer:2,explanation:"Deformation is caused by abnormal mechanical forces (extrinsic) that distort an otherwise normally formed structure. Examples include clubfoot (talipes equinovarus) from uterine constraint, and positional plagiocephaly. It differs from disruption in that the structure was initially normal."},{id:"mid2_mid2_L10_Birth_Defects_8",exam:"mid2",lecture:"L10 Birth Defects",q:"What is the best description of disruption?",options:["Primary and extrinsic","Secondary and extrinsic","Primary and intrinsic","Secondary and intrinsic"],answer:1,explanation:"Disruption is secondary (the original structure was forming normally) and extrinsic (caused by an outside destructive factor such as amniotic bands, infection, or ischemia). Malformation, by contrast, is primary and intrinsic."},{id:"mid2_mid2_L10_Birth_Defects_9",exam:"mid2",lecture:"L10 Birth Defects",q:"What is correct regarding neural tube defects?",options:["Anencephaly results from a defect in the lower end of the neural tube","The risk can be reduced by periconceptional folic acid supplementation","The recurrence risk from an affected parent is 10%","Spina bifida results from failure of cranial neural tube closure"],answer:1,explanation:"Periconceptional folic acid supplementation (before and during early pregnancy) reduces NTD risk by 50-70%. Anencephaly results from failure of CRANIAL (anterior) neural tube closure. Spina bifida results from failure of CAUDAL (posterior) closure. Recurrence risk is approximately 2-3%, not 10%."},{id:"mid2_mid2_L10_Birth_Defects_10",exam:"mid2",lecture:"L10 Birth Defects",q:"Which of the following is caused by abnormal organization of tissue?",options:["Ectodermal dysplasia","Spina bifida","Cleft palate","Talipes"],answer:0,explanation:"Dysplasia refers to abnormal organization or function of cells within a specific tissue type. Ectodermal dysplasia results from abnormal development of ectodermal tissue (affecting hair, skin, teeth, nails, sweat glands). Most dysplasias are due to single gene defects."},{id:"mid2_mid2_L10_Birth_Defects_11",exam:"mid2",lecture:"L10 Birth Defects",q:"A family came with their 7-year-old girl and 5-year-old boy, complaining of chronic pulmonary disease, failure to thrive with malnutrition, and chronic diarrhea due to pancreatic insufficiency. What other clinical feature might be seen?",options:["Male infertility due to testicular atrophy","Male infertility due to congenital bilateral absence of the vas deferens","Female infertility due to ovarian failure","Infertility due to primary ciliary dyskinesia"],answer:1,explanation:"The clinical picture describes cystic fibrosis (CF) \u2014 autosomal recessive CFTR mutation. Males with CF frequently have congenital bilateral absence of the vas deferens (CBAVD), causing obstructive azoospermia and infertility. Testicular function is normal. Females with CF have reduced fertility due to thick cervical mucus, but not ovarian failure."},{id:"mid2_mid2_L10_Birth_Defects_12",exam:"mid2",lecture:"L10 Birth Defects",q:"Which medication, if given in the first trimester of pregnancy, helps reduce the risk of neural tube defects?",options:["Streptomycin","Folic acid","Isoniazid","Valproic acid"],answer:1,explanation:"Folic acid (vitamin B9) given periconceptionally and in the first trimester prevents neural tube defects (NTDs) by supporting proper neural tube closure. Streptomycin is ototoxic (teratogen). Isoniazid and valproic acid are potentially harmful teratogens; valproic acid is actually associated with INCREASED risk of NTDs."},{id:"mid2_mid2_L10_Birth_Defects_13",exam:"mid2",lecture:"L10 Birth Defects",q:"The image shows a newborn with a protrusion of abdominal contents through the umbilicus, covered by a thin membrane. What type of birth defect does this represent and what is the correct term for this finding?",options:["Disruption \u2014 gastroschisis","Malformation \u2014 omphalocele","Deformation \u2014 umbilical hernia","Dysplasia \u2014 abdominal wall dystrophy"],answer:1,explanation:"Omphalocele is a malformation (primary, intrinsic defect) where abdominal organs herniate through the umbilical ring and are covered by a peritoneal membrane. It differs from gastroschisis (a disruption) where organs herniate through a defect lateral to the umbilicus with NO covering membrane. Omphalocele is associated with chromosomal abnormalities (trisomy 13, 18) and BWS syndrome.",image:"images/tb_p65_fig1.png"},{id:"mid2_mid2_L10_Birth_Defects_14",exam:"mid2",lecture:"L10 Birth Defects",q:"An adult male presents with the physical findings shown in the image (gynecomastia, sparse body hair, and hypogonadism). These features developed as a result of a congenital chromosomal abnormality. What is the most likely underlying karyotype?",options:["46,XY (Normal male)","45,X (Turner syndrome)","47,XXY (Klinefelter syndrome)","47,XYY (Jacob syndrome)"],answer:2,explanation:"The image shows an adult male with gynecomastia and sparse body/facial hair \u2014 classic features of Klinefelter syndrome (47,XXY). Although it is a congenital chromosomal condition (present from birth), many clinical manifestations only become apparent during or after puberty. Features include: tall stature, small firm testes, azoospermia, infertility, gynecomastia, female-distribution pubic hair, and learning difficulties. It is the most common sex chromosome aneuploidy in males.",image:"images/tb_p65_fig2.png"},{id:"mid2_mid2_L10_Birth_Defects_15",exam:"mid2",lecture:"L10 Birth Defects",q:"A newborn presents with macroglossia (large tongue), macrosomia (large birth weight), and abdominal wall defect. The infant also develops severe hypoglycemia in the first hours of life. What is the most likely diagnosis?",options:["Down syndrome (Trisomy 21)","Beckwith-Wiedemann syndrome","VACTERL association","Turner syndrome"],answer:1,explanation:"The image shows a newborn with Beckwith-Wiedemann syndrome (BWS): an overgrowth syndrome characterized by macroglossia, macrosomia, omphalocele/abdominal wall defects, and neonatal hypoglycemia. BWS is caused by dysregulation of imprinted genes at chromosome 11p15.5 (IGF2/H19 region). Risk of embryonal tumors (Wilms tumor, hepatoblastoma) is increased. Most cases are sporadic; ~15% are familial.",image:"images/p64_bws_baby_q7.png"},{id:"mid2_mid2_L11_DNA_Repair_1",exam:"mid2",lecture:"L11 DNA Repair",q:"Which DNA repair mechanism involves the enzyme DNA glycosylase?",options:["Mismatch repair","Nucleotide excision repair","Base excision repair","Post-replication repair"],answer:2,explanation:"From L11 DNA Repair: Base Excision Repair Nucleotide excision repair *Thymidine dimers or chemical adducts \xDF apurinic/apyrimidinic site 4/11/26 8 Mismatch repair (MMR) mechanism DNA Repair Mechanisms \u2022 Double strand repair mechanisms \u2022 Homologous recombination (HR) mechanism \u2022 Non-homologous end joining (NHEJ) mechan..."},{id:"mid2_mid2_L11_DNA_Repair_2",exam:"mid2",lecture:"L11 DNA Repair",q:"Which sequence correctly describes the major DNA repair mechanism?",options:["Cleavage \u2192 Removal \u2192 Insertion \u2192 Sealing","Removal \u2192 Cleavage \u2192 Insertion \u2192 Sealing","Cleavage \u2192 Insertion \u2192 Removal \u2192 Sealing","Cleavage \u2192 Removal \u2192 Sealing \u2192 Insertion"],answer:0,explanation:"From L11 DNA Repair: \u2022 Demethylation \xE0 Methyl Group Removal \u2022 DNA methylation of imprinted loci observed in many cancer types \u2022 Photoreactivation \xE0 in bacteria \u2022 Repairs pyrimidine dimers \u2193 O6-methylguanine-DNA methyltransferase DNA Repair Mechanisms \u2022 Single strand repair mechanisms \u2022 Multistep processes \u2022 Utilizes un..."},{id:"mid2_mid2_L11_DNA_Repair_3",exam:"mid2",lecture:"L11 DNA Repair",q:"Which DNA repair mechanism is responsible for correcting thymine dimers caused by UV radiation?",options:["Base excision repair (BER)","Nucleotide excision repair (NER)","Mismatch repair (MMR)","Non-homologous end joining (NHEJ)"],answer:1,explanation:"From L11 DNA Repair: Base Excision Repair Nucleotide excision repair *Thymidine dimers or chemical adducts \xDF apurinic/apyrimidinic site 4/11/26 8 Mismatch repair (MMR) mechanism DNA Repair Mechanisms \u2022 Double strand repair mechanisms \u2022 Homologous recombination (HR) mechanism \u2022 Non-homologous end joining (NHEJ) mechan..."},{id:"mid2_mid2_L11_DNA_Repair_4",exam:"mid2",lecture:"L11 DNA Repair",q:"Which of the following DNA repair mechanisms can cause mistakes?",options:["homologous recombination","non homologous end joining","direct reversal","mismatch repair"],answer:1,explanation:"From L11 DNA Repair: Base Excision Repair Nucleotide excision repair *Thymidine dimers or chemical adducts \xDF apurinic/apyrimidinic site 4/11/26 8 Mismatch repair (MMR) mechanism DNA Repair Mechanisms \u2022 Double strand repair mechanisms \u2022 Homologous recombination (HR) mechanism \u2022 Non-homologous end joining (NHEJ) mechan..."},{id:"mid2_mid2_L11_DNA_Repair_5",exam:"mid2",lecture:"L11 DNA Repair",q:"Which of the following is used in base excision repair mechanism?",options:["ATM","O6-methylguanine-DNA-methyltransferase","MLH","DNA glycosylase"],answer:3,explanation:"From L11 DNA Repair: \u2022 Demethylation \xE0 Methyl Group Removal \u2022 DNA methylation of imprinted loci observed in many cancer types \u2022 Photoreactivation \xE0 in bacteria \u2022 Repairs pyrimidine dimers \u2193 O6-methylguanine-DNA methyltransferase DNA Repair Mechanisms \u2022 Single strand repair mechanisms \u2022 Multistep processes \u2022 Utilizes un..."},{id:"mid2_mid2_L11_DNA_Repair_6",exam:"mid2",lecture:"L11 DNA Repair",q:"UV light cause:",options:["pyrimidine dimers","purine dimers","Single dna strand break","Double dna strand break"],answer:0,explanation:"From L11 DNA Repair: \u2022 Alkylating agents (tobacco smoke)\0addition of ethyl or methyl to a nucleotide (Guanine) 4/11/26 4 Examples of  of DNA damage \u2022 Oxidation of Bases \u2022 Reactive oxygen species \u2022 -OH radical the most reactive and capable of damaging DNA, protein and lipids \u2022 Leads to G to T conversion \u2022 Spontaneo..."},{id:"mid2_mid2_L11_DNA_Repair_7",exam:"mid2",lecture:"L11 DNA Repair",q:"Mutations in BRCA2 gene:",options:["Account for 3% to 5% of familial breast cancer","account for 100% of familial breast cancer","Males with BRCA2 mutation do not have any risk to develop breast cancer","Males have an increased risk to develop a prostate cancer"],answer:3,explanation:"From L11 DNA Repair: \u2022 Predisposes to: \u2022 Immunodeficiency \u2022 Neurological disorders \u2022 Cancer LONG-TERM CONSEQUENCES Ageing Cancer Hereditary Disorders DNA REPAIR MECHANISMS SHORT-TERM CONSEQUENCES Abnormal Growth & Metabolism Physiological Dysfunction Cell Death Decreased  cellular proliferation Defective signaling pa..."},{id:"mid2_mid2_L11_DNA_Repair_8",exam:"mid2",lecture:"L11 DNA Repair",q:"What of the following DNA repair mechanisms is a Direct reversal mechanism?",options:["Post-replication","Excitation","Mismatch repair","Photoreactivation"],answer:3,explanation:"From L11 DNA Repair: \u2022 Predisposes to: \u2022 Immunodeficiency \u2022 Neurological disorders \u2022 Cancer LONG-TERM CONSEQUENCES Ageing Cancer Hereditary Disorders DNA REPAIR MECHANISMS SHORT-TERM CONSEQUENCES Abnormal Growth & Metabolism Physiological Dysfunction Cell Death Decreased  cellular proliferation Defective signaling pa..."},{id:"mid2_mid2_L12_Gene_Variants_1",exam:"mid2",lecture:"L12 Gene Variants",q:"Which of the following best describes a nonsense mutation?",options:["A substitution causing a different amino acid","A substitution creating a premature stop codon","Deletion of three nucleotides","Insertion without frameshift"],answer:1,explanation:"From L12 Gene Variants: Base Deletions \u2022 The loss of one or more nucleotide \u2022  If occurs in coding sequences and involves one, two or more nucleotides that are not a multiple of three, the reading frame will be disrupted \u2022  Larger deletions may result in partial or whole gene deletions \u2192 loss of gene function or expr..."},{id:"mid2_mid2_L12_Gene_Variants_2",exam:"mid2",lecture:"L12 Gene Variants",q:"Which of the following variants is an example of a missense mutation?",options:["p.Gly542*","c.489+1G>T","p.Arg117His","p.Phe508del"],answer:2,explanation:"From L12 Gene Variants: Variants/Mutations \u2013 By inheritance \u2022Homozygous variants \u2022Compound heterozygous (CH) variants \u2022De Novo variants Homozygous Variants \u2022 Occur when an individual has two identical copies of a mutation in a particular gene (two same variants in the same gene) \u2022 Both copies of homozygous variants ..."},{id:"mid2_mid2_L12_Gene_Variants_3",exam:"mid2",lecture:"L12 Gene Variants",q:"Which of the following variants is an example of a nonsense mutation?",options:["p.Arg117His","p.Gly542*","p.Phe508del","c.489+1G>T"],answer:1,explanation:"From L12 Gene Variants: Variants/Mutations \u2013 By inheritance \u2022Homozygous variants \u2022Compound heterozygous (CH) variants \u2022De Novo variants Homozygous Variants \u2022 Occur when an individual has two identical copies of a mutation in a particular gene (two same variants in the same gene) \u2022 Both copies of homozygous variants ..."},{id:"mid2_mid2_L12_Gene_Variants_4",exam:"mid2",lecture:"L12 Gene Variants",q:"A 4-year-old girl has short stature, webbed neck, pulmonary valve stenosis, and downslanting palpebral fissures. Which genetic abnormality is most commonly associated with this condition?",options:["Gain-of-function mutation in PTPN11","Loss-of-function mutation in PTPN11","Gain-of-function mutation in NF1","Loss-of-function mutation in NF1"],answer:0,explanation:"From L12 Gene Variants: Variants/Mutations \u2013 By inheritance \u2022Homozygous variants \u2022Compound heterozygous (CH) variants \u2022De Novo variants Homozygous Variants \u2022 Occur when an individual has two identical copies of a mutation in a particular gene (two same variants in the same gene) \u2022 Both copies of homozygous variants ..."},{id:"mid2_mid2_L12_Gene_Variants_5",exam:"mid2",lecture:"L12 Gene Variants",q:"Failure to thrive and malnutrition as a result of chronic diarrhea and malabsorption due to pancreatic insufficiency are clinical features of a mutation in which gene?",options:["CFTR","NF1","FBN1","FGFR3"],answer:0,explanation:"From L12 Gene Variants: Functional Effects of Variants/Mutations on the Protein \u2022Complete or partial Loss- of-function (LOF) variants (amorph/hypomorph) \u2022Gain-of-function variants \u2022Dominant-negative variants Loss-of-Function (LOF) Variants: \u2022 Can result in either reduced activity or complete loss of the gene produ..."},{id:"mid2_mid2_L12_Gene_Variants_6",exam:"mid2",lecture:"L12 Gene Variants",q:"Which type of mutation is controversial to genetic therapy?",options:["somatic mutation","germline Mutation","ex vivo","anti-seneal mutation"],answer:1,explanation:"From L12 Gene Variants: Wisam Habhab \u2022 Consultant Clinical Geneticist/Assistan t Professor \u2022 Department of Genetic Medicine, Faculty of Medicine, KAU 2nd year medicine, 2026 Learning Outcomes \u2022 Define genetic variants/mutations \u2022 Classify types of variants \u2022 List the causes of variants \u2022 Understand the nomenclature ..."},{id:"mid2_mid2_L12_Gene_Variants_7",exam:"mid2",lecture:"L12 Gene Variants",q:"A couple came to genetic clinic, they have a 12 years old girl presented with short stature, enlarged n with breast cancer is found to carry a pathogenic CHEK2 variant. Which test is most appropriate to screen her siblings for the same mutation?",options:["Microarray","MLPA","Whole exome sequencing","Sanger sequencing"],answer:3,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_3",exam:"mid2",lecture:"L13 Molecular Techniques",q:"An 18-month-old presents with muscle weakness and frequent falls. The doctor suspects a point mutation in the SMN1 gene. How can we confirm this?",options:["MLPA","Chromosomal microarray","Sanger sequencing","FISH"],answer:2,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_4",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What molecular method is most commonly used to detect large deletions or duplications in the DMD gene?",options:["MLPA","FISH","Microarray","Sanger sequencing"],answer:0,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_5",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Sara is a 30 years old female who came to a genetic counseling with a history of breast cancer in family. Her mother had breast cancer caused by BRCA1. Which of the following tests is appropriate for sara?",options:["chromosome microarray","MLPA","sanger sequencing","whole exome sequences"],answer:2,explanation:"From L13 Molecular Techniques: \u2022 WGS include sequencing and analyzing an individual\u2019s entire genome, coding and noncoding regions (i.e., exons + introns) 4/6/26 20 Whole Genome Sequencing (WGS) \u2022 WGS is also performed via NGS but does not require the targeted sequence capture step, as in WES and targeted panels \u2022 Able to de..."},{id:"mid2_mid2_L13_Molecular_Techniques_6",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A 47-year-old female patient is referred to the genetic clinic, tumor in her right colon. Her father died at the age of 55 from colon cancer, her paternal aunt had endometrial cancer. What is the best technique to confirm her condition?",options:["Gene panel","Chromosomal analysis","Search for MLH mutation","Sanger sequencing"],answer:0,explanation:"From L13 Molecular Techniques: Confirmation a de novo mutation in a patient (by testing the mutation in the parent) 4/6/26 15 Sanger Sequencing Examples of diseases which can be diagnosed with Sanger Sequencing: Cystic Fibrosis (CF) Responsible gene: CFTR (cystic fibrosis transmembrane conductance regulator) Cytogenetic loc..."},{id:"mid2_mid2_L13_Molecular_Techniques_7",exam:"mid2",lecture:"L13 Molecular Techniques",q:"What is the best genetic testing method to detect a chromosomal duplication smaller than 3 megabase pairs?",options:["Chromosomal microarray","Conventional chromosomal analysis (karyotype)","MLPA","Southern blot"],answer:0,explanation:"From L13 Molecular Techniques: Nucleic Acid Hybridization: involves mixing DNA from two sources that have been denatured by heat or alkali to make them single-stranded and then, under the appropriate conditions, allowing complementary base pairing of homologous sequences to identify a specific DNA sequences Molecular Methods \u2022..."},{id:"mid2_mid2_L13_Molecular_Techniques_8",exam:"mid2",lecture:"L13 Molecular Techniques",q:"Which of the following methods is used for separation of DNA fragments?",options:["Polymerase chain reaction (PCR)","Restriction digestion","Gel electrophoresis","Bacterial transformation"],answer:2,explanation:"From L13 Molecular Techniques: - It is a variation of the multiplex PCR that permits amplification of multiple targets with only a single primer Multiplex Ligation-Dependent Probe Amplification (MLPA) 4/6/26 12 Example of disease which can be diagnosed with MLPA: Duchenne Muscular Dystrophy (DMD) \u2022 The most common and most..."},{id:"mid2_mid2_L13_Molecular_Techniques_9",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The Sanger sequencing result shown in the image was performed on a proband, his father, his mother, and a reference sequence. What is the most accurate interpretation?",options:["Proband is homozygous mutant; father is carrier; mother is normal","Proband is heterozygous mutant; father is heterozygous carrier; mother is normal","Proband is normal; father is mutant; mother is carrier","All three family members are heterozygous carriers"],answer:1,explanation:"The proband (and father) show an extra elevated peak (arrow) above the baseline at a specific position compared to the reference sequence, indicating a heterozygous mutation. The mother's trace follows the reference exactly (normal). This pattern suggests the mutation was inherited from the carrier father (autosomal dominant or X-linked, depending on the gene). The mother is not a carrier.",image:"images/tb_p63_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_10",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The chromosomal microarray result shown in the image demonstrates a copy number variant. How would you interpret this finding?",options:["Homozygous deletion on chromosome 5","Heterozygous duplication on chromosome 5","Trisomy of chromosome 5","Hemizygous deletion on chromosome 5"],answer:1,explanation:"The microarray shows a segment on chromosome 5 where the blue line (representing copy number ratio) shifts UPWARD above baseline, indicating an INCREASE in copy number. Since only one line is elevated (not tripling), this represents a HETEROZYGOUS DUPLICATION (one normal copy + one duplicated region). Microarray can detect CNVs too small to see on conventional karyotype.",image:"images/tb_p63_fig2.png"},{id:"mid2_mid2_L13_Molecular_Techniques_11",exam:"mid2",lecture:"L13 Molecular Techniques",q:"DNA fingerprinting (STR profiling) was performed on samples from a crime scene, a victim, and two suspects. Which suspect is most likely the criminal based on the image?",options:["Suspect 1","Suspect 2","Both suspects","Neither suspect matches"],answer:1,explanation:"DNA fingerprinting compares short tandem repeat (STR) band patterns. The criminal should have bands matching the crime scene sample. In the image, Suspect 2's band pattern matches the crime scene pattern, while Suspect 1's pattern does not. DNA fingerprinting is highly discriminatory because the probability of two unrelated individuals sharing the same STR profile is extremely low.",image:"images/tb_p87_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_12",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The RFLP Southern blot shown in the image was performed for sickle cell anemia diagnosis. The family includes Mother (M), Father (F), and three children (C1, C2, C3). Based on the band pattern, which child is affected with sickle cell anemia?",options:["C1","C2","C3","None of the children are affected"],answer:2,explanation:"In RFLP-based SCA diagnosis using Mst II restriction enzyme: the normal \u03B2A allele is cut (giving two smaller bands), while the sickle \u03B2S allele is NOT cut (giving one larger band). Homozygous normal: 2 bands. Carrier (heterozygous): 3 bands. Affected (homozygous HbSS): 1 band. C3 shows the pattern consistent with affected status (homozygous HbSS).",image:"images/tb_p88_fig1.png"},{id:"mid2_mid2_L13_Molecular_Techniques_13",exam:"mid2",lecture:"L13 Molecular Techniques",q:"A paternity test was performed using DNA fingerprinting. The blot shows Mother, Child, Alleged Father, and two ladder controls. What is the conclusion?",options:["The alleged father is excluded as the biological father","The alleged father is confirmed as the biological father","The test is inconclusive","The child's pattern matches neither parent"],answer:1,explanation:"In paternity testing, a child inherits 50% of their DNA bands from the mother and 50% from the father. Any bands in the child NOT present in the mother must be present in the biological father. In this blot, the unique bands of the child (those not from the mother) match the alleged father's pattern, confirming paternity.",image:"images/tb_p88_fig2.png"},{id:"mid2_mid2_L13_Molecular_Techniques_14",exam:"mid2",lecture:"L13 Molecular Techniques",q:"The Sanger sequencing chromatogram shown compares a proband, his father, and his mother against a reference sequence. The proband and father show a double peak at one position while the mother's trace is identical to the reference. What is the correct interpretation?",options:["De novo mutation in the proband; parents are unaffected","Autosomal recessive mutation; both parents are carriers","The mutation was inherited from the father; mother is unaffected","The mutation was inherited from the mother; father is unaffected"],answer:2,explanation:"In Sanger sequencing, a heterozygous mutation appears as two overlapping peaks (double peak) at the mutation site \u2014 one peak from the normal allele and one from the mutant allele. The proband and father both show this double peak, while the mother's trace matches the reference (normal). This indicates the proband inherited the mutation from his father. This pattern is consistent with autosomal dominant or X-linked inheritance from the paternal side.",image:"images/tb_p67_fig1.png"},{id:"mid2_mid2_L14_Approach_Patients_1",exam:"mid2",lecture:"L14 Approach Patients",q:"A family with two affected boys presented to the genetic clinic. The two brothers have muscle weakness and a positive gower\u2019s sign. Family history revealed a maternal uncle that is wheelchair dependent and has dilated myocardial myopathy. Which of the following lab results will be expected?",options:["High creatine kinase level.","Low creatine kinase level.","Normal creatine kinase level.","No change to creatine kinase level."],answer:0,explanation:"From L14 Approach Patients: X-Linked Disorders \u2022 Duchenne muscular dystrophy \u2022 Fragile X syndrome (covered in Non- Mendelian inheritance lecture) Duchenne Muscular Dystrophy Responsible gene: DMD (Dystrophin) Cytogenetic locus: Xp21 Inheritance: X-linked recessive Clinical features: \u2022 Progressive muscular weakness and was..."},{id:"mid2_mid2_L14_Approach_Patients_2",exam:"mid2",lecture:"L14 Approach Patients",q:"A family with two affected boys presented to the genetic clinic. The two brothers have muscle weakness and a positive gower\u2019s sign. Family history revealed a maternal uncle that is wheelchair dependent and has dilated myocardial myopathy. Which of the following type of gene is most likely to be responsible for this history?",options:["Dystrophin encoding gene","Neurofibromin encoding gene","Fibrillin-1 encoding gene","Calcium channels encoding gene"],answer:0,explanation:"From L14 Approach Patients: Marfan Syndrome Systemic Scoring \u2022 Features other than aortic root enlargement or ectopia lentis are grouped to derive a \u201Csystemic score\u201D that can contribute to diagnosis \u2022 A score of 7 and above considered positive 20 https://www.marfan.org/dx/score Achondroplasia Responsible gene: FGFR3 (..."},{id:"mid2_mid2_L14_Approach_Patients_3",exam:"mid2",lecture:"L14 Approach Patients",q:"A family with two affected boys presented to the genetic clinic. The two brothers have muscle weakness and a positive gower\u2019s sign. Family history revealed a maternal uncle that is wheelchair dependent and has dilated myocardial myopathy. Which of the following genetic abnormalities is most likely present in this family?",options:["Gene deletion","Gene duplication","chromosome deletion","chromosome Duplication"],answer:0,explanation:"From L14 Approach Patients: Marfan Syndrome Systemic Scoring \u2022 Features other than aortic root enlargement or ectopia lentis are grouped to derive a \u201Csystemic score\u201D that can contribute to diagnosis \u2022 A score of 7 and above considered positive 20 https://www.marfan.org/dx/score Achondroplasia Responsible gene: FGFR3 (..."},{id:"mid2_mid2_L14_Approach_Patients_4",exam:"mid2",lecture:"L14 Approach Patients",q:"What is the Potential Reasons for Pediatric Genetic Counseling?",options:["Adult with a family history of a genetic condition.","Adult with a strong family history of common adult onset disorders","Adult with a strong family history of cancer","Child with a family history of a genetic condition."],answer:3,explanation:"From L14 Approach Patients: Marfan Syndrome Systemic Scoring \u2022 Features other than aortic root enlargement or ectopia lentis are grouped to derive a \u201Csystemic score\u201D that can contribute to diagnosis \u2022 A score of 7 and above considered positive 20 https://www.marfan.org/dx/score Achondroplasia Responsible gene: FGFR3 (..."},{id:"mid2_mid2_L14_Approach_Patients_5",exam:"mid2",lecture:"L14 Approach Patients",q:"According to genetic counseling all the following is true except:",options:["Genetic counseling is directive.","Any physician can be a counselor.","It includes the discussion of the cause of the disease and the risk of transmission.","It should be done after genetic testing."],answer:1,explanation:"From L14 Approach Patients: Outline Multifactorial disorders Single gene disorders Chromosomal abnormalities Multifactorial Disorders \uEE76Multifactorial inheritance describes the action of multiple genes that interact with one another and with environmental factors to lead to a phenotype interaction of genetic and environmen..."},{id:"mid2_mid2_L9_Dysmorphology_1",exam:"mid2",lecture:"L9 Dysmorphology",q:"During dysmorphology assessment, a child is found to have a shortened anteroposterior dimension of the skull compared to its width. What is the correct term for this finding?",options:["Dolichocephaly","Plagiocephaly","Brachycephaly","Trigonocephaly"],answer:2,explanation:"From L9 Dysmorphology: objective OR Apparently shortened anteroposterior dimension (length) of the head compared to width. Dolichocephaly \u2022 Definition: Cephalic index less than 76% objective OR Apparently increased antero-posterior length of the head compared to width."},{id:"mid2_mid2_L9_Dysmorphology_2",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which term describes the presence of a small mandible?",options:["Macrognathia","Retrognathia","Micrognathia","Prognathia"],answer:2,explanation:"From L9 Dysmorphology: Micrognathia Definition: Apparently reduced length and width of the mandible when viewed from the front but not from the side Prognathism Definition: Anterior protrusion of the mandibular alveolar ridge beyond the vertical plane of the maxillary alveolar ridge, best appreciated in profile ..."},{id:"mid2_mid2_L9_Dysmorphology_3",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which term describes the presence of an extra digit?",options:["Syndactyly","Oligodactyly","Arachnodactyly","Polydactyly"],answer:3,explanation:'From L9 Dysmorphology: Hands \u2022 Arachnodactyly ("spider fingers") is a condition in which the fingers and toes are abnormally long and slender, in comparison to the palm of the hand and arch of the foot.) \u2022 Brachydactyly (short fingers & toes) Fingers \u2022 Polydactyly refers to extra fingers or toes (digits) that are p...'},{id:"mid2_mid2_L9_Dysmorphology_4",exam:"mid2",lecture:"L9 Dysmorphology",q:"A child has an increased distance between the eyes. Which term best describes this finding?",options:["Upslanting palpebral fissures","Hypotelorism","Hypertelorism","Anophthalmia"],answer:2,explanation:"From L9 Dysmorphology: Micrognathia Definition: Apparently reduced length and width of the mandible when viewed from the front but not from the side Prognathism Definition: Anterior protrusion of the mandibular alveolar ridge beyond the vertical plane of the maxillary alveolar ridge, best appreciated in profile ..."},{id:"mid2_mid2_L9_Dysmorphology_5",exam:"mid2",lecture:"L9 Dysmorphology",q:"What is the term used to describe the vertical groove between the base of the nose and the border of the upper lip:",options:["Philtrum","Hard palate","Soft palate","Pinna"],answer:0,explanation:"From L9 Dysmorphology: Mouth (Philtrum ) \u2022 the vertical groove between the base of the nose and the border of the upper lip. Hairline Hairline, High Anterior Definition: Distance between the hairline (trichion) and the glabella (the most prominent point on the frontal bone above the root of the nose), in the midline, more than two SD above the mean ."},{id:"mid2_mid2_L9_Dysmorphology_6",exam:"mid2",lecture:"L9 Dysmorphology",q:"A family with two affected boys presented to the genetic clinic. The two brothers have muscle weakness and a positive gower\u2019s sign. Family history revealed a maternal uncle that is wheelchair dependent and has dilated myocardial myopathy. What additional manifestation can be observed in this condition?",options:["spinal compression","Calf pseudohypertrophy","Macrocephaly","Microcephaly"],answer:1,explanation:"From L9 Dysmorphology: 7- family history of similar condition, or any genetic disorder. Gain basic in taking personal and family medical histories related to genetic conditions."},{id:"mid2_mid2_L9_Dysmorphology_7",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following is considered as a major defect?",options:["Microcephaly","Lacrimal duct stenosis","Epicanthic fold","Brushfield spots of the iris"],answer:0,explanation:"From L9 Dysmorphology: Syndactyly (Fused Digits) (Fingers or Toes) Down Syndrome/Trisomy 21 Clinical Features: Newborn period: Hypotonia, excess nuchal skin Craniofacial: \u2022 Brachycephaly, microcephaly \u2022 Epicanthic folds, upslanting palpebral fissures, depressed nasal bridge \u2022 Protruding tongue \u2022 Small/low-set ears ..."},{id:"mid2_mid2_L9_Dysmorphology_8",exam:"mid2",lecture:"L9 Dysmorphology",q:"A female presented in the NICU with heart and renal abnormalities. Examination shows microcephaly, microphthalmia, hypertelorism, and postaxial polydactyly. What is the provisional diagnosis?",options:["Patau syndrome (Trisomy 13)","Down syndrome (Trisomy 21)","Edwards syndrome (Trisomy 18)","Turner syndrome (45,X)"],answer:0,explanation:"From L9 Dysmorphology: Attribution 4.0 International (CC BY 4.0) Patau syndrome/Trisomy 13 Clinical features: \u2022 Holoprosencephaly, microcephaly, scalp defects \u2022 Microphthalmia , low birth weight \u2022 Polydactyly \u2022 Midline cleft lip and palate \u2022 Cardiac and renal anomalies \u2022 Intellectual disability Inheritance: \u2022 75% ..."},{id:"mid2_mid2_L9_Dysmorphology_9",exam:"mid2",lecture:"L9 Dysmorphology",q:"Which of the following is considered a major anomaly?",options:["Lip pits","Anencephaly","Epicanthic fold","Clinodactyly"],answer:1,explanation:"From L9 Dysmorphology: Syndactyly (Fused Digits) (Fingers or Toes) Down Syndrome/Trisomy 21 Clinical Features: Newborn period: Hypotonia, excess nuchal skin Craniofacial: \u2022 Brachycephaly, microcephaly \u2022 Epicanthic folds, upslanting palpebral fissures, depressed nasal bridge \u2022 Protruding tongue \u2022 Small/low-set ears ... \u2022Shows which family members are affected or unaffected by a genetic disease."},{id:"mid2_mid2_L9_Dysmorphology_10",exam:"mid2",lecture:"L9 Dysmorphology",q:"The karyotype and clinical features shown in the image are characteristic of which syndrome?",options:["Turner syndrome (45,X)","Klinefelter syndrome (47,XXY)","Down syndrome (47,XX,+21)","Marfan syndrome"],answer:1,explanation:"The image shows the 47,XXY karyotype (Klinefelter syndrome) alongside the classic clinical features: absence of frontal baldness, poor beard growth, gynecomastia (breast development), female-type pubic hair pattern, small testes, wide hips, and long arms and legs. Klinefelter is the most common cause of male hypogonadism and infertility.",image:"images/tb_p62_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_11",exam:"mid2",lecture:"L9 Dysmorphology",q:"A boy uses his hands on his thighs to push himself to a standing position, as shown in the image. What does this sign indicate?",options:["Spastic paraplegia","Hip dysplasia","Proximal muscle weakness (Gower's sign)","Cerebellar ataxia"],answer:2,explanation:`Gower's sign is a clinical maneuver where a child with proximal muscle weakness (particularly pelvic girdle muscles) must use their hands to "walk up" their thighs to stand from a supine or squatting position. It is classically associated with Duchenne Muscular Dystrophy (DMD) \u2014 an X-linked recessive disorder caused by dystrophin gene mutations.`,image:"images/tb_p62_fig2.png"},{id:"mid2_mid2_L9_Dysmorphology_12",exam:"mid2",lecture:"L9 Dysmorphology",q:"A patient presents with the skin findings shown in the image (caf\xE9-au-lait spots, cutaneous neurofibromas, and plexiform neurofibroma). What is the most likely diagnosis?",options:["Tuberous sclerosis","Neurofibromatosis type 1 (NF1)","McCune-Albright syndrome","Von Hippel-Lindau disease"],answer:1,explanation:"The image shows the classic triad of Neurofibromatosis type 1 (NF1): (A) caf\xE9-au-lait spots on the back, (B) cutaneous/dermal neurofibromas, and (C) plexiform neurofibroma. NF1 is caused by loss-of-function mutations in the NF1 gene (tumor suppressor). It follows autosomal dominant inheritance, with high penetrance but variable expressivity. Lisch nodules (iris hamartomas) are also characteristic.",image:"images/tb_p64_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_13",exam:"mid2",lecture:"L9 Dysmorphology",q:"The patient shown in the image is very tall with long, slender limbs, arachnodactyly, and arm span exceeding height. Which of the following is the most likely diagnosis?",options:["Klinefelter syndrome (47,XXY)","Marfan syndrome","Achondroplasia","Homocystinuria"],answer:1,explanation:"The image shows the classic body habitus of Marfan syndrome: tall stature, dolichostenomelia (long slender limbs), arachnodactyly (spider fingers), arm span > height, and pectus deformity. Marfan syndrome is caused by mutations in FBN1 (fibrillin-1) and follows autosomal dominant inheritance. Major complications include aortic root dilation/dissection and ectopia lentis.",image:"images/tb_p24_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_14",exam:"mid2",lecture:"L9 Dysmorphology",q:"A newborn presented in the NICU with midline cleft lip and palate, polydactyly, and microphthalmia. What is the most likely karyotype?",options:["47,XX,+18","47,XY,+13","45,X","47,XXY"],answer:1,explanation:"The image shows a newborn with the classic features of Patau syndrome (trisomy 13): midline cleft lip and palate, postaxial polydactyly, microphthalmia, and scalp defects. Trisomy 13 results from non-disjunction (75%) or Robertsonian translocation (25%). It carries a very poor prognosis with most affected infants not surviving past the first year of life.",image:"images/tb_p46_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_15",exam:"mid2",lecture:"L9 Dysmorphology",q:"The child shown in the image has a small jaw, widely spaced eyes, and low-set ears. Which of the following findings best matches this facial phenotype?",options:["Macrostomia and prognathia","Micrognathia and hypertelorism","Macrostomia and micrognathia","Hypertelorism and macrocephaly"],answer:1,explanation:"The image shows a child with micrognathia (small mandible) and hypertelorism (widely spaced eyes), which are dysmorphic facial features seen in several syndromes including Edwards syndrome (trisomy 18), Pierre Robin sequence, and various chromosomal deletions. Careful assessment of additional features and genetic testing are required to determine the specific diagnosis.",image:"images/tb_p54_fig1.png"},{id:"mid2_mid2_L9_Dysmorphology_16",exam:"mid2",lecture:"L9 Dysmorphology",q:"The image shows three views of a child (front, back, side) with distinctive body proportions. What is the most likely diagnosis?",options:["Marfan syndrome","Turner syndrome","Down syndrome","Achondroplasia"],answer:0,explanation:"The three views show a child with classic Marfan syndrome features: tall stature with disproportionately long limbs, scoliosis visible on the back and side views, pectus deformity, and characteristic body habitus with arm span exceeding height. Marfan syndrome is caused by mutations in FBN1 (fibrillin-1) and follows autosomal dominant inheritance. Major complications include aortic root dilation, ectopia lentis, and scoliosis.",image:"images/p62_marfan_q1.png"},{id:"mid2_mid2_L9_Dysmorphology_17",exam:"mid2",lecture:"L9 Dysmorphology",q:"The child in the image shows a triangular face, prominent forehead, and small jaw. These features are consistent with intrauterine growth restriction and postnatal short stature. What is the most likely diagnosis?",options:["Down syndrome","Angelman syndrome","Silver-Russell syndrome","Williams syndrome"],answer:2,explanation:"Silver-Russell syndrome (SRS) is characterized by: severe intrauterine growth restriction (IUGR), postnatal short stature, relative macrocephaly at birth, triangular face with prominent forehead and small jaw (micrognathia), and body asymmetry. It is caused by loss of methylation at the H19/IGF2 imprinting control region on chromosome 11p15.5 (most common, ~50%) or maternal uniparental disomy of chromosome 7 (UPD(7)mat, ~10%).",image:"images/p63_silver_russell_q6.png"},{id:"mid2_mid2_L9_Dysmorphology_18",exam:"mid2",lecture:"L9 Dysmorphology",q:"A young child presents with very short stature, rhizomelic (proximal) shortening of the limbs, prominent forehead, depressed nasal bridge, and trident hands. What is the most likely diagnosis?",options:["Marfan syndrome","Osteogenesis imperfecta","Turner syndrome","Achondroplasia"],answer:3,explanation:"The image shows the classic features of achondroplasia: the most common form of short-limbed dwarfism. Features include: rhizomelic (proximal > distal) limb shortening, prominent forehead (frontal bossing), midface hypoplasia with depressed nasal bridge, trident configuration of hands, and normal intelligence. Achondroplasia is caused by gain-of-function mutations in FGFR3 (p.Gly380Arg in >99%), follows autosomal dominant inheritance, and most cases (~80%) are de novo mutations.",image:"images/p64_achondroplasia_q8.png"},{id:"mid2_mid2_L9_Dysmorphology_19",exam:"mid2",lecture:"L9 Dysmorphology",q:"The image shows a boy demonstrating Gower's sign while getting up from the floor. What is the mode of inheritance of the condition responsible for this finding?",options:["Autosomal dominant","Autosomal recessive","X-linked recessive","Mitochondrial"],answer:2,explanation:"Gower's sign is characteristic of Duchenne Muscular Dystrophy (DMD), which follows X-linked recessive inheritance. The DMD gene (encoding dystrophin) is located on Xp21.2. Males with one mutated X are affected; females with one mutated X are usually asymptomatic carriers (though some carrier females develop mild symptoms \u2014 lyonization). DMD affects ~1 in 3,500 males. ~30% of cases are de novo mutations.",image:"images/tb_p62_fig2.png"}],zr="gbq_seen";var Nh=()=>new Set(JSON.parse(localStorage.getItem(zr)||"[]")),qh=e=>{let a=Nh();e.forEach(i=>a.add(i)),localStorage.setItem(zr,JSON.stringify([...a]))},Ry=()=>localStorage.removeItem(zr);function Gy(){let e=(0,Z.useRef)(null);return(0,Z.useEffect)(

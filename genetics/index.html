inting status of the region and confirms PWS/AS regardless of the underlying mechanism (deletion, UPD, or imprinting defect). Karyotype and FISH may miss UPD and imprinting defects."},{id:"final_final_L23_PS_Clinical_Genetics_4",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A 6-year-old boy presents with hypogonadism, obesity, and almond-shaped eyes. What is the most likely diagnosis?",options:["Down syndrome (Trisomy 21)","Fragile X syndrome","Angelman syndrome","Prader-Willi syndrome"],answer:3,explanation:"Prader-Willi syndrome (PWS) classic features: neonatal hypotonia and feeding difficulties, followed by hyperphagia and obesity in childhood, hypogonadism (small genitalia, undescended testes), almond-shaped eyes, short stature, intellectual disability, and behavioral problems (skin-picking, tantrums). PWS is caused by loss of paternal 15q11-q13 expression (deletion, maternal UPD15, or imprinting defect). Confirmed by methylation analysis. Angelman syndrome = loss of maternal 15q11-q13 (happy demeanor, seizures, absent speech)."},{id:"final_final_L23_PS_Clinical_Genetics_5",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A patient has aortic aneurysm and arachnodactyly (spider fingers). Which syndrome is most likely?",options:["Down syndrome","Marfan syndrome","Prader-Willi syndrome","Turner syndrome"],answer:1,explanation:"Marfan syndrome (FBN1 mutation, autosomal dominant) classically presents with: aortic root dilation/aneurysm (life-threatening complication \u2014 rupture/dissection), ectopia lentis (upward lens dislocation), arachnodactyly, tall stature with long limbs (dolichostenomelia), pectus excavatum/carinatum, and scoliosis. Aortic root dilation is the most serious manifestation. Regular echocardiographic surveillance is essential. Beta-blockers reduce progression of aortic dilation."},{id:"final_final_L23_PS_Clinical_Genetics_6",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A patient has duodenal atresia and a wide gap between the 1st and 2nd toes (sandal gap). Which syndrome is most likely?",options:["Marfan syndrome","Prader-Willi syndrome","Down syndrome (Trisomy 21)","Neurofibromatosis type 1"],answer:2,explanation:`Down syndrome (Trisomy 21) features include: sandal gap (wide space between 1st and 2nd toes), single palmar crease, Brushfield spots, upslanting palpebral fissures, epicanthal folds, brachycephaly, and hypotonia. Duodenal atresia ("double bubble" sign on X-ray) is a well-known association with Down syndrome (30% of duodenal atresia cases have Trisomy 21). Hirschsprung disease and Alzheimer's disease (early onset) are also associated.`},{id:"final_final_L23_PS_Clinical_Genetics_7",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A 16-year-old female presents with short stature and primary amenorrhea. Chromosomal analysis shows only 45 chromosomes. Which karyotype is most consistent?",options:["45,XX,t(14;21)","45,XX,rob(21;22)","46,X,isoXq","45,X (monosomy X)"],answer:2,explanation:"Wait - the answer from the exam key is C: 46,X,isoXq. The question states 45 chromosomes but the listed answer C shows 46. This is a variant of Turner syndrome: 46,X,i(Xq) has 46 chromosomes total (1 normal X + 1 isochromosome Xq), giving Turner phenotype due to Xp deletion. Short stature (SHOX gene on Xp is deleted) and primary amenorrhea (streak gonads) are typical Turner features. NOTE: The answer key from the exam states C (46,X,isoXq). Options A and B describe Robertsonian translocations (associated with trisomy 21/13 risk, not Turner)."},{id:"final_final_L23_PS_Clinical_Genetics_8",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A boy 2 months old has dysmorphic features, severe hypotonia, liver and renal cysts. What is the most appropriate investigation?",options:["DNA analysis of SMN1 gene","DNA analysis of DMD (dystrophin) gene","Chromosomal studies (karyotype)","Evaluation of serum very long chain fatty acids (VLCFA)"],answer:3,explanation:"The combination of severe neonatal hypotonia + dysmorphic features + hepatomegaly + renal cysts is classic for Zellweger syndrome (peroxisomal biogenesis disorder). Zellweger is diagnosed by markedly elevated plasma very long chain fatty acids (VLCFA) \u2014 peroxisomes normally degrade VLCFA by beta-oxidation. SMN1 analysis is for SMA (floppy infant without organ abnormalities). Dystrophin analysis is for DMD (presents in early childhood, not neonates). Karyotype identifies chromosomal abnormalities (not Zellweger)."},{id:"final_final_L23_PS_Clinical_Genetics_9",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A girl 8 years old presents with short stature, webbed neck, and increased carrying angle (cubitus valgus). Which investigation is most appropriate?",options:["DNA analysis of dystrophin gene","DNA analysis of CFTR gene","Chromosomal studies (karyotype)","DNA analysis of FGFR3 gene"],answer:2,explanation:"Short stature + webbed neck + cubitus valgus (increased carrying angle) = classic Turner syndrome (45,X or variant). Turner syndrome is a chromosomal abnormality \u2192 diagnosed by chromosomal analysis (karyotype). Dystrophin = DMD (muscle disease). CFTR = Cystic fibrosis (pulmonary/GI). FGFR3 = Achondroplasia (short-limbed dwarfism with rhizomelia). Turner features also include: low posterior hairline, shield chest, coarctation of the aorta, ovarian dysgenesis, and lymphedema."},{id:"final_final_L8_Pharmacogenetics_1",exam:"final",lecture:"L8 Pharmacogenetics",q:"What is the underlying cause of dark urine, jaundice and low red blood cell count and hemoglobin concentration after intake of primaquine in a malaria patient?",options:["Dihydropyrimidine dehydrogenase deficiency","Glucose-6-phosphate dehydrogenase deficiency","Cytochrome P450 deficiency","Thiopurine methyltransferase deficiency"],answer:1,explanation:"G6PD deficiency is an X-linked recessive condition where the G6PD enzyme is deficient, impairing the hexose monophosphate shunt and reducing NADPH/glutathione in red blood cells. Oxidative drugs such as primaquine cause oxidative stress, leading to hemolysis. Classic presentation: hemolytic anemia with dark urine (hemoglobinuria) and jaundice after exposure to oxidizing triggers (primaquine, dapsone, fava beans, infections)."},{id:"final_final_L8_Pharmacogenetics_2",exam:"final",lecture:"L8 Pharmacogenetics",q:"Using genetic or genomic information to select the most appropriate choice of pharmacological therapy at the correct dosage for every person is called:",options:["Pharmacogenetics","Pharmacogenomics","Personalized medicine","Genetic variation"],answer:2,explanation:"Personalized medicine (also called precision medicine) uses genetic/genomic information to tailor drug choice and dosage to each individual patient. Pharmacogenetics refers specifically to single-gene effects on drug response. Pharmacogenomics is the broader study of how the entire genome influences drug response. Personalized medicine applies that knowledge clinically."},{id:"final_final_L8_Pharmacogenetics_3",exam:"final",lecture:"L8 Pharmacogenetics",q:"What mutation causes malignant hyperthermia?",options:["Mutation in RYR1","Mutation in pCHE","Mutation in TPMT","Mutation in DPYD"],answer:0,explanation:"Malignant hyperthermia (MH) is a pharmacogenetic condition triggered by volatile anesthetics (e.g., halothane) and succinylcholine. It is caused by mutations in the RYR1 gene encoding the ryanodine receptor type 1 in skeletal muscle sarcoplasmic reticulum, leading to uncontrolled calcium release, severe hyperthermia, muscle rigidity, and rhabdomyolysis. MH follows autosomal dominant inheritance. Treatment: immediate dantrolene."},{id:"final_final_L8_Pharmacogenetics_4",exam:"final",lecture:"L8 Pharmacogenetics",q:"A patient experienced prolonged apnea after being given succinylcholine during surgery. What enzyme do they have a deficiency in?",options:["Pseudocholinesterase (butyrylcholinesterase)","Dihydropyrimidine dehydrogenase","Thiopurine methyltransferase","G6PD"],answer:0,explanation:"Pseudocholinesterase (also called butyrylcholinesterase, encoded by BCHE) normally rapidly hydrolyzes succinylcholine. Individuals with BCHE variants have reduced enzyme activity, causing prolonged neuromuscular blockade and apnea after succinylcholine administration. This is inherited in an autosomal recessive pattern. Management: mechanical ventilation until drug is cleared."},{id:"final_final_L8_Pharmacogenetics_5",exam:"final",lecture:"L8 Pharmacogenetics",q:"Fast acetylators of isoniazid (used in tuberculosis treatment) usually suffer from:",options:["High failure of isoniazid in treating tuberculosis","Drug-induced systemic lupus erythematosus","Increased risk of bladder cancer","Peripheral neuropathy"],answer:0,explanation:"N-acetyltransferase 2 (NAT2) acetylates isoniazid. Fast acetylators rapidly inactivate isoniazid \u2192 lower plasma drug levels \u2192 subtherapeutic concentrations \u2192 increased risk of treatment failure for tuberculosis. Slow acetylators maintain higher drug levels and are at increased risk of drug-induced lupus erythematosus (DILE) and peripheral neuropathy from isoniazid accumulation."},{id:"final_final_L8_Pharmacogenetics_6",exam:"final",lecture:"L8 Pharmacogenetics",q:"The mutated gene responsible for neonatal diabetes is:",options:["KCNJ11","TPMT","CFTR","HBB"],answer:0,explanation:"Permanent neonatal diabetes mellitus (PNDM) is most commonly caused by activating (gain-of-function) mutations in KCNJ11, which encodes the Kir6.2 subunit of the ATP-sensitive potassium (K-ATP) channel in pancreatic beta cells. Mutant channels remain open (fail to close in response to ATP from glucose metabolism), preventing insulin secretion. Importantly, PNDM due to KCNJ11 mutations can often be treated with oral sulfonylureas rather than insulin."},{id:"final_final_L8_Pharmacogenetics_7",exam:"final",lecture:"L8 Pharmacogenetics",q:"A male patient with tuberculosis is receiving isoniazid and develops a severe adverse effect. What should be done?",options:["Increase the dose of isoniazid","Continue treatment without stopping","Change the drug to an alternative","Add another antibiotic to the regimen"],answer:2,explanation:"If a patient develops a severe adverse effect to isoniazid (such as hepatotoxicity, severe peripheral neuropathy, or drug-induced lupus in slow acetylators), the appropriate action is to discontinue isoniazid and switch to an alternative anti-tuberculosis regimen. Continuing or increasing the dose would worsen the adverse effect. Severe hepatotoxicity from isoniazid requires drug discontinuation."},{id:"final_final_L8_Pharmacogenetics_8",exam:"final",lecture:"L8 Pharmacogenetics",q:"The NAT2 (N-acetyltransferase 2) gene is related to the metabolism of which drug?",options:["Succinylcholine","G6PD-sensitive drugs","Isoniazid","Thiopurines"],answer:2,explanation:'NAT2 (N-acetyltransferase 2) is the enzyme responsible for acetylation of isoniazid. NAT2 polymorphisms determine "fast" vs "slow" acetylator phenotype: Slow acetylators \u2192 higher isoniazid plasma levels \u2192 increased risk of peripheral neuropathy and drug-induced lupus erythematosus. Fast acetylators \u2192 lower drug levels \u2192 potential treatment failure for TB. BCHE metabolizes succinylcholine. TPMT metabolizes thiopurines. G6PD is unrelated to acetylation.'},{id:"mid1_mid1_L1_Introduction_1",exam:"mid1",lecture:"L1 Introduction",q:"What is an alternative form of a gene called?",options:["Chromosome","Genome","Allele","Locus"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? \u2022 Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome."},{id:"mid1_mid1_L1_Introduction_2",exam:"mid1",lecture:"L1 Introduction",q:"Parents are phenotypically normal but have two children with an autosomal dominant disease. What is the most likely explanation?",options:["Gonadal mosaicism","Somatic mosaicism","Complete penetrance","Anticipation"],answer:0,explanation:"From L1 Introduction: Genetics helps explain a lot of things, like what makes you unique, why you look like other members of your family, why somebody looks different and why some diseases run in your family."},{id:"mid1_mid1_L1_Introduction_3",exam:"mid1",lecture:"L1 Introduction",q:"Which of the following diseases is an example of pleiotropy?",options:["Down syndrome","Marfan syndrome","Sickle cell anemia","Turner syndrome"],answer:1,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Understanding Heredity: How traits are passed down through generations, which is essential for diagnosing and treating genetic disorders."},{id:"mid1_mid1_L1_Introduction_4",exam:"mid1",lecture:"L1 Introduction",q:"What is the definition of a gene?",options:["A sequence of RNA that forms proteins","A unit of energy in the cell","A hereditary unit of DNA that encodes a functional product","A structure found in the cytoplasm"],answer:2,explanation:"From L1 Introduction: \u2022 Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome. \u2022 Gene Variant is a permanent alteration in the DNA sequence that makes up a gene, such that the sequence differs from what is found in most people."},{id:"mid1_mid1_L1_Introduction_5",exam:"mid1",lecture:"L1 Introduction",q:"What is meant by a gene variant (mutation)?",options:["Movement of a gene within the genome","A reversible change in a protein structure","A permanent change in the DNA sequence","Temporary modification of gene expression"],answer:2,explanation:"From L1 Introduction: \u2022 Gene Variant is a permanent alteration in the DNA sequence that makes up a gene, such that the sequence differs from what is found in most people. \u2022 A threadlike structure of nucleic acids and protein found in the nucleus of most living cells, carrying genetic information in the form of genes."},{id:"mid1_mid1_L1_Introduction_6",exam:"mid1",lecture:"L1 Introduction",q:"Which condition affects both males and females equally and is an example of pleiotropy?",options:["Hemophilia","Turner syndrome","Marfan syndrome","Color blindness"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Understanding Heredity: How traits are passed down through generations, which is essential for diagnosing and treating genetic disorders."},{id:"mid1_mid1_L1_Introduction_7",exam:"mid1",lecture:"L1 Introduction",q:"What does the cytogenetic notation 7q15 indicate?",options:["Chromosome 7 short arm, first region, fifth band","Chromosome 7 long arm, fifth region, first band","Chromosome 7 short arm, fifth region, first band","Chromosome 7 long arm, first region, fifth band"],answer:3,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? \u2022 Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome."},{id:"mid1_mid1_L1_Introduction_8",exam:"mid1",lecture:"L1 Introduction",q:"The severity of a genetic disease varies among individuals within the same family. What is the most likely explanation?",options:["Complete penetrance","Genetic anticipation","Variable expressivity","Pleiotropy"],answer:2,explanation:"From L1 Introduction: Genetics helps explain a lot of things, like what makes you unique, why you look like other members of your family, why somebody looks different and why some diseases run in your family. We study genetics because the DNA sequence is the beginning, the blueprint for our development and so many of the features that make us the unique individuals we are."},{id:"mid1_mid1_L1_Introduction_9",exam:"mid1",lecture:"L1 Introduction",q:"A child is diagnosed with Angelman syndrome. Which gene is most likely affected?",options:["FMR1","DMD","CFTR","UBE3A"],answer:3,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Understanding Heredity: How traits are passed down through generations, which is essential for diagnosing and treating genetic disorders."},{id:"mid1_mid1_L1_Introduction_10",exam:"mid1",lecture:"L1 Introduction",q:"What is the probe of FISH used for microdeletion and duplication?",options:["Specific locus","Centromeric","Telomere","Whole painting"],answer:0,explanation:"From L1 Introduction: Genetics helps explain a lot of things, like what makes you unique, why you look like other members of your family, why somebody looks different and why some diseases run in your family."},{id:"mid1_mid1_L1_Introduction_11",exam:"mid1",lecture:"L1 Introduction",q:"Which cell can't be used for chromosomal analysis?",options:["Skin cells","WBCs","Hepatocyte","RBCS"],answer:3,explanation:"From L1 Introduction: \u2022 A threadlike structure of nucleic acids and protein found in the nucleus of most living cells, carrying genetic information in the form of genes. Understanding Heredity: How traits are passed down through generations, which is essential for diagnosing and treating genetic disorders."},{id:"mid1_mid1_L1_Introduction_12",exam:"mid1",lecture:"L1 Introduction",q:"Terminology that describe an Alternative form of gene found on the same locus on a pair of homologous chromosome :",options:["Allele","Gene","Heterozygosity","Homozygosity"],answer:0,explanation:"From L1 Introduction: \u2022 Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome. Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome?"},{id:"mid1_mid1_L1_Introduction_13",exam:"mid1",lecture:"L1 Introduction",q:"A baby presents with a high-pitched cry resembling a cat, microcephaly, and intellectual disability. What is the most likely condition?",options:["Edward syndrome","Williams syndrome","Cri-du-chat syndrome","Angelman syndrome"],answer:2,explanation:"Cri-du-chat syndrome is caused by deletion of the short arm of chromosome 5 (5p deletion). It presents with a high-pitched cat-like cry in infancy, microcephaly, and intellectual disability. Edward syndrome is trisomy 18; Williams syndrome involves 7q11 deletion; Angelman syndrome involves 15q11 deletion (maternal). x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome?"},{id:"mid1_mid1_L1_Introduction_14",exam:"mid1",lecture:"L1 Introduction",q:"The pedigree is in consistence with one of the following disorders:",options:["Rickets","A-thalassemia","G6PD deficiency","Hurler syndrome"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Understanding Heredity: How traits are passed down through generations, which is essential for diagnosing and treating genetic disorders.",image:"images/tb_p21_fig1.png"},{id:"mid1_mid1_L1_Introduction_15",exam:"mid1",lecture:"L1 Introduction",q:"What is a major anomaly of Marfan syndrome?",options:["Arachondactylyl","Aortic aneurysm","Pes planus","Short stature"],answer:1,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome?"},{id:"mid1_mid1_L1_Introduction_16",exam:"mid1",lecture:"L1 Introduction",q:"The unit that contains nucleic acid and protein and is responsible for heredity is called?",options:["chromosome","Genome","RNA","protein"],answer:0,explanation:"From L1 Introduction: \u2022 A threadlike structure of nucleic acids and protein found in the nucleus of most living cells, carrying genetic information in the form of genes. \u2022 Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome."},{id:"mid1_mid1_L1_Introduction_17",exam:"mid1",lecture:"L1 Introduction",q:"Regarding the cell cycle the resting phase is?",options:["Prophase","Interphase","Metaphase","Anaphase"],answer:1,explanation:"From L1 Introduction: \u2022 A threadlike structure of nucleic acids and protein found in the nucleus of most living cells, carrying genetic information in the form of genes."},{id:"mid1_mid1_L1_Introduction_18",exam:"mid1",lecture:"L1 Introduction",q:"A 10-year-old boy came to the genetic clinic complaining of a genetic disease. Family history revealed a similarly affected sister. His father and paternal grandmother have moderate manifestations. Why did his father and paternal grandmother develop moderate manifestations?",options:["Genomic imprinting","Variable expression","Somatic mosaicism","Polyploidy"],answer:1,explanation:"From L1 Introduction: Genetics helps explain a lot of things, like what makes you unique, why you look like other members of your family, why somebody looks different and why some diseases run in your family. We study genetics because the DNA sequence is the beginning, the blueprint for our development and so many of the features that make us the unique individuals we are."},{id:"mid1_mid1_L1_Introduction_19",exam:"mid1",lecture:"L1 Introduction",q:"Group of signs and symptoms occur at the same time?",options:["Sickness","Disease","Infection","Syndrome"],answer:3,explanation:"From L1 Introduction: \u2022  A group of signs and symptoms that occur together and characterize a particular abnormality or condition. Genetics helps explain a lot of things, like what makes you unique, why you look like other members of your family, why somebody looks different and why some diseases run in your family."},{id:"mid1_mid1_L1_Introduction_20",exam:"mid1",lecture:"L1 Introduction",q:"Risk of having an affected child with this syndrome increase in?",options:["young maternal age","Maternal age below 30","Maternal age above 25","Maternal age above 45"],answer:3,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Pharmacogenomics: This field studies how an individual's genes affect their response to medications, allowing for more precise prescribing."},{id:"mid1_mid1_L1_Introduction_21",exam:"mid1",lecture:"L1 Introduction",q:"Marfan syndrome is an example of?",options:["Homoplasmy","Hetroplasmy","pleiotropy","polyploidy"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome?"},{id:"mid1_mid1_L1_Introduction_22",exam:"mid1",lecture:"L1 Introduction",q:"What is risk of having this individual down syndrome child?",options:["100%","25%","1-3 %","10-15%"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Pharmacogenomics: This field studies how an individual's genes affect their response to medications, allowing for more precise prescribing."},{id:"mid1_mid1_L1_Introduction_23",exam:"mid1",lecture:"L1 Introduction",q:"10. Defect in Mismatch repair will lead:",options:["xeroderma","non-polyposis colorectal cancer","Nijmegen syndrome","breast cancer"],answer:1,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? Personalized Medicine: By tailoring treatments to an individual's genetic makeup, medical genetics can lead to more effective and safer therapies."},{id:"mid1_mid1_L1_Introduction_24",exam:"mid1",lecture:"L1 Introduction",q:"A female was in the clinic with her daughter, her daughter was 47 t (14;21)+21 Unfortunately her mother was also diagnosed by 45 t (14 ; 21 ) What is the percentage for the next birth to be affected with the same effect:",options:["0.3 %","3 -5 %","10 -15 %","100%"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome?"},{id:"mid1_mid1_L1_Introduction_25",exam:"mid1",lecture:"L1 Introduction",q:"Fragile X Syndrome is caused by:",options:["Expansion of CAG repeats > 39","Expansion on CTG repeats > 39","Expansion of CGG repeats > 200","Expansion of CTG repeats > 200"],answer:2,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome?"},{id:"mid1_mid1_L1_Introduction_26",exam:"mid1",lecture:"L1 Introduction",q:"Give the definition of homologous chromosome:",options:["A chromosome of a different size and shape which carries different types of genes","A chromosome of the same size and shape which carries the same type of genes","A chromosome of the same size and shape which carries different types of genes","A chromosome of a different size and shape which carries the same type of genes"],answer:1,explanation:"From L1 Introduction: Chromosomes x 2 Gene x 2 We will deal with the following branches in this module: Basic Genetics (basic information inn the field) Cytogenetics (chromosomes) Molecular Genetics (genes) Clinical Genetics (syndromes) What is Chromosome? \u2022 Gene is a unit of hereditary information that occupies a fixed position (locus) on a chromosome."},{id:"mid1_mid1_L2_Chromosomes_Structure_1",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"Which chromosome is considered a satellite chromosome?",options:["Chromosome 1","Chromosome 6","Chromosome 11","Chromosome 14"],answer:3,explanation:"From L2 Chromosomes Structure: Gamete Somatic cells \uF0D8All body cells except reproductive cells \uF0D8Chromosomes of the same size and shape which carry the same type of genes. Introduction \uF097The instructions in each chromosome are contained within genes, which in turn are composed of DNA."},{id:"mid1_mid1_L2_Chromosomes_Structure_2",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"What is the normal karyotype of a healthy female?",options:["45,X","47,XXX","46,XY","46,XX"],answer:3,explanation:"From L2 Chromosomes Structure: The abnormality"},{id:"mid1_mid1_L2_Chromosomes_Structure_3",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"Which of the following chromosomes is classified as metacentric?",options:["Chromosome 13","Chromosome 14","Chromosome 3","Chromosome 21"],answer:2,explanation:"From L2 Chromosomes Structure: \uF097Homologous chromosomes \uF097Sex Chromosomes \uF097Human autosomes \uF097Non-homologous chromosomes Which of the following is not used to identify chromosomes during chromosomal analysis?"},{id:"mid1_mid1_L2_Chromosomes_Structure_4",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"A chromosome ideogram is shown with labeled bands. Which of the following regions is closest to the telomere?",options:["Xq12","Xq21","Xq26","Xq28"],answer:3,explanation:"From L2 Chromosomes Structure: G- banding metaphase Staining Chromosome Labeling Example - 1q24 Chromosome is identified with a number ranging 1-22, or X and Y Each chromosome is divided into 2 arms (p,q) Each  arm divided into regions and identified by a number Each region divided into bands identified with ..."},{id:"mid1_mid1_L2_Chromosomes_Structure_5",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"Which chromosome has an appendage-like structure (satellite)?",options:["Chromosome 10","Chromosome 16","Chromosome 14","Chromosome 1"],answer:2,explanation:"From L2 Chromosomes Structure: Chromosome to Gene to Protein Chromosomes Definition \uF097Chromosomes are thread like structures in the nucleus of cells that contain genetic material or DNA. \uF097Chromosomes are thread like structures that hold our genes."},{id:"mid1_mid1_L2_Chromosomes_Structure_6",exam:"mid1",lecture:"L2 Chromosomes Structure",q:"In FISH testing, how is a microdeletion detected?",options:["By specific chromosome stain","By detecting point mutations","By analyzing banding patterns","By detecting trisomies"],answer:0,explanation:"From L2 Chromosomes Structure: \uF097Metacentric chromosomes: 1, 3, 16 , 19, 20 \uF097Sub metacentric chromosomes: 2, tions:["Nucleus","Ribosome","Golgi apparatus","Lysosomes"],answer:1,explanation:"From L3 Central Dogma: Short, discontinuous DNA segments synthesized on the lagging strand during DNA replication, allowing both new strands to be built in the essential 5' to 3' direction as the replication fork opens Protein synthesis - Transcription"},{id:"mid1_mid1_L3_Central_Dogma_3",exam:"mid1",lecture:"L3 Central Dogma",q:"During which process is mRNA produced?",options:["Translation","Replication","Post-translational modification","Transcription"],answer:3,explanation:"From L3 Central Dogma: The central dogma of molecular biology describes the fundamental flow of genetic information: 1- Replication 2- Transcription 3- Translation by which the information in genes flows in a UNILATERAL direction: DNA \u2192 RNA \u2192 protein."},{id:"mid1_mid1_L3_Central_Dogma_4",exam:"mid1",lecture:"L3 Central Dogma",q:"What is the primary function of the centromere?",options:["To initiate DNA replication during S phase","To regulate gene transcription along the chromosome","To allow attachment of spindle microtubules during cell division","To maintain chromosome length during cell division"],answer:2,explanation:"From L3 Central Dogma: Short, discontinuous DNA segments synthesized on the lagging strand during DNA replication, allowing both new strands to be built in the essential 5' to 3' direction as the replication fork opens Protein synthesis - Transcription"},{id:"mid1_mid1_L3_Central_Dogma_5",exam:"mid1",lecture:"L3 Central Dogma",q:"Which enzyme is responsible for unwinding DNA during replication?",options:["DNA polymerase","RNA polymerase","Ligase","Helicase"],answer:3,explanation:"From L3 Central Dogma: Enzymes: helicase, DNA \u2013polymerases, ligase. DNA polymerase; the enzyme required that adds new nucleotides to the new DNA strand."},{id:"mid1_mid1_L3_Central_Dogma_6",exam:"mid1",lecture:"L3 Central Dogma",q:"Which is the sequence of poly a tail that attached to mRNA?",options:["AAUAAA","AATAAA","AACAAA","AAGAAA"],answer:0,explanation:"From L3 Central Dogma: DNA polymerase; the enzyme required that adds new nucleotides to the new DNA strand. \u2022 Differs from DNA synthesis in that only one strand of DNA, the template strand, is used to make mRNA \u2022 Transcription does not need a primer to start."},{id:"mid1_mid1_L3_Central_Dogma_7",exam:"mid1",lecture:"L3 Central Dogma",q:"the mRNA sequence TAG TAG TAG if we add cytosine at the beginning what will be the new sequence?",options:["CTA GTA GTAG","CTAGTAGTAG","CTA CTA GTAG","non sense"],answer:0,explanation:"From L3 Central Dogma: \u2022 What are the types of types of eukaryotic mRNA modifications? What is the central dogma of molecular biology?"},{id:"mid1_mid1_L3_Central_Dogma_8",exam:"mid1",lecture:"L3 Central Dogma",q:"Between adenine and guanine transformation?",options:["Transition (mutation)","Transverse","Transcription","Translation"],answer:0,explanation:"From L3 Central Dogma: The central dogma of molecular biology describes the fundamental flow of genetic information: 1- Replication 2- Transcription 3- Translation by which the information in genes flows in a UNILATERAL direction: DNA \u2192 RNA \u2192 protein. What are the key differences between DNA replication and transcription?"},{id:"mid1_mid1_L3_Central_Dogma_9",exam:"mid1",lecture:"L3 Central Dogma",q:"An alteration in DNA polymerase that lacks 5' to 3' exonuclease activity results in:",options:["An increase in mutation rate","A decrease in replication speed","A decrease in RNA primer removal","An increase in recombination rate"],answer:2,explanation:"The 5' to 3' exonuclease activity of DNA Polymerase I (in prokaryotes) removes the RNA primer during replication. Loss of this activity would impair RNA primer removal. The 3' to 5' exonuclease provides proofreading; loss of that would increase mutations."},{id:"mid1_mid1_L3_Central_Dogma_10",exam:"mid1",lecture:"L3 Central Dogma",q:"In eukaryotes translation during the elongati ns:["Angelman syndrome","Prader\u2013Willi syndrome","Turner syndrome","Klinefelter syndrome"],answer:1,explanation:"From L4 Chromosomal Aberrations: Numerical Chromosome Abnormalities \uF0D8Trisomy for a whole chromosome is rarely compatible with life except : trisomy 21, trisomy 13, trisomy 18, triple X female, Klinefelter syndrome."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_31",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A male presents with dysmorphic facial features, almond- shaped eyes, small hands and feet, hyperphagia, short stature, and obesity. What is the most likely diagnosis?",options:["Prader\u2013Willi syndrome","Down syndrome","Turner syndrome","Klinefelter syndrome"],answer:0,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_32",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Polydactyly is a unique feature of which of the following disorders?",options:["Patau syndrome","Cri du chat syndrome","Achondroplasia","Down syndrome"],answer:0,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_33",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A karyotype shows a ring X chromosome. Identify the disorder:",options:["Down syndrome","Klinefelter syndrome","Turner syndrome","Patau syndrome"],answer:2,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_34",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The following karyotype is for:",options:["Klinefelter Syndrome","Patau Syndrome","Cri du chat Syndrome","Turner Syndrome"],answer:0,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht...",image:"images/tb_p44_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_35",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Which of the following syndromes is characterized by pleiotropy?",options:["Marfan syndrome","Turner syndrome","Down syndrome","Prader\u2013Willi syndrome"],answer:0,explanation:"From L4 Chromosomal Aberrations: Thyroditis \uF097Increase risk of leukemia (20 times than normal) Down Syndrome 47,XX,+13   Patau Syndrome 47,XY,+13   Patau Syndrome Patau sndrome 47,XY,+13 Mental and growth retardation Hypotonia, Holoprosencephaly Microcephaly, sloping forehead, scalp defect, forebrain defect Eye: micropht..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_36",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"This karyotype is diagnosed for:",options:["cri du chat","wolf syndrome","down syndrome","Edward syndrome"],answer:0,explanation:"The karyotype shows a deletion of the short arm of chromosome 5 (5p-), as indicated by the arrow pointing to the abnormal chromosome 5. This is Cri-du-chat syndrome. Clinical features include a high-pitched cat-like cry in infancy, microcephaly, hypertelorism, and intellectual disability.",image:"images/tb_p49_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_37",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Give the definition of Ring chromosome:",options:["A numerical chromosomal abnormality in which two chromosomes have been translocated to another one to form a ring","A structurally abnormal chromosome in which two chromosomes have been united with each other to form a ring","A numerical chromosomal abnormality in which a new chromosome has been united with another one to form a ring","A structurally abnormal chromosome in which the ends of each chromosome arm have been lost and the broken arms have been reunited to form a ring"],answer:3,explanation:"From L4 Chromosomal Aberrations: Abnormalities of Chromosome Structure Unbalanced Balanced There is loss or gain of chromosomal material The chromosome set has the normal complement ,no loss or gain The phenotype is likely to be abnormal Don\u2019t usually have phenotypic effect But they can pose a threat to the offspring \uF0A7Delet..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_38",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Mustafa and Fatima are a couple seeking genetic counseling. They have a male baby with a chromosomal aberration: 46,XY,t(21;21)+21. Cytogenetic analysis for Fatima shows the same Robertsonian translocation. What is the recurrence risk in the next pregnancy for having a similarly affected baby?",options:["1% (standard trisomy 21 recurrence)","10\u201315% (14;21 translocation carrier)","50% (balanced translocation)","100%"],answer:3,explanation:"From L4 Chromosomal Aberrations: \uF0FCDown syndrome : Recurrence Risk for next  pregnancy due to non-disjunction : 1% + the maternal age risk Risks in Robertsonian translocation \uF0FCThe female carrier of either a 13q21q or a 14q21q Robertsonian translocation runs a risk of approximately 10-15% for having a baby with Down syndrome, ..."},{id:"mid1_mid1_L4_Chromosomal_Aberrations_39",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image shows an abnormality indicated by the arrow. What chromosomal syndrome does this represent?",options:["Wolf-Hirschhorn syndrome (4p deletion)","Cri-du-chat syndrome (5p deletion)","Angelman syndrome (15q deletion)","Williams syndrome (7q11 deletion)"],answer:1,explanation:"The arrow indicates a deletion of the short arm (p arm) of chromosome 5, resulting in Cri-du-chat syndrome (46,XX/XY,del(5p)). This is a terminal deletion causing microcephaly, hypertelorism, low birth weight, intellectual disability, and the characteristic high-pitched cat-like cry (mewing) in infancy. Wolf-Hirschhorn is a 4p deletion; Angelman is a 15q deletion; Williams is 7q11.",image:"images/tb_p50_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_40",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype shown has an arrow indicating an abnormality on one chromosome. Based on the position of the arrow at chromosome 5, what syndrome does the patient most likely have?",options:["Edward syndrome","Cri-du-chat syndrome","Patau syndrome","Turner syndrome"],answer:1,explanation:"An arrow at chromosome 5 in a karyotype indicates a structural abnormality at chromosome 5. Deletion of 5p (the short arm) causes Cri-du-chat syndrome, characterized by: cat-like cry in infancy (due to laryngeal hypoplasia), microcephaly, hypertelorism, and intellectual disability. Karyotype notation: 46,XY/XX,del(5)(p15.3).",image:"images/tb_p16_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_41",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image shows an arrow indicating an abnormality. Based on the position of the arrow at chromosome 8, what is the most likely finding?",options:["Inversion of chromosome 8 (inv(8))","Deletion of chromosome 8q (del(8q))","Trisomy 8 (47,XX,+8)","Translocation involving chromosome 8"],answer:0,explanation:"When a karyotype arrow points to chromosome 8, and the chromosome 8 appears morphologically different from its homologue (e.g., different banding pattern or altered centromere position), pericentric inversion of chromosome 8 (inv(8)(p23q22)) should be considered. Inversions are balanced structural abnormalities but can predispose to unbalanced offspring.",image:"images/tb_p20_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_42",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"What syndrome does the karyotype in the image show?",options:["Down syndrome (Trisomy 21)","Edwards syndrome (Trisomy 18)","Patau syndrome (Trisomy 13)","Klinefelter syndrome (47,XXY)"],answer:0,explanation:"The karyotype shows three copies of chromosome 21 (trisomy 21), the hallmark of Down syndrome. Down syndrome is the most common chromosomal trisomy compatible with life (incidence ~1:700). Key clinical features include: intellectual disability, hypotonia, upslanting palpebral fissures, epicanthic folds, flat nasal bridge, congenital heart defects (40-50%), and short stature.",image:"images/tb_p32_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_43",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"Based on the karyotype shown, what is the most likely diagnosis?",options:["Klinefelter syndrome (47,XXY)","Turner syndrome (45,X)","Triple X syndrome (47,XXX)","Down syndrome (47,XX,+21)"],answer:1,explanation:"Turner syndrome (45,X) shows only one X chromosome and no Y chromosome (45 total chromosomes). Clinical features: short stature, webbed neck, primary amenorrhea, streak gonads, coarctation of the aorta, shield chest. It is the only complete monosomy compatible with live birth; ~99% of 45,X conceptions spontaneously abort.",image:"images/tb_p35_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_44",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"A karyotype is obtained for a phenotypically male patient presenting with gynecomastia, small testes, and azoospermia. What does the karyotype most likely show?",options:["45,X","47,XX,+21","47,XXY","46,XX"],answer:2,explanation:"The image shows Klinefelter syndrome karyotype (47,XXY): an extra X chromosome in a phenotypic male. It is the most common cause of male hypogonadism and infertility. Features: tall stature, small firm testes, azoospermia, gynecomastia, behavioral/learning difficulties. Testosterone is low; FSH and LH are elevated.",image:"images/tb_p38_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_45",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"This karyotype was obtained from a patient with features of a sex chromosome aneuploidy. What does it show?",options:["Normal female karyotype (46,XX)","Turner syndrome (45,X)","Klinefelter syndrome (47,XXY)","Normal male karyotype (46,XY)"],answer:2,explanation:"The karyotype shows 47,XXY (Klinefelter syndrome). Patients have two X chromosomes and one Y chromosome (47 total). The extra X results from non-disjunction during meiosis. Klinefelter is the most common sex chromosome aneuploidy in males (1:500-1:1000 male births) and the most common cause of male hypogonadism.",image:"images/tb_p44_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_46",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The karyotype in the image is from a child with multiple congenital anomalies including clenched fists, overlapping fingers, and rockerbottom feet. What does the karyotype show?",options:["Trisomy 13 (Patau syndrome)","Trisomy 18 (Edwards syndrome)","Trisomy 21 (Down syndrome)","Monosomy X (Turner syndrome)"],answer:1,explanation:"Edwards syndrome (trisomy 18) karyotype shows three copies of chromosome 18 (47,XX/XY,+18). Clinical features include: clenched fists with overlapping fingers (4th finger over 3rd), rocker-bottom feet, micrognathia, prominent occiput, congenital heart defects, and severe intellectual disability. Most affected individuals do not survive beyond the first year of life.",image:"images/tb_p48_fig1.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_47",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"The following karyotype is from a female patient who presents with short stature, webbed neck, and primary amenorrhea. What does the karyotype show?",options:["47,XXX (Triple X)","46,XX (Normal female)","45,X (Turner syndrome)","47,XXY (Klinefelter)"],answer:2,explanation:"Turner syndrome (45,X) is characterized by the loss of one sex chromosome, leaving only one X. The karyotype shows only 45 chromosomes with a single X. Clinical features: short stature, webbed neck (pterygium colli), low posterior hairline, shield chest, coarctation of aorta, streak ovaries, primary amenorrhea, and infertility.",image:"images/tb_p48_fig2.png"},{id:"mid1_mid1_L4_Chromosomal_Aberrations_48",exam:"mid1",lecture:"L4 Chromosomal Aberrations",q:"What karyotype does the image most likely show?",options:["47,XY,+21 (Down syndrome, male)","47,XX,+21 (Down syndrome, female)","47,XXY (Klinefelter syndrome)","46,XX (Normal female)"],answer:1,explanation:"The karyotype shows 47 chromosomes with three copies of chromosome 21 (trisomy 21) and two X chromosomes (XX sex chromosome pattern), indicating Down syndrome in a female (47,XX,+21). Down syndrome is the most common chromosomal trisomy causing intellectual disability, occurring in approximately 1 in 700 live births. Trisomy results from non-disjunction (usually in maternal meiosis I) in 95% of cases.",image:"images/tb_p39_fig1.png"},{id:"mid1_mid1_L5_L6_Mendelian_1",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Consanguinity increases the risk of which type of genetic disorder?",options:["Autosomal dominant disorders","X-linked dominant disorders","Autosomal recessive disorders","Mitochondrial disorders"],answer:2,explanation:"From L5 L6 Mendelian: Single Gene Disorders Patterns of Mendelian inheritance \u2022 Autosomal dominant \u2022 Autosomal recessive \u2022 Sex-linked ( X-linked recessive, X-linked dominant, Y-linked)."},{id:"mid1_mid1_L5_L6_Mendelian_2",exam:"mid1",lecture:"L5 L6 Mendelian",q:"Which of the following is an example of an X-linked recess

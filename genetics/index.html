<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genetics TestBank</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #060913;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --indigo: #4f46e5;
  --sky: #38bdf8;
  --violet: #7c3aed;
}

body {
  background: var(--bg);
  color: #e2e8f0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  overflow-x: hidden;
}

/* ── Aurora ── */
.aurora-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: aurora-float 14s ease-in-out infinite;
}
.aurora-1 {
  width: 520px; height: 520px;
  background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
  top: -120px; left: -100px;
  animation-delay: 0s;
}
.aurora-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
  top: 40%; right: -60px;
  animation-delay: -5s;
}
.aurora-3 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, #6d28d9 0%, transparent 70%);
  bottom: -80px; left: 30%;
  animation-delay: -9s;
}
@keyframes aurora-float {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-40px) scale(1.08); }
  66%      { transform: translate(-20px,30px) scale(0.95); }
}

/* ── Layout ── */
.screen-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  max-width: 720px;
  margin: 0 auto;
}

/* ── Title ── */
.main-title {
  font-size: 36px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 4px;
}
.shimmer-text {
  background: linear-gradient(90deg, #818cf8 0%, #38bdf8 30%, #a78bfa 60%, #818cf8 100%);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  to { background-position: 300% center; }
}
.subtitle {
  color: rgba(255,255,255,0.45);
  text-align: center;
  font-size: 15px;
  margin-top: -10px;
}

/* ── Glass card ── */
.glass-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px 22px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  width: 100%;
  max-width: 680px;
}
.section-label {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

/* ── Stagger animations ── */
.fade-in { animation: fadeUp 0.4s ease both; }
.stagger-1 { animation: fadeUp 0.4s ease 0.05s both; }
.stagger-2 { animation: fadeUp 0.4s ease 0.12s both; }
.stagger-3 { animation: fadeUp 0.4s ease 0.19s both; }
.stagger-4 { animation: fadeUp 0.4s ease 0.26s both; }
.stagger-5 { animation: fadeUp 0.4s ease 0.33s both; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── Tabs ── */
.tab-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.tab-active {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 16px #7c3aed66;
}

/* ── Chips ── */
.chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.18s;
}
.chip:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
.chip-active {
  background: rgba(79,70,229,0.25);
  border-color: #818cf8;
  color: #c7d2fe;
}

/* ── Slider ── */
.custom-slider {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 99px;
  background: linear-gradient(90deg, #4f46e5, #38bdf8);
  outline: none;
  cursor: pointer;
}
.custom-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  box-shadow: 0 0 10px #818cf888;
  cursor: pointer;
  transition: box-shadow 0.2s;
}
.custom-slider::-webkit-slider-thumb:hover {
  box-shadow: 0 0 18px #818cf8cc;
}

/* ── Toggle ── */
.toggle-btn {
  width: 50px; height: 26px;
  border-radius: 99px;
  border: none;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  position: relative;
  transition: background 0.25s;
  flex-shrink: 0;
}
.toggle-on { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
.toggle-knob {
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #fff;
  transition: left 0.25s;
  display: block;
}
.toggle-on .toggle-knob { left: 27px; }

/* ── Link btn ── */
.link-btn {
  background: none;
  border: none;
  color: #818cf8;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}
.link-btn:hover { color: #a5b4fc; }

/* ── Start button ── */
.start-btn {
  padding: 14px 40px;
  border-radius: 99px;
  border: none;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 24px #7c3aed66;
}
.start-btn:hover:not(:disabled) {
  transform: scale(1.04);
  box-shadow: 0 0 40px #7c3aed99;
}
.start-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  animation: none !important;
}
.glow-pulse {
  animation: glow-pulse 2.2s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { box-shadow: 0 0 24px #7c3aed66; }
  50%      { box-shadow: 0 0 48px #7c3aedcc; }
}

/* ── Exam badge ── */
.exam-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 99px;
  background: rgba(129,140,248,0.18);
  border: 1px solid rgba(129,140,248,0.35);
  color: #a5b4fc;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

/* ── Question text ── */
.question-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.7;
  color: rgba(255,255,255,0.92);
  margin-bottom: 20px;
}

/* ── Options ── */
.options-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.options-wrap .opt-btn {
  animation: slideInLeft 0.3s ease both;
}
@keyframes slideInLeft {
  from { opacity:0; transform: translateX(30px); }
  to   { opacity:1; transform: translateX(0); }
}
.opt-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.82);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  text-align: right;
  cursor: pointer;
  transition: all 0.18s;
  width: 100%;
}
.opt-btn:hover:not(.opt-correct):not(.opt-wrong):not(.opt-dim) {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.25);
}
.opt-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.opt-correct {
  border-color: #34d399 !important;
  background: rgba(52,211,153,0.12) !important;
  color: #6ee7b7 !important;
}
.opt-correct .opt-letter { background: rgba(52,211,153,0.3); }
.opt-wrong {
  border-color: #f87171 !important;
  background: rgba(248,113,113,0.12) !important;
  color: #fca5a5 !important;
}
.opt-wrong .opt-letter { background: rgba(248,113,113,0.3); }
.opt-dim { opacity: 0.35; cursor: default; }

/* ── Animations: bounce + shake ── */
.anim-bounce { animation: bounce-correct 0.5s ease; }
@keyframes bounce-correct {
  0%,100% { transform: scale(1); }
  30%      { transform: scale(1.04); }
  60%      { transform: scale(0.97); }
}
.anim-shake { animation: shake-wrong 0.45s ease; }
@keyframes shake-wrong {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}

/* ── Explanation box ── */
.explanation {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.7;
  direction: auto;
}
.expl-correct {
  background: rgba(52,211,153,0.1);
  border: 1px solid rgba(52,211,153,0.3);
  color: #a7f3d0;
}
.expl-wrong {
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  color: #fecaca;
}

/* ── Nav buttons ── */
.nav-btn {
  padding: 10px 22px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.18s;
}
.nav-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.12);
  color: #fff;
}
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-primary {
  background: linear-gradient(135deg, #4f46e5, #7c3aed) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 0 14px #7c3aed55;
}
.nav-primary:hover { box-shadow: 0 0 24px #7c3aed99 !important; }

/* ── Review card ── */
.review-card { margin-bottom: 0; }

/* ── Responsive ── */
@media (max-width: 480px) {
  .main-title { font-size: 26px; }
  .glass-card { padding: 16px; }
  .question-text { font-size: 15px; }
}

</head>

s mellitus"],answer:0,explanation:`Zynteglo (betibeglogene spartacus) uses an ex-vivo lentiviral vector to insert a functional beta-globin gene into the patient's own hematopoietic stem cells, treating transfusion-dependent beta-thalassemia. Libmeldy uses ex-vivo lentivirus for metachromatic leukodystrophy (MLD), a neurodegenerative disease. The clinical scenario of "severe anemia" with lentivirus best matches hemoglobinopathy treatment (Zynteglo).`},{id:"final_final_L15_Gene_Therapy_2",exam:"final",lecture:"L15 Gene Therapy",q:"What is the mechanism of action of Spinraza (nusinersen) used in spinal muscular atrophy (SMA)?",options:["Modifying an existing gene's activity (splicing modulation)","Gene knockdown","Gene editing","Introducing a new gene"],answer:0,explanation:"Spinraza (nusinersen) is an antisense oligonucleotide (ASO) that binds to an intronic splicing silencer in the SMN2 pre-mRNA, blocking splicing factors that cause exon 7 skipping. This promotes inclusion of exon 7 in SMN2 mRNA, producing more full-length functional SMN protein. It modifies an existing gene's splicing activity without editing the DNA or introducing new genetic material."},{id:"final_final_L15_Gene_Therapy_3",exam:"final",lecture:"L15 Gene Therapy",q:"Which gene therapy approach is used in Libmeldy for metachromatic leukodystrophy (MLD)?",options:["Ex-vivo AAV","In-vivo AAV","Ex-vivo lentivirus","In-vivo lentivirus"],answer:2,explanation:"Libmeldy (atidarsagene autotemcel) uses an ex-vivo lentiviral vector approach for MLD. The patient's own hematopoietic stem cells are harvested, transduced ex vivo with a lentiviral vector carrying a functional ARSA gene (encoding arylsulfatase A), and then reinfused after myeloablative conditioning. Ex-vivo lentivirus is preferred for hematopoietic stem cell gene therapy because lentiviruses stably integrate into non-dividing cells."},{id:"final_final_L15_Gene_Therapy_4",exam:"final",lecture:"L15 Gene Therapy",q:"Which mutation type is ethically controversial when used as a target in gene therapy?",options:["Somatic mutation","Germline mutation","Ex-vivo therapy approach","Antisense mutation"],answer:1,explanation:'Germline gene therapy (modifying germ cells: sperm, oocytes, or early embryos) is ethically controversial because genetic changes would be heritable and passed to future generations, raising concerns about consent of future individuals, unintended off-target effects across generations, and the ethics of "designer babies." Somatic gene therapy (targeting non-reproductive cells) is not controversial as changes are not heritable.'},{id:"final_final_L15_Gene_Therapy_5",exam:"final",lecture:"L15 Gene Therapy",q:"Why are stem cells considered particularly desirable for therapeutic applications?",options:["They can only become nerve cells","They are found exclusively in reproductive tissue","They can differentiate into many different tissue types","They form complete whole organs independently"],answer:2,explanation:"Stem cells are therapeutically valuable because of their ability to self-renew and differentiate into multiple specialized cell types (pluripotency or multipotency). This makes them useful for replacing damaged cells in various diseases. Embryonic stem cells are pluripotent (can form any cell type). Adult stem cells are multipotent (more limited differentiation). Hematopoietic stem cells (used in bone marrow transplant/ex-vivo gene therapy) can differentiate into all blood cell lineages."},{id:"final_final_L15_Gene_Therapy_6",exam:"final",lecture:"L15 Gene Therapy",q:"A child with SCID treated using retroviral gene therapy develops a leukemia-like disease. What is the most likely cause?",options:["Insertion of the retroviral vector near a proto-oncogene promoter","The SCID disease itself causing cancer","Triggered HTLV infection","Viral contamination of the product"],answer:0,explanation:"This describes the classic Paris SCID-ADA gene therapy trial complication (2002): retroviral vectors integrate randomly into the host genome. When insertion occurs near a proto-oncogene promoter (e.g., LMO2), it can activate the oncogene \u2192 uncontrolled T-cell proliferation \u2192 leukemia-like disease (insertional mutagenesis). This led to development of safer self-inactivating (SIN) lentiviral vectors with reduced insertional mutagenesis risk."},{id:"final_final_L15_Gene_Therapy_7",exam:"final",lecture:"L15 Gene Therapy",q:"Oncogenic viral vectors are effective for gene therapy in mammalian cells. However, their use is mainly hindered by:",options:["They can only be used for ex-vivo gene therapy","They infect a wide spectrum of cells","Insertional mutagenesis (integration near oncogenes)","The foreign gene is only transiently expressed"],answer:2,explanation:"Retroviral/oncogenic vectors integrate into the host genome (which gives stable long-term expression \u2014 an advantage). The main disadvantage is insertional mutagenesis: random integration can disrupt tumor suppressor genes or activate proto-oncogenes \u2192 cancer risk. This was demonstrated in the Paris SCID trial. Lentiviruses (also integrating) have similar risk but newer SIN designs reduce it. Adenoviruses do NOT integrate \u2014 their limitation is transient expression and immune reactions."},{id:"final_final_L15_Gene_Therapy_8",exam:"final",lecture:"L15 Gene Therapy",q:"Adenoviral vectors are effective for gene therapy, but they have a significant disadvantage of:",options:["Requirement for co-infection with a helper virus","Requirement of cell division for infection","Unstable (transient) expression of the introduced gene","Integration into the host genome causing mutagenesis"],answer:2,explanation:"Adenoviral vectors do NOT integrate into the host genome \u2014 they remain episomal. Advantages: can infect non-dividing cells, high transduction efficiency, large cloning capacity. Main disadvantages: transient expression (episomal DNA is diluted with cell division and lost), and strong immunogenicity (triggering host immune response that can eliminate transduced cells). They do NOT integrate, so insertional mutagenesis is not their disadvantage. The Jesse Gelsinger case (1999) showed fatal immune reaction to adenoviral vector."},{id:"final_final_L16_Genetic_Counseling_1",exam:"final",lecture:"L16 Genetic Counseling",q:'What is the correct definition of a "consultand" in genetic counseling?',options:["An individual who seeks genetic counseling","The person who performs the psychological support","A laboratory technician who interprets genetic tests","A medical geneticist who provides the diagnosis"],answer:0,explanation:"In genetic counseling terminology, the consultand (also called proband or index case in some contexts) is the individual who seeks genetic counseling \u2014 either an affected person or an at-risk family member. The genetic counselor is the professional who provides counseling services. The proband is specifically the affected family member through whom the family is ascertained."},{id:"final_final_L16_Genetic_Counseling_2",exam:"final",lecture:"L16 Genetic Counseling",q:"Which of the following best describes genetic counseling?",options:["It focuses only on medical treatment of the patient","It is done only by a clinical geneticist","It focuses only on the psychological aspect of the patient","It deals with the risk of developing or transmitting a genetic disorder"],answer:3,explanation:"Genetic counseling is a communication process that helps individuals and families understand and adapt to the medical, psychological, and familial implications of genetic contributions to disease. It includes: providing information about the nature of the genetic condition, recurrence risks for family members, available testing and reproductive options, and psychological support. It is NOT limited to treatment, psychology alone, or performed only by geneticists (genetic counselors are also key providers)."},{id:"final_final_L16_Genetic_Counseling_3",exam:"final",lecture:"L16 Genetic Counseling",q:"Which of the following is an indication for genetic counseling in adults?",options:["Family history of appendicitis","Adult with migraine headaches","Family history of heart disease after 60 years of age","A strong personal or family history of cancer with heritability"],answer:3,explanation:"Indications for genetic counseling in adults include: strong personal/family history of hereditary cancer (BRCA1/2, Lynch syndrome), diagnosis of a known genetic condition, abnormal carrier screening, positive NIPT result, consanguinity, recurrent pregnancy loss, and occupational/teratogen exposure. Late-onset heart disease after 60 is usually multifactorial and non-hereditary. Appendicitis and migraines are not genetic indications."},{id:"final_final_L16_Genetic_Counseling_4",exam:"final",lecture:"L16 Genetic Counseling",q:"Which of the following is a key principle (skill) of genetic counseling?",options:["Should be patient-centered and non-directive","Should be directive and tell patients what decisions to make","Should be judgmental about reproductive choices","Should be a one-way information transfer process"],answer:0,explanation:"Genetic counseling follows the principle of non-directiveness \u2014 it is patient-centered and does not tell patients what decisions to make. The counselor provides accurate information, supports autonomy, and respects the patient's values and beliefs. It is a two-way communication process (not one-way). The counselor should be non-judgmental about reproductive choices (such as continuation/termination of pregnancy)."},{id:"final_final_L16_Genetic_Counseling_5",exam:"final",lecture:"L16 Genetic Counseling",q:"A family was diagnosed with familial microcephaly, an autosomal recessive condition. The affected child has an unaffected sister. What is the correct counseling statement regarding the unaffected sister?",options:["The unaffected sister will definitely be affected later","The unaffected sister has a 2/3 probability of being a carrier","The parents cannot be carriers (it must be de novo)","The recurrence risk for future siblings is 50%"],answer:1,explanation:"For autosomal recessive conditions: if both parents are obligate carriers (Aa \xD7 Aa), their offspring are: 1/4 AA (unaffected non-carrier), 2/4 Aa (unaffected carrier), 1/4 aa (affected). Among unaffected children, the probability of being a carrier is 2/3. The recurrence risk for each future sibling is 25% affected. The parents are confirmed carriers since they have an affected child."},{id:"final_final_L16_Genetic_Counseling_6",exam:"final",lecture:"L16 Genetic Counseling",q:"Two children in a family are affected with an autosomal dominant disease, but both parents are clinically unaffected. What is the most likely explanation?",options:["Variable expressivity in the parents","Germline mosaicism in one parent","Somatic mosaicism in the children","Two independent de novo mutations (one in each child)"],answer:1,explanation:"Germline mosaicism occurs when a mutation arises early in embryonic development of a parent, affecting their germ cells but not their somatic cells \u2014 so the parent appears clinically unaffected but can transmit the mutation to multiple children. This explains why two children are affected while both parents appear normal. Two independent de novo mutations occurring in the same family is statistically very unlikely. Somatic mosaicism would affect the children's tissues but the mutation would come from a parental germline event."},{id:"final_final_L16_Genetic_Counseling_7",exam:"final",lecture:"L16 Genetic Counseling",q:"What is a potential reason for PEDIATRIC genetic counseling (for a child, not an adult)?",options:["Adult with family history of a genetic condition","Adult with family history of adult-onset disorders","Adult with family history of cancer","Child with a family history of a genetic condition"],answer:3,explanation:"Pediatric genetic counseling indications include: a child with a known or suspected genetic condition, dysmorphic features, developmental delay/intellectual disability, multiple congenital anomalies, failure to thrive, family history of a hereditary condition that may affect the child currently, or abnormal newborn screening. Adults are referred for adult genetic counseling (BRCA, Lynch syndrome, etc.). The key distinction: pediatric = current relevance to the child's health."},{id:"final_final_L16_Genetic_Counseling_8",exam:"final",lecture:"L16 Genetic Counseling",q:"According to genetic counseling principles, all of the following are TRUE EXCEPT:",options:["Genetic counseling is directive","Any physician can participate in genetic counseling","It includes discussion of disease cause and recurrence risk","It should ideally be done before AND after genetic testing"],answer:0,explanation:"Genetic counseling is NON-DIRECTIVE (not directive). This is a fundamental principle \u2014 the counselor provides information and supports the patient's autonomous decision-making without influencing or directing their choices. TRUE statements: Any trained healthcare provider can provide basic genetic information (though certified genetic counselors/clinical geneticists are specialists); it DOES include discussion of disease cause, natural history, inheritance, recurrence risk, and reproductive options; and it should be offered both pre-test (to prepare) and post-test (to interpret results)."},{id:"final_final_L16_Genetic_Counseling_9",exam:"final",lecture:"L16 Genetic Counseling",q:"Regarding genetic counseling, which of the following is TRUE?",options:["It should only be done after genetic testing","It is directive","It can only be performed by physicians","It includes discussion of disease cause and mode of transmission"],answer:3,explanation:"Genetic counseling includes comprehensive discussion of: the diagnosis and its cause, inheritance pattern (mode of transmission), recurrence risks for family members, available diagnostic testing options, management and treatment options, reproductive choices, and psychosocial support. It is NON-directive (not B), should be offered PRE- and POST-testing (not only after testing), and can be provided by certified genetic counselors \u2014 not only physicians."},{id:"final_final_L16_Genetic_Counseling_10",exam:"final",lecture:"L16 Genetic Counseling",q:"A consanguineous couple has a family history of PKU. What is the most appropriate genetic counseling for this couple?",options:["Autosomal dominant with reduced penetrance","Autosomal recessive; each parent has a 50% chance of being a carrier","Multifactorial inheritance; recurrence risk ~4%","X-linked recessive inheritance"],answer:1,explanation:'PKU (phenylketonuria) is autosomal recessive. With a positive family history and consanguinity, both members of the couple likely have an elevated chance of being carriers (heterozygous Aa). For a consanguineous couple with PKU family history, carrier testing should be offered. If both parents are confirmed carriers (Aa \xD7 Aa), the recurrence risk is 25% for each child (not 50%). The question states "50% chance of being carriers" which refers to carrier probability for each individual in a family, not the recurrence risk.'},{id:"final_final_L17_Hemoglobinopathy_1",exam:"final",lecture:"L17 Hemoglobinopathy",q:"An adult hemoglobin molecule consists of:",options:["4 heme groups with 2 alpha chains and 2 beta chains","4 heme groups with 2 alpha chains and 1 gamma chain","3 heme groups with 2 alpha chains and 2 beta chains","3 heme groups with 2 alpha chains and 1 gamma chain"],answer:0,explanation:"Adult hemoglobin A (HbA) consists of 4 globin chains: 2 alpha (\u03B1) chains + 2 beta (\u03B2) chains, each carrying one heme group (iron-containing porphyrin ring). Total: 4 heme groups + 4 globin chains. Fetal hemoglobin (HbF) = \u03B12\u03B32. HbA2 (minor adult Hb) = \u03B12\u03B42. Each heme group binds one oxygen molecule, so HbA can carry 4 O\u2082 molecules."},{id:"final_final_L17_Hemoglobinopathy_2",exam:"final",lecture:"L17 Hemoglobinopathy",q:"Which condition will occur if there is a loss (deletion) of all 4 alpha-globin genes?",options:["Cooley's anemia (beta-thalassemia major)","Delta-beta thalassemia","HbH disease (3-gene deletion)","Hydrops fetalis (Hb Bart's disease)"],answer:3,explanation:"Alpha-thalassemia severity correlates with the number of alpha-globin gene deletions: 1 gene deletion = silent carrier; 2 genes = alpha-thal trait; 3 genes = HbH disease (HbH = \u03B24 tetramers); 4 genes = Hydrops fetalis / Hb Bart's disease (\u03B34 tetramers). HbH disease causes moderate hemolytic anemia. Hydrops fetalis (all 4 alpha genes deleted) causes severe fetal anemia, hydrops, and is usually fatal in utero or shortly after birth."},{id:"final_final_L17_Hemoglobinopathy_3",exam:"final",lecture:"L17 Hemoglobinopathy",q:"A molecular analysis shows a mutation of the triplet codon for glutamic acid in the beta-globin gene. Which of the following hemoglobin variants will be produced?",options:["HbS (sickle cell hemoglobin)","HbC","HbF (fetal hemoglobin)","HbA2"],answer:0,explanation:"HbS (sickle cell hemoglobin) is caused by a single missense mutation in the HBB gene: codon 6 changes from GAG (glutamic acid, Glu) to GTG (valine, Val). This is the classic glutamic acid codon mutation. The resulting \u03B2S chain forms HbS (\u03B12\u03B2S2), which polymerizes under deoxygenation causing sickling. HbC results from Glu\u2192Lys at the same codon 6. Note: some batches of this question in past exams listed the answer as HbA2 \u2014 however, the correct pharmacogenetic answer based on the slides is HbS."},{id:"final_final_L17_Hemoglobinopathy_4",exam:"final",lecture:"L17 Hemoglobinopathy",q:"A newborn has Hb Bart's detected on neonatal hemoglobin screening. What is the composition of Hb Bart's?",options:["\u03B34 (four gamma chains)","\u03B12\u03B22 (normal adult hemoglobin)","\u03B12\u03B32 (fetal hemoglobin)","\u03B12\u03B42 (HbA2)"],answer:0,explanation:"Hb Bart's (Hemoglobin Bart's) = \u03B34 \u2014 four gamma globin chains forming tetramers. It occurs when all 4 alpha-globin genes are deleted (Hb Bart's hydrops fetalis). Without alpha chains, excess gamma chains form unstable \u03B34 tetramers. Hb Bart's has very high oxygen affinity and cannot release oxygen to fetal tissues, causing severe fetal hypoxia, hydrops fetalis, and stillbirth."},{id:"final_final_L17_Hemoglobinopathy_5",exam:"final",lecture:"L17 Hemoglobinopathy",q:"Which of the following is a qualitative (structural) beta-globin disorder?",options:["Cooley's anemia (beta-thalassemia major)","Sickle cell anemia","Bart's hydrops fetalis","HbH disease"],answer:1,explanation:"Hemoglobin disorders are classified as: Quantitative (thalassemias) \u2014 reduced or absent production of a structurally normal globin chain (e.g., beta-thalassemia major = Cooley's anemia, HbH, Bart's hydrops). Qualitative (structural hemoglobinopathies) \u2014 structurally abnormal hemoglobin due to amino acid substitution (e.g., sickle cell anemia = HbS Glu\u2192Val, HbC, HbE). Sickle cell anemia is the prototype qualitative beta-globin disorder."},{id:"final_final_L17_Hemoglobinopathy_6",exam:"final",lecture:"L17 Hemoglobinopathy",q:"A 2-year-old child presents with characteristic facial features (prominent forehead, maxillary prominence), severe pallor, and has required repeated blood transfusions since infancy. What is the definitive cure for this condition?",options:["Chelating agent therapy only","Bone marrow (hematopoietic stem cell) transplant","Hydroxyurea","Constant regular transfusions"],answer:1,explanation:"The description is beta-thalassemia major (Cooley's anemia): characterized by severe microcytic hemolytic anemia, transfusion dependence from infancy, and typical facial features from bone marrow expansion. The only definitive cure is allogeneic hematopoietic stem cell transplantation (HSCT/bone marrow transplant), which replaces the defective hematopoietic stem cells. Chelation therapy manages iron overload from transfusions but is not curative. Hydroxyurea is used in sickle cell disease to induce HbF. Gene therapy (Zynteglo) is an emerging curative option."},{id:"final_final_L17_Hemoglobinopathy_7",exam:"final",lecture:"L17 Hemoglobinopathy",q:"One parent is affected with sickle cell disease (HbSS) and the other parent has sickle cell trait (HbAS). What is the recurrence risk for each pregnancy?",options:["50% chance of an affected child (HbSS)","25% chance of an unaffected child (HbAA)","No counseling needed as risk is minimal","75% chance of an affected child"],answer:0,explanation:"Cross: HbSS (affected) \xD7 HbAS (carrier/trait): All gametes from SS parent carry S. AS parent gives A or S (50% each). Results: 50% HbAS (sickle cell trait \u2014 carrier, usually asymptomatic) + 50% HbSS (sickle cell disease \u2014 affected). Therefore, 50% risk of an affected child per pregnancy. This couple requires thorough genetic counseling regarding recurrence risk and prenatal diagnosis options."},{id:"final_final_L18_L19_IEM_1",exam:"final",lecture:"L18 L19 IEM",q:"Which of the following is considered a second-line (confirmatory) test for inborn errors of metabolism?",options:["Ammonia level","Lactic acid level","Blood gas","Urine organic acid analysis"],answer:3,explanation:"IEM investigations are divided into: First-line (initial screening): ammonia, lactic acid, blood gas, glucose, CBC. Second-line (specific confirmatory): urine organic acids (identifies specific organic acidemias like methylmalonic acidemia, propionic acidemia), plasma amino acids (amino acidopathies), acylcarnitine profile (fatty acid oxidation defects), enzyme assays, and molecular testing. Urine organic acid analysis is a key second-line test that identifies the specific metabolic defect."},{id:"final_final_L18_L19_IEM_2",exam:"final",lecture:"L18 L19 IEM",q:"Which of the following conditions presents very similarly to Marfan syndrome clinically?",options:["Phenylketonuria","Hurler disease (MPS type I)","Homocystinuria","Tay-Sachs disease"],answer:2,explanation:"Homocystinuria (CBS deficiency \u2014 autosomal recessive) can closely mimic Marfan syndrome: tall stature, long limbs (dolichostenomelia), arachnodactyly, pectus deformity, scoliosis, and lens dislocation (ectopia lentis). Key differences: Marfan has UPWARD lens dislocation, homocystinuria has DOWNWARD dislocation; homocystinuria causes intellectual disability, thromboembolic events, and osteoporosis; Marfan does NOT. Homocystinuria is caused by CBS gene mutations."},{id:"final_final_L18_L19_IEM_3",exam:"final",lecture:"L18 L19 IEM",q:"Which of the following conditions is related to lysosomal storage disorders?",options:["Zellweger spectrum disorder","Mucopolysaccharidoses (MPS)","Mitochondrial fatty acid oxidation defects","Peroxisomal biogenesis disorders"],answer:1,explanation:"Lysosomal storage disorders (LSDs) result from deficiencies of lysosomal enzymes leading to substrate accumulation within lysosomes. Mucopolysaccharidoses (MPS) \u2014 such as Hurler (MPS I), Hunter (MPS II), Morquio (MPS IV), and Maroteaux-Lamy (MPS VI) \u2014 are LSDs caused by deficiencies of enzymes that degrade glycosaminoglycans (mucopolysaccharides). Zellweger is a peroxisomal disorder (not lysosomal). Fatty acid oxidation disorders are mitochondrial."},{id:"final_final_L18_L19_IEM_4",exam:"final",lecture:"L18 L19 IEM",q:"A 6-year-old girl presents with intellectual disability, seizures, decreased pigmentation of skin, hair, and iris, and a musty/mousy odor of urine. Which amino acid would you expect to be elevated on quantitative plasma amino acid profile?",options:["Glycine","Homocysteine","Phenylalanine","Tyrosine"],answer:2,explanation:"The classic presentation is Phenylketonuria (PKU) \u2014 autosomal recessive deficiency of phenylalanine hydroxylase (PAH). Without PAH, phenylalanine (Phe) accumulates in blood and tissues \u2192 elevated plasma phenylalanine. Excess Phe is converted to phenylpyruvate/phenylacetate (musty/mousy odor). Phe competes with tyrosine for melanin synthesis \u2192 reduced skin/hair/iris pigmentation. Untreated PKU \u2192 severe intellectual disability, seizures, microcephaly."},{id:"final_final_L18_L19_IEM_5",exam:"final",lecture:"L18 L19 IEM",q:"A female patient has short stature and rhizomelic (proximal) shortening of her limbs. Genetic testing shows a heterozygous FGFR3 mutation. If she marries a man with the same heterozygous mutation, what percentage of their children will be unaffected (normal)?",options:["100%","1-3%","25%","50%"],answer:2,explanation:"The condition is achondroplasia (autosomal dominant FGFR3 mutation). Cross: Aa (affected) \xD7 Aa (affected): AA = 25% (homozygous achondroplasia \u2014 lethal in utero/early infancy), Aa = 50% (affected with achondroplasia), aa = 25% (unaffected/normal stature). Therefore, 25% of all pregnancies will result in an unaffected child. Note: among live-born children, the fraction of unaffected children is about 1/3 (since AA is typically lethal)."},{id:"final_final_L18_L19_IEM_6",exam:"final",lecture:"L18 L19 IEM",q:"In ornithine transcarbamylase (OTC) deficiency, which investigation finding is most characteristic?",options:["Reduced orotic acid in urine","Elevated lactic acid","Hyperammonemia","Increased methionine and homocysteine"],answer:2,explanation:"OTC deficiency is the most common urea cycle disorder (X-linked recessive). OTC catalyzes the conversion of ornithine + carbamoyl phosphate \u2192 citrulline. Deficiency \u2192 carbamoyl phosphate accumulates \u2192 diverted to pyrimidine synthesis \u2192 increased OROTIC ACID in urine (elevated, not reduced). Most characteristic finding: hyperammonemia (elevated NH3) due to failure of the urea cycle. Presentation: vomiting, lethargy, encephalopathy in neonates (severe form) or periodic episodes in mild form."},{id:"final_final_L18_L19_IEM_7",exam:"final",lecture:"L18 L19 IEM",q:"What is the best course of action for a 2-week-old neonate diagnosed with galactosemia?",options:["Lactose-free and galactose-free milk formula","Fructose-free milk","Liver transplant","Stem cell therapy"],answer:0,explanation:"Classic galactosemia (GALT deficiency \u2014 autosomal recessive) results in accumulation of galactose-1-phosphate. Treatment: immediate elimination of galactose and lactose from diet. Lactose (milk sugar) = glucose + galactose. Standard formula must be replaced with lactose-free AND galactose-free formula (soy-based or casein hydrolysate). Breastfeeding must stop. Early dietary treatment prevents liver damage, cataracts, and intellectual disability. Complications include E. coli sepsis in neonates."},{id:"final_final_L18_L19_IEM_8",exam:"final",lecture:"L18 L19 IEM",q:"A newborn presents with vomiting, lethargy, and elevated phenylalanine levels. If the incidence of this condition is 1/10,000, what is the carrier frequency?",options:["1:100","1:25","1:50","1:10"],answer:2,explanation:"Using Hardy-Weinberg equilibrium: disease frequency (q\xB2) = 1/10,000. Therefore q = 1/100 (allele frequency of mutant allele). p \u2248 1 (since q is small). Carrier frequency = 2pq \u2248 2 \xD7 (1) \xD7 (1/100) = 2/100 = 1/50. The answer is 1:50. This principle applies to autosomal recessive conditions \u2014 carrier frequency is approximately 2\u221A(disease incidence)."},{id:"final_final_L18_L19_IEM_9",exam:"final",lecture:"L18 L19 IEM",q:"A neonate presents with vomiting, lethargy, and laboratory tests reveal significantly increased plasma levels of valine, leucine, and isoleucine. What is the most likely diagnosis?",options:["Propionic acidemia","Maple syrup urine disease (MSUD)","Methylmalonic acidemia","Isovaleric acidemia"],answer:1,explanation:"Maple Syrup Urine Disease (MSUD) is caused by deficiency of branched-chain alpha-keto acid dehydrogenase (BCKD). This enzyme catabolizes branched-chain amino acids (BCAAs): valine, leucine, and isoleucine. Deficiency \u2192 accumulation of BCAAs and their alpha-keto acids \u2192 sweet/maple syrup odor of urine \u2192 encephalopathy, seizures, cerebral edema. Treatment: BCAA-restricted diet, thiamine supplementation."},{id:"final_final_L18_L19_IEM_10",exam:"final",lecture:"L18 L19 IEM",q:"A 2-year-old child presents with intellectual disability and hypopigmentation of hair. What is the most likely diagnosis?",options:["Phenylketonuria (PKU)","Galactosemia","Homocystinuria","Tay-Sachs disease"],answer:0,explanation:"PKU (phenylalanine hydroxylase deficiency) presents with: intellectual disability (untreated), fair skin and hair hypopigmentation (phenylalanine competes with tyrosine in melanin synthesis \u2192 reduced melanin \u2192 lighter pigmentation), musty urine odor, seizures, and eczema. Newborn screening (Guthrie test) detects elevated phenylalanine. Early dietary restriction of phenylalanine prevents neurological damage."},{id:"final_final_L18_L19_IEM_11",exam:"final",lecture:"L18 L19 IEM",q:"Which of the following is a characteristic clinical feature of homocystinuria?",options:["Sweet-smelling urine","Dark urine","Lens dislocation (ectopia lentis)","Short stature and skeletal dysplasia"],answer:2,explanation:"Homocystinuria (CBS \u2014 cystathionine beta-synthase deficiency) features include: Marfanoid body habitus (tall, long limbs, arachnodactyly), ectopia lentis (lens dislocation \u2014 characteristically DOWNWARD, unlike Marfan's which is upward), intellectual disability, thromboembolic events (stroke, DVT), and osteoporosis. Sweet-smelling urine is characteristic of MSUD. Dark urine is seen in alkaptonuria."},{id:"final_final_L18_L19_IEM_12",exam:"final",lecture:"L18 L19 IEM",q:"What is the characteristic clinical feature of PKU on physical examination?",options:["Hair hypopigmentation","Sweet-smelling urine","Lens dislocation","Hepatomegaly"],answer:0,explanation:"In PKU, excess phenylalanine competitively inhibits tyrosinase, reducing melanin synthesis \u2192 hypopigmentation of hair (blond/light hair even in dark-haired families), skin, and eyes. The urine has a musty/mousy odor (phenylacetate), NOT sweet. Sweet-smelling urine is MSUD. Lens dislocation is homocystinuria. Hepatomegaly is galactosemia."},{id:"final_final_L18_L19_IEM_13",exam:"final",lecture:"L18 L19 IEM",q:"A child presented with non-ketotic hypoglycemia. This may be due to:",options:["Hereditary fructose intolerance","Hyperinsulinism","Von Gierke disease (GSD type I)","Galactosemia"],answer:1,explanation:"Non-ketotic hypoglycemia (hypoglycemia WITHOUT elevated ketones) is characteristic of hyperinsulinism (excess insulin suppresses fatty acid oxidation \u2192 no ketone production) and fatty acid oxidation disorders (FAO defects). Ketotic hypoglycemia (with ketones) is seen in: Von Gierke disease, galactosemia, hereditary fructose intolerance, and ketotic hypoglycemia of childhood. The absence of ketones is the key clue \u2014 it means fatty acid oxidation is impaired (hyperinsulinism) rather than simply inadequate glucose supply."},{id:"final_final_L18_L19_IEM_14",exam:"final",lecture:"L18 L19 IEM",q:"A newborn infant presents with hypotonia, prominent forehead, large anterior fontanel, enlarged liver, renal cysts, and markedly increased plasma very long chain fatty acids (VLCFA). The pathogenesis of this disorder is due to:",options:["Severely reduced numbers of peroxisomes in all cells","Abnormal accumulation of one amino acid proximal to a metabolic block","Deficiency of a lysosomal enzyme causing accumulation of macromolecules","Inborn errors of glycogen synthesis and degradation enzymes"],answer:0,explanation:"The presentation is Zellweger syndrome (Cerebrohepatorenal syndrome) \u2014 a severe peroxisomal biogenesis disorder. Zellweger is caused by mutations in PEX genes, leading to severely reduced/absent peroxisomes. Without functional peroxisomes, VLCFA cannot be oxidized (beta-oxidation of VLCFA occurs in peroxisomes) \u2192 accumulate in blood and tissues. Features: neonatal hypotonia, craniofacial dysmorphism, hepatomegaly, renal cysts, and absent reflexes. Invariably fatal within the first year of life."},{id:"final_final_L18_L19_IEM_15",exam:"final",lecture:"L18 L19 IEM",q:"A 6-year-old girl presents with intellectual disability, seizures, fair hair and skin, and a musty odor of sweat and urine. Regarding this disorder, which statement is correct?",options:["Treatment involves a low-methionine diet with cystine supplementation","It is caused by deficiency of the enzyme required for conversion of phenylalanine to tyrosine","Dietary fructose restriction gives a good prognosis","Diagnosis is confirmed by elevated branched-chain amino acids in blood"],answer:1,explanation:"The presentation describes PKU (phenylketonuria) \u2014 caused by phenylalanine hydroxylase (PAH) deficiency, which converts phenylalanine \u2192 tyrosine. Without PAH, phenylalanine accumulates \u2192 musty/mousy odor, fair skin/hair (tyrosine deficiency \u2192 reduced melanin), intellectual disability (untreated). Treatment: low-phenylalanine diet (NOT low-methionine). Low-methionine diet is for homocystinuria. Fructose restriction is for hereditary fructose intolerance. BCAA elevation is MSUD."},{id:"final_final_L18_L19_IEM_16",exam:"final",lecture:"L18 L19 IEM",q:"A neonate is admitted to the NICU with ammonia level above 200 \u03BCmol/L. What disorder is most likely suspected?",options:["Glycogen storage disease","Urea cycle disorder","Mitochondrial disorder","Mucopolysaccharidosis"],answer:1,explanation:"Hyperammonemia (elevated ammonia) is the hallmark of urea cycle disorders (UCDs). The urea cycle converts toxic ammonia (NH3) to urea for excretion. Any enzyme defect in the cycle (CPS1, OTC, ASS, ASL, ARG1) causes ammonia accumulation \u2192 neonatal encephalopathy, lethargy, vomiting. Severe neonatal hyperammonemia (>200 \u03BCmol/L) requires immediate treatment (protein restriction, arginine supplementation, ammonia scavenger drugs, dialysis). Glycogen storage diseases cause hypoglycemia, not hyperammonemia."},{id:"final_final_L18_L19_IEM_17",exam:"final",lecture:"L18 L19 IEM",q:"A 4-month-old male presents with jaundice since birth, cataract, and hepatomegaly. Investigations reveal reducing substances in urine. What is the appropriate management?",options:["Prescribing lactose-free (and galactose-free) milk formula","Giving tyrosine supplements","Restricting leucine and valine","Restricting fructose"],answer:0,explanation:"The presentation is classic galactosemia (GALT deficiency): jaundice, cataracts, hepatomegaly, and reducing substances in urine (Clinitest positive = galactose detected but Glucose Oxidase/Clinistix negative). Immediate treatment: eliminate all sources of galactose and lactose from diet \u2192 lactose-free galactose-free formula (e.g., soy formula). Delay leads to liver failure, E. coli sepsis, cataracts, and intellectual disability. Tyrosine supplements = alkaptonuria/tyrosinemia treatment. Leucine/valine restriction = MSUD. Fructose restriction = hereditary fructose intolerance."},{id:"final_final_L18_L19_IEM_18",exam:"final",lecture:"L18 L19 IEM",q:"The laboratory reports significant elevation of plasma arginine. What additional biochemical abnormality is most expected?",options:["Hyperammonemia","Lactic acidosis","Hypoglycemia","Elevated muscle enzymes (CK)"],answer:0,explanation:"Elevated plasma arginine indicates arginase deficiency (ARG1 deficiency) \u2014 the last enzyme of the urea cycle, converting arginine \u2192 ornithine + urea. When arginase is absent, arginine accumulates AND urea cannot be formed \u2192 ammonia accumulates \u2192 hyperammonemia. Clinical features of arginase deficiency (UCD): spastic diplegia, intellectual disability, and hyperammonemia (typically milder than other UCDs). Treatment: low-protein diet, arginine-restricted diet, ammonia scavengers."},{id:"final_final_L18_L19_IEM_19",exam:"final",lecture:"L18 L19 IEM",q:"A 1-year-old boy presents with intellectual disability, fair skin, and an unusual urine odor. What is the fundamental disease mechanism in this condition?",options:["Energy failure (ATP depletion)","Accumulation of large complex molecules (storage)","Excess of essential metabolites (substrate deficiency downstream)","Accumulation of toxic metabolites (substrate toxicity upstream)"],answer:3,explanation:"The presentation is PKU \u2014 the disease mechanism is substrate toxicity: phenylalanine (and its abnormal metabolites: phenylpyruvate, phenylacetate, phenyllactate) accumulate to toxic levels \u2192 inhibit brain development, neurotransmitter synthesis, and myelin formation. IEM mechanisms include: (1) Substrate toxicity: PKU, MSUD, OA, (2) Product deficiency: albinism (no melanin), (3) Energy failure: mitochondrial disorders, (4) Storage: LSDs (lysosomal storage). PKU specifically = toxic metabolite accumulation."},{id:"final_final_L18_L19_IEM_20",exam:"final",lecture:"L18 L19 IEM",q:"Which of the following represents the correct disease-diagnostic biochemical test matching?",options:["Mucopolysaccharidosis \u2014 Plasma ammonia","Homocystinuria \u2014 Plasma methionine (and homocysteine)","Zellweger syndrome \u2014 Plasma glucose","Galactosemia \u2014 Plasma lactic acid"],answer:1,explanation:"Homocystinuria (CBS deficiency) \u2192 elevated plasma methionine and homocysteine (both accumulate due to blocked CBS enzyme). This is the correct match. MPS \u2192 elevated urine glycosaminoglycans (not ammonia; ammonia = urea cycle disorder). Zellweger \u2192 elevated plasma VLCFA (not glucose). Galactosemia \u2192 reducing substances in urine + elevated plasma galactose (not lactic acid; lactic acidosis = mitochondrial disorders or severe hypoxia)."},{id:"final_final_L18_L19_IEM_21",exam:"final",lecture:"L18 L19 IEM",q:"Plasma amino acid analysis is a useful diagnostic tool for which of the following disorders?",options:["Fatty acid oxidation defect","Galactosemia","Maple syrup urine disease (MSUD)","Organic acidemia"],answer:2,explanation:"MSUD (branched-chain alpha-keto acid dehydrogenase deficiency) causes accumulation of branched-chain amino acids (valine, leucine, isoleucine) in plasma \u2192 elevated on plasma amino acid analysis. For other conditions: FAO defects \u2192 diagnosed by acylcarnitine profile (plasma) and urine organic acids. Galactosemia \u2192 reducing substances in urine + RBC enzyme assay. Organic acidemias \u2192 urine organic acid analysis (NOT plasma amino acids, though some amino acids may be secondarily affected)."},{id:"final_final_L20_Oncogenetics_1",exam:"final",lecture:"L20 Oncogenetics",q:"A 47-year-old female is referred to the genetic clinic with a tumor in her right colon. Her father died at age 55 from colon cancer and her paternal aunt had endometrial cancer. What is the chance of her offspring to develop colon cancer?",options:["50%","25%","100%","75%"],answer:0,explanation:"The family history (colon cancer + endometrial cancer across generations, autosomal dominant pattern) is consistent with Lynch syndrome (HNPCC) \u2014 caused by mismatch repair gene mutations (MLH1, MSH2, MSH6, PMS2). Lynch syndrome follows autosomal dominant inheritance. An affected individual (the patient) has a 50% chance of passing the mutation to each offspring \u2192 50% risk of offspring carrying the mutation (and having significantly elevated lifetime cancer risk)."},{id:"final_final_L20_Oncogenetics_2",exam:"final",lecture:"L20 Oncogenetics",q:"Which class of genes is responsible for the two-hit hypothesis of cancer development?",options:["Tumor suppressor genes","Growth factor genes","Growth factor receptor genes","Proto-oncogenes"],answer:0,explanation:"Knudson's two-hit hypothesis applies to tumor suppressor genes (e.g., RB1, TP53, APC, BRCA1/2). Both alleles of the tumor suppressor gene must be inactivated for tumor development. In hereditary cancer syndromes, the first hit is a germline mutation (inherited), and the second hit is a somatic mutation in the remaining wild-type allele. In sporadic cancer, both hits are acquired somatically. Proto-oncogenes require only ONE activating mutation (dominant gain-of-function)."},{id:"final_final_L20_Oncogenetics_3",exam:"final",lecture:"L20 Oncogenetics",q:"Which condition is treated with prophylactic total colectomy?",options:["HNPCC (Lynch syndrome)","FAP (familial adenomatous polyposis)","Bloom syndrome","Cowden syndrome"],answer:1,explanation:"Familial Adenomatous Polyposis (FAP) \u2014 caused by germline APC mutations \u2014 leads to hundreds to thousands of colorectal polyps by adolescence/young adulthood. Without prophylactic total colectomy, colorectal cancer is virtually inevitable by age 40. Therefore, prophylactic colectomy is recommended in teenage years. Lynch syndrome (HNPCC) carries high colon cancer risk but does NOT require prophylactic colectomy \u2014 intensive surveillance (colonoscopy every 1-2 years) is the standard approach."},{id:"final_final_L20_Oncogenetics_4",exam:"final",lecture:"L20 Oncogenetics",q:"Which condition typically requires prophylactic total colectomy as the management of choice?",options:["Lynch syndrome","FAP (familial adenomatous polyposis)","HNPCC","Bloom syndrome"],answer:1,explanation:"FAP (APC gene, autosomal dominant) causes development of hundreds to thousands of adenomatous polyps throughout the colon, with near-100% risk of colorectal cancer if untreated. Prophylactic total (or subtotal) colectomy is the standard management, typically performed in the teenage years or early adulthood. Lynch syndrome (= HNPCC) also increases colorectal cancer risk significantly but is managed with intensive colonoscopic surveillance, not prophylactic colectomy."},{id:"final_final_L20_Oncogenetics_5",exam:"final",lecture:"L20 Oncogenetics",q:"What is the gene most commonly mutated in Lynch syndrome (HNPCC)?",options:["APC","BRCA1","MSH1/MSH2 (mismatch repair genes)","RB1"],answer:2,explanation:"Lynch syndrome (Hereditary Non-Polyposis Colorectal Cancer, HNPCC) is caused by germline mutations in DNA mismatch repair (MMR) genes: MLH1 (most common), MSH2, MSH6, and PMS2. Note: MSH1 does not exist \u2014 the relevant genes are MSH2 and MSH6. Lynch syndrome predisposes to colorectal cancer (without polyposis), endometrial cancer, ovarian cancer, and other tumors. APC mutations cause FAP. BRCA1/2 mutations cause hereditary breast/ovarian cancer."},{id:"final_final_L20_Oncogenetics_6",exam:"final",lecture:"L20 Oncogenetics",q:"The pedigree shows a family with multiple members affected by breast and ovarian cancer across generations. What is the most likely associated gene?",options:["EPCAM","BRCA2","APC","PTEN"],answer:1,explanation:"A pedigree showing autosomal dominant inheritance of breast AND ovarian cancer (particularly with early-onset breast cancer in females and possible male breast cancer) strongly suggests BRCA1 or BRCA2 mutations. BRCA2 is particularly associated with both breast and ovarian cancer in females, and also increases breast cancer risk in males. EPCAM mutations cause Lynch syndrome (colorectal/endometrial cancer). APC causes FAP. PTEN causes Cowden syndrome (breast/thyroid/uterine tumors)."},{id:"final_final_L20_Oncogenetics_7",exam:"final",lecture:"L20 Oncogenetics",q:"Mutations in the BRCA2 gene:",options:["Account for 3\u20135% of all familial breast cancer cases","Account for 100% of familial breast cancer cases","Confer no breast cancer risk to males","Are associated with increased prostate cancer risk in males"],answer:3,explanation:"BRCA2 mutations: Account for approximately 10-20% of hereditary breast cancer (not 3-5%, not 100%). Males with BRCA2 mutations have significantly increased risk of breast cancer (male breast cancer risk ~7% lifetime vs. 0.1% general population) AND increased prostate cancer risk, as well as pancreatic cancer risk. BRCA1 mutations confer higher breast/ovarian cancer risk in females. BRCA2 mutations are associated with a broader tumor spectrum including prostate, pancreatic, and melanoma."},{id:"final_final_L20_Oncogenetics_8",exam:"final",lecture:"L20 Oncogenetics",q:"Which statement about inherited cancer is TRUE?",options:["Most cancers are inherited","A parent may carry a cancer-predisposing mutation and remain unaffected while their child develops cancer","Inherited cancer never skips generations","Familial cancers are caused by mutations in normal genes only"],answer:1,explanation:'~5-10% of all cancers are hereditary (NOT most). Hereditary cancers follow autosomal dominant inheritance with incomplete penetrance \u2014 carriers may NOT develop cancer (reduced penetrance), while their children with the same mutation do develop cancer. This is because cancer requires additional somatic "hits" (two-hit hypothesis). Inherited cancer CAN skip generations due to reduced penetrance. Familial cancers are caused by mutations in cancer-predisposing genes (tumor suppressors, mismatch repair genes).'},{id:"final_final_L20_Oncogenetics_9",exam:"final",lecture:"L20 Oncogenetics",q:"Which of the following features is most suggestive of a hereditary cancer syndrome in a family?",options:["Several close relatives affected with the same type of cancer","Only one relative with a rare cancer","Late age of onset (after 70 years)","A single unilateral tumor"],answer:0,explanation:"Features suggesting a hereditary cancer syndrome include: multiple family members with the same or related cancers (e.g., breast + ovarian, colorectal + endometrial), early age of onset (before 50), multiple primary tumors in one individual, bilateral tumors, rare cancers in unexpected demographics (male breast cancer), and autosomal dominant inheritance pattern across generations. Late age of onset and sporadic single tumors are typical of sporadic cancer."},{id:"final_final_L21_Prenatal_Diagnosis_1",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"An increased maternal serum beta-hCG (B-hCG) combined with a reduced maternal serum AFP (MSAFP) suggests a possibility of which condition?",options:["Down syndrome (Trisomy 21)","Hydatidiform mole","Neural tube defect","Edwards syndrome (Trisomy 18)"],answer:0,explanation:"The triple/quadruple screening test pattern for Down syndrome (Trisomy 21): elevated B-hCG (\u2191), reduced MSAFP (\u2193), low uE3 (\u2193), elevated inhibin A (\u2191). Neural tube defects show markedly ELEVATED MSAFP (not reduced). Edwards syndrome (Trisomy 18) shows low hCG + low MSAFP + low uE3. Hydatidiform mole causes extremely high hCG but is not a fetal chromosomal abnormality."},{id:"final_final_L21_Prenatal_Diagnosis_2",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Increased maternal serum alpha-fetoprotein (MSAFP) suggests a possibility of which condition?",options:["Neural tube defect (open NTD)","Down syndrome (Trisomy 21)","Edwards syndrome (Trisomy 18)","Turner syndrome"],answer:0,explanation:"Elevated MSAFP indicates leakage of fetal AFP into maternal blood, most commonly from an open neural tube defect (NTD) such as anencephaly or meningomyelocele (spina bifida aperta). Other causes of elevated MSAFP: gastroschisis, abdominal wall defects, fetal death, multiple pregnancy. Down syndrome and other trisomies typically show REDUCED MSAFP. Elevated MSAFP should be followed by detailed fetal ultrasound and possibly amniocentesis for amniotic AFP."},{id:"final_final_L21_Prenatal_Diagnosis_3",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Which of the following is an indication for prenatal diagnosis?",options:["Very young maternal age (teenage pregnancy)","Advanced maternal age (\u226535 years)","Family history of obesity","Smoking during pregnancy"],answer:1,explanation:"Indications for prenatal diagnosis include: advanced maternal age (\u226535 years) due to increased risk of chromosomal aneuploidy (especially trisomy 21), previous child with chromosomal abnormality, carrier status for chromosomal rearrangement or single-gene disorder, abnormal maternal serum screening, family history of genetic condition diagnosable prenatally, and abnormal fetal ultrasound findings. Obesity, smoking, and young maternal age are NOT standard indications for invasive prenatal testing."},{id:"final_final_L21_Prenatal_Diagnosis_4",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"A 13-week pregnant woman has low PAPP-A and low beta-hCG on first-trimester screening. What is the best confirmatory diagnostic test?",options:["Triple test (second trimester)","Quadruple test (second trimester)","Chorionic villus sampling (CVS)","No further testing needed"],answer:2,explanation:"At 13 weeks, chorionic villus sampling (CVS) is the appropriate invasive diagnostic test for suspected chromosomal abnormality. CVS is performed between 10-14 weeks of gestation, providing a definitive karyotype/chromosomal diagnosis. Low PAPP-A + low beta-hCG in first trimester is a pattern seen in chromosomal aneuploidy (particularly trisomies). The triple and quadruple tests are second-trimester screening tests \u2014 not indicated when the question asks for confirmatory diagnosis at 13 weeks."},{id:"final_final_L21_Prenatal_Diagnosis_5",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"A 13-week pregnant woman has low PAPP-A and low beta-hCG. What is the most likely underlying fetal condition?",options:["Aneuploidy (chromosomal abnormality)","Single-gene disorder","Multifactorial condition","Normal variant"],answer:0,explanation:"Low PAPP-A (pregnancy-associated plasma protein-A) combined with low beta-hCG at 11-13 weeks is characteristic of fetal aneuploidy \u2014 particularly trisomy 18 (Edwards syndrome) and trisomy 13 (Patau syndrome). Trisomy 21 typically shows elevated hCG + reduced PAPP-A. Monosomy X (Turner) shows low PAPP-A + low hCG. Single-gene disorders and multifactorial conditions do not typically affect these serum markers."},{id:"final_final_L21_Prenatal_Diagnosis_6",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"The image shows a procedure performed on a pregnant woman for fetal genetic testing. What is the best description of this procedure?",options:["Chorionic villus sampling (invasive)","Invasive prenatal test","Non-invasive prenatal test (NIPT/cfDNA)","Amniocentesis"],answer:2,explanation:"Non-invasive prenatal testing (NIPT) uses cell-free fetal DNA (cfDNA) circulating in maternal blood, obtained by a simple maternal blood draw. No risk to the fetus. NIPT screens for trisomy 21, 18, 13, and sex chromosome aneuploidies with high sensitivity/specificity. It is a SCREENING test (not diagnostic) \u2014 positive results require confirmation by CVS or amniocentesis. The image shows a blood draw from the mother, distinguishing it from invasive procedures."},{id:"final_final_L21_Prenatal_Diagnosis_7",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"A 13-week pregnant woman has low PAPP-A and low beta-hCG. Suspected trisomy. What is the best confirmatory diagnostic test?",options:["Quadruple test","Triple test","Chorionic villus sampling (CVS)","Screening alone is sufficient"],answer:2,explanation:"When first-trimester screening (PAPP-A + beta-hCG + nuchal translucency) is abnormal and trisomy is suspected at 13 weeks, the best CONFIRMATORY diagnostic test is CVS (10-14 weeks) \u2014 it provides a definitive fetal karyotype. Amniocentesis is performed at 15-20 weeks. Triple and quadruple tests are second-trimester screening tools, not diagnostic. Screening alone is never sufficient when confirmation is required for clinical decision-making."},{id:"final_final_L21_Prenatal_Diagnosis_8",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"What is the recurrence risk for siblings when a child is born with bilateral cleft lip and palate?",options:["4.2%","2.6%","5.6%","0.5%"],answer:2,explanation:"Cleft lip and palate (CL/P) is a multifactorial condition. Recurrence risk increases with: severity (bilateral > unilateral), number of affected family members, and severity of the proband's defect. For bilateral cleft lip and palate (most severe form): recurrence risk for siblings is approximately 5\u20136%. For unilateral CL/P: sibling risk ~3-4%. For cleft palate alone: sibling risk ~2-3%. The answer of 5.6% reflects the higher recurrence risk associated with bilateral involvement."},{id:"final_final_L21_Prenatal_Diagnosis_9",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Which medication is recommended during the first trimester of pregnancy to reduce the risk of neural tube defects?",options:["Streptomycin","Folic acid","Isoniazid","Valproic acid"],answer:1,explanation:"Periconceptional folic acid supplementation (ideally starting 1 month before conception through the first trimester) reduces neural tube defect (NTD) risk by 50\u201370%. The neural tube closes during weeks 3\u20134 of gestation (before many women know they are pregnant), so supplementation must begin BEFORE conception. Streptomycin is ototoxic (teratogen). Isoniazid carries risks. Valproic acid is a known NTD-inducing teratogen (it inhibits folate metabolism) \u2014 actually increases NTD risk."},{id:"final_final_L21_Prenatal_Diagnosis_10",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Two parents have two affected children with Hemophilia A. They want a healthy child. What is the best recommendation?",options:["Preimplantation genetic diagnosis (PGD)","Newborn screening after birth","Early diagnosis and treatment only","Chorionic villus sampling in each pregnancy"],answer:0,explanation:"Preimplantation genetic diagnosis (PGD) combined with in-vitro fertilization (IVF) allows genetic testing of embryos BEFORE implantation. For Hemophilia A (X-linked recessive), PGD can identify unaffected embryos (carrier females or unaffected males) for implantation, ensuring the couple has a healthy child while avoiding the ethical issues of prenatal diagnosis followed by possible pregnancy termination. Newborn screening detects disease after birth (too late for prevention). CVS is prenatal diagnosis, not preimplantation."},{id:"final_final_L21_Prenatal_Diagnosis_11",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"An increase in inhibin-A in maternal serum is associated with:",options:["Cystic fibrosis","Down syndrome (Trisomy 21)","Turner syndrome","Duchenne muscular dystrophy"],answer:1,explanation:"The quadruple test (second trimester, 15-20 weeks) for Down syndrome includes: AFP (low \u2193), hCG (high \u2191), unconjugated estriol/uE3 (low \u2193), and inhibin-A (HIGH \u2191). Elevated inhibin-A is one of the four markers in the quad screen. The elevated inhibin-A in trisomy 21 pregnancies is thought to be due to abnormal placental function associated with the extra chromosome 21. Inhibin-A is NOT elevated in cystic fibrosis, Turner syndrome, or DMD."},{id:"final_final_L21_Prenatal_Diagnosis_12",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"A mother has one child with galactosemia and is now pregnant with her second child in the second trimester. What genetic test is most appropriate to advise?",options:["Newborn screening after birth","Parental carrier testing","Ultrasonography only","Maternal serum AFP"],answer:1,explanation:"When a couple has already had a child with an autosomal recessive condition (galactosemia), both parents are confirmed obligate carriers. Parental carrier testing confirms carrier status and allows calculation of recurrence risk (25% for each subsequent pregnancy). The appropriate prenatal diagnostic test for the CURRENT pregnancy would be CVS or amniocentesis for enzyme assay or molecular testing. Newborn screening identifies affected babies after birth (doesn't help plan the current pregnancy)."},{id:"final_final_L21_Prenatal_Diagnosis_13",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"Which prenatal test does NOT carry a risk of fetal loss?",options:["Maternal serum AFP (MSAFP)","Chorionic villus sampling (CVS)","Fetal tissue sampling","Amniocentesis"],answer:0,explanation:"Maternal serum AFP is a maternal blood test \u2014 it poses no risk whatsoever to the fetus (only a blood draw from the mother). Invasive prenatal tests that carry fetal loss risk: CVS (~0.5-1% procedure-related fetal loss), amniocentesis (~0.1-0.3% fetal loss), and fetal tissue sampling (higher risk). The distinction between invasive (CVS, amniocentesis, cordocentesis) and non-invasive (maternal blood tests, ultrasound, NIPT) prenatal tests is clinically important."},{id:"final_final_L21_Prenatal_Diagnosis_14",exam:"final",lecture:"L21 Prenatal Diagnosis",q:"The triple screen test includes all of the following EXCEPT:",options:["Alpha-fetoprotein (AFP)","Human chorionic gonadotropin (hCG)","Unconjugated estriol (uE3)","Indirect bilirubin"],answer:3,explanation:"The triple screen (second trimester, 15-20 weeks) consists of three markers: AFP (from fetal liver/yolk sac), hCG (from placenta), and unconjugated estriol/uE3 (from fetal adrenals \u2192 placenta \u2192 maternal blood). The quadruple screen adds a 4th marker: inhibin-A. Indirect bilirubin is NOT part of prenatal screening tests. It is measured in newborns for jaundice assessment or in adults for hemolytic anemia evaluation."},{id:"final_final_L22_Cytomolecular_1",exam:"final",lecture:"L22 Cytomolecular",q:"A patient is suspected to have sickle cell anemia. What is the best cytomolecular technique to directly detect the HBB gene mutation?",options:["Spectrophotometry (hemoglobin electrophoresis)","DNA sequencing (Sanger or NGS)","Complete blood count (CBC)","Western blot"],answer:1,explanation:"To directly detect the specific HBB point mutation causing sickle cell anemia (c.20A>T, p.Glu7Val) at the molecular level, DNA sequencing (Sanger sequencing or targeted NGS) is the gold standard cytomolecular technique. It directly identifies the nucleotide change. Hemoglobin electrophoresis (spectrophotometry) detects the abnormal HbS protein indirectly. CBC shows anemia and sickle cells but is not a molecular technique. RFLP (restriction fragment length polymorphism with Mst II enzyme) is also used classically."},{id:"final_final_L22_Cytomolecular_2",exam:"final",lecture:"L22 Cytomolecular",q:"Which chromosomal testing method is most appropriate for detecting a specific genetic disorder caused by a mutation on chromosome 4p?",options:["Sanger sequencing","FISH (fluorescence in situ hybridization)","Conventional karyotyping","Whole genome sequencing"],answer:1,explanation:"FISH uses fluorescently labeled DNA probes that hybridize to a specific chromosomal locus (such as chromosome 4p for Wolf-Hirschhorn syndrome). It can detect deletions, duplications, and translocations at specific known loci that may be too small to see on conventional karyotype. Sanger sequencing detects point mutations (not chromosomal deletions). Karyotyping detects large structural changes but misses microdeletions. WGS is comprehensive but FISH is the targeted, rapid choice for a known locus."},{id:"final_final_L22_Cytomolecular_3",exam:"final",lecture:"L22 Cytomolecular",q:"Which technique is most appropriate to detect a microdeletion at chromosome 4p16.3 (Wolf-Hirschhorn syndrome)?",options:["Conventional karyotyping","PCR alone","FISH","Southern blot"],answer:2,explanation:"Wolf-Hirschhorn syndrome is caused by a microdeletion at 4p16.3, typically too small (~1-2 Mb) to be detected by conventional karyotype. FISH using a specific probe for the WHSC1 region at 4p16.3 can detect this microdeletion. Chromosomal microarray (CMA) is now also commonly used. Conventional karyotype can only detect deletions >5-10 Mb. PCR amplifies sequences but cannot detect deletions without quantitative modification (like MLPA)."},{id:"final_final_L22_Cytomolecular_4",exam:"final",lecture:"L22 Cytomolecular",q:"Which of the following mutation nomenclature represents a frameshift mutation?",options:["c.1258delC (p.Leu1258Phefs)","c.891+1G>A","c.742T>G","c.1003C>A"],answer:0,explanation:"Frameshift mutations result from insertions or deletions (indels) that shift the reading frame. c.1258delC = deletion of one cytosine at position 1258 \u2192 shifts the reading frame \u2192 p.Leu1258Phefs (frameshift starting at position 1258 with a new amino acid Phe, fs = frameshift). c.891+1G>A = splice site mutation (intronic). c.742T>G and c.1003C>A = missense mutations (single nucleotide substitutions that change one amino acid without shifting the frame)."},{id:"final_final_L22_Cytomolecular_5",exam:"final",lecture:"L22 Cytomolecular",q:"The karyotype shown demonstrates an abnormality in the sex chromosomes. What does this karyotype display?",options:["Normal female (46,XX)","Turner syndrome with isochromosome (46,X,i(Xq))","Turner syndrome with ring chromosome","Turner syndrome with X deletion"],answer:1,explanation:"Turner syndrome (45,X) is the classic form, but ~80% of cases have a variant. An isochromosome of the long arm [i(Xq)] results in 46,X,i(Xq) \u2014 one normal X plus an isochromosome with two copies of the Xq (long) arm and deletion of the entire Xp (short) arm. This creates Turner syndrome phenotype (short stature, ovarian dysgenesis) because SHOX gene on Xp is deleted. Isochromosome Turner is the most common Turner variant on karyotype.",image:"images/p35_karyotype_q7.png"},{id:"final_final_L22_Cytomolecular_6",exam:"final",lecture:"L22 Cytomolecular",q:"When identifying a gene mutation associated with hereditary breast cancer risk, which genetic test would be most suitable?",options:["FISH","Gene panel (NGS multi-gene panel)","Conventional karyotyping","Sanger sequencing of single gene"],answer:1,explanation:"Hereditary breast cancer can be caused by mutations in multiple genes (BRCA1, BRCA2, PALB2, CHEK2, ATM, CDH1, PTEN, STK11). A multi-gene NGS panel tests all relevant genes simultaneously from a single DNA sample, providing the most efficient and comprehensive diagnostic approach. FISH does not detect point mutations. Karyotype detects only large chromosomal abnormalities. Single-gene Sanger sequencing is appropriate when a specific known familial mutation is being tested in relatives."},{id:"final_final_L22_Cytomolecular_7",exam:"final",lecture:"L22 Cytomolecular",q:"Which of the following represents a pericentric inversion in a female?",options:["46,XX,inv(6)(p15p18)","46,XX,inv(6)(q15q18)","46,XX,inv(6)(p15q18)","46,XX,i(6)(p21p23)"],answer:2,explanation:"A pericentric inversion involves a segment that INCLUDES the centromere \u2014 with breakpoints on both the short arm (p) AND the long arm (q). Notation: inv(chromosome)(p-breakpointq-breakpoint). 46,XX,inv(6)(p15q18) = female, chromosome 6, inversion with breakpoints at p15 (short arm) and q18 (long arm) \u2014 this CROSSES the centromere \u2192 pericentric. Option A: both breakpoints on p \u2192 paracentric. Option B: both on q \u2192 paracentric. Option D: i(6) = isochromosome, not inversion."},{id:"final_final_L22_Cytomolecular_8",exam:"final",lecture:"L22 Cytomolecular",q:"Which karyotype notation correctly represents a deletion of the short arm of chromosome 10 in a male?",options:["46,XX,del(10)(p11.2p23)","46,XY,del(10)(p11.2p23)","45,XY,del(10)(q11.2q23)","46,XY,del(10)(p11q23)"],answer:1,explanation:"Correct notation breakdown: 46 = total chromosome number; XY = male sex chromosomes; del(10) = deletion of chromosome 10; (p11.2p23) = breakpoints on the short arm (p) from band 11.2 to band 23, specifying the deleted segment. Option A: XX = female (wrong sex). Option C: 45 = wrong total (should be 46 for a simple deletion); q = long arm (not short arm). Option D: del(10)(p11q23) spans both arms \u2192 this would be an unbalanced rearrangement involving centromere."},{id:"final_final_L22_Cytomolecular_9",exam:"final",lecture:"L22 Cytomolecular",q:"PCR (polymerase chain reaction) amplifies DNA using which enzyme?",options:["Taq DNA polymerase (thermostable)","Restriction endonuclease","Plasmid DNA polymerase","Phage lambda polymerase"],answer:0,explanation:"PCR uses a thermostable DNA polymerase \u2014 most commonly Taq polymerase (from Thermus aquaticus). The reaction cycles through: denaturation (94\xB0C) \u2192 annealing of primers (50-65\xB0C) \u2192 extension by DNA polymerase (72\xB0C). The thermostable enzyme is essential because it survives the high-temperature denaturation step without being destroyed. Restriction enzymes cut DNA at specific sequences \u2014 they do not amplify DNA. Plasmids are vectors, not enzymes."},{id:"final_final_L22_Cytomolecular_10",exam:"final",lecture:"L22 Cytomolecular",q:"Detection of proteins by Western blot relies primarily on:",options:["Protein-antibody specificity alone","Labeling the antibody with a detectable dye/enzyme","Protein denaturation by SDS alone","Labeling the protein with dye before electrophoresis"],answer:1,explanation:"Western blot (immunoblot) procedure: (1) Proteins separated by SDS-PAGE (size-based, using protein denaturation), (2) transferred to nitrocellulose/PVDF membrane, (3) blocked, (4) incubated with primary antibody (specific for target protein), (5) secondary antibody (labeled with enzyme like HRP or fluorescent dye) binds the primary antibody, (6) detection reagent reveals the signal. The detection relies on the LABELED ANTIBODY \u2014 specifically the secondary antibody conjugated to an enzyme/dye. Both antibody specificity AND labeling are required, but the visualization step uses the labeled antibody."},{id:"final_final_L23_PS_Clinical_Genetics_1",exam:"final",lecture:"L23 PS Clinical Genetics",q:"An image shows an infant with characteristic facial features including upslanting palpebral fissures, epicanthal folds, flat nasal bridge, and single palmar crease. What chromosomal abnormality does this infant have?",options:["Trisomy 18 (Edwards syndrome)","Trisomy 21 (Down syndrome)","Trisomy 13 (Patau syndrome)","Monosomy X (Turner syndrome)"],answer:1,explanation:"The described features \u2014 upslanting palpebral fissures, epicanthal folds, flat nasal bridge, single palmar (Simian) crease, hypotonia, and brachycephaly \u2014 are classic features of Down syndrome (Trisomy 21). Down syndrome is the most common chromosomal aneuploidy, caused by nondisjunction (95%), Robertsonian translocation (4%), or mosaicism (1%). It is the most common genetic cause of intellectual disability."},{id:"final_final_L23_PS_Clinical_Genetics_2",exam:"final",lecture:"L23 PS Clinical Genetics",q:"An 8-year-old boy presents with intellectual disability, a long face, broad forehead, large ears, and a prominent mandible. His maternal uncle is similarly affected. What is the most likely indication confirming this condition?",options:["Karyotype showing 47,XXY","G6PD enzyme deficiency","Abnormal increase in CGG trinucleotide repeats in the FMR1 gene","Elevated plasma phenylalanine"],answer:2,explanation:"The description is classic Fragile X syndrome \u2014 the most common inherited cause of intellectual disability. Features: large ears, prominent jaw, long face, macro-orchidism (post-pubertal), intellectual disability, and behavioral issues (autism spectrum). The pattern of inheritance is X-linked (maternal uncle affected). Fragile X is caused by expansion of CGG trinucleotide repeats (>200 repeats = full mutation) in the 5' UTR of the FMR1 gene on Xq27.3, leading to gene silencing via methylation."},{id:"final_final_L23_PS_Clinical_Genetics_3",exam:"final",lecture:"L23 PS Clinical Genetics",q:"A child is suspected to have Prader-Willi syndrome. Which genetic testing method is required to confirm the diagnosis?",options:["Conventional chromosomal karyotype","Methylation analysis (methylation-specific PCR or methylation array)","Whole exome sequencing","FISH for chromosome 15q11-q13"],answer:1,explanation:"Prader-Willi syndrome (PWS) and Angelman syndrome (AS) both involve chromosome 15q11-q13 but result from loss of different parental imprints. PWS = loss of PATERNAL 15q11-q13 expression (deletion, maternal UPD15, or imprinting center defect). AS = loss of MATERNAL 15q11-q13 expression. Methylation analysis detects the impr
